body:
  text: 諸圖六贓圖納贖諸例圖過失殺傷收贖圖徒限内老疾收贖圖誣輕為重收贖圖五刑圖獄具圖喪服圖按此凡各受杖贖銀計算無異惟已役徒一月有八釐七毫五絲者七釐五毫者六釐八毫七絲五忽者六釐五毫者六釐二毫五絲者其不同何也蓋徒之全贖原有差等也此贖與老幼婦人收贖不同彼徒流皆直照徒年限收贖此徒流皆折杖照杖收贖按圖内已論決之笞杖徒流全抵剩罪俱無異即未論決之笞杖准贖亦無異惟未論決之徒流折杖既毎一等折杖二十則杖六十徒一年者當於原杖六十之上加杖二十似不應折杖至一百二十不知徒罪起於一年杖數起於六十折杖之法即視其原杖之數徒一年者原杖六十將徒一年亦折杖六十合之原杖六十得一百二十徒一年半者原杖七十將徒一年半亦折杖七十合之原杖七十得一百四十徒二年者原杖八十將徒二年亦折杖八十合之原杖八十得一百六十徒二年半者原杖九十將徒二年半亦折杖九十合之原杖九十得一百八十徒三年者原杖一百將徒三年亦折杖一百合之原杖一百得二百此徒罪折杖之法也過此以往即入於流罪三流原杖總皆一百流二千里者較徒三年加一等徒三年折杖一百則流二千里應折杖一百二十合之原杖一百得二百二十流二千五百里較流二千里又加一等流二千里折杖一百二十則流二千五百里應折杖一百四十合之原杖一百得二百四十流三千里較流二千五百里又加一等流二千五百里折杖一百四十則流三千里應折杖一百六十合之原杖一百得二百六十此流罪折杖之法也凡被吿之人本係近流而誣入逺流未決者俱准此科算若被吿之人本係笞杖及徒罪而乃誣入流罪未決則不論逺近三流准徒四年皆以一年為剩罪蓋徒五等至三年而止今准徒四年則比滿徒多一年即比滿徒多二等每一等折杖二十應折杖四十連滿徒之折杖一百原杖一百共該折杖二百四十内將告實或笞或杖或徒之本罪照數除去外餘下折杖不及一百俱收贖若過一百則決杖一百外所剩杖數收贖大清律例卷二
