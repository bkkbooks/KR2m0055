body:
  text: 笞一十吏律府州縣置立信牌量地逺近定限隨事銷繳違者一日笞一十每一日加一等罪止笞四十信牌律已除官員在京在外各依定限赴任若無故過限者一日笞一十每十日加一等罪止杖八十代官已到舊官照限交割完備無故不離任所者減赴任過限罪二等罪止杖六十官員赴任過限律官員無故不朝叅公座及官吏假滿無故不還職役者一日笞一十每三日加一等罪止杖八十無故不朝㕘公座律官文書稽程一日者吏典笞一十每三日加一等罪止笞四十首領官四日笞一十每三日加一等罪止笞三十官文書稽程律照刷有司有印信衙門文卷遲一宗二宗吏典笞一十三宗至五宗笞二十每五宗加一等罪止笞四十府州縣首領官及倉庫務場局所河泊等官各減一等照刷文卷律户律丁夫雜匠承差而稽留不著役及在役日滿而所司不放回者一日笞一十每三日加一等罪止笞五十丁夫差遣不平律丁夫雜匠在役及工樂雜户逃者一日笞一十每五日加一等罪止笞五十提調官吏故縱者同罪逃避差役律負欠私債違約不還者五兩以上違三月笞一十每一月加一等罪止笞四十違禁取利律兵律應入宫殿人未著門籍而入或當下直而輒入及宿次未到而輒宿門官宿衛官失覺察者宫殿門擅入律宫禁及紫禁城皇城門守衛人與京城門守衞官應直不直及在直而逃並各處城門應宿衞守衞人私自代替親管頭目失覺察者宿衞守衞人私自代替律應從車駕人違期不到及從而先回還一日親管頭目失覺察者從駕稽違律宿衞人兵仗離身親管頭目失於覺察者宿衞人兵仗律牧養驢驘以百頭為率若死者損者失者牧長牧副一頭笞一十每三頭加一等過杖一百每十頭加一等罪止杖八十徒二年牧養羊以百頭為率若死者損者失者牧長牧副四頭笞一十每三頭加一等過杖一百每十頭加一等罪止杖七十徒一年半牧養畜産不如法律太僕寺官管領騍馬每年三羣應孳生駒一百匹若止七十匹者孳生馬匹律官司相驗分揀官羊不以實一頭者驗畜産不以實律養療瘦病羊不如法因而致死一頭者養療瘦病畜産不如法律失防官私畜産損食官私之物者宰殺馬牛律府提調官失於檢舉公文稽留磨擦破壞封皮不動原封至十件以上與損壞一角者遞送公文律驛使承受官司常事文書不依原寫去處錯去他所違限四日者驛使稽程律起解官物囚徒畜産承差誤不依題寫去處錯去他所違限四日者公事應行稽程律公差應乘官馬牛駝驘驢私䭾物不得過十觔違者五觔笞一十每十觔加一等罪止杖六十應乘船車私載物不得過三十觔違者十觔笞一十每二十觔加一等罪止杖七十受寄私載他人物者寄物之人當該官司知而容縱者乘官畜産車船附私物律刑律良人以手足毆人奴婢不成傷者良賤相毆律同姓服盡尊長以手足毆卑幼不成傷者同姓親屬相毆律期親以下尊長以手足毆卑幼之婦不成傷者手足毆卑幼之妾成傷及以他物毆不成傷者兄姊毆弟之妻及妻毆夫之弟妹并夫弟之妻以手足毆不成傷者兄姊毆弟之妾及妻毆夫弟之妾并妾毆夫之妾子以他物毆不成傷者妻妾與夫親屬相毆律以手足毆妻不同居前夫之子不成傷者手足毆同居前夫之子成傷及以他物毆不成傷者毆妻前夫之子律無故罵人者互相罵者罵人律非因事而與官吏人等財至四十兩者坐贓致罪律去官而受舊部内餽送土宜禮物者在官求索借貸人財物律捕强竊盜賊事發日為始捕役汛兵一月不獲竊盜者盜賊捕限律司獄官於囚應給衣糧醫藥應脱鎖杻應保管出外應聽家人入視若申稟上司不即施行者一日笞一十每一日加一等罪止笞四十獄囚衣糧律婦人犯罪雜犯責付保管失於監禁者婦人犯罪律笞二十吏律吏典及承差禁子弓兵人等額外濫充容留一人者正官笞二十每三人加一等罪止杖一百濫設官吏律官吏在官無故應直不直應宿不宿者擅離職役律上司有追對刑名查勘錢糧等重事勾問屬官事畢無故稽留不放回者三日笞二十每三日加一等罪止笞五十擅勾屬官律申其餘衙門文書錯誤有害於事者上書奏事犯諱律照刷有司有印信衙門文卷失錯及漏報一宗吏典笞二十二宗三宗笞三十每三宗加一等罪止笞五十府州縣首領官及倉庫務場局所河泊等官各減一等照刷文卷律行移文書誤將緊闗字様失錯而洗補改正首領官失於對同者増減官文書律户律本縣提調正官首領官吏失於取勘致有漏口者十口笞二十每三十口加一等罪止笞四十脫漏户口律應差丁夫雜匠而差遣不均平者一人笞二十每五人加一等罪止杖六十丁夫差遣不平律丁夫雜匠在役及工樂雜户提調官吏不覺逃者五人笞二十每五人加一等罪止笞四十逃避差役律同居卑幼私擅用本家財物者十兩笞二十每十兩加一等罪止杖一百同居尊長應分家財不均平者罪亦如之卑幼私擅用財律部内有水旱一應災傷田糧其檢踏官吏里長甲首失於闗防有不實者十畝以上至二十畝笞二十每二十畝加一等罪止杖八十檢踏災傷田糧律盜種他人荒田一畝以下者笞二十每五畝加一等罪止杖七十盜耕種官民田律里長部内田地無故荒蕪以十分為率一分笞二十每一分加一等罪止杖八十人户計荒蕪田地以五分為率一分笞二十每一分加一等罪止杖六十荒蕪田地律負欠私債違約不還者五十兩以上違三月笞二十每一月加一等罪止笞五十違禁取利律兵律各處城門守衞人應直不直者在直而逃者親管頭目知而故縱者宮禁及紫禁城皇城門守衞官應直不直并在直而逃與京城門應宿衞守衞人并各處城門應宿衞守衞官私自代替親管頭目失於覺察者宿衞守衞人私自代替律職官從車駕違期不到及從而先回還一日親管頭目失覺察者從駕稽違律宿衞官兵仗離身及宿衞人輒離執掌處所親管頭目失覺察者宿衞人兵仗律陣亡病故官軍回鄉家屬行糧脚力有司不即應付者遲一日笞二十每三日加一等罪止笞五十優恤軍屬律外郡城鎮夜禁一更五更犯者巡夜人等故將行人拘留誣執犯夜者夜禁律闗津徃來船隻守把人不即盤驗放行無故阻當者一日笞二十每一日加一等罪止笞五十闗津留難律牧長牧副損傷馬牛駝一頭者牧養畜産不如法律管領騍馬每年三羣應孳生駒一百匹若止八十匹不為用心提調者典牧官孳生馬匹律官馬牛駝驘驢牧養人及牧長牧副若痩十頭者笞二十每十頭加一等罪止杖一百官馬牛駝驘驢乘駕不如法致脊破領穿瘡圍繞三寸者乘官畜脊破領穿律牧馬官聽乘官馬不調習者一匹笞二十每五匹加一等罪止杖八十官馬不調習律故殺他人馬牛駝驘驢傷而不死及殺猪羊等畜價不減為從者宰殺馬牛律鋪兵遞送公文稽留三刻者笞二十每三刻加一等罪止笞五十若磨擦及破壞封皮不動原封者一角笞二十每三角加一等罪止杖六十公文到鋪須要隨即遞送違者鋪司不告舉者損壞公文一角鋪司吿舉官司不即受理者公文稽留及磨擦破壞封皮不動原封十件以上與損壞公文一角者提調縣官州吏沈匿拆動原封一角者提調府官遞送公文律出使馳驛違限及驛官故將好馬藏匿推故不即應付以致違限俱係常事者一日各笞二十每三日加一等罪杖六十驛使稽程律起解官物囚徒畜産而輒稽留及事有期限而違者一日笞二十每三日加一等罪止笞五十公事應行稽程律刑律鬭毆以手足毆人不成傷者鬭毆律良人以手足毆人奴婢成傷及以他物毆不成傷者良賤相毆律同姓服盡尊長以他物毆卑幼不成傷者同姓親屬相毆律期親以下尊長以手足毆卑幼之婦成傷及以他物毆不成傷者以他物毆卑幼之妾成傷者兄姊毆弟之妻及妻毆夫之弟妹并夫弟之妻以他物毆不成傷者妻妾與夫親屬相毆律以手足毆妻不同居前夫之子成傷及以他物毆不成傷者毆妻前夫之子律官吏人等非因事受財一兩以下者與者至五十兩者坐贓致罪律為他人及親屬囑託公事者囑託公事律徒流遷徙充軍囚徒當該官司無故稽留不送者三日笞二十每三日加一等罪止杖六十鄰境官司囚到稽留不即遞送者罪亦如之稽留囚徒律捕强竊盜賊事發日為始捕役汛兵一月不獲强盜及殺人賊者兩月不獲竊盜者盜賊捕限律鞫獄官於囚應杻而鎖應鎖而杻若囚該杖罪者囚應禁而不禁律獄囚情犯已完限外不斷決起發者當該官吏三日笞二十每三日加一等罪止杖六十淹禁律鞫獄官推問罪囚夥内人伴見在他處皆聽直行文書勾取文到違限不發者一日笞二十每一日加一等罪止杖六十將重囚移就輕囚多囚移就少囚當處官司隨即收問若囚到不受者一日笞二十每一日加一等罪止杖六十鞫獄停囚待對律吿詞訟對問得實無故稽留三日不放者笞二十每三日加一等罪止笞四十原告人事畢不放回律被囚誣指之平人無故稽留三日不放回者笞二十每三日加一等罪止杖六十獄囚誣指平人律鹽場鐵冶拘役徒囚應入役而不入役及病假已痊不令計日貼役者徒囚與監守人過三日笞二十每三日加一等罪止杖一百徒囚不應役律工律造作不如法之提調官吏造作不如法律額造常課段疋軍器過限不納齊足者以十分為率一分工匠笞二十每一分加一等罪止笞五十局官減工匠一等提調官吏又減局官一等造作過限律名例一教令七嵗小兒毆打父母者老小廢疾收贖例户例一隱匿侵盜案内之家産十兩以下者隱瞞入官家産例笞三十吏律吏典及承差禁子弓兵人等額外濫充容留一人者首領官笞三十每三人加一等罪止杖一百濫設官吏律主司考試藝業技能而失不以實者一人貢舉非其人律行移文書誤將緊闗字様失錯而洗補改正者吏典増減官文書律户律里長失於取勘漏口者一口至十口笞三十每十口加一等罪止笞五十脱漏户口律還鄉復業人民多餘占田而荒蕪者三畝至十畝笞三十每十畝加一等罪止杖八十欺隱田糧律盜種他人田及强種他人荒田一畝以下者各笞三十每五畝加一等罪止杖八十盜耕種官民田律知係居喪及命婦而娶為妾者居喪嫁娶律負欠私債違約不還者百兩以上違三月笞三十每一月加一等罪止杖六十違禁取利律禮律御藥御膳不品嘗之監臨提調官合和御藥律兵律京城門守衛人及各處城門守衞官應直不直在直而逃親管頭目知而故縱者宮禁及紫禁城皇城門應宿衞守衞人并京城門應宿衞守衞官私自代替親管頭目失於覺察者宿衛守衛人私自代替律宿衞人於别處宿及宿衛官輒離職掌處所親管頭目失覺察者宿衞人兵仗律京城夜禁一更三㸃鐘聲已靜五更三㸃鐘聲未動犯者夜禁律牧養馬牛駝以一百頭為率若死者損者失者牧長牧副每一頭笞三十每三頭加一等過杖一百每十頭加一等罪止杖一百徒三年牧養畜産不如法律管領騍馬每年三羣應孳生駒一百匹若止七十匹不為用心提調者典牧官孳生馬匹律養療瘦病馬牛駝驘驢不如法者養療瘦病畜産不如法律故殺官私馬牛駝驘驢傷而不死及殺猪羊等畜價不減者故放官私畜産損食官私物者笞三十贓重者坐贓論罪止杖一百徒三年宰殺馬牛律提調縣吏失於檢舉公文稽留及磨擦破壞封皮不動原封十件以上與損壞一角者提調州官府吏失於檢舉沈匿公文及拆動原封一角者遞送公文律刑律鬭毆以手足毆人成傷及以他物毆人不成傷者鬭毆律奴婢以手足毆良人不成傷者良人以他物毆人