寸以上者鬬毆律宫内忿爭者宮内忿爭律流外官及軍民吏卒以手足毆非本管九品以上官并公使人以手足毆九品以上有司官成傷及以他物毆不成傷者毆制使及本管長官律流内九品以上官毆非本管五品以上若五品以上毆非本管三品以上官以手足毆成傷及以他物毆不成傷者九品以上官毆長官律毆受業師以手足毆成傷及以他物毆不成傷者毆受業師律奴婢以他物毆良人成傷者良賤相毆律妻之子以他物毆父妾成傷者妾之子以手足毆父妾不成傷者妻妾與夫親屬相毆律吏卒罵六品以下首領官者罵制使及本管長官律首領官及統屬官罵六品以下長官者佐職統屬罵長官律雇工人罵家長小功親者奴婢罵家長律罵内外緦麻兄姊者罵尊長律妻妾罵夫内外緦麻兄姊者妻妾罵夫期親尊長律軍民詞訟越本管官司輒赴上司稱訴者越訴律誣告人罪笞三十加所誣罪二等者誣告律年八十以上十歳以下及篤疾若婦人除告謀反叛逆子孫不孝或盜詐侵奪財産及殺傷之類外官司受而為理者見禁囚不得告舉他事律軍人有犯人命管軍衙門約㑹有司檢驗歸問其有占恡不發者首領官吏管軍官越分輒受民訟者軍民約㑹詞訟律官吏受財無禄人不枉法贓一兩以下者官吏受財律官吏人等非因事受財至三十兩者與者至八十兩者坐贓致罪律詐稱使臣乘驛驛官失盤詰者詐稱内使等官律官吏宿娼者媒合人官吏宿娼律官吏人等曲法囑託公事者當該官吏聽從者囑託公事律私和公事情重者私和公事律失火延燒官民房屋者失火律違令者違令律徒流遷徙充軍囚人役限内而逃及起發已經斷決中途在逃者一日笞五十每三日加一等罪止杖一百徒流逃律鞫獄官於流囚應禁而不禁應鎖杻而不鎖杻及脱去者死囚應杻而鎖應鎖而杻者流囚自脱去及司獄官典獄卒私與囚脱去鎖杻者提牢官知而不舉者囚應禁而不禁律司獄官典失於檢㸃致囚自盡者與囚金刃解脱律獄官典卒容縱外人入獄及走泄事情於囚罪無增減者主守教囚反異律獄囚應請給衣糧醫藥而不請給患病應脱去鎖杻而不脱去應保管出外而不保管應聽家人入視而不聽司獄官典獄卒提牢官知而不舉者獄囚衣糧律得相容隱之人及年八十以上十歳以下若篤疾皆不得令其為證違者老幼不拷訊律鞫獄官於同伴罪囚已在他處事發者聽輕囚就重囚少囚從多囚若囚數相等送先發官司併問若兩縣相去三百里之外者各從事發處歸斷違者鞫獄停囚待對律孕婦犯死罪失於詳審未産而決者婦人犯罪律已處決訖别加殘毁死屍者斷罪不當律工律營造計料申請財物及人工多少不實者擅造作律成造軍器不如法及織造段疋粗糙紕薄者造作不如法律工匠將監臨主守官吏自己物料輒於官局帶造段疋者帶造段疋律不修河防及修而失時者提調官吏不修圩岸因而渰没田禾者失時不修隄防律户例一僧道犯罪該還俗者若仍於原寺觀菴院或他寺觀菴院潛住枷號一個月僧道官及住持知而不舉者一僧道年未四十招受生徒及招受不止一人者僧道官容隱者私剏菴院及私度僧道一空重漕船隨幫百總旗頭違限一次者轉解官物例一民間私頂軍田匿不首報至十畝者典買田宅例一民間馬匹兵民私自賣買不報明地方官不上税不存案者匿税例禮例一壇廟祭祀及聖駕出入並陞殿之日肆行喊呌衝突擁擠者厮役之主失儀例一軍民人等遇見官員引導即須下馬躱避不許衝突違者禁止迎送例一品官服色等物工匠與不應用之家製造者一官民人等用線纓者一奴僕服飾其段紗及各様細皮俱不許用長隨亦同奴僕服飾違者服舎違式例一鄉飲坐叙其有曾犯法之人列於外坐主者若不分别致使良莠溷淆者鄉飲酒禮例兵例一至下馬牌不下而竟過者直行御道例一官員出差赴任回籍及商民出外貿易攜帶軍器印票限外隱匿不繳者私藏應禁軍器例一廣東山主不經官驗准私令批佃搭寮種麻種靛者盤詰姦細例一上駟院太僕寺所管遊牧馬匹合算正額内少孳生一百匹以下者牧副孳生馬匹例一屯莊居住旗人畜養馬匹而無印烙屯領催不行察出者隱匿孳生官畜産例刑例一失察偷出邊闗刨參至一百名者領催披甲人等鞭五十一盛京各處山場商人領票砍伐木植如有夾帶偷砍果松至數十根者盗田野穀麥例一惡棍設法索詐官民情罪重大實在光棍其家主父兄恐嚇取財例一閒散及䕶軍披甲人將該管官刃傷者領催族長毆制使及本管長官例一奴僕毆辱職官者家長良賤相毆例一賭博不行查首之總甲賭博例工例一打造弓箭擅改式様貨賣者造作不如法例大清律例卷四十
