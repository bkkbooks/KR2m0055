body:
  text: 內翰林國史院掌院事大學士臣剛林等謹題為清律奉旨審校臣等考訂已完恭請聖裁頒布以昭法守事前刑部尚書吳達海等屢遵諭旨纂修清律該刑部侍郎黨崇雅啓心郎額爾革圖率同郎中耿愛主事科爾坤烏赫納員外郎柯士芳許𢎞祚宋調元將前書纂完隨送到院該臣范文程臣剛林臣祁充格臣馮銓臣洪承疇臣寧完我暨刑部啓心郎額爾革圖裁議已定又該刑部侍郎提橋房可壯再四詳核率同啓心郎白色純周天成郎中范芝張育中宋炳夏之中蕭應聘宋從心周璜段騰藻毛永齡韓養醇員外郎王鳳林司務周再勳傅作衡逐篇磨勘尚書吳達海督令員外郎金燦繕寫進呈皇上惟恐一有未當不便遵行仍命臣范文程臣剛林臣祁充格臣馮銓臣寧完我臣宋權再加審定斟酌滿漢務合時宜臣等謹同學士蔣元恆督主事科爾坤亢得時能圖他赤哈哈番薩爾圖及刑部郎中范芝宋炳張育中逐款翻閲校正他赤哈哈番齊納紅筆帖式哈番莽伊圖筆帖式戴陽阿年哈等繕寫完畢仍發刑部隨該侍郎房可壯員外郎王鳳林司務傅作衡等對閲隨付郎中韓養醇員外郎金燦訂刻今已告竣臣等謹將刊完大清律集解附例十卷具疏奏進伏乞聖鑒裁定頒行中外庶法守昭明臣民永知遵守矣為此具本謹題請旨奉聖旨是大清律著頒行
