  text: 欽定四庫全書大清律例卷一
  hash: sha256:012a22e34cb631d55e58aec689bed3bd9018c26efac55c23059736700619badd
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0055_WYG_020-1a, image: WYG0672/WYG0672-0408a.png}
body:
  text: 名例律目録共四十六條附例一百八十四條五刑十惡八議應議者犯罪應議者之父祖有犯職官有犯文武官犯公罪文武官犯私罪犯罪免發遣軍籍有犯犯罪得纍減以理去官無官犯罪除名當差流囚家屬常赦所不原流犯在道會赦犯罪存留養親天文生有犯工樂戶及婦人犯罪徒流人又犯罪老小廢疾收贖犯罪時未老疾給沒贓物犯罪自首二罪俱發以重論犯罪共逃同僚犯公罪公事失錯共犯罪分首從犯罪事發在逃親屬相為容隱處決叛軍化外人有犯本條别有罪名加減罪例稱乘輿車駕稱期親祖父母稱與同罪稱監臨主守稱日者以百刻稱道士女冠斷罪依新頒律斷罪無正條徒流遷徙地方充軍地方吏律目録共二十八條附例七十條職制計一十四條官員襲廕大臣專擅選官文官不許封公侯濫設官吏信牌貢舉非其人舉用有過官吏擅離職役官員赴任過限無故不朝參公座擅勾屬官姦黨交結近侍官員上言大臣德政公式計一十四條講讀律令制書有違棄毁制書印信上書奏事犯諱事應奏不奏出使不復命官文書稽程照刷文卷磨勘卷宗同僚代判署文案增減官文書封掌印信漏使印信擅用調兵印信戶律目録共八十二條附例二百四十六條戶役計一十五條脫漏户口人戶以籍為定私創庵院及私度僧道立嫡子違法收留迷失子女賦役不均丁夫差遣不平隱蔽差役禁革主保里長逃避差役點差獄卒私役部民夫匠别籍異財卑幼私擅用財收養孤老田宅計一十一條欺隱田糧檢踏災傷田糧功臣田土盜賣田宅任所置買田宅典買田宅盜耕種官民田荒蕪田地棄毁器物稼穡等擅食田園瓜果私借官車船婚姻計一十七條男女婚姻典雇妻女妻妾失序逐壻嫁女居喪嫁娶父母囚禁嫁娶同姓為婚尊卑為婚娶親屬妻妾娶部民婦女為妻妾娶逃走婦女強占良家妻女娶樂人為妻妾僧道娶妻良賤為婚姻出妻嫁娶違律主婚媒人罪倉庫計二十三條錢法收糧違限多收稅糧斛面隱匿費用稅糧課物攬納稅糧虛出通關硃鈔附餘錢糧私下補數私借錢糧私借官物那移出納庫稱雇役侵欺冒支官糧錢糧互相覺察倉庫不覺被盜守支錢糧及擅開官封出納官物有違收支留難起解金銀足色損壞倉庫財物轉解官物擬斷贓罰不當守掌在官財物隱瞞入官家産課程計八條鹽法監臨勢要中鹽阻壞鹽法私茶私礬匿稅舶商匿貨人户虧兌課程錢債計三條違禁取利費用受寄財産得遺失物市㕓計五條私充牙行埠頭市司平物價把持行市私造斛斗稱尺器用布絹不如法禮律目録共二十六條附例五十一條祭祀計六條祭享毁大祀丘壇致祭祀典神祇歷代帝王陵寢褻瀆神明禁止師巫邪術儀制計二十條合和御藥乘輿服御物收藏禁書御賜衣物失誤朝賀失儀奏對失序朝見留難上書陳言見任官輒自立碑禁止迎送公差人員欺陵長官服舍違式僧道拜父母失占天象術士妄言禍福匿父母夫喪棄親之任喪葬鄉飲酒禮兵律目録共七十一條附例一百二十二條宮衛計一十六條太廟門擅入宮殿門擅入宿衛守衛人私自代替從駕稽遲直行御道內府工作人匠替役宮殿造作罷不出輒出入宮殿門關防內使出入向宮殿射箭宿衛人兵仗禁經斷人充宿衛衝突儀仗行宮營門越城門禁鎖鑰軍政計二十一條擅調官軍申報軍務飛報軍情漏泄軍情大事邊境申索軍需失誤軍事從征違期軍人替役主將不固守縱軍虜掠不操練軍士激變良民私賣戰馬私賣軍器毁棄軍器私藏應禁軍器縱放軍人歇役公侯私役官軍從征守禦官軍逃優恤軍屬夜禁關津計七條私越冒度關津詐冒給路引關津留難遞送逃軍妻女出城盤詰姦細私出外境及違禁下海私役弓兵廏牧計一十一條牧養畜産不如法孳生馬匹驗畜産不以實養療瘦病畜産不如法乘官畜脊破領穿官馬不調習宰殺馬牛畜産咬踢人隱匿孳生官畜産私借官畜産公使人等索借馬匹郵驛計一十六條遞送公文邀取實封公文鋪舍損壞私役鋪兵驛使稽程多乘驛馬多支廩給文書應給驛而不給公事應行稽程占宿驛舍上房乘驛馬齎私物私役民夫擡轎病故官家屬還鄉承差轉雇寄人乘官畜産車船附私物私借驛馬刑律目録共一百七十條附例七百五十五條賊盜計二十八條謀反大逆謀叛造妖書妖言盜大祀神御物盜制書盜印信盜內府財物盜城門鑰盜軍器盜園陵樹木監守自盜倉庫錢糧常人盜倉庫錢糧強盜劫囚白晝搶奪竊盜盜馬牛畜産盜田野穀麥親屬相盜恐嚇取財詐欺官私取財略人略賣人發冢夜無故入人家盜賊窩主共謀為盜公取竊取皆為盜起除刺字人命計二十條謀殺人謀殺制使及本管長官謀殺祖父母父母殺死姦夫謀殺故夫父母殺一家三人採生折割人造畜蠱毒殺人鬭毆及故殺人屏去人服食戲殺誤殺過失殺傷人夫毆死有罪妻妾殺子孫及奴婢圖賴人弓箭傷人車馬殺傷人庸醫殺傷人窩弓殺傷人威逼人致死尊長為人殺私和同行知有謀害鬭毆計二十二條鬭毆保辜限期宮內忿爭宗室覺羅以上親被毆毆制使及本管長官佐職統屬毆長官上司官與統屬官相毆九品以上官毆長官拒毆追攝人毆受業師威力制縛人良賤相毆奴婢毆家長妻妾毆夫同姓親屬相毆毆大功以下尊長毆期親尊長毆祖父母父母妻妾與夫親屬相毆毆妻前夫之子妻妾毆故夫父母父祖被毆罵詈計八條罵人罵制使及本管長官佐職統屬罵長官奴婢罵家長罵尊長罵祖父母父母妻妾罵夫期親尊長妻妾罵故夫父母訴訟計一十二條越訴投匿名文書告人罪告狀不受理聽訟回避誣告干名犯義子孫違犯教令見禁囚不得告舉他事教唆詞訟軍民約會詞訟官吏詞訟家人訴誣告充軍及遷徙受贓計一十一條官吏受財坐贓致罪事後受財官吏聽許財物有事以財請求在官求索借貸人財物家人求索風憲官吏犯贓因公科斂尅留盜贓私受公侯財物詐偽計一十一條詐為制書詐傳詔旨對制上書詐不以實偽造印信時憲書等私鑄銅錢詐假官詐稱內使等官近侍詐稱私行詐為瑞應詐病死傷避事詐教誘人犯法犯姦計一十條犯姦縱容妻妾犯姦親屬相姦誣執翁姦奴及雇工人姦家長妻姦部民妻女居喪及僧道犯姦良賤相姦官吏宿娼買良為娼雜犯計一十一條拆毁申明亭夫匠軍士病給醫藥賭博閹割火者囑託公事私和公事失火放火故燒人房屋搬做雜劇違令不應為捕亡計八條應捕人追捕罪人罪人拒捕獄囚脫監及反獄在逃徒流人逃稽留囚徒主守不覺失囚知情藏匿罪人盜賊捕限斷獄計二十九條囚應禁而不禁故禁故勘平人淹禁陵虐罪囚與囚金刃解脫主守教囚反異獄囚衣糧功臣應禁親人入視死囚令人自殺老幼不拷訊鞫獄停囚待對依告狀鞫獄原告人事畢不放回獄囚誣指平人官司出入人罪辨明寃枉有司決囚等第檢驗尸傷不以實決罰不如法長官使人有犯斷罪引律令獄囚取服辨赦前斷罪不當聞有恩赦而故犯徒囚不應役婦人犯罪死囚覆奏待報斷罪不當吏典代寫招草工律目録共一十三條附例二十八條營造計九條擅造作虛費工力採取不堪用造作不如法冒破物料帶造段匹織造違禁龍鳳文段匹造作過限修理倉庫有司官吏不住公廨河防計四條盜決河防失時不修隄防侵占街道修理橋梁道路以上通計四百三十六條附例共計一千四百五十六條大清律例卷一
