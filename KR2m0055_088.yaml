  text: 欽定四庫全書大清律例卷三十六
  hash: sha256:17bc3023492a819978dfb5a3517b56e3dd71921d1b5ba958fda2ec9a96311afb
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0055_WYG_088-1a, image: WYG0673/WYG0673-0121c.png}
body:
  text: 刑律斷獄上囚應禁而不禁凡鞫獄官於獄囚應禁而不收禁徒犯以上婦人犯姦收禁官犯公私罪軍民輕罪老幼廢疾散禁應鎖杻而不用鎖杻及囚本有鎖杻而為脫去者各隨囚重輕論之若囚該杖罪當該官司笞三十徒罪笞四十流罪笞五十死罪杖六十若應杻而鎖應鎖而杻者各減不鎖杻罪一等若囚自脫去鎖杻及司獄官典獄卒私與囚脫去鎖杻者罪亦如鞫獄官脫去之罪提牢官知自脫與脫之情而不舉者與官典獄卒同罪不知者不坐其鞫獄官於囚之不應禁而禁及不應鎖杻而鎖杻者倚法虐民各杖六十若鞫獄司獄提牢官典獄卒受財而故為操縱輕重者並計贓以枉法從重論有祿人八十兩律絞條例一凡枷號人犯除例有正條及催徵稅糧用小枷枷號朝枷夜放外敢有將輕罪人犯用大枷枷號及用連根帶鬚竹板傷人者交部議處因而致死者問發為民枷犯滿目責放不許先責後枷遇患病即行保釋醫治痊日補枷若先責後枷遇患病不即行保釋醫治以致斃命者交部嚴加議處督撫不行察參或經科道紏參督撫司道一併議處一侵欺錢糧數至一百兩以上那移錢糧數至五千兩以上者令該管官嚴行鎖禁監追其侵欺在一百兩以下那移不及五千兩者散禁官房嚴加看守勒限一年催比如逾限不完即鎖禁監追若應行監禁之犯不行監追及失於防範以致自盡者將該管之州縣官均照溺職例革職其該管之上司官或徇隱或失察交部分别議處一遞回原籍人犯如係奉特旨及犯徒罪以上援免解交地方官管束之犯經過州縣仍照例收監其犯笞杖等輕罪遞回安插者承審衙門於遞解票內注明不應收監字樣前途接遞州縣即差役押交坊店歇宿仍取具收管毋得濫行監禁至遞解人犯有應行責懲者亦於文移內聲明令原籍地方官折責毋得先責後解違者交部分别議處一解審軍流以上人犯令各州縣酌量地方情形如有相距在五十里以外不及收監者先期撥役前往於寄宿處所傳齊地保人等知會汛兵支更巡邏往回一體辦理倘有疏虞地保營汛俱照原解兵役治罪地方官從重議處一山海關外往來解送人犯住居歇店該店主即通知該屯領催鄉約按户派夫幫同押解兵丁看守支更如有疏脫即將押解官兵更夫領催鄉約等一併送交盛京刑部審訊分别治罪一直省並無監獄地方該管官遇有解犯到境即行接收多撥兵役於店房內嚴加看守毋致疏虞如有藉詞推諉不收人犯僅令原解兵役看守致犯脫逃者該督撫即行嚴參交部從重議處一各扎薩克蒙古徒罪以上人犯一面報部一面委員解送應監禁之地方官監禁故禁故勘平人凡官吏懷挾私讐故禁平人者杖八十平人係平空無事與公事毫不相干亦無名字在官者與下文公事干連之平人不同因而致死者絞監候提牢官及司獄官典獄卒知而不舉首者與同罪至死者減一等不知者不坐若因該問公事干連平人在官本無招罪而不行保管誤禁致死者杖八十如所干連事方訊鞫有文案應禁者雖致死勿論若官吏懷挾私讐故勘平人者雖無傷杖八十折傷以上依凡鬭傷論因而致死者斬監候同僚官及獄卒知情而與之共勘者與同罪至死者減一等不知情而共勘及雖共勘而但依法拷訊者雖致死傷不坐若因公事干連平人在官事須鞫問及正犯罪人贓仗證佐明白而干連之人獨為之相助匿非不服招承明立文案依法拷訊邂逅致死者勿論條例一強竊盜人命及情罪重大案件正犯及干連有罪人犯或證據已明再三詳究不吐實情或先已招認明白後竟改供者準夾訊外其别項小事概不許濫用夾棍若將案內不應夾訊之人濫用夾棍及雖係應夾之人因夾致死並恣意疊夾致死者將問刑官題參治罪若有别項情弊從重論一內而法司外而督撫按察使正印官許酌用夾棍外其餘大小衙門概不許擅用若堂官發司審理事件呈請批準方許刑審若不呈請而擅用夾棍桚指掌嘴等刑及佐二並武辨衙門擅設夾棍桚指等刑具者督撫題參交部議處正印官亦照失察例處分一凡內外大小問刑衙門設有監獄除監禁重犯外其餘干連並一應輕罪人犯即令地保保候審理如有不肖官員擅設倉鋪所店等名私禁輕罪人犯及致淹斃者該督撫即行指參照律擬斷一凡用刑衙門凡一切刑具不照題定式樣造用致有一二三號不等者用刑官照酷刑例治罪上司各官不即題參照徇庇例治罪一承審官吏凡遇一切命案盜案將平空無事並無名字在官之人懷挾私讐故行勘訊致死者照律擬罪外倘事實無干或因其人家道殷實勒詐不遂暗行賄囑罪人誣扳刑訊致死者亦照懷挾私讐故勘平人致死律擬斬監候如有將干連人犯不應拷訊誤藝已見刑訊致斃者依決人不如法因而致死律杖一百其有將干連人犯不應拷訊任意疊夾致斃者照非法毆打致死律杖一百徒三年如有將徒流人犯拷訊致斃二命者照決人不如法加一等杖六十徒一年三命以上遞加一等罪止杖一百徒三年其有將笞杖人犯致斃二命者照非法毆打致死律加一等杖一百流二千里致斃三命以上者遞加一等罪止杖一百流三千里若因公事干連人犯依法拷訊邂逅致死或受刑之後因他病而死者均照邂逅致死律勿論如有姦徒挾讐誣告平人官吏知情受其囑託因而拷訊致死者本犯依誣告律擬抵官吏照為從律滿流如有誣告平人官吏不知情依法拷訊致死者將誣告之人擬抵官吏交部議處若被誣之人不肯詔承因而疊夾致斃照非法毆打致死律定擬均不得刪改律文內懷挾私讐字樣混引故勘平人概擬重辟在外不按實具題在內含糊照覆照官司出入人罪律分别治罪一直省州縣有曾經夾訊人犯招解時務將夾訊過緣由於招册內詳細聲明佐二奉上司批發審理事件有應夾訊者詳明上司改委印官審理係印官批發者呈明印官掣回自行審理如有違例用刑者督撫題參交部嚴加議處一凡州縣自理之案不得擅用夾訊其申報事件將夾訊幾次或案內未曾夾訊之處據實聲明該管上司於解審時詳加察驗如有朦朧隱匿等弊即行題參淹禁凡獄囚情犯已完在內經法司在外經督撫審録無寃别無追勘未盡事理其所犯笞杖徒流死罪應斷決者限三日內斷決係徒流應起發者限一十日內起發若限外不斷決不起發者當該官吏過三日笞二十每三日加一等罪止杖六十因過限不斷決不起發而淹禁致死者若囚該死罪杖六十流罪杖八十徒罪杖一百杖罪以下杖六十徒一年惟重囚照例監候條例一凡恩詔頒到赦欵內除已經刑部法司覆核明白應免罪囚逐一詳查登時釋放另行題明外如有情罪可疑者限赦到一月內即彚疏奏請其未經法司核覆明白者俟法司核覆文到之日即時釋放毋得耽延時日如赦到奏請違限及將應免輕罪人犯並無辜之人仍濫行監禁者交該部議處一各省審結叛案凡有應解部流徙入官人口家産俱立限兩箇月自該省起解解送人役仍定行程限期違者題參一凡監候待質人犯除強盜案件不應寬釋外如人命等案有正犯未獲將牽連餘犯監候待質已過三年者取具的保釋放在外俟緝獲正犯之日再行質審倘釋放後私自逃匿保人重懲本犯獲日從重治罪陵虐罪囚凡獄卒縱肆非理在禁陵虐毆傷罪囚者依凡鬬傷論驗傷輕重定罪剋減官給罪囚之衣糧者計剋減之物為贓以監守自盜論因毆傷剋減而致死者不論囚罪應死不應死並絞監候司獄官典及提牢官知而不舉者與同罪至死者減一等有不知坐以不應條例一在內法司問發程遞人犯在外問刑衙門程遞來京及遞解别省人犯除原有杻鐐照舊外其押解人役若擅加杻鐐非法亂打摉檢財物剝脫衣服逼致死傷及受財故縱并聽憑狡猾之徒買求殺害者除實犯死罪外徒罪以上屬軍衛者發近邉充軍屬有司者發邉外為民一除強盜十惡謀故殺重犯用鐵鎖杻鐐各三道其餘鬭毆人命等案罪犯以及軍流徒罪等犯止用鐵鎖杻鐐各一道笞杖等犯止用鐵鎖一道如獄官禁卒將輕罪濫用重鎖重罪私用輕鎖及應三道而用九道應九道而用三道將獄官題參禁卒革役受賄者照枉法從重論任意輕重者照不應鎖杻而鎖杻律治罪提牢官失於覺察交部議處一凡部發遞解及外省解部並解别省軍流徒罪發回安插人犯僉差官員務選有家業正役解送如解役在途教唆人犯通同搶奪者俱照白晝搶奪律例治罪中途患病者原解即報明所在官司親身驗明出具印結即著該地方官留養醫治隨行親屬病者亦準存留候病痊起解仍將患病日期報部如不行留養致有病故及受財囑託揑病遲延者將該地方官交部議處其取結後犯人身死者官役免議若未取病結在途身死者僉差官員交該部照例按名議處一名解役杖六十徒一年每一名加一等罪止杖一百徒三年一凡官員擅取病呈致死監犯者依謀殺人造意律斬監候獄官禁卒人等聽從指使下手者依從而加功律絞監候未曾下手者依不加功律杖一百流三千里一凡問刑衙門不許於獄內用匣牀違者官革職杖一百流三千里禁卒杖一百革役一凡押解兵役驛夫人等敢於中途姦汚犯人妻女者依姦囚婦律杖一百徒三年押解官雖不知情亦交該部嚴加議處如押解官自犯姦汚及陵虐勒財者交該部從重議罪其被害犯人係流徙寧古塔等處者許赴盛京户部控告係解京及解各省者許赴刑部並所在官司控告一凡獄卒有受罪人讐家賄囑謀死本犯者依謀殺人首從律治罪一凡犯人出監之日提牢官司獄細加查問如有禁卒人等陵虐需索者計贓治罪仍追贓給還犯人提牢官司獄不行查問事發之日亦照失察例議處一徒罪以下人犯患病者獄官報明承審官即行赴監驗看是實行令該佐領驍騎校地方官取具的保保出調治俟病痊即送監審結其外解人犯無人保出者令其散處外監加意調治如獄官不即呈報及承審官不即驗看保釋者俱照淹禁律治罪若本犯無病而串通獄官醫生揑稱有病者該犯併獄官醫生俱照詐病避事律治罪或病已痊愈而該佐領驍騎校地方官不即送監審結者將本犯及該佐領驍騎校地方官亦俱照詐病避事律治罪若保出故縱者將保人治以本犯應得之罪疏脫者減二等仍將取保不的之該佐領驍騎校該地方官題參議處若有受賄情弊計贓以枉法從重論至督撫題報監斃人犯將本犯所犯罪名所患病症及有無陵虐曾否保釋逐一聲明如有朦朧情弊查出交部分别議處一番役將盜犯及死罪人犯私拷取供者枷號一箇月杖一百將軍流以下等犯私拷取供者各遞加一等治罪如有逼索銀錢計贓以枉法從重論該犯有誣指揑誑情弊照誣告律治罪該管官失察故縱交部分别議處一凡內外斬絞監候之犯每遇秋審時責令獄官監看剃髮一次軍流人犯每季剃髮一次仍令留頂心一片一秋審解省人犯俟審畢發回後方許剃髮與囚金刃解脫凡獄卒以金刃及他物如毒藥之類凡可以使人自殺及解脫鎖杻之具而與囚者杖一百因而致囚在逃及於獄中自傷或傷人者並杖六十徒一年若致囚獄中自殺者杖八十徒二年致囚反獄而逃及在獄殺人者絞監候其囚脫越反獄在逃獄卒於未斷罪之間能自捕得及他人捕得若囚已死及自首者各減一等若常人非獄卒以可解脫之物與囚人及子孫與在獄之祖父母父母奴婢雇工人與在獄之家長者各減獄卒一等若司獄官典及提牢官知而不舉者與同罪至死者減一等若獄卒常人及提牢司獄官典受財者計贓以枉法從重論贓重論贓贓輕論本罪若獄囚失於檢點防範致囚自盡原非縱與可殺之具者獄卒杖六十司獄官典各笞五十提牢官笞四十主守教囚反異反訓翻凡司獄官典獄卒教令罪囚反異成案變亂已經勘定之事情及與通傳言語於外人以致罪人扶同有所增入他人減去自已之罪者以故出入入罪論外人犯教令通傳有所增減者減主守一等若獄官典卒容縱外人入獄及與囚傳通言語走泄事情於囚罪無增減者笞五十若獄官典卒外人受財者並計入已贓以枉法從重論條例一刑部乃總理刑名之地如有間雜人等擅自出入及跟隨聽審人犯私入衙門窺探者本犯及守門領催兵皂俱責治於刑部門首枷號官員犯者交該部議處一凡書辦皂隸及官員家僕人等有擅自出入監所者令提牢官司獄禁卒立拏回堂將書隸革役責四十板遞回原籍家人枷號一箇月責四十板家人之主交部議處若不行拘拿被查出者提牢官司獄俱以失察例議處一步軍統領酌量派出番役在刑部衙門外左近密行訪拏若有探聽之徒照私入刑部衙門例枷號一箇月責三十板係官交部議處如有受賄通信教供情弊察實將書役並行賄之人均計贓從重治罪獄囚衣糧凡獄囚無家屬者應請給衣糧有疾病者應請給醫藥而不請給患病重者除死罪不開鎖杻外其餘應脫去鎖杻而不請脫去犯笞罪者應保管出外而不請保管及疾至危篤者應聽家人入視而不請聽以上雖非司獄官典獄卒所主是不申請上司司獄官典獄卒笞五十因而致死者若囚該死罪杖六十流罪杖八十徒罪杖一百杖罪以下杖六十徒一年提牢官知而不舉者與獄官典卒同罪若司獄官已申稟上司而上司官吏不即施行者一日笞一十每一日加一等罪止笞四十因而致死者若囚該死罪杖六十流罪杖八十徒罪杖一百杖罪以下杖六十徒一年條例一凡解部及遞解外省各項犯人有司官照支給囚糧之例按程給與口糧如遇隆冬停遣照重囚例每名給與衣帽倘有官侵吏蝕照冒銷錢糧律治罪一凡司獄吏目典史專管囚禁如犯人果有寃濫許管獄官據實申明如府州縣不準許即直申憲司各衙門提訊一凡牢獄禁繫囚徒年七十以上十五以下廢疾散收輕重不許混雜鎖杻常須洗滌席薦常須鋪置冬設暖牀夏備涼漿凡在禁囚犯日給倉米一升冬給絮衣一件夜給燈油病給醫藥並令於本處有司在官錢糧內支放獄官預期申明關給毋致缺誤有官者犯私罪除死罪外徒流鎖收杖以下散禁公罪自流以下皆散收一內外刑獄醫治罪囚各選用醫生二名每遇年底稽考優劣如醫治痊愈者多照例俟六年已滿在內咨授吏目在外咨授典科訓科不能醫治病死多者即責革更換一在監人犯許令祖父母父母伯叔兄弟妻妾子孫一月兩次入視使役之人不越兩名若有送飲食者提牢官驗明禁子轉送其盜犯妻子家口不許放入監門探視違者妻子家口枷號兩個月責四十板不準收贖提牢司獄官吏參處一刑部赴倉支領囚糧每石給腳價銀五分倘獄卒人等私行扣剋照例嚴加治罪獄官通同作弊一體治罪其失察之提牢官交部議處一刑部南北兩監板棚不許禁卒人等私相租賃如有受賄頂租等弊將獄卒人等從重治罪一五城司坊羈禁人犯及刑部等衙門發交各司坊枷號及看守牽連待質等犯果係赤貧並無家屬送飯者每人每日給老米一升按季造報户部核銷一斬絞重犯及軍流遣犯在監及解審發配俱著赭衣功臣應禁親人入視凡功臣及五品以上文武官犯罪應禁者許令服屬親人入視犯徒流應發配者並聽親人隨行若在禁及徒流已至配所或中途病死者在京原問官在外隨處官司開具在禁在配在途致死緣由差人引領其入視隨行之親人詣闕奏請發放違者杖六十死囚令人自殺凡死罪囚已招服罪而囚畏懼刑戮使令親戚故舊自殺或令親故雇倩他人殺之者親故及雇倩下手之人各依親屬凡人鬭毆本殺罪減二等若囚雖已招服罪不曾令親故自殺及雖曾令親故自殺而未招服罪其親故輒自殺訖或雇倩人殺之者不令自殺已有幸生之心未招服罪或無可殺之罪親故及下手之人各以親屬凡人鬭殺傷論不減等若死囚雖已招服罪而囚之子孫為祖父母父母及奴婢雇工人為家長聽令自下手或令雇倩他人殺之者皆斬監候雇倩之人仍依本殺罪減二等老幼不拷訊凡應八議之人禮所當優及年七十以上老所當恤十五以下幼所當慈若廢疾􅔂所當矜者如有犯罪官司並不合用刑拷訊皆據衆證定罪違者以故失入人罪論故入抵全罪失入減三等其於律得相容隱之人以其情親有所諱及年八十以上十歲以下若篤疾以其免罪有所恃皆不得令其為證違者笞五十皆以吏為首遞減科罪條例一凡年七十以上十五以下及廢疾犯流罪以下者準其收贖一次詳記檔案若收贖之後復行犯罪除因人連纍過誤入罪者仍準其照例收贖外如係有心再犯即各照應得罪名按律充配不準再行收贖鞫獄停囚待對凡鞫獄官推問當處罪囚有同起內犯罪人伴見在他處官司當處停囚專待其人對問者雖彼此職分不相統攝皆聽直行文書勾取他處官司於文書到後限三日內即將所勾待問人犯發遣違限不發者一日笞二十每一日加一等罪止杖六十當處鞫獄者無以其不發而中止仍行移他處本管上司問違限之罪督令將所取犯人解發若起內應合對問同伴罪囚已在他處州縣事發見問者是彼此俱屬應鞫聽輕囚移就重囚若囚罪相等者聽少囚從多囚若囚數相等者以後發之囚送先發官司併問若兩縣相去三百里之外者往返移就恐致疏虞各從事發處歸斷移文知會如違輕不就重少不從多後不送先逺不各斷者笞五十若違法反將重囚移就輕囚多囚移就少囚者當處官司隨即收問不得互相推避仍申逹彼處所管上司究問所屬違法移囚笞五十之罪若當處官司囚到不受者一日笞二十每一日加一等罪止杖六十條例一凡校尉等有犯應提拏者移咨鑾儀衛提拏不得差拘一凡在京衙門承審事件限一箇月審結被證在外者以到齊日為始催文至三次無回文者題參一凡欽部等事件直省督撫俱以文到日為始限四箇月具題總督轄兩省者隔省事件六箇月具題陜西總督所屬甘肅兩廣督撫所屬瓊州亦照隔省例限六箇月福建臺灣府限十箇月其湖廣衡州等府所屬有苗民二十六州縣及乾州平溪等衛距省窵逺凡命盜案件俱於定限外各展限兩箇月一督撫新任及署理印務如欽部等事件原限內難於完結準分别展限原限四箇月展兩月原限六箇月展三月遇公事出境一切事件準題請展限若監臨科場準按日扣限隔省提人準到日扣限一刑部行文八旗內務府五城順天府提人限文到三日內即行查送過部或人犯有他故不到即將情由報明如違將該管官參處倘人犯已至而胥役勒索不行放入經司務廳查出照例嚴加治罪如徇隱不究察出或被首告將該司務一併參處一刑部現審事件應會三法司者仍照定例限一箇月完結杖責等罪限十日完結發遣軍流等罪限二十日完結案內有應行提質及患病之犯以提到及病愈之日為始仍將應行扣限及三法司會審日期並於科道衙門注銷內聲明倘該司員任意因循或三法司不即會審以致逾限書役得以乘機作弊者嚴加治罪其承審司員及會審遲延之堂司官並交部分别議處一鄰境關提人犯照各省關查口供之例展限兩箇月倘逾限不發照例參處一凡參審之案督撫於具題後即行提人犯要證赴省其無關緊要之證佐及被害人等止令州縣録供保候俟奉旨到日率同在省司道審理其有應行委員查辦之處亦即就近酌委以奉旨文到之日扣限起舊限四個月者限兩個月具題總督隔省舊限六個月者限四個月具題如果案情繁重實有不能依限完結者督撫據實先期奏明請旨展限如在舊限四個月六個月內完結者寬其議處若逾舊限不結照例查參議處一盜犯已獲祗須關取隔省人證等口供定案無犯可審者均照欽部事件例州縣分限兩個月府司督撫共限兩個月統扣四個月完結不得照承審盜案全限例扣展遇有遲延照例參處一各省軍流等犯臬司審解之日將人犯暫停發回聽候督撫查核如有應行覆訊者即行提訊其或情罪本輕供證明確毫無疑竇者亦不必概行解送致滋稽延拖纍依告狀鞫獄凡鞫獄須依原告人所告本狀推問若於本狀外别求他事托拾被告人罪者以故入人罪論或以全罪科或以增輕作重科同僚不署文案者不坐若因其所告本狀事情或法應掩捕摉檢因掩捕而檢得被犯别罪事合推理者非狀外托拾者比不在此故入同論之限條例一凡鞫獄止將狀內有名人犯審擬如光棍案件夥黨人多仍行嚴拏究審無干牽連者即行釋放原告人事畢不放回凡告詞訟對問得實被告已招服罪原告人别無待對事理鞫獄官司當隨即放回若無待對事故稽留三日不放者笞二十每三日加一等罪止笞四十條例一督撫應題案件有牽連人犯情罪稍輕者準取的保俟具題發落其重案內有挾讐扳害者承問官申解督撫詳審果係誣枉即行釋放不得令候結案若承問官審係無辜牽連者不必解審即行釋放止録原供申報一凡內外題奏案件內有擬以杖笞人犯審結日即先行責釋仍於題奏之日聲明獄囚誣指平人凡囚在禁誣指平人者以誣告人加三等論其本犯罪重於加誣之罪者從原重者論若本囚無誣指平人之意官吏鞫問獄囚非法拷訊故行教令誣指平人者以故入人全罪論若官司追徵逋欠錢糧逼令欠户誣指平人代納者計所枉徵財物坐贓論罪止杖一百徒三年以贓不入已也其物給代納本主其被囚誣指之平人無故稽留三日不放回者笞二十每三日加一等罪止杖六十若官司鞫囚而證佐之人有所偏徇不言實情故行誣證及化外人有罪通事傳譯番語有所偏私不以實對致斷罪有出入者證佐人減罪人罪二等證佐不説實情出脫犯人全罪者減犯人全罪二等若增減其罪者亦減犯人所得增減之罪二等之類通事與同罪謂化外人本有罪通事扶同傳説出脫全罪者通事與犯人同得全罪若將化外人罪名增減傳説者以所增減之罪坐通事謂如化外人本招承杖六十通事傳譯增作杖一百即坐通事杖四十乂如化外人本招承杖一百通事傳譯減作笞五十即坐通事笞五十之類大清律例卷三十六
