body:
  text: 武英殿監理和碩和親王臣𢎞晝總裁官臣徐本臣三泰臣史貽直臣來保臣慶復太子少保吏部尚書今任湖廣總督臣孫嘉淦太子少保刑部尚書今任川陜總督臣尹繼善議政大臣刑部尚書今任閩浙總督世襲雲騎尉臣那蘇圖原任經筵講官吏部尚書臣楊超曾原任工部尚書降三級調用臣趙殿最提調官刑部主事臣德昌刑部郎中陞任陜西糧驛道臣孫陳典盛京户部郎中臣何瞻吏部稽勳司員外郎臣戴章甫原任刑部員外郎臣永竒原任翰林院編修臣查祥纂修官刑部貴州司郎中臣唐紹祖原任刑部督捕司郎中臣周琬原任刑部員外郎臣阿林泰原任巴溝理事通判臣兆珠納盛京禮部郎中臣岳泰盛京户部員外郎臣趙之埰盛京工部員外郎臣納海原任刑部員外郎兼佐領臣殷珠原任兵部主事臣常鼐刑部四川司主事臣王洛刑部督捕司主事臣吳紹詩原任河南郾城縣知縣臣包洪基收掌官刑部筆帖式臣岳寧刑部筆帖式臣富尼漢刑部筆帖式陞任熊岳理事通判臣德禄刑部筆帖式陞任通州理事通判臣伊蘭泰九品筆帖式臣馬寧安吏部筆帖式臣雅哈理繙譯官候補筆帖式臣明悳臣成善臣法寶臣德馨臣豐阿泰臣寧古禮臣豐盛阿臣九哥貼寫中書臣噶紳盛京助教臣專圖七品筆帖式臣常雲滿謄録官候補筆帖式臣福爾泰臣馬受福臣德克進臣克星額臣明善臣坤祿臣滿普臣馬進泰臣赫楞額臣德雲臣安元臣愛隆阿臣扎祿順臣新成臣速成臣發福利臣機蘭泰臣祿昌臣九十臣永悳臣喀米圖户部繕本筆帖式臣明德貼寫中書臣永泰漢謄錄官候選知縣臣張巽候選教諭臣張洪浚候選縣丞臣吳溶臣陳鋗候選吏目臣孟毓蕃臣盧士琛貢生臣嵇耀增監生臣舒繼英生員臣張為柱臣李承績臣張克濟監生臣潘溶臣沈奐文臣顧宗預武英殿監造内務府南苑郎中兼佐領加五級紀録十次臣雅爾岱内務府錢糧衙門郎中兼佐領加五級紀録十一次臣永保内務府慎刑司員外郎紀錄一次臣永忠同知加一級紀録九次臣英廉内務府廣儲司司庫加二級臣三格監造加一級臣李保監造臣鄭桑格庫掌臣李延偉臣虎什泰
