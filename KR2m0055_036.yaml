body:
  text: 戸律婚姻男女婚姻凡男女定婚之初若或有殘廢或疾病老幼庶出過房同宗乞養異姓者務要兩家眀白通知各從所願不願即止願者同媒妁寫立婚書依禮聘嫁若許嫁女已報婚書及有私約謂先已知夫身殘疾老幼庶養之類而輒悔者女家主婚人笞五十其女歸本夫雖無婚書但曽受聘財者亦是若再許他人未成婚者女家主婚人杖七十已成婚者杖八十後定娶者男家知情主婚人與女家同罪財禮入官不知者不坐追還財禮給後定娶之人女歸前夫前夫不願者追財禮給還其女仍從後夫男家悔而再聘者罪亦如之仍令娶前女後聘聴其别嫁不追財禮其未成婚男女有犯姦盜者男子有犯聴女别嫁女子有犯聴男别娶不用此律若為婚而女家妄冒者主婚人杖八十謂如女有殘疾却令姊妹妄冒相見後却以殘疾女成婚之類追還財禮男家妄冒者加一等謂如與親男定婚却與義男成婚又如男有殘疾却令弟兄妄冒相見後却以殘疾男成婚之類不追財禮未成婚者仍以原定所妄冒相見之無疾兄弟姊妹及親生之子為婚如妄冒相見男女先已聘許他人或已經配有室家者不在仍依原定之限已成婚者離異其應為婚者雖已納聘財期約未至而男家强娶及期約已至而女家故違期者男女主婚人並笞五十若卑幼或仕宦或買賣在外其祖父母父母及伯叔父母姑兄姊自卑幼出外之後為婚而卑幼不知自娶妻已成婚者仍舊為婚尊長所定之女聴其别嫁未成婚者從尊長所定自定者從其别嫁違者杖八十仍改正條例一嫁娶皆由祖父母父母主婚祖父母父母俱無者從餘親主婚其夫亡攜女適人者其女從母主婚若已定婚未及成親而男女或有身故者不追財禮一男女婚姻各有其時或有指腹割衫襟為親者並行禁止一招壻須憑媒妁眀立婚書開寫養老或出舍年限止有一子者不許出贅其招壻養老者仍立同宗應繼者一人承奉祭祀家產均分如未立繼身死從族長依例議立一凡女家悔盟另許男家不告官司强搶者照强娶律減二等其告官斷歸前夫而女家與後夫奪回者照搶奪律杖一百徒三年典雇妻女凡將妻妾受財立約出典驗日暫雇與人為妻妾者本夫杖八十典雇女者父杖六十婦女不坐若將妻妾妄作姊妹嫁人者杖一百妻妾杖八十知而典娶者各與同罪並離異女給親妻妾歸宗財禮入官不知者不坐追還財禮仍離異條例一將妻妾作姊妹及將親女并姊妹嫁賣與人作妻妾使女名色騙財之後設詞託故公然領去或瞰起程中途聚衆行兇邀搶人財者除實犯死罪外其餘屬軍衛者發近邉充軍屬有司者發邉外為民媒人知情罪同妻妾失序凡以妻為妾者杖一百妻在以妾為妻者杖九十並改正若有妻更娶妻者亦杖九十後娶之妻離異歸宗逐壻嫁女凡逐已入贅之壻嫁女或再招壻者杖一百其女不坐如招贅之女通同父母逐壻改嫁者亦坐杖一百後婚男家知而娶或後贅者同罪未成婚者各減五等財禮入官不知者亦不坐其女斷付前夫出居完聚居喪嫁娶凡男女居父母及妻妾居夫喪而身自主婚嫁娶者杖一百若男子居父母喪而娶妾妻居夫喪女居父母喪而嫁人為妾者各減二等若命婦夫亡雖滿服再嫁者罪亦如之亦如凡婦居喪嫁人者懝斷追奪勅誥並離異知係居喪及命婦而共為婚姻者主婚人各減五等財禮入官不知者不坐仍離異追財禮若居祖父母伯叔父母姑兄姊喪除承重孫外而嫁娶者杖八十不離異妾不坐若居父母舅姑及夫喪而與應嫁娶人主婚者杖八十其夫喪服滿妻妾果願守志而女之祖父母父母及夫家之祖父母父母强嫁之者杖八十期親加一等大功以下又加一等婦人及娶者俱不坐未成婚者追歸前夫之家聴從守志追還財禮巳成婚者給與完聚財禮入官條例一孀婦自願改嫁翁姑人等主婚受財而母家統衆强搶者杖八十其孀婦自願守志而母家夫家搶奪强嫁者各按服制照律加三等治罪其娶主不知情不坐知情同搶照强娶律加三等未成婚婦女聴回守志已成婚而婦女不願合者聴如孀婦不甘失節因而自盡者照威逼例充發其有因搶奪而取去財物及殺傷人者各照本律從重論父母囚禁嫁娶凡祖父母父母犯死罪被囚禁而子孫自嫁娶者杖八十若男娶妾女嫁人為妾者減二等其奉囚禁祖父母父母命而嫁女娶妻者不坐亦不得筵宴違者依父母囚禁筵宴律杖八十同姓為婚為婚兼妻妾言禮不娶同姓所以厚别也凡同姓為婚者主婚與男女各杖六十離異婦女歸宗財禮入官尊卑為婚凡外姻有服或尊屬或卑幼共為婚姻及娶同母異父姊妹若妻前夫之女者各以親屬相姦論其父母之姑舅兩姨姊妹及姨若堂姨母之姑堂姑已之堂姨及再從姨已之堂外甥女若女壻之姊妹及子孫婦之姊妹雖無服並不得為婚姻違者男女各杖一百若娶已之姑舅兩姨姊妹者雖無尊卑之分尚有緦麻之服杖八十並離異婦女歸宗財禮入官條例一男女親屬尊卑相犯重情或于有律應離異之人俱照親屬已定名分各從本律科斷不得妄生異議致罪有出入其間情犯稍有可疑揆於法制似為太重或於大分不甚有礙者聴各該原問衙門臨時勘酌擬奏一前夫子女與後夫子女茍合成婚者以娶同母異父姊妹律科斷一外姻親屬為婚除尊卑相犯者仍照例臨時勘酌擬奏外其姑舅兩姨姊妹聴從民便娶親屬妻妾凡娶同宗無服姑姪姊妹之親及無服親之妻者男女各杖一百若娶同宗緦麻親之妻及舅甥妻各杖六十徒一年小功以上之妻各以姦論自徒三年至絞斬其親之妻曽被出及已改嫁而娶為妻妾者無服之親不與各杖八十若收父祖妾及伯叔母者不問被出改嫁各斬若兄亡收兄嫂弟亡收弟婦者不問被出改嫁俱坐各絞妾父祖妾不與各減妻二等被出改嫁者遞減之若原係妻而娶為妾當從妻論原係妾而娶為妻仍從妾減科若娶同宗緦麻以上姑姪姊妹者亦各以姦論除應死外並離異娶部民婦女為妻妾凡府州縣親民官任内娶部民婦女為妻妾者杖八十若監臨内外上司官娶見問為事人妻妾及女為妻妾者杖一百女家主婚人並同罪妻妾仍兩離之女給親兩離者不許給與後娶者亦不給還前夫令歸宗其女以父母為親當歸宗或已有夫又以夫為親當給夫完聚財禮入官恃勢强娶者各加二等女家不坐婦還前夫女給親不追財禮若為子孫弟姪家人娶者或和或强罪亦如之男女不坐若娶為事人婦女而於事有所枉者仍以枉法從重論娶逃走婦女凡娶自已犯罪已發在官而逃走在外之婦女為妻妾知逃走之情者與同其所犯之本罪婦人加逃罪二等其娶者不加罪至死者減一等離異不知者不坐若無夫又㑹赦免罪者不離一有不合仍離强占良家妻女凡豪强勢力之人强奪良家妻女姦占為妻妾者絞監候婦女給親婦歸夫女歸親配與子孫弟姪家人者罪歸所主亦如之所配男女不坐仍離異給親條例一强奪良人妻女賣與他人為妻妾及投獻王府并勲戚勢豪之家者俱擬絞監候一强奪良家妻女中途奪回及尚未姦汚者照巳被姦占律減一等定擬若巳被姦汚而婦女自盡者照强姦已成本婦羞忿自盡例擬斬監候未被姦汚而自盡者照强姦未成本婦羞忿自盡例擬絞監候一强奪良家妻女姦占為從之犯應照為首絞罪減一等杖一百流三千里如被逼誘随行止於幫同扛擡照未成婚減絞罪五等杖七十徒一年半其中途奪回及尚未姦汚為從者審係助勢濟惡減為首流罪一等杖一百徒三年如被逼誘随行止於幫同扛擡各照不應重律杖八十一凡聚衆夥謀搶賣路行婦女仍照定例分别首從問擬外其有並非夥衆及搶奪非路行婦女若踈逺親屬圖財强賣者均照例擬絞奏請倘期功卑幼謀占資財貪圖聘禮將伯叔母姑等尊屬用强搶賣者擬斬監候娶樂人為妻妾凡文武官并吏娶樂人妓者為妻妾者杖六十並離異歸宗不還樂工財禮入官若官員子孫應襲廕者娶者罪亦如之註册候廕襲之日照應襲本職上降一等敘用僧道娶妻凡僧道娶妻妾者杖八十還俗女家主婚人同罪離異財禮入官寺觀住持知情與同罪以因人連累不在還俗之限不知者不坐若僧道假託親屬或僮僕為名求娶而僧道自占者以姦論以僧道犯姦加凡人和姦罪二等論婦女還親財禮入官係强者以强姦論良賤為婚姻凡家長與奴娶良人女為妻者杖八十女家主婚人減一等不知者不坐其奴自娶者罪亦如之家長知情者減二等因而入籍指家長言為婢者杖一百若妄以奴婢為良人而與良人為夫妻者杖九十妄冒由家長坐家長由奴婢坐奴婢各離異改正謂入籍為婢之女改正複良出妻凡妻於七出無應出之條及於夫無義絶之收而擅出之者杖八十雖犯七出無子淫泆不事舅姑多言盜竊妒忌惡疾有三不去與更三年喪前貧賤後富貴有所娶無所歸而出之者減二等追還完聚若犯義絶應離而不離者亦杖八十若夫妻不相和諧而兩願離者不坐情既已離難强其合若夫無願離之情妻輒背夫在逃者杖一百從夫嫁賣其妻因逃而輒自改嫁者絞監候其因夫棄妻逃亡三年之内不告官司而逃去者杖八十擅自改嫁者杖一百妾各減二等有主婚媒人有財禮乃坐無主婚人不成婚禮者以和姦刁姦論其妻妾仍從夫嫁賣若婢背家長在逃者杖八十因而改嫁者杖一百給還家長窩主及知情娶者各與妻妾奴婢同罪至死者減一等財禮入官不知者主娶者言俱不坐財禮給還若由婦女之期親以上尊長主婚改嫁者罪坐主婚妻妾止得在逃之罪餘親主婚者餘親謂期親卑幼及大功以下尊長卑幼主婚改嫁者事由主婚主婚為首男女為從事由男女男女為首主婚為從至死者主婚人並減一等不論期親以上及餘親係主婚人皆杖一百流三千里條例一妻犯七出之状有三不去之理不得輒絶犯姦者不在此限一期約已至五年無過不娶及夫逃亡三年不還者並聴經官告給執照别行改嫁亦不追財禮嫁娶違律主婚媒人罪凡嫁娶違律若由男女之祖父母父母伯叔父母姑兄姊及外祖父母主婚者違律之罪獨坐主婚男女不坐餘親主婚者餘親謂期親卑幼及大功以下尊長卑幼主婚者事由主婚主婚為首男女為從得減一等事由男女男女為首主婚為從得減一等至死者除事由男女自當依律論死其由主婚人並減一等主婚人雖係為首罪不入於死故並減一等男女巳科從罪至死亦是滿流不得於主婚人流罪上再減其男女被主婚人威逼事不由已若男年二十嵗以下及在室之女雖非威逼亦獨坐主婚男女俱不坐不得以首從科之未成婚者各減已成婚罪五等如絞罪減五等杖七十徒一年半餘類推減若媒人知情者各減男女主婚犯人罪一等不知者不坐其違律為婚各條稱離異改正者雖㑹赦但得免罪猶離異改正離異者婦女並歸宗財禮若娶者知情則不論已未成婚俱追入官不知者則追還主條例一凡紳衿庶民之家如有將婢女不行婚配致令孤寡者照不應重律杖八十係民的决紳衿依律納贖令其擇配一福建臺灣地方民人不得與番人結親違者離異民人照違制律杖一百土官通事減一等各杖九十該地方官如有知情故縱題叅交部議處其從前已娶生有子嗣者即安置本地為民不許徃來番社違者照不應重律杖八十一湖南省所屬未薙髪之苖人與民人結親俱照民俗以禮婚配須憑媒妁寫立婚書仍報眀地方官立案稽查如有姦拐販賣嫁妻逐壻等事悉照民例治罪其商賈客民未經入籍苖疆踪跡無定者概不許與苖民結親如有私相連結滋事者按例治罪失察之地方官照例議處至溪峝深居苖猺有願與民人結親者亦聴其自便悉照前例辦理大清律例卷十
