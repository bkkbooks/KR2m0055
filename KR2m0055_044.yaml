  text: 欽定四庫全書大清律例卷十四
  hash: sha256:7761453b3ccfab16462b14d77e65ecfac5fe5085555cbaa5a3213e6e5ea5e595
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0055_WYG_044-1a, image: WYG0672/WYG0672-0608a.png}
body:
  text: 戸律錢債違禁取利凡私放錢債及典當財物每月取利並不得過三分年月雖多不過一本一利違者笞四十以餘利計贓重於笞四十者坐贓論罪止杖一百若監臨官吏於所部内舉放錢債典當財物者不必多取餘利有犯即杖八十違禁取利以餘利計贓重於杖八十者依不枉法論各主者通算折半科罪有禄人三十兩無禄人四十兩並杖九十每十兩加一等罪止杖一百流三千里並追餘利給主兼庶民官吏言其負欠私債違約不還者五兩以上違三月笞一十每一月加一等罪止笞四十五十兩以上違三月笞二十每一月加一等罪止笞五十百兩以上違三月笞三十毎一月加一等罪止杖六十並追本利給主若豪勢之人於違約負債者不告官司以私債强奪去人孳畜産業者杖八十無多取餘利聽贖不追若估所奪畜産之價過本利者計多餘之物罪有重於杖八十者坐贓論罪止杖一百徒三年依多餘之數追還主若凖折人妻妾子女者杖一百姦占加一等論强奪者加二等杖七十徒一年半因强奪而姦占婦女者絞監侯所凖折强奪之人口給親私債免追條例一凡勢豪舉放私債交通運糧官挾勢擅拏官軍綁打陵辱强將官糧官糧與軍糧不同官糧者漕運赴京上納正糧也軍糧行月二糧也凖還私債者問罪屬軍衛者發近邊充軍屬有司者發邊外為民交通綁打凖糧三項有一末合仍各照律發落該管運糧官叅究治罪一聽選官吏監生人等借債與債主及保人同赴任所取償至五十兩以上借者革職債主及保人各枷號一箇月發落債追入官一凡負欠私債在京不赴法司而赴别衙門在外不赴軍衛有司而越赴巡撫司道官處告理及輒具本狀奏訴者俱問罪依越訴論立案不行若本京别衙門聽從施行者一體叅究私債不追一佐領驍騎校領催等有在本佐領或弟兄佐領下指扣兵丁錢糧放印子銀者係佐領驍騎校照流三千里之例枷號六十日係領催照近邊充軍例枷號七十五日俱鞭一百夥同放印子銀者照為從杖一百徒三年例枷號四十日鞭一百所得利銀勒追入官佐領驍騎校領催等與屬下兵丁保借者革去職役該叅領交部議處至佐領驍騎校叅領等平時失於覺察以致該管兵丁將官錢糧扣還印子銀者俱交部分别議處一民人違禁向八旗兵丁放轉子印子長短錢扣取錢糧及旗人舉放重債勒取兵丁錢糧並非在本佐領下放債者或經告發或被兵丁首出除所欠債目不准給還外將放債之人照訛詐例從重治罪欠債之人毋庸治罪失察之該管文武官俱交部議處八旗佐領每月仍將有無重利放債之人出具印結呈報該叅領按季加結呈報都統查核一八旗領催代屬下兵丁指扣錢糧保借者照夥同放債人枷號四十日鞭一百例發落其指米借債之人照違制律鞭一百仍將失察之該管各官交部分别議處一放債之徒用短票扣折違例巧取重利者嚴拏治罪其銀照例入官受害之人許其自首免罪並免追息一監臨官吏於所部内舉放錢債典當財物者即非禁外多取餘利亦按其所得月息照將自己貨物散與部民多取價利計贓准不枉法論强者准枉法論不枉法各主者折半科罪律減一等問所得利銀照追入官至違禁取利以所得月息全數科算准不枉法論强者准枉法論並將所得利銀追出餘利給主其餘入官費用受寄財産凡受寄他人財物畜産而輒費用者坐贓論以坐贓致罪律減一等罪止杖九十徒二年半詐言死失者准竊盜論減一等罪止杖一百徒三年免刺並追物還主其被水火盜賊費失及畜産病死有顯跡者勿論若受寄財畜而隱匿不認依誆騙律如以産業轉寄他人户下而為所賣失自有詭寄盗賣本條條例一親屬費用受寄財物大功以上及外祖父母得相容隱之親屬追物給主不坐罪小功減三等緦麻減二等無服之親減一等俱追物還主得遺失物凡得遺失之物限五日内送官官物盡數還官私物召人識認於内一半給與得物人充賞一半給還失物人如三十日内無人識認者全給五日限外不送官者官物坐贓論罪止杖一百徒三年追物還官私物減坐贓二等其物一半入官一半給主若無主全入官若於官私地内掘得埋藏無主之物者並聽收用若有古器鐘鼎符印異常之物非民間所宜有者限三十日内送官違者杖八十其物入官大清律例卷十四
