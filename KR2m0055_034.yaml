body:
  text: 戸律田宅欺隱田糧凡欺隱田糧全不報戸入冊脱漏版籍者一應錢糧俱被埋没故計所隱之田一畝至五畝笞四十每五畝加一等罪止杖一百其脱漏之田入官所隱税糧依畝數額數年數總約其數徴納若將版籍上自己田土移坵方圓成坵換叚坵中所分區叚那移起科等則以髙作下減瞞糧額及詭寄田糧詭寄謂詭寄於役過年分並應免人戸册籍影射脱免自已之差役并受寄者罪亦如之如欺隱田糧之類其減額詭寄之田改正坵叚收歸本戸起科當差里長知而不舉與犯人同罪其還鄉復業人民丁力少而舊田多者聽從儘力耕種報官入籍計田納糧當差若多餘占田而荒蕪者三畝至十畝笞三十每十畝加一等罪止杖八十其田入官若丁力多而舊田少者告官於附近荒田内驗力撥付耕種條例一凡宗室置買田産管莊人恃强不納差糧者該管官察實將管莊人等問罪宗室知而縱容者交該衙門察議仍追徴應納差糧若該管官阿縱不舉者聽督撫叅奏重治一將自己田地應納錢糧灑派别戸者按數計贓以枉法論田地入官其灑派錢糧照年分畝數追徵一各處奸頑之徒將田地詭寄他人名下者如受寄之家首告准免罪一各鄉里書飛灑詭寄税糧二百石以上者問邊衞充軍一州縣徴收糧米之時預將各里各甲花戸額數的名填定聨三版串一給納戸執照一發經承銷冊一存州縣查對按戸徴收對冊完納即行截給歸農其未經截給者即係欠戸該印官查摘追比若遇有糧無票有票無糧等情即係胥吏侵蝕嚴比治罪檢踏災傷田糧凡部内有水旱霜雹及蝗蝻為害一應災傷應減免之田糧有司官吏應准告而不即受理申報上司親行檢踏及本管上司不與委官覆踏者各杖八十若初覆檢踏有司承委官吏不行親詣田所及雖詣田所不為用心從實檢踏止憑里長甲首朦朧供報中間以熟作荒以荒作熟增減分數通同作弊瞞官害民者各杖一百罷職役不敘若致枉有所徴免有災傷當免而徴曰枉徴無災傷當徵而免曰枉免糧數計贓重者坐贓論枉有所徵免糧數自奏准後發覺謂之贓故罪重於杖一百並坐贓論里長甲首各與同罪受財官吏里甲受財檢踏開報不實以致枉有徵免者並計贓以枉法從重論其檢踏官吏及里長甲首原未受財止失於關防致使荒熟分數有不實者計不實之田十畝以下免罪十畝以上至二十畝笞二十每二十畝加一等罪止杖八十官吏係公罪俱留職役若人戸將成熟田地移坵換叚冒告災傷者計所冒之田一畝至五畝笞四十每五畝加一等罪止杖一百其冒免之田合納税糧依額數追徴入官條例一天下有司凡遇歲饑先發倉廪賑貸然後具奏請㫖寛恤一凡夏災不出六月底秋災不出九月底先以被災情形題報其被災分數按限勘明續報逾限者交該部議處一州縣詳報被災情形查勘分數遵照題定四十日限期辦理其距省遙逺地方准照交代之例扣算程途日期如逾限照例題叅交部議處一賑濟被災饑民以及蠲免錢糧州縣官有侵蝕肥已等弊致民不沾實惠者照貪官例革職拏問督撫布政司道府等官不行稽察者俱革職一凡有蝗蝻之處文武大小官員率領多人公同及時捕捉務期全淨其雇募人夫每名計日酌給銀數分以為飯食之資許其報明督撫據實銷算果能立時撲滅督撫具題照例議敘如延蔓為害必根䆒蝗蝻起於何地及所到之處該管地方官玩忽從事者交部照例治罪并將該督撫一并議處一凡遇蠲免錢糧之年將所免錢糧分作十分以七分免業戸三分免佃戸雍正十三年十二月内欽奉上諭蠲免之典業戸邀恩者居多彼無業貧民終歲勤動按産輸糧未被國家之恩澤欲照所蠲之數履畝除租䋲以官法則勢有不能其令所在有司善為勸諭各業戸酌量寛減佃戸之租不必限定分數使耕作貧民有餘糧以贍妻子若有素封業戸能善體此意加惠佃戸者則酌量奬賞之其不願者聽之亦不得勉强從事特諭一凡遇歉收之歲貧士與貧民一體賑恤一遇有恩詔豁免錢糧其漕項蘆課學租雜税各項俱入豁免之内地方官違者以違制論入已者以侵盜論一凡有蠲免俱以奉㫖之日為始其奉㫖之後部文未到之前有已輸在官者准作次年正賦永著為令如官吏朦混隱匿即照侵盜錢糧律治罪一凡開墾水田六年旱田十年將届陞科之期該督撫委員復加履畝丈勘果有坍塌冲漲或成磽确者槩免陞科違者以官吏不用心從實檢踏律治罪一直省地方被災十分者蠲免錢糧七分被災九分者免六分八分者免四分七分者免二分六分者免一分一直省地方有被災五分者亦准蠲免錢糧十分之一永為定例一凡各省地方被災不及五分有奉㫖及督撫題請緩徴者於次年麥熟後只令催徴舊欠其本年錢糧准於九月後催徴若深冬方得雨雪及積水退者緩至次年秋收催徴如被災八分九分十分者將該年緩徵錢糧俱分作三年帶徴被災五分六分七分者分作二年帶徵以紓民力一凡被災地方米船過關果係前往售賣免其納税給予印票責令到境之日呈送該地方官鈴盖印信回空查銷如有免税米船偷運别省並未到被災地方先行糶賣者將寛免之税加倍追出仍照違制律治罪一各直省遇有災𤯝之年該督撫將清理刑獄之處奏聞請㫖一江海河湖居民猝被水災該地方官一面通報各該管上司一面赴被災處所驗看明確照例酌量賑濟不得濡遲時日一凡沿河沙洲地畝被冲坍塌即令業戸報官勘明註冊遇有淤漲亦即報官查丈照原報之數撥補此外多餘漲地不許霸占如從前未經報坍不准撥給至隔江逺戸果係報坍有案即將多餘漲地秉公撥補若坍戸數多按照報坍先後以次照撥倘補足之外尚有餘地許召無業窮民認墾官給印照仍令各屬按數造報統俟五年大丈再行履勘造冊送部以定陞除其報坍報漲在兩縣接壤之處者委員會同兩邑地方官據實勘驗秉公撥補如有私行霸占將淤洲入官該戸照盜耕官田律治罪地方官不查丈明確以致撥補舛錯查出照官吏不用心從實檢踏律分别議處功臣田土凡功臣之家除朝廷撥賜公田免納糧當差外但有自置田上從管莊人盡數報官入籍照額一體納糧當差違者計所隱之田一畝至三畝杖六十每三畝加一等罪止杖一百徒三年罪坐管莊之人其田入官仍計遞年所隱糧税依畝數年數額數徴納若里長及有司官吏阿附踏勘不實及知而不舉者與管莊人同罪不知者不坐盜賣田宅凡盜他人田宅賣將已不堪田宅換易及冒認他人田宅作自已者若虚冩價錢實立文契典買及侵占他人田宅者田一畝屋一間以下笞五十每田五畝屋三間加一等罪止杖八十徒二年係官田宅者各加二等若强占官民山場湖泊茶園蘆蕩及金銀銅錫鐵冶者不計畝數杖一百流三千里若將互爭不明及他人田産妄作已業䑃朧投獻官豪勢要之人與者受者各杖一百徒三年盜賣與投獻等項田産及盜賣過田價并各項田産中遞年所得花利各應還官者還官應給主者給主若功臣有犯者照律擬罪奏請定奪條例一軍民人等將爭競不明并賣過及民間起科僧道將寺觀各田地若子孫將公共祖墳山地朦朧投獻王府及内外官豪勢要之家私揑文契典賣者投獻之人問發邊逺充軍田地給還應得之人其受投獻家長並管莊人叅䆒治罪直隸各省空閒地土俱聽民儘力開種照年限起科若有占奪投獻者悉照前例問發一用强占種屯田五十畝以上不納子粒者問罪照數追納完日軍發邊衞充軍民發邊外為民其屯田人等將屯田典賣與人至五十畝以上與典主買主各不納子粒者俱照前問發若不滿數及上納子粒不缺或因無人承種而侵占者照常發落管屯等官不行用心清查者叅奏治罪一西山一帶密邇京師地方如有官豪勢要之家私自開窑賣煤鑿山賣石立厰燒灰者枷號一箇月發邊衞充軍干礙内外官員叅奏提問一近邊分守武職并府州縣官員禁約該管軍民人等不許擅自入山將應禁林木砍伐販賣違者問發雲貴川廣烟瘴稍輕地方充軍若前項官員有犯俱革職為民鎭守並副叅等官員有犯指實叅奏其經過關隘河道守把官軍容情縱放者究問治罪一各省丈量田畝及抑勒首報墾田之事永行停止違者以違制律論一凡子孫盜賣祖遺祀産至五十畝者照投獻揑賣祖墳山地例發邊逺充軍不及前數及盜賣義田應照盜賣官田律治罪其盜賣歴久宗祠一間以下杖七十每三間加一等罪止杖一百徒三年以上知情謀買之人各與犯人同罪房産收回給族長收管賣價入官不知者不坐其祀産義田令勒石報官或族黨自立議單公據方准按例治罪如無公私確據藉端生事者照誣告律治罪任所置買田宅凡有司官吏不得於見任處所置買田宅違者笞五十解任田宅入官條例一各關出差官員不許携帶家眷多隨奴僕及任所置優買妾任滿回部未經考核不許擅買田莊市宅生息放債如違交與該部治罪衙役人等除解餉公事外私自赴京長接及以缺額藉口題請展限者亦交與該部治罪一提督總兵副將等官不許在見任地方置立産業即丁憂休致解退亦不許入籍居住或任内置有産業已經身故及不能回籍者該督撫具奏請㫖定奪至叅將以下等官任所置有産業或本身休致解退或已經身故子孫留住任所欲入籍者該地方官報明督撫准其入籍典買田宅凡典買田宅不税契者笞五十仍追契内田宅價錢一半入官不過割者一畝至五畝笞四十每五畝加一等罪止杖一百其不過割之田入官若將已典賣與人田宅朦朧重復典賣者以所得重典賣之價錢計贓准竊盜論免刺追價還後典買之主田宅從原典買主為業若重復典買之人及牙保知其重典賣之情者與犯人同罪追價入官不知者不坐其所典田宅園林碾磨等物年限已滿業主備價取贖若典主託故不肯放贖者笞四十限外遞年所得多餘花利追徴給主仍聽依原價取贖其年限雖滿業主無力取贖者不拘此律條例一告爭家財田産但係五年之上并雖未及五年驗有親族寫立分書已定出賣文約是實者斷令照舊管業不許重分再贖告詞立案不行一凡八旗人員置買産業於各省者令該員據實首報交與該督撫按其産業之多寡勒限變價歸旗如有隱匿不首及首報不實者該督撫訪查題叅將所置産業入官其隱匿不首者照侵占田宅律治罪首報不實者按不實之數亦照侵占律治罪如地方官扶同徇隱别經發覺者照例議處其未經查出之知府並督撫司道均照例分别議處至於查禁以後仍有違禁置産私相授受者照將他人田産朦朧投獻官豪勢要律與者受者各杖一百徒三年産業入官其託民人出名詭名寄戸者受託之民人照里長知情隱瞞入官家産計所隱贓重者坐贓治罪受財者以枉法從重論地方官失於查察者照例議處一賣産立有絶賣文契並未註有找貼字樣者槩不准貼贖如契未載絶賣字樣或註定年限回贖者並聽回贖若賣主無力回贖許憑中公估找貼一次另立絶賣契紙若買主不願找貼聽其别賣歸還原價倘已經賣絶契載確鑿復行告找告贖及執産動歸原先儘親鄰之説借端掯勒希圖短價者俱照不應重律治罪一八旗官兵人等有將現銀承買入官人口房産者即將銀兩先行交部俟收明銀兩知照到旗之日兩翼給與印信執照報部入冊如有將俸禄錢糧坐扣抵買者一面咨部坐扣俸餉一面將人口房産給認買人領去俟俸餉坐扣完日再行知會兩翼給與執照報部入冊一旗丁有將運田私典於人及承典者均照典買官田律計畝治罪該丁革退其田追出交與接運新丁典價入官其旗丁出運之年將運田租與民人止許得當年租銀如有指稱加租立劵豫支者將該丁與出銀租田之人均照典買官田律減二等治罪租價入官一凡各省衞所贍運屯田有典賣與民許照清釐條議備價回贖如衙門書識人等藉稱族丁管船侵占屯田不歸船濟運者照侵盜官糧例治罪若原係民田與軍無渉該丁揑控者將該丁責革另僉該管官弁不實力稽察或承查遲延或互相徇縱查出俱交部分别議處一嗣後民間置買産業如係典契務於契内註明回贖字樣如係賣契亦於契内註明絶賣永不回贖字樣其自乾隆十八年定例以前典賣契載不明之産如在三十年以内契無絶賣字樣者聽其照例分别找贖若逺在三十年以外契内雖無絶賣字樣但未註明回贖者即以絶産論概不許找贖如有混行争告者均照不應重律治罪一凡州縣官征收田房税契照征收錢糧例别設一櫃令業戸親自賫契投税該州縣即粘司印契尾給發收執若業戸混交匪人代投致被假印誆騙者照不應重律杖八十責令換契重税倘州縣官不粘司印契尾侵税入已照例叅追該管之道府直𨽻州知州分别失察徇隱照例議處一凡民間活契典當田房一概免其納税其一切賣契無論是否杜絶俱令納税其有先典後賣者典契既不納税按照賣契銀兩實數納税如有隱漏者照律治罪一民間私頂軍田匿不首報一畝至五畝笞四十毎五畝加一等罪止杖一百盜耕種官民田凡盜耕種他人田園地土者不告田主一畝以下笞三十每五畝加一等罪止杖八十荒田減一等强者不由田主各指熟田荒田言加一等係官者各通盜耕强耕荒熟言又加二等仍追所得花利官田歸官民田給主條例一近邊地土各營堡草場界限明白敢有那移條欵盜耕草場及越出邊墻界石種田者依律問擬追徴花利至報完之日不分軍民俱發附近衞所充軍若有毁壊邊墻私出境外者枷號三箇月發落荒蕪田地凡里長部内已入籍納糧當差田地無水旱災傷之故荒蕪及應課種桑麻之類而不種者計荒蕪不種之田地俱以十分為率一分笞二十每一分加一等罪止杖八十縣官各減里長罪二等長官為首一分減盡無科二分方笞一十加至杖六十罪止佐職為從又減長官一等二分者減盡無科三分者方笞一十加至笞五十罪止人戸亦計荒蕪田地及不種桑麻之類就本戸田地以五分為率一分笞二十每一分加一等追徴合納税糧還官應課種桑棗黄麻苧麻棉花藍靛紅花之類各隨鄉土所宜種植棄毁器物稼穡等凡故意棄毁人器物及毁伐樹木稼穡者計所棄毁之物即為贓准竊盜論照竊盜定罪免刺罪止杖一百流三千里官物加准竊盜贓上二等若遺失及誤毁官物者各於官物加二等上減三等凡棄毁遺失誤毁並驗數追償還官給主若遺失誤毁私物者償而不坐罪若毁人墳塋内碑碣石獸者杖八十毁人神主者杖九十若毁損人房屋墻垣之類者計合用修造雇工錢坐贓論一兩以下笞二十罪止杖一百徒三年各令修立官屋加二等誤毁者但令修立不坐罪條例一凡廣收麥石肆行跴麴大開燒鍋者杖一百枷號兩箇月地方官員失察交部分别處分如官吏賄縱等弊照枉法計贓論罪擅食田園𤓰果凡於他人田園擅食𤓰果之類坐贓論計所食之物價一兩以下笞一十二兩笞二十計兩加等罪止杖六十徒一年棄毁者罪亦如之其擅將挾去及食之者係官田園𤓰果若官造酒食者加二等照擅食他人罪加二等主守之人給與及知而不舉者與同罪若主守私自將去者並以監守自盜論至四十兩問雜犯准徒五年私借官車船凡監臨主守將係官車船店舍碾磨之類私自借用或轉借與人及借之者各笞五十驗日追雇賃錢入官不得過本價若計雇賃錢重於笞五十者各坐贓論加一等大清律例卷九
