body:
  text: 臣劉統勳等謹奏為奏聞事竊臣部纂修全部律例前經奏明分為三次進呈所有名例吏律户律禮律兵律並刑律賊盜人命鬭毆共十二卷已於本年五月初六日及六月初九日具摺進呈御覽均蒙欽定今將第三次纂修刑律訴訟受贓詐偽犯姦雜犯捕亡斷獄工律共八卷督捕則例一卷併毋庸纂輯條例一卷謹繕黃册進呈御覽恭候欽定俟命下之日臣館將此次及前兩次纂修條例另繕清漢樣册進呈照例送交武英殿刊刻臣館一面先行刊刻草本通行各省督撫將軍一體遵行為此謹奏請旨乾隆三十二年七月初六日奏初七日奉旨知道了欽此
