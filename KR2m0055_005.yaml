body:
  text: 律例館總裁臣三泰等謹查大清律自世祖章皇帝定鼎之初即命刑部尚書吳達海等詳譯明律參以國制書成奏進刊布中外聖祖仁皇帝康熙九年命大學士管刑部尚書事對喀納等復行校正十八年特諭刑部將定律之外所有條例應去應存詳加酌定刊刻通行名為見行則例二十八年準臺臣盛符升奏請將見行則例載入大清律條例內命尚書圖納張玉書等為總裁至四十六年繕寫進呈留覽未發世宗憲皇帝雍正元年復命大學士朱軾尚書查郎阿等為總裁於應增應減之處再行詳加分晰作速修完至雍正五年奏準頒行我皇上御極之元年允尚書傅鼐陳奏特命臣三泰等為總裁臣等奉命遴選提調臣何瞻纂修臣嶽泰等逐條考正重加編輯又詳校定例纂入一千四十九條節次恭繕進呈蒙皇上親加鑒定間有未協之處悉經諭旨改正特命刊布內外永遠遵行臣等幸生盛世仰見典章之大成謹拜手稽首敬録世祖章皇帝御製原序一篇聖祖仁皇帝上諭一道世宗憲皇帝御製序文一篇諭旨一道冠諸卷首其諸臣章奏附録於後云臣三泰等恭紀
