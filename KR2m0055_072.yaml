body:
  text: 刑律鬬毆下奴婢毆家長凡奴婢毆家長者有傷無傷預毆之奴婢不分首從皆斬殺者故殺毆殺預毆之奴婢不分首從皆凌遲處死過失殺者絞監候過失傷者杖一百流三千里不收贖若奴婢毆家長之尊卑期親及外祖父母者即無傷亦絞監候為從減一等傷者預毆之奴婢不問首從重輕皆斬監候過失殺者減毆罪二等過失傷者又減一等故殺者預毆之奴婢皆凌遲處死毆家長之緦麻親兼內外尊卑但毆即坐雖傷亦杖六十徒一年小功杖七十徒一年半大功杖八十徒二年折傷以上緦麻加毆良人罪一等小功加二等大功加三等加者加入於死但絞不斬一毆一傷各依本法死者預毆奴婢皆斬故殺亦皆斬若雇工人毆家長及家長期親若外祖父母者即無傷亦杖一百徒三年傷者不問輕重杖一百流三千里折傷者絞監候死者斬毆家長斬決毆家長期親若外祖父母斬監候故殺者凌遲處死過失殺傷者各減本殺傷罪二等毆家長之緦麻親杖八十小功杖九十大功杖一百傷重至內損吐血以上緦麻小功加凡人罪一等大功加二等罪止杖一百流三千里死者各斬監候若奴婢有罪或姦或盜凡違法罪過皆是其家長及家長之期親若外祖父母不告官司而私自毆殺者杖一百無罪而毆殺或故殺者杖六十徒一年當房人口指奴婢之夫婦子女悉放從良奴婢有罪不言折傷篤疾者非至死勿論也若家長及家長之期親若外祖父母毆雇工人不分有罪無罪非折傷勿論至折傷以上減凡人折傷罪三等因而致死者杖一百徒三年故殺者絞監侯若奴婢雇工人違犯家長及期親外祖父母教令而依法於臀腿受杖去處決罰邂逅致死及過失殺者各勿論條例一凡旗員將奴婢責打身死者罰俸二年故殺者降二級調用刃殺者革職不准折贖鞭一百若將族中家僕毆打死者降二級調用故殺者降三級調用各追人一口給主刃殺者革職不准折贖鞭一百毆殺他人奴婢者革職追人一口給主故殺者依律絞候平人將奴僕責打身死者枷號二十日故殺者枷號一箇月刃殺者枷號兩箇月各鞭一百毆雇工人致死者枷號四十日鞭一百毆族中家僕致死者枷號兩箇月鞭一百若將族中家僕故殺者枷號三箇月鞭一百刃殺者發黑龍江當差仍各追人一口給主其奴僕違犯教令而依法決罰邂逅致死者仍依律勿論一凡監生生員人等毆殺故殺刃殺奴婢者俱黜革故殺刃殺者杖一百不准折贖一旗人故殺白契所買并典當之人俱照故殺雇工人律擬絞監候若毆打死者照律治罪一凡家主將奴僕之妻妄行占奪或圖姦不遂因將奴僕毒毆或將其妻致死審明確有實據及本主自認不諱者即將伊主不分官員平人發黑龍江當差如伊主並無姦占情弊而奴僕誣陷其主者仍照千名犯義律從重治罪一凡八旗官員平人將奴婢責打身死及故殺者除照例治罪外其奴僕之父母妻子情願仍在伊主家者聽其存留不願者悉行開放係旗人聽其在旗投主係民人放出為民不得追收身價一凡民人奴僕背主投營挾制家主勒索原契及妻子財物不分首從得財與未得財皆斬立決若止背主投營審無挾制勒索者枷號四十日杖一百交還原主該營初雖不知後知而不舉發者交該部議處一凡漢人家生奴僕印契所買奴僕并雍正五年以前白契所買及投靠養育年久或婢女招配生有子息者俱係家奴世世子孫永逺服役婚配俱由家主仍造册報官存案其婢女招配并投靠及買奴僕俱寫立文契報明本地方官鈐蓋印信如有事犯驗明官册印契照例治罪其奴僕誹謗家長并雇工人罵家長與官員平人毆殺奴僕并教令過失殺及毆殺雇工人等欵俱有律例應照滿洲主僕論若犯該黑龍江當差者照名例改遣之例問發至不遵約束傲慢頑梗酗酒生事者照滿洲家人喫酒行凶例面上刺字流二千里交與該地方官令其永逺當苦差有背主逃匿者照滿洲家人逃走例折責四十板面上刺字交與本主仍行存案容留窩藏者照窩藏逃人例治罪如典當雇工限內逃匿者照滿洲白契所買家人逃走例責三十板亦交與本主若典當立有文劵議有年限不遵約束傲慢酗酒生事者聽伊主酌量懲治若與家長抗拒毆罵者照律治罪再隸身門下為長隨者有犯亦照典當雇工人治罪一民人於雍正十三年以前白契所買家人照八旗之例准作為家奴永逺服役倘伊主毆殺故殺俱照紅契一例擬斷其乾隆元年以後除婢女招配者亦照旗人配有妻室不准贖身之例作為家奴外其餘白契所買之人俱以白契定擬一契買婢女務照價買家人例旗人將文契呈明該管佐領先用圖記自赴稅科司驗印民人將文契報明本地方官鈐蓋印信至旗人契買民間婢女在京具報五城大宛兩縣在外具報該地方官用印立案倘有情願用白契價買者仍從其便但遇毆殺故殺問刑衙門須驗紅契白契分别科斷再旗民所買婢女已經配給紅契家奴者准照紅契辨理一白契所買奴婢如有殺傷家長及家長緦麻以上親者均照紅契奴婢一體治罪家長殺傷奴婢仍分紅白契辦理一除典當家人及隸身長隨俱照定例治罪外其雇倩工作之人若立有文契年限及雖無文契而議有年限或計工受值已閲五年以上者於家長有犯均依雇工人定擬其隨時短雇受值無多者仍同凡論一官民之家除典當家人隸身長隨及立有文契年限之雇工仍照例定擬外其餘雇工雖無文契而議有年限或不立年限而有主僕名分者如受雇在一年以內有犯尋常千犯照良賤加等律再加一等治罪若受雇在一年以上者即依雇工人定擬其犯姦殺誣告等項重情即一年以內亦照雇工人治罪若祇是農民雇倩親族耕作店鋪小郎以及隨時短雇並非服役之人應同凡論一奴婢毆家長之期親及外祖父母至死者皆擬斬立決一奴婢過失殺家長者擬絞立決一旗員毆死贖身及放出奴婢並該奴婢之子女者即照毆死族中奴婢降二級調用例減一等降一級調用故殺者即照故殺族中奴婢例降三級調用妻妾毆夫凡妻毆夫者但毆即坐杖一百夫願離者聽須夫自告乃坐至折傷以上各驗其傷之重輕加凡鬬傷三等至篤疾者絞決死者斬決故殺者凌遲處死兼魘魅蠱毒在內若妾毆夫及正妻者又各加妻毆夫罪一等加者加入於死但絞不斬於家長則決於妻則監候若篤疾者死者故殺者仍與妻毆夫罪同其夫毆妻非折傷勿論至折傷以上減凡人二等須妻自告乃坐先行審問夫婦如願離異者斷罪離異不願離異者驗所傷應坐之罪收贖仍聽完聚至死者絞監候故殺亦絞毆傷妾至折傷以上減毆傷妻二等至死者杖一百徒三年妻毆傷妾與夫毆妻罪同亦須妾自告乃坐過失殺者各勿論蓋謂其一則分尊可原一則情親當矜也須得過失實情不實仍各坐本律夫過失殺其妻妾及正妻過失殺其妾者各勿論若妻妾過失殺其夫妾過失殺正妻當用比律過失殺句不可通承上二條言若毆妻之父母者但毆即坐杖六十徒一年折傷以上各加凡鬬傷罪二等至篤疾者絞監侯死者斬監候故殺者亦斬條例一凡妻毆本夫如本夫親告又復願離恩義已絶應按律的決不得勒追本夫銀兩代妻納贖如本夫不願離異及正妻毆妾至折傷以上仍依律科斷概准納贖至妾毆夫及正妻依律分别定擬杖罪的決餘罪收贖一妾過失殺正妻比照過失殺期親尊長律杖一百徒三年決杖一百餘罪收贖一妻過失殺夫妾過失殺家長者俱擬絞立決同姓親屬相毆凡同姓親屬相毆雖五服已盡而尊卑名分猶存者尊長犯卑幼減凡鬭一等卑幼犯尊長加一等不加至死至死者無論尊卑長幼並以凡人論鬭殺者絞故殺者斬毆大功以下尊長凡卑幼毆本宗及外姻緦麻兄姊但毆即坐杖一百小功兄姊杖六十徒一年大功兄姊杖七十徒一年半尊屬又各加一等折傷以上各遞加凡鬭傷一等罪止杖一百流三千里篤疾者不問大功以下尊屬並絞死者斬絞斬在本宗小功大功兄姊及尊屬則決餘俱監候不言故殺者亦止於斬也若本宗及外姻尊長毆卑幼非折傷勿論至折傷以上緦麻卑幼減凡人一等小功卑幼減二等大功卑幼減三等至死者絞監候不言故殺者亦止於絞也其毆殺同堂大功弟妹小功堂姪及緦麻姪孫者杖一百流三千里不言篤疾至死者罪止此仍依律給付財産一半養贍故殺者絞監候不言過失殺者蓋各准本條論贖之法兄之妻及伯叔母弟之妻及卑幼之婦在毆夫親屬律姪與姪孫在毆期親律條例一毆死同堂大功弟妹小功堂姪及緦麻姪孫除照律擬流外仍斷給財産一半養贍其大功以下尊長毆卑幼至篤疾均照律斷給財産惟毆尊長至篤疾罪應擬絞者不在斷給財産之內一凡聽從下手毆本宗小功大功兄姊及尊屬至死者除實係迫於尊長威嚇勉從下手邂逅至死者仍照律減等科斷外若尊長僅令毆打而輒行叠毆多傷至死者將下手之犯擬斬監侯一凡毆死有服尊長情輕之案該督撫按律例定擬止於案內叙明不得兩請法司㑹同核覆亦照本條擬罪其兩請舊例一概停止若核其所犯情節實可矜憫者夾簽聲明恭候欽定一於母黨有犯除親母嫡母本生母黨屬仍照服制定擬外其餘均同凡論一卑幼毆緦麻尊長於保辜限外身死按其所毆傷罪在徒流以下者於斬候本罪減一等杖一百流三千里其原毆傷重至篤疾者擬絞監候毆小功以上尊長如罪應斬決者雖死於辜限之外仍照本律定擬臨時酌量情節夾簽聲明毆期親尊長凡弟妹毆同胞兄姊者杖九十徒二年半傷者杖一百徒三年折傷者杖一百流三千里刃傷不論輕重及折肢若瞎其一目者絞以上各依首從法死者不分首從皆斬若姪毆伯叔父母姑是期親尊屬及外孫毆外祖父母服雖小功其恩義與期親並重各加毆兄姊罪一等加者不至於絞如刃傷折肢瞎目者亦絞至死者亦皆斬其過失殺傷者各減本殺傷兄姊及伯叔父母姑外祖父母罪二等不在收贖之限故殺者皆不分首從凌遲處死若卑幼與外人謀故殺親屬者外人造意下手從而加功不加功各依凡人本律科罪不在皆斬皆凌遲之限其期親兄姊毆殺弟妹及伯叔姑毆殺姪并姪孫若外祖父母毆殺外孫者杖一百徒三年故殺者杖一百流二千里篤疾至折傷以下俱勿論過失殺者各勿論條例一凡卑幼毆期親尊長執有刀刃趕殺情狀凶惡者雖未傷依律發近邊充軍一凡兄及伯叔因爭奪弟姪財産官職及平素讐隙不睦有意執持凶器故行殺害者擬絞監候仍斷給財産一半與被殺家屬養贍如無前項情由仍照律擬罪一凡故殺期親弟妹照故殺大功弟妹律均擬絞監候其毆期親弟妹致死者照本律滿徒加一等杖一百流二千里一凡被期親尊長或外祖父母毆至篤疾者如由卑幼觸犯照律勿論若卑幼並無干犯而尊長非理毒毆致成篤疾者除照律勿論外斷給財産一半養贍一凡卑幼誤傷尊長至死罪干斬決審非逞凶干犯仍准叙明可原情節夾簽請㫖其有本犯父母因而自戕殞命者俱改擬絞決毋庸量請末減一尊長毆卑幼除依理訓責及因事互毆邂逅致成篤疾者仍照律勿論外若挾有嫌隙故殘卑幼至篤疾者兄姊照毆死弟妹杖一百流二千里例減一等杖一百徒三年伯叔姑外祖父母照毆死姪姪孫外孫杖一百徒三年律減一等杖九十徒二年半不准照律勿論毆祖父母父母凡子孫毆祖父母父母及妻妾毆夫之祖父母父母者皆斬殺者皆凌遲處死其為從有服屬不同者自依各條服制科斷過失殺者杖一百流三千里傷者杖一百徒三年俱不在收贖之例其子孫違犯教令而祖父母父母不依法決罰而橫加毆打非理毆殺者杖一百故殺者無違犯教令之罪為故殺杖六十徒一年嫡繼慈養母殺者終與親母有間毆殺故殺各加一等致令絶嗣者毆殺故殺絞監候若祖父母父母嫡繼慈養母非理毆子孫之婦此婦字乞養者同及乞養異姓子孫折傷以下無論致令廢疾者杖八十篤疾者加一等子孫之婦及乞養子孫並令歸宗子孫之婦篤疾者追還初歸嫁粧仍給養贍銀一十兩乞養子孫篤疾者撥付合得所分財産養贍不在給財産一半之限如無財産亦量照子孫之婦給銀至死者各杖一百徒三年故殺者各杖一百流二千里其非理毆子孫之妾各減毆婦罪二等不在歸宗追給嫁粧贍銀之限其子孫毆罵祖父母父母及妻妾毆罵夫之祖父母父母而祖父母父母夫之祖父母父母因其有罪毆殺之若違犯教令而依法決罰邂逅致死及過失殺者各勿論條例一繼母告子不孝及伯叔父母兄姊伯叔祖同堂伯叔父母兄姊奏告弟姪人等打罵者俱行拘四鄰親族人等審勘是實依律問斷若有誣枉即與辨理果有顯跡傷痕輸情服罪者不必行勘一凡義子過房在十五嵗以下恩養年久或十六嵗以上曽分有財産配有室家若於義父母及義父之祖父母父母有犯毆罵侵盜恐嚇詐欺誣告等情即同子孫取問如律若義父母及義父之祖父母父母毆殺故殺者並以毆故殺乞養異姓子孫論若過房雖在十五以下恩養未久或在十六以上不曽分有財産配有室家及於義父之期親尊長并外祖父母有違犯者並以雇工人論義子之婦亦依前擬嵗數如律科斷其義子後因本宗絶嗣有故歸宗而義父母與義父之祖父母父母無義絶之狀原分家産原配妻室不曽拘留遇有違犯仍以雇工人論若犯義絶及奪其財産妻室與其餘親屬不分義絶與否並同凡人論義絶如毆義子至篤疾當令歸宗及有故歸宗而奪其財産妻室亦義絶也一凡本宗為人後者之子孫於本生親屬孝服祇論所後宗支親屬服制如於本生親屬有犯俱照所後服制定擬其異姓義子與伊所生子孫為本生父母親屬孝服亦俱不准降等各項有犯仍照本宗服制科罪一凡繼母毆故殺前妻之子審係平日撫如已出而其子不孝經官訊驗有據即照父母毆故殺子孫律分别擬以杖徒不必援照加等之律如伊子本無違犯教令而繼母非理毆殺故殺者除其夫現有子嗣仍依律加等定擬外若現在並無子嗣即照律擬絞監候一繼母因姦將前妻子女致死滅口如姦夫起意本婦為從而其夫尚有子嗣者仍照謀殺卑幼為從律科斷如審係姦婦起意本夫已故者不論有無子嗣亦照毆故殺前妻之子致令絶嗣例擬絞監侯一為人後及女之出嫁者如於本生祖父母父母有犯仍照毆祖父母父母律定罪其伯叔兄姊以下均依律服圖降一等科罪尊長殺傷卑幼同一子孫過失殺祖父母父母者擬絞立決妻妾與夫親屬相毆凡妻妾毆夫之期親以下緦麻以上本宗外姻尊長與夫毆同罪或毆或傷或折傷各以夫之服制科斷其有與夫同絞罪者仍照依名例至死減一等杖一百流三千里至死者各斬監候緦麻親兼妾毆妻之父母在內此不言故殺者其罪亦止於斬也不言毆夫之同姓無服親屬者以凡人論若妻毆傷卑屬與夫毆同各以夫毆服制科斷至死者絞監候此夫之緦麻小功大功卑屬也雖夫之堂姪姪孫及小功姪孫亦是若毆殺夫之兄弟子杖一百流三千里不得同夫擬徒故殺者絞監候不得同夫擬流妾犯者各從凡鬬法不言夫之自期以下弟妹者毆夫之弟妹但減凡一等則此當以凡論若期親以下緦麻以上尊長毆傷卑幼之婦減凡人一等妾又減一等至死者不拘妻妾絞監候故殺亦絞若弟妹毆兄之妻加毆凡人一等其不言妻毆夫兄之妻者與夫毆同若兄姊毆弟之妻及妻毆夫之弟妹及夫弟之妻各減凡人一等若毆妾者各又減毆妻一等不言妻毆夫兄之妾者亦與夫毆同不言弟妹毆兄之妾及毆大功以下兄弟妻妾者皆以几論其毆姊妹之夫妻之兄弟及妻毆夫之姊妹夫者有親無服皆為同輩以凡鬬論若妾犯者各加夫毆妻毆一等加不至於絞若妾毆夫之妾子減凡人二等以其近於子也毆妻之子以凡人論所以别妻之子於妾子也若妻之子毆傷父妾加凡人一等所以尊父也妾子毆傷父妾又加二等為其近於母也共加凡人三等不加至於絞至死者各依凡人論此通承本節弟妹毆兄之妻以下而言也死者絞故殺者斬條例一妻之子及妾之子毆傷生有子女之庶母仍依律分别科斷外如毆至死者擬斬監候其謀故殺死亦擬斬監候於秋審時酌量情罪分别定擬毆妻前夫之子凡毆妻前夫之子者謂先曽同居今不同居者其毆傷折傷減凡人一等同居者又減一等至死者絞監候若毆繼父者亦謂先曽同居今不坰居者杖六十徒一年折傷以上加凡鬬傷二等同居者又加一等至篤疾罪止杖一百流三千里不加於死仍給財産一半養贍至死者斬監候其故殺及自來不曽同居者不問父毆子子毆父各以凡人論妻妾毆故夫父母凡妻妾夫亡改嫁毆故夫之祖父母父母者並與毆舅姑罪同其舊舅姑毆已故子孫改嫁妻妾者亦與毆子孫婦同妻妾被出不用此律義已絶也若奴婢毆舊家長及家長毆舊奴婢者各以凡人論此亦自轉賣與人者言之奴婢贖身不用此律義未絶也父祖被毆凡祖父母父母為人所毆子孫即時少遲即以鬬毆論救護而還毆行凶之人非折傷勿論至折傷以上減凡鬬三等雖篤疾亦得減流三千里為徒二年至死者依常律若祖父母父母為人所殺而子孫不告官擅殺行凶人者杖六十其即時殺死者勿論少遲即以擅殺論若與祖父母父母同謀共毆人自依凡人首從法又祖父母父母被有服親屬毆打止宜救解不得還毆若有還毆者仍依服制科罪父祖外其餘親屬人等被人殺而擅殺行凶人審無别項情故依罪人本犯應死而擅殺律杖一百條例一凡祖父母父母為人所殺本犯擬抵後或遇恩遇赦免死而子孫報讐將本犯仍復擅殺者杖一百流三千里一人命案內如有父母被人毆打實係事在危急伊子救護情切因而毆死人者於疏內聲明援例兩請候㫖定奪其或有子之人與人角口故令伊子將人毆死者仍照律科罪不得槩議減等大清律例卷二十八
