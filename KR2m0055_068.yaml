  text: 欽定四庫全書大清律例卷二十六
  hash: sha256:870f7ecf61cda22d5b9c6e66476210b479b3baad2aa7532505f4dbca634bf416
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0055_WYG_068-1a, image: WYG0672/WYG0672-0767c.png}
body:
  text: 刑律人命謀殺人凡謀或謀諸心或謀諸人殺人造意者斬監候從而加功者絞監候不加功者杖一百流三千里殺訖乃坐若未曾殺訖而邂逅身死止依同謀共毆人抖斷若傷而不死造意者絞監候從而加功者杖一百流三千里不加功者杖一百徒三年若謀而已行未曾傷人者造意為首者杖一百徒三年為從者同謀同行各杖一百但同謀者雖不同行皆坐其造意者通承已殺已傷已行三項身雖不行仍為首論從者不行減行而不加功者一等若因而得財者同强盜不分首從論皆斬行而不分贓皆不行又不分贓皆仍依謀殺論條例一凡勘問謀殺人犯果有詭計隂謀者方以造意論斬助毆傷重者方以加功論絞謀而已行人贓見獲者方與强盜同辟毋得據一言為造謀指助勢為加功坐虛贓為得財一概擬死致傷多命一凡謀財害命照律擬斬立決外其有因他事殺人後偶見財物因而取去者必審其行凶挾何讐隙有何證據果係初無圖財之心殺人後見有隨身衣物銀錢乘便取去者將所得之財倍追給主仍各依本律科斷若殺人後掠取家財並知有藏蓄而取去者審得實情仍同强盜論罪一凡圖財害命應分别曾否得財定擬其得財而殺死人命者首犯與從而加功者俱擬斬立決不加功者擬斬監候不行而分贓者照强盜免死減等例問發傷人未死而已得財者首犯擬斬立決從而加功者擬斬監候不加功者亦照例問發不行而分贓者杖一百流三千里如未得財殺人為首者擬斬監候傷人為首者擬絞監候其為從加功不加功者俱分别遞減一凡謀殺人已行其人知覺奔逃或跌失或墮水等項雖未受傷因謀殺奔脫死於他所者造意者滿流為從滿杖若其人迫於凶悍當時失跌身死原謀擬絞監候為從者杖一百流三千里一苖人有圖財害命之案均照强盜殺人斬決梟示例辦理謀殺制使及本管長官凡奉制命出使而所在官吏謀殺及部民謀殺本屬知府知州知縣軍士謀殺本管官若吏卒謀殺本部五品以上長官已行未傷者首杖一百流二千里已傷者首絞流絞俱不言皆則為從各減等官史謀殺監候餘皆決不待時下斬同已殺者皆斬其從而不加功與不行者及謀殺六品以下長官並府州縣佐二首領官其非本屬本管本部者各依凡人謀殺論謀殺祖父母父母凡謀殺祖父母父母及期親尊長外祖父母夫夫之祖父母父母已行不問已傷未傷者預謀之子孫不分首從皆斬已殺者皆凌遲處死監故在獄者仍戮其尸其為從有服屬不同自依緦麻以上律論有凡人自依凡論凡謀殺服屬皆倣此謀殺緦麻以上尊長已行者首杖一百流二千里為從杖一百徒三年已傷者首絞為從加功不加功並同凡論已殺者皆斬不問首從其尊長謀殺本宗及外姻卑幼已行者各依故殺罪減二等已傷者減一等已殺者依故殺法依故殺法者謂各依鬭毆條內尊長故殺卑幼律問罪為從者各依服屬科斷若奴婢及雇工人謀殺家長及家長之期親外祖父母若緦麻以上親者兼尊卑言統主人服屬尊卑之親罪與子孫同謂與子孫謀殺祖父母父母及期親尊長外祖父母緦麻以上尊長同若已轉賣依良賤相毆論條例一官民之家凡倩工作之人立有文券議有年限者依雇工人論祇是短雇月日受值不多者依凡論其財買義男並同子孫論一尊長謀殺卑幼除為首之尊長仍依故殺法分别已行已傷已殺定擬外其為從加功之尊長各按服制亦分别已行已傷已殺三項各依為首之罪減一等若同行不加功及同謀不同行又各減一等為從係凡人仍照凡人謀殺為從科斷殺死姦夫凡妻妾與人姦通而本夫於姦所親獲姦夫姦婦登時殺死者勿論若止殺死姦夫者姦婦依和姦律斷罪當官嫁賣身價入官或調戲未成姦或雖成姦已就拘執或非姦所捕獲皆不得拘此律其妻妾因姦同謀殺死親夫者凌遲處死姦夫處斬監候若姦夫自殺其夫者姦婦雖不知情絞監候條例一非姦所獲姦將姦婦逼供而殺審無姦情確據者依毆妻至死論如本夫登時姦所獲姦將姦婦殺死姦夫當時脫逃後被拿獲到官審明姦情是實姦夫供認不諱者將姦夫擬絞監候本夫杖八十其非姦所獲姦或聞姦數日殺死姦婦姦夫到官供認不諱確有實據者將本夫照已就拘執而擅殺律擬徒姦夫杖一百徒三年一姦夫已離姦所本夫登時逐至門外殺之止依不應杖非登時依不拒捕而殺一姦夫已就拘執而毆殺或雖在姦所捉獲非登時而殺並須引夜無故入人家已就拘執而擅殺至死律一凡非應許捉姦之人有殺傷者並依鬭殺傷論一姦婦自殺其夫姦夫果不知情止科姦罪一因姦謀殺本夫傷而不死姦婦依謀殺夫已行斬姦夫依謀殺人傷而不死從而加功滿流若是造意依造意絞一姦夫自殺夫之父母以便往來姦婦雖不知情亦絞以上諸條先須姦情確審得實乃坐一凡姦夫同謀殺死親夫係姦夫起意者將姦夫斬決如謀殺親夫之後復將姦婦拐逃或為妻妾或得銀嫁賣並拐逃幼小子女賣與他人為奴婢者亦均斬決本夫縱姦者不用此例一凡因姦同謀殺死親夫除本夫不知姦情及雖知姦情而迫于姦夫之强悍不能報復並非有心縱容者姦婦仍照律凌遲處死外若本夫縱容抑勒妻妾與人通姦審有確據人所共知者或被妻妾起意謀殺或姦夫起意係知情同謀姦婦皆擬斬立決姦夫仍照律擬斬監候其縱容抑勒妻妾與人通姦審有確據人所共知者如因别情將姦夫姦婦一齊殺死雖於姦所登時仍依故殺論若本夫先經縱容抑勒妻妾與人通姦後因索詐不遂殺死姦婦者將本夫依毆妻致死律擬絞監候一親屬相姦罪止杖徒及律應監候者如姦夫將本夫殺死或與姦婦商通謀死者姦婦依律問擬姦夫擬斬立決一本夫縱容及抑勒妻妾與人通姦後姦夫自殺其夫姦婦果不知情仍依縱容抑勒本條科斷不在擬絞之限一凡姦夫並無謀殺本夫之心其因本夫捉姦姦夫情急拒捕姦婦已經逃避或本夫追逐姦夫已離姦所拒捕殺死本夫姦婦並未在場及雖在場而當時喊救與事後即行首告並因别事起釁與姦無涉者姦婦仍止科姦罪外其姦夫臨時拒捕姦婦在場並不喊阻救獲而事後又不首告者應照姦夫自殺其夫姦婦雖不知情律擬絞監候一有服尊長姦卑幼之婦本夫捉姦殺死姦夫除犯時不知照律勿論外其於姦所親獲姦夫姦婦登時殺死者及非登時又非姦所或已就拘執而殺者皆照卑幼毆故殺尊長本律治罪該督撫於疏內聲明法司核擬時夾簽請㫖傷者均勿論一本夫本婦之伯叔兄弟及有服親屬皆許捉姦如有登時殺死姦夫姦婦者並依夜無故入人家已就拘執而擅殺律科罪傷者勿論若非登時以鬭殺論但卑幼不得殺尊長殺則依毆故殺尊長本律定擬法司核擬時按其情節夾簽請㫖尊長殺卑幼照服制輕重科罪一本夫登時捉姦誤殺旁人姦夫當時脫逃者除本夫照例定擬外將姦夫杖一百流三千里姦婦當官嫁賣其親屬捉姦誤殺旁人仍照定例科斷一本夫及應許捉姦之親屬除姦所捉獲非登時而殺仍照夜無故入人家例擬以杖徒外其有捉姦已離姦所非登時殺死不拒捕姦夫者照罪人不拒捕及已就拘執而擅殺律擬絞監候若雖係捕獲姦夫又因他故致斃者仍以謀故論至於已經犯姦有據又復逞凶拒捕雖非登時俱依罪人拒捕科斷一縱容妻妾與人通姦被姦夫姦婦商同謀殺傷而未死者將姦婦擬斬監候姦夫仍照謀殺人傷而不死律擬絞監候謀殺故夫父母凡改嫁妻妾謀殺故夫之祖父母父母者並與謀殺見奉舅姑罪同若妻妾被出不用此律若舅姑謀殺已故子孫改嫁妻妾依故殺律已行減二等已傷減一等若奴婢不言雇工人舉重以見義謀殺舊家長者以凡人論謂將自已奴婢轉賣他人者皆同凡人論餘條准此贖身奴婢主僕恩義猶存如有謀殺舊家長者仍依謀殺家長律科斷殺一家三人凡殺謂謀殺故殺放火行盜而殺一家謂同居雖奴婢雇工人皆是或不同居果係本宗五服至親亦是非實犯死罪三人及支解活人者但一人即坐雖有罪亦坐不必非死罪三人也為首之人淩遲處死財産斷付死者之家妻子不言女不在緣坐之限流二千里為從加功者斬財産妻子不在斷付應流之限不加功者依謀殺人律減等若將一家三人先後殺死則通論若本謀殺一人而行者殺三人不行之人造意者斬非造意者以從者不行減行者一等論仍以臨時主意殺三人者為首條例一凡殺一家非死罪三人及支解人為首監故者將財産斷付被殺之家仍銼碎死尸梟首示衆一支解人如毆殺故殺人後欲求避罪割碎死尸棄置埋沒原無支解之心各以毆故殺論若本欲支解其人行凶時勢力不遂乃先殺訖隨又支解惡狀昭著者以支解論但奏請定奪一本宗及外姻尊長殺緦麻小功大功卑幼一家非死罪主僕雇工三人者俱斬决殺期服卑幼一家主僕雇工三人者絞决若三人內有功服緦麻卑幼者仍從殺死功服緦麻卑幼三人斬决如謀占家産圖襲官職殺期服卑幼一家三人者斬决殺大功小功緦麻卑幼一家三人者淩遲處死仍各將犯人財産斷付被殺之家一家長殺奴僕非死罪三人者不分官民俱發黑龍江被殺人父母妻子悉放為民若殺期親奴僕一家三人者絞候殺內外大功小功緦麻及族中奴僕一家三人者俱斬候一凡發遣當差為奴之犯人若殺死伊管主一家三人并三人以上者除正犯淩遲處死外其知情之子孫擬斬立决不知情者擬斬監候其子孫年未及歲並該犯之妻妾俱發寧古塔等處給披甲之人為奴如已發寧古塔等處者轉發西安成都等處給駐防兵丁為奴一聚衆共毆原無必殺之心而亂毆一家三命至死者將率先聚衆之人不問共毆與否斬决為從下手傷重至死者絞候一殺一家非死罪二人及殺三人而非一家者與謀殺一人之情罪較重應擬斬决奏請定奪一殺死功服緦麻卑幼一家非死罪二命者俱問擬絞决奏請定奪仍查一明該犯財産酌斷一半給付死者之家一毆死一家二命及毆死三命而非一家者俱擬絞立决一凡殺一家非死罪三人之妻子除同謀加功及有别項情罪者仍照本律定擬外其實未同謀加功者俱改發附近充軍一凡殺一家非死罪二人及殺三人而非一家者為首之人除照例擬以斬决奏請定奪外將殺一家二命之犯財産查明酌斷一半給付死者之家其殺三人而非一家內有二人仍係一家者亦酌斷一半給付被殺二命之家倘為首之犯監故財産仍行斷給若係毆死一家二命原無必殺之心者不得援引此例採生折割人凡採生折割人者兼已殺及已傷言首淩遲處死財産斷付死者之家妻子及同居家口雖不知情並流二千里安置採生折割人是一事謂取生人耳目臟腑之類而折割其肢體也此與支解事同但支解者止欲殺其人而已此則殺人而為妖術以惑人故又特重之為從加功者斬財産家口不在斷付應流之限不加功者依謀殺人律減等若已行而未曾傷人者首亦斬妻子流二千里財産及同居家口不在斷付應流之限為從加功者杖一百流三千里不加功者亦減一等里長知而不舉者杖一百不知者不坐告獲者官給賞銀二十兩條例一凡採生折割等人如有親屬首告或捕送到官已行者正犯不免其緣坐之妻子及同居家口得同自首律免罪造畜蠱毒殺人凡置造藏畜蠱毒堪以殺人及教令人造畜者並坐斬不必用以殺人造畜者不問已未殺人財産入官妻子及同居家口雖不知情並流二千里安置教令者之財産妻子等不在比限若以蠱毒毒同居人其被毒之人父母妻妾子孫不知造蠱情者不在流逺之限若係知情雖被毒仍緣坐若里長知而不舉者各杖一百不知者不坐告獲者官給賞銀二十兩若造魘魅符書咒詛欲以殺人者凡人子孫奴婢雇工人尊長卑幼各以謀殺已行未傷論因而致死者各依本謀殺法欲止令人疾苦無殺人之心者減謀殺已行未傷二等其子孫於祖父母父母不言妻妾於夫之祖父母父母舉子孫以見義奴婢雇工人於家長者各不減仍以謀殺已行論斬若用毒藥殺人者斬監候或藥而不死依謀殺已傷律絞買而未用者杖一百徒三年知情賣藥者與犯人同罪至死減等不知者不坐條例一諸色鋪户人等貨賣砒礵信石審係知情故賣者仍照律與犯同罪外若不究明來歷但貪利混賣致成人命者雖不知情亦將貨賣之人照不應重律杖八十鬭毆及故殺人獨毆曰毆有從為同謀共毆臨時有意欲殺非人所知曰故共毆者惟不及知仍只為同謀共毆此故殺所以與毆同條而與謀有分凡鬬毆殺人者不問手足他物金刃並絞監候故殺者斬監候若同謀共毆人因而致死者以致命傷為重下手致命傷重者絞監候原謀者不問共毆與否杖一百流三千里餘人不曾下手致命又非原謀各杖一百各兼人數多寡及傷之輕重言條例一凡同謀共毆人除下手致命傷重者依律處絞外其共毆之人審係執持鎗刀等項凶器亦有致命傷㾗者發近邊充軍一凡同謀共毆人犯除下手者擬絞外必實係造意首禍之人方以原謀擬流毆有重傷而又持有凶器者方以合例發遣其但曾與謀而未造意並有重傷而無凶器有凶器而無重傷者毋得概擬流戌一凡審共毆下手擬絞人犯果於未决之前遇有原謀及助毆重傷之人監斃在獄與解審中途因而病故者准其抵命下手之人減等擬流若係配發事結之後在家病亡者不得濫改抵償仍將下手之人依律處决一凡審理命案一人獨毆人致死無論致命不致命皆擬抵償若兩人共毆人致死則以頂心𩕄門太陽穴耳竅咽喉胸膛兩乳心坎肚腹臍肚兩脅腎囊腦後耳根脊背脊膂兩後脅腰眼并頂心之偏左偏右額顱額角為致命論抵一凡同謀共毆人傷皆致命如當時身死則以後下手重者當其重罪若當時未死而過後身死者當究明何傷致死以傷重者坐罪若原謀共毆亦有致命傷又以原謀為首至亂毆不知先後輕重者有原謀則坐原謀為首無原謀則坐初鬬者為首一文武生員除謀故殺人及戲殺誤殺過失殺鬬毆殺傷人者仍照律治罪外如有武斷鄉曲倚仗衣頂橫行欺壓平民其人不敢與爭旁人不敢勸阻將人毆打至死者審實從重擬斬監候一凡凶徒好鬬生事見他人鬬毆與已毫無干涉輒敢約夥尋釁遷怒於其父母毒毆致斃者照光棍例分别首從治罪其本身與人鬬毆之後仍尋毆報復而遷怒於其父母毒毆致斃者擬斬監候一凡兩家互毆致斃人命除尊卑服制及死者多寡不同或故殺鬬殺情罪不等仍照本律定擬外其兩家各斃一命果各係凶手本宗有服親屬將應擬抵人犯免死減等發近邊充軍一凡犯死罪監候人犯在監復行凶致死人命者照前後所犯斬絞罪名從重擬以立决一兩家互毆致死一命其律應擬抵之正凶當時被死者無服親屬毆死將毆死凶手之人杖一百流三千里如被死者有服親屬毆死比照此例再減一等將毆死凶手之人杖一百徒三年仍各追埋葬銀二十兩給付尸親收領其各斃一命將應抵人犯免死減軍之案除均係同居親屬無庸追埋外或一家被殺之人與減軍之犯有不同居共財者各於犯人名下追銀二十兩給付死者家屬一凡與人鬬毆而誤殺其人之祖孫父子均依鬬殺律科罪屏去人服食凡以他物一應能傷人之物置人耳鼻及孔竅中若故屏去人服用飲食之物而傷人者不問傷之輕重杖八十謂寒月脫去人衣服飢渴之人絶其飲食登髙乘馬私去梯轡之類致成殘廢疾者杖一百徒三年令至篤疾者杖一百流三千里將犯人財産一半給付篤疾之人養贍至死者絞監候若故用蛇蝎毒蠱咬傷人者以鬬毆傷論驗傷之輕重如輕則笞四十至篤疾亦給財産因而致死者斬監候戲殺誤殺過失殺傷人凡因戲以堪殺人之事為戲如比較拳棒之類而殺傷人及因鬬毆而誤殺傷旁人者各以鬬殺傷論死者並絞傷者驗輕重坐罪其謀殺故殺人而誤殺旁人者以故殺論死者處斬不言傷仍以鬬毆論若知津河水深泥濘而詐稱平淺及橋梁渡船朽漏不堪渡人而詐稱牢固誑令人過渡以致陷溺死傷者與戲殺相等亦以鬬殺傷論若過失殺傷人者較戲殺愈輕各准鬬殺傷罪依律收贖給付其被殺傷之家過失謂耳目所不及思慮所不到如彈射禽獸因事投擲磚瓦不期而殺人者或因升高險足有蹉跌纍及同伴或駕船使風乘馬驚走馳車下坡勢不能止或共舉重物力不能制損及同舉物者凡初無害人之意而偶致殺傷人者皆准鬬毆殺傷人罪依律收贖給付被殺被傷之家以為營葬及醫藥之資條例一應該償命罪囚遇䝉赦宥俱追銀二十兩給付被殺家屬如果十分貧難者量追一半一收贖過失殺人絞罪與被殺之家營葬折銀十二兩四錢二分其過失傷人收贖銀兩數目另載圗內一凡捕役拿賊與賊格鬬而誤殺無干之人者仍照過失殺人律於犯人名下追銀十二兩四錢二分給付死者之家一凡因戲而誤殺旁人者照因鬬毆而誤殺旁人律減一等杖一百流三千里仍追埋葬銀二十兩一瘋病殺人者從犯人名下追取埋葬銀十二兩四錢二分給付死者之家一瘋病之人其親屬鄰佑人等容隱不報不行看守以致瘋病之人自殺者照不應重律杖八十致殺他人者照知人謀害他人不即阻當首報律杖一百如親屬鄰佑人等已經報明而該管官不嚴飭看守以致自殺及致殺他人者俱交部議處一凡各項埋葬銀兩地方官照數追給取具嫡屬收領然後將該犯釋放報部存案若不給付該犯係管押者仍管押係監禁者仍監禁勒限追給如揑稱給付將本犯釋放者告發之日本犯不准援免地方官一併從重議處一命案內死罪人犯有奏准贖罪者追埋葬銀四十兩給尸親收領一瘋病之人如家有嚴密房屋可以鎖錮的當親屬可以管束及婦女患瘋者俱報官交與親屬看守令地方官親發鎖􅀈嚴行封錮如親屬鎖禁不嚴致有殺人者將親屬照例嚴加治罪如果痊愈不發報官驗明取具族長地鄰甘結始准開放如不行報官及私啓鎖封者照例治罪若並無親屬又無房屋者即於報官之日令該管官驗訊明確將瘋病之人嚴加鎖錮監禁具詳立案如果監禁之後瘋病並不舉發俟數年後診驗情形再行酌量詳請開釋領回防範若曾經殺人者除照例收贖外即令永逺鎖錮雖或痊愈不准釋放如鎖禁不嚴以致瘋犯在監擾纍獄囚者將管獄有獄官嚴加參處獄卒照例嚴加治罪地方官遇有瘋病殺人之案呈報到官務取被殺之事主切實供詞并取鄰佑地方確實供結該管官詳加驗訊如有假瘋妄報除凶犯即行按律治罪外將知情揑報之地方鄰佑親屬人等照隱匿罪人知情者減罪人一等律問擬夫毆死有罪妻妾凡妻妾因毆罵夫之祖父母父母而夫不告官擅殺死者杖一百祖父母父母親告乃坐若夫毆罵妻妾因而自盡身死者勿論若祖父母父母已亡或妻有他罪不至死而夫擅殺仍絞條例一妻與夫角口以致妻自縊無傷痕者無庸議若毆有重傷縊死者其夫杖八十一凡妻妾無罪被毆致折傷以上者雖有自盡實跡仍依夫毆妻妾致折傷本律科斷殺子孫及奴婢圖賴人凡祖父母父母故殺子孫及家長故殺奴婢圖賴人者杖七十徒一年半若子孫將已死祖父母父母奴婢雇工人將家長身尸未葬圖賴人者杖一百徒三年將期親尊長杖八十徒二年將大功小功緦麻各遞減一等若尊長將已死卑幼及他人身尸圖賴人者杖八十以上俱指未告官言其告官者隨所告輕重並以誣告平人律反坐論罪若因圖賴而詐取財物者計贓准竊盜論搶去財物者准白晝搶奪論免刺各從重科斷圖賴罪重依圖賴論詐取搶奪罪重依詐取搶奪論條例一有服親屬互相以尸圖賴者依干名犯義律一妻將夫尸圖賴人比依卑幼將期親尊長圖賴人律若夫將妻尸圖賴人者依不應重律其告官司詐財搶奪者依本律科斷一故殺妾及子孫姪姪孫與子孫之婦圖賴人者俱發附近充軍一無賴凶棍遇有自盡之案冒認尸親混行吵閙毆打或將棺材攔阻打壞擡去尸首勒掯行詐者均杖一百枷號兩箇月若該管地方兵役知而不拿者各照不應重律治罪弓箭傷人凡無故向城市及有人居止宅舍放彈射箭投擲磚石者雖不傷人笞四十傷人者減凡鬬傷一等雖至篤疾不在斷付家産之限因而致死者杖一百流三千里若所傷係親屬依名例律本應重罪而犯時不知者依凡人論本應輕者聽從本法仍追給埋葬銀一十兩車馬殺傷人凡無故於街市鎮店馳驟車馬因而傷人者減凡鬬傷一等致死者杖一百流三千里若無故於鄉村無人曠野地內馳驟因而傷人不致死者不論致死者杖一百以上所犯並追埋葬銀一十兩若因公務急速而馳驟殺傷人者以過失論依律收贖給付其家條例一凡騎馬掽傷人除依律擬斷外仍將所騎之馬給與被掽之人若被掽之人身死其馬入官庸醫殺傷人凡庸醫為人用藥針刺誤不如本方因而致死者責令别醫辨驗藥餌穴道如無故害之情者以過失殺人論依律收贖給付其家不許行醫若故違本方乃以詐心療人疾病而增輕作重乘危以取財物者計贓准竊盜論因而致死及因事私有所謀害故用反症之藥殺人者斬監候窩弓殺傷人凡打捕户於深山曠野猛獸往來去處穿作坑穽及安置窩弓不立望竿及抹眉小索者雖未傷人亦笞四十以致傷人者減鬬毆傷二等因而致死者杖一百徒三年追徵理葬銀一十兩若非深山曠野致殺傷人者從弓箭殺傷論威逼人致死凡因事戶婚田土錢債之類威逼人致自盡死者審犯人必有可畏之威杖一百若官吏公使人等非因公務而威逼平民致死者罪同以上二項並追埋葬銀一十兩給付死者之家若卑幼威逼期親尊長致死者絞監候大功以下遞減一等若因行姦為盜而威逼人致死者斬監候姦不論已成與未成盜不論得財與不得財條例一凡因姦威逼人致死人犯務要審有挾制窘辱情狀其死者無論本婦本夫父母親屬姦夫亦以威逼擬斬若和姦縱容而本婦本夫愧迫自盡或妻妾自逼死其夫或父母夫自逼死其妻女或姦婦以别事致死其夫與姦夫無干者毋得概坐因姦威逼之條一凡有因强姦將本婦立時殺死者擬斬立決若强姦既成本婦羞忿自盡仍照因姦威逼致死律擬斬監候至於强姦未成或但經調戲本婦羞忿自盡者俱擬絞監候一凡强姦人妻女其夫與父母親屬聞聲赴救姦夫逞凶拒捕立時殺死其夫與父母親屬者照定例擬斬立決若强姦既成其夫與父母親屬羞忿自盡仍照威逼致死本律擬斬監候至强姦未成或但經調戲其夫與父母親屬羞忿自盡者俱擬絞監候一凡村野愚民本無圗姦之心又無手足勾引挾制窘辱情狀不過出語䙝狎本婦一聞穢語即便輕生照强姦未成本婦羞忿自盡例減一等杖一百流三千里一强姦內外緦麻以上親及緦麻以上親之妻若妻前夫之女同母異父姊妹未成本婦羞忿自盡者俱擬斬監候其强姦已成本婦羞忿自盡者俱擬斬立決一凡强姦未遂將本婦毆傷越數日後因本傷身死者照因姦威逼人致死律擬斬監候一婦人因姦有孕畏人知覺與姦夫商謀用藥打胎以致墮胎身死者姦夫比照以毒藥殺人知情賣藥者至死減一等律杖一百流三千里若有服制名分本罪重於流者仍照本律從重科斷如姦婦自倩他人買藥姦夫果不知情止科姦罪一凡因事用强毆打威逼人致死果有致命重傷及成殘廢篤疾者雖有自盡實跡依律追給埋葬銀兩發近邊充軍一凡因事威逼人致死一家二命及非一家但至三命以上者發近邊充軍若一家三命以上發邊逺充軍仍依律各追給埋葬銀兩一凡子孫威逼祖父母父母妻妾威逼夫之祖父母父母致死者俱比依毆者律斬其妻妾威逼夫致死者比依妻毆夫至篤疾者律絞俱奏請定奪一凡婦人夫亡願守志别無主婚之人若有用强求娶逼受聘財因而致死者依律問罪追給埋葬銀兩發近邊充軍一凡軍民人等因事威逼本管官致死為首者比依威逼期親尊長致死律絞為從者枷號三個月發近邊充軍一凡奉差員役執持勘合火牌照數支取而該地方官不能措辦因而自盡者勿論若奉差員役額外需索逼死印官者審實依威逼致死律杖一百加徒三年若有受賄實跡仍依枉法從重論一凡喇嘛和尚等有强姦致死人命者照光棍例分别首從定擬治罪一凡和姦之案姦婦因姦情敗露羞愧自盡者姦夫杖一百徒三年一婦女與人通姦本夫與父母並未縱容一經見聞殺姦不遂因而羞忿自盡者將姦婦擬絞監候姦夫杖一百徒三年若本夫與父母縱容通姦後因姦情敗露愧迫自盡者姦夫姦婦止科姦罪一姦夫姦婦商謀同死若已將姦婦致死姦夫並無自戕傷痕同死確據者審明或係謀故或係鬬殺核其實在情節各按本律擬以斬絞不得因有同死之供稍為寬貸若姦夫與姦婦因姦情敗露商謀同死姦婦當即殞命姦夫業經自戕因人救阻醫治傷痊實有確據者將姦夫減鬬殺罪一等律杖一百流三千里如另有拐逃及别項情節臨時酌量從重定擬尊長為人殺私和凡祖父母父母及夫若家長為人所殺而子孫妻妾奴婢雇工人私和者杖一百徒三年期親尊長被殺而卑幼私和者杖八十徒二年大功以下各遞減一等其卑幼被殺而尊長私和者各依服制減卑幼一等若妻妾子孫及子孫之婦奴婢雇工人被殺而祖父母父母夫家長私和者杖八十受財者計贓准竊盜論從重科斷私和就各該抵命者言贓追入官常人為他人私和人命者杖六十受財准枉法論條例一凡尸親人等私和人命除未經得財者仍照律擬議外如有受財者俱計贓准枉法論從重定罪同行知有謀害凡知同伴人欲行謀害他人不即阻當救護及被害之後不首告者杖一百大清律例卷二十六
