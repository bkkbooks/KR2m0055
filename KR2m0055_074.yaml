front:
  text: 欽定四庫全書大清律例卷二十九
  hash: sha256:78d1a9e0d12eab7db9fca1eff9074559988931b3119152aa2a50af87d601090e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0055_WYG_074-1a, image: WYG0673/WYG0673-0028a.png}
body:
  text: 刑律罵詈罵人凡罵人者笞一十互相罵者各笞一十罵制使及本管長官凡奉制命出使而官吏罵之者及部民罵本屬知府知州知縣軍士罵本管官若吏卒罵本部五品以上長官杖一百若吏卒罵六品以下長官各指六品至雜職各於杖一百上減三等軍民吏卒罵本屬本管本部之佐二官首領官又各遞減一等並親聞乃坐條例一凡毁罵公侯駙馬伯及京省文職三品以上武職二品以上官者杖一百枷號一箇月發落一凡在長安門外等處妄呌寃枉辱罵原問官者杖一百用一百斤枷枷號一箇月發落婦人有犯罪坐夫男若不知情及無夫男者止坐本婦照常發落佐職統屬罵長官凡首領官及統屬官罵五品以上長官杖八十若罵六品以下長官減三等笞五十佐二官罵長官者又各減二等五品以上杖六十六品以下笞三十並親聞乃坐奴婢罵家長凡奴婢罵家長者絞監候罵家長之期親及外祖父母者杖八十徒二年大功杖八十小功杖七十緦麻杖六十若雇工人罵家長者杖八十徒二年罵家長期親及外祖父母杖一百大功杖六十小功笞五十緦麻笞四十並親告乃坐以分相臨恐有讒間之言故須親聞以情相與或有容𨼆之意故須親告罵尊長凡罵內外緦麻兄姊笞五十小功兄姊杖六十大功兄姊杖七十尊屬兼緦麻小功大功各加一等若罵期親同胞兄姊者杖一百伯叔父母姑外祖父母各加罵兄姊一等並須親告乃坐弟罵兄妻比照毆律加凡人一等罵祖父母父母凡罵祖父母父母及妻妾罵夫之祖父母父母者並絞須親告乃坐條例一凡毁罵祖父母父母及夫之祖父母父母告息詞者奏請定奪再犯者雖有息詞不與准理若祖父母父母聽信後妻愛子蠱惑謀襲官職爭奪財産等項揑告打罵者究問明白不拘所犯次數亦與辨理妻妾罵夫期親尊長凡妻妾罵夫之期親以下緦麻以上內外尊長與夫罵罪同妾罵夫者杖八十妾罵妻者罪亦如之若罵妻之父母者杖六十並須親告乃坐律無妻罵夫之條者以閨門敵體之義恕之也若犯擬不應笞罪可也妻妾罵故夫父母凡妻妾夫亡改嫁其義未絶罵故夫之祖父母父母者並與罵舅姑罪同按妻若夫在被出與夫義絶及姑婦俱改嫁者不用此律又子孫之婦守志在室而罵已改嫁之親姑者與罵夫期親尊屬同若嫡繼慈養母已嫁不在罵姑之例若奴婢轉賣與人其義已絶罵舊家長者以凡人論其贖身奴婢罵舊家長者仍依罵家長本律論大清律例卷二十九
