body:
  text: 雍正三年五月二十七日奉上諭朕自臨御以來欽恤刑獄每遇法司奏讞必再三覆核惟恐稍有未協又念律例一書為用刑之本其中條例繁多若不校訂畫一有司援引斷獄得以意為輕重貽誤非小特命纂修館刻期告竣今據將所纂全稿進呈朕逐一詳覽其有應行駁正者已一一批示但明刑所以弼教關係甚大著九卿會同細看務期斟酌盡善以副朕慎重刑名之意特諭
  hash: sha256:86ad79ccc9de73801678ddb769c8d43ba32bddc77578c612195dd51af4466418
