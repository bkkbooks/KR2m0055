front:
  text: 欽定四庫全書大清律例卷四十四
  hash: sha256:cb01dce5dd079ff0bb473c7c0ba9adf638d5b1bfb6b37d99ea007d64667ec757
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0055_WYG_105-1a, image: WYG0673/WYG0673-0328a.png}
body:
  text: 發配名例例一旗人毆死有服卑幼罪應杖流折枷情節慘忍者旗員中誣告訛詐行同無賴不顧行止者犯罪免發遣例一䝉古人犯例應僉遣之妻子其隨從本夫者照例交與河南山東驛地當差如本犯已經正法其妻子單行發遣者將該犯等酌發南省駐防兵丁為奴流囚家屬例一行劫二次以上之夥盜聞拿投首者一强盜行劫數家而止首一家者如係例准自首之罪照例問發犯罪自首例一改土為流土司本犯係斬絞者家口係雲南遷往江寧貴州遷往山東廣西遷往山西湖南遷往陜西四川遷往浙江各該省城安插犯軍流罪者土司并家口係雲南四川遷往江西貴州廣西遷往安慶湖南遷往河南在省城及駐劄提督地方安插一奉天寧古塔黑龍江等處有犯枷責發遣者或係另户滿洲發直𨽻江寧山西山東河南甘肅西安寧夏涼州荆州杭州成都福建廣東等處滿洲駐防省城當差若奴僕發直𨽻等處滿洲駐防兵丁為奴一旗人犯該發遣者分發黑龍江寧古塔吉林烏喇等處當差旗人家奴發黑龍江等處為奴民人犯該發遣案內民人謊稱賣身在旗者民人謊稱八旗逃人者民人假稱逃人具告行詐者民人賣逃買逃者俱發寧古塔黑龍江等處分給披甲之人為奴一各旗家奴喫酒行凶者各省將軍處家奴喫酒行凶者一凶徒因事忿爭執持軍器毆人至篤疾者偷盜圍場木植牲畜犯至三次者旗下正身犯積匪者拿獲逃人不將實在窩留之人指出再行妄扳者移駐拉林間散滿洲有犯二次逃走尚未出境者派往各省駐防滿洲兵丁臨行及中途脫逃者僉妻改發烏魯木齊等處給與兵丁為奴一强盜免死減等者强盜已行而不得財者開窰誘取婦人子女勒賣為從者造䜟緯妖書傳用惑人不及衆者師巫假降邪神並一應左道異端之術煽惑人民為從者聚衆十人以上帶有軍器興販私鹽拒捕傷一人為從下手者叛案緣坐應給兵丁為奴者俱發黑龍江等處給披甲人為奴一發遣雲貴兩廣烟瘴刨參人犯在配脫逃者發黑龍江等處為奴姦婦抑媳同陷邪淫致媳情急自盡者盛京旗下家奴為匪逃走犯至二次者酌發駐防兵丁為奴一烏魯木齊等處安插兵民犯該軍流仍留烏魯木齊種地者復有滋事脫逃等情枷號兩個月改給烏魯木齊種地兵丁為奴一新疆各城駐劄官員兵丁跟役內如有酗酒滋事者發往伊犁等處給與兵丁厄魯特為奴如在回人各城內彼此易地調發與回人等為奴徒流遷徙地方例户例一八旗開户人等鑽營勢力欺壓孤幼贖身為民者發外省駐防將軍都統等為奴一八旗白契所買家奴鑽營勢力倚强贖身者發外省駐防將軍都統等為奴人户以籍為定例一進倉漕糧攔路戳袋挖越倉牆進倉偷米之盜不至死罪者若係另戶旗人發黑龍江寧古塔等處披甲當差若係奴僕發黑龍江寧古塔等處給披甲人為奴倉庫不覺被盜例一糧船丁舵將白土攙入漕糧至一百石以上者一糧船舵工侵米至五石以上纍丁代完者審實發遣轉解官物例一豪强鹽徒聚衆至十人以上撑駕大船張掛旗號擅用兵仗響器拒敵官兵傷一人為從者發黑龍江等處為奴鹽法例兵例一因爭鬬將鳥鎗私放傷人者旗人發往寧古塔私藏應禁軍器例一八旗正身隨車駕行而脫逃者從駕稽遲例一隨征兵丁之奴僕不曾偷盜馬匹器械逃回者伊主不願領回發黑龍江等處給披甲人為奴從征守禦官軍逃例一宰殺堪用馬三十匹以上係旗人發黑龍江當差一附京州縣及京汛地方有馬窰子宰殺馬匹者發往黑龍江給索倫兵丁為奴宰殺馬牛例刑例一反逆案內干連流犯並妻子俱流徙烏喇地方謀反大逆例一叛案內干連流犯並妻子俱流徙烏喇地方謀叛例一子孫將祖父墳塋樹木私自砍賣十株以上之旗人奴僕盜賣十株以上者盜園陵樹木例一造意為首之盜脫逃如有夥盜供出逃匿所在確實地方一年限內拿獲者將供出之夥盜一未傷人之盜首聞拿投首者窩家盜線聞拿投首者親屬首告者一强盜情有可原者一老瓜賊內跟隨學習技藝未同行者一尋常盜劫未經傷人之夥犯如止在外瞭望者接遞財物者並未入室搜贓者被人誘脅隨行者年嵗尚未成丁者行劫止此一次者俱發黑龍江等處給披甲人為奴强盜例一白晝搶奪下手為從者白晝搶奪例一竊盜拒捕殺人為從者一竊盜三犯計贓五十兩以下至三十兩者發遣隨駕官員之奴僕不曾偷盜馬匹器械逃回伊主不願領回者發黑龍江等處為奴竊盜例一䝉古民人偷竊蒙古四項牲畜六匹至九匹者發雲貴兩廣烟瘴地方三匹至五匹者發湖廣福建江西浙江江南等處一二匹者發山東河南等處俱交驛地當苦差䝉古偷竊四項牲畜為從之犯所罰三九牲畜全數無完者發往山東河南等處交與驛站當苦差一䝉古民人偷竊行圍巡幸地方馬匹三匹至四匹者發雲貴兩廣烟瘴地方一二匹者發湖廣福建江西浙江江南等處充軍一偷竊右衛地方八旗官兵所養馬駝一二匹者發山東河南等處三匹至五匹者發湖廣福建江西浙江江南等處六匹至九匹者發雲貴兩廣烟瘴地方俱交驛地當苦差一奉天旗人盜竊牛馬十匹以上及盜殺者應得軍流等罪酌發駐防省城分别當差為奴盜馬牛畜産例一旗下家奴潛匿禁山刨參治罪管束後再逃往禁山者即發黑龍江等處給披甲人為奴一偷刨人參人至百名以上參至五百兩以上為從發雲貴兩廣烟瘴地方旗下家奴發駐防兵丁為奴一旗下家奴身充財主雇人刨參不論參數多寡及積年在外逗遛已過三冬者發駐防兵丁為奴一拿獲圍場內賊犯若盜砍木植偷打牲畜審係初次二次發往烏魯木齊等處種地犯至三次發往烏魯木齊等處給兵丁為奴盜田野榖麥例一凶惡光棍好鬬之徒生事行凶無故擾害良人者發往寧古塔烏喇地方官員有犯該部奏聞發遣恐嚇取財例一盛京烏喇等處居住之人若不詳詢來歷混買人者係另户連妻子發江寧杭州披甲係家人正將本人發往江寧杭州給窮披甲之人為奴一凡誘拐婦人子女及迷拐幼小子女為從者發遣一凡和誘知情之人為首者亦照例發遣奴及雇工和誘家長之期功以下親屬發遣一夥衆開窰誘取婦人子女藏匿勒賣為從者一凡誘拐人口為首擬絞免死減等者略人略賣人例一圖財害命不行而分贓者傷人未死而已得財不加功者謀殺人例一家長殺奴僕非死罪三人者不分官民俱發黑龍江一發遣當差為奴之犯殺管主一家三人并三人以上未及年嵗子孫並妻妾俱給寧古塔等處披甲人為奴如己給寧古塔等處者轉給西安成都等處駐防兵丁為奴殺一家三人例一八旗兵丁因管教將本管官戳死者其妻子發遣黑龍江毆制使及本管官例一平人將族中家僕刃殺者發黑龍江當差一家主占奪奴僕之妻或圖姦不遂因將奴僕毒毆或將其妻致死確有實據者不分官員平人發黑龍江當差奴婢毆家長例一駐防旗人與民人奸匪交結揑寫匿名揭帖傾陷平人之父母妻子俱發黑龍江給披甲人為奴投匿名文書告人罪例一偷參為從人犯誣扳良民為財主及率領頭目者枷號兩個月誣告例一貪贓官役罪至死減等發落者及罪不至死擬流者並發川陜邊省按原罪定地逺近安插官吏受財例一用銅鐵錫鉛藥煮僞造假銀騙人行使為首者係旗人另户枷號兩個月鞭一百發黑龍江當差係家人枷號兩個月鞭一百發黑龍江給披甲人為奴一私鑄銅錢錢數不及十千者一私造鉛錢不及十千為首及匠人一私鑄銅錢為從及知情行使者私鑄銅錢例一指稱雞姦誣害人罪至斬決者問遣一强姦十二嵗以下幼女幼童未成者犯姦例一旗人造賣賭具為首之旗人三犯者係在京八旗各省駐防旗人發黑龍江等處當差係盛京等處旗人發西安等處駐防當差賭博例一罪人事發在逃有拒捕者若犯該極邊烟瘴充軍改發黑龍江等處為奴罪人拒捕例一原犯極邊烟瘴充軍越獄脫逃者改發黑龍江等處為奴獄囚脫監及反獄在逃例一免死減軍人犯三次脫逃審無行凶為匪者發寧古塔等處為奴一雲貴兩廣極邊烟瘴脫逃者改發黑龍江等處為奴一調發極邊烟瘴充軍脫逃改發黑龍江等處為奴一蒙古發遣人犯脫逃如係原發山東河南者初次調發福建湖廣等省加枷號一個月二次調發雲貴兩廣極邊烟瘴加枷號兩個月三次仍發回原調處所加枷號三個月原發福建湖廣等省者以次調發極邊烟瘴而止䝉古免死減軍在配脫逃者亦一體加調徒流人逃例一押解新疆人犯中途脫逃如係疏縱一年限滿無獲將為首情重者改發伊犁等處為奴主守不覺失囚例一新疆地方死罪監候人犯凡經秋審緩決二次及情實三次未勾者發雅爾地方為奴有司決囚等第例大清律例卷四十四
