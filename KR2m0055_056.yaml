body:
  text: 兵律關津私越冒度關津凡無文引私度關津者杖八十若關不由門津不由渡别從間道而越度者杖九十若越度緣邊關塞者杖一百徒三年因而潛出交通外境者絞監候守把之人知而故縱者同罪至死減一等失於盤誥者官各減三等罪止杖一百軍兵又減一等並罪坐直日者若有文引冒他人名度關津者杖八十家人相冒者罪坐家長守把之人知情與同罪不知者不坐其將無引馬騾私度冒度關津者杖六十越度杖七十私度謂人有引馬騾無引冒度謂馬騾冒他人引上馬騾毛色齒歲越度謂人由關津馬騾不由關津而度條例一凡雇倩口內之人往口外種地及砍木燒炭者戶工二部照例給票出口回日仍察收無票之人令各處察拿若揑稱種地及砍木燒炭名色起票前往而將票轉賣與人及買者一併拿送該部治罪一凡民人無票私出口外者杖一百流二千里緣邊關口每季將出入人數造册取具並無匪類出口印甘各結申報倘守口官不驗明印票及賄縱出入該管官察出即行詳報該管將軍督撫提鎮題參交部嚴行治罪若該管將軍督撫提鎮通同徇庇不行查參及稽查不嚴以致匪類越境生事者一併從重議處一凡土官土人如有差遣公務應赴外省者呈明本管官轉報督撫給咨并知會所往省分督撫令事竣勒限毋許逗遛仍知照本省督撫倘不請咨牌私出外省土官革職土人照無引私度關津律杖八十遞回如潛往外省生事為匪别經發覺除實犯死罪外徒罪以上俱照軍人私出外境虜掠不分首從發邊逺充軍律遞回照例枷責同家口父母兄弟子姪一并遷徙安插其不行管束之該管官及失於查報之外省地方官均交部議處一緣邊關口有熟識路徑姦徒引領遊民私自偷越或受賄引送夾帶違禁貨物之人出口者除將偷越及夾帶本犯各照律分别治罪外其引送之人如審係僅圖微利並無别情者照違制律杖一百加枷號一個月交該管官嚴行管束如偷越之人出口别有姦謀該犯明知引送婪索多贓照守把之人知情故縱律治罪兵辨失於查拿照例參處一指引逃匪偷越出口之犯如實係不知逃匪情由僅止私行引送者仍照違制律問擬外若明知逃匪故行引送者照故縱律與犯人同罪至再犯三犯者各按本罪以次遞加得財故縱者計贓從重論私役弓兵凡私事役使弓兵者一人笞四十每三人加一等罪止杖八十每名計役過一日追雇工銀八分五釐五毫入官當該官司應付役使者同罪罪坐所由應付之官吏詐冒給路引凡不應給路引之人謂配遣囚徒安置家口之類而給引及軍詐為民民詐為軍若冒名告給引及以所給引轉與他人者並杖八十若於經過官司停止去處倒換另給路引及官豪勢要之人囑託軍民衙門擅給批帖影射人貨出入者各杖一百若官吏人匠供送文引年深於原任原役衙門告給新引照身回還者不在此限當該官吏聽從及知情給與者指上三件並同罪若不從及不知者不坐若巡檢司越分給引者罪亦如之依聽從知情律其應給衙門不立文案空押路引私填與人者杖一百徒三年受財者分有祿無祿計贓以枉法及有所規避者或販禁貨通番或避罪犯出境各從重論關津留難凡關津往來船隻守把之人不即盤詰驗文引放行無故阻當者一日笞二十每一日加一等罪止笞五十坐直日若取財者照在官人役取受有事人財例以枉法計贓科罪若官豪勢要之人乘船經過關津不服盤驗者杖一百若撑駕渡船梢水如遇風浪險惡不許擺渡違者笞四十若不顧風浪故行開船至中流停船勒要船錢者杖八十因而殺傷人者以故殺死傷未死論或不曾勒要船錢止是不顧風浪因而沉溺殺傷人者以過失科斷遞送逃軍妻女出城凡在京守禦官軍遞送逃軍妻女出京城者絞雜民犯者杖一百若各處守禦城池及屯田官軍遞送逃軍妻女出城者杖一百徒三年民犯者杖八十受財者計贓以枉法從重論分有祿人無祿人其逃軍買求者罪同若逃罪重者仍從本罪論守門之人知情故縱者與犯人同罪失於盤詰者官減三等罪止杖一百軍人又減一等若遞送非逃軍妻女出城者如犯罪取發而妻女私還原籍之類但不係逃者皆是杖八十有所規避者如刁姦誘賣或犯罪法應緣坐從重論依送令隱避從重論盤詰姦細凡緣邊關塞及腹裏地面但有境內姦細走透消息於外人及境外姦細入境內探聽事情者盤獲到官須要鞫問接引入內起謀出外之人得實不分首從皆斬監候經過去處守把之人知而故縱及隱匿不首者並與犯人同罪至死減等失於盤詰者官杖一百軍兵杖九十罪坐直日者條例一交結外國及私通土苗互相買賣借貸誆騙財物引惹邊釁或潛住苖寨教誘為亂如打劫民財以強盜分别貽患地方者除實犯死罪如越邊關出外境將人口軍器出境賣與硝黃之類外俱問發邊遠充軍一沿邊關塞及腹裏地面盤詰姦細處所有歸復鄉土人口被獲到官查審明白即行起送歸籍有妄作姦細希圖冒功者以故入人罪論若實係姦細能首降者亦一體給賞安插一凡州縣城鄉十户立一牌頭十牌立一甲頭十甲立一保長戶給印牌一張書寫姓名丁數出則注明所往入則稽其所來其客店亦令各立一簿每夜宿客姓名幾人行李牲口幾何作何生理往來何處逐一登記明白至於寺觀亦分給印牌上寫僧道口數姓名稽察出入如有虛文應事徒委捕官吏胥需索擾害者該上司查參治罪一凡盤獲形迹可疑之船貨物人數不符稅單牌票者限三日內查明果係商船即速放行如係賊船交與地方官審鞫有無行劫按律例分别治罪如巡緝官兵以賊船作為商船釋放者照諱盜例治罪以商船作為賊船擾害者照誣良為盜例治罪索取財物者拏問該管上司失察照例議處一沿栁條邊之蒙古地方有內地民人種地居住者交與渣薩克等十家內設立一長逐戶嚴查不許間人存留取具十家長保結如民人內有隱匿內地逃人者著該渣薩克將逃人與隱匿逃人之民人一併查拏解部治罪一沿邊近蒙古地方令汛渡辨兵將貿易割草人於去時登記人數回時照數稽查如有發遣人犯混入逃匿即行文知會蒙古拏送該處照本犯原罪分别治罪倘辨兵踈縱脫逃漫無覺察將辨員交部議處兵照失於盤詰律治罪若蒙古知係內地逃犯仍容留隱匿者照窩藏逃人例治罪一廣東省窮民趕山搭寮取香砍柴燒炭種麻種靛等項令各州縣每寮給牌遇有遷徙消長赴縣添除違者寮長照脫漏戶口律治罪倘窩藏姦宄勾通匪類寮長不報官究治或被旁人首告者照總甲容留棍徒例治罪如有不赴官報明徑自搭寮居住者照盜耕田畞律治罪山主不經官驗準私令批佃搭寮者照違令律治罪若文武各官漫不約束以致藏姦該督撫即行題參交部議處一浙江江西福建等省棚民在山種麻種靛開爐扇鐵造紙做菰等項責成山地主並保甲長出具保結造册送該州縣官照保甲之例每年按戶編查並酌撥官辨防守該州縣官於農隙時務會同該營汛逐棚查點毋得懈弛如有窩匪姦盜等事山地主並保甲長不行首告照連坐律治罪該管官失察交部議處私出外境及違禁下海凡將馬牛軍需鐵貨未成軍器銅錢緞匹紬絹絲綿私出外境貨賣及下海者杖一百受雇挑擔馱載之人減一等物貨船車並入官於內以十分為率三分付告人充賞若將人口軍器出境及下海者絞監候因而走泄事情者斬監候其該拘束官司及守把之人通同夾帶或知而故縱者與犯人同罪至死減等失覺察者官減三等罪止杖一百軍兵又減一等罪坐直日者若守把之人受財以枉法論條例一各邊將官并管軍頭目私役及軍民人等私出境外釣豹捕鹿砍木掘鼠等項并把守之人知情故縱該管里老兵目軍吏扶同隱蔽者除實犯死罪外其餘俱發煙瘴地面民發為民軍發充軍一凡民人偷越定界私入臺灣番境者杖一百如近番處所偷越深山抽藤釣鹿伐木採棕等項杖一百徒三年其本管頭目鈐束不嚴杖八十鄉保社長各減一等巡查不力之值日兵役杖一百如賄縱計贓從重論一凡沿海地方姦豪勢要及軍民人等私造海船將帶違禁貨物下海前往番國買賣潛通海賊同謀結聚及為鄉道劫掠良民者正犯比照謀叛已行律處斬梟示全家發近邊充軍其打造海船賣與外國圖利者造船與賣船之人為首者立斬為從者發近邊充軍若將船隻雇與下海之人分取番貨及糾通下海之人私行接買番貨與探聽下海之人番貨到來私買販賣蘇木胡椒至一千斤以上者俱發近邊充軍番貨並入官一商漁船隻不分單桅雙桅悉從民便造船時呈報州縣官查取澳甲戶族里長鄰佑保結方準成造完日報官親驗給照開明在船人年貌籍貫並商船所帶器械件數及船內備用鐵釘等物數目以便汛口察驗若商漁船內夾帶違禁硝黃釘鐵樟板等物接濟外洋者船戶以通賊論斬舵工水手知情同罪不知情者皆杖八十徒二年原保結之人皆杖一百徒三年若船主在籍而船隻出洋有事並責問船主承察取結之該地方官及泛口盤察之文武各官俱革職賣放者革職流二千里其稅關衙門先驗看地方官印照然後給牌有妄給者亦照地方官例議處若汛口盤察挂號文武各官有勒索踈縱者亦交與該部議一船隻出洋十船編為一甲取具連環保結一船為非餘船並坐餘船能將為非船戶首捕到官者免其坐罪初出口時必於泛口挂號將所有船照呈送地方官或營官驗明填注日月蓋印放行入口時呈驗亦如之總計經過省分一省必挂一號回籍時仍於本籍印官處送照查驗違者治罪如有不由各泛偷越外洋者船戶船工人等並富民謀利自造商船租與他人及租之者俱各杖一百枷號三箇月失察及知情之該管各官俱交該部議一凡商漁船隻分别書刻字樣其營船刋刻某營第幾號哨船舵工水手人等俱各給與腰牌刋明姓名年貌籍貫如船無字號人有可疑即嚴加究治至漁船出洋不許裝載米酒進口不許裝載貨物違者嚴加治罪其守口之文武各官不行盤查照例議處一往販外夷之大洋船準其攜帶炮位每船炮不得過二門火藥不得過三十斤其鳥鎗弓箭腰刀等項亦仍準攜帶至製炮之時該船戶呈報地方官給照赴官局製造完日官驗鑿船戶籍貫姓名及製造年月字樣仍於縣照內注明所帶炮位輕重大小以備關口官辨盤驗回日即行繳庫開船再領倘遭風沉失令船戶客商具結報明所在地方官免其治罪如船隻無恙妄稱沉失查究照接濟外洋例治罪一沿海一應採捕及內河通海之各色小船地方官取具澳甲鄰佑甘結一體印烙編號給票查驗如有私造私賣及偷越出口者俱照違禁例治罪甲鄰不行呈報一體連坐倘船隻有被賊押坐出洋者立即報官將船號姓名移知營汛緝究容隱不首日後發覺以接濟洋盜治罪其呈報遭風船隻必查訊實據方準銷號揑報者即行究治一附近苗疆五百里以內民人煎穵窩囤興販硝黃事發如在十斤以下杖一百其十斤以上者杖六十徒一年二十斤以上者按照五徒以次遞加五十斤以上者杖一百流二千里八十斤以上者杖一百流二千五百里一百斤者杖一百流三千里多至百斤以上者照合成火藥賣與鹽徒例發近邊充軍若囤積未曾興販減私販罪一等熖硝每二斤作硫黃一斤科斷鄰保挑夫船戶照例分别發落其該地銀匠藥鋪染房需用硝黃地方官照例給批定限每次不得過五斤違者治罪一沿邊沿海地方有將黃金販賣出洋者照鐵貨銅錢等物私出外境下海律治罪一姦民圖利將廢鐵鐵貨潛出邊境及海洋貨賣一百斤以下者杖一百徒三年一百斤以上及舟車捆載者發近邊充軍若賣與外國及海邊賊冦者照將軍器出境下海律絞監候關隘官辨徇私故縱照例議罪如內地貨賣官辨兵役借端索詐計贓治罪其漢夷船隻有將鐵鍋出洋貨賣者亦照此例行至商船每日煮食之鍋照舊置用官吏不得借端勒索滋擾一商人收買鐵斤除近苖産鐵處所令呈明該地方官外其內地興販悉從民便若在沿海地方遞運鐵斤交賣商漁船隻為首照將軍器出境下海律絞監候為從杖一百流三千里船户挑夫減本犯罪二等一出海樵採船隻每船準帶食鍋一口外每名許攜斧斤一把在船人數不得過十人俱注明照內出入查驗若有夾帶出口及進口缺少即行嚴究治罪一姦徒偷運米榖潛出外洋接濟姦匪者擬絞立決若止將米榖偷運出口圖利並無接濟姦匪情弊者米過一百石發近邊充軍一百石以下杖一百徒三年不及十石者枷號一箇月杖一百為從及船戶知情不首告者各減一等榖每二石作米一石科斷以上船隻貨物俱入官汛口文武各官失察故縱交部照例分别議罪一凡外國貢船到岸未曾報官盤驗先行接買番貨及為外國收買違禁貨物者俱發近邊充軍一凡外國差使臣人等朝貢到京與軍民人等交易止許光素紵絲絹布衣服等件不許買黃紫黑皂大花西番蓮縀匹並不得收買史書及一應違禁軍器硝黃牛角銅鐵等物如有將違禁貨物圖利賣與進貢外國者為首依私將應禁軍器出境因而走泄事情律斬監候為從發近邊充軍一姦商販賣軍器與土司番蠻者杖一百發邊遠充軍該管官知情故縱者罪同不知情者道府州縣官及武職專管兼轄官並該管督撫提鎮俱交該部照例分别議處一興販鴉片煙照收買違禁貨物例枷號一箇月發近邊充軍如私開鴉片煙館引誘良家子弟者照邪教惑衆律擬絞監候為從杖一百流三千里船户地保鄰佑人等俱杖一百徒三年如兵役人等藉端需索計贓照枉法律治罪失察之汛口地方文武各官並不行監察之海關監督均交部嚴加議處一凡沿海船隻在朝鮮國境界漁採及私行越江者被朝鮮國人捕送嚴行治罪將該地方官員交部查議一凡盜賊前往朝鮮國劫掠者該國王即行追拿殺戮生擒解送其飄風船隻人內實係有票並未生事者照例送回若無票匪類妄行生事該國王即照伊律審擬咨部具題請旨完結倘伊國防汛之員不能擒獲題參治罪該國王一併交部議處一閩省不法棍徒如有充作客頭在沿海地方引誘偷渡之人包攬過臺索取銀兩用小船載出澳口復上大船者為首發近邊充軍為從及澳甲地保船户舵工人等知而不舉者俱杖一百徒三年均不準折贖其偷渡之人照私度關津律杖八十遞回原籍倘姦徒中途有謀害情事人已被害身死者將同謀之人不分首從俱照江洋行劫大盜例擬斬立決梟示如被害未死將為首者比照強盜傷人例擬斬立決同謀之人照未傷人之夥盜免死減等例發寧古塔等處給披甲人為奴雖未同謀下手但同船知情不首告者杖一百徒三年若有船戶私攬無照之人偷載過臺及將哨船偷載圖利者俱照此例分别治罪如拿獲偷渡人犯訊明從何處開船將失察姦船及隱匿不報之文武官辨交部分别議處一臺灣流寓之民凡無妻室者應逐令過水交原籍收管其有妻子田産者如犯歃血訂盟誘番殺人揑造匿名揭帖強盜窩家造賣賭具應擬斬絞軍流等條除本犯依律例定擬外此內為從罪輕之人並教唆之訟師均應審明逐令過水其越界生事之漢姦如在生番地方謀占番田並勾串棍徒包攬偷渡及販賣鴉片煙者亦分别治罪逐令過水一在番居住閩人實係康熙五十六年以前出洋者令各船户出具保結準其搭船回籍交地方官給伊親族領回取具保結存案如在番回籍之人查有揑混頂冒顯非善良者充發􅊚瘴地方至定例之後仍有託故不歸復偷渡私回者一經拿獲即行請旨正法一凡守把海防武職官員有犯聽受外番金銀貨物等項值銀百兩以上許令船貨私入串通交易貽害地方及引惹番賊海寇出沒戕殺居民除實犯死罪外其餘俱發邊遠充軍一洋船挂驗出口之時該汛辨詳細驗明押交前途各汛押送俟放洋後方許回汛如船戶有違禁攬載偷渡者一經拿獲即嚴行究擬兵役按拿獲偷渡人犯名數給賞十名以上各賞銀二兩每過十名遞加二兩至五十名以上各賞銀十兩即於該船戶名下追出充用倘不實力查拿以致疏脫十名以上者兵役各責二十板每過十名加責十板至四十名以上各責四十板革役五十名以上枷號一個月發落專管兼轄官分别議處其洋船回時如有照外多載或頂充偷渡及潛匿不回等弊船戶舵水俱照窩藏盜賊例治罪出結之族鄰行保杖一百徒三年承查出結及汛口盤查各員交部議處有贓革職杖一百流二千里仍計贓從重論如出洋之人果有病故等情令同往之人及船戶舵水具結存案一各邊兵役出境巡察或探聽賊情若與賊人私擅交易貨物者除實犯死罪外其餘問發煙瘴地面充軍一奉天錦復雄蓋四城俱係海疆嗣後無論天津山東等處商船俱著於設有官兵處所停泊上岸以便稽查仍飭輪班兵役嚴行訪查如拿獲無票船隻私渡民人者船戶民人俱照越度緣邊關塞律治罪船隻入官若有票商船私帶票內無名之人查出將本人照私度關津遞回原籍船戶照違制律治罪船隻免其入官一凡將豆麥雜糧偷運出洋接濟姦匪者照偷運米榖例擬絞立決如止圖漁利並無接濟姦匪情事計所偷運石數照二榖一米之例分别科斷其為從及知情不首之船戶亦照米石例減等問擬船隻貨物入官失察各官照例議處一凡商民出洋將紅黃銅器銅斤私販各洋貨賣圖利為首者照姦民圖利將廢鐵鐵貨潛出海洋貨賣例一百斤以下者杖一百徒三年一百斤以上發近邊充軍為從及船戶各減一等貨物銅斤船隻入官其關汛文武員辨失察故縱賣放者分别議處治罪一凡臺灣流寓之人如有過犯罪止杖笞以下查有妻室田産者照常發落免其驅逐至犯該徒罪以上及姦盜詐偽恃強生事擾纍地方者審明之日一槩押回原籍治罪不許再行越度承審各官不行遞逐容留在臺者該督撫查參交部分别議處一絲斤違例出洋過一百斤照米石出洋例發近邊充軍不及百斤者杖一百徒三年不及十斤者枷號一個月杖一百為從及船戶知情不首告者各減一等船隻貨物入官其違例偷漏紬緞綿絹等物按照絲斤分兩多寡分别治罪失察之汛口文武各官並照失察米石出洋例分别議處一沿海採捕出洋船隻務將本船作何生業貿易於照內詳細填注俟到口上岸之日稽查官辨令將貨物核對除與原照相符者即行放進外若貨物與照內不符即時盤詰如係來厯不明移交地方官審鞫或來厯有因亦詳記檔簿遇洋面報有失事地方官即開具失單關查各口設有被竊日期并所失貨物與檔簿相符者立即根究嚴拿仍飭兵役人等不得藉端索詐掯留射影滋事如有失察故縱及擾纍無辜情弊各照諱盜誣良例分别治罪一出洋船隻除商船仍將在船舵水人等並填給照外其漁船止將船主年貌姓名籍貫及作何生業開填入照并將船甲字號大書深刻於桅篷船傍出口時責成守口員辨將該船前往何處作何生業并在船舵水年貌姓名籍貫逐一查填照後鈐蓋印戳並將所填人數照登號簿遇有一船為匪按簿查緝倘州縣官將照給與匪人及汛口文武員辨查填不實均交部分别議處一租賃船隻出洋為匪之案除犯該徒罪以下船主不知情者仍照自造商船租與他人例杖一百枷號三個月外其犯該流罪以上者船主雖不知情照夾帶違禁貨物接濟外洋原保結之人治罪例杖一百徒三年船隻入官充賞失察地方官照例議處如船主實有事故不能親自出洋别令親屬押駕許赴地方官呈明取結將親屬開填入照方許出洋如未呈明以頂冒論罪一海關各口如遇往洋船隻倒换照票務須查驗人數登填簿籍鈐蓋印戳始準放行進口時責成該委員吏役稽查其有人照不符船貨互異即送地方官審究如失於查察致匪船濫出濫入審明係何處口岸有委員者將該委員照例議處無委員者將該吏役責革加枷號一個月并將失察之該管官交部議處倘關口員役藉端需索照例分别參處治罪一內洋失事仍照例文武帶同事主會勘外如外洋失事聽事主於隨風飄泊進口處帶同舵水赴所在文武衙門呈報該衙門即訊明由何處放洋行至被劫處所約有里數若干即將事主開報贓物報明各該管印官該文武印官查照洋圖定為何州縣營汛所轄飛關所轄州縣會營差緝事主即豫寧釋毋庸候勘至詳報督撫衙門無論內外洋失事以事主報到三日內出詳馳遞以便據報行查海關各口將稅簿贓單互相較核有貨物相符者即將盜船夥黨姓名呈報關拿至守口員辨倘有規避處分互相推卸或指使揑報他界者將推委員辨交部照例議處其稽查關口員役如於未接文檄之先能查出匪船拿獲稟報者分别議敘吏役酌量給賞如奉到文檄能按照單簿據實查出飛移所在地方將盜犯拿獲者免其處分大清律例卷二十
