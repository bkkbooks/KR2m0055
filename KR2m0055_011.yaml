body:
  text: 經筵講官太子太保東閣大學士兼禮部尚書兼管户部尚書事務加六級律例館總裁官臣徐本等謹題恭承勅㫖纂刻大清律例今已成書謹奉表上進者伏以帝徳好生玉律重慈祥之義皇心勅法丹書昭欽恤之仁布解澤於離明有倫有要寓春溫於秋肅是訓是行曲成不遺咸中有慶臣等誠惶誠恐稽首頓首上言竊惟上古之世修德而後修刑三代以還敬官必先敬典自三章九章而後更張潤色漸涉繁蕪溯五刑五用之初撻記侯明宜歸畫一惟我朝之憲典經列聖之精詳綱舉目張象魏懸而民知敬聽衡平鑑朗令甲布而吏罔深文欽惟皇帝陛下道隆參贊徳懋中和瑞靄春田列井有囷倉之樂明澄秋鏡圜扉多芝菌之祥臨以簡而御以寛痌瘝念切罪惟輕而功惟重軫恤時殷迺於乾隆元年欽遵世宗憲皇帝明訓於律例全書更加釐定化民成俗祗期執兩而用中載徳行仁將使囘心而向道特命臣等悉心叅酌揆理準情縁情定法寛嚴胥協統歸睿鑒之精純疑似盡捐全賴宸衷之昭徹反復於三刺三宥千百國順帝則而不知簡孚於五罰五辭億萬年遵王路而無斁臣等才慚聽斷雖式敬之維殷志切平反幸簡編之甫竟伏願泰符凝命乾徳體元修五禮以牖民率教者造之黨庠術序協三才而建極從欲者逮於侯甸要荒將見文成象緯占貫索而長銷草臥桁楊畫衣冠而永治矣臣等無任瞻天仰聖激切屏營之至謹奉表隨進以聞
