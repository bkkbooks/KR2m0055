  text: 欽定四庫全書大清律例卷十三
  hash: sha256:8f9912b420cddd34e9d8f50d4692ff43612b677d1d1dd188b725a830adba11d5
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0055_WYG_042-1a, image: WYG0672/WYG0672-0595a.png}
body:
  text: 戶律課程課者稅物之錢程者謂物有貴賤課有多寡如地利之有程限也鹽法一十一條凡犯無引私鹽凡有確貨即是不必贓之多少者杖一百徒三年若帶有軍器者加一等流二千里鹽徒誣指平人者加三等流三千里拒捕者斬監候鹽貨車船頭匹並入官道塗引領稱手牙人及窩藏鹽犯寄頓鹽貨者杖九十徒二年半受雇挑擔馱載者與例所謂肩挑背負者不同杖八十徒二年非應捕人告獲者就將所獲私鹽給付告人充賞同販中有一人能自首者免罪一體給賞若一人自犯而自首止免罪不賞仍追原贓若私鹽事發止理見獲人鹽如獲鹽不獲人者不追獲人不獲鹽者不坐當該官司不許聽其展轉攀指違者官吏以故入人罪論謂如人鹽同獲止理見發有確貨無犯人者其鹽沒官不須追究凡鹽場竈丁人等除歲辦正額鹽外夾帶餘鹽出場及私煎鹽貨賣者同私鹽法該管總催知情故縱及通同貨賣者與犯人同罪凡婦人有犯私鹽若夫在家或子知情罪坐夫男其雖有夫而逺出或有子幼弱罪坐本婦決杖一百餘罪收贖凡買食私鹽者杖一百因而貨賣者杖一百徒三年凡管理鹽務及有巡緝私鹽之責文武各衙門巡獲私鹽即發有司歸勘原獲各衙門不許擅問若有司官吏通同原獲各衙門脫放者與犯人同罪受財者計贓以枉法從其罪之重論凡管理鹽務及有巡緝私鹽之責文武各衙門設法差人於該管地面并附場緊關去處常川巡禁私鹽若有透漏者關津把截官及所委巡鹽人員初犯笞四十再犯笞五十三犯杖六十公罪並留職役若知情故縱及容令軍兵隨同販賣者與犯人同罪私罪受財者計贓以枉法從重論其巡獲私鹽入已不解官者杖一百徒三年若裝誣平人者加三等杖一百流三千里凡起運官鹽每引照額定斤數為一袋並帶額定耗鹽經過批驗所依引目數掣摯稱盤隨手取袋摯其輕重但有夾帶餘鹽者同私鹽法若客鹽越過批驗所不經掣摯及引上不使關防者杖九十押回逐一盤驗盡盤鹽而驗之有餘鹽以夾帶論罪凡客商販賣有引官鹽當照引發鹽不許鹽與引相離違者同私鹽法其賣鹽了畢十日之內不繳退引者笞四十若將舊引不繳影射鹽貨者同私鹽法凡起運官鹽并竈戶運鹽上倉將帶軍器及不用官船起運者同私鹽法凡客商將驗過有引官鹽插和沙土貨賣者杖八十凡將有引官鹽不於拘定應該行鹽地面發賣轉於别境犯界貨賣者杖一百知而買食者杖六十不知者不坐其鹽入官條例一越境如淮鹽越過浙鹽地方之類興販官司引鹽至三千斤以上者問發附近地方充軍其客商收買餘鹽買求掣摯至三千斤以上者亦照前例發遣經過官司縱放及地方甲鄰里老知而不舉各治以罪巡捕官員乘機興販至三千斤以上亦照前例問發須至三千斤不及三千斤在本行鹽地方雖越府省仍依本律一凡偽造鹽引印信賄囑運司吏書人等將已故并逺年商人名籍中鹽來歷填寫在引轉賣誆騙財物為首者依律處斬外其為從并經紀牙行店戶運司吏書一應知情人等但計贓滿數應流者不拘曾否支鹽出場俱發近邊充軍一各鹽運司總催名下該管鹽課納完者方許照名填給通關若不曾納課總催買囑官吏并覆盤委官假指課已上倉指上囤扶同作弊者俱問發近邊充軍一各處鹽場無籍之徒號稱長布衫趕船虎光棍好漢等項名色把持官府詐害客商犯該徒罪以上及再犯杖罪以下者俱發近邊充軍一凡豪強鹽徒聚衆至十人以上撑駕大船張挂旗號擅用兵仗響器拒敵官兵若殺人及傷三人以上者比照強盜已行得財律皆斬為首者仍梟首示衆傷二人者為首斬決為從絞監候傷一人者為首斬監候為從發黑龍江等處給與披甲人為奴其雖拒敵不曾殺傷人為首絞監候為從流三千里若貧難軍民將私鹽肩挑背負易米度日者不必禁捕一凡兵民聚衆十人以上帶有軍器興販私鹽拒捕殺人及傷三人以上為首并殺人之犯斬決傷人之犯斬監候未曾下手殺傷人者發近邊充軍傷二人者為首斬下手者絞俱監候傷一人者為首絞監候下手者發黑龍江等處給與披甲人為奴為從滿流其雖帶有軍器不曾拒捕者為首發近邊充軍為從流二千里若十人以下拒捕殺人不論有無軍器為首者斬下手者絞俱監候不曾下手者發近邊充軍傷至二人以上者為首者斬監候下手之人絞監候止傷一人者為首絞監候下手之犯杖一百流三千里其不曾下手者仍照私鹽本律治罪其不帶軍器不曾拒捕不分十人上下仍照私鹽律杖一百徒三年若十人以下雖有軍器不曾拒捕者為首亦照私鹽帶有軍器加一等律杖一百流二千里為從杖一百徒三年其失察文武各官交部議處有拿獲大夥私販者交部議敘一凡竈丁販賣私鹽大使失察者革職知情者枷號一個月發落不準折贖該管上司官俱交該部議處一凡回空糧船如有夾帶私鹽闖閘闖關不服盤查聚至十人以上持械拒捕殺人及傷三人以上者為首并殺人之人擬斬立決傷人之犯斬監候未曾下手殺傷人者發近邊充軍其雖拒捕不曾殺傷人為首絞監候為從流三千里十人以下拒捕殺傷人者俱照兵民聚衆十人以下例分别治罪頭船旗丁頭舵人等雖無夾帶私鹽但闖閘闖關者枷號兩個月發近邊充軍隨同之旗丁頭舵照為從例枷號一個月杖一百徒三年不知情不坐賣私之人及竈丁將鹽私賣與糧船者各杖一百流二千里窩藏寄頓者杖一百徒三年其雖不闖閘闖關但夾帶私鹽亦照販私加一等流二千里兵役受賄縱放者計贓以枉法從重論未受賄者杖一百革退販私地方之專管官兼轄官及押運官並交部議處隨幫革退其雖無夾帶私鹽倚恃糧船闖閘闖關者押運等官革職隨幫責三十板革退不服盤查持械傷人者押運等官革職隨幫責四十板革退倘關閘各官勒索留難運官呈明督撫參處一拿獲販私鹽犯承審官務須先將買自何人何地以及買鹽月日數目究明提集犯證並密提竈戶煎鹽火仗簿扇查審確實將賣鹽及窩頓之人均與本犯按照律例一體治罪若查審無據即屬虛誣將本犯依律加三等治罪如承審官不能審出誣扳者交部分别議處若審出買自場竈即將該管鹽場大使並沿途失察各官題參議處其不行首報之竈丁均照販私例治罪一凡大夥興販聚衆拒捕及執持器械殺傷巡役人等脫逃之梟徒照強盜例勒緝地方文武各官疏縱及上司容隱不參交部議處一拿獲私鹽限四個月完結其案內私鹽交與本處鹽商較時價減十分之一二立即變價所獲騾馬牛驢如延挨不變以致倒斃著落該州縣官照中等價值賠補車船等物亦照依時價據實變價報部查核倘有侵漁揑報情弊並逾限不行完結及不即變價報解者將該州縣分别議處治罪一鹽船在大江失風失水者查明準其裝鹽復運倘有假揑情弊以販私律治罪一除行鹽地方大夥私販嚴加緝究外其貧難小民年六十歲以上十五歲以下及年雖少壯身有殘疾并婦女年老孤獨無依者於本州縣報明驗實注册每日赴場買鹽四十斤挑賣只許陸路不許船裝并越境至别處地方及一日數次出入如有違犯仍分别治罪一巡鹽兵捕自行夾帶私販及通同他人運販者照私鹽加一等治罪一凡收買肩販官鹽越境貨賣審明實非私梟者除無拒捕情形仍照律例問擬外其拒捕者照罪人拒捕律加罪二等如興販本罪應問充軍者仍從重論倘拒捕毆人至折傷以上者絞殺人者斬俱監候為從各減一等一鹽商雇募巡役如遇私梟大販即飛報營汛協同擒拿其雇募巡役不許私帶鳥鎗違者照私藏軍器律治罪失察之地方官交部照例議處一凡運鹽船戶偷竊商鹽整包售賣者照船戶行竊商民例分别首從計贓科罪各加枷號兩個月仍盡本法刺字所賣之贓照追給主如追不足數將船變抵其押運商厮起意通同盜賣者依奴僕勾引外人同盜家長財物計贓遞加竊盜一等例治罪如非起意止通同偷賣分贓者依奴僕盜家長財物照竊盜例計贓科斷若商厮稽察不到被船戶乘機盜賣者照不應重律杖八十如押運之人或係該商親族仍分别有服無服照親屬相盜律例科斷一埠頭明知船戶不良朦混攬裝及任意扣尅水腳致船戶途間乏用盜賣商鹽者照寫船保載等行恃強代攬勒索使用擾害客商例治罪外加枷號一個月船戶變賠不足之贓並令代補如無前項情弊止於保雇不實者照不應重律杖八十一販賣私鹽數至三百斤以上及盤獲糧船夾帶訊係大夥興販均即究明買自何處按律治罪如不將賣鹽人姓名據實供出者即將該犯於應得本罪上加一等定擬若向老幼孤獨零星收買數在三百斤以下實不能供出賣鹽人姓名者仍以本罪科斷如承審各員有心庇縱含混完結該管上司不行詳揭一併題參議處一拿獲船載車裝馬馱私鹽該地方官如不按律治罪曲為開脫者該管上司察出即照故出人罪律從重參處一引鹽淹消具報到官該地方州縣官即會同營員查勘確實限一月內通詳鹽道該道於詳到之日起限半月內核轉以憑飭商補運限三月內過所運口岸該鹽政仍將淹消補運鹽斤數目報部其沿途督撫及該管鹽道知府隨時查察如有州縣營員扶同商人揑報及勒索捺擱情弊即行指名題參商人照例治罪監臨勢要中鹽凡監臨鹽法官吏詭立偽名及內外權勢之人中納錢糧於各倉庫請買鹽引勘合支領官鹽貨賣侵奪民利者杖一百徒三年鹽貨入官鹽引勘合追繳阻壞鹽法凡客商赴官中買鹽引勘合不親赴場支鹽中途增價轉賣以致轉賣日多中買日少且詭冒易溢因而阻壞鹽法者買主賣主各杖八十牙保減一等買主轉支之鹽貨賣主轉賣之價錢並入官其各行鹽地方鋪戶轉買本主之鹽而拆賣者不用此律私茶凡犯私茶者同私鹽法論罪如將已批驗截角退引入山影射照出支茶者以私茶論截角凡經過官司一處驗過將引紙截去一角革重冒之弊也條例一官給茶引付産茶府州縣凡商人買茶具數赴官納銀給引方許出境貨賣每引照茶一百斤茶不及引者謂之畸零别置由帖付之量地逺近定以程限於經過地方執照若茶無由引及茶引相離者聽人告捕其有茶引不相當或有餘茶者並聽拏問賣茶畢即以原給由引赴住賣官司告繳該府州縣俱各委官一員專理一私茶有興販夾帶五百斤者照見行私鹽例押發充軍一凡興販私茶潛住邊境與外國交易及在腹裏販賣與來京回還外國人者不拘斤數連知情歇家牙保發煙瘴地面充軍其在西寧甘肅河州洮州四川雅州販賣者雖不入番一百斤以上發附近三百斤以上發近邊各充軍不及前數者依律擬斷仍枷號兩個月文武官員縱容弟男子姪家人軍伴人等興販及守備把關巡捕等官知情故縱者各降一級調用失覺察者照常發落若守備把關巡捕等官自行興販私茶通番者發近邊在西寧甘肅河洮雅州販賣至三百斤以上者發附近各充軍一做造假茶五百斤以上者本商并轉賣之人俱問發附近地方充軍若店戶窩頓一千斤以上者亦照例發遣不及前數者問罪照常發落一凡茶商赴楚買茶應照會典每茶一千斤準帶附茶一百四十斤令産茶地方官給發船票開明該商引目茶數不得另給印票收茶其應行盤查之地方官悉照引目及正附茶斤驗放不許掯勒留難如於部引之外有搭行印票及附茶不依所定斤數多帶私茶者即行查拿照私鹽律治罪查驗地方官故縱失察者照失察私鹽例處分至五司變賣茶斤如有地僻引多壅滯不能行銷者各商具呈該司詳報甘撫行令往賣司分照數盤查聽其發賣辦課私礬凡私煎礬貨賣者同私鹽法論罪凡産礬之所額設礬課係官主典給有文憑執照然後許賣匿稅凡客商匿稅不納課程者笞五十物貨一半入官於入官物內以十分為率三分付告人充賞務官攢攔自獲者不賞入門不弔引同匿稅法商匠入關門必先取官置號單備開貨物憑其弔引照貨起稅若買頭匹不稅契者罪亦如之仍於買主名下追徴價錢一半入官條例一京師及在外稅課司局批驗茶引所但係納稅去處皆令客商自納若權豪無籍之徒結黨把持攔截生事攪擾商稅者徒罪以上枷號兩個月發附近地方充軍杖罪以下照前枷號發落一屯莊居住旗人賣馬者俱令在屯莊所隸之州縣上稅方準發賣其民間馬匹或賣與旗人或賣與驛站或兵民互相買賣俱報明地方官上稅存案如不上稅不存案而私自買賣者依律治罪追價一半入官舶商匿貨凡泛海客商舶大船船到岸即將貨物盡實報官抽分若停塌沿港土商牙儈之家不報者杖一百雖供報而不盡實罪亦如之不報與報不盡之物貨並入官停藏之人同罪告獲者官給賞銀二十兩人戶虧兑課程凡民間周歲額辦茶鹽商稅諸色課程年終不納齊足者計不足之數以十分為率一分笞四十每一分加一等罪止杖八十追課納官若茶鹽運司鹽場茶局及稅務河泊所等官不行用心催辦課程年終比附上年課額虧欠兑缺者亦以十分論一分笞五十每一分加一等罪止杖一百所虧課程著落追補還官若人戶已納而官吏人役有隱瞞不附簿因而侵欺借用者並計贓以監守自盜論條例一鹽課錢糧不完者將經督各官照分數議處外其各商名下應完鹽課作為十分欠不及一分者責二十板欠一分者枷號一箇月責二十板欠二分者枷號一箇月半責二十五板欠三分者枷號兩箇月責三十板欠四分者枷號兩箇月半責三十五板欠五分者枷號三箇月責四十板以上欠課各商題參之日扣限一箇月全完者免處如逾限不完照此例枷責如於枷限內照數全完者釋放免責如枷限滿日仍全不完納除杖責外將該商咨參革退并帶徴等項俱以引窩變抵欠六分者將該商杖六十徒一年所欠課項限四箇月全完欠七分者杖七十徒一年半限六箇月全完欠八分者杖八十徒二年限八箇月全完欠九分者杖九十徒二年半限十箇月全完欠十分者杖一百徒三年限一年全完以上自六分至十分將該商鎖禁嚴查家産如限內全完革退商人免其杖徒倘逾限不完即將該商發配所欠新課帶徴等項著落引窩家産變抵一管收稅課錢糧倘有隱匿加倍著追如接收官不行清查上司不行轉報題參俱著落分賠一在京在外官員眷口船隻過關除無貨物照常驗放胥吏人等毋得任意需索外如有姦牙地棍假稱京員科道名帖或京員子弟執持父兄名帖討關夾帶貨物希圖免稅者該管關員即行查拏究治如該管關員不行詳查及明知瞻徇照例議處大清律例卷十三
