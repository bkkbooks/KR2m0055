body:
  text: 戶律倉庫下那移出納凡各衙門收支錢糧等物己有文案以備照勘合以行移典守者自合依奉出納若監臨主守不正收正支如不依文案勘合那移出納還充官用者並計所那移之贓準監守自盜論罪止杖一百流三千里係公罪免刺若各衙門不給半印勘合擅出權宜票帖關支或給勘合不立文案放支及倉庫但據權帖不候勘合或已奉勘合不附簿放支者罪亦如之各衙門及典守者並計支放之贓準監守自盜論其出征鎮守軍馬經過去處合付行糧草料明立文案即時應付具數開申合於上司準除不在擅支之限違而不即應付者杖六十條例一上司逼勒所屬那移庫銀本官自行首告者審實上司照貪官例治罪下屬免議逼勒至死者家屬赴控上司如不行準理許赴通政司鼓廳衙門具告審實以逼勒至死之上司抵罪不行準理之上司革職一凡那移庫銀五千兩以下者仍照律擬雜犯流總徒四年其那移五千兩以上至一萬兩者擬實犯杖一百流三千里不準折贖若那移一萬兩以上至二萬兩者發近邊充軍二萬兩以上者雖屬那移亦照侵盜錢糧例擬斬監候統限一年果能盡數全完俱免罪其未至二萬兩者仍照例準其開復若不完再限一年追完減二等發落二年限滿不完再限一年追完減一等發落若三年限滿不能全完者除完過若干之外照見在未完之數治罪一州縣虧空題參時一面於任所嚴追一面行文原籍將伊家産嚴查存案如任所無完即變價補完若承追地方官不行查出交部照例議處一除侵盜虧空仍照定例外其分年追賠拖欠各項銀兩以一年為一限計應追之數按年均分務令按限交完見任職員初限不完者解任令同二限銀兩帶罪完納如照數全完準以原官補用若二限內僅完初限銀兩者仍帶罪追比或初限二限均不能完革去職銜同三限銀兩一並嚴追此三限內止完一限之數者仍革職嚴追或完兩限之數者復其職銜帶罪完納能照數全完者準其開復補用倘三限均不能完交刑部治罪所欠銀兩於家屬名下嚴追至無祿人等初限不完監禁令同二限銀兩一並追比如照數全完暫豫釋放若僅完初限銀兩二限未能全完者仍監禁追比或初限二限均不能完令該旗該地方官將財産查封同三限銀兩一並嚴追此三限內止完一限之數者暫免其變産或完兩限之數者將本身釋放財産仍行封守或照數全完者本身釋放免罪財産給還倘三限俱不能完即將財産入官變賣本身交刑部治罪至追比之項有分二年者一年不完照初限例處分二年俱不完即照三限例治罪倘二年內完一年之數者再限一年仍不能完或完不足數者即行治罪一凡州縣虧空倉穀以穀一石照銀五錢定罪麥豆膏粱青粿等雜糧並同係侵蝕入已者照侵欺錢糧例擬斷係那移者照那移庫銀例擬斷其倉穀令接任官於秋成穀賤時申詳督撫藩司酌動何項錢糧照時價先行買補該州縣出具倉收道府加結報部於虧空人員及妻子名下勒限一年將動用銀兩照數追補還項如逾限不完亦照勒追庫銀例分别治罪其有倉厫州縣倘因循怠玩於滲漏處既不粘補應蓋造處又不詳請以致米穀黴爛者革職動帑買補勒限一年照數追賠如限內不完照損壞倉庫財物律治罪若有將倉穀侵盜入已揑稱黴爛虧空者仍照侵蝕例治罪一凡地方有軍需公務督撫不及咨題者行令該州縣墊辦或那庫項或墊已資先行詳明督撫辦完十日內即照實價申詳該督撫照時價核實於文到半月內題報戶部亦於科抄到日半月內核定議覆行文該布政司不論庫項已資即令給發倘州縣申報過限或督撫題報後期俱交吏部議處若該州縣報價不實及督撫不核實題報希圖冒銷者戶部即行題參州縣照侵欺例治罪督撫司道等官照徇庇例議處一州縣交代除實在民欠外將已徴錢糧侵蝕虧空揑稱民欠令後官接受者後官即揭報該管上司如該管上司護庇離任之員及該管府州畏慮分賠因而抑勒交盤者被勒之員直揭部科代為陳奏其所揭抑勒之司道府州等官該督撫據實確審定擬如有干連督撫將具揭及虧空之員押赴來京交都察院確審將抑勒之督撫一並從重議處或係誣揑枉揭交與刑部治罪倘前官虧空後官容隱不報出結接受至本身離任始稱前任虧空者將欠項追賠外仍治以瞻徇私受之罪其揭報之員照例赴部於别省調補倘調補省分該管上司因前揭報之故多方摉求借端誣陷者許該員於都察院呈辨果係寃抑將該管上司交部議處如該員借名誣辨者從重治罪一各省倉穀減價平糶其價值解存司庫或就近之道府庫至秋收務依原糶之數領價買補其買補倉穀時價不敷於本邑糶賣盈餘銀兩內動支倘穀價昂貴不能於次年買補聲明報部展限若故意遲延不行買補以玩視倉儲題參倘遇州縣交代未及秋收買補之期所存價值無虧即令新任領買不得掯勒推諉違者將該員及該管各官分别議處一凡追賠還官各項銀兩有較原參之數浮多者仍給還本人一凡虧空之案審出民欠那墊是實除將本犯照例議罪外另限四個月委員徹底清查出具並無假揑影射印結再令接任官出具認徴印結仍向欠戶催徴如限滿不完將接徴官照例參處倘本無實欠接任官通同揑結察出照揑欠之數與本犯同罪仍令分賠一接任官承查交代如有虧空即於具題之日扣限倘有續揭亦以出咨之日扣限倘有甘受違限處分摘款先揭預為三參五參地步輾轉延挨者即將該員著落賠補一凡審擬那移之案於定案日查明參後完過若干準豫開除以現在未完之數定擬一凡知府失察屬員虧空及本犯實係因公那移者仍照原例辦理外其知府通同徇隱州縣侵欺倉庫錢糧著落代賠之項若三限已滿尚未賠完該督撫取具家産全無印甘各結保題即將革職代賠之知府按其己未完交分數治罪以十分為率如未完之數在五分以內者杖一百至六分者杖六十徒一年每一分加一等十分無完者杖一百徒三年均不準納贖如能依限賠完仍照例準其分别開復降調一凡州縣官交代其存倉米穀除實應出糶存價未買之銀照例準其接收外如有私行出糶及倉糧虧缺折銀交代者照例題參仍留任所按數買補并令接任之員查明出具並無糶多報少糴少報多折銀抵交確實印結申報違者一並題參究追該管上司不能查出照徇庇例議處庫稱雇役侵欺凡倉庫務場局院庫稱斗級若雇役之人受雇之人即是主守或侵欺或借貸或移易二字即抵換也係官錢糧並以監守自盜論若雇主同情分受贓物者罪亦如之其知情不曾分贓而扶同雇役者以所盜物揑作見在申報瞞官及不首告者減自盜一等罪止杖一百不知者不坐條例一凡糧重倉多州縣印官不能兼顧遴點老成書吏收糧如有僉派匪人侵蝕漕糧者書吏照監守自盜律治罪州縣官交部議處侵蝕米石即著該役名下嚴行追補如糧戶私相折銀訪獲除銀入官充餉追交應完米石外量其多寡分别責懲收銀書吏計贓治罪冒支官糧凡管軍官吏冒支軍糧入已者計所支之贓準竊盜論取之於軍非取之於官也故止準竊盜論若軍已逃故不行扣除而入已者以常人盜官糧論若承委放支而冒支者以監守自盜論免刺錢糧互相覺察凡倉庫務場官吏攢攔庫子斗級皆得互相覺察若知侵欺盜用借貸係官錢糧已出倉庫匿而不舉及故縱者並與犯人同罪至死減一等失覺察者減三等罪止杖一百若官吏虛立文案那移出納及虛出通關另有本律其斗級庫子攔頭不知者不坐倉庫不覺被盜凡有人非監守從倉庫中出守把之人不摉檢者笞二十因不摉檢以致盜物出倉庫而不覺者減盜罪二等若夜值更之人不覺盜者減三等倉庫直宿官攢斗級庫子非正直本更不覺盜者減五等並罪止杖一百故縱者各與盜同罪至死減一等若被強盜者勿論互相覺察與此不覺被盜官吏皆係公罪仍留職役隱匿不舉與此故縱皆係私罪各罷職役條例一內外官庫被竊盜銀一千兩以上一箇月不獲經管該辨并巡捕官俱各住俸半年不獲題參議處被盜二三次者奏請降調其該道分巡分守官參奏議處不及前數者俱照常發落庫子儘其財産均追賠償候正贓獲日照數給還若各官妄拏平人逼認盜賊追賠者亦依例問罪此指被竊盜言故照數追賠若強盜自有勿論律一將進倉漕糧攔路戳袋挖越倉墻進倉偷米之盜聽刑部查審照律治罪不至死罪者若係另戶旗人發黑龍江寧古塔等處披甲當差若係奴僕發黑龍江寧古塔等處給與披甲之人為奴係民人發往雲南貴州廣東廣西煙瘴少輕地方嚴行管束至褲襖細袋裝米偷盜等小賊拿獲該監督呈報倉場侍郎即於倉門首枷號四十日係旗人鞭一百係民杖一百守支錢糧及擅開官封凡倉庫官攢斗級庫子役滿得代不得離去所收錢糧官物并令守候支放盡絶若無短少方許官攢各離職役斗庫寧家其有應合相沿交割之物聽提調官吏監臨盤點見數不得指厫指庫交割違者各杖一百若倉庫所收官物有印封記其主典不請原封官司閲視而擅開者杖六十其守支盤點及擅開各有侵盜等弊者俱從重論追賠入官出納官物有違凡倉庫出納官物當出陳物而出新物則價有多餘應受上物而受下物則價有虧欠之類及有司以公用和雇和買不即給價若給價有增減不如價值之實者計通上言所虧欠當受上物而受下物及雇買不即給價即給價減不以實各有虧欠之利及多餘當出陳物而出新物及雇買給價增不以實各有多餘之利之價並計所虧欠所多餘坐贓論以錢糧不係入已雇買非充私用故罪止杖一百徒三年贓分還官給主若應給俸䘵未及期而預給者罪亦如之其監臨官吏統上論知而不舉與同罪不知者不坐條例一各省採買一應倉糧穀石務令州縣等官平價採買運倉不許轉發里遞派買至驛遞所需草豆令有驛各官平價採買亦不得派發里遞苦纍小民應需運價準令開銷敢有私派勒買及短給價值強派強拏民力運送者坐贓治罪一凡兵丁生息營運銀兩或占百姓行業或重利放債以為生息者出納官吏照騷擾地方索借部民財物計贓科罪上司失察交部議處收支留難凡收受支給官物其當該官吏無故二字重看留難刁蹬不即收支者一日笞五十每三日加一等罪止杖六十徒一年守門人留難者不放入計日論罪亦如之若領物納物之人到有先後主司不依原到次序收支者笞四十條例一大通橋監督將運進倉內米數豫期行文八倉監督早開倉門務要本日照數收完如有至晚收納不及者該倉監督親身查照登簿貯倉次日抽掣收受違者交該部議處如運役擅於中途寄放者照偷盜議罪一凡錢糧物料等項解送到部限文到三日內即行查收掣給批回如無故不收完給批者照律計日治罪至書役人等指稱估驗掣批挂號等項費用名色借端包攬索詐者許解官解役即於該衙門首告交送刑部問實發近邊充軍贓重者以枉法從重論係官革職問罪該管官失察者交部議處如解官豫先囑託和同行賄聽其包攬者與受財人一體治罪一凡糧船運抵石壩土壩限十日內將米起完如起米違限以致回空船隻守凍者坐糧廳監督革職若受財并衙役人等交刑部治罪其漕糧運至京通各倉若米到不即令過壩過閘掯勒不令入倉者許運丁首告交刑部將衙役人等從重治罪如坐糧廳及各倉書役人等向運官運丁指稱掣批等項名色勒索者一兩以下杖六十徒一年一兩以上杖一百徒三年十兩以上發近邊充軍贓重者仍從重論若支放米石攙和沙土者亦交刑部從重治罪有向關米之人勒索得財者照指稱掣批等項名色計贓論罪因而打死人命者擬斬監候關米人等米色不堪不行首告或私給錢者與受同科以上各項監督失察者交部嚴加議處知情故縱者革職從重治罪失察之倉場侍郎亦交部分别議處起解金銀足色凡收受納官諸色課程變賣貨物起解金銀須要足色如成色不及分數提調官吏及估計煎銷人匠各笞四十著落均賠還官官有侵欺問監守盜知情通同故不收足色坐贓論損壞倉庫財物凡倉庫及積聚財物主守之人安置不如法晒晾不以時致有損壞者計所損壞之物價坐贓論罪止杖一百徒三年著落均賠還官若卒遇雨水衝激失火延燒若倉庫內失火自依本律杖八十徒二年盜賊分強竊劫奪事出不測而有損失者委官保勘覆實顯迹明白免罪不賠其監臨主守官吏若將侵欺借貸那移之數乘其水火盜賊虛揑文案及扣換交單籍册申報瞞官希圖幸免本罪者並計贓以監守自盜論同僚知而不舉者與同罪不知者不坐條例一凡各府州縣倉厫俱造入交盤項內新舊交代若有木植毁爛傾圮滲漏即行揭報將原任官交部議處徇情濫受接任官亦交部議處其黴爛虧空穀石著接任官勒限賠補不完治罪轉解官物凡各處徴收錢帛買辦軍需成造軍器等物所在州縣交收差有職役人員陸續類解本府若本府不即交收差人轉解勒令州縣人戶就解布政司者當該提調正官首領官吏典各杖八十公罪若布政司不即交收勒令各府就解部者提調正官首領官吏典罪亦如之若原行僉定長解不用此律其起運前項官物長押官及解物人安置不如法致有損失者計所損失之物坐贓論著落均賠還官若船行卒遇風浪及外人失火延燒或盜賊劫奪事出不測而有損失者申告所在官司委官保勘覆實顯迹明白免罪不賠若有侵欺者不論有無損失事故計贓以監守自盜論若起運官物不運原本色而輒齎財貨於所納去處收買納官者亦計所買餘利為贓以監守自盜論條例一漂沒船糧著落沿途催儹各官及汛地文武官員親臨勘實各出保結取具運官結狀該督撫確察具題豁免若漕運官軍水次折乾沿途盜賣自度糧米短少故將船放失漂流及雖係漂流損失不多乘機侵匿揑作全數賄囑有司官吏扶同奏勘者前後幫船及地方居民有能覺察告首督運官司查實給賞輕齎銀十兩官軍侵盜至六百石者擬斬不及六百石者發邊逺充軍沿途催儹及汛地文武各官不親臨確勘的實遽出促結者革職督撫不嚴察確實遽行題豁事發交部議處所虧米數仍行原衛所將故失侵揑之人家産變賣抵償不許輕扣别軍月糧前後幫船知而不舉一體連坐仍於正犯所欠錢糧內責令幫賠十分之三一運糧官員旗軍人等犯該人命強盜等項重罪者官拘繫奏提旗軍人等即便提問其餘一切小事候交糧畢日審結一空重漕船沿途州縣衛所照定限時日驅令出境如有違限將專催督催押運領運官俱交該部照例分别議處隨幫百總旗頭違限一次笞五十二次杖六十三次杖七十每一次加一等罪止杖一百徒三年督撫不行查參照隱匿不參催糧官例議處設有非常風阻氷凍淺滯俱令查實報明免其議處一凡運解餉鞘到汛不照撥定兵丁名數護送或兵丁有於中途私回者解官即報明該督撫題參將該汛專兼將辨照少撥解役例議處中途私回之兵丁責革名糧一糧船到淮米色黴變運辨出有米色結狀者虧折之米著落該幫旗丁賠補運辨未經出有結狀者著落縣幫各半均賠一衛所運辨正丁雇覔頭船水手俱開明姓名籍貫各給腰牌令前後十船互相稽查取具正丁甘結十船連環保結如一船生事十船連坐押運糧道等官在途稽查倘有生事者會同地方官審訊懲治仍將生事情由報明總漕其未經開兌之先責成本省巡撫及糧道等官開運出境之後責成漕運總督及沿途該管文武等官到津以後責成倉場侍郎坐糧廳並天津總兵通州副將天津通州府縣各按該管地方嚴行稽查一經事犯協同押運官立即擒拏按律懲治倘押運官辨或有徇縱地方官不行查拏該督撫即行題參除徇縱之押運官照例革職外其該管道員及沿途之該管文武官辨并各處之該管上司俱分别議處若申報而各處該管上司不行題參者照例議處一委解銅斤照解餉之例按運更換如有遞年長令管解者將原委之上司交部議處倘局內書役爐頭人等於收銅之時任意輕重及勒索情弊查明按律治罪失察之該管官交部嚴加議處其各省委解顔料等項亦照此例按批更換一鹽課銀兩起解京協各餉所需水腳向係商人自備應用並不按站給與夫馬供應每逢起解之期巡鹽御史預先移會前途督撫撥兵護送務由大路按站而行夜宿州縣照例撥給人夫巡守如有疏虞經過之地方文武各官照例分賠如巡鹽御史不移會督撫解官不知會地方官潛行小路致有疏失著落解官名下追賠解官不能完項即著差委之上司賠補一解餉失鞘地方文員分賠一半差委不慎之大員分賠三分解員賠二分如解員不能賠補亦著差委之大員賠補武員照例處分免其分賠一薊運回空有在該地方刨取白土裝帶及沿河市鎮鋪戶有將白土賣與糧船者如尚無攙和情弊將鋪戶丁舵均枷號一個月杖一百其已經攙和者將丁舵杖一百徒三年若攙入漕糧至一百石以上者丁舵發遣其運辨與押空千總及不行查禁之薊州文武官辨交該部分别議處一糧船被竊該旗丁呈報本幫運辨移知該地方官緝賊追贓被竊之船即隨幫前行不必守候至強劫重案必須等候待驗該領運官具報立即會勘州縣立給印票催趲前行并將被盜守候緣由報明漕督及巡漕御史查核倘有不肖兵役勒掯需索照在官人役取受有事人財計贓以枉法科罪其經過地方如有強劫之案該地方文武官辨俱照城內失事例議處水手行竊及幫船被盜將領運員辨分别強竊及抑勒隱諱計案分别議處一糧船舵工有侵米至五石以上纍丁代完者審實即咨部發遣一州縣起解銀兩解役潛行小路不請撥護者即未被失亦照不應重律杖八十擬斷贓罰不當凡擬斷贓罰財物應入官而給主及應給主而入官者坐贓論罪止杖一百條例一凡查估追變之員勘報不實瞻徇延緩以致帑項懸缺者著令代賠若查勘本無不實催追本無徇縱祗因變抵不敷以致公帑懸缺仍在本人名下歸結不得向查估追變之人勒令代賠違者以違制論一凡承追各款贓罰銀兩著落本犯勒追完結其有律應身死勿徴者仍照定例免徴至年逺贓私必確查實據方可著追不得於本犯之外混追賠補違者以違制論守掌在官財物凡官物當應給付與人已出倉庫而未給付若私物當供官用已送在官而未入倉庫均為官物但有人守掌在官官司委僉守掌之人若有侵欺借貸者並計入已贓以監守自盜論若非守掌之人侵欺者依常人盜倉庫律論其有未納而侵用者經催里納保歇各照隱匿包攬欺官取財科斷不得概用此律條例一凡八旗參領佐領驍騎校領催等將一切收貯公所干係錢糧並交庫銀兩侵蝕者照監守自盜律例分别問擬一萬兩以內遇赦準其援免有逾此數不準寬免隱瞞入官家産凡抄沒人口財産除謀反謀叛及姦黨係在十惡依律抄沒其餘有犯律不該載者妻子財産不在抄沒入官之限違者依故入人流罪論抄沒尚未入官作未入官各減一等若抄劄入官家産而隱瞞人口不報者計口以隱瞞丁口論若隱瞞田土者計田以欺隱田糧論若隱瞞財物房屋孳畜者坐贓論各罪止杖一百所隱人口財産並入官罪坐供報之人所隱之人口不坐不加重者以自己之丁口財産也若里長同情隱瞞及當該官吏知情者並與同罪計所隱贓重於杖一百者坐贓論全科受財者計贓以枉法各從重論以枉法之重罪論分有祿無祿失覺舉者減供報人三等罪止笞五十條例一凡罪犯入官財産止應著落正犯追取倘正犯將無干之人肆行誣賴者從重治罪仍著落伊身追取承審察追各官如徇庇正犯拖纍無干之人亦交與該部嚴加議處一凡欠帑人員將地畝入官之後其本人及本人之子孫概不準其認買倘有混行承買將官兵人等分别議處治罪準其承買之該管各官交部照例議處一凡欠帑人員或因獨力難賠或因産盡無著遂將分居别業之弟兄親族並不知情之親友旁人巧借認幫名目轉輾株連勒令賠補者將承審承追各官均照違制治罪一凡虧空入官房地內如有墳地及墳園內房屋看墳人口祭祀田産俱給還本人免其入官變價一除隱匿那移案內之家産仍照隱匿本律治罪外如隱匿侵盜案內之家産不論原案未完之數計所隱家産價值之多寡照坐贓律分别定擬十兩以下笞二十每十兩加一等一百兩杖六十徒一年每一百兩加一等五百兩至一千兩滿徒一千兩以上罪止杖一百流三千里係旗人折枷號鞭責俱罪坐隱瞞之人所隱財産俱行入官保題各官照例治罪追賠一凡應追官員贓賠各項銀兩若原籍任所查明財産盡絶實在無可著追者取具原籍地方官印結咨部各歸任所加結題請豁免回旗人員由本旗確查取結咨行任所一體辦理如原籍任所或有隱匿寄頓一經發覺除財産入官外出結各員照例議處分賠隱寄家屬照律治罪大清律例卷十二
