front:
  text: 欽定四庫全書大清律例卷三十二
  hash: sha256:3075ece1a7a6c62a5d908443dca3569826b6d033e6ddd6b3a580da1198076487
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0055_WYG_080-1a, image: WYG0673/WYG0673-0064c.png}
body:
  text: 刑律詐僞詐為制書詐為以造作之人為首從坐罪轉相謄寫之人非是凡詐為原無制書及增減原有者已施行不分首從皆斬監候未施行者為首絞監候為從者減一等傳寫失錯者為首杖一百為從者減一等詐為六部都察院將軍督撫提鎮守禦緊要隘口衙門文書套畫押字盜用印信及將空紙用印者必盜用印方坐皆絞監候不分首從未施行者為首減一等為從又減一等詐為察院布政司按察司府州縣衙門印信文書者為首杖一百流三千里詐為其餘衙門印信文書者為首杖一百徒三年為從者減一等未施行者各分首從減一等若有規避事重於前事者從重論如詐為出脫人命以規避抵償當從本律科斷之類其詐為制書文書已施行及制書文書所至之處當該官司知而聽行各與同罪至死減等不知者不坐一將印信空紙揑寫他人文書投遞官司害人者依投匿名文書告言人罪者律盜用欽給關防與印信同有例條例一詐為六部等衙門文書依律問斷外若詐為察院布政司按察司府州縣及其餘衙門文書誆騙科斂財物者問發近邊充軍一凡詐為各衙門文書盜用印信者不分有無押字依律坐罪若止套畫押字各就所犯事情輕重查照本等律條科斷其詐為六部各司軍衛各所文書者俱與其餘衙門同科一通政使司大理寺鹽運司部屬各管軍所仍照其餘衙門擬斷若情犯深重者聽臨時查照比依何衙門具由奏請定奪詐傳詔旨詐傳以傳出之人為首從坐罪轉相傳說之人非是凡詐傳詔㫖自內而出者為首斬監候為從者杖一百流三千里詐傳皇后懿㫖皇太子令㫖者為首絞監候為從者杖一百流三千里若詐傳一品二品衙門官言語於各屬衙門分付公事自有所規避者為首杖一百徒三年三品四品衙門官言語有所規避者為首杖一百五品以下衙門官言語者杖八十為從者各減一等若得財而詐傳無礙於法者計贓以不枉法因得財詐傳而變動事情枉曲法度者以枉法各以枉法不枉法贓罪與詐傳規避本罪權之從重論其詐傳詔㫖品官言語所至之處當該官司知而聽行各與同罪至死減一等不知者不坐若內外各衙門追究錢糧鞫問刑名公事當該官吏將准合行免追免問事理妄稱奉㫖追問者是亦詐傳之罪斬監候對制上書詐不以實凡對制敷陳及奏事有職業該行而啓奏者與上書不係本職而條陳時務者詐妄不以實者杖一百徒三年其對奏上書非密謂非謀反大逆等項而妄言有密者加一等若奉制推按問事轉報上不以實者杖八十徒二年若徇私曲法而所報不實之事重於杖八十徒二年者以出入人罪論僞造印信時憲書等凡僞造諸衙門印信及時憲書起船起馬符驗茶鹽引者為首雕刻斬監候為從者減一等杖一百流三千里有能告捕者官給賞銀五十兩僞造關防印記者為首杖一百徒三年告捕者官給賞銀三十兩為從及知情行用者各減一等各字承上二項而言若造而未成者首從各又減一等其當該官司知而聽行與同罪不知者不坐印所重者文若有篆文雖非銅鑄亦可以假詐行事故形質相肖而篆文俱全者謂之僞造惟有其質而文不全者方謂之造而未成至於全無形質而惟描之於紙者乃謂之描摸也條例一凡有僞造諸衙門印信及欽給關防事關軍機冒支錢糧假冒官職大干法紀者俱擬斬立决為從者擬絞監候若非關軍機錢糧假官等弊止圖誆騙財物為數多者俱照律擬斬監候為從者杖一百流三千里若誆騙財物為數無多銀不及十兩錢不及十千者為首雕刻者杖一百流三千里為從及知情行用者各減一等其僞造關防印記誆騙財物為數多者將為首雕刻之人發雲貴兩廣烟瘴少輕地方若為數無多為首者仍照律徒三年為從及知情行用者各減一等其造而未成者又各減一等若描摸印信行使誆騙財物犯該徒罪以上者問發邉逺充軍其為數無多犯該徒罪以下者各計贓以次遞減四十兩杖一百徒三年三十兩杖九十徒二年半二十兩杖八十徒二年一十兩杖七十徒一年半一兩以下杖六十徒一年不得財者罪止杖一百一凡盜用總督巡撫提學兵備屯田水利等官欽給關防俱照各官本衙門印信擬罪若盜及棄毁僞造悉與印信同科一起意僞造假印除自行雕刻者仍照律擬斬監候外其有他人代為雕刻審係同謀分贓者將起意之人與雕刻之人並擬斬監候為從者減等擬流若僅受些微價值代為私雕並無同謀分贓情事者以起意之人為首雕刻之人為從其誆騙財物銀不及十兩錢不及十千罪應擬流者亦將雕刻之人審眀是否同謀分贓分别首從辦理私鑄銅錢凡私鑄銅錢者絞監候匠人罪同為從及知情買使者各減一等告捕者官給賞銀五十兩里長知而不首者杖一百不知者不坐若將時用銅錢剪錯薄小取銅以求利者杖一百若以銅鐵水銀僞造金銀者杖一百徒三年為從及知情買使者各減一等金銀成色不足非係假造不用此律條例一方造私鑄器具尚未鑄錢被獲審實者將起意為首并同夥商謀之人均照僞造印信未成為首律杖一百流三千里凑錢入夥者照為從減一等律杖一百徒三年該地方官不實力訪拿别經發覺交部議處一拿獲私鑄如本犯問擬斬絞其知情分利之同居父兄伯叔與弟減本犯罪一等杖一百流三千里如本犯問擬發遣亦減一等杖一百徒三年雖經分利而實係並不知情者照本犯之罪減二等發落其父兄不能禁約者杖一百有能據實出首准豫免罪本犯仍照律內得相容隱之親屬互相告言各聽如罪人本身自首法科斷一凡將前代廢錢攙和私錢行使者不論錢數多寡枷號一個月杖一百一凡經紀鋪戶人等攙和私錢行使者或被該管官員查拿或被旁人首告不論錢數多寡應發黑龍江給窮披甲之人為奴照名例改發雲貴兩廣烟瘴少輕地方一凡經紀鋪户人等有收買剪邊錢攙和貨賣數至十千以上者照攙和私錢行使例治罪其不及十千者俱枷號一個月杖一百一凡地方文武各官嚴拿私鑄務於山陬水濱人迹罕到及居民繁庶人烟稠密處所並宜差委妥練員役不時察訪查拿如遇有私鑄之事知情故縱者應照例治罪外其不知情者從前雖漫無覺察今但能拿獲不論年月逺近俱免其處分文官拿獲者並免同城武職之處分武辨拿獲者亦免同城文官之處分交界之所此縣拿獲彼縣亦免處分至果能實心查拿者不論本管地方及别州縣准以拿獲之多寡交部量豫議叙若該地方官不加意緝拿或係上司查出或被旁人告發俱仍照例處分一凡用銅鐵錫鉛藥煮僞造假銀或騙人行使發覺為首者係旗人另户枷號兩個月鞭一百發黑龍江當差係家人枷號兩個月鞭一百發黑龍江給披甲之人為奴係民枷號兩個月杖一百發雲貴兩廣烟瘴少輕地方為從及知情買使者係旗人枷號一個月流三千里折枷號兩個月鞭一百係民枷號兩個月流三千里至配所杖一百一凡將銀穵孔傾入銅鉛等物及用銅鉛等物傾成錠錁外用銀皮包好并銅鉛等物每兩內攙實銀二三四五錢不等僞造銀使用者均照以銅鐵水銀僞造金銀律分别首從擬徒一私造鉛錢為首及匠人俱擬絞監候為從及知情買使者各減一等一凡私造鉛錢除夥黨鳩工大爐廣鑄至十千文以上者照例定擬外其鎔化些須鉛斤鑄錢不及十千者為首及匠人俱照免死減等例發往黑龍江等處給披甲人為奴為從及知情行使者依次遞減一凡各省拿獲私鑄之犯不論砂殼銅錢為首及匠人俱擬以斬候為從及知情買使者俱發遣為奴如受些微雇值挑水打炭燒火及停工散局之後貪其價賤偶為買使以及房主鄰佑總甲十家長知而不拿獲舉首者俱照為從遣罪減一等杖一百徒三年其房主人等並不知情但失於查察者杖一百或有空房别舍誤借匪人一有見聞立即驅逐未經首捕者果係並未在埸亦非受賄容隱俱以不知情科斷失察各官交部分别議處官船户夾帶私錢應照偶為買使例定擬同船之人知情不舉首者照不應重律治罪押船官交部分别議處若拿獲銷燬制錢之犯審實將為首者擬以斬决家産入官為從者絞決仍令該地方官設法密拿有能拿獲私銷者地方官交部議叙失察者地方官及該管上司交部分别議處其房主鄰佑總甲人等知情受賄代為隱匿者依為從例治罪但知情不首告並未分贓者照為從例減一等杖一百流三千里並未知情止於失察者俱杖一百旁人首捕審實者官給賞銀五十兩至私鑄之犯容有即係私銷之人承審官拿獲私鑄案犯必先嚴究有無銷燬情事倘有私銷確據即照私銷例從重治罪一凡奸民將制錢剪邉圖利者審實即照私銷制錢例分别首從治罪一私鑄銅錢首犯匠人核其錢數至十千以上或雖不及十千而私鑄不止一次後經發覺者照例擬斬監候其錢數不及十千者仍照免死減等例改發黑龍江等處給披甲人為奴若鑄造未成畏罪中止者發雲貴兩廣烟瘴地方嚴加管束一凡私鑄銅錢未成之房主鄰佑十家長知而不拿獲舉首者照私鑄已成之房主鄰佑十家長減二等治罪杖八十徒二年不知情者不坐其私鑄未成案內有雇令挑水打炭燒火之人亦照已成之受雇人等減二等治罪一私鑄鉛錢之案如有夥衆開爐至十千以上者房主鄰佑總甲十家長等知而不首俱杖八十徒二年失於查察者杖八十詐假官凡僞造慿劄詐為假官及為僞劄或將有故官員文慿而假與人官者斬監候其知情受假官者杖一百流三千里須有劄付文慿方坐但慿劄皆係與者所造故減等不知者不坐若無官而不曾假造慿劄但詐稱有官有所求為或詐稱官司差遣而捕人及詐冒見任官員姓名有所求為者杖一百徒三年以上三項總重有所求為若詐稱見任官子孫弟姪家人總領於按臨部內有所求為者杖一百為從者各減一等若得財者並計贓各主者以一主為重准竊盜免刺從重論贓輕以詐科罪其當該官司知而聽行與同罪不知者不坐條例一凡雜職內有假冒頂替之人自行出首者革退回籍免其治罪一凡詐冒皇親族屬姻黨家人在京在外巧立名色挾騙財物侵占地土并有禁山場攔當船隻掯要銀兩出入大小衙門囑託公事販賣制錢私鹽包攬錢糧假稱織造私開牙行擅搭橋梁侵漁民利者除實犯死罪如詐冒假勢陵虐故殺鬬殺私鹽拒捕之類外徒罪以上俱於所犯地方枷號一個月發近邉充軍杖罪以下亦枷號一個月發落若被害之人赴所在官司告訴不即受理及雖受理觀望逢迎不即問斷舉奏者各治以罪一假充大臣及近侍官員家人名目豪橫鄉村生事害民强占田土房屋招集流移住種者許所在官司拿問犯該徒罪以上者發近邉充軍杖罪以下枷號一個月發落一凡各省各營食糧兵丁并有不食錢糧假冒營兵生事擾民及合夥挾制官司擾害地方者該地方官審明分别首從各照例定擬如該管文武各官不行稽查轉報督撫提鎮不題參俱交該部照例分别議處一僞造慿劄自為假官者僞造憑劄並將有故官員憑劄賣與他人者及買受憑劄冒名赴任者俱擬斬監候知情說合者杖一百流三千里一凡無官而詐稱有官并冒稱現任官員姓名並未造有憑劄止於圖騙一人圖行一事犯該徒罪以下者發近邊充軍犯該軍流遣罪者擬絞監候一假冒頂帶自稱職官止圖鄉里光榮無所求為亦無憑劄者杖六十徒一年假冒生監頂帶者杖一百一凡未經考職書吏冒戴頂帽者照假冒職官例杖六十徒一年其有把持公事别情仍照本條按例從重究擬本管官及地方官失於查察或有意故縱分别議處詐稱內使等官官與事俱詐凡憑空詐稱內使近臣內閣六科六部都察院監察御史按察司官在外體察事務欺詐官府煽惑人民者雖無僞造劄付斬監候知情隨行者減一等杖一百流三千里其當該官司知而聽行與同罪罪止杖一百流三千里不知者不坐若本無符驗詐稱使臣乘驛者杖一百流三千里為從者減一等驛官知而應付者與同罪不知情失盤詰者笞五十其有符驗而應付者不坐符驗係僞造有僞造符驗律係盜者依盜符驗律條例一凡詐冒內官親屬家人等項名色恐嚇官司誆騙財物者除實犯死罪如盜或僞造符驗或因嚇騙毆故殺死之類外其餘枷號一個月發近邊充軍所在官司畏徇故縱不行擒拿者各治以罪一凡詐充各衙門人役假以差遣體訪事情緝捕盜賊為由占宿公館妄拏平人嚇取財物擾害軍民者除實犯死罪或假差遣有僞造印信批文或以捕盜搶檢傷人或嚇騙忿爭毆故殺人之類外徒罪以上枷號一個月發近邊充軍杖罪以下亦枷號一個月發落所在官司阿從故縱者各治以罪一棍徒假冒差役名色搜查客船俱照詐充各衙門人役假以差遣體訪事情妄拿平人嚇取財物擾害軍民例治罪犯該徒罪以上者枷號一個月發近邊充軍杖罪以下枷號一個月發落其有强劫拒捕并贓至滿貫各照本律從重論近侍詐稱私行官實而事詐凡近侍之人在外詐稱私行體察事務煽惑人民者斬監候此詐稱係本官自詐稱非他人詐為瑞應凡詐為瑞應者杖六十徒一年若有災祥之類而欽天監官不以實對者加二等詐病死傷避事凡官吏人等有詐稱疾病臨事避難如難解之錢糧難捕之盜賊之類者笞四十如所避之事重者杖八十若犯罪待對故自傷殘者杖一百詐死者杖一百徒三年傷殘以求免拷訊詐死以求免出官所避事重於杖一百及徒三年者各從重論如侵盜錢糧仍從侵盜重者論若無避罪之情但以恐嚇詐賴人故自傷殘者杖八十其受雇倩為人傷殘者與犯人同罪因而致死者減鬭殺罪一等若當該官司知而聽行謂知其詐病而准改差知其自殘避罪而准作殘疾知其詐死而准住提與同罪不知者不坐條例一各省獲罪之犯報稱病故者著該管官員出具印結並行文原籍地方官稽查倘有詐稱病故者分别從重治罪一凡未經到案之犯報稱病故該撫嚴飭地方官悉心確查取具印甘各結報部倘有揑報等情日後發覺定將該地方官與該撫一併嚴加議處詐教誘人犯法凡諸人設計用言教誘人犯法及和同共事故誘令人犯法却自行捕告或令人捕告欲求賞給或欲陷害人得罪者皆與犯法之人同罪罪止杖流和同令人犯法看令字還是教誘人而又和同犯法也若止和同犯法則冝用自首律條例一游手好閒不務夲業之流自號教師演弄拳棒教人及投師學習并輪叉舞棍遍遊街市射利惑民者並嚴行禁止如有不遵一經拿獲將本犯照違制律治罪仍枷號一個月拿獲之衙門即行發落遞回原籍如坊店寺院容留不報地保人等不行查拿均照不應重律杖八十地方文武各官失於覺察照例議處一苖猺狑獞所住地方如有外來匪徒教誘犯法即視所犯之人如罪應擬杖者將教誘之人加一等治罪徒罪以上教誘之人比照住居苖寨教誘為亂例問發邊逺充軍犯該死罪者教誘之人與夲犯一例擬以斬絞遇赦不宥失察之地方官照徇庇例議處隱諱故縱者照溺職例革職一凡土官延幕必將所延之姓名年籍通知專轄州縣確加查驗人果端謹實非流棍加結通報方准延入若知係犯罪之人私聘入幕并延請後縱令犯法者照職官窩匿罪人例革職如有私聘私就者即令專轄州縣嚴加驅逐若土幕教誘犯法即視其所犯之輕重俱照匪徒教誘犯法加等例治罪敗露潛逃即行指拿重懲私聘之文武土官及失察之該管州縣交部分别議處大清律例卷三十二
