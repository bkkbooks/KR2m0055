  text: 欽定四庫全書大清律例卷十五
  hash: sha256:bd08051b5e7059d22b64bb5c1589dc8aea6b36c46500257979318a64231fab1c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0055_WYG_046-1a, image: WYG0672/WYG0672-0612a.png}
body:
  text: 戶律市㕓私充牙行埠頭凡城市鄉村諸色牙行及船之埠頭並選有抵業人戶充應官給印信文簿附寫逐月所至客商船戶住貫姓名路引字號物貨數目每月赴官查照其來歷引貨若不由官選私充者杖六十所得牙錢入官官牙埠頭容隱者笞五十各革去條例一凡客店每月置店簿一本在內赴兵馬司在外赴有司署押訖逐日附寫到店客商姓名人數起程月日各赴所司查照如有客商病死所遺財物别無家人親屬者官為見數移招召其父兄子弟或已故之人嫡妻識認給還一年後無識認者入官一旗民遇有喪葬聽憑本家之便雇人擡送不許仵作私分地界霸占扛擡分外多取雇值如有恃強攙奪不容本家雇人者立拏枷號兩箇月杖一百一凡在京各牙行領帖開張照五年編審例清查換帖若有光棍頂冒朋充巧立名色霸開總行逼勒商人不許别投拖欠客本久占纍商者問罪枷號一箇月發附近充軍地方官通同徇縱者一并參處一京城一切無帖鋪戶如有私分地界不令旁人附近開張及將地界議價若干方許承頂至發賣酒斤等項貨物車戶設立名牌獨自霸攬不令他人攬運違禁把持者枷號兩箇月杖一百一各處關口地方有土棍人等開立寫船保載等行合夥朋充盤踞上下遇有重載雇覓小船起剝輒敢恃強代攬勒索使用以致擾纍客商者該管地方官查拏照牙行及無籍之徒用強邀截客貨例枷號一箇月杖八十一各衙門胥役有更名揑姓兼充牙行者照更名重役例杖一百革退如有誆騙客貨纍商久候照光棍頂冒朋充霸開總行例枷號一箇月發附近充軍若該地方官失於覺察及有意徇縱交部分别議處受財故縱以枉法從重論市司評物價凡諸物牙行人評估物價或以貴為賤或以賤為貴令價不平者計所增減之價坐贓論一兩以下笞二十罪止杖一百徒三年入已者準竊盜論查律坐罪免刺其為以贓入罪之罪人估贓增減不實致罪有輕重者以故出入人罪論若未決放減一等受財受贓犯之財估價輕受事主之財估價重者計贓以枉法從重論無祿人查律坐罪把持行市凡買賣諸物兩不和同而把持行市専取其利及販鬻之徒通同牙行共為姦計賣己之物以賤為貴買人之物以貴為賤者杖八十若見人有買賣在旁混以己物髙下比價以相惑亂而取利者雖情非把持笞四十若已得利物計贓重於杖八十笞四十者準竊盜論免刺贓輕者仍以本罪科之條例一會同館內外四鄰軍民人等代替外國人收買違禁貨物者問罪枷號一箇月發近邊充軍一凡外國人朝貢到京會同館開市五日各鋪行人等將不係應禁之物入館兩平交易染作布絹等項立限交還如賖買及故意拖延騙勒逺人久候不得起程者問罪仍於館門首枷號一箇月若不依期日及誘引逺人濳入人家私相交易者私貨各入官鋪行人等照前枷號一甘肅西寧等處遇有番夷到來所在該管官司委官關防督查聽與軍民人等兩平交易若勢豪之家主使弟男子姪家人等將逺人好馬竒貨包收逼令減價以賤易貴及將一切貨物頭畜拘收取覔用錢方許買賣者主使之人問發附近地方充軍聽使之人減主使一等委官知而不舉通同分利者參問治罪一各處客商輻輳去處若牙行及無籍之徒用強邀截客貨者不論有無誆賒貨物問罪俱枷號一箇月如有誆賒貨物仍追比完足發落若追比年久無從賠還纍死客商者發附近充軍一凡內府人員家人及王貝勒貝子公大臣官員家人領本生理霸占要地關津倚勢欺陵不令商民貿易者事發將倚勢欺陵之人擬斬監候如民人借貸王以下大臣官員銀兩指名貿易霸占要地關津恃強貽纍地方者亦照此例治罪又內府人員家人及王以下大臣官員家人指名倚勢網收市利挾制有司干預詞訟肆行非法該主遣去者本犯枷號三個月鞭一百本犯私去者照光棍例治罪王貝勒貝子公失察者俱交與該衙門照例議處管理家務官革職大臣官員失察者亦俱革職不行察拏之該地方文武官交該部議處一大小衙門公私所需貨物務照市價公平交易不得充用牙行縱役私取即有差辦必須秉公提取毋許藉端需索如有縱役失察交部分别議處其衙役照牙行及無籍之徒用強邀截客貨者不論有無誆賒貨物例枷號一個月杖八十如贓至三十五兩者照枉法贓問擬所得贓私貨物分别給主入官一牙行侵欠控追之案審係設計誆騙侵吞入己者照誆騙本律計贓治罪一百二十雨以上問擬滿流追贓給主若係分散客店牙行並無中飽者一千兩以下照例勒追一年不完依負欠私債律治罪一千兩以上監禁嚴追一年不完於負欠私債律上加三等杖九十所欠之銀仍追給主承追之員按月册報巡道稽查逾限不給者巡道按册提比如怠忽從事拖延纍商者該巡道據實揭參照事件遲延例議處有意徇縱者照徇情例降二級調用如有受財故縱者計贓從重以枉法論一糧船雇覔短縴如有棍徒勒價聚衆攢毆等事押運員辨拿交地方官審實將為首及下手傷人之犯俱問發近邊充軍餘俱杖一百枷號兩個月於河岸示衆私造斛斗稱尺凡私造斛斗稱尺不平在市行使及將官降斛斗稱尺作弊增減者杖六十工匠同罪若官降不如法者官吏工匠杖七十提調官失於較勘者減原置官吏工匠罪一等知情與同罪其在市行使斛斗稱尺雖平而不經官司較勘印烙者即係私造笞四十若倉庫官吏私自增減官降斛斗稱尺收支官物而不平納以所增出以所減者杖一百以所增減物計贓重於杖一百者坐贓論因而得所增減之物入己者以監守自盜論併贓不分首從查律科斷工匠杖八十監臨官知而不舉者與犯人同罪失覺察減三等罪止杖一百器用布絹不如法凡民問造器用之物不牢固正實及絹布之屬紕薄短狹而賣者各笞五十大清律例卷十五
