body:
  text: 戸律戸役脱漏戸口凡一家口戸全不附籍若有田應出賦役者家長杖一百若係無田不應出賦役者杖八十准附籍有賦照賦無賦照丁當差若將他家人隱蔽在戸不另報立籍及相冒合戸附籍他戸有賦役者本戸家長亦杖一百無賦役者亦杖八十若將内外另居親屬隱蔽在戸不報及相冒合戸附籍者各減二等所隱之人並與同罪改正立戸别籍當差其同宗伯叔弟姪及壻自來不曾分居者不在此斷罪改正之限其見在官役使辦事者雖脱戸然有役在身有名在官止依漏口法若曾立有戸隱漏自己成丁十六歳以上人口不附籍及增減年狀妄作老幼廢疾以免差役者一口至三口家長杖六十每三口加一等罪止杖一百不成丁三口至五口笞四十每五口加一等罪止杖七十所隱人口入籍成丁者當差若隱蔽他人丁口不附籍者罪亦如之所隱之人與同罪發還本戸附籍當差若里長失於取勘致有脱戸者一戸至五戸笞五十每五戸加一等罪止杖一百漏口者一口至十口笞三十每十口加一等罪止笞五十本縣提調正官首領官吏失於取勘致有脱戸者十戸笞四十每十戸加一等罪止杖八十漏口者十口笞二十每三十口加一等罪止笞四十知情者並與犯人同罪受財者計贓以枉法從重論若官吏曾經三次立案取勘已責里長文狀叮嚀省諭者事發罪坐里長如里長官吏知其脱漏之情而故縱不問者則里長官吏與脱漏戸口之人同罪若有受財者並計贓以枉法從重論條例一直隸各省編審察出増益人丁實數繕冊奏聞名為盛世滋生戸口冊其徴收錢糧但㨿康熙五十年丁冊定為常額續生人丁永不加賦如額徵丁糧數内有開除者即將各該省新増人丁補足額數至新增人丁倘不㨿實開報或有私派錢糧及造冊之時藉端需索該督撫嚴查題叅一八旂凡遇比丁之年各該旂務將所有丁冊逐一嚴查如有漏隱即㨿實報出補行造冊送部如該旂不行詳查經部察出即交部查議人戸以籍為定凡軍民驛竈醫卜工樂諸色人戸並以原報冊籍為定若詐軍作民冒民脱匠免避已重就人輕者杖八十其官司妄准脱免及變亂改軍為民改民為匠版籍者罪同軍民人等各改正當差若詐稱各衞軍人不當軍民差役者杖一百發邊逺充軍條例一各處衞所官軍人等及竈戸置買民田一體坐派糧差若不納糧當差致累里長包賠者俱問罪其田入官一雍正十三年以前各旂白契所買之人俱不准贖身若有逃走者准遞逃牌乾隆元年以後白契所買單身及帶有妻室子女之人俱准贖身若買主配給妻室者不准贖身未經賣身之先或已定親未娶問女家情願方許配合不情願者聽一旂下奴僕或借别旂名色買贖或自行贖身旂民兩處俱無姓氏者察出即令歸旂其有跟隨家主出差外任私有蓄積鑽營勢力欺壓本主贖身者自康熙五十二年恩詔以後雖在民籍查明强壓情實亦令歸旂若果係數輩出力之人伊主念其勤勞情願聽其贖身為民本旂戸部有檔案可稽州縣地方有冊籍可㨿為民者仍歸民籍舊主子孫不得借端控告其有投充之人私自為民後經發覺將同族之人誣扳為同祖或本主因家奴之同族少有産業誣告投充之子孫者審明將誣扳誣告之人從重治罪一乾隆元年以後放出揑稱元年以前私自營求入於民籍者察出將該戸交刑部照例治罪仍令歸旂作為本主戸下家人其不行詳查之叅佐領及朦混收入民籍之地方官一併交部議處一八旂逺年丁冊有名者即係盛京帶來奴僕直省本無籍貫其帶地投充者亦歴年久逺雖有籍貫難以稽查兩項應仍遵照定例只准開入旂檔不得放出為民一乾隆元年以後白契所買之人未入丁冊者准照例贖身為民其乾隆元年以前白契所買之人旣准作為印契仍照例在本主戸下挑取歩甲等缺俟三輩後著有勞績本主情願放出為民者呈明本旂咨報戸部册檔有伊祖父姓名者亦准放出為民仍行文該地方官查明註冊只許耕作營生不准考試一各省樂籍并浙省墮民丐戸皆令確查削籍改業為良若土豪地棍仍前逼勒陵辱及自甘汚賤者依律治罪其地方官奉行不力者該督撫查叅照例議處一逺年印契所買奴僕之中如内有實係民人印契賣與旂人契内尚有籍貫可查照乾隆元年以前白契所買家人之例三輩後准其為民仍將伊等祖父姓名籍貫一體造冊咨送戸部查核一駐防旂人置買本地家奴本主因其不堪驅使情願准其贖身者亦准放出為民一凡八旂奴僕放出為民未經入籍及入籍在乾隆元年以後之戸應令歸旂作為原主名下開戸壯丁至於設法贖身之戸例應作為開戸壯丁者其已經議結之案毋庸置議外其未結之案或係自備身價贖身或親戚代為贖身者均應歸原主佐領下作為開戸若有實在用價契買隨又交價贖出者均應在買主佐領下作為開戸如經開戸壯丁給價買出者伊等原非另戸正身其名下不便復有開戸之人應仍歸原主佐領下作為開戸一凡八旂絶戸家奴如無族人可歸者無論家下陳人契買奴僕俱准在於本佐領下開戸責令看守伊主墳墓其中如果有年力精壯尚可當差者在於本佐領下披歩甲當差如内有乾隆元年以後白契所買奴僕情願贖身為民者照例贖身其身價銀兩照絶戸財産入官例辦理一發遣賞給各省駐防兵丁為奴人犯除照例不准贖身及不准典賣與别境旂人外其實有應賣事故欲行典賣者報明該管官酌量准其典賣與本處旂人為奴如遇有逃走為匪等事即將典買之人照例治罪原主不坐如賣與民人並别境旂人為奴者杖一百追價入官一凡另戸人之妻因夫亡改嫁與另戸并嫁與戸下家人其前夫所生之子原係另戸應准其隨母改適俟撫養成丁仍歸本宗如子母不忍分離兩家情願倚依者准其倚依仍將本人造入生父本宗丁冊如有民間子弟自幼隨母改嫁與另戸旂人應照戸口不清例另行記檔其有家人之子隨母嫁與另戸以及民間之子隨母改適與戸下家人者統於戸下造報聲明嗣後遇有隨母改嫁人等該叅佐領即時確查報明都統存案仍於編審之年丁冊内註明咨報戸部查核至從前另戸旂人之子自幼給與旂民正身及戸下家人撫養呈請歸宗者該旂查明情實取具兩姓族長族人保結并各該叅佐領印結咨送戸部存案准其歸宗一凡民人之子既經給與旂下家人為嗣即與家人無異應造入伊主戸下以備稽查一八旂從前投充及乾隆元年以前契買家奴果原係竈戸祖父姓名籍貫確有証據令該大使查明出具印甘各結詳報該管上司核明行文該處查提准其放出歸竈仍將賣身之人枷號三個月引進保人枷號兩個月各責四十板追取原價給主其並非竈丁指稱竈丁抗違家主者杖一百仍行給主一應試童生如詭揑數名或頂名入塲希圖倖進者照詐冒律杖八十保結之廪生知情者同罪一順天府考試審音之時究出冒籍情弊將本生及廪保俱照變亂版籍律杖八十廪保仍革去衣頂知縣教官如審音不實濫行申送俱照徇庇例交部議處受財者計贓從重論一凡八旗漢軍人等願在外省居住者在京報明該旗在外呈明督撫不拘逺近任其隨便散處所在督撫咨明該旗每年彚奏一次以便稽查務令安静營生不得强横生事私剙庵院及私度僧道凡寺觀庵院除見在處所先年額設外不許私自剙建增置違者杖一百僧道還俗發邊逺充軍尼僧女冠入官為奴地基材科入官若僧道不給度牒私自簪剃者杖八十若由家長家長當罪寺觀住持及受業師私度者與同罪並還俗入籍當差條例一民間子弟戸内不及三丁或在十六以上而出家者俱枷號一箇月並罪坐所由僧道官及住持知而不舉者各罷職還俗一僧道犯罪雖漏給度牒悉照僧道科斷該還俗者查發各原籍當差若仍於原寺觀庵院或他寺觀庵院潛住者並枷號一箇月照舊還俗其僧道官及住持知而不舉者照違令律治罪一民間有願剙造寺觀神祠者呈明該督撫具題奉㫖方許營建若不俟題請擅行興造者依違制律論一由禮部頒發度牒給在京及各省僧綱司等如情願出家之人必須給予度牒方准披剃仍飾地方官嚴查僧官胥吏毋得借端需索擾累僧徒違者從重治罪一僧道凡有事故將原領牒照追出彚繳毋許改名更替如有暗行隱匿及私相授受者僧道照違制律治罪僧道官斥革還俗地方官照失察例處分一現在應付火居等頂僧道止於優給本身牒照不准招受生徒其合例應招生徒之僧道所有許其招受之人即於伊師原發牒照上註明年貌籍貫簪剃年月伊師身故之日即為本人之牒照不必另行給發該州縣歲底彚報該撫該撫隨五年審丁之期另具清冊報部如所招之人身犯姦盜重罪除將伊師牒照内名字除去外伊師亦不准再行續招如所招之人無罪犯而病故者准另招一人為徒亦於牒照内註明身故續招緣由其牒照有水火盜賊遺失等情准其呈明地方官咨部另給一僧道年逾四十方准招受生徒一人如有年未四十即行招受及招受不止一人者照違令律笞五十僧道官容隱者罪同地方官不行查明交部照例議處所招生徒勒令還俗一僧道如有為匪不法等事責令僧綱道紀等司隨時舉報倘瞻徇故縱别經發覺犯係逆案者將該管僧綱道紀照知情故縱逆犯本律分别已行未行定罪若止失於覺察者照不應重律杖八十立嫡子違法凡立嫡子違法者杖八十其嫡妻年五十以上無子者得立庶長子不立長子者罪亦同俱改正若養同宗之人為子所養父母無子所生父母有子而捨去者杖一百發付所養父母收管若所養父母有親生子及本生父母無子欲還者聽其乞養異姓義子以亂宗族者杖六十若以子與異姓人為嗣者罪同其子歸宗其遺棄小兒年三歲以下雖異姓仍聽收養即從其姓但不得以無子遂立為嗣若立嗣雖係同宗而尊卑失序者罪亦如之其子亦歸宗改立應繼之人若庶民之家存養良家男女為奴婢者杖一百即放從良條例一無子者許令同宗昭穆相當之姪承繼先儘同父周親次及大功小功緦麻如俱無方許擇立逺房及同姓為嗣若立嗣之後却生子其家産與原立子均分一婦人夫亡無子守志者合承夫分須憑族長擇昭穆相當之人繼嗣其改嫁者夫家財産及原有粧奩並聽前夫之家為主一無子立嗣除依律外若繼子不得於所後之親聽其告官别立其或擇立賢能及所親愛者若於昭穆倫序不失不許宗族指以次序告爭并官司受理若義男女壻為所後之親喜悦者聽其相為依倚不許繼子并本生父母用計逼逐仍酌分給財産若無子之人家貧聽其賣産自贍一凡乞養異姓義子有情願歸宗者不許將分得財産攜回本宗其收養三歲以下遺棄之小兒仍依律即從其姓但不得以無子遂立為嗣仍酌分給財産俱不必勒令歸宗如有希圖貲財冒認歸宗者照律治罪一旂人義子必該佐領具保實係自襁褓撫養成丁以繼其後者准其另記檔案不許將民間成丁子弟改隨本姓一凡八旗無嗣之人如無同宗及逺近族人昭穆相當可繼為嗣者除戸下家奴民間子弟雖與另戸旗人分屬至親不准承繼外其有另戸親屬情願過繼者取具兩姓族長人等并該叅佐領印甘各結咨部准其繼立倘實有同宗可繼為嗣揑稱並無族人朦混繼立異姓者仍按律治罪收留迷失子女凡收留良人家迷失道路鄉貫子女不送官司而賣為奴婢者杖一百徒三年為妻妾子孫者杖九十徒二年半若得迷失奴婢而賣者各減良人罪一等被賣之人不坐給親完聚若收留在逃子女不送官司而賣為奴婢者杖九十徒二年半為妻妾子孫者杖八十徒二年若得在逃奴婢而賣者各減良人罪一等其被賣在逃之人又各減一等若在逃之罪重者自從重論其自收留為奴婢妻妾子孫者罪亦如之暫時隱藏在家者不送官司並杖八十若買者及牙保知情減犯人罪一等追價入官不知者俱不坐追價還主若冒認良人為奴婢者杖一百徒三年為妻妾子孫者杖九十徒二年半冒認他人奴婢者杖一百條例一八旗凡有呈報迷失幼童幼女者該管官取具本人族長等並無揑餙甘結照例移咨兵部存案如有隱匿寄養情弊將寄養受寄之人照隱漏丁口律治罪改正族長人等照里長失於取勘律治罪賦役不均賦取於田産役出於人丁凡有司科徴税糧及雜泛差役各驗籍内戸口田糧定立上中下等第科差若放富差貧那移等則作弊者許被害貧民赴控該上司自下而上陳告當該官吏各杖一百改正若上司不為受理者杖八十受財者兼官吏上司言計贓以枉法從重論條例一督撫司道嚴督府州縣掌印正官審編均徭從公查照歲額差役其丁糧有力之家止編本等差役不許分外加增餘剰銀兩貧難下戸并逃亡之數聽其空閒不許徴銀及額外濫設聽差等項名色擾累違者該督撫糾察將有司官依違制律治罪上司官容情不舉罪同一各省藩司并府州縣如遇各部派到物料從公斟酌所屬大小豐歉坐派採買若豪滑規利之徒買囑吏書妄禀編派下屬承攬害民者發附近衞所充軍印官聽從者叅究治罪若本無部派物料而揑稱坐派及明知官收官解借端生事擾累地方者亦照此例治罪一紳衿除優免本身丁銀外倘借名濫以子孫族戸冒入者該地方官查出生監申革職官題叅各杖一百受財者從重論如有私立宦儒圖戸名色包攬詭寄者照脱漏版籍律治罪詭寄與受寄者同論一凡紳衿之家與齊民一體編次聽保甲長稽查違者照脱戸律治罪地方官徇情不詳報者交部照例議處至充保長甲長并輪直支更看柵等役紳衿免派齊民内老疾寡婦之家子孫尚未成丁者亦俱免役一軍民年七十以上者許一丁侍養免其雜派差役丁夫差遣不平凡應差丁夫雜色在官工匠而差遣勞佚不均平者一人笞二十每五人加一等罪止杖六十若丁夫雜匠承差而稽留不著役及在役日滿而所司不放回者一日笞一十每三日加一等罪止笞五十隱蔽差役凡豪民有力之家不資工食令子孫弟姪跟隨官員隱蔽差役者家長杖一百官員容隱者與同罪受財者計贓以枉法從重論跟隨之人免杖罪附近充軍其功臣容隱者照律擬罪奏請定奪禁革主保里長凡各處人民每一百戸内議設里長一名甲首一十名輪年應役催辦錢糧勾攝公事若有妄稱主保小里長保長主首主管甲首等項名色生事擾民者杖一百遷徙比流減半准徒二年若無生事擾民實跡難議遷徙其合設耆老須於本鄉年髙有徳衆所推服人内選充不許罷閒吏卒及有過之人充應違者杖六十革退當該官吏笞四十若受財枉法從重論條例一直省各府州縣編賦役冊以一百一十戸為里推丁多者十人為長餘百戸為十甲甲凡十人歲役里長一人管攝一里之事城中曰坊近城曰廂鄉里曰里凡十年一周先後則各以丁數之多寡為次每里編為一冊冊首總為一圖其鰥寡孤獨不任役者則帶管於百一十戸之外而列於圖後名曰畸零冊成一本送戸部布政司及府州縣各存一本逃避差役凡民戸逃住鄰境州縣躱避差役者杖一百發還原籍當差其親管里長提調官吏故縱及鄰境人戸隱蔽在已者各與同罪若鄰境里長知而不逐遣及原管官司不移文起取若移文起取而所在官司占恡不發者各杖六十若丁夫雜匠在役及工樂雜戸謂驛竈醫卜等戸逃者一日笞一十每五日加一等罪止笞五十提調官吏故縱者各與同罪受財者計贓以枉法從重論不覺逃者五人笞二十每五人加一等罪止笞四十不及五名者免罪上言躱避鄰境是全不當差役者故其罪重此言在役而逃是猶當差役者故其罪輕條例一因兵荒逃避之民有司多方招撫仍令附籍復業當差或年乆逃逺府州縣造逃戸周知文冊備開逃民鄉里姓名男婦口數軍民匠竈等籍及遺下田地税糧若干原籍有無人丁應承糧差送各處督撫督令復業其已成家業願入籍者給與戸由執照附籍當差如不自首雖首而所報人口不盡或展轉逃移及窩家不舉首者各杖一百一有司委官挨勘流民名籍男婦大小丁口排門粉壁十家編為一甲互相保識分屬當地里長帶管如或游蕩作非公舉治罪若團住山林湖濼或投託官豪勢要之家藏躱抗拒官司不服招撫者正犯并里老窩家知而不首及占恡不發者各依律科一沿邊沿海地方軍民人等躱避差役逃入土夷峒寨海島潛住究問情實俱發邊逺衞分充軍本管里長管軍人知而不首者各治以罪有能擒拏送官者不問漢土軍民量加給賞㸃差獄卒凡各處獄卒於相應慣熟人内㸃差應役令人代替者笞四十私役部民夫匠凡有司官私役使部民及監工官私役使夫匠出百里之外及久占在家使喚者有司官使一名笞四十每五名加一等罪止杖八十監工官照名各加二等私役罪小誤工罪大每名計一日追給雇工銀八分五釐五毫若有吉凶及在家借使雜役者勿論監工官仍論其所使人數不得過五十名每名不得使過三日違者以私役論别籍異財凡祖父母父母在子孫别立戸籍分異財産者杖一百須祖父母父母親告乃坐若居父母䘮而兄弟别立戸籍分異財産者杖八十須期親以上尊長親告乃坐或奉遺命不在此律條例一祖父母父母在者子孫不許分財異居此謂分財異居尚未别立戸籍者有犯亦坐滿杖其父母許令分析者聽卑幼私擅用財凡同居卑幼不由尊長私擅用本家財物者十兩笞二十每十兩加一等罪止杖一百若同居尊長應分家財不均平者罪亦如之條例一嫡庶子男除有官廕襲先儘嫡長子孫其分析家財田産不問妻妾婢生止以子數均分姦生之子依子量與半分如别無子立應繼之人為嗣與姦生子均分無應繼之人方許承繼全分一戸絶財産果無同宗應繼之人所有親女承受無女者聽地方官詳明上司酌撥充公收養孤老凡鰥寡孤獨及篤廢之人貧窮無親屬依倚不能自存所在官司應收養而不收養者杖六十若應給衣糧而官吏尅減者以監守自盜論凡係監守者不分首從併贓論條例一直省州縣所屬養濟院或應添造或應修蓋者令地方官酌量修造據實估計報明督撫在於司庫公用銀内撥給仍不時查勘遇有渗漏之處即行粘補完固倘有陞遷事故造入交代冊内取具印結送部其正實孤貧俱令居住院内每名各給印烙年貌腰牌一而該州縣按季到院親身驗明腰牌逐名散給口糧如至期印官公務無暇遴委誠實佐貳官代散加結申報上司毋許有冒濫扣尅情弊若州縣官不實力奉行者該督撫即行查叅照例議處一老人九十以上者地方官不時存問其或孤寡及子孫貧不能養贍者州縣查明賑恤詳報督撫奏聞動用錢糧務令得沾實惠一軍流等犯除年逾六十不能食力者照例撥入養濟院按名給與孤貧口糧外或年未六十而已成篤疾不能謀生者亦應一體撥給其少壯軍流各犯實係貧窮又無手藝者初到配所按該犯本身及妻室子女每名每日照孤貧給與口糧自到配日起以一年為止於各州縣存貯倉榖項下動用報銷各州縣有驛遞之處一切應用人夫酌派軍流少壯中無資財手藝之犯充當給與應得工食無驛遞之州縣公用夫役均令一體充當逐日給與工價仍令該督撫照各處現行章程妥恊辦理一京師五城各設棲流所一處安頓貧病流民其修理房屋工料及衣食藥餌之資每年每城動支戸部庫銀二百兩備用如有不敷許其赴部具領如或有餘留於下年備用該城御史督率司坊等官實心辦理如有虚冒侵蝕等弊照例交部治罪一各省流寓孤貧如籍隸鄰邑仍照例移送收養外其在原籍千里以外者准其動支公項銀兩一體收養年底造冊報銷一凡被災最重地方饑民外出求食各督撫善為安輯俟本地災䘲平復然後送回大清律例卷八
