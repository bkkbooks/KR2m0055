front:
  text: 欽定四庫全書大清律例卷四十七
  hash: sha256:2876a0b5e58b7943b8f86b9719c80c5d440f087ad3191212c84b82f506708637
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0055_WYG_111-1a, image: WYG0673/WYG0673-0396c.png}
body:
  text: 比引律條按律無正條則比引科斷今略舉數條開列於後餘可例推一僧道徒弟與師共犯罪徒弟比依家人共犯免免科一强竊盜犯捕役帶同投首有教令及賄求故揑情弊比照受財故縱律治罪一發賣猪羊肉灌水及米麥等插和沙土貨賣者比依客商將官鹽插和沙土貨賣律杖八十一男女定婚未曽過門私下通姦比依子孫違犯教令律杖一百一打破信牌比依毁官文書律杖一百一運糧一半在逃比依凡奉制書有所施行而違者律杖一百一既聘未娶子孫之婦罵舅姑比依子孫違犯教令律杖一百一遺失京城門鎖鑰比依遺失印信律杖九十徒二年半一妻之子打庶母傷者比依弟妹毆兄姊律杖九十徒二年半一殺義子比依殺兄弟之子律杖一百徒三年故殺者杖一百流二千里一考職貢監生假冒頂替者比照詐假官律治罪一姦義子婦比依姦緦麻以下親之妻律杖一百徒三年强者斬一姦乞養子婦比依姦妻前夫之女律科斷其子與婦斷還本宗强者斬一姦義妹比依姦同母異父姊妹律杖一百徒三年强者斬一姦妻之親生母者比依母之姊妹論一姦義女比依姦妻前夫之女律杖一百徒三年强者斬一偷盜所掛犯人首級丢棄水中比依折毁申眀亭板榜律杖一百流三千里一夫棄妻之尸比依尊長棄毁緦麻以下卑幼之尸律杖一百流三千里一兄調戲弟婦比依强姦未成律杖一百流三千里一拖纍平人致死比依誣告人因而致死一人律絞一官吏打殺監候犯人比依獄卒非理陵虐罪囚致死律各絞一弓兵姦職官妻比依奴及雇工人姦家長期親之妻律絞一伴當姦舍人妻比依奴及雇工人姦家長期親之妻律絞一奴婢誹謗家長比依罵家長律絞一奴婢放火燒主房屋比依奴婢罵家長律絞一棄毁祖宗神主比依棄毁父母死尸律斬一養子罵義父母比依子孫罵祖父母律立絞一罵親王比依罵祖父母律立絞一義子姦義母比依雇工人姦家長律立斬一謀殺義父之期服兄弟比依雇工人謀殺家長之期親律已行者立斬已殺者凌遲大清律例卷四十七
