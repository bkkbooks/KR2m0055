front:
  text: 世宗憲皇帝御製大清律集解序
  hash: sha256:e227e403a1efa718d9d50007ac4225f7aee885be2ab98b7d2c7b27f0fc3a8786
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0055_WYG_002-1a, image: WYG0672/WYG0672-0378c.png}
body:
  text: 周禮大小司寇之職以三典詰四方以五刑聽獄訟正歲帥其屬而觀刑象不用法者國有常刑月吉始和布刑於邦國都鄙乃懸刑象之法於象魏使萬民聚而觀之是知先王立法定制將以明示朝野俾官習之而能斷民知之而不犯所由息爭化俗而致於刑措也恭惟我皇考聖祖仁皇帝大德如天以至仁涵育羣生法司上奏率多全宥停刑肆赦屢沛恩綸臨御六十一年厚澤周浹乎宇內血氣心知之倫熙然安處於仁夀之域朕紹守丕圖深懷繼述雍正元年八月乃命諸臣將律例館舊所纂修未畢者遴簡西曹殫心搜輯稿本進呈朕以是書民命攸關一句一字必親加省覽每與諸臣辨論商榷折中裁定或析異以歸同或删繁而就約務期求造律之意輕重有權盡讞獄之情寬嚴得體三年八月編校告竣刊布內外永為遵守易曰先王以明罰敕法漢鄭昌言律令一定愚民知所避姦吏無所施是書也豈惟百爾有位宜精思熟習悉其聰明以察小大之比凡士之注名吏部將膺民社之責者講明有素則臨民治事不假於幕客胥吏而判決有餘若自通都大邑至僻壤窮鄉所在州縣倣周禮布憲讀法之制時為解說令父老子弟遞相告戒知畏法而重自愛如此則聽斷明於上牒訟息於下風俗可正禮讓可興於以體皇考好生之德而追虞廷從欲之治不難矣朕實有厚望焉雍正三年嵗次乙巳九月初九日
  hash: sha256:5e0abad97749ca5082d6d3e7cf58b5a8cfe25684438031a37d979a5b689987c0
