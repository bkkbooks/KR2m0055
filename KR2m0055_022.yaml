body:
  text: 服制斬衰三年子為父母女在室并已許嫁者及已嫁被出而反在室者同子之妻同子為繼母為慈母為養母子之妻同繼母父之後妻慈母謂母卒父命他妾養己者養母謂自幼過房與人者庶子為所生母為嫡母庶子之妻同為人後者為所後父母為人後者之妻同嫡孫為祖父母及曾髙祖父母承重嫡孫之妻同妻為夫妾為家長同齊衰杖期嫡子衆子為庶母嫡子衆子之妻同庶母父妾之有子女者父妾無子女不得以母稱矣子為嫁母親生母父亡而改嫁者子為出母親生母為父所出者夫為妻父母在不杖齊衰不杖期祖為嫡孫父母為嫡長子及嫡長子之妻及衆子及女在室及子為人後者繼母為長子衆子前夫之子從繼母改嫁於人為改嫁繼母姪為伯叔父母及姑姊妹之在室者為己之親兄弟及親兄弟之子女在室者孫為祖父母孫女在室出嫁同為人後者為其本生父母女出嫁為父母女在室及雖適人而無夫與子者為其兄弟姊妹及姪與姪女在室者女適人為兄弟之為父後者婦為夫親兄弟之子及女在室者妾為家長之正妻妾為家長父母妾為家長之長子衆子與其所生子為同居繼父而兩無大功以上親者齊衰五月曾孫為曾祖父母曾孫女同齊衰三月元孫為髙祖父母元孫女同為同居繼父而兩有大功以上親者為繼父先曾同居今不同居者自來不曾同居者無服大功九月祖為衆孫孫女在室同祖母為嫡孫衆孫父母為衆子婦及女已出嫁者伯叔父母為姪婦及姪女已出嫁者姪婦兄弟子之妻也姪女兄弟之女也婦為夫之祖父母婦為夫之伯叔父母為人後者為其兄弟及姑姊妹之在室者既為人後則於本生親屬服皆降一等夫為人後其妻為夫本生父母為己之同堂兄弟姊妹在室者即伯叔父母之子女也為姑及姊妹之已出嫁者姑即父之姊妹姊妹即己之親姊妹也為己兄弟之子為人後者出嫁女為本宗伯叔父母出嫁女為本宗兄弟及兄弟之子出嫁女為本宗姑姊妹及兄弟之女在室者小功五月為伯叔祖父母祖之親兄弟為堂伯叔父母父之堂兄弟為再從兄弟及再從姊妹在室者為同堂姊妹出嫁者為同堂兄弟之子及女在室者為祖姑在室者即祖之親姊妹為堂姑之在室者即父之同堂姊妹為兄弟之妻祖為嫡孫之婦為兄弟之孫及兄弟之孫女在室者為外祖父母即母之父母為母之兄弟姊妹兄弟即舅姊妹即姨為姊妹之子即外甥及女之在室者婦為夫兄弟之孫即姪孫及夫兄弟之孫女在室者即姪孫女婦為夫之姑及夫姊妹在室出嫁同婦為夫兄弟及夫兄弟之妻婦為夫同堂兄弟之子及女在室者女出嫁為本宗堂兄弟及堂姊妹之在室者為人後者為其姑及姊妹出嫁者緦麻三月祖為衆孫婦曾祖父母為曾孫元孫曾孫女元孫女同祖母為嫡孫衆孫婦為乳母為曾伯叔祖父母即曾祖之兄弟及曾祖兄弟之妻為族伯叔父母即父再從兄弟及再從兄弟之妻為族兄弟及族姊妹在室者即己三從兄弟姊妹所與同髙祖者為曾祖姑在室者即曾祖之姊妹為族祖姑在室者即祖之同堂姊妹為族姑在室者即父之再從姊妹為族伯叔祖父母即祖同堂兄弟及同堂兄弟妻為兄弟之曾孫及兄弟之曾孫女在室者為兄弟之孫女出嫁者為同堂兄弟之孫及同堂兄弟之孫女在室者為再從兄弟之子及女在室者為祖姑及堂姑及己之再從姊妹出嫁者祖姑即祖之親姊妹堂姑即父之堂姊妹為同堂兄弟之女出嫁者為姑之子即父姊妹之子為舅之子即母兄弟之子為兩姨兄弟即母姊妹之子為妻之父母為壻為外孫男女同即女之子女為兄弟孫之妻即姪孫之妻為同堂兄弟之子妻即堂姪之妻為同堂兄弟之妻婦為夫髙曾祖父母婦為夫之伯叔祖父母及夫之祖姑在室者婦為夫之堂伯叔父母及夫之堂姑在室者夫之堂姑即夫之伯叔祖父母所生也婦為夫之同堂兄弟姊妹及夫同堂兄弟之妻婦為夫再從兄弟之子女在室同婦為夫同堂兄弟之女出嫁者婦為夫同堂兄弟子之妻即堂姪婦婦為夫同堂兄弟之孫及孫女之在室者婦為夫兄弟孫之妻即姪孫之妻婦為夫兄弟之孫女出嫁者婦為夫之曾孫元孫及曾孫女元孫女之在室者婦為夫兄弟之曾孫即曾姪孫曾孫女同婦為夫之小功服外姻親屬女出嫁為本宗伯叔祖父母及祖姑在室者女出嫁為本宗同堂伯叔父母及堂姑在室者女出嫁為本宗堂兄弟之子女在室者同大清律例卷三
