body:
  text: 刑律斷獄下官司出入人罪辨明寃枉有司決囚等第檢驗尸傷不以實決罰不如法長官使人有犯斷罪引律令獄囚取服辨赦前斷罪不當聞有恩赦而故犯徒囚不應役婦人犯罪死囚覆奏待報斷罪不當吏典代寫招草
