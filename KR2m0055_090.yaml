  text: 欽定四庫全書大清律例卷三十七
  hash: sha256:b29fda9c6c39c3be68e18cadb77546c75857ed23a5719854f7173d283b80f723
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0055_WYG_090-1a, image: WYG0673/WYG0673-0140c.png}
body:
  text: 刑律斷獄下官司出入人罪凡官司故出入人罪全出全入者徒不折杖流不折徒以全罪論謂官吏因受人財及法外用刑而故加以罪故出脫之者並坐官吏以全罪若于罪不至全入但增輕作重于罪不至全出但減重作輕以所增減論至死者坐以死罪若增輕作重入至徒罪者每徒一等折杖二十入至流罪者每流一等折徒半年入至死罪已決者坐以死罪若減重作輕者罪亦如之若斷罪失于入者各減三等失于出者各減五等並以吏典為首首領官減吏典一等佐二官減首領官一等長官減佐二官一等科罪坐以所減三等五等若囚未決放及放而還獲若囚自死故出入失出入各聼減一等其減一等與上減三等五等並先減而後算折其剩罪以坐不然則其失增失減剩杖剩徒之罪反有重于全出全入者矣凡故增笞從徒如犯笞一十故增作杖八十徒二年徒三等折杖六十原包杖一百通折杖一百六十除犯該笞一十合坐官吏剩杖一百五十未決者減一等杖七十徒一年半折杖一百四十除犯該笞一十合坐剩杖一百三十其剩罪俱全抵不在收贖之限凡故增杖從徒如犯杖八十故增作杖六十徒一年通折杖一百二十除犯該杖八十合坐官吏剩笞四十未決者減一等杖一百除犯該杖八十合坐剩笞二十凡故增杖徒流如犯杖八十故增作杖一百流二千五百里流二等折徒一年三流原包五徒折杖二百徒一年除犯該杖八十合坐官吏剩杖一百二十徒一年未決者減一等杖一百徒三年通折杖二百除犯該杖八十合坐剩杖一百二十凡故增輕徒從重徒如犯杖六十徒一年故增作杖九十徒二年半徒四等折杖八十除犯該徒一年折杖二十合坐官吏剩杖六十以徒從徒不必包杖一百算也雖包算其罪亦同未決者減一等杖八十徒二年折杖六十除犯該折杖二十合坐剩笞四十凡故增徒從流如犯杖七十徒一年半通折杖一百四十故增作流二千里折徒半年三流原包五徒折杖二百徒半年除犯該杖一百四十合坐官吏剩杖六十徒半年未決者減一等杖一百徒三年折杖二百除犯該杖一百四十合坐剩杖六十凡故增近流從逺流如犯杖一百流三千里折徒半年故增作流三千里折徒一年半除犯該徒半年合坐官吏剩徒一年以流從流不必包五徒折杖二百算未決者減盡無科減逺流從近流者倣此凡故增笞杖徒流至死如增至死罪本無折法已決者反坐以死若未決及囚自死者並聼減等流三千里原包五徒折杖二百徒一年半各隨其本應得之罪除之坐以剩罪凡故減徒從笞如犯杖六十徒一年折杖一百二十故減作笞五十除已得笞五十合坐官吏剩杖七十未放者減一等杖一百除已得笞五十合坐剩笞五十凡故減徒從杖如犯杖九十徒二年半折杖一百八十故減作杖一百除已得杖一百合坐官吏剩杖八十未放者減一等杖八十徒二年折杖一百六十除已得杖一百合坐剩杖六十凡故減重徒從輕徒如犯杖一百徒三年折杖二百故減作杖七十徒一年半折杖一百四十除已得杖一百四十合坐官吏剩杖六十未放者減一等杖九十徒二年半折杖一百八十除已得杖一百四十合坐剩笞四十凡故減流從笞如犯杖一百流二千里折徒半年故減作笞四十三流原包五徒折杖二百徒半年除已得笞四十合坐官吏剩杖一百六十徒半年未放者減一等杖一百徒三年折杖二百除已得笞四十合坐剩杖一百六十減流從杖倣此凡故減流從徒如犯杖一百流三千里折徒一年半故減作杖八十徒二年折杖一百六十三流原包五徒折杖二百徒一年半除已得杖一百六十合坐官吏剩笞四十徒一年半未放者減一等杖一百徒三年折杖二百除已得杖一百六十合坐剩笞四十凡故減死罪從笞杖徒流如死囚已放者反坐以死若未放及放而還獲若囚自死者並聼先減去一等依律折除凡失增笞從杖如犯笞三十失增作杖一百失入減三等該杖七十除犯該笞三十吏典為首合坐剩笞四十未決者又減一等合坐吏典首罪笞三十凡失增笞從徒如犯笞一十失增作杖一百徒三年失入減三等杖七十徒一年半折杖一百四十除犯該笞一十吏典為首合坐剩杖一百三十未決者又減一等杖六十徒一年折杖一百二十除犯該笞一十合坐吏典首罪杖一百一十增杖從徒倣此凡失增杖從流如犯杖一百失增作杖一百流三千里失入減三等杖八十徒二年折杖一百六十除犯該杖一百吏典為首合坐剩杖六十未決者又減一等杖七十徒一年半折杖一百四十除犯該杖一百合坐吏典首罪笞四十凡失增輕徒從重徒如犯杖六十徒一年折杖二十失增作杖一百徒三年失入減三等杖七十徒一年半徒二等折杖四十除犯該杖二十吏典為首合坐剩笞二十首領官減一等笞一十佐二官減盡無科未決者又減一等杖六十徒一年則與本該罪名同矣雖吏典亦減盡無科以徒從徒及以徒從流俱不包杖一百之數凡失增徒從流如犯杖六十徒一年折杖二十失增作杖一百流三千里失入減三等杖八十徒二年折杖六十除犯該杖二十吏典為首合坐剩笞四十未決者又減一等杖七十徒一年半折杖四十除犯該杖二十合坐吏典首罪笞二十凡失增笞杖徒流入死如死囚已決者亦減三等若未決及囚自死又減一等吏典為首其減至徒罪亦折杖除之凡失減杖從笞如犯杖一百失減作笞三十失出減五等笞五十除已得笞三十吏典為首合坐剩笞二十未放者又減一等笞四十除已得笞三十合坐吏典首罪笞一十凡失減徒從笞如犯杖七十徒一年半失減作笞二十失出減五等杖七十除已得笞二十吏典為首合坐剩笞五十未放者又減一等杖六十除已得笞二十合坐吏典首罪笞四十減徒從杖倣此凡失減流從笞如犯杖一百流三千里失減作笞一十失出減五等杖六十徒一年折杖一百二十除已得笞一十吏典為首合坐剩杖一百一十未放者又減一等杖一百除已得笞一十合坐吏典首罪杖九十凡失減流從徒如犯杖一百流三千里失減作杖六十徒一年失出減五等杖六十徒一年吏典為首減盡無科凡失減死罪從流徒杖笞如死囚已放者亦減五等若未放及放而還獲或囚自死者又減一等其徒亦折杖除之按故增笞從徒條內官吏合坐剩杖一百三十其剩罪俱全抵不在收贖之限所謂全抵者非滿杖以上皆決杖也凡增笞杖從徒減徒從笞杖及增減徒從徒者每徒一等折杖二十若所剩杖數至滿杖以上則減杖加徒如剩杖一百一十應作笞五十徒一年一百二十應作杖六十徒一年一百三十應作杖六十徒一年半一百四十應作杖七十徒年半之類其增笞杖徒作流減流作笞杖徒及增減流徒者每流一等折徒半年如犯笞一十故增作流二千五百里流二等折徒一年三流原包五徒除已得笞一十合坐剩罪杖九十徒四年如犯流三千里故減作笞二十流三等折徒年半三流原包五徒除已得笞二十合坐剩罪杖八十徒四年半之類故曰全抵剩罪不在收贖之限總之折徒不得至五年而決杖不得過一百也條例一承審官改造口供故行出入者革職故入死罪已決者抵以死罪其草率定案證據無慿枉坐人罪者亦革職一凡初次供招不許擅自刪改俱應詳載揭帖若承問官增減原供希圗結案按察使依樣轉詳該督撫嚴察題參不行察參將該督撫交部一併議處按察使亦不得借簡招之名故為刪改倘遇有意義不明序次不順與情罪並無千礙即就近核正申轉將改本備案不得發換銷毁違者依改造口供故行出入例議處一凡謀反謀叛之罪照律連坐籍沒其餘情罪詳載律內俱應照律擬議不得存心陷害借言情罪重大誣指朋黨妄議株連父母兄弟妻子籍沒家産若承審官于本罪外揑造此等言語株連父母兄弟妻子籍沒家産者即照故入人死罪律治罪一凡督撫具題事件內有情罪不協律例不符之處部駁再審該督撫虛心按律例改正具題將從前承審舛錯之處免其議處若駁至三次督撫不酌量情罪改正仍執原議具題部院覆核其應改正者即行改正將承審各官該督撫一一併交與該部議處辨明寃枉凡內外問刑衙門辨明寃枉須要開具本囚所枉事迹實封奏聞委官追問其寃情得實被誣之人依律改正所枉之罪坐原告誣告原問官吏以故失入罪論若罪囚事本無寃枉朦朧辨明者杖一百徒三年既曰朦朧則原告原問官為其誣矣若所誣罪重于杖一百徒三年者以故出入人罪論所辨之罪人知情與朦辨同罪如原犯重止從重論不知者不坐條例一法司凡遇一應稱寃調問及各衙門奏送人犯如有寃枉及情罪有可矜疑者即與辨理具奏發落毋拘成案若明知寃枉不與辨理者以故入人罪論一法司遇有重囚稱寃原問官員輒難辨理者許該衙門移文會同三法司堂上官辨理果有寃枉及情可矜疑者奏請定奪一凡在外審理事件應照案內人犯籍貫批委該管地方官審理明白申詳完結既經批委不得反覆改批别屬如果情事未明務須詳細指駁倘原問官仍復朦混申詳即題參議處另委别官審理若督撫等官將事理已明之案故生枝節屢行批駁遲延不結者亦交該部議處一凡被參革職訊問之員審係無辜即以開復定擬不得稱已經革職無庸議題覆其原參重罪審虛尚有輕罪應以降級罰俸歸結者開復原職再按所犯分别降罰一凡審理事件除事涉兩邑或案情重大發審之初即委員會審者仍令會同審詳外其因承審錯誤另委别官審理者専責委員虛心質訊毋庸原問官會審至定案後如原問官果有徇私枉斷故出故入情弊仍照例參處其或供情疏漏或援引拘泥誤出無心經委員改正者照審處錯誤例議處一命盜案件經該督撫臬司駁審除案情重大須該知府赴省審理或係委𣲖會審仍聼該督撫隨時酌量辦理外如果案情與原招並無出入即由附省知府審轉仍許原審知府一體列銜申詳倘審理錯悮關係重大者即將承審之州縣及率轉之知府一併開參照例分别議處一民間詞訟如户婚田土罪止杖枷之案及吏胥蠧役藉端訛詐等情州縣審斷不平復赴督撫藩臬等衙門具控者即飭令各本管道府按其事之輕重或親提集訊或委員另審將審擬情由詳明該上司察核其中稍有疑義該上司即親行提審如赴道府衙門呈訴者即行親審遇有寃抑即為昭雪如有檢驗查勘等事即遴委賢員不得仍會同原問官辦理倘有故違成例仍發原問官收問或仍令會審者即行論罪如律其所委之員若有瞻徇聼囑等弊亦即題參律擬至于刁健之徒本無寃抑或因負罪受懲掩飾已非揑欵誣控或因鬭毆婚姻田宅等事不赴本管官控理輒赴上司衙門架詞妄控者仍按律治罪有司決囚等第凡有司于獄囚始而鞫問明白繼而追勘完備軍流徒罪各從府州縣決配至死罪者在內法司定議在外聼督撫審録無寃依律議擬斬絞情罪法司覆勘定議奏聞候有回報應立決者委官處決故延不決者杖六十其公同審録之際若犯人自行反異原招或家屬代訴稱寃審録官即便再與推鞫事果違枉即公同將原問原審官吏通問改正同將原問原審之官吏通行提問改正其罪若囚犯明稱寃抑審録官不為申理改正者以入人罪故或受贓挾私一失或一時不及參究論條例一秋審時督撫將重犯審擬情實緩決可矜具題限五月內到部刑部將原案及法司看語并督撫看語刋刻招册送九卿詹事科道各一册八月內在金水橋西會同詳核情實緩決可矜分擬具題請旨定奪其盛京等處案件亦造入各省秋審案內具題俟命下日先後咨行直省將情實人犯于霜降後冬至前正法其咨文到地方限期雲南貴州四川廣西廣東福建限四十日江西浙江湖南甘肅限二十五日江南陜西湖北限十八日河南限十二日山東山西限九日直𨽻限四日盛京限十五日寧古塔限一個月限內遲延不到者該督撫將遲延地方官察明指參至于秋審具題後如有新結重案俱入次年秋審一刑部見監重犯每年一次朝審刑部于霜降前摘緊要情節刋刷招册送九卿詹事科道各一册於霜降後十日在金水橋西會同詳審擬定情實緩決可矜具題請旨定奪其情實者俟命下之日刑科三次覆奏經御筆勾除者正法其餘仍監固一杖笞等輕罪五城及提督衙門俱照例自行完結若罪重于杖笞者俱審明送刑部定擬一刑部彚題事件內如竊盜三犯贓數不多改遣家奴喫酒行凶發遣及賭博擬流販私擬徒軍民通姦擬以枷責等項平常罪犯于審結之日即照例先行發落仍于彚題疏內聲明一凡立決之犯部文到日如正印官公出令同城之州同州判縣丞主簿等官會同本城武職遵查不停刑日代行監決若該地方無佐二官令該知府于部文到時即委府屬之同知通判經歷等官速至該州縣會同武職代行監決該佐二等官監斬後將正印官因何事公出并見委某官于何年月日會同武職某官監決何犯逐一詳報各上司查核一刑部特交案件即審明無罪可科應具摺覆奏如罪至斬絞仍會同三法司核擬特題完結其他案件除杖罪竟行發落外犯該發遣軍流徒役及軍流徒折鞭枷等罪倘非尋常經見之事若犯罪文自監生以上武自驍騎校以上或本身雖白丁係現任大員子弟犯該斷決者仍照現行彚題之例詳敘供招文移不拘件數時日隨結隨題俟奉旨之日發落若竊盜賭博鬭毆宰牛姦拐喫酒行凶之類先行發落挨次彚題一秋審應決重囚如文到正值冬至齋戒日期或已過冬至者于冬至七日以後照例處決一各省每年題結斬絞重案刑部于次年開印後分類摘敘簡明事由繕摺奏聞一凡秋審勾到時遇某省本章即著某道御史承辦朝審案件令京畿道專辦行刑時著刑科給事中及刑部侍郎一人監視一凡職官實犯死罪應入秋朝審者另為一册仍分别情實緩決可矜三項進呈一凡每年秋審遇審某省即令某道御史與掌道一體上班朝審令京畿道御史同掌道與審一福建之臺灣府屬斬絞監候人犯專令按察使照舊收監其應支囚糧衣藥及遇有疏脫監斃事件俱查照定例一體辦理一凡直省駐防旗人犯事應斬絞者俱解刑部收監旗人家奴即在犯事地方監禁一凡停止勾決之年其情實案內有糾衆聚匪劫犯辱官及侵蝕虧空多贓情罪重大各犯刑部仍開具事由清册另行奏聞請旨正法一凡罪干服制由立決改為監候者刑部于秋審時俱列入情實彚為一册先期進呈候勾俟經兩次免勾之後大學士會同刑部堂官將此等人犯招册覆加詳勘其有實在情節可寬者摘敘案情確加看語請旨改入緩決一各省官犯如係貪酷敗檢侵虧狼籍及有心巧詐不盡臣職罪應斬絞之員其審題結案在行刑之日以前者著皆補疏題請情實豫勾者即行刑之日已過亦著行刑在行刑以後審結者入下年新事册內刑部仍粘籖聲明其尋常私罪案犯無前項情節者著牢固監候俟次年秋審辦理不得概請補入本年情實一凡斬絞罪犯內如一人連斃二命妖言惑衆傳習符呪並官員侵漁帑項勒斂民財非殘忍已極即有關民俗官方如定讞已在該省熱審之後刑部即補入本年秋審情實册內具題如遇停勾之年俱照情罪重大之例另奏請旨正法一各省秋審本揭如係新事初次入秋審者照舊備敘案由確加看語以憑會核其舊事緩決三次者止敘案由未及三次者摘敘簡明略節依次彚為一本具題俱不必敘入問供以省繁冗至九卿會審時刑部分送招册內有已經緩決三次並無更改者不必重復備册分送會審其中或有一二案尚須商議之處仍聼刑部摘出臨期印册分送九卿公同會議其各省官犯及在京朝審案犯雖緩決三次以上仍照舊例辦理一刑部現審案內除尋常徒流軍遣等罪照例定擬者仍入于按季彚題外如遇有酌重酌輕案件即非生監驍騎校及大臣子弟之案亦俱不拘件數時日隨結隨題仍于酌量改擬之處粘貼黃簽進呈御覽一各省奉到立決人犯部文該督撫按程按日計算如由府轉行州縣在正六八月停刑期內者即將部文密存按察司內署仍按程日計算行至州縣已非停刑日期釘封專差馳遞該州縣奉到部文即日處決一秋審可矜人犯內如子婦不孝詈毆翁姑其夫忿激致斃或因該犯之母素有姦夫已經拒絶後復登門尋釁以致拒毆致斃者此等情切天倫一時義激與尋常狠鬭者不同刑部會同九卿遇有似此罪犯案情既確俱量為區别照免死減等例再減一等發落仍逐案隨本聲明請旨一秋朝審案內搶竊滿貫及三犯竊贓至五十兩以上問擬絞候之犯除情重應擬情實人犯外其餘應入緩決者秋朝審一次之後改發雲貴兩廣極邉煙瘴充軍一緦麻服屬人犯于停勾二次之後亦照期功以上例大學士會同刑部一體省核改入緩決一各省每年秋審臬司核辨招册務須先期定稿陸續移咨在省司道會同虛𠂻商確聨銜具詳督撫覆核定擬至期會審司道等官俱赴督撫衙門辦理一新疆地方定擬死罪監候人犯凡經秋審緩決二次及擬情實三次未勾者俱發往雅爾地方給種地兵丁為奴一凡每年各省應入秋審人犯無庸提解省城會勘俱令各該道員以冬季為期巡歷所屬就便率同該府知府親詣各該州縣逐一訊勘如與定案時並無異同即行造册加結申送督撫查核定擬若有情罪未協臨時呼寃之犯訊非揑詞翻異亦即另繕招册出具印結派委妥役將犯證一併解送院司覆審倘有事本寃抑該道等徇庇屬員不為辨明及案無可疑有心翻異者該督撫查出嚴參議處督撫等不加覺察亦一併議處其直𨽻州知州及並無統轄之廳員俱照知府之例辦理直𨽻州本州案件應專聼道員覆勘至盛京刑部侍郎及吉林黑龍江將軍衙門案件仍照舊例行其並無道員統轄之錦州奉天二府錦州府即著知府奉天府即著治中前往覆勘該道府巡歷之時務須輕騎減從毋得稍有滋擾經過之地方官亦不得供應迎送如該道巡歷以後應行續入者仍令該道于秋審前率同知府就案按臨補行審勘檢驗尸傷不以實凡官司初檢驗尸傷若承委牒到託故遷延不即檢驗致令尸變及雖即檢驗不親臨尸所監視轉委吏卒憑臆增減傷痕若初檢與復檢官吏相見扶同尸狀及雖親臨監視不為用心檢驗移易如移腦作頭之類輕重如本輕報重本重報輕之類增減如少增作多如有減作無之類尸傷不實定執要害致死根因不明者正官杖六十同檢首領官杖七十吏典杖八十件作行人檢驗不實扶同尸狀者罪亦如吏典以杖八十坐之其官吏仵作因檢驗不實而罪有增減者以失出入人罪論失出減五等失入減三等若官吏仵作受財故檢驗不以實致罪有增減者以故出入人罪論贓重於故出故入之罪者計贓以枉法各從重論止坐受財檢驗不實之人其餘不知情者仍以失出入人罪論條例一遇告訟人命有自縊自殘及病死而妄稱身死不明意在圖賴詐財者究問明確不得一概發檢以啓弊竇其果係鬬殺故殺謀殺等項當檢驗者在京委刑部司官及五城兵馬司京縣知縣在外委州縣正印官務須於未檢驗之先即詳鞫尸親證佐凶犯人等令其實招以何物傷何致命之處立為一案隨即親詣尸所督令仵作如法檢報定執要害致命去處細驗其圓長斜正青赤分寸果否係某物所傷公同一干人衆質對明白各情輸服然後成招或尸久發變青赤顔色亦須詳辨不許聽憑忤作混報擬抵其仵作受財增減傷痕扶同尸狀以成寃獄審實贓至滿數者依律從重科斷不先究致死根因明確槩行檢驗者官吏以違制論一諸人自縊溺水身死别無他故親屬情願安葬官司詳審明白準告免檢若事主被強盜殺死苦主自告免檢者官與相視傷損將尸給親埋葬其獄囚患病責保看治而死者情無可疑亦許親屬告免覆檢若據殺傷而死者親屬雖告不聽免檢一凡人命重案必檢驗尸傷注明致命傷痕一經檢明即應定擬若尸親控告傷痕互異者許再行覆檢勿得違例三檢致滋拖纍如有疑似之處委别官審理者所委之官帶同仵作親詣尸所不得弔尸檢驗一凡外省駐防旗人遇有命案該管旗員即會同理事同知通判帶領領催尸親人等公同檢驗一靣詳報上司一靣會同審擬如無理事同知通判之處即會同有司官公同檢驗詳報審擬一凡人命呈報到官該地方印官立即親往相驗止許隨帶仵作一名刑書一名皂𨽻二名一切夫馬飯食俱自行備用并嚴禁書役人等不許需索分文其果係輕生自盡毆非重傷者即於尸場審明定案將原被鄰證人等釋放如該地方印官不行自備夫馬取之地方者照因公科斂律議處書役需索者照例計贓分别治罪如故意遲延拖纍者照易結不結例處分若係自盡並無他故尸親揑詞控告按誣告律科斷如刁悍之徒藉命打搶者照白晝搶奪例擬罪仍追搶毁物件給還原主其勒索私和者照私和律科斷勒索財物入官至該管上司於州縣所報自盡命案果屬明確無疑者不得苛駁準豫立案若情事未明仍即秉公指駁俟其詳覆核奪一大縣額設仵作三名中縣額設二名小縣額設一名仍於額設之外再募一二人令其跟隨學習預備頂補每名給發洗寃録一部選委明白刑書一人與仵作逐細講解每人發給皂𨽻工食一名學習者兩人共撥給皂隸工食一名若有曖昧難明之事果能檢驗得法洗雪沉寃該管上司賞給銀十兩其有檢驗故行出入審有受賄情弊者照例治罪不許充役一地方呈報人命到官正印官公出壤地相接不過五六十里之鄰邑印官未經公出即移請代往相驗或地處窵逺不能朝發夕至又經他往方許派委同知通判州同州判縣丞等官毋得濫派雜職其同知等官相驗填具結格通報仍聽正印官承審如有相驗不實照例參處一州縣仵作缺額不行募補州縣官及各上司均交部分别議處倘不將仵作補足因而私侵工食銀兩者州縣官革職提問該管各上司一併交部議處一檢驗自盡人命如尸親逺居别屬一時不能到案該地方官應即驗明立案殮埋一凡檢驗量傷尺寸照工部頒發工程制尺一例製造偹用不得任意長短致有出入一凡京師內城正身旗人遇有命案令本家稟報該佐領轉報刑部相驗街道命案無論旗民令步軍校呈報步軍統領衙門轉咨刑部票委該城指揮相驗其外城地方人命亦無論旗民但令總甲呈報該城指揮該城指揮即速相驗呈報該城御史轉報刑部都察院若係旗人并報該旗一凡黔蜀等省遇有命案其府州縣原無佐二及雖有佐二而不同城者印官公出準令經歷知事吏目典史等官酌帶諳練仵作速往如法相驗寫立傷單報明印官回日查驗填圖通報如印官不能即回仍請鄰邑印官查驗填報其訊無别故之自盡病斃等案驗明即準取結殮埋仍由印官通詳立案如代驗後查有增減傷痕情弊即將原驗官照檢驗不實例分别議處其各省所屬府州縣內有與黔蜀等省相似者一體酌量辦理其餘仍照定例遵行一凡各省州縣同城並無佐二鄰封窵逺地方遇有呈報人命印官公出如原係吏目典史分轄地方即日可以往返者仍飭吏目典史驗立傷單申報印官覆驗其距越遙逺往返必須數日處所該吏目典史據報一靣移會該管巡檢就近往驗填注傷單一靣申請印官覆驗通報如印官不能即回即申請鄰邑代驗通詳倘該巡檢相驗不實或有受賄情弊即行分别參究一廣西凌雲縣屬命案在天峩哨地方去縣治在三百里者準令該處分駐縣丞帶領諳練吏仵前往代驗填格取結送交該縣承審如有勘驗不實照例議處至去縣不及三百里之命案仍照舊辦理一歸化城各協廳所屬遇有呈報命案到官即令該通判星往驗明填格録供通詳仍照例詳請都統派委蒙古官員會同審擬毋庸詳派會驗致滋稽延倘該通判等相驗不實以及遲延貽誤令該管上司分别參處一州縣平日督令仵作悉心講讀洗寃録務期通曉將額設仵作幾名及額外學習仵作幾名造具花名清册於每年開印後申送該管府州彚册通送院司存案該府州將附近所屬仵作按照册開名數姓名每年提考一次其所屬地方有逺在二三百里四五百里者令該管府州每年於因公出境經過時就近考試不必概行提考其考試之法即令每人講解洗寃録一節如果講解明白當堂從優給賞倘講解悖謬即分别責革飭令勒限學習及另募充補仍將提考已竣及獎賞責革各緑由於册內登明彚報院司查核并將召募非人懈於稽察之州縣分别查參其在京五城司坊額設仵作即責成該巡城御史每年照此例辦理決罰不如法凡官司決人不如法如應笞而用杖者笞四十因而致死者杖一百當該官吏均徵埋葬銀一十兩給付死者之家行杖之人各減一等不追銀其行杖之人若決不及膚者依驗所決不及膚之數抵罪或由主使或由行杖並罪坐所由若受財而決不如法決不及膚者計贓以枉法從重論若監臨有司管軍之官因公事主令下手者於人虛怯去處非法毆打及親自以大杖或金刃手足毆人至折傷以上者減凡鬭傷罪二等致死者杖一百徒三年追埋葬銀一十兩其聽使下手之人各減一等並罪坐所由如由監臨坐監臨由下手坐下手若非公事以故勘平人論若官司決罰人監臨責打人於人臀腿受刑去處依法決打邂逅致死及決打之後自盡者各勿論條例一奉天地方審理事件人犯到案先將鎖鍊盤於地上令其膝跪又以荆條互擊其背著永行禁止長官使人有犯凡在外各衙門長官及在內奉制出使人員於所在去處有犯一應公私等罪者所部屬官等流罪以下不得越分輒便推問皆須開具所犯事由申覆本管上司區處若犯死罪先行收管聽候上司回報所掌本衙門印信及倉庫牢獄鎖鑰發付次官收掌若無長官次官掌印有犯者亦同長官違者部屬官吏笞四十斷罪引律令凡官司斷罪皆須具引律例違者如不具引笞三十若律有數事共一條官司止引所犯本罪者聽所犯之罪止合一事聽其摘引一事以斷之其特旨斷罪臨時處治不為定律者不得引比為律若輒引比致斷罪有出入者以故失論故行引比者以故出入人全罪及所增減坐之失於引比者以失出入人罪減等坐之條例一督撫審擬案件務須詳核情罪畫一具題不許輕重兩引承問各官徇私枉法顛倒是非故出故入情弊顯然及將死罪人犯錯擬軍流軍流人犯錯擬死罪者仍行指名參處至於擬罪稍輕引律稍有未協遺錯過失等項察明果非徇私及軍流以下等罪錯擬者免其參究即行改正一承問各官審明定案務須援引一定律例若先引一例復云不便照此例治罪更引重例及加情罪可惡字樣坐人罪者以故入人罪論一例載比照光棍條欵仍照例斟酌定擬外其餘情罪相仿尚非實在光棍者不得一槩照光棍例定擬一除正律正例而外凡屬成案未經通行著為定例一槩嚴禁毋得混行牽引致罪有出入如督撫辦理案件果有與舊案相合可援為例者許於本內聲明刑部詳加查核附請著為定例獄囚取服辨服者心服辨者辨理不當則辨當則服或服或辨故曰服辨凡獄囚有犯徒流死罪鞫獄官司各喚本囚及其家屬到官具告所斷罪名仍責取囚服辨文狀以服其其心不服者聽其文狀中自行辨理更為詳審違者徒流罪笞四十死罪杖六十其囚家屬逺在三百里之外不及喚告者止取本囚服辨文狀不在具告家屬罪名之限赦前斷罪不當凡官司遇赦但經赦前處斷刑名罪有不當若處輕為重其情本係赦所必原者當依律改正從輕以就恩宥若處重為輕其情本係常赦所不免者當依律貼斷以杜幸免若處輕為重處重為輕係官吏於赦前故出入而非失出入者雖會赦並不原宥其故出入之罪若係失出入者仍從赦宥之條例一遇直省特差恤刑之時有審豁者原問官俱不追究恐官慮罪及已不肯辨明寃枉也則會赦可以類推一承問官審理事件錯擬罪名者不拘犯罪輕重錯擬官員遇赦免議一督撫承問叩閽事件除情罪大不在赦欵者仍依限審結具題外其餘輕罪與赦欵相符即行釋放彚題銷案一奉恩詔以前直省虧空已結各案令各督撫分晰造册送部其案內人犯有罪名而會赦邀免者俱準釋回原旗籍如案內有不應豁免之項即行文原旗籍著追其甫經審題各案俟已結之日將並無罪名各犯查明任所有無資財取結報部亦令釋回原旗籍倘本案已清别案有查追事件清結之日亦即報部釋回原旗籍其奉恩詔以後之案不在此列一原非侵盜入已照侵盜擬罪之犯較之實犯侵欺情罪稍輕及虧空軍需錢糧係由那移獲罪或經核減著賠尚與入已軍需有間遇恩赦豁免行令各該旗省咨報户部查明會同刑部奏請定奪聞有恩赦而故犯凡聞知將有恩赦而故犯罪以覬幸免者加常犯一等其故犯至死者仍依常律雖會赦並不原宥若官司聞知將有恩赦而故論決囚罪者以故入人罪論若常赦所不原而論決者不坐徒囚不應役凡鹽場鐵冶拘役徒囚應入役而不入役及徒囚因病給假病已痊可不令計日貼補假役者其徒囚與監守者各過三日笞二十每三日加一等罪止杖一百若徒囚年限未滿監守之人故縱逃回及容令雇人代替者照依囚人應役未滿月日抵數徒役其監守雖多並罪坐所由縱容之人受財者計贓以枉法從重論仍拘徒囚之逃回雇替者依律論罪計日論其逃雇之罪貼役貼補其逃雇之役婦人犯罪凡婦人犯罪除犯姦及死罪收禁外其餘雜犯責付本夫收管如無夫者責付有服親屬鄰里保管隨衙聽候不許一槩監禁違者笞四十若婦人懷孕犯罪應拷決者依上保管皆待産後一百日考決若未産而拷決因而墮胎者官吏減凡鬬傷罪三等致死者杖一百徒三年産限未滿而拷決致死者減一等若孕婦犯死罪聽令穩婆入禁看視亦聽産後百日乃行刑未産而決者杖八十産訖限未滿而決者杖七十其過限不決者杖六十失者失於詳審而犯者各減三等兼上文諸欵而言如不應禁而禁笞一十懷孕不應拷決而拷決墮胎杖七十致死者杖七十徒一年半産限未滿而拷決致死者杖六十徒一年及犯死罪不應刑而刑未産而決者笞五十未滿限而決者笞四十過限不決者笞三十條例一未産拷決不墮胎及産限未滿拷決不致死者依不應輕律一婦女有犯姦盜人命等重情及别案牽連身係正犯仍行提審其餘小事牽連提子姪兄弟代審如遇虧空纍賠追贓摉查家産雜犯等案將婦女提審永行禁止違者以違制治罪一婦女除實犯死罪例應收禁者另設女監羈禁外其非實犯死罪者承審官拘提録供即交親屬保領聽候發落不得一槩羈禁一凡擬徒收贖婦女除係案內緊要證犯仍行轉解質審外其經該州縣審訊明確母庸解審者即交親屬收管聽候發落一犯婦懷孕律應凌遲斬決者除初審證據未確案涉疑似必須拷訊者仍俟産後百日限滿審鞫若初審證據已明供認確鑿者於産後一月起限審解其罪應凌遲處死者産後一月期滿即按律正法一斬絞監候婦女秋審解勘經過地方俱派撥官媒伴送其業經解勘一次情罪顯然無可改擬者下次即停其解審如有外省定擬情實可矜具題經九卿會核改擬緩決者次年秋審核準無異亦即停其解審死囚覆奏待報凡死罪囚不待覆奏回報而輒處決者杖八十若已覆奏回報應決者聽三日乃行刑若限未滿而刑及過三日之限不行刑者各杖六十其犯十惡之罪應死及強盜者雖決不待時若於禁刑日而決者笞四十條例一直省人命強盜將全招開列奏疏內其反叛案內人犯決過即行題報餘概於年底彚奏一凡遇慶賀穿朝服及祭享齋戒封印上元端午中秋重陽等節每月初一初二並穿素服日期俱不理刑名四月初八日不宰牲亦不理刑名內外一體遵行一凡勾決重囚向例刑科三次覆奏今簡去二覆於勾到之後再將原本進呈御覽遵奉施行斷罪不當凡斷罪應決配而收贖應收贖而決配各依出入人罪減故失一等若應絞而斬應斬而絞者杖六十此指故者言也若係失者減三等其已處決訖别加殘毁死尸者笞五十讐人砍毁其尸依别加殘毁若反逆緣坐人口應入官而放免及非應入官而入官者各以出入人流罪故失論若係有故則以故出入流罪論無故而失於詳審者以失出入流罪論條例一凡苖夷有犯軍流徒罪折枷責之案仍從外結抄招送部查核其罪應論死者不準外結亦不準以牛馬銀兩抵償務按律定擬題結如有不肖之員或隱匿不報或揑改情節在外完結者事發之日交部議處其一切苖人與苖人自相爭訟之事俱照苖例歸結不必繩以官法以滋擾纍一曾為職官舉貢生監人等有犯發遣者引例時不得加以為奴字樣一凡斬絞案件如督撫擬罪過輕而部議從重者應駁令再審如擬罪過重而部議從輕其中尚有疑竇者亦當駁令妥擬倘刑部所見既確即改擬題覆不必展轉駁審致滋拖纍一凡州縣審解案件如供招已符罪名或有未協該上司不必將人犯發回止用檄駁俟該州縣改正申覆即行招解督撫核覆分别咨題完結吏典代寫招草凡諸衙門鞫問刑名等項必據犯者招草以定其罪若吏典人等為人改寫及代寫招草增減其正實情節致官司斷罪有出入者以故出入人罪論若犯人果不識字許令在官不干礙之人依其親具招情代寫若吏典代寫即即無出入亦以違制論條例一各有司讞獄時令招房書吏照供録寫當堂讀與兩造共聽果與所供無異方令該犯畫供該有司親自定稿不得假手胥吏致滋出入情弊如有司將供詞輒交經承致有增刪改易者許被害人首告督撫察實題參將有司官照失出入律議處經承書吏照故出入律治罪受財者計贓以枉法從重論大清律例卷三十七
