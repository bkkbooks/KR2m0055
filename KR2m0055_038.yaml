  text: 欽定四庫全書大清律例卷十一
  hash: sha256:e6cb92e24340a4375a1cca127fa7de66c1cdc5f5f033ba30db8b545e9d819d9e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0055_WYG_038-1a, image: WYG0672/WYG0672-0565a.png}
body:
  text: 戶律倉庫上收米榖曰倉收財帛曰庫錢法凡錢法設立寶源寶泉等局鼓鑄制錢內外俱要遵照戶部議定數目一體通行其民間金銀米麥布帛諸物價錢並依時值聽從民便使用若阻滯不即行使者杖六十其軍民之家私畜銅器除鏡子軍器及寺觀庵院鐘磬鐃鈸外其餘應有廢銅並聽赴官賣每斤官給銀七分增減隨時若私相買賣及收匿在家不赴官者笞四十條例一各省開採銅鉛令道員總理府佐官分理州縣官專管其事凡産銅鉛之處聽民採取稅其二分造册季報所剩八分任民照時價發賣有墳墓處所不許採取如有不得銅鉛及不便採取之處該督撫題眀停其採取其各州縣産銅鉛之山令地主報名採取地主無力開採聽本州縣報名採取州縣無匠役許於鄰近州縣雇募該州縣自行稽察如有别州縣民人夥衆越境採取聚至三十人以上為首者發近邉充軍為從枷號三箇月杖一百不及三十名者為首枷號三箇月杖一百為從滿杖衙役恣意攪擾致人裹足者為首枷號兩箇月發附近充軍為從減一等一承辦銅商逾限並無貨物出口或非採易銅斤之貨嚴拏究處著落追賠其進口之時或非原出口地方該汛地方官立速查報井知照原出口之該汛官辨勒催起解倘有侵那隱匿之弊將該商從重治罪倘辦員侵欺扣剋串通朦混以致姦商那新掩舊督撫據實題參治罪上司徇隱一并交部議處收糧違限凡收夏稅所收小麥於五月十五日開倉七月終齊足秋糧所收糧米十月初一日開倉十二月終齊足如早收去處豫先收受者不拘此律若夏稅違限至八月終秋糧違限至次年正月終不足者其提調部糧官吏典分催里長欠糧人戶各以稅糧十分為率一分不足者杖六十每一分加一等罪止杖一百官吏里長受財而容拖欠者計所受贓以枉法從重論分别受贓違限輕重若違限一年之上不足者人戶里長杖一百提調部糧官吏典照例擬斷條例一應納錢糧以十分為率欠至四分以下者舉人問革為民貢監生員並黜革杖六十欠至七分以下者舉人問革為民杖八十貢監生員黜革枷號一箇月杖一百欠至十分以下者舉人問革為民杖一百貢監生員俱黜革枷號兩箇月杖一百以上俱以次年四月奏銷以前為限不足分數者照例治罪仍嚴催未完錢糧其文武進士及在籍有頂帶人員並與舉人同一運辨以通幫糧米計算但有挂欠即革職責懲發南追比不完者分别治罪如欠不及一分笞五十追完還職不完滿杖欠至一分杖六十追完免罪不完徒一年欠至二分杖七十追完免罪不完徒二年欠至三分杖八十追完免罪不完徒三年欠至四分杖九十追完仍滿杖不完發附近充軍欠至五分杖一百追完徒一年不完者發邉逺充軍欠至六分者絞六分以上者斬俱監候照例以其家産抵償如仍不足令原僉衙門各官代賠旗丁以一船糧米計算但有挂欠即革退責懲拏交運官發南追完不完治罪其按照分數定罪之處並與運辨同承追官嚴加議處如家産抵償不足令僉丁衛所糧道各官代賠至糧船起交足額外原有餘米聽回空時沿途糶賣一挂欠漕糧辨丁照例分别治罪外所欠糧數作十分分賠總漕半分糧道一分監兑官半分押運官半分運官一分半僉丁衛所官半分旗丁五分半總漕等官如限內不完交部議處辨丁於限內全完分别應治罪者治罪應免議者免議如不完照例治罪將不能賠償米石仍著總漕等官賠償十分全完照例議敘一同幫運丁將赤貧無賴之丁混行互結以致挂欠者將本丁應賠五分半之內互結各丁攤賠一分其餘令本丁賠補一凡兵役有應輸之糧抗玩不納者該州縣即將未完錢糧數目開眀移令所轄衙門著本管官辨照數追完移交州縣如不實力催追完解即照州縣催徴錢糧未完分數律議處其上司書役有抗糧不納者該州縣一面詳報上司一面嚴行拘拏革役追比如上司有阿比袒護州縣有瞻徇等弊均照例議處一凡紳襟所欠分數各州縣逐戶開出另册詳報指名題參無論文武鄉紳進士舉士生員并貢監及有頂帶人員巳任未任俱按未完例枷責治罪如州縣不行另册詳報别經發覺交部議處多收稅糧斛面凡各倉主守官役收受稅糧聽令納戶親自行槩平斛交收作正數即以平收者作正數支銷依例準除折耗若倉官斗級不令納戶行槩踢斛淋尖多收斛面在倉者杖六十若以所多收之附餘糧數總計贓重於杖六十者坐贓論罪止杖一百此皆就在倉者言如入已以監守自盜論提調官吏知而不舉與同罪多糧給主不知者不坐條例一在京在外并各邉一應收放糧草去處若職官子弟積年光棍跟子買頭小腳歇家跟官伴當人等三五成羣搶奪籌斛占堆行槩等項打攪倉場及欺陵官攢或挾詐運納軍民財物者杖罪以下於本處倉場門首枷號一箇月發落徒罪以上與再犯杖罪以下免其枷號發附近充軍干係內外官員題參交部議處一各處倉糧每石收耗米三升查盤之時計守支年分每年每石準開耗一升若三年之外原收耗糧已減盡照例於正糧內遞開一升準作耗糧此外若有侵盜者方照律問罪一社倉捐榖聽民自便不得繩以官法違者以違制論一凡社倉榖石不遇荒歉借領者每石收息榖一斗還倉小歉借動者免取其息一凡貢監生員中富生上戶定限五月完半十月全完如屆期不清再展二月以嵗底全完為率中下貧生定限八月完半嵗底全完如屆期不清中等以開嵗二月為率下等以開嵗四月為率務須全完如逾限不完即行詳革革後全完仍準開復若委係赤貧無力而尾欠僅屬分釐者詳查眀確暫免詳革準於秋收并入限年完半數內帶徴完足隱匿費用稅糧課物凡本戶自運送本戶應納稅糧課物如蠶絲銅鐵之類及應追入官之物已給文送運而隱匿肥已私自費用不納或詐作水火盜賊損失欺罔經收官司者並計所虧欠物數為贓準竊盜論罪止杖一百流三千里免刺其部運官吏知隱匿詐妄之情與同罪不知者不坐此係公罪各留職役若受財故縱以枉法從重論小戶附搭侵匿者仍依此律準竊盜條例一石壩大通橋設立經紀剝船轉運京倉糧米倉場及坐糧廳各差妥役沿閘稽查如剝船回空摉查無米藏匿者其摯欠仍責經紀賠補若船底摉出有米藏匿即將摯欠之米令船戶代役照數攤賠枷責革役其失察之經紀一併責懲攬納稅糧凡攬納他人稅糧者杖六十著落本犯赴倉照所攬數納足再於犯人名下照所納數追罰一半入官若監臨主守官役挾勢攬納者加罪二等仍追罰一半入官其小戶畸殘田零零丁不足以成一戶米麥因便湊數於本里納糧人戶處附納者勿論包攬侵費正數及多科費用以誆騙論若侵欺以監守自盜論包與者不應杖罪條例一凡內府錢糧及外內倉場糧草各處軍需等項不拘起運存留但有包攬誆騙銀一百兩糧二百石以上不行完納事發責限三箇月以內完納者照常發落過期不完者儘其財産賠納發近邉充軍各邉武職主使家人伴當跟隨交結人員挾勢攬納作弊者參問究擬聽使之入仍照前例問發一內外各處收受草束若兜攬之徒恃強將不堪水濕小草充數囑託監收官員收受者拏送問罪枷在本處倉場門首三箇月發落虛出通關砂鈔凡錢糧通完出給印信長單為通關倉庫截收則暫給紅批照票為硃鈔凡倉庫收受一應係官錢糧等物原數本不足而監臨主守通同有司提調官吏虛出通關給發者計所虛出之數併贓不分攤各犯皆以監守自盜論若委官盤點錢糧數本不足扶同監臨提調官申報足備者罪亦如之亦計不足數以監守自盜論併贓受財者計入已贓以枉法從重論其監守不收本色詐言奉文折收財物虛出硃鈔者亦以監守自盜論納戶知情減二等免刺原與之贓入官不知者不坐其贓還主通上同僚知而不舉者與犯人同罪至死減等不知及不同署文案者不坐以失覺察論條例一凡州縣倉庫錢糧責成知府嚴行盤查於每年奏銷時出具所管州縣倉庫實貯無虧印結造册申詳保題仍令不時盤查一有虧空無論幾時察出立即列揭請參免其治罪分賠如知府通同徇隱别經發覺將知府革職離任先於本犯名下著追勒限三年如果家産全無無力完帑將未完銀米等項無論侵那俱著落知府獨賠如止盤查不實不行揭報審係州縣侵欺將知府照失察侵盜本例議處免其分賠審係州縣那移亦先於本犯名下著追勒限三年如果家産全無無力完帑將未完銀米等項責令知府分賠一半如知府查出虧空揭報司道司道不即轉揭及司道已經轉揭督撫不即題參許知府竟揭部院將不轉不參之督撫司道議處著令分賠如督撫司道眀知州縣虧空不即報參反為設法彌補於本犯勒追限滿之日著落督撫司道分賠仍交部照例議處一各府倉庫錢糧於每年奏銷時責成各該道盤查直𨽻州錢糧責成分巡道盤查糧驛道錢糧責成布政使盤查藩庫錢糧該省有總督者督撫會同盤查無總督者巡撫盤查其總督有管轄兩三省者或隔二三年或隔三四年於題眀巡查地方事情之便會同盤查出具印結於奏銷本內一併保題倘有扶同徇隱及盤查不實不行揭報俱照州縣倉庫例行如有抑勒那借濫動以致虧空者許據實通詳揭送各部院奏聞嚴加議處責令賠補一凡州縣侵那虧空審眀確係知府徇隱應著落獨賠之項將徇隱之知府革職離任其州縣虧空銀米仍依侵那等贓年限先於本犯名下儘數著落嚴追一年限內全完除侵欺入已本犯不準減等外若係那移之項至二萬兩以上者本犯照例釋免未至二萬兩者本犯照例準其開復其徇隱之知府亦一體準其開復如二限三限補完者本犯照例分别發落若三年限滿不能完足本犯仍照原擬治罪查實果係家産全無無力完帑將未完銀米等項著落徇隱之知府獨賠勒限一年完補若能於限內全完準其開復限滿不完再限一年完補若能於二限內賠補全完照伊原職降一級調用如二限內完不足數再限一年完補若能於三限內全完照伊原職降二級調用三限既滿之後雖照數賠補全完亦不準其開復一凡州縣那移虧空審眀係知府不行揭報應著落分賠之項將知府革職其虧空銀米仍依那移虧空年限先於本犯名下儘數著落嚴追一年限內全完將本犯及不行揭報之知府俱照例準其開復二限三限補完本犯照例分别發發落若三年限滿不能完足本犯仍照原擬治罪查實果係家産全無無力完帑將未完銀米等項著落不行揭報之知府分賠一半其餘一半入於無著項下完結其知府分賠一半銀兩勒限一年完補限內全完準其開復不完再限一年完補若能於二限內全完者準其開復於補官日罰俸一年如二限內完不足數再限一年完補若能於三限內全完者照伊原職降一級調用如三次限滿不完不準開復未完銀兩仍著落追賠一各省屬官虧空上司眀知故縱者令徇隱之上司各賠一分一凡新舊交代如果米榖收存不慎官物遺失不全立即揭報題參於舊官名下著追如已經後官接受出結米榖黴變官物短少著落接任出結之官按數賠補一凡順天府所屬二十五州縣衛錢糧事件俱令該府尹稽察仍於報銷時直督會同府尹互相查核列銜具題其督徴完欠分數考成與直督一例辦理一凡該年奏銷錢糧各上司照例盤查出結外再將各屬現年已徴一切正耗雜項錢糧榖價等銀一體清查如無缺少一併出具結狀申送督撫查核如有那移抵飾據實揭參該管上司扶同徇隱照例參處其知府有經徴之項盤查道員亦照守牧盤察州縣之例一體查辦各省督撫於奏銷錢糧清查司庫時將本年新收各項錢糧一并盤查聲眀並無那新補舊情弊出結保題一凡各省虧空案件審係侵貪入已者本犯無力完交令該上司等分賠其那移及倉榖浥變等項祗將該員擬罪著追不必概令上司攤賠一各省督撫每於年終將所轄屬員內通行查察有無虧空之處據實彚奏附餘錢糧私下補數凡各衙門及倉庫但有附餘錢糧須要盡實報官眀白立案於正收簿內另作數支銷若監臨主守將增出錢糧私下銷補别項事故虧折之數瞞官作弊者不分首從並計贓以監守自盜論其虧折追賠還官若內庫收受金帛當日交割未完者不許帶出許令附簿寄庫若有餘剩之物本庫眀白立案正收開申戶部作數若解户朦朧擅將金帛等物出外者不分多少斬雜犯準徒五年守門官失於盤獲摉檢者杖一百金帛等物追還官私借錢糧凡監臨主守將係官錢糧等物乃金帛之類非下條衣服之屬私自借用或轉借與人者雖有文字文字兼文約票批簿籍並計所借之贓以監守自盜論其非監守之人借者以常人盜倉庫錢糧論監守坐以自盜非監守止以常人盜追出原物還官若將自己物件抵换官物者罪亦如之自己物件入官條例一凡管民地方官員借用官銀初次逾限不能完者即令離任限一年還完開復若限內不完革職著落家産還完旗員交與該旗催追漢官交與該督撫催追一凡州縣衛所虧空錢糧如果民欠未完揑報全完或私自借給百姓倉糧其私借錢糧之員及揑報官員應照虛出通關硃鈔律計所虛出之數併贓皆以監守自盜論其實在民欠民借仍著落原借欠之人完納其那移錢糧有項可抵者即令接任官催徴補項若揑報私借那移之項該員情願一年內代民全完者準其復還原職一府州縣春間借出倉榖秋收後勒限徴比務於十月中全完造具册收送户部查核如有紳襟及牙行蠧役將家人佃戶姓名影射零星領出入已積至二三十石者紳襟斥革牙行蠧役枷號一箇月責四十板俱照追入倉其代為造册之鄉保地方有無受贓分别治罪該管上司不行揭參交部議處一虧空人員除查眀家産盡數追賠外如有屬員借支借領及同官那借出有印領者將所有借欠之項責令追還以抵該員虧空仍分别議處至平日債負或幫助親友及同官私借雖有文約書札記簿並無印領止許自行取討若混請開抵虧空者無論逺近年分概不準行仍將本人照圖賴誣扳治罪地方有司聽從開抵妄拏無辜追比者照故勘平人律治罪受賄得贓者計贓以枉法從重論其因規避處分指引開欠者承追官照借端將親族濫行著落追賠例問擬該管上司官交部分别議處一凡遇地方荒歉借給貧民米石榖麥或開墾田土借給牛具籽種以及一切吏役兵丁人等辦公銀兩原係題眀咨部行令出借倘遇人亡産絶確查出結題請豁免如有揑飾侵漁以及未經報眀私行借動者即行題參按律治罪一凡支銷錢糧均有一定欵項額數如有違例開銷著落擅動濫給之員賠補倘上司官因為數繁多一人不能歸結派令屬員公捐還項或逼令接任官按股分賠將抑勒之上司官照例治罪私借官物凡監臨主守將係官什物衣服氊褥器玩之類私自借用或轉借與人及借之者各笞五十過十日各計借物坐贓論減二等罪止杖八十徒二年各追所借還官若有損失者依毁失官物律坐罪追賠有心致損依棄毁官物計贓準竊盜論加二等罪止杖一百流三千里誤毁及遺失者減棄毁之罪三等杖八十徒二年並追賠大清律例卷十一
