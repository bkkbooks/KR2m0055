人以上為首併傷人之犯一回空糧船夾帶私鹽闖閘闖關不服盤查聚至十人以上持械拒捕殺人及傷三人以上為首併殺人之犯鹽法例一内府人員家人及王公大臣官員家人私自指名倚勢網利干預詞訟肆行非法夲犯私去者把持行市例兵例一出征處所兵丁干犯號令違法亂行為首者從征違期例一統兵將帥玩視軍務茍圖安逸故意遷延不將實在情形具奏貽誤國事者又因私忿媢嫉推委牽制以致糜餉老師貽誤軍機者又不能克敵轉布流言摇惑衆心借以傾䧟他人致誤軍機者主將不固守例一領兵征進厮役私自焚掠者縱軍擄掠例一直省刁惡之輩假地方公事逼勒平民約㑹抗糧歛錢搆訟抗官塞署或有寃抑聚衆至四五十人為首者一福建地方借事聚衆罷市罷考打官等事為首者一刁民因事鬨堂塞署逞兇毆官聚衆至四五十人為首者梟示其同謀聚衆轉相糾約下手毆官為從者激變良民例一私鑄紅衣等砲不論官員軍民人等及鑄砲匠役私藏應禁軍器例一隨征兵丁自軍前逃回者跟随之奴僕雇工有偷盜馬匹軍器及衣服銀兩潛逃者一姦豪勢要及軍民人等私造海船帶違禁貨物下海前徃番國買賣潛通海賊同謀結聚及為鄉盜刧掠良民者梟示打造海船賣與外國圖利造船與賣船之為首者一閩省不法棍徒在沿海地方引誘偷渡之人包攬過臺中途謀害人死者不分首從梟示如被害未死為首者一在番居住閩人定例之後仍託故不歸復偷渡私回者私出外境及違禁下海例刑例一妄布邪言書寫張貼煽惑人心為首者造妖書妖言例一盜御寳乗輿服御物者盜内府財物例一山前山後各有禁限若有盜坎樹株為首者取土取石開窰燒造放火燒山為首者盜園陵樹木例一强盜殺人放火燒人房屋姦汚人妻女打刧牢獄倉庫及干係城池衙門并積百人以上者梟示一響馬强盜執有弓矢軍器白日邀刧道路贓証明白俱不分人數多寡曽否傷人依律處決梟示江洋行刧大盜梟示一强盜内有老𤓰賊或在客店内用悶香藥麵等物迷人取財或在路將同行客人殺害者不分首從一捕役為盜者一投首之賊借追贓名色將平人揑稱同夥挾讐扳害或索詐財物者一行刧二次之夥盜又每案内各轉糾三人以上上及幫助捆毆按捺事主逼索財物者一强盜法所難宥者一老𤓰賊内傳授技藝在家分贓者一尋常盜刧未經傷人之夥犯如曽經轉糾黨羽者持火執械者塗臉入室者助勢搜贓架押事主送路者到案誣扳良民者犯案已至二次者濵海沿江行刧客船者强盜例一行刧罪囚不論曽否得囚有無傷人為首之人傷人者之夥犯有殺人者為首之人及夥犯梟示其在中途打奪罪囚因而殺人為首者一官司差人捕獲罪人聚衆中途打奪毆差致死為首者刧囚例一聚衆夥謀搶奪路行婦女或賣或自為奴婢為首者一黔楚紅苖讐忿聚衆搶奪人數至五十名殺人為首者聚衆至百人雖不殺人為首者聚衆至百人殺人為首者梟示一苖人搶奪該土官教令指使或通同圖利者一糧船水手夥衆十人以上執持器械搶奪為首者一白晝搶奪殺人者一出哨兵弁遇商船在洋遭風尚未覆溺及著淺不致覆溺不為救護反搶取財物拆毁船隻者不分首從梟示遭風覆溺人尚未死不速救䕶止顧撈搶財物以致商民淹斃者為首之兵丁在船將備同謀搶奪者若眀知事犯重罪在無人處所故將商人全殺滅口者無論官兵但係在船同謀不分首從梟示一江南通州崇眀昭文沙民夥衆争地執持器械及聚衆四五十人有抗官重情為首者一不法之徒乗地方歉收夥衆搶奪擾害善良挾制官長或因賑貸稍遲搶奪村市喧閙公堂及懷挾私憤糾衆罷市辱官為首者一苖人聚衆至百人以上燒村刧殺搶擄婦女造意首惡之人梟示為從内下手殺人放火搶擄婦女者一川省嘓匪糾夥五人以上於塲市人烟凑集之所横行搶刧為首者若拒捕奪犯殺傷兵役并事主塲衆為首者梟示一親疆地方兵丁跟役如有白晝搶奪殺人及為强盜者白晝搶奪例一竊盜拒捕殺人為首者竊盜例一駐劄外邉官兵及跟役等偷盜䝉古馬匹者盜馬牛畜產例一同居卑幼引他人强刧己家財物者親屬相盜例一惡棍設法索詐官民或因詐財不遂竟行毆斃為首者一旗民結夥指稱隠匿逃人索詐財物為首者一太監逃出索詐者一苖人伏草捉人横加枷財勒銀取贖再犯者不分首從土哨姦民勾通取利造意者一附近番苖地方吏民人等擅入苖境藉差欺陵或强姦婦女或搶刧財物實在情重例應斬候者恐嚇取財例一夥衆開窰誘取婦人子女藏匿勒賣為首者一窩隠川販指引捆拐藏匿遞賣者同川販首犯一貴州地方有外來流棍勾通本地棍徒將荒村居住民苖人戸殺害人命擄其婦人子女計國販賣不論已賣未賣曽否出境不分首從梟示有用威力强行綁去及設方畧誘徃四川販賣不論已賣未賣曽否出境為首者將被拐之人傷害致死為首者窩川隠販在家指引殺人捆擄及勾通畧誘子女藏匿遞賣者畧人畧賣人例一糾衆發塚起棺索財取贖者不分首從一發掘貝勒貝子公等墳塚開棺槨見屍為首者發掘歴代帝王陵寢先賢名臣及前代藩王墳墓開棺槨見屍為首者一奴婢雇工人發掘家長墳塚開棺槨見屍為首者毁棄撇撒死屍者不分首從子孫同發塚例一各處無籍之徒引賊刧掠以復私讐探報消致賊逃竄者梟示一窩線同行上盜得財者盜賊窩主例一謀財害命者殺人後掠取家財並知有藏蓄而取去者一圖財害命得財而殺死人命之首犯與從而加功者傷人未死而已得財之為首者一苖人圖財害命者梟謀殺示人例一因姦謀死本夫傷而不死者姦婦一姦夫同謀殺死親夫起意者謀死之後將姦婦拐逃或為妻妾或得銀嫁賣並拐逃幼小子女賣為奴婢者一因姦謀死親夫若本夫縱容抑勒妻妾與人通姦被妻妾起意謀殺或姦夫起意知情同謀者姦婦一親屬相姦如姦夫將本夫殺死或與姦婦商通謀死者姦夫殺死姦夫例一夲宗及外姻尊長殺緦麻卑幼卑幼一家非死罪主僕雇工三人者殺期服卑幼一家主僕雇工三人内有功服緦麻卑幼者謀占家產圖襲官職殺期服卑幼一家三人者一發遣當差為奴之犯殺死伊管主一家三人併三人以上其知情之子孫一聚衆共毆原無必殺之心而亂毆一家三命至死者率先聚衆之人一殺一家非死罪二人及殺三人而非一家者殺一家三人例一好鬬兇徒見人鬬毆輒約夥尋釁將人父母毆斃為首者一擬斬監候在監復行兇致死人命者鬬毆及故殺人例一因强姦將夲婦立時殺死者一强姦人妻女其夫與父母親屬聞聲赴救姦夫逞兇拒捕立時殺死其夫與父母親屬者一强姦内外緦麻以上親及緦麻以上親之妻妻之前夫女同母異父姊妹已成夲婦羞忿自盡者一子孫威逼祖父母父母妻妾威逼夫之祖父母父母致死者一喇嘛和尚等强姦致死人命為首者威逼人死死例一太監在紫禁城内持金刃自傷者宫内忿爭例一軍民人等在京謀死現任官員者一八旗兵丁因管教將本管官戳死者閒散及䕶軍披甲人記讐將該管官刃傷者一部民軍士吏卒犯罪在官不服拘拿不遵審斷或懐挾私讐及假託地方公事挺身鬨堂逞兇殺害夲官無論夲官品級及有無謀故已殺者不分首從已傷為首者毆制使及夲管長官例一僧尼謀殺受業師已殺者毆故殺者毆受業師例一奴婢毆家長之親及外祖父母致死者一民人奴僕背主投營挾制家長勒索原契及妻子財物者奴婢毆家長例一駐防旗人與民人姦匪交結揑寫匿名掲帖傾䧟平人者投匿名文書告人罪例一各部院衙門書辦指稱部費招摇撞騙干犯冂國憲非尋常犯贓可比者官吏受財例一偽造諸衙門印信及欽給關防事關軍機錢糧假冒官職大干法紀為首者偽造印信時憲書等例一銷毁制錢為首者一將制錢剪邉鎔銷圖利為首者私鑄銅錢例一苗猺狑獞所住地方有外來匪徒教誘犯法所犯之人罪應斬決者教誘之人詐教誘人犯法例一輪姦為首者一惡徒夥衆搶去良人子弟强行雞姦為首者其雖未夥衆因姦殺死良人子弟及强行鷄姦未至十嵗之幼童者一强姦十二嵗以下幼女因而致死及强行姦汚未至十嵗之幼女者一姦未至十嵗之幼女者一用省嘓匪有犯輪姦者審實不分首從如因輪姦而殺死人命者無論成姦與否梟犯示姦例一故燒各邉倉塲官糧草束者梟示一兇徒糾衆謀財放火故燒官民房屋公廨倉庫係官積聚之物並街市鎮店人居稠宻之地延燒搶奪財物者不分首從殺傷人者梟示有因焚壓致死者為首之人梟示挾讐放火延燒因而殺人及有焚壓致死者為首之人放火故燒人房屋例一强盜拒捕殺傷官兵其同在一處或三五成羣同惡共濟者罪人拒捕例一原擬斬梟及斬決之盜犯若越獄脱逃被獲者免死發遣之犯如越獄脱逃被獲者若因越獄殺死兵役者其外省越獄及在途脱逃盜犯被别省拿獲者其部部刺字發遣在途用酒灌醉用藥迷倒解差乘間逺颺者若因脱逃殺傷兵役者一斬罪人犯在監年久自號牢頭嚇詐財物殺供誣䧟兇惡顯著者獄囚脱監及反獄在逃例一免死發遣盜犯在配脱逃無論有無行兇為匪者徒流人逃例一禁卒賄縱斬決以上重犯在監脱逃者主守不覺失囚例工例一河員將完固隄工故行毁壞希圖興修侵蝕錢糧者盜決河防例凌遲處死刑律謀反及大逆但共謀者謀反大逆律謀殺祖父母父母及期親尊長外祖父母夫夫之祖父母父母已殺者奴婢雇工人謀殺家長及家長之期親外祖父母已殺者謀殺祖父母父母律妻妾因姦同謀殺死親夫者殺死姦夫律妻妾謀殺故夫祖父母父母已殺者謀殺故夫父母律殺一家非死罪三人及支解人為首者殺一家三人律採生折割人為首者採生折割人律奴婢毆殺家長者若故殺家長之期親及外祖父母者雇工人故殺家長及家長之期親若外祖父母者奴婢毆家長律妻妾故殺夫及妾故殺正妻者妻妾毆夫律弟妹故殺兄姊若姪故殺伯叔父母姑及外孫故殺外祖父母者毆期親尊長律子孫殺祖父母父母及妻妾毆夫之祖父母父母殺者毆祖父母父母律妻妾夫亡改嫁毆故夫之祖父母父母殺者妻妾毆故夫父母律刑例一因姦同謀殺死親夫夲夫不知姦情及雖知姦情廹於姦夫强悍不能報復並非有心縱容者姦婦一親屬相姦和姦夫將夲夫殺死與姦婦商通謀死者姦婦殺死姦夫例一殺一家非死罪三人及支解人為首監故者仍剉碎死屍梟示一夲欲支解其人行兇時勢力不遂乃先殺訖随又支解者一夲宗及外姻尊長殺大功小功緦麻卑幼一家三人者一發遣當差為奴之犯殺死伊管主一家三人并三人以上者殺一家三人例大清律例卷四十六
