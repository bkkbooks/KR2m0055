  text: 欽定四庫全書大清律例卷四十六
  hash: sha256:66b612ad67c2bb82f33e5ba95db53bfe089d2ac2c1bef6c5c97e0d4010e96ed7
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0055_WYG_109-1a, image: WYG0673/WYG0673-0359a.png}
body:
  text: 雜犯死罪絞罪准徒五年吏律應議之人犯罪不請㫖上議當該官吏事應奏不奏律兵律車駕行處軍民衝入儀仗内者衝入儀仗内訴事不實者衝突儀仗律在京守禦官軍遞送逃軍妻女出京城者逃軍買求者遞送逃軍妻女出城律刑律常人盜倉庫錢糧等物至八十兩者常人盜倉庫錢糧律塜先穿䧟及未殯埋開棺槨見屍者發塜律刑例一車駕出郊行幸有申訴者越訢例斬罪准徒五年戸律内庫交割餘剰之物若解戸朦朧擅將金帛等物出外者附餘錢糧私下補數律禮律稱訴寃枉借用印信封皮入遞及借與者上書陳言律刑律盜内府財物者盜内府財物律盜皇城門鑰者盜城門鑰律監守自盜倉庫錢糧等物至四十兩者監守自盜倉庫錢糧律戸例一八旗叅領等官將一切收貯公所干係錢糧並交庫銀兩侵蝕一百兩以下者守掌在官財物例一侵盜倉庫錢糧入已數在一百兩以下者監守自盜倉庫錢糧例一竊盜倉庫錢糧但經得財之從犯一兩至八十兩者常人盜倉庫錢糧例實犯死罪絞罪監候吏律棄毁官文書事干軍機錢糧者棄毁制書印信律戸律强奪良家妻女姦占為妻妾者配與子孫弟姪家人者强占良家妻女律妻背夫在逃因而改嫁者出妻律以私債强奪人妻妾子女因而姦占者違禁取利律禮律師巫假降邪神并一應左道異端之術煽惑人民為首者禁止師巫邪術律兵律擅入及冒入御膳所及御在所者不係宿衛應直合帶兵仗之人但持寸刃入宫殿門内者宫殿門擅入律職官從車駕行而逃者從駕稽違律宫殿内造作工匠至申時分門官等照數㸃出其不出者宫殿造作罷不出律宿衛人至夜持仗入殿門及入宫門者輙出入宫殿門律内監私將兵器入宫殿門内者關防内使出入律向太廟及宫殿射箭放彈投磚石者向宫殿射箭律越皇城者越城律皇城門非時擅開閉者門禁鎻鑰律私使軍人出境因而致死或被賊拘執至三名者縱放軍人歇役律官軍征討私逃再犯者守禦軍人在逃三犯者從征守禦官軍逃律犯夜拒捕及打奪因而毆人至折傷以上者夜禁律越度縁邊關塞因而潛出交通外境者私越冒度關津律將人口軍器出境及下海者私出外境及違禁下海律刑律盜各衙門官文書事干軍機錢糧者盜制書律竊盜棄財逃走事主追逐因而拒捕毆至折傷以上為首者强盜律私竊放囚人逃走因而傷人者官司差人追徴錢糧勾攝公事及捕獲罪人聚衆打奪因而傷差人者殺人及聚至十人下手致命者率領家人隨從打奪家人亦曽傷人之尊長刧囚律竊盜及掏摸得財一百二十兩以上者竊盜及掏摸三犯者竊盜律畧誘畧賣良人因而傷人者畧人畧賣人律發塜開棺槨見屍者子孫於祖父母父母奴婢雇工人於家長墳墓熏狐狸燒屍者發塜律謀殺人從而加功者傷而不死造意者謀殺人人律奉制命出使而官吏謀殺已傷為首者謀殺制使及本管長官律姦夫自殺其夫姦婦雖不知情者殺死姦夫律鬬毆殺人者同謀共毆人因而致死下手者鬬毆及故殺人律以他物置人耳鼻及空竅中若故去人人服食至死者屏去人服食律因戲而殺人及因鬬毆而誤殺旁人者知津河水深泥濘及橋梁渡船杇漏誑令人過渡以致䧟溺死者戲殺誤殺過失殺傷人律威逼期親尊長致死者威逼人致死律保辜限内因傷死者保辜限期律毆宗室覺羅以上親至篤疾者宗室覺羅以上親被毆律奉制命出使而官吏毆之及部民毆本屬府州縣軍士毆本管官吏卒毆本部五品以上長官折傷者若吏卒毆六品以下長官佐貳官首領官篤疾者毆制使及本管長官律本衙門首領官及所統屬官佐貳官毆長官篤疾者佐職統屬毆長官律官司差人追徴錢糧勾攝公事而毆至篤疾者拒毆追攝人律以威力制縳人及私家拷打監禁因而致死者威力制縛人律奴婢毆良人至篤疾者良人毆他人奴婢至死及故殺者故殺緦麻小功大功親奴婢者毆緦麻小功大功親雇工人至死及故殺者良賤相毆律奴婢過失殺家長者毆家長期親及外祖父母者毆家長緦麻小功親至篤疾大功親至折傷以上者雇工人毆家長及家長期親若外祖父母折傷者家長及家長之期親外祖父母故殺雇工人者奴婢毆家長律妾毆正妻至折跌肢體及瞎一目者夫毆妻并妻毆妾至死及故殺者毆妻之父母至篤疾者妻妾毆夫律卑幼毆本宗緦麻及外姻緦麻小功大功兄姊尊屬至篤疾者尊長毆緦麻小功大功卑幼至死及故殺者故殺同堂弟妹堂姪及姪孫者毆大功以下尊長律嫡繼慈養母毆殺及故殺子孫致令絶嗣者毆祖父母父母律妻毆夫卑屬至死者故殺夫之兄弟子者尊長毆卑幼之婦妾至死及故殺者妻妾與夫親屬相毆律毆妻前夫之子至死者毆妻前夫之子律奴婢罵家長者奴婢罵家長律投隠匿姓名文書告言人罪者詭寫他人姓名詞帖訐人隂私䧟人或空紙用印虚揑他人文書買囑舖兵遞送詐以他人姓名註附木牌進入内府不銷名字䧟人得罪者投匿名文書告人罪律誣告人因而致死隨行有服親屬一人者誣告人絞罪所誣之人已決者誣告律官吏受財有禄人枉法贓至八十兩者不枉法贓至一百二十兩以上者無禄人枉法贓至一百二十兩者官吏受財律内外武官不得接受公候伯金銀叚疋等物若接受再犯者私受公侯財物律詐為制書及増減未施行為首者詐為部院將軍督撫提鎮等衙門文書套畫押字盜用印信及空紙用印者詐為制書律詐傳懿㫖令㫖為首者詐傳詔㫖律私鑄銅錢者匠人同私鑄銅錢律强姦者姦幼女十二嵗以下者犯姦律姦出嫁祖姑及出嫁從祖伯叔姑和者姦夫姦婦姦親屬妾强者親屬相姦律奴及雇工人姦家長之期親若期親之妻和者姦夫奴及雇工人姦家長妻律失火延燒宗廟及宫闕者失火律犯罪拒捕毆人至折傷以上者罪人拒捕律官吏懷挾私讐故禁平人致死者故禁故勘平人律獄卒陵虐罪囚尅減衣糧因而致死者陵虐罪囚律獄卒以金刃及他物與囚致囚反獄及殺人者與囚金刃解脱律名例例一教令九十老人故殺子孫者老小廢疾收贖例一負罪潛逃之絞犯被獲原犯情罪尚有可原者一平常發遣人犯逃走後復行兇為匪犯該軍流發遣者一内外文武職官負罪逃竄犯該軍流以下者犯罪事發在逃例一受財故縱死罪人犯者稱與同罪例戸例一强奪良人妻女賣與他人為妻妾及投獻王府併勲戚勢豪之家者一强奪良家妻女未被姦汚而婦女自盡者一疎逺親屬圖財强賣者强占良家妻女例一運弁旗丁掛欠糧米至六分者收糧違限例一鹽徒聚衆至十人以上撑駕大船張掛旗號擅用兵仗響器拒敵官兵傷二人為從者其雖拒敵官兵不曽殺傷人為首者一兵民聚衆十人以上帶有軍器興販私鹽拒捕傷二人下手者傷一人為首者若十人以下拒捕殺人不論有無軍器下手者傷至二人以上之下手者止傷一人為首者一回空糧船夾帶私鹽闖閘闖闗不服盤查聚至十人以上雖拒捕不曽殺傷人為首者一收買肩販官鹽越境貨賣審非私梟拒捕毆人至折傷以上者鹽法例禮例一習天文之人妄言福福煽惑人民為首者一端公道士作為異端法術醫人致死者一姦匪之徒將各種避刑邪術私相傳習者為首敎授之人禁止師巫邪術例兵例一直省刁惡之輩假地方公事逼勒平民約㑹抗糧歛錢搆訟抗官塞署或有寃抑聚衆至四五十人為從者一福建地方聚衆罷市罷考打官等事為從者一刁民因事鬨堂塞署逞兇毆官聚衆至四五十人之為從者激變良民例一私鑄紅衣等砲處所隣佑房主里長私藏應禁軍器例一姦民將廢鐵鐵貨賣與外國及海邉賊寇者一商人在沿海地方遞運鐵斤交賣商漁船隻為首者一私開鴉片烟館引誘良家子弟者私出外境及違禁下海例刑例一異姓人歃血訂盟焚表結拜弟兄為首者謀叛例一盜内府財物及監守常人盜竊盜掏摸但三次者盜内府財物例一漕運糧米常人盜入巳數滿六百石者一常人盜倉庫錢糧不分腹裏沿邊沿海入巳數滿三百兩者一竊盜鞘餉至一百兩以上者一竊匪穿穴壁封盜倉庫錢糧至一百兩以上者常人盜倉庫錢糧例一誣竊為盜嚇詐逼認因而致死及致死二命者强盜例一官司差人捕獲罪人聚衆中途打奪傷差未至死之首犯但經聚衆奪犯雖未傷人之首犯刼囚例一聚衆夥謀搶奪路行婦女或賣或自為奴婢為從者一黔楚紅苖聚至五十人殺人下手者一白晝搶奪人財至一百二十兩以上者一江南通州崇眀昭文沙民夥衆争地執持器械及聚衆四五十人有抗官重情為從者一不法之徒乘地方歉收夥衆搶奪擾害善良挾制官長或因賑貸稍遲搶奪村市喧閙公堂及懷挾私憤糾衆罷市辱官為從者一川省嘓匪糾夥五人以上在於塲市人烟凑集之所横行搶刦為從同搶者若同謀搶奪而拒捕之時並未在塲者白晝搶奪例一竊盜三犯贓至五十兩以上者一竊盜贓至滿貫者一竊盜棄財逃走事主追逐逞兇執持金刃戳傷事主者一姦匪夥衆丢包誆取財物至一百二十兩以上者一随駕官員之跟役無論奴僕雇工偷盜馬匹器械逃回者竊盜例一偷盜官馬十匹以上者窩主及牧馬人役自行盜賣者一民人在䝉古地方偷竊四項牲畜為首者一呼倫貝爾旗分另户在札薩克䝉古遊牧居住偷竊四項牲畜為首者一打牲索倫在䝉古地方偷竊四項牲畜為首者一䝉古人等偷竊四項牲畜十匹以上為首者一偷竊右衛地方八旗官兵所養馬駝十匹以上者盜馬牛畜產例一旗偷刨人參人至百名以上參至五百兩以上為首之財主及頭目并容留之人盜田野榖麥例一奴婢勾引外人同盜家長財物至一百二十兩以上者親屬相盜例一惡棍設法索詐官民或因詐財不遂竟行毆斃為從者一旂民結夥指稱隠匿逃人索詐財物為從者恐嚇取財例一將腹裏人口用强賣與境外土官土人峒寨圖利未曽殺傷人者一誘拐婦人子女或典賣或為妻妾子孫被誘之人若不知情為首者一貴州地方有外來流棍勾通夲地棍徒將荒村居住民苗人戸用威力强行綁去及設方畧誘徃四川販賣不論已賣未賣曽否出境為從者和同誘拐徃川不論已賣未賣但起行在途為首者窩隠川販在家指引和誘子女藏匿遞賣者一奴及雇工畧賣家長之期功以下親屬畧人畧賣人例一發掘貝勒貝子公等墳塜見棺為從及未至棺為首者發掘歴代帝王陵寢先賢名臣及前代藩王墳墓見棺為從及未至棺為首者一奴婢雇工人發掘家長墳塚未見棺為首者及見棺之為從者子孫犯者一貪人吉壤將逺年之墳盜發者一田地塲園内盜塟而地主發掘開棺見屍者一偷刨墳墓為從之犯開棺三次及至三次以外有贓証次數確據者一盜未殯未埋屍柩及發年久穿䧟之塚開棺見屍三次者為從三次以上者發塚例一圖財害命未得財傷人為首者一謀殺人已行其人知覺奔走廹于兇悍當時失跌身死者原謀謀殺人例一非姦所獲姦將姦婦逼供而殺害無姦情確據者本夫登時姦所獲姦將姦婦殺死姦夫當時脱逃後被拿獲到官審眀姦情是實者姦夫一姦夫已離姦所本夫逐至門外非登時殺之者一本夫之兄弟及有服親屬捉姦非登時殺死者一非應許捉姦之人有殺死者一姦夫造意謀殺本夫傷而不死者一姦夫自殺夫之父母姦婦雖不知情者一本夫先經縱容抑勒妻妾與人通姦後因索詐不遂殺死姦婦者一姦夫臨時拒捕姦婦在塲並不喊救事後又不首告者殺死姦夫例一殺期親奴僕一家三人者一聚衆共毆原無必殺之心而亂毆一家三命至死為從下手傷重者殺一家三人例一好鬬兇徒