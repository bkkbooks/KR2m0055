front:
  text: 欽定四庫全書大清律例卷二十一
  hash: sha256:1feae4ae891eac95854932df5a6e61a9831a85e750c99052a54541f3673ac2e6
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0055_WYG_058-1a, image: WYG0672/WYG0672-0685c.png}
body:
  text: 兵律廄牧牧養畜産不如法凡牧養官馬牛駝騾驢羊並以一百頭為率若死者損者失者各從實開報死者即時將皮張鬃尾入官牛斤角皮張亦入官其管牧牧長牧副每馬牛駝一頭各笞三十每三頭加一等過杖一百每十頭加一等罪止杖一百徒三年羊減馬三等四頭笞一十每三頭加一等過杖一百每十頭加一等罪止杖七十徒一年半驢騾減馬牛駝二等一頭笞一十每三頭加一等過杖一百每十頭加一等罪止杖八十徒二年若胎生不及時日而死者灰醃並年老而自死者看視明白不坐若失去賠償損傷不堪用減死者一等坐罪其死損數目並不準除孳生馬匹凡牧長管領騍馬一百匹為一羣每年三羣孳生駒一百匹若一年之內止有駒八十匹者笞五十七十匹者杖六十典牧官不為用心提調者致孳生不及數各減三等太僕寺官又減典牧官罪二等條例一凡上駟院太僕寺所管遊牧馬羣每三年整頓一次不論騍馬兒馬馬駒每三匹內合算當孳生馬一匹除合算正額外多孳生一百六十匹以上者為頭等八十匹以上者為二等一匹以上者為三等牧長牧副分别給賞若合算正額內少孳生五十匹以下者牧長罰馬五匹牧副各笞四十一百匹以下者牧長罰馬七匹牧副各笞五十一百匹以上者牧長罰馬九匹牧副各杖六十騸馬羣倒斃少者賞多者罰相半者免議賞罰之數視騍馬羣第三等例其各馬羣賞罰相半者總管官免議賞多者按羣給賞罰多者按羣受罰驗畜産不以實凡官司相驗分揀相驗其美惡而分别揀選以定高下官馬牛駝騾驢不以美惡之實者一頭笞四十每三頭加一等罪止杖一百驗羊不以實減三等若因驗畜不實而價有增減者計所增虧官減損民價坐贓論入已者以監守自盜論各從重科斷不實罪重從不實坐贓自盜罪重從自盜坐贓條例一州縣起解備用馬匹各要經由該管官驗中起解若有馬販交通官吏醫獸人等兜攬作弊者問罪枷號一箇月發近邊充軍養療瘦病畜産不如法凡養療瘦病官馬牛駝騾驢不如法無論頭數笞三十因而致死者一頭笞四十每三頭加一等罪止杖一百羊減三等乘官畜脊破領穿凡官馬牛駝騾驢乘駕不如法而致脊破領穿瘡圍繞三寸者笞二十五寸以上笞五十並坐乘駕之人若牧養瘦者計百頭為率十頭瘦者牧養人及牧長牧副各笞二十每十頭加一等罪止杖一百羊減三等典牧官各隨所管牧長多少通計科罪亦以十分為率太僕寺官各減典牧官罪三等條例一車駕行幸所需馬匹車輛及校尉等所乘馬匹俱令該管職事人員親身關領嚴行約束若校尉當差人役趕車步軍將馬匹不按時飲水喂草私自濫行馳驟或在沿途或到處所倒斃走失者各杖一百躦病損傷者減二等官馬不調習凡牧馬之官聽乘官馬而不調習者一匹笞二十每五匹加一等罪止杖八十宰殺馬牛凡私宰自己馬牛者杖一百駝騾驢杖八十斤角皮張入官誤殺及病死者不坐若故殺他人馬牛者杖七十徒一年半駝騾驢杖一百官畜産同若計贓重於本罪者準盜論追價給主係官者準常人盜官物斷罪並免刺若傷而不死不堪乘用及殺豬羊等畜者計殺傷所減之價亦準盜論各追賠所減價錢完官給主價不減者笞三十其誤殺傷者不坐罪但追賠減價為從者故殺傷各減一等官物不分首從若故殺緦麻以上親馬牛駝騾驢者與本主私宰罪同追價賠主殺豬羊等畜者計減價坐贓論罪止杖八十其誤殺及故傷者俱不坐但各追賠減價若官私畜産毁食官私之物因而殺傷者各減故殺傷三等追賠所減價畜主畜主賠償所毁食之物還官主若故放官私畜産損食官私物者笞三十計所食之贓重於本罪者坐贓論罪止杖一百徒三年失防者減二等各賠所損物還官主若官畜産失防毁食官物者止坐其罪不在賠償之限若畜産欲觸抵踢咬人登時殺傷者不坐罪亦不賠償兼官私條例一凡屠戶將堪用牲畜買去宰殺者雖經上稅仍照故殺他人駝騾律杖一百若將竊盜所偷堪用牲畜不上稅買去宰殺者與竊盜一體治罪一宰殺耕牛並私開圈店及販賣與宰殺之人初犯俱枷號兩個月杖一百若計隻重於本罪者照盜牛例治罪再犯發附近充軍殺自己牛者枷號一個月杖八十故殺他人牛者杖七十徒一年半若計隻重於本罪者均照盜牛例治罪免刺罪止杖一百流三千里其殘老病死者勿論一開設湯鍋宰殺堪用馬一二匹者枷號四十日責四十板三四匹者杖六十徒一年五匹以上每馬四匹遞加一等至三十匹者杖一百流三千里三十匹以上者發雲貴兩廣煙瘴少輕地方交與地方官嚴行管束若旗人有犯亦計匹論罪一匹至四匹者俱枷號四十日五匹以上每四匹遞加一等加枷號五日至三十匹以上者發黑龍江當差牙行及賣馬之人知情者照數各減宰馬人罪一等至三十匹以上者均發附近充軍其徒罪以下再犯及知情賣與者俱不計匹數均發近邊充軍失察之地方官按數分别議處一凡失察私宰耕牛之地方官照失察宰殺馬匹例交部分别議處若能拿獲究治者免其處分一附京州縣及京汛地方有馬窰子宰剝馬匹者發往黑龍江給索倫兵丁為奴失察之官辨照例議處畜産咬踢人凡馬牛及犬有觸抵踢咬人而畜主記號拴繫不如法若有狂犬不殺者笞四十因而殺傷人者以過失論各準鬬毆殺傷收贖給主若故放令殺傷人者減鬭毆殺傷一等親屬有犯者依尊卑相毆殺傷律其受雇醫療畜産無制控之術及無故人自觸之而被殺傷者不坐罪若故放犬令殺傷他人畜産者各笞四十追賠所減價錢給主隱匿孳生官畜産凡牧養係官馬騾驢等畜所得孳生限十日內報官若限外隱匿不報計所隱匿之價為贓準竊盜論止杖一百流三千里因而盜賣或將不堪孳生抵換者並以監守自盜論罪不分首從併贓至四十兩雜犯斬其典牧官太僕寺官知情不舉與犯人同罪不知者俱不坐買主知情以故買盜贓科匿賣抵換之物還官條例一凡屯莊居住旗人莊頭畜養馬匹各用該旗印烙無印烙者察出將馬入官養馬之人杖一百屯領催不行察出者笞五十首報免罪一口外羣內馬匹盜賣抵換照監守自盜律科罪若將有太僕寺滿字印烙馬匹明知故買者與犯人同罪私借官畜産凡監臨官吏主守之人將係官馬牛駝騾驢私自借用或轉借與人及借之者不論久近多寡各笞五十驗計借過日期追雇賃錢入官若計雇賃錢重於笞五十者各坐贓論加一等雇錢不得過其本價官畜死依毁棄官物在場牽去依常人盜公使人等索借馬匹凡公使人等承差經過去處除應付腳力外索借有司官馬匹騎坐者杖六十驢騾笞五十官吏應付者各減一等罪坐所由應付之人大清律例卷二十一
