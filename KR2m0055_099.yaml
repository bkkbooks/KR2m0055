夫脫逃後被獲到官審明姦情是實者本夫一姦婦自殺其夫姦夫果不知情者一姦夫已離姦所本夫登時逐至門外殺之者殺死姦夫例一瘋病之人親屬隣佑人等容隱不報不行看守以致瘋病之人自殺者戲殺誤殺過失殺傷人例一妻與夫角口被毆有重傷縊死者其夫夫毆死有罪妻妾例一夫將妻屍圖賴人者一兇棍遇有自盡之案冒認屍親吵閙毆打或將棺材攔阻打壊擡去屍首勒掯行詐該管地方兵役知而不拏者殺子孫及奴婢圖賴人例一閒散及護軍披甲人將該管官殺死之領催族長毆制使及本管長官例一地方衿監私置板棍擅責佃戸者奸頑佃戸拖欠租課欺慢田主者威力制縛人例一典當雇工人限内逃匿者奴婢毆家長例一控告人命或誤聽人言情急妄告於未經驗屍之先盡吐實情遞詞求息别無賄和等情者誣告例一八旗有將家人爲養子分戸開戸之人值原主之子孫庸懦或至絶嗣自稱原爲養子或謊稱爲近族兄反行欺壓希圖占産者係官革職枷號一個月干名犯義例一直省書役年滿缺出暗行頂買者出結人等書吏定稿髙下其手駁詰不已無贓者官吏受財例一所犯本輕或本無罪但許財營求者官吏聴許財物例一船戸夾帶私錢同船之人知情不舉首者一夥衆開爐私鑄鉛錢至十千以上房主隣佑總甲十家長失於查察者私鑄銅錢例一演弄拳棒射利惑民容留不報之坊店寺院及不行查拏之地保人等詐教誘人犯法例一調姦未成本家投明鄉保本婦懐忿自盡不即禀官之鄉保犯姦例一流娼土妓隣保知情容隱者買良爲娼例一拏獲賭博人犯不將造賣之人供出即將案内出具牌骰之人一賭飲食者一經旬累月開場窩賭之左右隣通同徇隱不即舉首者賭博例一城市鄉村當街搭臺懸燈唱演夜戲地方保甲不行查拏者搬做雜劇例一各省發配充徒限滿囘籍若係强竊盜及光棍案内之犯私自出境者總甲人役并知情容留之房主如有旗人容留居住將知情容留之房主若係另戸并族長若係家人并伊主及領催一軍流脫逃看守之保甲逾限不獲一名者原籍容留之親屬一在京問擬枷責遞囘原籍人犯復逃來京三次以上雖無犯案者徒流人逃例一西山開採煤窰各項工人有犯竊賭人命該窰戸知情不報者知情藏匿罪人例一隣縣關提人犯地保差役揑稱並無其人者盜賊捕限例一在刑部衙門外左近探聼之徒枷號一個月主守敎囚反異例杖九十吏律遺失文案而同僚代爲判署以補卷宗者同僚代判署文案律官文書若有規避故改補干礙調撥軍馬及供給邊方軍需錢糧數目未施行者首領官吏典増減官文書律户律毁人神主者棄毁器物稼穡等律爲婚而男家妄冒成婚者男女婚姻律妻在以妾爲妻者若有妻更娶妻者妻妾失序律夫喪服滿妻妾果願守志而女家及夫家之期親强嫁之者居喪嫁娶律娶緦麻親及舅甥之妾者娶親屬妻妾律妄以奴婢爲良人而與良人爲夫妻者良賤爲婚姻律客鹽越過批驗所不經掣摯關防者鹽法律禮律上司官及使客經過各衙門官吏出郭迎送者容令迎送不舉問者禁止迎送律兵律擅入太社門者至太廟及山陵兆域門未過門限者守衞官故縱者太廟門擅入律擅入及冒入紫禁城等門并禁苑未過門限者門官及宿衞官軍故縱者擅入及冒入御膳所御在所若不係宿衞應直合帶兵仗之人但持寸刃入宫殿門與紫禁城門内及未過門限宿衞軍人失覺察者宫殿門擅入律京城不係宿衞守衞人各處城門不係宿衞守衞官冒名代替及替之者親管頭目知而故縱者宿衞守衞人私自替代律越各府州縣鎭城未過者越城律京城門應閉而誤不下鎖者門禁鎖鑰律民間私造應禁軍器一件者私藏應禁軍器律在京軍人逃初犯者知情窩藏者本管頭目知情故縱者在京各營軍人轉投别營當軍初犯者從征守禦官軍逃律關不由門津不由渡而私越度者守把之人知而故縱者越度縁邊關塞及潛出外境守把軍兵失於盤詰者私越冐度關津律在京及各處官軍遞送逃軍妻女出城守門軍人失於盤詰者遞送逃軍妻女出城律境内姦細走透消息於外人及境外姦細入境内探聽事情守把軍人失於盤詰者盤詰姦細律將馬牛軍需鐵貨銅錢縀疋紬絹絲綿私出外境貨賣及下海者受雇挑擔䭾載之人將人口軍器出境及下海因而走泄事情守把軍人失覺察者私出外境及違禁下海律故殺他人駝驘驢及緦麻以上親馬牛爲從者他人及官馬牛因毁食物而殺者宰殺馬牛律提調縣吏失於檢舉沉匿公文及拆動原封事干軍情者遞送公文律出使人員應乗驛船驛馬數外多乗因而毆傷驛官者多乗驛馬律刑律監守自盜倉庫錢糧等物一兩以上至二兩五錢者監守自盜倉庫錢糧律常人盜倉庫錢糧等物至一十兩者常人盜倉庫錢糧律竊盜及掏摸得財三十兩為首者四十兩爲從者竊盜律和賣子孫之妾未賣者窩主及買主知情者畧人畧賣人律尊長於期親卑幼墳墓熏狐狸因而燒棺槨者子孫於祖父母父母及奴婢雇工人於家長墳墓熏狐狸爲從者平治他人墳墓爲田園爲從者地界内有死人里長地隣輒移他處及埋藏以致失屍爲從者發塚律謀殺人已行未傷人爲從不行者謀殺人律緦麻卑幼被殺而尊長私和者尊長爲人殺私和律毆折人二齒二指以上及髠髮辜内平復者保辜限期律威力主使人毆打至内損吐血下手爲從者威力制縛人律奴婢毆良人血從耳目中出及内損吐血者良人毆他人奴婢及毆緦麻小功親雇工人折一齒一指眇一目抉毁耳鼻破骨及用湯火銅鐵汁傷者毆大功親奴婢折肋眇兩目墮胎及刃傷并毆雇工人折二齒二指以上及髠髮者良賤相毆律雇工人毆家長之小功親者毆緦麻小功親至内損吐血者奴婢毆家長律夫毆妻及妻