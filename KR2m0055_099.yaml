  text: 欽定四庫全書大清律例卷四十一
  hash: sha256:58f6e91e6061fd76877f1021429e02ca25def4ad2cef0e4ce4b840357602e3a3
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0055_WYG_099-1a, image: WYG0673/WYG0673-0212a.png}
body:
  text: 杖六十吏律主司考試藝業技能而不以實一人者貢舉非其人律上書及奏事錯誤當言原免而言不免當言千石而言十石之類有害於事者上書奏事犯諱律奉制勅出使回還三日後不繳納聖㫖者杖六十每二日加一等罪止杖一百出使不復命律增減官文書者杖六十若有規避杖罪以上各加本罪二等罪止杖一百流三千里增減官文書律各衙門行移出外文書漏使印信者倒用印信者漏使印信律戸律將另居親屬隱蔽在戸不報及相冐合户附籍無賦役者及所隱之人隱漏自己及他人成丁人口不附籍及增減年狀妄作老幼廢疾以免差役者一口至三口家長杖六十每三口加一等罪止杖一百所隱之人同罪里長官吏知情者脫漏戸口律乞養異姓義子以亂宗族者若以子與異姓人爲嗣者立嗣雖係同宗而尊卑失序者立嫡子違法律合設耆老不許罷閒吏卒及有過之人充應違而充應者禁革主保里長律民戸逃住鄰境州縣里長知而不逐遣及原管官司不移文起取並所在官司占恡不發者逃避差役律監工官私役使夫匠一名出百里之外及久占在家使喚者私役部民夫匠律鰥寡孤獨及篤廢之人貧窮無親屬依倚所在官司不收養者收養孤老律功臣之家除撥賜公田外但有田土入籍納糧當差違者一畝至三畝杖六十每三畝加一等罪止杖一百徒三年若里長及有司官吏檢踏不實及知而不舉者同罪功臣田土律强種官田一畝以下者杖六十每五畝加一等罪止杖六十徒一年盜耕種官民田律受財典雇女者知而典雇者典雇妻女律祖父母父母犯死罪囚禁而子孫自嫁娶爲妾者父母囚禁嫁娶律同姓爲婚者同姓為婚律有服親妾被出及已改嫁而娶爲妾者娶親屬妻妾律官吏娶樂人爲妻妾者官員子孫娶者娶樂人爲妻妾律奴自娶良人女爲妻家長知情者良賤爲婚姻律妻雖犯七出有三不去而出之者妾因夫逃亡三年之内不告官司而逃去者窩主知情者出妻律錢法阻滯不即行使者錢法律稅糧違限不足者官吏及人戸各以十分爲率一分杖六十每一分加一等罪止杖一百收糧違限律各倉收受稅糧倉官斗級不令納戸行槩踢斛淋尖多收者提調官吏知而不舉者多收稅糧斛面律攬納他人稅糧者攬納稅糧律出征鎭守軍馬經過去處行糧草料明立文案即時應付違者那移出納律官物有印封記主典不請原封官司而擅開者守支錢糧及擅開官封律關津把截官及所委巡鹽人員巡禁私鹽若有透漏三犯者將有引官鹽轉於别境犯界貨賣知而買食者鹽法律城市鄉村諸色牙行及船埠頭私充者私充牙行埠頭律私造斛斗秤尺不平在市行使及將官降斛斗秤尺作弊增減者工匠同罪官降不如法提調官失於較勘者私造斛斗秤尺律禮律合和御藥料理揀選誤不精者造御膳飲食之物揀選誤不精者飲食誤不潔淨之監臨提調官合和御藥律乗輿服御物收藏修整不如法者御幸舟船不整頓修飭及篙棹之屬缺少者乗輿服御物律公差人員在外欺陵守禦官及府州縣官者公差人員欺陵長官律天文垂象欽天監官失於占候奏聞者失占天象律期親尊長喪制未終釋服從吉者匿父母夫䘮律兵律擅入太社門及至太廟山陵兆域門未過門限守衛官失覺察者太廟門擅入律擅入及冐入紫禁城等門及禁苑未過門限門官宿衛官失覺察者擅入及冒入紫禁城等門及禁苑已過門限并至宫殿門未過門限門軍宿衞軍人失覺察者宫殿門擅入律宫禁及紫禁城皇城門應宿衞守衞人并京城門應宿衞守衞官私自代替及替之者親管頭目知而故縱者京城門不係宿衞守衞人并各處城門不係宿衞守衞官冒名代替親管頭目失覺察者宿衞守衞人私自代替律宿衞人輒離職掌處所别處宿者宿衞官輒離職掌處所者親管頭目知而不舉者宿衞人兵仗律私開官司文書印封看視者漏泄軍情大事律冒名代替守禦軍人者軍人替役律軍人私出外境擄掠本管頭目鈐束不嚴者縱軍擄掠律將領關撥一應軍器征守事訖不回納還官者十日杖六十每十日加一等罪止杖一百毁棄軍器律軍還因而在逃及各處守禦軍人在逃初犯里長知而不首者軍人限外自首者從征守禦官軍逃律關不由門津不由渡而越度守把之官失於盤詰者馬驘私度冐度關津者私越冐度關津律民遞送逃軍妻女出京城守門軍人失於盤詰者遞送逃軍妻女出城律將馬牛軍需鐵貨銅錢縀疋紬絹絲綿私出外境下海守把軍兵失覺察者私出外境及違禁下海律管領騍馬每年三羣應孳生駒一百匹若止七十匹者牧長孳生馬匹律公使人等索借有司官馬匹騎坐者公使人等索借馬匹律鋪兵遞送公文若沉匿及拆動原封一角者杖六十每一角加一等罪止杖一百鋪司不告舉者各縣鋪長失於檢舉者若事干軍情機宻文書提調府官失檢舉者遞送公文律出使人員應乗驢而乗馬及應乗中下等馬而勒要上等馬驛官容情應付者枉道馳驛及經驛不換船馬者多乗驛馬律出使人員乗驛馬齎帶私物至十斤者杖六十每十斤加一等罪止杖一百乗驛馬齎私物律官吏及出使人員役使人民擡轎者富豪民人役使佃客擡轎者私役民夫擡轎律軍民官病故家屬無力還鄉所在官司應付遞送違者病故官家屬還鄉律承差起解官物囚徒畜産雇寄人代領送者承轉雇寄人律刑律常人盜倉庫錢糧等物不得財爲首者常人盜倉庫錢糧律竊盜棄財逃走事主追逐因而拒捕爲從者强盜律竊盜及掏摸得財一兩以下爲首者一兩至一十兩爲從者竊盜律和賣子孫爲奴婢未賣者窩主及買主知情者畧人畧賣人律盜賊曾經刺字若有起除原刺字樣者補刺起除刺字律常人私和人命者尊長爲人殺私和律殿内忿爭者宫内忿爭律流外官及軍民吏卒以他物毆傷九品以上官并公使人毆九品有司官成傷者毆制使及本管長官律流内九品以上官以他物毆非本管五品以上官及五品以上毆非本管三品以上官成傷者九品以上官毆長官律以他物毆受業師成傷者毆受業師律奴婢毆良人拔髮方寸以上者毆大功親奴婢折一齒一指眇一目抉毁耳鼻破骨及用湯火銅鐵汁傷者良賤相毆律夫毆妾折一齒一指眇一目抉毁耳鼻破骨及用湯火銅鐵汁傷者妻妾毆夫律同姓卑幼毆服盡尊長拔髮方寸以上者同姓親屬相毆律祖父母父母非理毆子孫之妾致令廢疾者毆祖父母父母律期親以下尊長毆卑幼之妾血從耳目中出及内損吐血者妻之子毆父妾拔髮方寸以上者妾之子以手足毆父妾成傷及以他物毆不成傷者妻妾與夫親屬相毆律祖父母父母爲人所殺而子孫擅殺行兇人者父祖被毆律吏卒罵六品以下佐貳官者罵制使及本管長官律佐貳官罵五品以上長官者佐職統屬罵長官律奴婢罵家長緦麻親者雇工人罵家長大功親者奴婢罵家長律罵小功兄姊及緦麻尊屬者罵尊長律妻妾罵夫小功兄姊及緦麻尊屬者夫罵妻之父母者妻妾罵夫期親尊長律誣告人罪笞四十加所誣罪二等者誣告律雇工人告家長緦麻親得實者干名犯義律官吏受財有禄人之不枉法贓一兩以下者無禄人之枉法贓一兩以下者不枉法贓一兩至一十兩者官吏受財律官吏人等非因事受財至四十兩者與者至一百兩者坐贓致罪律有司官吏人等非奉上司明丈因公擅自科歛所屬財物及管軍官吏科歛軍人錢糧賞賜雖不入已者若餽送人雖不入己者因公科歛律私和和姦者犯姦律官吏宿娼者官員子孫宿娼者官吏宿㛎律自囑託已事者囑託公事律徒流遷徙充軍囚人配所主守及途中押解人不覺失囚者一名杖六十每一名加一等罪止杖一百徒流人逃律鞫獄官於獄囚應禁而不禁應鎖杻而不鎖杻及本有鎖杻而爲脫去囚該死罪者若囚自脫去鎖杻及司獄官典獄卒私與囚脫去鎖杻囚該死罪者提牢官知而不舉者鞫獄官於囚不應禁而禁及不應鎖杻而鎖杻者囚應禁而不禁律獄囚情犯已完審錄無寃别無追勘未盡事理若限外不斷決囚而淹禁致死囚該死罪者淹禁律獄卒失於檢點防範致囚自盡原非縱與可殺之具者與囚金刃解脫律司獄官典獄卒於獄囚應請給衣糧醫藥而不請給應脫鎖杻而不請脫應保出外而不請保應聼家人入視而不聼因而致死死罪囚者提牢官知而不舉者己申禀上司不即施行因而致死死罪囚者獄囚衣糧律功臣及五品以上官犯罪應禁者許令親人入視徒流者並聼親人隨行若在禁及配所或中途病死官司開具緣由差領親人奏請發放違者功臣應禁親人入視律獄囚死罪奏聞回報故延不決者有司決囚等第律屍傷不即檢驗及檢驗不親臨監視若初復檢官吏相見扶同屍狀致移易輕重增減屍傷不實者正官檢驗屍傷不以實律獄囚死罪各喚囚及其家屬取服辯文狀若不服者更爲詳審違者獄囚取服辯律孕婦犯死罪産訖過限不決者婦人犯罪律死罪囚覆奏回報應決者聼三日乃行刑若限未滿而刑及過限不行刑者死囚覆奏待報律死囚應絞而斬應斬而絞者斷罪不當律工律監臨主守官吏將自己物料輒於官局帶造縀疋者局官知而不舉者帶造縀疋律不修河防及修而失時毁害人家漂失財物者失時不修提防律侵占街道起蓋房屋及爲園圃者侵占街道律吏例一奏銷册錢糧總數遺漏印信及有洗補添註字樣繕書册吏漏使印信例戸例一八旗無嗣之人實有同宗可繼揑稱並無族人朦混繼立異姓者立嫡子違法例一民間私頂軍田匿不首報至十五畝者典買田宅例一貢監生員應納錢糧以十分爲率欠至四分以下者收糧違限例一空重漕船隨幫百總旗頭違限二次者轉解官物例一各處關口地方土棍人等遇有重載恃强代攬雇覔小船起剝勒索使用擾累客商者私充牙行埠頭例一牙行侵欠審係分散客店不完一千兩以下者把持行市例禮例一尋常朝㑹日厮役肆行喊叫衝突擁擠者失儀例兵例一提塘及衙役人等將宻封事件私開竊視以致漏泄者一平常非宻封事件提塘與各衙門書辦彼此勾通本章一到即抄寫刋刻圖利者漏泄軍情大事例一上駟院太僕寺所管遊牧馬羣合算正額内少孳生一百匹以上者牧副孳生馬匹例一起解人犯𣲖押兵役足數前途查㸃有缺少代解等弊其缺少頂替之兵役承差轉寄雇人例刑例一竊盜再犯計贓罪應杖六十者加枷號二十日竊盜例一盛京各處山場商人領票砍伐木植如有夾帶偷砍果松數至百根者盜田野穀麥例一實係本人逺祖之墳被人發掘盜葬因将盜葬之棺發掘抛棄者在田地場園内盜葬者其盜葬人發塜例一牌頭知爲盜窩盜之人舉報保正而保正不行轉報者盜賊窩主例一押解人犯中途脫逃一名者短解及䕶送營兵主守不覺失囚例杖七十吏律失錯㫖意者制書有違律誤毁及遺失官文書者棄毁制書印信律各衙門出使干預他事係常事者出使不復命律戸律盜賣換易及冐認若虛錢實契典買及侵占官田一畝屋一間以下者盜賣田宅律許嫁女已報婚書及有私約再許他人及後定娶男家知情俱未成婚者男家悔而再聘者男女婚姻律家長與奴娶良人女爲妻女家主婚人知情者良賤爲婚姻律客商中買鹽引勘合不親支鹽中途增價轉賣之牙保阻壊鹽法律斛斗秤尺官降不如法者提調官知情者倉庫官吏私自增減官降斛斗秤尺監臨官失於覺察者私造斛斗秤尺律禮律受見任官遣請於上爲之立碑建祠者見任官輒自立碑律校尉在外欺陵守禦官及府州縣官者公差人員欺陵長官律兵律擅入太廟門及山陵兆域門守衞官失覺察