捕得若囚已死及自首者常人以金刃及他物與囚及子孫與在獄之祖父母父母奴婢雇工人與在獄之家長因而在逃及自傷或傷人者司獄官典及提牢官知而不舉者與囚金刃解脫律司獄官典獄卒於徒囚應請給衣糧醫藥而不請給應脫鎖杻而不請脫應保出外而不請保應請聽家人入視而不聽因而致死者提牢官知而不舉者己申禀上司不即施行因而致死徒罪囚者獄囚衣糧律官司决人不如法因而致死者决罰不如法律婦人懐孕犯罪未産拷决因而墮胎者婦人犯罪律工律民間織造違禁龍鳳文紵絲紗羅貨賣者機戸挑花挽花工匠織造違禁龍鳳文叚匹律盜决河防者盜決河防律名例例一僉遣之犯若隣族揑結伊妻老疾不能隨行及患病留養後成篤廢不能補解者流囚家屬例一内外免死流犯如有祖父母父母老疾家無以次成丁者枷號兩箇月其鄰保族長等有假揑出結者一鬭毆殺人之犯有祖父母父母老疾應侍准其存留養親者枷號兩個月一夫毆妻致死並無故殺别情家無承祀之人准其存留者枷號兩個月犯罪存留養親例一養象軍奴犯該雜犯死罪及徒流罪者天文生有犯例一在監重囚因變逸出投歸者除不准自首之犯外餘俱免死犯罪自首例一免死發遣人犯脫逃後並無行兇爲匪者遞囘發遣處枷號三個月其平常發遣人犯逃走後復行兇爲匪犯該徒罪者遞回發遣處枷號三個月罪止笞杖者遞囘發遣處枷號兩個月並無行兇爲匪者遞囘發遣處枷號一個月犯罪事發在逃例一免死減等發遣盜犯在配犯該笞杖者枷號三個月徒流人又犯罪例吏例一鑾儀衛校尉養象校尉有朦朧冐替者官員襲廕例一應試舉監生儒及官吏人等但有懐挾文字銀兩並越舍與人換寫文字者枷號一個月貢舉非其人例一部院衙門書辦退役之後更名重役者一在外各衙門書役有年滿不退者一各部院衙門役滿書吏潛留京城者一書吏所雇貼寫驅逐辭去後如有揑報詭名經承扶同保結者一部院各衙門書吏從前犯事遞囘原籍又私自來京雖未犯案者枷號一個月一斥革監生易名復捐者舉用有過官吏例一外任旗員子弟歸旗後有因事告假借端逗遛者擅離職役例一陞除出外文職已領勅憑無故遷延半年之上不辭朝出城者一外任漢軍官員陞轉來京及年老有病降革歸旗無故不速起程及中途逗遛或别處居住或本身進京令家口别處居住者官員赴任過限例一凡將誥命舊軸售賣及轉賣者棄毁制書印信例一文武官員有以官印用於私書者擅用調兵印信例戸例一發遣賞給各省駐防兵丁爲奴人犯有應賣事故如賣與民人並别境旗人爲奴者一八旗從前投充及乾隆元年以前契買家奴查明果係竈户准其放出歸竈仍將賣身之人枷號三個月引進保人枷號兩個月其並非竈丁指稱抗違家主者人戸以籍爲定例一民間創造寺觀神祠不俟題請擅行興造者一僧道已將原領牒照追繳毋許改名更替如有暗行隱匿及私相授受者私剙庵院及私度僧道例一乞養異姓義子希圖貲財冐認歸宗者立嫡子違法例一審編均徭於丁糧有力之家止編本等差役不許分外加增餘剰銀兩貧難下戸并逃亡之数不許徴銀及額外濫設聽差等項名色擾累違者有司官并容情不舉之上司一紳衿優免本身丁銀外倘濫以子孫族户冐入者申革賦役不均例一兵荒逃避之民招撫復業當差如不自首雖首而不盡或展轉逃移及窩家不舉首者逃避差役例一祖父母父母在而子孫分財異居者别籍異財例一遇有恩詔豁免錢糧其漕項蘆課學租雜稅各項俱入豁免之内地方官違者一免稅米船偷運别省並未到被災地方先行糶賣者檢踏災傷田糧例一各省丈量田畝抑勒首報墾田者盜賣田宅例一民間私頂軍田匿不首報至三十五畝者典買田宅例一廣收麥石肆行躧麯大開燒鍋者枷號兩個月棄毁器物稼穡等律一福建臺灣地方民人與番人結親者嫁娶違律主婚媒人罪例一夥衆越境採取銅鉛聚至三十名以上爲從者枷號三個月不及三十名爲首者枷號三個月不及三十名爲從者錢法例一應納錢糧以十分爲率貢監生員欠至七分以下者黜革枷號一個月欠至十分以下者舉人進士及有頂帶人員並問革爲民若貢生監生生員枷號兩個月一運弁旗丁掛欠糧米不及一分不完者欠至四分追完者欠至五分者收糧違限例一社倉捐榖聽民自便不得繩以官法違者多收稅糧斛靣例一牙行蠧役將家人佃戸姓名影射零星領借倉榖入已積至二三十石者私借錢糧例一徇隱州縣侵欺革職代賠之知府未完之數在五分以内者杖一百每一分加一等那移出納例一進倉漕糧用褲襖細袋偷盜等小賊拏獲即於倉門首枷號四十日倉庫不覺被盜例一薊運囘空刨取白土裝帶及舖户賣與糧船尚未攙和之舖户丁舵枷號一個月轉觧官物例一查估之員本無不實追變之員本無徇縱不得向查估追變之人勒令代賠違者一承追贓罸有律應身死勿徴者照例免徴至年逺贓私不得於本犯之外混追賠補違者擬斷贓罰不當例一欠帑人員巧借認幫名目輾轉株連勒令賠補者承審承追各官隱瞞入官財産例一回空糧船夾帶私鹽兵役縱放未受賄者鹽法例一商欠鹽課錢糧至五分者人户虧兌課程例一佐領驍騎校領催在本旗佐領或兄弟佐領下指扣兵丁錢糧放印子銀係佐領驍騎校枷號六十日係領催枷號七十五日夥同放印子銀者枷號四十日一八旗領催代屬下兵丁指扣錢糧保借者枷號四十日其指米借債之人違禁取利例一京城無帖舖户私分地界不令旁人附近開張及議價若干方許承頂至發賣酒觔等項貨物車户獨自攬運違禁把持者枷號兩個月一旗民喪塟仵作霸占扛擡不容本家雇人者枷號兩個月一各衙門胥役更名揑姓兼充牙行者私充牙行埠頭例一内府人員家人及王大臣官員家人指名倚勢網收市利挾制有司干預詞訟該主遣去者枷號三個月一糧船雇覔短縴如有棍徒勒價聚衆攅毆等事餘犯枷號兩個月把持行市例禮例一天地等壇内縱放牲畜作踐及私種耤田外餘地併奪取耤田禾把者枷號一個月一天壇内有放鷹打鎗成羣飲酒遊戲者照違制律毁大祀邱壇例一僧道軍民人等於各寺觀神廟刁姦婦女因而引誘逃走或誆騙財物者姦婦䙝凟神明例一私刻地畝經及占驗推測妄誕不經之書售賣圖利及舊有書板藏匿不毁者禁止師巫邪術例一壇廟祭祀及聖駕出入並陞殿之日厮役肆行喊叫衝突擁擠者失儀例一内外大小官員但有不公不法等事須要指實具奏惟生員不許一言建白違者革黜上書陳言例一官員應用東珠重過三分以上者一軍民人等濫用黄色秋香色五爪龍緞立龍緞團補服及四爪暗蟒之四團補八團補緞紗者枷號一個月一三品以下官員僣用紅色雨衣雨帽者一在籍候選吏員僣穿補服干謁地方官者服舍違式例一内外官員例應守制開明呈報如有詐稱者一凡舉監生童遇本生父母之喪有隱匿不報朦混干進者一凡官員有臨時先謀出繼歸宗預為匿喪戀職地步者匿父母夫喪例一八旗蒙古喪葬概不許火化有犯者一民間喪祭之事有用絲竹管絃演唱佛戲者喪葬例一鄉飲坐叙其有曽犯法之人列於外坐不許紊越正席違者鄉飲酒禮例兵例一各衙門鄉親并書吏人等游船演戲夜半歸叫禁門者越城例一官兵從征無故起程違期者在外違期者出征兵丁干犯號令違法亂行為從者枷號三個月從征違期例一兵丁打圍放馬及看守京城以奴僕代替者軍人替役例一䕶軍領催兵丁私自焚掠者及厮役焚掠其主知情者縱軍擄掠例一直省刁惡之輩假地方公事約㑹抗糧歛錢搆訟抗官塞署或有寃抑聚衆至四五十人其逼勒同行者一福建地方借事聚衆罷市罷考打官等事其逼勒同行者一刁民因事鬨堂塞署被脅同行者激變良民例一各處鄉村及商民應用鳥鎗如有不報官私造者一内地興販硝黄及窩藏囤販知情賣與私販並囤積未曽興販之鄰保知情不首者一苗猓蠻户帶刀出入及私藏違禁等物該管頭目人等知而不報者私藏應禁軍器例一隨征逃回之奴僕不曽偷盜馬匹器械凱旋之日伊主情願領回者隨征兵丁之雇工不曽偷盜馬匹器械逃回者係旗下家奴枷號三個月一旗丁不拘重運回空無故潛逃棄船中途不顧者一京外在伍兵丁脫逃枷號一個月一派徃伊犂等處換防種地之滿漢各項兵丁中途及在原派地方逃避如有自行投回者枷號兩個月從征守禦官軍逃例一縁邊關口引領私越審係僅圖微私並無别情引送之人枷號一個月私越冐度關津例一民人私入臺灣番境者私入臺灣番境及近番處所抽籐弔鹿伐木採棕巡查不力之值日兵役一不由各汛偷越外洋船户舵工人等並富民謀利自造商船租與他人及租之者各枷號三個月一附近苗疆五百里内民人煎穵窩囤興販硝黄十觔以下者一姦徒將米穀出口圖利不及十石者枷號一個月一沿邊沿海地方將黄金販賣出洋者一奉天錦復雄盖四城拿獲有票商船私帶票内無名人之船户一絲斤出洋不及十斤為首者一租賃船隻出洋為匪之案犯該徒罪以下船主不知情者枷號三個月私出外境及違禁下海例一車駕行幸所需馬匹車輛及校尉等所乗馬匹若校尉當差人役趕車步軍私自馳驟倒斃走失者乗官畜脊破領穿例一屠户將堪用牲畜買去宰殺者一宰殺耕牛并私開圈店及販賣與宰殺之人初犯者俱枷號兩個月宰殺馬牛例一屯莊居住旗人畜養馬匹無該旗印烙者隱匿孳生官畜産例一驛站提調吏典沈匿軍情機密文書者遞送公文例一驛遞運所夫役巡檢弓兵用强包攬多取工錢害人攪擾衙門官吏通同縱容者驛使稽程例一差役不照所定程途枉道擾驛者多乘驛馬例一各處舖行人等私與外國人交通買賣不係違禁貨物者枷號一個月多支廩給例一夫役工匠人等遇𦂳要差使不遵官長約束為匪不法逞刁挾制率衆颺散誤差為從者枷號一個月公事應行稽程例一起觧人犯管押兵役派不足數及雇人代解兵役知而不舉將兵役及承派之書吏弓兵承差轉雇寄人例一漕船旗丁例外多帶土宜者一漕運船隻附搭客商勢要人等貨物無贓之運軍運官并附載人員乘官畜產車船附私物例刑例一異姓人無歃血盟誓焚表事情止結拜弟兄為首者一閩省民人結㑹樹黨隂作記認魚肉鄉民凌弱暴寡被誘入夥者枷號兩個月謀叛例一滛詞小説買看者造妖書妖言例一車馬過陵及守陵官民入陵百步外下馬違者一子孫將祖父墳塋樹木私自砍賣一株至十株者枷號三個月看墳人等及奴僕盗賣者盗他人墳樹者枷號一個月知情盗賣者一奸徒私買他人墳樹初犯枷號一個月再犯枷號三個月盗園陵樹木例一將行月糧米一人盗買及一幫盗賣數至百石以上為首者枷號兩個月監守自盗倉庫錢糧例一呈報盗情並無被劫謊稱者及以竊為强以姦為盗者以人命鬬毆等事報盜其本身無罪者一官員恐嚇事主抑勒諱盜或改强為竊者承行書辦一竊盜等事地保汛兵通同隱匿及地保已報文職而汛兵不報武弁或汛兵已報武弁而地保不報文職者一强盜重案不許番捕等役私拷取供違者枷號一個月一父兄不能禁約子弟為盜者一夥盜不行又不分贓者一與老𤓰賊往來熟識者强盜例一總甲快手應捕人等以廵捕勾攝為由毆打平人搶奪財物里老鄰佑知而不舉者一苗人搶奪若至百人以上者百戸寨長一出哨兵弁見船覆溺阻撓不救以致淹斃人命為從者一江南通州崇明昭文沙民夥衆爭地執持器械及聚衆四五十人有抗官重情逼勒同行之人白晝搶奪例一凡行在拿獲竊盜罪應杖笞者不分旗民俱枷號一個月一外使報竊賊犯無獲巡查之兵役一竊盜再犯計贓罪應杖一百者加枷號四十日竊盜例一盜牛三隻及窩家知情分贓者俱枷號四十日知情不分贓者一民人在䝉古地方偷竊四項牲畜為從者一呼倫貝爾旗分另戸在札薩克䝉古逰牧居住偷竊四項牲畜為從者一打牲索偷在蒙古地方偷竊四項牲畜為從者一䝉古偷竊四項牲畜為從人犯所罰三九牲畜完交一半以上者盜馬牛畜産例一産礦山場山主違禁勾引礦徒偷穵及約練勾引接濟夥同分利保甲地鄰知情容隱不報者一山海等闗有將人參珠子私帶過關巡查人等明知故縱者枷號一個月一山海等闗巡查領催披甲人等失察偷出邊關刨參至二百名者至五百名以上者枷號一個月一領票刨參人夫私帶鳥鎗者一拿獲圍場内賊犯如係偷採菜蔬及割草之人初犯枷號一個月再犯枷號兩個月三犯枷號三個月盜田野榖麥例一苗人伏草捉人横加枷肘勒銀取贖該管官知情故縱者一内外大小衙門蠧役恐嚇索詐貧民計贓一兩以下為首者一兩至五兩為首者枷號一個月一兩至五兩為從者恐嚇取財例一學臣考試有積慣隨棚代筆之鎗手其知情保結之廪生詐欺官私取財例一窩隱川販鄰佑知而不首者一知情故買貴州苗人者畧人畧賣人例一將父母及五服内尊長骸骨發掘檢視占驗吉凶扶同隱匿之地保一在家夤夜格捕致死姦盜之犯或在曠野道途格殺拒捕盜賊將屍毁棄掩埋移投坑井因而遺失者發塜例一父兄不能禁約子弟窩盜者各照强盜父兄論盜賊窩主例一竊盜等犯自行用藥銷毁面膊上所刺之字者枷號三個月代毁之人枷號兩個月起除刺字例一謀殺人已行其人知覺奔逃雖未受傷因謀殺奔脱死於他所為從者謀殺人例一兇棍遇有自盡之案冒認屍親吵閙毆打或將棺材攔阻打壞擡去屍首勒掯行詐者枷號兩個月殺子孫及奴婢圖頼人例一瘋病之人親屬鄰佑人等容隱不報不行看守致殺他人者戲殺誤殺過失殺傷人例一兇徒雖執兇器而未傷人者執兇器自傷者一沿江濱海持鎗執棍行兇鬬毆附和未傷人者枷號一個月鬭毆例一八旗兵丁因管敎將本管官戮死之領催族長毆制使及本管長官例一旗下家人莊頭在外倚勢害民把持衙門覇占子女無故綑縛拷打良民致死其主係平人一地方鄉紳私置板棍擅責佃戸者威力制縛人例一官員將奴婢刃殺者若將族中家僕刃殺者一平人將奴婢責打身死者枷號二十日故殺者枷號一個月刃殺者枷號兩個月毆雇工人致死者枷號四十日毆族中家僕致死者枷號兩個月將族中家僕故殺者枷號三個月一監生生員故殺刃殺奴婢者一民人奴僕背主投營審無挾制勒索者枷號四十日一漢人奴僕背主逃匿者奴婢毆家長例一毁罵公侯駙馬伯及京省文職三品以上武職二品以上者一在長安門外妄叫寃枉辱罵原問官者用一百觔枷枷號一個月罵制使及本管長官例一車駕行幸瀛臺等處申訴者枷號一個月一擅入午門長安門内叫訴寃枉勘問得實者枷號一個月一姦徒違禁入堂子跪告者一生員越闗赴京在各衙門揑告或跪牌并奏瀆者越訴例一布散匿名揭帖及投遞部院衙門不行拏送之步軍營兵及司坊衙役並枷號三個月投匿名文書告人罪例一八旗有將伊祖父時或養子或分户年久之人子孫復行混告者係平人枷號兩個月誣告例一八旗有將家人為養子分戸開戸之人值原主之子孫庸懦或至絶嗣自稱原為養子或謊稱為近族兄反行欺壓希圖占産者係平人枷號三個月干名犯義例一藏匿及買訟師秘本如驚天雷相角法家新書刑䑓秦鏡一切搆訟之書者敎唆詞訟例一正身衙役違禁私帶白役者一各省書役年滿考職時若有冒籍冒名等弊者官吏受財例一長隨鑽營上司引薦别無情弊但盤踞屬員衙門者枷號一個月在官求索借貸人財物例一描摸印信行使不得財者偽造印信時憲書等例一私鑄銅錢其父兄不能禁約者一將前代廢錢攙使者枷號一個月一經紀鋪戸人等收買剪邊錢攙和貨賣錢不及十千者枷號一個月一私鑄銅錢房主人等並不知情失於查察者一銷毁制錢房主隣佑總甲人等並不知情失察察私鑄銅錢例一假冒生監者詐假官例一棍徒假冒差役名色搜查客船犯該杖罪以下者枷號一個月詐稱内使等官例一游手好閒之流演㺯拳棒教人及投師學習月又舞棍遍遊街市射利惑民者枷號一個月詐教誘人犯法例一職官姦軍民妻者革職姦婦枷號一個月軍民相姦者姦夫姦婦枷號號一個月奴婢相姦及軍民與官員軍民之妾婢相姦者姦夫姦婦一和同雞姦者枷號一個月犯姦例一姦同宗無服之親及無服親之妻者枷號四十日親屬相姦例一僧道官僧人道士有挾妓飲酒者一僧道尼僧女冠有犯和姦者於本寺觀庵院門首枷號兩個月居喪及僧道犯姦例一人牙私將領賣婦人久養在家逾限不賣希圖重利者一窩頓土娼如係偶然存留為日無㡬者枷號三個月買良為娼例一賭博不分兵民枷號兩個月偶然㑹聚開塲窩賭及存留之人抽頭無多者枷號三個月官員有犯革職枷號兩個月一官員賭錢賭飲食有打馬吊鬭混江者革職枷號兩個月上司與屬員鬭牌擲骰者均革職枷號三個月一地方保甲知造賣賭具之人不首報者一奸民私造賭具左右𦂳鄰通同徇隱不舉首者一在京轎夫有借名依附潛匿别處開塲誘賭經旬累月同賭之人俱枷號三個月賭博例一民人附合結黨妄預官府之事者囑託公事例一出征行獵處失火者失火例一謀財放火尚未延燒之誘脅同行者枷號兩個月挾讐放火當被救息尚未延燒之為從者枷號三個月放火故燒人房屋例一城市鄉村當街搭臺懸燈唱演夜戲者為首之人枷號一個月搬做雜劇例一賊犯業已拿獲捕人多於賊犯倚衆共毆致斃之餘人罪人拒捕例一越獄人犯其代為剃頭並銷燬刺字之人俱枷號兩個月一在監斬絞人犯如有强横不法及賭博等事者獄囚脫監及反獄在逃例一軍流脱逃看守之保甲逾限不獲三名及三名以上者原籍之房主保鄰雖不客留但明知不首者一在川流民犯罪遞回原籍復逃至川者如無為匪者一㸃省游匪犯該杖徒遞回原籍之後復敢潛入黔境訊無為匪者徒流人逃例一正陽崇文宣武三門闗廂内失事專汛千把總及馬步兵丁盜賊捕限例一承審官吏遇一切命盜案件將干連人犯不應拷訊誤執已見刑訊致弊者故禁故勘平人例一問刑衙門不許獄内用㭱牀違者禁卒一徒罪以下人犯無病而串通獄官醫生揑稱有病者病已痊愈而該佐領驍騎校地方官不即送監審結者一番役將盜犯及死罪人犯私拷取供者枷號一個月陵虐罪囚例一盜犯妻子家口不許放入監門探視違者妻子家口枷號兩個月獄囚衣糧例一書辦皂隸及官員家僕人等有擅自出入監所者書隸革役家人枷號一個月主守教囚反異例一遇告人命不先究致死根因明確概行檢驗者檢驗屍傷不以實例一遇雜犯等案將婦女提審者婦人犯罪例工例一工程核減本身無力完交請豁如未完之數在五分以内者擅造作例一在河工浮議動衆以致衆力懈弛之附和傳播者枷號一個月指稱夫頭包攬代雇勒掯良民一名者枷號一個月失時不修隄防例大清律例卷四十一
