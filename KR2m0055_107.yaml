body:
  text: 邊外為民吏例一舉監人等應試其夫匠等受財代替夾帶傳遞及不舉察捉拏者武場有犯懷挾等弊者貢舉非其人例戶例一民人強種屯田五十畝以上不納子粒者盜賣田宅例一將妻妾作姊妹及將親女并姊妹嫁賣騙財之後公然領去或瞰起程中途邀搶人財除實犯死罪外屬有司者媒人知情者典雇妻女例一勢豪舉放私債交通運糧官挾勢擅拏官軍綁打陵辱強將官糧凖還私債屬有司者違禁取利例禮例一官吏軍民僧道人等來京左道異端邪術煽惑人民為從者及稱煉丹出入官家或擅入皇城夤緣作弊希求進用屬有司者一左道惑衆為從者及稱為善友求討布施至十人以上并不問來歷窩藏接引或寺觀容留剃簪探聽事情誘捨禁器屬有司者禁止師巫邪術例刑例一總甲快捕人等指以巡捕勾攝為由毆打平人搶奪財物除實犯死罪外該徒以上初犯一次屬有司者雖係初犯若節次搶奪笞杖以上者枷號一箇月白晝搶奪例一土哨姦民附和苖人伏草捉人橫加枷肘勒銀取贖者枷號兩箇月恐嚇取財例一因事聚衆將本管官及公差并一應監臨官毆打綁縛屬有司者若止是毆打為首者毆制使及本管長官例一驀越赴京及督撫按察司處奏告機密重事不實並全誣十人以上屬有司者一刁徒身背黃袱口稱奏訴挾制官吏别無寃枉並主使人屬有司者越欣例一將本狀雇寄與人赴京奏訴并受雇受寄之人屬有司者教唆詞訟例一內外程遞人犯其押解人役逼致死傷及受財故縱并聽憑買求殺害除實犯死罪外徒罪以上屬有司者陵虐罪囚例煙瘴為民兵例一各邊將官并管軍頭目私役及私出境外釣豹捕鹿砍木掘鼠等項并守把之人知情故縱該管里老兵目軍吏扶同隱蔽除實犯死罪外屬有司者私出外境及違禁下海例充軍名例律軍籍人犯流罪者照依地里逺近發各衛所軍籍有犯律刑律誣告充軍者照所誣告地里逺近抵充軍役誣告充軍及遷徙律起發充軍囚徒中途在逃押解人及長押官故縱者徒流人逃律應充軍囚徒限外不起解無故稽留因而在逃及鄰境官司充軍囚到無故稽留致逃者當該吏典抵罪稽留囚徒律附近充軍戶律豪民子孫弟姪跟隨官員隱蔽差役者隱蔽差役律兵律內監出入不服摉檢者關防內使出入律邊將私令軍人於外境虜掠人口財物者縱軍虜掠律軍官私賣關給軍器者私賣軍器律官軍從征私逃知情窩藏者京外守禦軍人逃再犯三犯知情窩藏者本管頭目知情故縱者從征守禦官軍逃律吏例一下第舉子不安義命逞忿攪閙者貢舉非其人例一文職官員舉貢人等罷黜買求選用未除授者起送官吏知情受賄者舉用有過官吏例戶例一各部派到物料豪猾規利之徒買囑書吏妄稟編派下屬承攬害民者本無部派物料而揑稱坐派及明知官收官解借端生事擾纍地方者賦役不均例一近邊地方各營堡草場界限明白敢有盜耕及越出邊界種田者盜耕種官民田例一開採銅鉛之處衙役恣意攪擾致人裹足為首者錢法例一運辨旗丁挂欠糧米至四分不完者收糧違限例一收放糧草去處三五成羣搶奪籌斛占堆行概等項打攪倉場欺陵官攢挾詐運納軍民財物者徒罪以上與再犯杖罪以下多收稅糧斛面例一越境興販官司引鹽至三千斤以上者客商收買餘鹽買求掣摰至三千斤以上者巡捕官員乘機興販至三千斤以上者鹽法例一在西寧甘肅等處販賣私茶一百斤以上者守備把關巡捕等官販賣三百斤以上者一做造假茶五百斤以上本商并轉賣者店戶窩頓一千斤以上者一納稅去處權豪之徒攪擾商稅徒罪以上者枷號兩箇月匿稅例一在京各牙行若有光棍頂冒朋充霸開總行拖欠客本久占纍商者枷號一個月一各衙門胥役更名揑姓兼充牙行誆騙客貨纍商久候者枷號一個月私充牙行埠頭例一甘肅西寧等處遇有番夷到來勢豪之家主使逼令減價以賤易貴及取覔用錢方許買賣者主使之人一牙行及無籍之徒誆賖貨物纍死客商者把持行市例兵例一宰殺堪用馬至三十匹以上牙行及賣馬之人知情者一宰殺耕牛並私開圈店及販賣與宰殺之人再犯者宰殺馬牛例一各鋪司兵若有無籍之徒不容正身應當用強包攬多取工錢致公文稽遲沈匿者遞送公文例一驛遞夫役巡檢弓兵用強包攬多取工錢害人攪擾衙門者驛使稽程例一各處有司起解軍犯若長解縱容遷延違限一年之上者公事應行稽程例刑例一竊贓數多罪應滿流者竊盜例一盜賣騎操官馬三匹以上及再犯者養馬人戶盜賣官馬至三匹以上者一盜牛宰殺其窩家知情分贓者枷號一個月盜馬牛畜産例一各處大戶家人佃僕結搆為盜殺官劫庫劫獄放火大户知情故縱除實犯死罪外杖徒流罪者一強盜窩主造意不行又不分贓者盜賊窩主例一違禁㩦帶米石什物賣與刨參之人易換人參米逾五十石什物值銀逾五十兩者巡綽官兵知情故縱者盜田野穀麥例一殺一家非死罪三人之妻子實未同謀加功者殺一家非死罪三人例一故殺妾及子孫姪姪孫與子孫之婦圖賴人者殺子孫及奴婢圖賴人例一假以建言為由挾制官府及汚人名節報復私讐者越訴例一姦內外緦麻以上親及緦麻以上親之妻若妻前夫之女同母異父姊妹者親屬相姦例一流罪人犯越獄脫逃本犯應流二千五百里者獄囚脫監及反獄在逃例一流罪人犯如有中途在配脫逃原犯三千里者枷號兩個月徒流人逃例工例一盜決河南山東等處格月等堤者盜決河防例一運河一帶用強包攬閘夫二名及撈淺鋪夫三名之上者一在河工指稱夫頭包攬代雇勒掯良民二名以上者失時不修隄防例近邊充軍刑律強姦子婦未成而婦自盡者誣執翁姦律名例例一行劫二次以上之夥盜事未發而自首者一放火燒人空房及田場積聚之物計重於本罪自首者犯罪自首例吏例一應襲人父在詐稱死亡冒襲官職者官員襲廕例一文職官員舉貢人等罷黜買求選用已除授者舉用有過官吏例户例一各鄉里書飛灑詭寄稅糧二百石以上者欺隱田糧例一軍人強種屯田五十畝以上不納子粒者屯田人等將屯田典賣與人至五十畝以上與典主買主各不納子粒者一西山一帶私自開窑賣煤鑿山賣石立厰燒灰者枷號一個月盜賣田宅例一將妻妾作姊妹及將親女并姊妹嫁賣騙財之後公然領去或瞰起程中途邀搶人財除實犯死罪外屬軍衛者媒人知情者典雇妻女例一夥衆越境採取銅鉛聚至三十人以上為首者錢法例一正項錢糧及糧草軍需但有包攬誆騙銀一百兩糧二百石以上過期不完者各邊武職主使家人伴當跟隨結交人員挾勢攬納作弊者聽使之人攬納稅糧例一那移庫銀一萬兩以上至二萬兩者那移出納例一錢糧物料解部書役人等包攬索詐者解官行賄聽其包攬者一坐糧廳及各倉書役向運糧官丁指稱掣扺等項名色勒索十兩以上者收支留難例一偽造鹽引印信賣騙財物為從并知情人等但計贓滿數應流者一各鹽運司總催若買囑官吏并覆盤委官指倉指囤扶同作弊者一各處鹽場無籍之徒把持官府詐害客商犯該徒罪以上及再犯杖罪以下者一兵民聚衆十人以上帶有軍器興販私鹽拒捕殺人及傷三人以上其未曽下手殺傷人者其雖帶有軍器不曽拒捕為首者十人以下拒捕殺人不論有無軍器其不曽下手者一回空糧船夾帶私鹽十人以上持械拒捕殺人及傷三人案內未曽下手殺傷人之犯一回空糧船頭船旗丁頭舵人等闖閘闖關者枷號兩個月鹽法例一私茶有興販夾帶五百斤者一在西寧甘肅等處販賣私茶三百斤以上者守備把關巡捕等官自行興販私茶通番者私茶例一勢豪舉放私債交通運官擅拏官軍綁打陵辱強將官糧凖還私債屬軍衛者違禁取利例一會同館內外四鄰軍民人等代替外國人收買違禁貨物者枷號一個月一糧船雇覔短縴如有棍徒勒價聚衆攢毆等事審實將為首及下手傷人之犯把持行市例禮例一官吏軍民僧道人等來京左道邪術煽惑人民為從者及稱煉丹出入官家或擅入皇城夤緣作弊希求進用屬軍衛者一左道惑衆為從者及稱為善友求討布施至十人以上并不問來歷窩藏接引或寺觀容留剃簪探聽事情誘捨禁器屬軍衛者禁止師巫邪術例兵例一聖駕出郊衝突儀仗妄行奏訴並主使教唆揑寫本狀者一聖駕臨幸地方雖未陳設鹵簿民人具呈妄行控訴者衝突儀仗例一軍民人等與外國朝貢人往來投託撥置害人因而透漏事情者一提塘與各衙門書辦彼此勾通招搖撞騙犯該徒罪以上者漏泄軍情大事例一將硝黃合成火藥賣與鹽徒者私藏應禁軍器例一軍民人等私造海船帶違禁貨物下海前往番國買賣潛通海賊及為鄉道劫掠良民者全家打造海船賣與外國造船與賣船之為從者止將船隻雇與下海之人分取番貨及糾通下海之人私行接買番貨與探聽番貨到來私買販賣蘇木胡椒至一千斤以上者一附近苗強五百里內民人煎穵窩囤興販硝黃至百斤以上者一姦民圖利將廢鐵鐵貨潛出邊境及海洋貨賣一百斤以上及舟車捆載者一姦徒止將米穀偷運出口圖利並無接濟姦匪情弊米過一百石者一外國貢船到岸未曽報官盤驗先行接買番貨及為外國收買違禁貨物者一將應禁貨物賣與進貢外國圖利為從者一興販鴉片煙者枷號一個月一閩省不法棍徒在沿海地方引誘偷渡之人包攬過臺索取銀兩為首者一商民出洋將紅黃銅器銅斤私販各洋貨賣圖利一百斤以上之為首者一絲斤出洋過一百斤為首者私出外境及違禁下海例一州縣起解備用馬匹若有馬販交通官吏醫獸人等兜攬作弊者枷號一個月驗畜産不以實例一宰殺堪用馬匹其徒罪以下再犯及知情賣與者俱不計匹數宰殺馬牛例一指稱勳戚大臣近侍官員姻黨族屬家人擾害驛遞及詐稱勢要衙門希圖免稅誆騙違法徒罪以上者枷號一個月多乘驛馬例一各處有司起解軍犯在家遷延違限一年之上正犯原係附近者公事應行稽程例刑例一山前山後各有禁限盜砍樹株為從者取土取石開窰燒造放火燒山為從者一姦徒私買他人墳樹犯至三次者盜園陵樹木例一未傷人之盜首罪未發而自首者窩家盜線自首者親屬首告者強盜例一官司差人追徵錢糧勾攝公事捕獲罪人但聚衆至十人以上中途打奪為從者係異姓及槌師打手劫囚例一總甲快手應捕人等以巡捕勾攝為由毆打平人搶奪財物除實犯死罪外徒罪以上初犯一次屬軍衛者雖係初犯若節次搶奪笞杖以上者枷號一個月白晝搶奪例一竊盜拒捕傷人未死為從者拒捕不傷人之首犯竊盜例一盜御馬者枷號三個月一冒領太僕寺官馬三匹者枷號一個月盜馬牛畜産例一盜掘金銀等礦砂在山捉獲不曽拒捕聚衆至三十人以上為首者並人數不及三十名為首之再犯盜田野穀麥例一指稱內外大小官員名頭并各衙門打點使用名色誆騙財物計贓犯該徒罪以上者情重者枷號兩個月一漕糧起運頭幫軍伍將已裁陋規派斂私收或於定數之外多行勒索犯該徒罪以上者不分首從詐欺官私取財例一窩隱川販無指引捆拐遞賣情事但窩隱護送分贓者不分首從一貴州雲南四川地方民人捆綁本地方子女在本地售賣為從者略人略賣人例一發掘常人墳塜開棺見尸為從與發見棺槨為首一奴僕雇工人發掘家長墳塜未見棺為從者子孫犯者一偷刨墳墓為從之犯開棺一次者發塜例一窩主若止勾引容留往來住宿並無造意共謀者一皇親功臣管莊家僕佃户人等及軍民大户窩藏強盜二名以上竊盜五名以上坐家分贓者一知強竊盜贓而接買受寄三犯以上不拘贓數多寡與知強盜後而分贓滿數者一容留外省流棍者一本處鄰佑地保知情容留老瓜賊者盜賊窩主例一同謀共毆人除下手致命傷重處絞外其共毆人審係執持凶器亦有致命傷痕者一兩家互毆各斃一命各係凶手本宗有服親屬應擬抵者鬭毆及故殺人例一因事用強毆打威逼人致死有致命重傷及成殘廢篤疾雖有自盡實迹者一因事威逼致死一家二命及非一家至三命以上者一婦人夫亡願守志别無主婚之人若有用強求娶逼受聘財因而致死者一軍民人等因事威逼本管官致死為從者枷號三個月威逼人致死例一凶徒因事忿爭執持凶器但傷人及誤傷旁人與凡剜瞎人眼睛折跌人肢體全抉人耳鼻口唇斷人舌毁敗人隂陽者一匪徒因事忿爭執持褲刀傷人者鬪毆例一不法匪徒因事忿爭執持梭標傷人者一主使兩人數人毆一人有致死重傷及成殘廢篤疾者威力制縛人例一卑幼毆期親尊長執有刀刃赴殺情狀凶惡者雖未傷毆期親尊長例一姦徒身藏金刃欲行叩閽擅入午門長安等門者杖一百一驀越赴京及赴督撫按察司處奏告機密重事不實並全誣十人以上屬軍衛者一刁徒身背黃袱頭插黃旗口稱奏訴挾制官吏不干已事别無寃枉並主使人屬軍衛者一旗軍陳造運官不法事情不赴漕司告理赴别衙門挾告詐財犯該徒罪以上者越訴例一姦徒假以上司察訪為由挾制官府陷害良善名為窩訪犯徒流者一無籍棍徒私自串結將不干已事情聲言奏告詐贓滿數者妄指宫禁親藩誣害平人者枷號三個月一誣告人謀死人命審無挾讐止以誤執傷䀶誣告蒸檢為首者誣告例一代人揑寫本狀教唆奏告強盜人命重罪不實並全誣十人以上者一將本狀雇寄與人赴京奏訴并受雇受寄之人屬軍衛者教唆詞訟例一文武職官索取土官外國猺獞財物犯徒三年以上者一雲貴川廣等處流官擅科土官財物僉取兵夫徵價入已強將貨物發賣多取價利贓至該徒三年以上者在官求索借貸人財物例一衙門蠧役恐嚇索詐銀十兩以上者及十兩以下致令貧民賣男鬻女者官吏受財例一詐為察院布按府州縣及其餘衙門文書誆騙科斂財物者詐為制書例一詐冒皇親族屬姻黨家人挾騙財物侵漁民利除實犯死罪外徒罪以上者枷號一個月一假充大臣及近侍官員家人強占田土房屋招集流移住種犯徒以上者一凡無官而詐稱有官并冒稱現任官員姓名並未造有憑劄止於圖騙一人圖行一事犯該徒罪以下者詐假官例一詐冒內官親屬家人恐嚇官司誆騙財物除實犯死罪外者枷號一個月一假充各衙門人役差遣訪事緝捕盜賊占宿公館妄拏平人嚇取財物擾害軍民除實犯死罪外徒罪以上者枷號一個月一棍徒假冒差役名色搜查客船犯該徒罪以上者枷號一個月詐稱內使等官例一親屬犯姦至死罪若強姦未成者親屬相姦例一家長有服親屬強姦奴僕雇工人妻女未成致令羞忿自盡者奴及雇工人姦家長妻例一軍民人等擅入宗室府內教誘為非及賭博誆哄財物者一旗人販賣紙牌骰子為從者賭博例一淨身人曽經發回私自來京圖謀進用者閹割火者例一謀財放火延燒未搶掠財物又未傷人之為從商謀下手燃火者枷號兩個月挾讐放火延燒其未傷人及傷而不死者為從之人當被救熄尚未延燒之為首者枷號兩個月放火故燒人房屋例一罪人事發在逃被獲時有拒捕者本罪已至滿流而拒毆在折傷以下者罪人拒捕例一流罪人犯越獄脫逃原犯流三千里者獄囚脫監及反獄在逃例一附近充軍初次脫逃者枷號一個月徒流人逃例一內外程遞人犯其押解人役逼致死傷及受財故縱并聽憑買求殺害除實犯死罪外徒罪以上屬軍衛者陵虐罪囚例工例一故決盜決山東南旺等湖及徐邳濱河一帶隄岸并阻絶泉源有干漕河禁例者其閘官人等用草捲擱閘板盜泄水利串同取財犯徒以上者一河南等處盜決及故決河防毁害人家漂失財物淹沒田禾犯徒以上者一盜決河南山東等處臨河大堤為首者盜決河防例邊逺充軍吏律官員乞養子詐冒承襲者他人教令者當該官司知而聽行者官員襲廕律户律詐稱軍人不當軍民差役者人户以籍為定律寺觀庵院不許私自創建增置違者私創庵院及私度僧道律兵律不係宿衛應直合帶兵仗之人但持寸刃入紫禁城門內者門官宿衛官軍故縱者官殿門擅入律從車駕行而逃者親管頭目故縱者從駕稽違律內監私將兵器進入紫禁城門內者門官及守衛官失於摉檢者關防內使出入律皇城門應閉而誤不下鎖者門禁鎖鑰律將帥擅調軍馬及所屬擅發與者或賊及反叛暴兵卒至若不即調遣會合或不即申報上司及鄰近官軍不即發兵䇿應者上司及大臣將文書調遣將士提撥軍馬非奉聖旨不得擅離信地若軍官有改除别職或犯罪取發如無奏奉聖旨亦不許擅動違者擅調官軍律邊將守備不設被賊侵入境內虜掠人民者主將不固守律軍人私出外境虜掠者虜掠傷人為從者將領知情故縱者縱軍虜掠律守禦官致有所部軍人反叛者不操練軍士律牧民官激變良民因而聚衆反叛城池未陷者激變良民律軍人關給軍器私賣者私賣軍器律私使軍人出境因而致死或被賊拘執者本營專管官吏容隱不舉及虛作逃亡報官者縱放軍人歇役律官軍聽從公侯役使及不出征時輒於公侯門首伺立者公侯私役官軍律京外守禦軍人在逃再犯者各營軍人轉投别營當軍再犯者從征守禦官軍逃律刑律內外武官接受公侯伯所與金銀緞匹等物者私受公侯財物律名例例一強盜自首雖曽傷人隨即平復者犯罪自首例吏例一世職異姓買襲者官員櫳廕例户例一沿邊沿海軍民人等躲避差役逃入土夷洞寨海島潛住者逃避差役例一軍民人等將爭競不明并賣過及民間起科僧道將寺觀各田地子孫將公共祖墳山地朦朧投獻王府及內外官豪勢要之家私揑文契典賣者投獻之人直𨽻各省空間地上聽民儘力耕種照年限起科若有占奪投獻者一盛京家奴莊頭人等私自盜賣伊主田産至五十畝者一子孫盜賣祖遺祀産至五十畝者知情謀買者盜賣田宅例一運并旗丁挂欠糧米至五分不完者收糧違限例一運糧官丁謊報漂沒并故將船放失漂流及雖係漂流損失不多乘機侵盜不及六百石者轉解官物例兵例一賊擁大衆入寇官軍卒遇交鋒傷虜數十人以上或賊衆入境虜殺軍民數十人以上或賊突入境內虜掠頭畜衣糧數多不曽殺虜軍民者交鋒入境損傷虜殺四五人搶去頭畜衣糧不多者一府州縣與武職官同城若遇邊警及盜賊攻圍不行固守被賊攻陷城池劫殺焚燒之府州縣掌印并捕盜官主將不固守例一交結外國及私通士苗引惹邊釁並潛住苗寨教誘為亂除實犯死罪外者盤詰細例姦一姦商販賣軍器與土司番蠻者該管官知情故縱者一海防武職聽受外番金銀貨物值銀百兩以上許令船貨私入串通交易貽害地方及引惹番賊海寇戕殺居民除實犯死罪外者私出外境及違禁下海例刑例一內府監守盜銀三十兩錢帛等物值銀三十兩以上常人盜銀六十兩錢帛等物值銀六十兩以上者內員同盜內府財物例一子孫將祖父墳塋樹木私自砍賣十株以上之民人看墳人等及奴僕盜賣者盜園陵樹木例一漕運糧米監守盜六十石入已者監守自盜倉庫錢糧例一漕運糧米常人盜一百二十石入已者常人盜倉庫錢糧例一捕役人等奉差緝賊本係良民揑稱蹤迹可疑素行不軌妄行拏獲者雖犯竊有案已改惡為善仍復妄拏者所獲之人不論平人竊盜拷打嚇詐逼勒認盜者因夥盜未獲將犯有竊案之人教供誣扳濫拏充數者強盜例一搶奪下手傷人為從及傷非金刃又傷輕平復之首犯白晝搶奪例一竊盜臨時拒捕傷非金刃又傷輕平復之首犯一竊盜三犯計贓三十兩以下至十兩以上者竊盜例一將自己及他人騎操官馬盜賣至五匹以上者盜馬牛畜産例一盜掘金銀等礦砂在山捉獲持杖拒捕者盜田野穀麥例一誣指良民為盜及寄買賊贓拷打嚇詐或以起贓為由搜撿搶奪淫辱婦女除實犯死罪外其餘不分首從一附近番苗地方該管官員縱差騷擾激動番蠻者恐嚇取財例一發掘貝勤貝子公等墳塜未至棺為從者發掘歷代帝王陵寢先賢名臣及前代藩王墳塜未至棺為從者一盜未殯未埋尸柩及發年久穿陷之塜開棺見尸一次者為首之犯為從二次者發塜例一因事威逼致死一家三命以上者威逼人致死例一凶徒因事忿爭聚衆執持凶器傷人及圍繞房屋搶撿家財棄毁器物姦淫婦女除實犯死罪外徒罪以上者不分首從鬭毆例一卑幼毆傷緦麻尊長餘限內因本傷身死仍擬死罪奏請定奪保辜限期例一擅入午門長安門內呌訴寃枉勘問涉虛者一跪午門長安門等門及打長安門內石獅鳴寃者一揑開大欵欲思報復并將已經法司督撫衙門斷明事件意圖翻異聚衆擊鼓為首者並教令主使之人越訴例一苗蠻黎獞等僻處外地之人并改土歸流地方該管官員差遣兵役騷擾逼勒科派供應等弊因而激動番蠻者在官求索借貸人財物例一描摸印信行使誆騙財物犯該徒罪以上者偽造印信時憲書等例一苗猺狑獞所居地方有外來匪徒教誘犯法所犯之人罪應徒罪以上者教誘之人詐教誘人犯法例一旗人將自己銀錢開場誘賭經旬纍月聚集無賴放頭抽頭之容留房主初犯者一旗人造賣紙牌骰子為從者販賣為首者一民人造賣紙牌骰子為首者一私造賭具自首免罪後又復造賣者一在京轎夫有借名依附潛匿别處開場誘賭經旬纍月之為首開場及放賭抽頭者賭博例一私自淨身并下手者全家閹割火者例一調發近邊充軍二次脫逃者枷號兩個月本犯近邊充軍脫逃者徒流人逃例一捕役密拿贓賊窩賭窩娼等類借端騷擾越境誣拿平民者一隔省隔屬擅自拘拿尋常對質人犯之捕役一苗蠻地方捕役搜捕案犯牽纍良民者盜賊捕限例極邊充軍兵例一廣東省盜賊投撫分發入伍壯丁原犯軍流以上初犯脫逃者原犯徒杖以下脫逃者再犯從征守禦官軍逃例一各處有司起解軍犯在家遷延違限一年之上正犯原係邊衛者公事應行稽程例刑例一因事聚衆將本管官及公差并一應監臨官毆打綁縛屬軍衛者若止是毆打為首者毆制使及本管長官例一免死減軍人犯初次脫逃審無行凶為匪者枷號兩個月徒流人逃例煙瘴充軍名例例一民人犯該發遣案內行劫數家止首一家者竊盜臨時拒捕殺人為從者並别項遣犯一直𨽻江南浙江江西湖廣福建山東山西河南陜西四川人犯應發黑龍江等處者雲貴兩廣四省人犯應發黑龍江等處者均於隔逺煙瘴省分互相遞發一漢人犯該發遣者如係舉貢生監及曽為職官之人徒流遷徙地方例吏例一罷間官吏在京潛住有擅出入禁門交結者交結近侍官員例戶例一近邊軍民將應禁林木砍伐販賣者盜賣田宅例一將進倉漕糧攔路戳袋挖越倉牆進倉偷米之盜係民人罪不至死者倉庫不覺被盜例一興販私茶賣與外國人及知情之歇家牙保私茶例兵例一因爭鬭將鳥鎗私放傷人者民人一民間因爭鬬而點放竹銃傷人者私藏應禁軍器例一各邊將官并管軍頭目私役及私出境外釣豹捕鹿砍木掘鼠等項并把守之人知情故縱該管里老兵目軍吏扶同隱蔽除實犯死罪外屬軍衛者一在番回籍之人查有揑混頂冒顯非善良者一各邊兵役出境巡察或探聽賊情若與賊人私擅交易貨物除實犯死罪外者私出外境及違禁下海例一宰殺堪用馬三十匹以上係民人宰殺馬牛例刑例一偷刨人參人至百名以上參至五百兩以上為從者刨參人犯免死減等者一旗民身充財主雇人刨參不論參數多寡及積年在外逗遛已過三冬者盜田野榖麥例一誆騙聽選官吏及舉監生員人等財物者枷號三箇月央凂營幹致被誆騙者一學臣考試有積慣隨棚代筆之鎗手審實枷號三箇月其雇倩包攬者詐欺官私取財例一考試生童如有積慣棍徒揑稱給與字眼記認誆騙財物不論有無立約封銀及口許虛贓者枷號三個月一代倩鎗手如已頂名入場不分有無立約及口許虛贓者枷號三個月雇倩之生童一偷刨墳墓為從之犯二次者發塜例一投託勢要綁縳平民私家拷打脅騙財物者枷號一箇月勢要知情者威力制縳人例一各部院書辦指稱部費招搖撞騙干犯國憲非尋常犯贓可比知情朋分銀兩之人官吏受財例一偽造關防印信誆騙財物數多為首雕刻者偽造印信時憲書等例一經紀鋪戶人等攙和私錢行使者一經紀鋪戶人等收買剪邊錢攙和貨賣數至十千以上者一用銅鐵錫鉛藥煮偽造假銀騙人行使為首者係民枷號兩箇月杖一百私鑄銅錢例一惡徒夥衆搶去良人子弟強行雞姦者之餘犯犯姦例一藉充人牙將領賣婦人逼勒賣姦圖利者枷號三箇月杖一百買良為娼例極邊煙瘴充軍名例例一窩留強盜三人以上者一竊盜問擬軍流有在配在逃復犯行竊者徒流人又犯罪例吏例一土官襲替其通事人等及諸凡色目人等撥置土官親族不該承襲之人爭襲劫奪讐殺者官員襲廕例兵例一閩省不法棍徒在沿海地方引誘偷渡之人包攬過臺中途謀害未死者同謀人私出外境及違禁下海例刑例一閩省民人有結會樹黨陰作記認魚肉鄉民凌虐暴寡為首者各衙門兵丁胥役入夥者謀叛例一竊盜倉庫錢糧但經得財之首犯計贓一百兩以下者常人盜倉庫錢糧例一川省嘓匪在野攔搶止二三人犯該徒罪以上者白晝搶奪例一三次犯竊計贓五十兩以下至三十兩者一積匪猾賊為害地方者一捕役勾通竊賊坐地分贓豢賊一二名至五名者一回民犯竊結夥三人以上及執持繩鞭器械者一偷竊衙署服物者竊盜例一盜未殯尸柩及發年久穿陷之塜開棺見尸二次者為從三次者發塜例一窩留積匪之家造意同行分贓代賣者窩藏回民行竊犯至遣戌者盜賊窩主例一積慣訟棍串通吏胥播弄鄉愚恐嚇詐財者教唆詞訟例一私鑄銅錢不及十千鑄造未成畏罪中止者私鑄銅錢例一旗人將自己銀錢開場誘賭經旬纍月聚集無賴放頭抽頭初犯者容留賭博之房主再犯者一旗人造賣紙牌骰子為首者一無賴匪徒串黨駕船設局攬載客商勾誘賭博折沒貨物掯留行李審係三次以上及再犯者先加枷號一個月船戶知情分贓再犯賭博例一雲貴兩廣煙瘴少輕人犯在配脫逃者枷號一個月一免死減軍人犯二次脫逃審無行凶為匪者枷號三個月一調發邊逺充軍三次脫逃者枷號三個月本犯邊逺充軍脫逃者徒流人逃例一搶竊擬絞緩決一次者有司決囚等第例大清律例卷四十五
