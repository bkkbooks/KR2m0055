body:
  text: 刑部等衙門尚書臣圖納等謹題為律例須歸一貫舊刻未為全書謹陳應刪應補之事宜仰乞重加考定以垂法守事該臣等㑹議得據廣西道試監察御史盛符升條奏疏稱民生之大命繫於刑獄歷朝之大法載在律書皇上誠恐正律之外條例過嚴特諭刑部㑹同九卿詹事科道詳加酌議刊為見行則例查職制等目悉依舊律編次則凡屬新例皆可分入各條併載正律之內至若大清律一書所載諸事有仍襲前代之舊文而於本朝之法製絶不相䝉者如郡王將軍中尉親自赴京者治罪等項其類尚多明載律中實非遵行正法所當刪定改正以成善本伏乞將律例之分别者合之新舊之不符者通之輕重之可議者酌之務期盡善然後刊刻全書勒成定本等語先經刑部議覆律文乃係遞沿成書例乃因時酌定凡見行則例或遇事而定或遵㫖而定若將此等陸續定例事件附入律內則律文難以告成其律內所有郡王將軍中尉親自赴京治罪等項雖非遵行正法若將此等條件刪去恐以後比照定擬者無憑查考將御史盛符升條奏之處俱毋庸議等因具題奉㫖九卿詹事科道㑹議具奏欽此查康熙九年將律文滿漢文義復行校正二十七年又將見行則例㑹同九卿詹事科道詳加酌定具題刊布但律文條例乃將歷代所行之條有托拾彚輯者見行則例係因時著定者若使重復繁多倘詳查不周則情罪雖一而輕重或異又往代所擬罪名有與今不相符合者其不用之條如不盡行刪除則律文條例反致繁冗舛錯參差均未可定應如臺臣盛符升所奏將見行則例載入大清律條例內其律例內有滿漢文義互相參差或律文內已有各罪本律而定例重復浮贅或官員衙役名色及所擬罪條於今不便引用等項及應刪之條均為畫一各歸各款刪除所有關係纂修事宜應聽該部另行具題等因於康熙二十八年八月二十八日題九月十九日奉㫖依議
