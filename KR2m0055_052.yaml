front:
  text: 欽定四庫全書大清律例巻十八
  hash: sha256:73923f7241b5168660e72ce1b2792399a7ccbb56eb79169ee4cfa253c7ef506c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0055_WYG_052-1a, image: WYG0672/WYG0672-0642c.png}
body:
  text: 兵律宮衛太廟門擅入凡無故擅入太廟門及山陵兆域門者杖一百太社門杖九十但至門未過門限者各減一等守衛官故縱者各與犯人同罪失覺察者減三等宮殿門擅入凡擅入紫禁城午門東華西華神武門及禁苑者各杖一百擅入宫殿門杖六十徒一年擅入御膳所及御在所者絞監候未過門限者各減一等稱御者太皇太后皇太后皇后並同若無門籍冐他人名籍而入者兼已入未過罪亦如之其應入宫殿宿直之人未著門籍而入或當下直而輒入及宿次未到雖應入班次未到越次而輒宿者各笞四十若不係宿衛應直合帶兵仗之人但持寸刃入宮殿門内者絞監候不言未入門限者以須入門内乃坐入紫禁城門内者杖一百發邊遠充軍門官及宿衛官軍故縱者各與犯人同罪至死減一等失覺察者官減三等罪止杖一百軍又減一等並罪坐直日者通指官與軍言餘條准此宿衛守衛人私自代替凡宮禁宿衛及紫禁城皇城門守衛人應直不直者笞四十以應宿衛守衛人下直之人私自代替及替之人各杖六十以不係宿衛守衛人冒名私自代替及替之人各杖一百官員各加一等若在直而逃者罪亦如之應直不直之罪官員加等京城門減一等各處城門又減一等親管頭目知而故縱者各與犯人同罪失覺察者減三等有故而赴所管告知者不坐從駕稽違凡巡幸應扈從車駕之人違原定之期不到及從而先囘還者一日笞四十每三日加一等罪止杖一百職官有犯各加一等罪止杖六十徒一年若從車駕行而逃者杖一百發邊遠充軍職官絞監候親管頭目故縱不到先囘在逃者各與犯人同罪至死減一等失覺察者減三等罪止杖一百條例一凡八旗正身隨車駕行而脫逃者發黒龍江等處當差官馬盤費照數追繳直行御道凡午門外御道至御橋除侍衛官軍導從車駕出入許於東西兩旁行走外其餘文武百官軍民人等非侍衛導從無故於上直行及輒度御橋者杖八十若於宮殿中直行御道者杖一百守衛官故縱者各與犯人同罪失覺察者減三等若於御道上横過係一時經行者不在禁限在外衙門龍亭儀仗已設而直行者亦准此律科斷條例一凡至下馬牌不下而竟過者笞五十看守人役失於防範者笞四十内府工作人匠替役凡諸色當班工匠辨驗貨物各行人役差撥赴内府及内庫工作若不親身闗牌入内應役雇人冐已名闗牌私自代替及替之人各杖一百雇工錢入官宮殿造作罷不出凡宮殿内造作所管官司具工匠姓名報所入之處門官及守衛官就於所入門首逐一㸃姓名視形貌放入工作至申時分仍須相視形貌照數㸃出其不出者絞監候監工及提調内監門官守衛官軍㸃視如原入名數短少就便摉捉隨即奏聞知而不舉者與犯人同罪至死減一等失覺察者減三等罪止杖一百輒出入宮殿門凡應出宮殿如差遣給假等項而門籍已除輒留不出及應入直之人被告劾已有公文禁止籍雖未除輒入宮殿者各杖一百晝禁若宿衛人已被奏劾者本管官司先收其兵仗違者罪亦如之若於宮殿門雖有籍應直至夜皆不得出入若入者杖一百出者杖八十無籍夜入者加二等若夜持仗入殿門者絞監候入宮門亦坐此夜禁比晝加謹闗防内使出入凡内監並奉御内使但遇出外各守門官須要收留本人在身闗防牌面於門簿上印記姓名及牌面字號明白附寫前去某處幹辦是何事務其門官與守衛官軍摉檢沿身别無夾帶官私器物方許放出回還一體摉檢給牌入内以憑逐月稽考出外次數但有摉出應干雜藥就令帶藥之人自喫若有出入不服摉檢者杖一百發附近充軍若非奉㫖私將兵器帶進入紫禁城門内者杖一百發邊遠充軍入宮殿門内者絞監候其直日守門官及守衛官失於摉檢者與犯人同罪至死減一等内使例不擬充軍惟此須依本律向宮殿射箭凡向太廟及宮殿射箭放彈投磚石者絞監候向太社杖一百流三千里須箭石可及乃坐之若遠不能及者勿論但傷人者斬監候則殺人者可知若箭石不及致傷外人者不用此律宿衛人兵仗凡宿衛人兵仗不離身違者笞四十輒暫離應直職掌處所笞五十别處宿經宿之離杖六十官員各加一等親管頭目知而不舉者與犯人同罪失覺察者減三等禁經斷人充宿衛凡在京城犯罪被極刑之家同居人口不論親屬所司隨即遷發别郡住坐其本犯異居親屬人等并一應有犯笞杖曾經同决斷之人並不得入充近侍及宮禁宿衛守把皇城京城門禁若隱匿前項情由朦朧充當者斬監候其當該官司不為用心詳審或聽人囑託及受財容令充當者罪同斬監侯並究囑託人若極刑親屬及經斷人奉有特㫖選充曾經具由覆奏明立文案者所選之人及官司不在此限衝突儀仗凡車駕行幸之處其前列者為儀仗儀仗之内即為禁地凡車駕行處除近侍及宿衛䕶駕官軍外其餘軍民並須迴避衝入儀仗内者絞係雜犯准徒五年若在郊野之外一時不能迴避者聽俯伏道旁以待駕過其隨行文武百官非奉宣唤無故輒入儀仗内者杖一百典仗䕶衛官軍故縱者與犯人同罪不覺者減三等若有申訴寃抑者止許於仗外俯伏以聽若衝入儀仗内而所訴事不實者絞係雜犯准徒五年得實者免罪軍民之家縱放牲畜若守衛不備因而衝突儀仗者守衛人杖八十衝入紫禁城門内者守衛人杖一百其縱畜之家并以不應重律論罪條例一聖駕出郊衝突儀仗妄行奏訴者追究主使敎唆揑寫本狀之人俱問罪各杖一百發近邊充軍所奏情詞不分虚實立案不行一聖駕臨幸地方雖未陳設鹵簿如有民人具呈妄行控訴者照衝突儀仗例杖一百發近邊充軍行宮營門凡行宮外營門次營門與紫禁城門同若有擅入者杖一百内營牙帳門與宮殿門同擅入者杖六十徒一年越城凡越皇城者絞監候京城者杖一百流三千里越各府州縣鎮城者杖一百官府公廨墻垣者杖八十越而未過者各減一等若有所規避者各從其重者論條例一各衙門親戚書吏人等游船演戲夜半方歸擅呌禁門者照越府州縣城律杖一百門禁鎖鑰凡各處城門應閉而誤不下鎖者杖八十非時擅開閉者杖一百京城門各加一等其有公務急速非時開閉者不在此限若皇城門應閉而誤不下鎖者杖一百發邊遠充軍非時擅開閉者絞監候其有㫖開閉者勿論大清律例卷十八
