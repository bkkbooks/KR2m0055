  text: 欽定四庫全書大清律例卷二十二
  hash: sha256:e4eba4b6f7b5dc6df80d78d908170e2b43de5a608292f473f010b8f1541f35e2
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0055_WYG_060-1a, image: WYG0672/WYG0672-0694c.png}
body:
  text: 兵律郵驛遞送公文凡鋪兵遞送公文晝夜須行三百里稽留三刻笞二十每三刻加一等罪止笞五十其公文到鋪不問角數多少鋪司須要隨即附籍遣兵遞送不許等待後來文書違者鋪司笞二十其鋪兵遞送公文若磨擦及破壞封皮不動原封者一角笞二十每三角加一等罪止杖六十若損壞公文不動原封者一角笞四十每二角加一等罪止杖八十若沉匿公文及拆動原封者一角杖六十每一角加一等罪止杖一百若事干軍情機密文書與漏泄不同不拘角數即杖一百有所規避而沉拆者各從重論規避罪重從規避沉拆罪重問沉拆其鋪司不告舉者與犯人同罪若已告舉而所在官司不即受理施行者各減犯人罪二等其各縣鋪長專一於槩管鋪分往來巡視提調官吏每月一次親臨各鋪刷勘若有姦弊失於檢舉者通計公文稽留及磨擦破壞封皮不動原封十件以上鋪長笞四十提調吏典笞三十官笞二十若損壞及沉匿公文若拆動原封者鋪長與鋪兵同罪提調吏典減一等官又減一等府州提調官吏失於檢舉者各遞減一等條例一無印信文字不許入遞一各鋪司兵若有無籍之徒不容正身應當用强包攬多取工錢致將公文稽遲沉匿等項問罪不分軍民俱發附近充軍其提調官該吏鋪長各治以罪一各省驛站遞送公文令管站官各立印信號簿上站號簿用下站官印於每月底彼此移明查考倘有沉匿稽延等情即行詳報該管上司據實題參不得故為容隱其沉匿平常公文馬夫照鋪兵律治罪提調官吏依律遞減若事干軍情機密文書而沉匿者不計角數馬夫杖六十徒一年提調吏典杖一百革役司驛官革職如有所規避者從重論一馬上飛遞公文如有遺失除將馬夫照例治罪外該地方官一面詳報該管上司一面徑報原發衙門查核補給邀取實封公文凡在外大小各衙門官但有入遞進呈實封公文至御前下司被上司非理陵虐亦許據實封奏而上司官令人於中途急遞鋪邀截取回者不拘遠近從本鋪鋪司鋪兵赴所在官司告舉隨即申呈上司轉逹該部奏聞追究邀截之情得實斬監侯邀截進表文比此其鋪司鋪兵容隱不告舉者各杖一百若已告舉而所在官司不即受理施行者罪亦如之若邀取實封至六部察院公文者各減二等下司畏上司劾奏而邀取者比此乘官畜産車船附私物凡因公差應乘官馬牛駝騾驢者各衙門自撥官馬不得馳驛而行者除隨身衣仗外私駝物不得過十斤違者五斤笞一十每十斤加一等罪止杖六十不在乘驛馬之條其乘船車者私載物不得過三十斤違者十斤笞一十每二十斤加一等罪止杖七十家人隨從者不坐若受寄私載他人物者寄物之人同罪其物並入官當該官司知而容縱者與同罪不知者不坐若應合遞運家小如陳亡病故官軍及軍民官在任以理病故者雖有私帶物件不在此限條例一漕船旗丁每船准帶土宜一百石頭舵二人每人准帶三石水手無論人數准其共帶二十石其回空船隻舵水人等准帶梨棗六十石沿途過淺盤剝責令自備腳價例外多帶者照數入官監兌糧儲等官水次先行摉檢督押糧道及府佐官員沿途稽查經過儀徵淮安天津等處聽趲運鎮道官盤詰經盤官員徇情賣法一併參治多帶問違制徇情賣法問聽從囑託事已施行受財問枉法出錢之人問行求一漕運船隻除運軍自帶土宜貨物外若附搭客商勢要人等酒麵糯米花草竹木板片器皿貨物者將本船運軍并附載人員依律治罪貨物入官其押運官有犯交部議處附載人員依違制運軍與運官有贓問枉法無贓止問違制一沿河一帶升除外任及內外公差官員若有乘坐在官船隻一事興販私鹽二事起撥人夫三事并帶去無籍之徒辱罵鎖綁官吏勒要銀兩者督撫巡河巡鹽管河管閘等官即便拏問干礙應奏官員奏請提問其軍衛有司驛遞衙門若有懼勢應付者參究治罪三事不備不引此例止一事依本律論鋪舍損壞凡急遞鋪舍損壞不為修理什物不完鋪兵數少不為補置及令老弱之人當役者鋪長笞五十有司提調官吏各笞四十條例一急遞鋪每一十五里設置一所每鋪設鋪兵四名鋪司一名於附近有丁力糧近一石之上二石之下者㸃充須要少壯正身與免雜泛差役每鋪置備各項什物十二時輪日晷牌子一箇紅綽屑一座并牌額鋪册二本上司行下一本各府申上一本遇夜常明燈燭鋪兵每名合備什物夾板一副鈴􅀈一副纓鎗一副油絹三尺軟絹包袱一條箬帽簑衣各一件紅悶棍一條回册一本私役鋪兵凡各衙門一應公差人員於經過所在不許差使鋪兵挑送官物及私己行李違者笞四十每名計一日追雇工銀八分五釐五毫入官驛使稽程凡出使馳驛違限常事一日笞二十每三日加一等罪止杖六十軍情重事加三等因而失誤軍機者斬監候若各驛官故將好馬藏匿及推故不即應付以致違限者對問明白即以前應得笞杖斬罪坐驛官其遇水漲路道阻礙經行者不坐若驛使承受官司文書誤不依原行題寫所在公幹去處錯去他所而違限者減二等四日笞一十每三日加一等罪止笞四十事干軍務者不減若由原行公文題寫錯者罪坐題寫之人驛使不坐條例一凡官員因軍務差遣及自軍前赴京齎奏軍情倘經過地方不照依勘合火牌糧單隨即供應驛馬廩給不為豫備公館以致遲誤者按遲誤事情巨細將本城長官及所派催辦驛馬糧餉官俱題參交部察議擬罪若長官他出不在本城而有遲誤者其委託怠玩亦不得免罪仍交部察議一各處水馬驛遞運所夫役巡檢司弓兵若有用强包攬不容正身著役多取工錢害人攪擾衙門者問罪不分軍民俱發附近地方充軍其官吏通同縱容者各治以違制罪若不曾用强多取工錢者不在此例多取工錢問求索計贓依不枉法論一凡齎奏不騎驛馬違限十日以內者免罪十日以外係常事笞三十密事笞四十多乘驛馬凡出使人員應乘驛船驛馬數外多乘一船一馬者杖八十每一船一馬加一等若應乘驢而乘馬及應乘中等下等馬而勒要上等馬者杖七十因而毆傷驛官者各加一等至折齒以上依鬬毆論若驛官容情應付者各減犯人罪一等其應乘上等馬而驛官却與中等下等馬者罪坐驛官本驛如無上等馬者勿論若出使人員枉道馳驛及經驛不换船馬者杖六十因而走死驛馬者加一等追償馬匹還官其事非警急不曽枉道而走死驛馬者償而不坐若軍情警急及前驛無船馬倒换者不坐不償亦究不倒换緣由條例一勘合之外如敢多給一夫一馬許前途州縣據實揭報都察院糾參倘容情不揭别經揭報一併治罪其差使至境硬派民間牲口者從重治罪一凡指稱勳戚文武大臣近侍官員姻黨族屬家人名目虛張聲勢擾害經過軍衛有司驛遞衙門占宿公館索取人夫馬匹車輛財物等項及姦徒詐稱勢要衙門乘坐黑樓等船隻懸掛牌面希圖免稅誆騙違法者徒罪以上俱於所犯地方枷號一個月發近邊充軍杖罪以下枷號一箇月發落索取財物問求索希圖免稅問匿稅誆騙違法問詐稱見任官家人於所部內得財一凡馳驛官員縱容差官跟役毆罵驛官驛夫或並無急務走死驛馬並額馬既足故行越站以及索詐財物者該地方官驛官一面申詳上司一面具報該部察究得實官員革職差官人等拏送刑部從重治罪若無勘合火牌謊稱公差支取夫馬船隻及索詐財物者亦俱拏送刑部從重治罪其不照依所定程途枉道擾驛者係官交該部議處差役杖一百一水驛一應差船如有派撥埠頭扣尅官價入己者計贓照侵盜錢糧例問擬各衙門鄉親來往並書吏人等濫捉民船輒用旗鎗燈籠假借本管官官銜者照無官而詐稱有官律杖一百徒三年多支廪給凡出使人員多支領廩給者計贓以不枉法論分有祿無祿當該官吏與者減一等强取者以枉法論官吏不坐多支口糧比此條例一各處地方如遇外國人入貢經過驛遞即便察照勘合應付不許容令買賣連日支應違者按律治罪若街市鋪行人等私與外國人交通買賣貨物入官犯人問罪枷號一箇月發落貨物若不係違禁引違制若係禁貨引為外國收買違禁貨物例發近邊充軍文書應給驛而不給凡朝廷調遣軍馬及報警急軍務至邊將若邊將及各衙門飛報軍情詣朝廷實封文書故不遣使給驛而入遞者杖一百因而失誤軍機者斬監候若進賀表箋及賑救饑荒申報災異取索軍需之類重事故不遣使給驛者杖八十失誤軍機仍從重論若常事不應給驛而故給驛者笞四十公事應行稽程凡公事有應起解官物囚徒畜産差人管送而輒稽留及一切公事有期限而違者一日笞二十每三日加一等罪止笞五十若起解軍需隨征供給而管送兼稽留違限者各加二等罪止杖一百以致臨敵缺乏失誤軍機者斬監候若承差人誤不依題寫去處錯去他所以致違限者減本罪二等事干軍務者不減或笞或杖或斬照前科罪若由公文題寫錯而違限者罪坐題寫之人承差人不坐條例一各處有司起解在逃軍犯及充軍人犯量地遠近定立程限責令管送若長解縱容在家遷延不即起程違限一年之上者解人發附近正犯原係附近發近邊原係近邊發極邊地方各充軍一夫役工匠人等遇有緊要差使傳集公所立待應用如不遵官長約束為匪不法逞刁挾制因而率衆揚散以致誤差審明為首者擬斬監候為從均枷號一箇月杖一百倘係偶爾違禁干犯賭博鬬毆等事並未挾制官長揚散誤差者仍按本律治罪占宿驛舍上房凡公差人員出外幹辦公事占宿驛舍正㕔上房者笞五十正㕔上房待品官上客乘驛馬齎私物凡出使人員應乘驛馬除隨身衣服器仗外齎帶私物者十斤杖六十每十斤加一等罪止杖一百驛驢減一等所帶私物入官致死驛馬者依本律條例一奉差員役至頭站時該驛員即將應背之包稱准斤數開明印單遞送前途其每夜住宿之站該驛員詳加查估如果照例裝載即於印單填寫某站驗明並無重包字樣日間所過驛站驗單應付如前站徇隱重包經後站察出詳報該差員役照律治罪徇隱驛員一併議處私役民夫擡轎凡各衙門官吏及出使人員役使人民擡轎者杖六十有司應付者減一等若豪富庶民之家不給雇錢以勢役使佃客擡轎者罪亦如之每名計一日追給雇工銀八分五釐五毫其民間出錢雇工者不在此限條例一凡內府官員執事之人及各部院衙門官員人等並無印信慿據詐欺索取民夫等項該地方官即行拘拏一面申報該督撫具題一面申報該部審實係官革職係領催執事人等拏送刑部從重治罪拏首之地方官交部議叙一凡兵部勘合欽差大臣及督撫入境學差試差知府下縣盤查及他縣奉督撫差委盤查者准其動用民夫其餘槩不准用倘有違例妄索者著該管官即行揭報督撫題參若該管官違例濫應發覺之日照例治罪病故官家屬還鄉凡軍民官在任以理病故家屬無力不能還鄉者所在官司差人管領應付車船夫馬腳力隨程驗所有家口官給行糧遞送還鄉違而不送者杖六十條例一縣丞以下等官參革離任或告病身故實係窮苦不能回籍者該督撫於存公項內酌給還鄉路費每年造册報銷承差轉雇寄人凡承差起解官物囚徒畜産不親管送而雇人寄人代領送者杖六十因而損失官物畜産及失囚者依本律各從重論損失重問損失輕則仍科雇寄受雇受寄人各減承差人一等其同差人自相替者放者各笞四十取財者承替取放者貼解之物計贓以不枉法論若事有損失者亦依損失官物及失囚律追斷不在減等之限若侵欺故縱各依本律替者有犯管送人不知情不坐條例一起解人犯每名選差的役二名管押兵丁二名護送若兵役派不足數及雇人代解許兵役互相稟報本管官知㑹原派衙門查究補派若兵役知而不舉將兵役及承派之書吏弓兵俱杖一百革役其經由前途文武各官按批查㸃有缺少及代解等弊即詳報督撫將原派官辨參處其缺少頂替之兵役照承差起解囚徒雇人代送律杖六十革役如前途各官隱匿不報别經發覺題參議處私借驛馬凡驛官將驛馬私自借用或轉借與人及借之者各杖八十驛驢減一等驗計日追雇賃錢入官若計雇賃錢重於私借之罪者各坐贓論加二等大清律例卷二十二
