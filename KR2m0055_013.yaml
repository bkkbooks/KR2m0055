body:
  text: 臣劉統勳等謹奏為奏聞事竊查臣部於乾隆三十一年正月內奏準開館纂修律例因全書自乾隆五年至今二十餘載條例增改不一雖經五次修輯止就現定新例依類編入其從前舊例與新例不合之處俱未增刪改併請定限十四個月告竣陸續繕寫黃册進呈等因奉旨知道了欽此欽遵臣等隨督率提調纂修等官上緊趕辦所有歷年欽奉上諭及議準內外臣工條奏并吏户禮兵工等部議準有與刑名交涉應纂為例者各詳細覆核分類編輯並將全部條例逐一比較其中或新舊不符或詞意重復或文義未甚明晰俱詳加酌核增刪改併以歸畫一今已依限辦就督令供事繕寫黃册緣此次卷帙繁多臣等分為三次陸續進呈今將名例上下兩卷及吏律户律禮律兵律四卷纂修條例先行進呈內除照例纂輯修改以及節刪重復字句間文即於各條下謹按語內分晰陳明毋庸另為聲敘外如於罪名適輕適重臣等參酌律例遇有增改之處即於本條例上黏貼黃籖恭呈御覽伏候欽定統俟命下之日臣館另繕清漢樣册進呈並將前次續纂條例一併歸入全書照例送交武英殿刊刻頒發內外問刑衙門一體遵行此後或奉有諭旨及臣工條奏準行應入例册者於未經刊刻以前仍行添纂合併聲明為此謹奏請旨乾隆三十二年五月初六日奏本日奉旨知道了册留覽欽此
