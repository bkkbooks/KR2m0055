body:
  text: 凡例一律文四百五十七條歴代相因至雍正五年刪改增併定為四百三十六門今仍其舊至條例則世輕世重有隨時酌中之義今自雍正五年刻本所載至雍正五年以後乾隆三十三年五月以前現行則例詳為訂正增刪改併計共一千四百五十六條分門别類悉附律文之後一律内小註釋難明之義解達未足之語氣句斟字酌實足補律所未備今皆照舊詳載間有增損務在理明辭順無取更張其律文之後大字總註雖亦原本箋釋輯註等書但意在敷宣易生支蔓又或義本明顯無事箋疏今皆不載其中有於律義有所發明實可補律之所不逮則竟别立一條著為成例以便引用一律例一書乃聖朝成憲間亦允准羣議無不酌自皇衷從前刊本於條款中間載欽奉上諭今皆編纂成例著之於篇其於例款無涉或止申飭訓誡之文通送上諭館恭修不更登載一雍正五年刻本於每條之上分列原例增例欽定例各名目既以時代為先後勢必不能依類編輯今將原例增例等名目概不登載如錢糧則由倉庫而次及雜項侵那賊盜則由正犯而次及搜贓舉首庶幾條分縷析次序秩然一律目有數例款繁多間有不應隸此門而誤為附入者今皆考訂詳明移入本條之下如飛詭税糧二百石以上與濫設官吏無涉承審承緝諸限期與官文書稽程無涉而皆入之吏律今分載户律田宅刑律捕亡斷獄各條下閱者以此類推則按籍而稽展卷瞭然矣一文武官罰俸降革事隸處分間亦載入律例然多不全不備今吏兵兩部開館編緝各有專書無庸於律例内紛見雜出其有應議罪欵而兼及處分之處並改交部議處或改交部分别議處事以類從義仍貫串叅觀自得一凡乾隆三十三年五月以前之例已經逐條考校奏准頒行其乾隆三十三年五月以後之例依乾隆十一年奏准嗣後有陸續增修之處定限五年一次編輯附律例之後頒行直省從此永著為例一納贖各條並冠名例之首其應否准其納贖開載未能詳悉易至髙下其手今依律例中已經開明各條因類比附並查照讀律佩觽所載不准納贖罪名詳加酌定於各條下註明以免畸輕畸重之失一首卷諸圖皆仍舊刻惟收贖過失殺傷人律云依律收贖而例内又止有收贖過失殺人銀數並無收贖過失傷人若干銀兩之文内外辦理向無憑準查收贖過失殺人絞罪銀十二兩四錢二分即律圖内收贖雜犯絞斬五錢二分五釐之數合成蓋緣前明錢鈔並收故圖内亦照鈔數折算今將收贖傷人銀數亦照收贖殺人銀數按其致傷輕重應得罪名合算折銀另立一圖附諸圖之後以備稽考一頒發之後内外問刑衙門凡有問擬悉令遵照辦理其有從前例款此次修輯所不登入者皆經奏准刪除毋得以曾經通行仍復援引違者論如律
