買者其搶奪人犯之主知情不首者照知情故買治罪一糧船水手夥衆十人以上執持器械搶奪為從者一出哨兵弁如見船覆溺雖搶取貨物傷人未致幣命不計贓為首者白晝搶奪例一竊盜三犯贓銀不及十兩錢不及十千者俱杖一百竊盜例一偷盜官馬三匹以上者窩主及牧馬人役自行盜賣者一盜牛十隻以上者杖一百窩家知情分贓者一民人為從偷竊行圍巡幸地方馬匹五匹以上者及知情故買之民人盜馬牛畜産例一刨參賊犯逗遛已過三冬若並無財主名出資本及受雇偷採或隻身潛往得參者一領票工人内如有偷竊領票商人之參者一打珠人等私藏珠子不行交官者盜田野榖麥例一窩隠川販止知情未經分贓為首者杖一百一畧賣海外番仔之内地民人不分首從杖一百一貴州地方有外來流棍勾通本地棍徒將荒村居住民苖人户和同誘拐往川不論已賣未賣但起行在途為從者一興販婦人子女轉賣與他人為奴婢者畧人畧賣人例一非其子孫又非實有確據之前人古塜因土墩見人埋𦵏輒稱伊逺祖墳墓夥告夥証陷害無辜為首者發塜例一强盜窩主雖不行又不分贓但知情存留二人者一窩線不上盜又未得財但為賊探聴事主消息通線引路者盜賊窩主例一謀殺人已行其人知覺奔逃迫於兇悍當時失跌身死為從者杖一百一傷人未死而已得財不行而分贓者一謀殺人已行其人知覺奔逃雖未受傷因謀殺奔脱死於他所造意者謀殺人例一姦夫因姦謀殺本夫傷而不死者一本夫登時捉姦誤殺旁人脱逃之姦夫殺死姦夫例一共毆下手絞犯於未決之前遇有原謀助毆重傷之人監斃與解審病故者一兩家互毆致死一命其律應擬抵之正兇當時被死者無服親屬毆死其毆死兇手之人鬬毆及故殺人例一因戲而誤殺旁人者戲殺誤殺過失殺傷人例一婦人因姦有孕與姦夫商謀用藥打胎以致墮胎身死之姦夫一鄉村愚民出語狎褻致本婦羞忿自盡者杖一百一姦夫與姦婦因姦敗露商謀同死姦婦當即殞命姦夫業經自戕因人救阻醫治傷痊實有確據者威逼人致死例一沿江濵海有持鎗執棍混行鬬毆為首及鳴鑼聚衆之犯杖一百鬬毆例一鬬毆傷人辜限内不平復延至限外若手足他物湯火傷限外十日之内折跌肢體破骨墮胎限外二十日之内因本傷身死奏請定奪一原毆傷輕不至於死越數日後因傷風身死者毆打之人保辜限期例一僧尼道士因弟子違犯教令毆責至死者毆受業師例一祖父母父母為人所殺本犯擬死後或遇赦免子孫報讐仍復擅殺者父祖被毆例一卑幼毆緦麻尊長於辜限外身死按其所毆傷罪在徒流以下者毆大功以下尊長例一挾讐誣告人謀死人命致屍遭蒸檢為從者一期親以上尊長誣告人謀死人命致蒸檢卑幼身屍者一控告人命有誣告情弊者如有教唆情弊將教唆之人一子孫誤執傷痕將祖父母父母死屍告官蒸檢者誣告例一坊肆刻印訟師秘本如驚天雷相角法家新書刑臺秦鏡一切搆訟之書撰造刻印者教唆詞訟例一子貧不能營生養贍父母因致父母縊死者子孫違犯教令例一官吏因事受財貪婪入已果於一年限内全完之死罪官吏受財例一偽造諸衙門印信及欽給闗防事闗軍機錢糧假官大干法紀造而未成者止圖誆騙財物數多為從者誆騙財物無多之為首雕刻者一盜用督撫提學兵備屯田水利等官欽給闗防未施行為首者盜及棄毁偽造為從者一偽造假印若僅受些微價值代為私雕並無同謀分贓者偽造印信時憲書等例一方造私鑄器具尚未鑄錢起意為首并同夥商謀之人一私鑄之本犯問擬斬絞其同居父兄伯叔與弟知情分利者一將銅鐵錫鉛藥煮偽造假銀騙人行使為從及知情買使者係民枷號兩個月一傾錫錁充假銀貨賣者枷號一個月一私造鉛錢為從及知情買使者一私造鉛錢十千文以上為從及知情行使者一銷毁制錢房主隣佑總甲人等知情不首告並未分贓者私鑄銅錢例一偽造憑劄並將有故官員憑劄賣與他人及買受憑劄冒名赴任之知情説合者詐假官例一窩頓土娼再犯者買良為娼例一捕役受人賄囑將罪人致死從而不加功者罪人拒捕例一民人將自己銀錢開塲誘賭經旬累月聚集無頼放頭抽頭再犯者賭博例一故燒孤村曠野並不毘連民居之空閒房屋及田場積聚之物為首者枷號兩個月謀財放火隨即救熄尚未延燒之為從商謀下手燃火者放火故燒人房屋例一强行雞姦未成者犯姦例一流罪人犯越獄脱逃原犯流二千里者獄囚脱監及反獄在逃例一流罪人犯如有中途在配脱逃原犯流二千五百里者加枷號兩個月徒流人逃例一長解疎脱斬絞重犯限内無獲審無賄縱别情者一押解新疆人犯之解送官兵人役如係疎縱一年限滿無獲為從情輕之犯主守不覺失囚例一官員擅取病呈致死監犯獄官禁卒人等聴從指使未曽下手者一問刑衙門不許於獄内擅用㭱牀違者官革職杖一百一獄卒受罪人讐家賄囑謀死本犯為從不加功者陵虐罪囚例一姦徒挾讐誣告平人官吏知情受囑拷訊致死之官吏故禁故勘平人例大清律例卷四十三
