body:
  text: 雜犯流罪總徒四年二千里刑律監守自盜倉庫錢糧等物至二十兩者監守自盜倉庫錢糧律常人盜倉庫錢糧等物至四十五兩者常人盜倉庫錢糧律二千五百里刑律監守自盜倉庫錢糧等物至二十五兩者監守自盜倉庫錢糧律常人盜倉庫錢糧等物至五十兩者常人盜倉庫錢糧律三千里吏律應議人犯罪已奏不待囘報而輒施行者事應奏不奏律兵律車駕行處軍民衝入儀仗内及衝入儀仗而訴事不實典仗䕶衛官軍故縱者衝突儀仗律在京守禦官軍遞送逃軍妻女出城守門之人知情故縱者遞送逃軍妻女出城律刑律盜京城門鑰者盜城門鑰律監守自盜倉庫錢糧等物至三十兩者監守自盜倉庫錢糧律常人盜倉庫錢糧等物至五十五兩者常人盜倉庫錢糧律年逺塜先穿陷及未殯埋而開棺見屍為從者發塜律户例一那移庫銀五千兩以下者那移出納例實犯流罪二千里吏律官吏與内官及近侍人員互相交結漏泄事情夤縁作弊扶同啟奏者之妻子交結近侍官員律户律犯私鹽若帶有軍器者鹽法律禮律大祀丘壇而毁損者中祀有犯者罪同毁大祀丘壇律刑律謀叛正犯之父母祖孫兄弟謀叛律竊盜及掏摸得財至一百兩者竊盜律於墳墓熏狐狸因燒緦麻以上尊長屍者發塚律奉制命出使所在官吏謀殺及部民謀殺本屬府州縣軍士謀殺本管官吏卒謀殺本部五品以上長官己行未傷為首者謀殺制使及本管長官律謀殺緦麻以上尊長已行為首者奴婢及雇工人謀殺家長之緦麻以上親已行為首者謀殺祖父母父母律殺一家非死罪三人及支解人者之妻子殺一家三人律採生折割人已殺已傷為首者之妻子及同居家口已行而未曾傷人為首者之妻子採生折割人律造畜蠱毒者之妻子及同居家口以蠱毒毒同居人被毒人之父母妻妾子孫知造蠱情者造畜蠱毒殺人律殿内毆人折肋眇兩目及刃傷者宫内忿爭律宗室緦麻親而毆之折肋眇兩目墮胎及刃傷者大功親而毆之傷者宗室覺羅以上親被毆律奉制命出使而官吏毆之及部民歐本屬府州縣軍士毆本管官吏卒毆本部五品以上長官傷者流外官及軍民吏卒毆非本管三品以上官并公使人毆打三品以上有司官折傷者毆制使及本管長官律奴婢毆良人折跌肢體及瞎一目者良賤相毆律奴婢毆家長小功親折肋眇兩目墮胎及刃傷者雇工人毆家長緦麻小功親折跌肢體及瞎一目者奴婢毆家長律妻毆夫折肋眇兩目及刃傷者妻妾毆夫律卑幼毆服盡尊長折跌肢體及瞎一目者同姓親屬相毆律卑幼毆本宗及外姻緦麻兄姊折跌肢體及瞎一目者毆本宗大功兄姊及本宗并外姻小功尊屬折肋眇兩目墮胎及刃傷者毆大功以下尊長律姪毆伯叔父母姑及外孫毆外祖父母傷者期親兄姊故殺弟妹及伯叔姑故殺姪與姪孫外祖父母故殺外孫者毆期親尊長律祖父母父母故殺子孫之婦及乞養異姓子孫者毆祖父母父母律妻妾毆夫之期親伯叔父母姑及夫之外祖父母傷者妻之子毆父妾折跌肢體及瞎一目者妾之子毆父妾折肋眇兩目墮胎及刃傷者妻妾與夫親屬相毆律毆不同居繼父折跌肢體及瞎一目者毆妻前夫之子律誣告人罪徒二年加所誣罪三等者誣告律誣告人罪應遷徒於比流減半准徒二年上加三等者誣告充軍及遷徙律官吏受財有禄人枉法贓至四十五兩者不枉法贓至一百兩者官吏受財律對制及奏事上書非密而妄言有密者對制上書詐不以實律奴及雇工人姦家長之緦麻以上親及緦麻以上親之妻者姦夫姦婦奴及雇工人姦家長妻律失火延燒山陵兆域内林木者失火律户例一聚衆十人以上興賑私鹽其誰帶有軍器不曾拒捕為從者十人以下雖有軍器不曾拒捕為首者一竈丁及賣私之人將鹽私賣與糧船者一囘空糧船雖不闖閘闖闗但夾帶私鹽者一巡鹽兵捕自行夾帶私販及通同他人運販者鹽法例兵例一提塘與各衙門書辦彼此勾通揑造訛言刋刻者漏泄軍情大事例一民人無票出口外者杖一百私越冐度闗津例一商漁船帶違禁等物接濟外洋汛口官賣放者一附近苖疆五百里内民人煎穵窩囤興販硝黄五十斤以上者一洋船囘時有照外多載或頂充偷渡及潛匿不囘等弊承查出結及汛口盤查各員有贓者私出外境及違禁下海例刑例一監守盜倉庫錢糧入已自一百兩以上至三百三十兩者監守自盜倉庫錢糧例一竊匪穿穴壁封盜倉庫錢糧八十兩以上至八十五兩者常人盜倉庫錢糧例一僧尼謀殺受業師已行而未傷者毆受業師例一毆期親弟妹致死者毆期親尊長例一漢人奴僕不遵約束傲慢頑梗酗酒生事者奴僕毆家長例一民人造賣紙牌骰子為從及販賣為首者賭博例一承審官吏凡遇一切命盜案件有將笞杖人犯拷訊至斃二命者故禁故勘平人例二千五百里刑律竊盜及掏摸得財至一百一十兩者竊盜律宫内毆人折跌肢體及瞎一目者宫内忿爭律宗室覺羅親而毆之折跌肢體及瞎一目者小功親而毆之折肋眇兩目墮胎及刃傷者期親而毆之傷者宗室覺羅以上親被毆律流外官及軍民吏卒毆九品以上官并公使人毆打九品以上有司官折跌肢體及瞎一目者毆制使及本管長官律流内九品以上官毆非本管五品以上及五品以上毆非本管三品以上官折跌肢體及瞎一目者九品以上官毆長官律毆受業師折跌肢體及瞎一目者毆受業師律奴婢毆家長緦麻親折跌肢體及瞎一目者毆大功親折肋眇兩目墮胎及刃傷者雇工人毆家長之大功親折跌肢體及瞎一目者奴婢毆家長律妾毆夫及正妻至折肋眇兩目墮胎及刃傷者毆妻之父母至折跌肢體及瞎一目者妻妾毆夫律卑幼毆本宗大功尊屬折肋眇兩目墮胎及刃傷者毆大功以下尊長律毆同居繼父至折跌肢體及瞎一目者毆妻前夫之子律誣告人罪徒二年半加所誣罪三等者誣告律官吏受財有禄人枉法贓至五十兩者不枉法贓至一百一十兩者官吏受財律戸例一收買肩販官鹽越境貨賣審非私梟但拒捕者鹽法例兵例一附近苖疆五百里内民人煎穵窩囤興販硝黄八十斤以上者私出外境及違禁下海例刑例一監守盜倉庫錢糧入已自三百三十兩至六百六十兩者監守自盜倉庫錢糧例一竊匪穿穴壁封盜倉庫錢糧至九十兩者常人盜倉庫錢糧例一原犯流罪人犯如有中途在配脱逃流二千里者枷號兩個月徒流人逃例三千里名例律犯罪自首不實不盡罪至死者犯罪自首律吏律諸衙門官吏及士庶人等上言宰執大臣徳政若宰執大臣知情者上言大臣徳政律棄毁制書及各衙門印信并官文書事干軍機錢糧當該官吏知而不舉者棄毁制書印信律官文書改補因而失誤軍機者首領及承發吏増減官文書律各衙門行移出外文書漏印及全不用印因而失誤軍機經管首領官並承發者漏使印信律戸律强占官民山場河泊茶園蘆蕩及金銀銅錫鐵冶者盜賣田宅律娶犯死罪逃走婦女為妻妾知情者娶逃走婦女律妻背夫在逃輒自改嫁窩主及知情娶者期親以上尊長及餘親主婚改嫁者出妻律嫁娶違律至死者主婚人嫁娶違律主婚媒人罪律抄没人口財産律不該載者不在入官之限違而抄没已入官者隠瞞入官家産律犯私鹽誣指平人者巡獲私鹽裝誣平人者鹽法律禮律師巫假降邪神并一應左道異端之術煽惑人民為從者禁止師巫邪術律司儀禮官將應朝見官員人等留難不即引見大臣知而不問者朝見留難律兵律擅入及冒入御膳所御在所未過門限者已過并未過門限門官及宿衛官軍故縱者不係宿衛應直合帶兵仗之人但持寸刃入宫殿門内門官及宿衛官軍故縱者宫殿門擅入律職官從車駕行而逃親管頭目故縱者從駕稽違律宫殿内造作監工及提調内監門官守衛官軍㸃視工匠如原入名數短少知而不舉者宫殿造作罷不出律内監並内使私將兵器帶入宫殿門内門官及守衛官有失於摉檢者闗防内使出入律向太社射箭放彈投磚石者向宫殿射箭律越京城者皇城越而未過者越城律聞知調兵討襲外番及收捕反逆賊徒機密大事漏泄敵人為從者漏泄軍情大事律軍人私出外境擄掠傷人及於已附地面擄掠將領知情故縱者縱軍擄掠律越度縁邊闗塞因而潛出外境守把之人知而故縱者私越冒度闗津律境内姦細走透消息於外人及境外姦細入境内探探聴事守把之人故縱及隠匿不首者盤詰姦細律將人口軍器出境及下海因而走泄事情該拘束官司及守把之人通同夾帶或知而故縱者私出外境及違禁下海律故放馬牛犬觸觝踢咬殺人者畜産咬踢人律刑律謀反及大逆但知情不首者謀反大逆律謀叛已行知而不首者謀而未行為從者逃避山澤不服追喚為從者謀叛律造䜟緯妖書妖言及傳用惑人不及衆者造妖書妖言律强盜已行而不得財者若以藥迷人圖財不得財者竊盜事主知覺棄財逃走追逐因而拒捕毆人折傷以上及殺人為從者强盜律私竊放死囚逃走者因而傷人及殺人為從者官司差人追徴錢糧勾攝公事及捕獲罪人聚衆中途打奪為首者因而傷差人並殺人及聚衆至十人為從者率領家人隨從打奪之尊長及亦曽傷人殺人之家人劫囚律白晝搶奪人財物傷人為從者白晝搶奪律竊盜及掏摸得財至一百二十兩為首者一百二十兩以上為從者竊盜律設方畧誘取良人及畧賣良人為奴婢者因而傷人及殺人為從者若假以乞養過房為名買良家子女轉賣為奴婢者窩主及買主知情者畧人畧賣人律發掘他人墳塜見棺槨為首及開棺見屍為從者卑幼發尊長墳塜見棺槨為首及開棺見屍為從者棄屍賣墳地為從者殘毁他人死屍及棄屍水中為首者毁棄緦麻以上尊長未𦵏死屍為從者棄尊長而不失其屍及毁而但髠髪若傷為首者子孫毁棄祖父母父母及奴婢雇工人毁棄家長死屍為從者於墳墓熏狐貍因而燒祖父母父母及家長之屍為從者發塜律强盜窩主造意若不行又不分贓者盜賊窩主律謀殺人從而不加功者從而加功傷而不死者謀殺人律謀殺緦麻以上尊長已傷為從加功者緦麻以上尊長謀殺同堂弟妹堂姪堂姪孫已傷者奴婢及雇工人謀殺家長緦麻以上親已傷為從加功者謀殺祖父母父母律採生折割人已行未傷人為從加功者採生折割人律用毒藥殺人知情賣藥者造畜蠱毒殺人律同謀共毆人因而致死人原謀者鬬毆及故殺人律以他物置人耳鼻及孔竅中若故屏去人服食令至篤疾者屏去人服食律無故向城市及居宅放彈射箭投磚石傷人因而致死者弓箭傷人律無故於街市鎮店馳驟車馬因而傷人致死者車馬殺傷人律卑幼威逼大功尊長致死者威逼人致死律毆瞎人兩目折人兩肢損人二事以上及因舊患令至篤疾若斷人舌及毁敗人陰陽者鬬毆律宫内毆人至篤疾者殿内毆人折跌肢體以上及至篤疾者宫内忿爭律宗室緦麻小功親而毆之折跌肢體及瞎一目者大功期親而毆之折肋眇兩目墮胎及刃傷并折跌肢體及瞎一目者宗室覺羅以上親被毆律軍民吏卒毆五品以上官貳官折傷者毆制使及本管長官律流内九品官毆非本管五品以上及五品以上毆三品以上官至篤疾者九品以上官毆長官律毆受業師至篤疾者毆受業師律威力主使毆打人因而致死者下手之人威力制縛人律奴婢過失傷家長者毆家長之期親及外祖父母為從者毆家長之小功親折跌肢體及瞎一目者雇工人毆家長及家長之期親若外祖父母傷者毆家長緦功親至篤疾者奴婢毆家長律妻毆夫折跌肢體及瞎一目者妻妾毆