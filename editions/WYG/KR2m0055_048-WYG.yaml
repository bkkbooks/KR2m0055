front:
  text: 欽定四庫全書大清律例卷十六
  hash: sha256:383e0089a874d2e36b2b7143174726147f3f66b4cfe2bcb29fd98f3e89ef7ebf
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0055_WYG_048-1a, image: WYG0672/WYG0672-0617c.png}
body:
  text: 禮律祭祀祭享凡天地社稷大祀及廟享所司太常寺將祭則先致齋將齋則先誓戒將戒則先告示不將祭祀日期豫先告示諸衙門知㑹者笞五十因不告示而失誤行事者杖一百其已承告示而失誤者罪坐失誤之人亦杖一百若傳制興百官齋戒百官已受誓戒而弔喪問疾判署刑殺文書及豫筵晏者皆罰俸一月其所司知百官有緦麻以上喪或曾經杖罪遣充執事及令陪祀者罪同不知者不坐若有喪有過不自言者罪亦如之其已受誓戒人員散齋於外不宿淨室致齋於内不宿本司者並罰俸一月若大祀牲牢玉帛黍稷之屬不如法者笞五十一事缺少者杖八十一座全缺者杖一百若奉大祀在條之犧牲主司犧牲所官喂養不如法致有瘦損者一牲笞四十每一牲加一等罪止杖八十因而致死者加一等中祀有犯者罪同餘條准此條例一凡郊祀齋戒前二日太常寺官宿於本司次日具本奏聞致齋三日次日進銅人傳制諭文武官齋戒不飲酒不食葱韮薤蒜不問病不弔喪不聴樂不理刑不與妻妾同處定齋戒日期文武百官先沐浴更衣本衙門宿歇次日聴誓戒畢致齋三日宗廟社稷亦致齋三日惟不誓戒一大祀前三月以犧牲付犧牲所滌治如法中祀前三十日滌之小祀前十日滌之大祀祭天地太社太稷也廟享祭太廟山陵也中祀如朝日夕月風雲雷雨嶽鎮海瀆及歴代帝王先師先農旗纛等神小祀謂凡載在祀典諸神惟帝王陵寢及孔子廟則傳制特遣毁大祀丘壇凡大祀丘壇而毁損者不論故誤杖一百流二千里壝門減二等杖九十徒二年半若棄毁大祀神御兼太廟之物者杖一百徒三年雖輕必坐遺失及誤毁者各減三等杖七十徒一年半如價值重者以毁棄官物科條例一天地等壇内縱放牲畜作踐及私種耤田外餘地并奪取耤田禾把者俱問違制杖一百牲畜入官犯人枷號一箇月發落一八旂大臣將本旂官員職名書寫傳牌挨次遞交每十日責成一人㑹同太常寺官前往天壇嚴查有放鷹打鎗成羣飲酒遊戲者即行嚴挐交部照違制律治罪致祭祀典神祗凡各府州縣社稷山川風雲雷雨等神及境内先代聖帝明王忠臣烈士載在祀典應合致祭神祗所在有司置立牌面開寫神號祭祀日期於潔淨處常川懸掛依時致祭至期失誤祭祀者所司官吏杖一百其不當奉祀之神非祀典所載而致祭者杖八十厯代帝王陵寢凡厯代帝王陵寢及先聖先賢忠臣烈士墳墓所在有司當加護守不許於上樵採耕種及牧放牛羊等畜違者杖八十褻瀆神明凡私家告天拜斗焚燒夜香燃㸃天燈告天七燈拜斗褻瀆神明者杖八十婦女有犯罪坐家長若僧道修齋設醮而拜奏青詞表文及祈禳火災者同罪還俗重在拜奏若止修齋祈禳而不拜奏青詞表文者不禁若有官及軍民之家縱令妻女於寺觀神廟燒香者笞四十罪坐夫男無夫男者罪坐本婦其寺觀神廟住持及守門之人不為禁止者與同罪條例一凡僧道軍民人等於各寺觀神廟刁姦婦女因而引誘逃走或誆騙財物者問各杖一百姦夫發三千里充軍財物照追給主若軍民人等縱令婦女於寺觀神廟有犯者杖七十枷號一箇月發落禁止師巫邪術凡師巫假降邪神書符咒水扶鸞禱聖自號端公太保師婆名色及妄稱彌勒佛白蓮社明尊教白雲宗等㑹一應左道異端之術或隱藏圖像燒香集衆夜聚曉散佯修善事煽惑人民為首者絞監候為從者各杖一百流三千里若軍民裝扮神像鳴鑼擊鼓迎神賽㑹者杖一百罪坐為首之人里長知而不首者各笞四十其民間春秋義社以行祈報者不在此限條例一各處官吏軍民僧道人等來京妄稱諳曉扶鸞禱聖書符咒水一切左道異端邪術煽惑人民為從者及稱燒煉丹藥出入内外官家或擅入皇城夤緣作弊希求進用屬軍衛者發近邊充軍屬有司者發邊外為民若容留潜住及薦舉引用隣甲知情不舉并皇城各門守衛官軍不行闗防摉拏者各叅究治罪一凡左道惑衆之人或燒香集徒夜聚曉散為從者及稱為善友求討布施至十人以上并軍民人等不問來歴窩藏接引或寺觀住持容留披剃冠簮探聴境内事情若審實探聴軍情以姦細論及被誘軍民捨與應禁鐵器等項事發屬軍衛者發近邊充軍屬有司者發邊外為民一習天文之人若妄言禍福煽惑人民者照律治罪一凡端公道士作為異端法術醫人致死者照鬬殺律擬罪一邪敎惑衆照律治罪外如該地方官不行嚴禁在京五城御史在外督撫徇庇不行糾叅一併交與該部議處旁人出首者於各犯名下併追銀二十兩充賞如係應捕之人拏獲者追銀十兩充賞一凡有奸匪之徒將各種避刑邪術私相傳習者為首敎授之人擬絞監候為從學習之人杖一百流三千里若事犯到官本犯以邪術架刑者照規避本罪律遞加二等罪止杖一百流三千里其犯該絞斬者仍照本罪科斷至事犯到官本犯雇人作法架刑者亦照以邪術架刑例治罪並究出代為架刑之人照詐教誘人犯法與犯人同罪律至死減一等得贓照枉法從重論保甲隣里知而容隱不首者照知而不首本律笞四十地方官不行查拏者照例議處一私刻地畝經及占驗推測妄誕不經之書售賣圖利及將舊有書板藏匿不行銷毁者俱照違制律治罪大清律例卷十六
