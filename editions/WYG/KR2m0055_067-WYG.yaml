body:
  text: 刑律人命謀殺人謀殺制使及本管長官謀殺祖父母父母殺死姦夫謀殺故夫父母殺一家三人採生折割人造畜蠱毒殺人鬬毆及故殺人屏去人服食戲殺誤殺過失殺傷人夫毆死有罪妻妾殺子孫及奴婢圖賴人弓箭傷人車馬殺傷人庸醫殺傷人窩弓殺傷人威逼人致死尊長為人殺私和同行知有謀害
