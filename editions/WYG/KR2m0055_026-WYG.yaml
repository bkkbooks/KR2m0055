body:
  text: 名例律下老小廢疾收贖凡年七十以上十五以下及廢疾瞎一目折一肢之類犯流罪以下收贖其犯死罪及犯謀反叛逆縁坐應流若造畜蠱毒採生折割人殺一家三人家口㑹赦猶流者不用此律其餘侵損於人一應罪名並聴收贖犯該充軍者亦照流罪收贖八十以上十嵗以下及篤疾瞎兩目折兩肢之類犯殺人謀故闕毆應死一應斬絞者議擬奏聞犯反逆者不用此律取自上裁盗及傷人罪不至死者亦收贖謂既侵損於人故不許全免亦令其收贖餘皆勿論謂除殺人應死者上請盗及傷人者收贖之外其餘有犯皆不坐罪九十以上七嵗以下雖有死罪不加形九十以上犯反逆者不用此律其有人教令坐其教令者若有贓應償受贓者償之謂九十以上七嵗以下之人皆少智力若有教令之者罪坐教令之人或盜財物旁人受而將用受用者償之若老小自用還著老小之人追徵條例一凡老幼及廢疾犯罪律該收贖者若例該枷號一體放免應得杖罪仍令收贖一内外現審人犯不應具題者若有老小廢疾俱照律完結其直𨽻各省審擬具題案内人犯果有老小廢疾者該督撫察眀取具地方官印結具題照律收贖如實非老小廢疾徇情題免事發者將出結轉詳官並督撫交部議處其到部人犯有告稱年老及在中途成癈疾者察眀實係老疾亦得收贖一教令七嵗小兒毆打父母者坐教令者以毆凡人之罪教令九十老人故殺子孫者亦坐教令者以殺凡人之罪一每年秋審人犯其犯罪時年十五以下及現在年逾七十經九卿擬以可矜䝉恩宥免減流者俱准其收贖朝審亦照此例行一凡瞎一目之人有犯軍流徒杖等罪俱不得以癈疾論贖若毆人瞎一目者仍照律科罪犯罪時未老疾凡犯罪時雖未老疾而事發時老疾者依老疾論謂如六十九以下犯罪年七十事發或無疾時犯罪有廢疾後事發得依老疾收贖或七十九以下犯死罪八十事發或廢疾時犯罪篤疾時事發得入上請八十九犯死罪九十事發得入勿論之類若在徒年限内老疾亦如之謂如六十九以下徒役三年役限未滿年入七十或入徒時無病徒役年限内成廢疾並聴准老疾收贖以徒一年三百六十日為率驗該杖徒若干應贖銀若干俱照例折役收贖犯罪時幼小事發時長大依幼小論謂如七嵗犯死罪八嵗事發勿論十嵗殺人十一嵗事發仍得上請十五嵗時作賊十六嵗事發仍以贖論給没贓物凡彼此俱罪之贓謂犯受財枉法不枉法計贓與受同罪者及犯禁之物謂如應禁兵器及禁書之類則入官若取與不和用强生事逼取求索之贓並還主謂恐嚇詐欺强買賣有餘利科歛及求索之類其犯罪應合籍没財産赦書到後罪人雖在赦前決訖而家産未曽抄劄入官者並從赦免其已抄劄入官守掌及犯謀反叛逆者財產與縁坐家口不分己未入官並不放免若除謀反謀叛外罪未處決籍没之物雖已送官但未經分配與人守掌者猶為未入其縁坐應流人及本犯家口雖已入官若罪人遇赦得免罪者亦從免放若以贓入罪正贓見在者還官主謂官物還官私物還主又若本贓是驢轉易得馬及馬生駒羊生羔畜産蕃息皆為見在其贓已費用者若犯人身死勿徴别犯身死者亦同若不因贓罪而犯别罪亦有應追財物如埋葬銀兩之類餘皆徴之若計雇工賃錢私役弓兵私借官車船之類為贓者死亦勿徴其估贓者皆據犯處地方當時犯時中等物價估計定罪若計雇工錢者一人一日為銀八分五釐五毫其牛馬駝驘驢車船碾磨店舍之類照依犯時雇工賃值計算定罪追還賃錢雖多各不得過其本價謂船價值銀錢一十兩却不得追賃值一十一兩之類其贓罰金銀並照犯人原供成色從實追徴入官給主若己費用不存者追徴足色謂人原盜或取受正贓金銀使用不存者並追足色條例一在京在外問過囚犯但有還官贓物值銀一十兩以上及入官贓二十兩以上給主贓三十兩以上監追一年之上勘實力不能完者開具本犯情罪輕重監追年月久近贓數多寡每於嵗底彚題請㫖定奪若不及前數及埋塟銀監追一年之上勘實力不能完者俱免追各照原擬發落一凡州縣自理贖鍰嵗底造册申報按察司布按自理贖鍰嵗底册報督撫督撫嵗底彚造清册題報刑部察核其承問各官應開眀罰贖人姓名及所罰數目曉示各該地方如有以多報少及隠漏者督撫叅奏以貪贓治罪一凡八旂應入官之人令入各旂辛者庫其内務府佐領人送入官者亦照此例入辛者庫辛者庫人犯入官之罪者照流罪折枷責結案一凡官役犯贓案内有虧短價值等項追給原主其詐騙逼勒者被害人自行首告亦追給原主督撫科道叅發者槩追入官一歸旂人員内有應追贓者限五箇月内該督撫察眀家産人口造册並人解部轉交該旂追贓其任所有無私置房産再限地方官六箇月察眀結報後有隠匿發覺者交部議處一斷付死者之財産遇赦不得免追一虧空貪贓官吏一應追賠銀兩該督撫委清查官產之員㑹同地方官令本犯家屬將田户什物呈眀時價當堂公同確估詳登册記申報上司仍令本犯家屬眼同售賣完項如有侵漁需索等弊許該犯家屬并買主首告將侵漁需索之官吏照侵盜錢糧及受枉法贓律治罪一地方官吏有將入官田房私租於人者除照數追賠外仍照侵盜錢糧例治罪其未經定例以前官吏有私租之處免其治罪按年照數賠補其一應變賣什物俱勒限一年眼同本犯家屬照數變賣如逾限未變器皿衣服仍於本地方勒變一應金銀珠玉等物兌眀分兩數目造具清册眼同本犯家屬封固出具並無更換印甘各結解交藩庫遇有便員附搭解部轉交崇文門變價若有竊换等弊許家人及旁人首告加倍追賠仍照侵盜錢糧例治罪一田房産業一經入官即令本犯家屬將契劵呈堂出業該管官眼同原主秉公估定開眀價值出示速售有願買者即給與印照不許原主勒索找價仍令買主出具並無假冒影射甘結存卷如該管官縱容原主據占影射將據占之家屬影射之父兄俱照隠瞞入官財物律坐贓治罪該管官並該上司俱照例分别議處如並無影射等弊首告之人揑詞䧟害按律反坐至所典房地及質當物件勒限令原主取贖歸還原本如逾限不贖即開眀原本價值出示招賣一八旗催追侵貪銀兩如逾限不完將伊家產變價交官若承變限滿尚無售主照虧欠之數將家產估價入官扺項其家產不能扺完者該叅佐領等據實呈報管旗都統等具奏將本犯交部照原擬發落現在家產盡行入官一凡盜犯到案審實者即將盜犯家産封記候題結之日將盜犯家產變賠如該犯之父兄弟伯叔知情分贓者審眀治罪亦著落伊等名下追賠倘有並無家產以及外來之人無從封記開報者將案内各盜之家產除應賠本身贓物外或有餘剰概行變價代賠其有窩家之案仍照例將窩家之財產一併賠補取具事主領狀報部倘有將無干之親族及並未分贓之親屬株連賠累者該督撫查出即行題叅交部議處一刑部現審案内凡行追贓罰贓變贓贖銀兩承追各官俱各定限一年追完如逾限不行追交該部即行查叅將承追各官照例議處一州縣有盜劫庫項除失事之員照數補還者無庸另議外或本人身故産絶力難完繳者即照州縣虧空之例令該管各上司分賠一凡追贓人犯除侵貪官吏仍照例限監追外其搶奪竊盜之贓著地方官於定案之日嚴行比追如果力不能完即將本犯治罪隨時取結詳報分别題咨豁免一凡命案内減等發落人犯應追埋塟銀兩勒限三箇月追完有物産可抵者亦著於限内變交如審係十分貧難者量追一半給付屍親収領若限滿勘實力不能完將該犯即行發配一面取具地隣親族甘結該地方官加結詳請督撫核實咨請豁免如有隠匿發覺者地隣人等均照不應重律治罪地方官照例議處一叅革漢軍官員有應完欵項俱照定限著追如為數多者酌量展限完納如逾限不完即將該員解旗治罪犯罪自首凡犯罪未發而自首者免其罪若有贓者其罪雖免猶徴正贓謂如枉法不枉法贓徴入官用强生事逼取詐欺科歛求索之類及强竊盜贓徴給主其輕罪雖發因首重罪者免其重罪謂如竊盜事發自首又㑹私鑄銅錢得免鑄錢之罪止科竊盜罪若因問被告之事而别言餘罪者亦如上科之止科見問罪名免其餘罪謂因犯私鹽事發被問不加拷訊又自别言曽竊盜牛又曽詐欺人財物止科私鹽之罪餘罪俱得免之類其犯人雖不自首遣人代首若於法得相容隠者之親屬為之首及彼此詰發互相告言各聴如罪人身自首法皆得免罪其遣人代首者謂如甲犯罪遣乙代首不限親踈亦同自首免罪若於法得相容𨼆者為首謂同居及大功以上親若奴婢雇工人為家長首及相告言者皆與罪人自首同得免罪卑幼告言尊長尊長依自首律免罪卑幼依干犯名義律科斷若自首不實及不盡者重情首作輕情多贓首作少贓以不實不盡之罪罪之自首贓數不盡者止計不盡之數科之至死者聴減一等其知人欲告及逃如逃避山澤之類叛是叛去本國之類而自首者減罪二等坐之其逃叛者雖不自首能還歸本所者減罪二等其損傷於人因犯殺傷於人而自首者得免所因之罪仍從本殺傷法本過失者聴從本法損傷於物不可賠償謂如棄毁印信官文書應禁兵器及禁書之類私家既不合有是不可償之物不准首若本物見在首者聴同首法免罪事發在逃已被囚禁越獄在逃者雖不得首所犯之罪但既出首得減逃走之罪二等正罪不減若逃在未經到官之先者本無加罪仍得減本罪二等若私越度關及姦者並不在自首之律若强竊盜詐欺取人財物而於事主處首服及受人枉法不枉法贓悔過回付還主者與經官司自首同皆得免罪若知人欲告而於財主處首還者亦得減罪二等其强竊盜若能捕獲同伴解官者亦得免罪又依常人一體給賞强竊盜自首免罪後再犯者不准首條例一小功緦麻親首告得減罪三等無服之親減一等其謀反叛逆未行如親屬首告或捕送到官者正犯俱同自首律免罪若已行者正犯不免其餘縁坐人亦同自首律免罪一在監重囚有因變逸出旋即投歸者除不准自首之犯仍照原擬治罪外餘俱免死杖一百發落其自行越獄及看守通同賄縱者雖投歸不在此例一被擄從賊不忘故土乘間來歸者俱著免罪一凡遇强盜係律得容隱之親屬首告到官同自首法照例擬斷其親屬本身被劫因而告訴到官者依親屬相盜律科罪不在此例一竊盜自首不實不盡及知人欲告而於財主處首還律該減等擬罪者俱免刺一凡强盜除殺死人命姦人妻女燒人房屋罪犯深重不准自首外其夥盜雖曽傷人隨即平復者亦姑准自首照兇徒執持兇噐傷人例問邊逺充軍其放火燒人空房及田塲積聚之物者依律問流若計所燒之物重於本罪者發近邊充軍若事主傷重雖幸未死不准自首一凡强盜行劫數家而止首一家者除所劫數家内若係盜首及殺死人命姦人妻女燒人房屋等項例不准自首者乃分别定擬外如俱係例准自首之罪將本犯免死應發黒龍江給新滿洲披甲之人為奴者照徒流遷徙地方條下發遣之例問發一跟隨為盜並未傷人之犯自行出首將伊應得之罪悉行寛免一不論强竊盜犯有捕役帶同投首者除本犯不准寛減外仍將捕役嚴行審究倘有教令及賄求故揑情弊將捕役照受財故縱律治罪一强盜同居之父兄伯叔與弟明知為非或分受贓物者許其據實出首均准免罪本犯亦得照例減免發落一夥盜除行劫一次者於事未發之先自行首出仍照律免罪外如行劫二次以上者事未發而自首照未傷人之盜首事未發自首例發近邊充軍若聞拿投首亦照未傷人之盜首聞拿投首例發黒龍江等處給披甲人為奴二罪俱發以重論凡二罪以上俱發以重者論罪各等者從一科斷若一罪先發已經論決餘罪後發其輕若等勿論重者更論之通計前所論決之罪以充後發之數謂如二次犯竊盜一次先發計贓一十兩已杖七十一次後發計贓四十兩該杖一百合貼杖三十如有禄人節次受人枉法贓四十兩内二十兩先發已杖六十徒一年二十兩後發合並取前贓通計四十兩更科全罪徒三年不枉法贓及坐贓不通計全科其應贓入官物賠償盜刺字官罷職罪止者罪雖勿論或重科或從一仍各盡本法謂一人犯數罪如枉法不枉法贓合入私官毁傷器物合賠償竊盜合刺字職官罪杖一百以上合罷職無禄人不枉法贓一百二十兩以上罪止杖一百流三千里之類各盡本法擬斷犯罪共逃凡犯罪共逃亡其輕罪囚能捕獲重罪囚而首告及輕重罪相等但獲一半以上首告者皆免其罪以上指自犯者言謂同犯罪事發或各犯罪事發而共逃者若流罪囚能捕死罪囚徒罪囚能捕流罪囚首告又如五人共犯罪在逃内一人能捕二人而首告之類皆得免罪若損傷人及姦者不免仍依常法其因他人犯罪連累致罪而正犯罪人自死者連累人聴減本罪二等以下指因人連累而言謂因别人犯罪連累以得罪者如藏匿引送資給罪人及保勘供證不實或失覺察關防鈐束聴使之類其罪人非被刑殺而自死者又聴減罪二等若罪人自首告得免及遇赦原免或䝉特恩減罪收贖者連累人亦准罪人原免減等贖罪法謂因罪人連累以得罪若罪人在後自首告或遇恩赦全免或䝉特恩減一等二等或罰贖之類被累人本罪亦各依法全免減等收贖同僚犯公罪凡同僚犯公罪者謂同僚官吏連署文案判斷公事差錯而無私曲者並以吏典為首首領官減吏典一等佐貳官減首領官一等長官減佐貳官一等官内如有缺員亦依四等遞減科罪本衙門所設官吏無四等者止准見設員數遞減若同僚官一人有私自依故出入人罪私罪論其餘不知情者止依失出入人罪公罪論謂如同僚連署文案官吏五人若一人有私自依故出入人罪論其餘四人雖連署文案不知有私者止依失出入人罪論仍依四等遞減科罪若下司申上司事有差誤上司不覺失錯准行者各遞減下司官吏罪二等謂如縣申州州申府府申布政司之類若上司行下事有差誤而所屬依錯施行者各遞減上司官吏罪三等謂如布政司行府府行州州行縣之類亦各以吏典為首首領佐貳長官依上減之公事失錯凡官吏公事失錯自覺舉者免罪其同僚官吏同署文案法應連坐者一人自覺舉餘人皆免罪謂縁公事致罪而無私曲者事若未發露但同僚判署文案官吏一人能檢舉改正者彼此俱無罪責其斷罪失錯於入已行論決者仍從失入人罪論不用此律謂死罪及笞杖已決訖流罪已至配所徒罪已應役此等並為已行論決官司雖自檢舉皆不免罪各依失入人罪律減三等及官吏等級遞減科之故云不用此律其失出人罪雖已決放若未發露能自檢舉貼斷者皆得免其失錯之罪其官文書稽程官應連坐者一人自覺舉餘人亦免罪承行主典之吏不免謂文案小事五日程中事十日程大事二十日程此外不了是名稽程官人自檢舉者並得全免惟當該吏典不免若主典自舉者並減二等謂當該吏典自檢舉者皆得減罪二等官全免共犯罪分首從凡共犯罪者以先造意一人為首依律斷擬随從者減一等若一家人共犯止坐尊長若尊長年八十以上及篤疾歸罪於共犯罪以次尊長如無以次尊長方坐卑幼謂如尊長與卑幼共犯罪不論造意獨坐尊長卑幼無罪以尊長有專制之義也如尊長年八十以上及篤疾於例不坐罪即以共犯罪次長者當罪又如婦人尊長與男夫卑幼同犯雖婦人為首仍獨坐男夫侵損於人者以凡人首從論造意為首随從為從侵謂竊盗財物損謂鬬毆傷殺之類如父子合家同犯並依凡人首從之法為其侵損於人是以不獨坐尊長若共犯罪而首從本罪各别者各依本律首從論仍以一人坐以首罪餘人坐以從罪謂如甲引他人共毆親兄甲依弟毆兄杖九十徒二年半他人依凡人鬬毆論笞二十又如卑幼引外人盜己家財物一十兩卑幼以私擅用財加二等笞四十外人依凡盜從論杖六十之類若本條言皆者罪無首從不言皆者依首從法其同犯擅入皇城宫殿等門及同私越度關若同避役在逃及同犯姦者律雖不言皆亦無首從謂各自身犯是以亦無首從皆以正犯科罪犯罪事發在逃凡二人共犯罪而有一人在逃現獲者稱逃者為首更無人證佐則但據其所稱決其從罪後獲逃者稱前獲之人為首鞠問是實還將前人依首論通計前決之罪以充後問之數若犯罪事發而在逃者衆證眀白或係為首或係為從即同獄成將來照提到官止以原招決之不須對問仍加逃罪二等逃在未經到官之先者不坐條例一凡該斬絞之犯事發到官負罪潛逃被獲者如原犯情罪重大至秋審時無可寛緩者改為立決若原犯情罪尚有可原懼罪潛逃仍照本罪擬為監候其知情藏匿罪人者照律治罪知情之鄰保甲長俱杖八十該地方官稽查不力者交部議處如有屬員藏匿罪人該管上司不行糾叅者亦交部議處一各處將軍每年𣲖官二員驍騎校二員帶領領催兵丁專緝逃人除眀知故縱受賄賣放者交部治罪外其不實力緝拿者另委能員追緝仍將發遣人犯并八旗家人私自逃走者毎月造册報部每於嵗底將已獲㡬名未獲㡬名或並無脱逃或脱逃後盡數全獲應行議處議敘之處逐一分晰彚行具奏刑部㑹同兵部核覆具題恭候欽定一免死減等發遣人犯如不服伊主管束脱逃後復犯行兇為匪者照原犯死罪即行正法如非不服伊主管束或因覔食或因思親等事潛逃並無行兇為匪之處遞回發遣處枷號三箇月鞭一百其平常發遣人犯如逃走後復行兇為匪即照現在所犯定擬如犯該斬候者改為立斬犯該絞候者改為立絞犯該軍流發遣者改為絞監候犯該徒罪者遞回發遣處枷號三箇月罪止笞杖者遞回發遣處枷號兩箇月並無行兇為匪者遞回發遣處枷號一箇月俱鞭一百其例應立決者拿獲之日令該地方官審眀該犯原犯情罪逃走年月並分給為奴之旗色佐領及伊主姓名照例定擬詳報督撫具題該部逐一查核確實㑹議題覆將該犯即在拿獲地方正法仍行文發遣處出示曉諭一内外文武職官負罪逃竄一經拿獲除罪應斬決絞決者毋庸另議外其犯該監候者俱改為立決犯該軍流以下者無論本罪輕重一經脱逃被獲俱改為擬絞監候秋審時將原犯情罪聲明具奏親屬相為容隠凡同居同謂同財共居親屬不限籍之同異雖無服者亦是若大功以上親謂另居大功以上親屬係服重及外祖父母外孫妻之父母女壻若孫之婦夫之兄弟及兄弟妻係恩重有罪彼此得相為容隠奴婢雇工人義重為家長隠者皆勿論家長不得為奴婢雇工人隠者義當治其罪也若漏泄其事及通報消息致令罪人隠匿逃避者以其於法得相容𨼆亦不坐謂有得相容隠之親屬犯罪官司追捕因而漏泄其事及暗地通報消息與罪人使令隠避逃走故亦不坐其小功以下相容隠及漏泄其事者減凡人三等無服之親減一等謂另居小功以下親屬若犯謀叛以上者不用此律謂雖有服親屬犯謀反謀大逆謀叛但容隠不首者依律科罪故云不用此律處決叛軍凡邉境重地城池若有軍人謀叛守禦官捕獲到官顯跡證佐眀白鞠問招承申報督撫提鎮審問無寃隨即依律處治具由奏聞如在軍前有謀叛能臨陣擒殺者事既顯眀機係呼吸不在此委審公審之限事後亦須奏聞化外人有犯凡化外來降人犯罪者並依律擬斷𨽻理藩院者仍照原定䝉古例條例一䝉古案件有送部審理者即移㑹理藩院衙門將通曉䝉古言語司官𣲖出一員帶領通事赴刑部公同審理除内地八旗䝉古應依律定擬者㑹審官不必列銜外其𨽻在理藩院應照䝉古例科斷者㑹審官一體列銜如朝審案内遇有䝉古人犯知㑹理藩院堂官到班㑹審遇有照䝉古例治罪者亦一體列銜一青海䝉古人有犯死罪應正法者照舊例在西寧監禁其偷竊牲畜例應擬絞解京監候之犯俟部覆後解赴甘肅按察使衙門監禁於秋審時將該犯情罪入於該省招册咨送三法司查核一䝉古與民人交涉之案凡遇鬭毆拒捕等事該地方官與旗員㑹訊明確如䝉古在内地犯事者照刑律辦理如民人在蒙古地方犯事者即照䝉古律辦理本條别有罪名凡本條自有罪名與名例罪不同者依本條科斷若本條雖有罪名其心有所規避罪重者又不泥於本條自從所規避之重罪論其本應罪重而犯時不知者依凡人論謂如叔姪别處生長素不相識姪打叔傷官司推問始知是叔止依凡人鬭法又如别處竊盜偷得大祀神御之物如此之類並是犯時不知止依凡論同常盜之事本應輕者聴從本法謂如父不識子毆打之後方始得知止依打子之法不可以凡毆論加減罪例凡稱加者就本罪上加重謂如人犯笞匹十加一等即坐笞五十或犯杖一百加一等則加徒減杖即坐杖六十徒一年或犯杖六十徒一年加一等即坐杖七十徒一年半或犯杖一百徒三年加一等即坐杖一百流二千里或犯杖一百流二千里加一等即坐杖一百流二千五百里之類稱減者就本罪上減輕謂如人犯笞五十減一等即坐笞四十或犯杖六十徒一年減一等即坐杖一百或犯杖一百徒三年減一等即坐杖九十徒二年半之類惟二死三流各同為一減二死謂絞斬三流謂流二千里二千五百里三千里各同為一減如犯死罪減一等即坐流三千里減二等即坐徒三年犯流三千里者減一等亦坐徒三年加者數滿乃坐謂如贓加至四十兩縱至三十九兩九錢九分雖少一分亦不得科四十兩罪之類又加罪止於杖一百流三千里不得加至於死本條加入死者依本條加入絞者不加至斬條例一應擬枷號杖笞之盜犯時遇熱審俱不准減免一凡例應枷責之犯奉㫖改為發遣者俱免其枷責之罪一議處議罪俱照本條律例定擬其有情罪重大應從重定擬者必折衷於法之至平至允援引比照不得擅用加倍字様一笞罪人犯如係鬭毆傷人雖遇熱審不准寛免稱乗輿車駕凡律中所稱乗輿車駕及御者如御物御膳所御在所之類自天子言之而太皇太后皇太后皇后並同稱制者自聖㫖言之而太皇太后皇太后皇太子令並同有犯毁失制書盜及詐為制書擅入宫殿門之類皆當一體科罪稱期親祖父母凡律稱期親及稱祖父母者曽髙同稱孫者曽元同嫡孫承祖與父母同縁坐者各從祖孫本法其嫡母繼母慈母養母皆服三年喪有犯與親母律同改嫁義絶及毆殺子孫不與親母同稱子者男女同縁坐者女不同稱與同罪凡律稱與同罪者謂被累人與正犯同罪其情輕止坐其罪正犯至死者同罪者減一等罪止杖一百流三千里正犯應刺同罪者免刺故曰不在刺字絞斬之律若受財故縱與同罪者其情重全科至死者絞其故縱謀反叛逆者皆依本律斬凡稱同罪者至死減一等絞稱罪同者至死不減等稱准枉法論准盜論之類事相類而情輕但准其罪亦罪止杖一百流三千里並免刺字稱以枉法論及以盜論之類事相等而情並重皆與正犯同刺字絞斬皆依本律科斷然所得同者律耳若律外引例充軍為民等項則又不得而同焉條例一凡受財故縱與囚同罪人犯該凌遲斬絞依律罪止擬絞者俱要固監緩決候逃囚得獲審豁仍依本律科其減等受財枉法從重之罪一姦徒得受正兇賄賂挺身到官頂認致脫本犯罪名者不計贓數多寡俱照本犯徒流斬絞之罪一例全科其行賄之本犯除罪應立決者毋庸另議外其原犯應入情實者擬為立決應入緩決者秋審時擬入情實如原犯軍流等罪照軍流脫逃改調例從重治罪徒杖以下按律各加一等代為説合過錢者減一等不計贓科罪如有子犯罪而父代認其子除罪應立決者毋庸另議外如犯應斬候絞候者俱擬以立決軍流徒杖各照例遞加稱監臨主守凡律稱監臨者内外諸司統攝所屬有文案相關涉及别處駐劄衙門帶管兵糧水利之類雖非所管百姓但有事在手者即為監臨稱主守者内外各衙門該管文案吏典專主掌其事及守掌倉庫獄囚雜物之類官吏庫子斗級攢攔禁子並為主守其職雖非統屬但臨時差遣管領提調者亦是監臨主守稱日者以百刻今時憲書毎日計九十六刻凡律稱一日者以百刻犯罪違律計數滿乃坐計工者從朝至暮不以百刻為限稱一年者以三百六十日如秋糧違限雖三百五十九日亦不得為一年稱人年者以籍為定謂稱人年紀以附籍年甲為准稱衆者三人以上稱謀者二人以上謀狀顯跡眀白者雖一人同二人之法稱道士女冠凡律稱道士女冠者僧尼同如道士女冠犯姦加凡人罪二等僧尼亦然若於其受業師與伯叔父母同如俗人罵伯叔父母杖六十徒一年道冠僧尼罵師罪同受業師謂於寺觀之内親承經教合為師主者其於弟子與兄弟之子同如俗人毆殺兄弟之子杖一百徒三年道冠僧尼毆殺弟子同罪斷罪依新頒律凡律自頒降日為始若犯在已前者並依新律擬斷如事犯在未經定例之先仍依律及已行之例定擬其定例内有限以年月者俱以限定年月為斷若例應輕者照新例遵行條例一律例頒布之後凡問刑衙門敢有恣任喜怒引擬失當或移情就例故入人罪苛刻顯著者各依故失出入律坐罪斷罪無正條凡律令該載不盡事理若斷罪無正條者援引他律比附應加應減定擬罪名申該土司議定奏聞若輙斷決致罪有出入以故失論條例一引用律例如律内數事共一條全引恐有不合者許其止引所犯本罪若一條止斷一事不得任意删減以致罪有出入其律例無可引用援引别條比附者刑部㑹同三法司公同議定罪名於䟽内聲眀律無正條今比照某律某例科斷或比照某律某例加一等減一等科斷詳細奏眀恭候諭㫖遵行若律例本有正條承審官任意删減以致情罪不符及故意出入人罪不行引用正條比照别條以致可輕可重者該堂官查出即將承審之司員指名題叅書吏嚴拿究審各按本律治罪其應㑹三法司定擬者若刑部引例不確許院寺自行查眀律例改正倘院寺駁改猶未允協三法司堂官㑹同妥議如院寺扶同䑃混或草率踈忽别經發覺將院寺官員一併交部議處徒流遷徙地方凡徒役各照應徒年限並以到配所之日為始限滿釋放流犯照依本省地方計所犯應流道里定發各處荒蕪及瀕海州縣安置應遷徙者遷離鄉土一千里外徒五等發本省驛遞流三等直𨽻布政司府分流陜西江南布政司府分流陜西安徽布政司府分流山東山東布政司府分流浙江山西布政司府分流陜西河南布政司府分流浙江陜西布政司府分流山東甘肅布政司府分流四川浙江布政司府分流山東江西布政司府分流廣西湖北布政司府分流山東湖南布政司府分流四川福建布政司府分流廣東廣東布政司府分流福建廣西布政司府分流廣東四川布政司府分流廣西貴州布政司府分流四川雲南布政司府分流四川條例一凡軍流及外遣人犯十月至正月終及六月俱停其發遣餘月照常發遣一凡各省民人在京犯該應流並免死減等流犯如無妻室及無應追埋𦵏銀兩者順天府定地發配如有妻室及應追銀兩順天府轉發原籍地方令其追銀僉妻各照本省所定應流地方發配追完銀兩解部分别給主不在本籍犯流者亦照此例科斷一雲南徒罪人犯發本省多羅松林等十二驛擺站罪重者迤東各府人犯發諾鄧等井煎鹽迤西各府人犯發固舊等厰熬鉛一軍流徒犯俱至配所照應杖之數折責惟縁坐流罪不加杖一各旂將家奴吃酒行兇送部發遣者令該旗都統確查用印文送部發遣如將應行發遣之奴該旂故為留難不行送部者許伊主赴部遞呈該部審眀應行發遣者發遣將留難官員交部查議至於行止不端之人欲行占奪家人妻女揑以吃酒行兇送部者不准發遣交與該佐領將伊妻室子女轉賣身價給主倘被賣之後揑告原主希圖報復者仍照誣告家長律治罪其各省將軍處有送家奴吃酒行兇發遣者該將軍審眀照此遵行一凡土司有犯徒罪以下者仍照例遵行外其改土為流之土司本犯係斬絞者仍於各本省分别正法監候其家口應遷於逺省者係雲南遷徃江寧係貴州遷徃山東係廣西遷徃山西係湖南遷徃陜西係四川遷徃浙江在於各該省城安插如犯軍流罪者其土司併家口應遷於近省安插係雲南四川遷徃江西係貴州廣西遷徃安慶係湖南遷徃河南在於省城及駐劄提督地方分發安插該地方文武各官不時稽查毋許生事擾民出境如踈縱土司本犯及踈脱家口者交部分别議處其犯應遷之土司及伊家口該督撫確查人數多寡每親丁十口帶奴婢四口造具清册一併移送安插之省仍具册并取該地方官並無隠漏印結咨報刑部其安插地方每十口撥給官房五間官地五十畝俾得存養獲所官地照例輸課於每年封印前將安插人口及所給房產數目造册送户部查核一凡土蠻猺獞有讐殺刧擄及聚衆捉人靴禁者所犯係死罪將本犯正法一應家口父母兄弟子姪俱令遷徙如係軍流等罪將本犯照例枷責仍同家口父母兄弟子姪一併遷徙係流官所轄者發六百里外之土司安插係土司所轄者發六百里外之營縣安插其兇惡未甚者初犯照例枷責姑免遷徙若仍不改惡將本犯人仍照原擬枷責親屬家口亦遷徙别地安插嚴飭文武官稽查約束出具印結并年貌清册於年底報部如安插十年後果能改惡遷善有情願回籍者查眀咨部准予回籍若本犯併各家口仍在安插地方行兇生事照已徒已流而又犯罪律再科後犯之罪倘地方官不盡心約束以致疎脱者即將該管文武各官照例㕘處具本犯審無别情照例治以逃罪如有生事不法情由照平常遣犯逃後為匪例分别治罪至蠻獞頭目犯法必根究勾引之人審明確實照誘人犯法律加等治罪遇赦不宥失察勾引之地方官交部議處一各省流寓之人犯徒者即在所犯地方充徒犯流者仍依本省應發地方問發一奉天寧古塔黑龍江等處有犯枷責發遣者令該將軍等查明或係另戸滿洲或係奴僕逐一聲明送部照例枷責滿日咨送兵部將另戸滿洲發直𨽻江寧山西山東河南甘肅西安寧夏凉州荆州杭州成都福建廣東等處滿洲駐防之省城當差若奴僕亦發直𨽻等省給滿洲駐防之兵丁為奴其同案之犯不得共發一處一軍流人犯在本地未起解者遇隆冬及六月仍照例停遣若已至中途初冬十月經過州縣照常接遞至十一月初一日方准停遣俟次年春融時轉解如遇六月亦准停遣倘抵配不逺本犯情願前進者將不行停遣縁由移咨前途州縣一體接遞仍報刑部其配所脱逃被獲者分别刺字押解應發原配者仍發原配應改調者改調雖遇隆冬盛暑不准停遣一分發流犯如計算該犯原籍府屬至分流省分有未及應流里數者將該犯分撥逺處之府屬安插如已逾應流里數者即於本省府屬内計道里足數之地方安插一旗人犯該發遣者分發黑龍江寧古塔吉林烏喇等處當差旗人家奴發遣黑龍江等處為奴若民人犯該發遣案内民人謊稱賣身在旗者民人謊稱八旗逃人者民假稱逃人具告行詐者民人賣逃買逃者俱發寧古塔黑龍江等處分給披甲之人為奴窩留强盜三人以上者發雲貴兩廣極邊烟瘴地方其行劫數家止首一家者竊盜臨時拒捕殺人為從者並别項遣犯俱改發雲貴兩廣烟瘴少輕地方交與地方官嚴行管束仍照例分别刺字如有逃走為匪及生事不法者俱照發遣黑龍江等處之例分别治罪一直𨽻江南浙江江西湖廣福建山東山西河南陜西四川人犯應發黑龍江等處者俱發雲貴兩廣烟瘴地方其雲貴兩廣四省人犯應發黑龍江等處者該督撫查明籍貫均於隔逺烟瘴省分互相遞發一漢人犯該發遣者如係舉貢生監及曽為職官之人俱酌發雲貴兩廣烟瘴少輕地方交與地方管管束一直𨽻各省凡遇流寓之人於該省犯流者若計本犯原籍應流之地即係該犯流寓之所令各該督撫按所犯應流道里逺近分别改發一凡各省民人在别省犯該軍流并免死減等之犯除本犯有應追銀兩訊明本犯原籍産業可以變賠者仍照例解回原籍發配外其贓項已經追完及移查原籍實無産業者承審官即按本犯原籍應流應充軍地方起解發配一各省民人在外犯該徒罪例應遞回原籍發配者如遇隆冬盛暑除抵籍不逺仍遞解外其離原籍一千里外者亦照軍流例停解一文武員弁犯徒及總徒四年准徒五年者即在犯事地方定驛發配俟年限滿日釋放回籍其有應折枷號鞭責者仍照例辦理一各省遷徙土司若本犯身故該管地方即行文原籍督撫將該犯家口應否回籍之處酌量奏閒請㫖定奪一凡下五旂包衣人經該王門上送部發遣者由部核准即咨送該王門上轉發打牲烏喇其因公事犯罪應發遣者仍酌發黒龍江等處一奉天所屬民人有犯軍流徒罪及邉外為民者俱照各省民人犯罪例一體問發均不准折枷完結一凡直省内有苗民雜處之地凡發到軍流等犯令解巡撫衙門就地方情形通融𣲖撥不得與苗民聚處致生事端一凡各省發遣廣西軍流等犯統於民官所屬州縣内照該犯應配道里逺近酌量安置不得撥發土司所屬地方一起解軍流人犯除應遣府州仍照軍流道里表指定發解外其府州所屬之州縣聽督撫查明各該地方在配軍流多寡均匀發配至廣東瓊連二屬俱照四川湖南有苗省分之例令巡撫酌量𣲖撥其改發廣東烟瘴少輕人犯不必拘定東莞香山等二十縣亦俱解赴巡撫衙門酌量地方分撥各省有烟瘴者均照此例一部發外遣人犯該將軍於黒龍江吉林寧古塔三姓等處均匀發遣分别安插仍於年底將三處安插人犯各數彚題一八旗逃人匪類犯該發遣者令黒龍江吉林寧古塔將軍酌量各該處所屬地方大小分發安插嚴行約束如有不知改悔即照例報部改發雲貴兩廣等處仍將毎年有無改發之處於年終彚奏至民人有犯外遣内如强盗免死減等者强盜已行而不得財者開窰誘取婦人子女勒賣為從者造䜟緯妖書傳用惑人不及衆者師巫假降邪神並一應左道異端之術煽惑人民為從者聚衆十人以上帯有軍器興販私鹽拒捕傷一人為從下手者叛案縁坐應給兵丁為奴者俱照例解部發黑龍江等處給與披甲人為奴餘俱改發雲南等省烟瘴地方管束一改發烏魯木齊等處人犯如旗人曽任職官及另户正身民人舉監生員以上並職官子弟俱發往當差餘俱給與兵丁為奴一凡苗疆地方如軍流徒遣等内民人有捏稱土苗希圖折枷免徙者事發之日除按其本律治罪外仍先於本地方枷號一箇月再行充發其捏結之隣保人等審明有無賄縱徇隠分别治罪如犯該斬絞者亦令承審官於定案時查取保隣切實甘結存案如有捏結亦照例分别治罪其失察官員俱視本犯之罪分别察議一直省軍流遣犯除盛暑停遣及遇隆冬發往西北各省地方亦照例停遣外其發往東南省分有情願赴配者取具本犯確供一體起解其不願者聽惟雲南省並無盛暑嚴寒各省解往軍流遣犯雖遇隆冬六月不必停遣一發遣烏魯木齊等處人犯解至陜省雖遇隆冬盛暑不准停遣一雲南貴州苗人犯該徒流軍遣仍照舊例枷責完結其情節較重或再犯不悛將本犯照例折枷後仍同家口各就土流所轄一併遷徙安插至苗人中有薙髪衣冠與民人無别者犯罪到官悉照民例治罪一兇徒因事忿爭執持軍器毆人至篤疾者偷盜圍塲木植牲畜犯至三次者旗下正身犯積匪者拿獲逃人不將實在窝留之人指出再行妄扳者移住拉林閒散滿洲有犯二次逃走尚未出境者派往各省駐防滿洲兵丁臨行及中途脱逃者除老疾殘廢及年逾五十不能耕作之人仍照原例辦理外餘均僉妻改發烏魯木齊等處給與兵丁為奴如起解在途並到配之後有脱逃及不服拘管者獲曰請㫖即行正法其尋常過犯酌量嚴行懲治一三次犯竊計贓五十兩以下至三十兩者搶竊滿貫擬絞秋審緩決一次者竊盜三犯贓至五十兩擬絞秋審緩決一次者積匪猾賊並回民犯竊結夥三人以上及執持繩鞭器械者發遣雲貴兩廣烟瘴刨參人犯在配脱逃者仍照原例所定地方發遣强盜窩主造意不行又不分贓者竊盜臨時拒捕傷非金刃傷輕平復者搶奪傷人為從者發掘他人墳塚見棺槨為首又開棺見屍為從者竊贓數多罪應滿流者三次犯竊計贓三十兩以下至十兩者前項人犯從前已照原例應配地方充發在配為匪脱逃者殺一家非死罪三人之妻子並未同謀加功者俱照原例所定地方各加一等改發行竊軍犯在配復行竊者改發極邊烟瘴充軍姦婦抑媳同陷邪淫致媳情急自盡者盛京旗下家奴為匪逃走犯至二次者俱酌發駐防兵丁為奴此等人犯如有脱逃被獲將該犯請㫖即行正法一發遣烏魯木齊等處人犯如有越獄脱逃照遣所及中途脱逃例拿獲之日請㫖即行正法一發遣巴里坤及烏魯木齊等處逃犯經原籍及路過省分盤獲者移訊明確即由各省督撫自行奏聞於拿獲處所正法示衆一發往伊犁烏魯木齊等處為奴人犯令該管大臣均匀酌撥與察哈爾兵丁及種地兵丁為奴如察哈爾兵丁係永逺屯駐者發給人犯即永逺為奴其種地兵丁給與為奴人犯如在烏魯木齊以内者聽陜甘總督酌量分發在烏魯木齊以外者聽伊犁烏魯木齊大臣酌量分發俱於派撥之時令該管官將某犯給與某營兵丁之處詳記檔案至換班時交代與接班兵丁為奴或該兵丁等撤回内地及調往他所並無接班之人亦令該管官將該犯等另行撥給附近種地兵丁隨同力作一烏魯木齊等處安插兵民犯該徒罪者照犯罪免發遣折枷例加一等折枷免其充徒係民仍令種地係兵交地方官指給地畝耕種納糧犯該軍流者除照例折責外仍留烏魯木齊照發來種地人犯分給屯鄉與種地兵丁一體種地納糧倘犯該軍流者復有滋事脱逃等情枷號兩箇月改給烏魯木齊種地兵丁為奴如換班緑旗兵丁犯該徒罪者不必發往内地仍留烏魯木齊不給口糧在種地處効力照應徒年限扣算滿日再行發回犯該軍流罪者仍照例按其應配軍流地方配發内地至貿易商民犯該軍流徒罪俱解往内地照例辦理一新疆各城駐劄官員兵丁跟役内如有酗酒滋事者即由彼處發往伊犁等處給與兵丁額魯特為奴如在回人各城内即彼此易地調發與回人等為奴若發遣之後仍不悛改即行正法一凡各省應發烟瘴地方人犯無論在四千里内外均編發有烟瘴省分安置其籍𨽻烟瘴之雲南貴州廣東廣西四省應發烟瘴人犯應於隔逺烟瘴省分調發廣東省與雲南省互調廣西省與貴州省互調至不足四千里隣近烟瘴之湖南福建四川三省應發烟瘴人犯湖南省發往雲南福建省發往貴州四川省發往廣東其餘各省有距烟瘴省分較逺者如奉天府属應發烟瘴人犯編發廣西貴州二省甘肅之甘州凉州西寧安西寧夏等府及肅州各属應發烟瘴人犯編發雲南貴州二省均解交各該廵撫衙門酌撥安置一新疆改發内地人犯仍照發新疆人犯例雖遇隆冬盛暑不准停遣充軍地方凡問該充軍者附近發二千里近邊發二千五百里邊遠發三千里極邊烟瘴俱發四千里定地發遣充軍人犯在京兵部定地在外巡撫定地仍抄招知㑹兵部其問邊外為民者抄招解送户部編發直𨽻布政司府分發山東附近山西附近近邊江南附近近邊邊逺湖廣附近近邊邊逺陜西附近近邊邊逺極邊浙江近邊邊逺極邊江西極邊廣東烟瘴地方江南布政司府分發湖廣附近山東附近近邊浙江附近近邊陜西附近近邊邊逺極邊直𨽻附近近邊邊逺山西近邊極邊廣東邊逺極邊烟瘴地方山東布政司府分發登州府附近直𨽻附近近邊江南附近近邊邊逺山西附近近邊邊逺浙江附近近邊邊逺極邊陜西近邊邊逺極邊廣東烟瘴地方山西布政司府分發山東附近近邊江南附近近邊邊逺陜西附近近邊邊逺極邊湖廣附近近邊邊逺極邊浙江邊逺極邊江西邊逺廣東極邊烟瘴地方河南布政司府分發山東附近山西附近近邊湖廣附近近邊直隸附近江南附近近邊邊逺極邊陜西附近近邊邊逺極邊浙江附近近邊邊逺極邊廣東邊逺極邊烟瘴地方陜西布政司府分發寧夏衞河州衞附近直隸附近山西附近本都行都司附近近邊邊逺山東附近近邊邊逺極邊湖廣附近近邊邊逺極邊江南近邊邊逺極邊廣東邊逺極邊烟瘴地方浙江布政司府分發江南附近近邊邊逺山東附近近邊邊逺湖廣附近近邊邊逺直隸近邊邊逺極邊山西極邊陜西極邊廣東烟瘴地方江西布政司府分發山東附近浙江附近湖廣附近近邊廣東附近近邊邊逺直隸近邊邊逺極邊山西極邊陜西極邊四川極邊地方湖廣布政司府分發襄陽府附近江