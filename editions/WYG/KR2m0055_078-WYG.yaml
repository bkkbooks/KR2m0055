  text: 欽定四庫全書大清律例卷三十一
  hash: sha256:66b94bfbc4bcaf7cc7922ddc582830f455c93f9f49adb165c7217482bb472128
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0055_WYG_078-1a, image: WYG0673/WYG0673-0052c.png}
body:
  text: 刑律受贓官吏受財凡官吏因枉法不枉法事受財者計贓科斷無祿人各減一等官追奪除名吏罷役贓止一兩俱不敘用説事過錢者有禄人減受錢人一等無禄人減二等如求索科歛嚇詐等贓及事後受財過付者不用此律罪止杖一百徒二年照遷徙比流減半科罪有贓者過錢而又受錢計贓從重論若贓重從本律有禄人凡月俸一石以上者枉法贓各主者通算全科謂受有事人財而曲法處斷者受一人財固全科如受十人財一時事發通算作一處亦全科其罪若犯二事以上一主先發已經論決其他後發雖輕若等亦並論之一兩以下杖七十一兩至五兩杖八十一十兩杖九十一十五兩杖一百二十兩杖六十徒一年二十五兩杖七十徒一年半三十兩杖八十徒二年三十五兩杖九十徒二年半四十兩杖一百徒三年四十五兩杖一百流二千里五十兩杖一百流二千五百里五十五兩杖一百流三千里八十兩實絞監候不枉法贓各主者通算折半科罪雖受有事人財判斷不為曲法者如受十人財一時事發通算作一處折半科罪一主者亦折半科罪准折半者皆依此一兩以下杖六十一兩之上至一十兩杖七十二十兩杖八十三十兩杖九十四十兩杖一百五十兩杖六十徒一年六十兩杖七十徒一年半七十兩杖八十徒二年八十兩杖九十徒二年半九十兩杖一百徒三年一百兩杖一百流二千里一百一十兩杖一百流二千五百里一百二十兩杖一百流三千里一百二十兩以上實絞監候無禄人凡月俸不及一石者枉法扶同聴行及故縱之類一百二十兩絞監候不枉法一百二十兩以上罪止杖一百流三千里條例一各部院衙門書辦有輒敢指稱部費招摇撞騙干犯國憲非尋常犯贓可比者發覺審實即行處斬為從知情朋分銀兩之人照例發徃雲貴兩廣烟瘴少輕地方嚴行管束一凡在官人役取受有事人財律無正條者果於法有枉縱俱以枉法計贓科罪若屍親隣証等項不係在官人役取受有事人財各依本等律條科斷不在枉法之律一貪贓官役罪至死而免死減等發落及罪不至死擬流者並發川陜邉省令該督撫按其原罪定地逺近安插為民一凡衙門蠧役恐嚇索詐十兩以上者發近邉充軍至一百二十兩者照枉法擬絞其或索詐貧民致令賣男鬻女者十兩以下亦照例充發為從分贓者不計贓並杖一百徒三年如有嚇詐致斃人命不論贓數多寡擬絞監候一縣總理書如犯贓入巳者照衙役犯贓擬罪不准折贖保人歇家串通衙門行賄者照不係在官人役取受有事人財科斷一凡正身衙役違禁私帶白役者並杖一百革役如白役犯贓照衙役犯贓例治罪正身衙役知情同行者與同罪不知情不同行者不坐一司道府州縣等官不時察訪衙蠧申報該督撫究擬若該管官員不行察報經督撫上司訪拿或别經發覺者照徇庇例交該部議處如督撫不行訪叅者亦交該部議處其訪拿衙蠧並贓私數目仍應年底造册題報一直省書役年滿缺出遵例召募有暗行頂冒買索取租銀者缺主照枉法受財律計贓定擬至八十兩者絞頂缺之人照以財行求律至五百兩者杖一百徒三年出結人等依不應重杖八十該管官員交部議處倘該督撫陽奉隂違亦照例議處其年滿考職時務令填寫並無假姓冒籍字様方准收考若有冒籍冒名等弊事發者革去職銜杖一百不能稽查之該管等官俱交部議處至各衙門一切案件若假手書吏以致定稿時髙下其手駁詰不已有贓者照枉法受財律科斷無贓者依不應重律杖八十革役該管官員照例議處如該督撫不行題叅亦交部議處一凡各衙門書吏如有舞文作弊者係知法犯法應照平人加一等治罪一凡上司經過屬員呈送下程及供應夫馬車輛一切漏規俱行革除如屬員仍有供應上司仍有勒索者俱革職提問若督撫不行題叅照例議處其上司随役家人私自索取本官不知情者照例議處如知情故縱罪坐本官照求索所部財物律治罪其随役家人照在官求索無禄人減一等律治罪并許被索之屬員據實詳掲若屬員因需索濫行供應及上司因不迎送供應别尋他事中傷屬員者將屬員及各上司照例分别議處一書吏舞文作弊其知情不首之經承貼寫俱照本犯罪減一等發落如有將書吏情弊查出舉首三次者係書吏不論己未期滿准其考職即用如係貼寫准其與期滿之書吏一體考職倘有不肖之徒希圖考職及懐挾私讐妄行出首者照誣告律從重治罪一督撫司道各上司差役擾害鄉民許州縣查拿并被害人呈告將該役照例治罪一除審無入巳坐贓致罪者果能於限内全完仍照那移虧空錢糧之犯准其減免外若官吏因事受財貪婪入已審眀不枉法及律載准枉法不枉法論等贓果於一年限内全完死罪照原擬減一等改流軍流以下各減一等發落倘限内不完死罪仍照原擬監追流罪以下即行發落其應追贓物照例勒追完結一官員婪贓審係枉法入巳者雖於限内全完不准減等其不枉法贓及准枉法論並坐贓致罪等項仍照定例辦理坐贓致罪凡官吏人等非因枉法不枉法之事而受人之財坐贓致罪各主者通算折半科罪與者減五等謂如被人盜財或毆傷若賠償及醫藥之外因而受財之類各主者並通算折半科罪為兩相和同取與故出錢人減受錢人罪五等人如擅科歛財物或多收少徵如收錢糧税糧斛面及檢踏災傷田糧與私造斛斗秤尺各律所載雖不入巳或造作虚費人工物料之類凡罪由此贓者皆名為坐贓致罪出官吏坐贓若不入巳者擬還職役錢人有規避事重者從重論一兩以下笞二十一兩之上至十兩笞三十二十兩笞四十三十兩笞五十四十兩杖六十五十兩杖七十六十兩杖八十七十兩杖九十八十兩杖一百一百兩杖六十徒一年二百兩杖七十徒一年半三百兩杖八十徒二年四百兩杖九十徒二年半五百兩罪止杖一百徒三年以坐贓非實贓故至五百兩罪止徒三年事後受財原在事後故别於受財律凡官吏有承行之事先不許財事過之後而受財事若枉斷者准枉法論事不枉斷者准不枉法論無祿人各減有祿人一等風憲官吏仍加二等若所誥枉重者仍從重論官吏俱照例為民但不追奪勅律不言出錢過錢之人罪問不應從重可也官吏聴許財物原未接受故别於事後受財律凡官吏聴許財物雖未接受事若枉者准枉法論事不枉者准不枉法論各減受財一等所枉重者各從重論必自有其顯跡有數目者方坐凡律稱准者至死減一等雖滿數亦罪止杖一百流三千里此條既稱准枉法論又稱減一等假如聴許准枉法贓滿數至死減一等杖一百流三千里乂減一等杖一百徒三年方合律此正所謂犯罪得累減也此眀言官史則其餘雖在官之人不用此律條例一聴許財物若甫經口許贓無確據不得槩行議追如所許財物封貯他處或寫立議單文劵或交與説事之人應向許財之人追取入官若本犯有應得之罪仍照律科斷如所犯本輕或本無罪但許財營求者止問不應重律其許過若干實交若干者應分别已受未受數目計贓並所犯情罪從重科斷已交之贓在受財人名下著追未交之財仍向許財人名下著追有事以財請求凡諸人有事以財行求官吏欲得枉法者計所與財坐贓論若有避難就易所枉法之罪重於與財者從重論其贓入官其官吏刁蹬用强生事逼抑取受者出錢人不坐避難就易謂避難當之重罪就易受之輕罪也若他律避難則指難解錢糧難捕盜賊皆是條例一凡有以財行求及説事過錢者審實皆計所與之贓與受財人同科仍分有祿無祿有祿人概不減等無祿人各減一等其行求説事過錢之人如有首從者為首照例科斷為從有祿之人聴減一等無祿人聴減二等如抑勒許索取財者與財人及説事過錢人俱不坐至於别行餽送不係行求仍照律擬罪在官求索借貸人財物凡監臨官吏挾勢及豪强之人求索借貸所部内財物並計索借之贓准不枉法論强者准枉法論財物給主無祿人各減有祿人一等若將自己財物散與部民及低價買物多取價利者並計餘利准不枉法論强者准枉法論物貨價錢並入官給主賣物則物入官而原得價錢給主買物則物給主而所用之價入官此下四條盖指監臨官吏而豪强亦包其中若於所部内買物不即支價及借衣服器玩之屬各經一月不還者並坐贓論仍追物還主若私借用所部内馬牛駝驘驢及車船碾磨店舍之類各驗日計雇賃錢亦坐贓論追錢給主計其犯時雇工賃直雖多不得過其本價若接受所部内餽送土宜禮物受者笞四十與者減一等若因事在官而受者計贓以不枉法論其經過去處供餽飲食及親故餽送者不在此限其出使人於所差去處求索借貸賣買多取價利及受餽送者並與監臨官吏罪同若去官而受舊部内財物及求索借貸之屬各減在官時三等條例一凡外任旗員該旗都統叅領等官有於出結時勒索重賄及得缺後要挾求助或該旗本管官王貝勒及門上人等有勒取求索等弊許本官據實密詳督撫轉奏倘督撫贍顧容隠許本官直掲都察院轉為密奏倘不為奏聞許各御史據掲密奏一文武各官索取土官外國猺獞財物犯該徒三年以上者俱發近邉充軍一雲貴兩廣四川湖廣等處流官擅自科歛土官財物僉取兵夫徴價入已强將貨物發賣多取價利贓至該徒三年以上者俱發近邉充軍若買賣不曽用强及贓數未至滿徒者按律計贓治罪其科歛財物眀白公用僉取兵夫不曽徴價者照常發落一苖蠻黎獞等僻處外地之人并改土歸流地方如該管官員有差遣兵役騷擾逼勒科𣲖供應等弊因而激動番蠻者照引惹邉釁例從重治罪一凡出差巡察之員所到州縣地方如有收受門包與者照鑽營請託例治罪受者照婪贓納賄例治罪該督撫不行查察交部議處一各上司如有勒薦幕賔長随者許屬員掲報將勒薦之上司照例革職其幕賔長随鑽營上司引薦在各衙門舞弊詐財者計贓以枉法論幕賔照衙門書吏加等治罪例治罪長随照衙門蠧役恐嚇索詐十兩以上例治罪如鑽營引薦别無情弊但盤踞屬員衙門者幕賔照書役年滿不退例杖一百徒三年長隨枷號一個月杖一百各遞回原籍分别發落其屬員徇隠不行掲報者照例革職若屬員營求上司因所薦幕賔長随有勾通行賄等弊照例分别議處治罪一長随求索嚇詐得財舞弊者照蠧役詐贓例治罪並照竊盜例初犯以贓犯二字刺臂再犯刺而其有索詐禁贓托故先期預遁及本官被叅後聞風逺颺者拿獲之日照到官後脱逃例各加二等治罪仍追原贓其各衙門現任大小官員如有收用刺字長随者交部議處家人求索凡監臨官吏家人兄弟子姪奴僕皆是於所部内取受所求索借貸財物依不枉法及役使部民若買賣多取價利之類各減本官吏罪三等分有禄無禄須確係求索借貸之項方可依律減等若因事受財仍照官吏受財律定罪不准減等若本官吏知情與同罪不知者不坐條例一執事大臣不行約束家人致令私向所管人等徃來交結借貸者一經發覺將伊主一併治罪風憲官吏犯贓凡風憲官吏受財及於所按治去處求索借貸人財物若因買賣多取價利及受餽送之類各加其餘官吏受財以下各欵罪二等加罪不得加至於死如枉法贓須至八十兩方坐絞不枉法贓須至一百二十兩之上方坐絞風憲吏無禄者亦就無禄枉法不枉法本律斷其家人如確係求索借貸得減本官所加之罪二等若因事受財不准減等本官知情與同罪不知者不坐因公科歛凡有司官吏人等非奉上司眀文因公擅自科歛所屬財物及管軍官吏科歛軍人錢糧賞賜者雖不入已杖六十贓重者坐贓論入已者並計贓以枉法論無禄人減有禄人之罪一等至一百二十兩絞監候其非因公務科歛人財物入已者計贓以不枉法論無禄人罪止杖一百流三千里若餽送人者雖不入已罪亦如之條例一凡京城及外省衙門不許罰取紙劄筆墨銀硃器皿錢榖銀兩等項違者計贓論罪若有指稱修理不分有無罪犯用强科罰米榖至五十石銀至二十兩以上縜帛貴細之物直銀二十兩以上者事發交部照例議處一江南江西湖廣地方及黄運兩河遇有公事該督撫查實題請定奪不許輒𣲖商捐倘地方官有私行勒𣲖者即行題叅治罪該督撫失於覺察一併交部議處尅留盜贓凡巡捕官已獲盜賊尅留贓物不解官者笞四十入已者計贓以不枉法論仍將其所尅之贓併解贓通論盜罪若軍人弓兵有犯者計贓雖多罪止杖八十仍併贓以論盜罪條例一胥捕侵剥盜贓者計贓照不枉法律從重科斷私受公侯財物凡内外武官不得於私下或眀白接受公侯伯所與金銀段疋衣服糧米錢物若受者杖一百罷職發邉逺充軍再犯處死公侯與者初犯再犯免罪三犯奏請區處若奉命征討與者受者不不此限或絞或斬律無眀文但初犯充軍即流罪也再犯加至監侯絞以其子係公侯伯應請自上裁大清律例卷三十一
