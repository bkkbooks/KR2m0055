body:
  text: 律例館總裁戸部尚書文華殿大學士臣張玉書等謹題為恭繕律文名例先呈御覽仰祈睿鑒裁定事竊惟帝王好生首重民命國家垂憲務定刑書臣等奉命重修律例自顧才識謭陋夙夜凜凜懼不勝任欽惟我聖上至仁如天羣生率育凡有刑獄奏讞聖心輒加矜憫時於無可寛釋之中曲求格外生全之路每一嵗之内特㫖免死寛減者甚多湛恩汪濊洽於海隅歴稽前史實所罕覯臣等敬體皇上明慎用刑至意詳閱全律逐條辯晰以刑部見行例分别載入律内有滿漢文義互相叅差者通加改正或罪有本律而例係重複者即行刪除或名目事款舊有今無及舊無今有者酌量增刪或一款應分兩條或數條同屬一類者悉與分併其今雖不行而宜備叅考者仍照例附載以備引證别部事例間有與律義相合者亦照刑部見行例採入如律例内有應具題請㫖者俟另題請㫖至於律文仿自唐律辭簡義該誠恐講晰未明易致訛舛臣等彚集衆說於每篇正文後增用總註疏解律義期於明白曉暢使人易知今酌定名例四十六條已㑹集九卿詹事科道面同勘閲謹錄滿漢文各六本遵照前題先呈御覽伏冀皇上睿鑒裁定俾立一代之章程示萬世以法守候命下後即將全律依式纂成次第繕寫恭進臣等不勝悚慄之至謹題請㫖等因於康熙三十四年二月初九日題三十六年十一月十二日奉㫖新纂律書名例朕已覽閲奏聞後又有更改處發囘刑部將更改之處增入著九卿看閲具奏
