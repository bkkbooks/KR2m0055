body:
  text: 刑律鬬毆上鬬毆相争為鬬相打為毆凡鬬毆與人相争以手足毆人不成傷者笞二十但毆即坐成傷及以他物毆人不成傷者笞三十他物毆人成傷者笞四十所毆之皮膚青赤而腫者為傷非手足者其餘所執皆為他物即持兵不用刃持其背柄以毆人亦是他物拔髪方寸以上笞五十若毆人血從耳目中出及内損其臟腑而吐血者杖八十若止皮破血流及鼻孔出血者仍以成傷論以穢物汚人頭面者情固有重於傷所以罪亦如之杖八十折人一齒及手足一指眇人一目尚能小視猶未至瞎抉毁人耳鼻若破傷人骨及用湯火銅鐵汁傷人者杖一百以穢物灌入人口鼻内者罪亦如之杖一百折二齒二指以上及盡髠去髮者杖六十徒一年髠髪不盡仍堪為髻者止依㧞髮方寸以上論折人肋眇人兩目墮人胎及刃傷人者杖八十徒二年墮胎者謂辜内子死及胎九十日之外成形者乃坐若子死辜外及墮胎九十日之内者仍從本毆傷法論不坐墮胎之罪折跌人肢手足體腰項及瞎人一目者皆成廢疾杖一百徒三年瞎人兩目折人兩肢損人二事以上二事如瞎一目又折一肢之類及因舊患令至篤疾若㫁人舌令人全不能説話及毁敗人隂陽者以至不能生育並杖一百流三千里仍將犯人財産一半㫁付被傷篤疾之人養贍若將婦人非理毁壞者止科其罪以不妨生育不在㫁付財産一半之限同謀共毆傷人者各以下手傷重者為重罪原謀或不曽下手或雖毆而傷輕減傷重者一等凡鬬毆不下手傷人者勿論惟毆殺人以不勸阻為罪若同謀毆人至死雖不下手及同行知謀不行救阻者各依本律並杖一百如共毆人傷皆致命以最後下手重者當其重罪如亂毆不知先後輕重者或二人共打一人其傷同處或二人同時各瞎人一目並須以原謀為首餘人為從若無原謀以先鬬人為首若因鬬互相毆傷者各驗其傷之輕重定罪後下手理直者減本等罪二等至死及毆兄姊伯叔依本律定擬雖後下手理直者不減如甲乙互相鬬毆甲被瞎一目乙被折一齒則甲傷為重當坐乙以杖一百徒三年乙被傷輕當坐甲以杖一百若甲係後下手而又理直則於杖一百上減二等止杖八十乙後下手理直則於杖一百徒三年上減二等止杖八十徒二年或至篤疾仍㫁財養贍若毆人至死自當抵命條例一兇徒因事忿争執持刀鎗弓箭銅鐵簡劍鞭斧扒頭流星骨朶麥穗秤錘兇器但傷人及誤傷旁人與凡剜瞎人眼晴折跌人肢體全抉人耳鼻口唇㫁人舌毁敗人隂陽者俱發近邊充軍若聚衆執持兇器傷人及圍繞房屋搶檢家財棄毁器物姦滛婦女除實犯死罪外徒罪以上不分首從發邊逺充軍雖執持兇器而未傷人者杖一百執兇器自傷者亦杖一百其傷人之犯有能首先挐獲者官給賞銀十五兩其次協挐者給賞銀十兩再次協挐者給賞銀五兩未傷人者不在給賞之限其捕挐受傷之人除官給賞銀外仍驗傷痕等第於犯人名下追給傷銀若果有瘋疾依過失傷人律收贖將贖銀給付被傷之人一䕶軍兵丁及食糧當差人役若執持金刃傷人或自傷者除革役照律例問擬外永不准食糧閒散人有犯立案永不准食糧充役一沿江濱海有持鎗執棍混行鬬毆將兩造為首及鳴鑼聚衆之犯杖一百流三千里傷人之犯杖一百徒三年其附和未傷人者各枷號一個月責四十板一匪徒因事忿争執持褲刀傷人者照兇器傷人例發近邊充軍一兇徒因事忿争執持軍器毆人至篤疾應發近邊充軍者如年力强壯僉妻改發烏魯木齊等處為奴一不法匪徒因事忿争執持梭標傷人者照兇器傷人例發近邊充軍保辜限期保養也辜罪也保辜謂毆傷人未至死當官立限以保之保人之傷正所以保己之罪也凡保辜者先驗傷之重輕或手足或他物或金刃各明白立限責令犯人保辜醫治辜限内皆須因原毆之傷死者如打人頭傷風從頭瘡而入因風致死之類以鬬毆殺人論絞其在辜限外及雖在辜限内原毆之傷已平復官司文案明白被毆之人别因他故死者謂打人頭傷不因頭瘡得風别因他病而死者是為他故各從本毆傷法不在抵命之律若折傷以上辜内醫治平復者各減二等下手理直減毆傷二等如辜限内平復又得減二等此所謂犯罪得累減也辜内雖平復而成殘廢篤疾及辜限滿日不平復而死者各依律全科全科所毆傷殘廢篤疾之罪雖死亦同傷論手足及以他物毆傷人者其傷輕限二十日平復以刃及湯火傷人者限三十日折跌肢體及破骨墮胎者無論手足他物皆限五十日條例一凡京城内外及各省州縣遇有鬬毆傷重不能動履之人或具控到官或經挐獲及巡役地保人等指報該管官即行帶領仵作親往驗看訊取確供定限保辜不許扛擡赴驗倘内外該管衙門遇有傷重不能動履之人仍令扛擡聴候驗看者各該上司察實指叅交部議處一凡鬬毆傷重之人除附近城郭以及事簡州縣照例正印官親詣驗看外其離城窵逺之區及繁冗州縣委係不能逐起驗看者許委佐貳巡捕等官代往據實驗報仍聴州縣官定限保辜倘佐貳巡捕等官驗報不實照例議處如州縣官怠弛推諉槩委佐貳巡捕等官代驗致滋擾累揑餙等弊仍照定例議處一鬬毆傷人辜限内不平復延至限外若手足他物金刃及湯火傷限外十日之内折跌肢體及破骨墮胎限外二十日之内果因本傷身死情正事實者方擬死罪奏請定奪此外不許一槩濫擬瀆奏一原毆傷輕不至於死者越數日後或因傷風身死將毆打之人免其抵償杖一百流三千里其因患他病身死與本傷無涉者雖在辜限之内仍依律從本毆傷法一原毆傷輕因風身死除在保辜正限内死者將毆打之人照例擬流及在正限後十日外死者止科傷罪外其雖過正限尚在十日之内死者照毆人至廢疾律杖一百徒三年一州縣承審鬬毆受傷及畏罪自戕案件一面撥醫調治速痊一面訊取確供提集案犯即行審理完結不得以傷痊之日起限如有藉詞扣展致有遲延拖累者照例查叅議處一卑幼毆傷緦麻尊長餘限内果因本傷身死仍擬死罪奏請定奪如蒙寛減減為杖一百發邊逺充軍宫内忿爭凡於宫内忿争者笞五十忿争之聲徹於御在所及相毆者杖一百折傷以上加凡鬬傷二等若於臨朝之殿内又遞加一等遞加者如於殿内忿争者加一等杖六十其聲徹於御在之所及殿内相毆者加一等杖六十徒一年至於折傷以上加宫内折傷之罪一等又加凡鬬傷罪二等共加三等雖至篤疾並罪止杖一百流三千里至死者依常律㫁被毆之人雖至殘廢篤疾仍擬杖一百收贖篤疾之人與有罪焉故不㫁財産養贍條例一凡太監在紫禁城内持金刃自傷者斬立決在紫禁城外皇城内持金刃自傷者斬監候宗室覺羅以上親被毆凡宗室覺羅而毆之者雖無傷杖六十徒一年傷者杖八十徒二年折傷以上本罪有重於杖八十徒二年者加凡鬬二等止杖一百徒三年緦麻以上兼毆傷言各遞加一等止杖一百流三千里不得加入於死篤疾者絞監候死者斬監候毆制使及本管長官凡朝臣奉制命出使而所在官吏毆之及部民毆本屬知府知州知縣軍士毆本管官若吏卒毆本部五品以上長官杖一百徒三年傷者杖一百流二千里折傷者絞監候不言篤疾者亦止於絞若吏卒毆六品以下長官各兼毆與傷及折傷而言減五品以上罪三等軍民吏卒毆佐貳官首領官又各遞減一等佐貳官減長官一等首領減佐貳一等如軍民吏卒減三等各罪輕於凡鬬及與凡鬬相等皆謂之減罪輕者加凡鬬兼毆與傷及折傷一等篤疾者絞監候死者不問制使長官佐貳首領並斬監候若流外雜職官及軍民吏卒毆非本管三品以上官者杖八十徒二年傷者杖一百徒三年折傷者杖一百流二千里毆傷非本管五品以上官者減三品以上罪二等若減罪輕於凡鬬傷及毆傷九品以上至六品官者各加凡鬬傷二等不言折傷篤疾至死者皆以凡鬬論其公使人在外毆打所在有司官者罪亦如之亦照毆非本管官之品級科罪從被毆所屬上司拘問如統屬州縣官毆知府固依毆長官本條減吏卒二等若上司官小則依下條上司官與統屬官相毆科之首領毆衙門長官固依毆長官本條減吏卒二等若毆本衙門佐貳官兩人品級與下條九品以上官同則依下條科之若品級不與下條同則止依凡鬬如佐貳首領自相毆亦同凡鬬論罪條例一因事聚衆將本管官及公差勘事催收錢糧等項一應監臨官毆打綁縛者不分首從屬軍衛者發極邊充軍屬有司者發邊外為民若止毆打為首者照前問發為從與毁罵者武職并總隊文職并監生生員冠帶官吏典承差俱革去職役依律問擬為民軍民人等各枷號一個月仍照律擬㫁發落其本管并監臨官與軍民人等飲酒賭博宿娼自取陵辱者不在此例一凡軍民人等毆死在京見任官員照毆死本管官律擬斬監候若謀死者擬斬立決一八旂兵丁並無私讐别故因管教將本管官戳死者本犯即行正法妻子發遣黒龍江領催族長各鞭一百若閒散及䕶軍披甲人記讐將該管官動兵刃致傷者本犯即行正法妻子免發遣領催族長各鞭五十若殺死者領催族長各鞭八十係官交部議處其平日不能管教之該管各官交部分别議處一部民軍士吏卒犯罪在官如有不服拘挐不遵審㫁或懐挾私讐及假地方公事挺身閙堂逞兇殺害本官者挐獲之日無論本官品級及有無謀故已殺者不分首從皆斬立決已傷者為首照光棍例斬決為從下手者絞候其聚衆四五十人者仍照定例科罪其於非本屬本管本部各官有犯或該管官任意陵虐及不守官箴自取侮辱者各按其情罪輕重臨時酌量比引辦理一軍民人等毆傷本管官及非本管官如係邂逅干犯或與軍民人等飲酒賭博宿娼自取陵辱者俱照律例定擬外其有釁起索欠等事本非理曲因而有犯者各照毆傷應得流徒原律酌減二等問罪其自行取辱之職官交部議處佐職統屬毆長官凡本衙門首領官及所統屬官毆傷長官者各減吏卒毆傷長官二等不言折傷者若折傷不至篤疾止以傷論佐貳官毆長官者不言傷者即傷而不至篤疾止以毆論又各減首領者之罪二等若減二等之罪有輕於凡鬬或與凡鬬相等而減罪輕者加凡鬬一等謂其有統屬相臨之義篤疾者絞監候死者斬監候上司官與統屬官相毆凡監臨上司之佐貳首領官與所統屬之下司官品級髙者及與部民有髙官而相毆者並同凡鬬論一以監臨之重一以品級之崇則不得以下司部民拘之若非相統屬官品級同自相歐者亦同凡鬬論九品以上官毆長官凡流内九品以上官毆非本管三品以上之尊官者不問長官佐貳杖六十徒一年但毆即坐雖成傷至内損吐血亦同折傷以上及毆傷非本管五品以上若五品以上毆傷非本管三品以上官者各加凡鬬傷二等不得加至於死蓋官品相懸則其罪重名位相次則其罪輕所以辨貴賤也拒毆追攝人凡官司差人下所屬追徴錢糧勾攝公事而納户及應辦公事人抗拒不服及毆所差人者杖八十若傷重至内損吐血以上及所毆差人或係職官或係親屬尊長本犯毆罪重於凡人鬬毆者各於本犯應得重罪上仍加二等罪止杖一百流三千里至篤疾者絞監候死者斬監候此為納户及應辦公事之人本非有罪而恃强違命者而言若税糧違限公事違錯則係有罪之人自有罪人拒捕條毆受業師凡毆受業師者加凡人二等死者斬凡者非徒指儒言百工技藝亦在内儒師終身如一其餘學未成或易别業則不坐如學業已成罪亦與儒並科條例一僧尼謀殺受業師者照謀殺大功尊長律已殺者斬決已傷者絞決已行未傷者流二千里毆故殺者亦照毆故殺大功尊長律斬決一凡僧尼道士如因弟子違犯教令以理毆責者照尊長毆卑幼律非折傷勿論折傷以上減凡人三等至死者照毆殺堂姪律杖一百流三千里僧尼毆受業師亦照卑幼毆大功尊長律問擬若僧尼道士因姦盗别情謀殺弟子者無論已傷未傷已殺未殺悉照凡人分别定擬其有挾嫌逞兇故殺弟子及毆殺内執持金刃兇器非理扎毆致死者亦同凡論匠藝人等致死弟子者亦如之威力制縛人凡兩相争論事理其曲直聴經官陳告裁決若豪强之人以威力挾制綑縛人及於私家拷打監禁者不問有傷無傷並杖八十傷重至内損吐血以上各驗其傷加凡鬬傷二等因而致死者絞監候若以威力主使他人毆打而致死傷者並以主使之人為首下手之人為從論減主使一等條例一在京在外無籍之徒投託勢要作為心腹誘引生事綁縛平民在於私家拷打脅騙財物者枷號一個月發烟瘴地面充軍勢要知情並坐誘引依教誘綁縛拷打依威力脅騙財物依恐嚇從重科罪須四事俱全方引此例一旂下家人莊頭等有在外倚勢害民把持衙門霸占子女將良民無故挐至私家綑縛拷打致死者除本犯照律例從重治罪外若係内府之人將該管官交該部議處係王貝勒貝子公家人將管理家務官亦交該部議處係民公侯伯大臣官員家人將各主交該部議處係平人鞭一百一凡地方鄉紳私置板棍擅責佃户者照違制律議處衿監革去衣頂杖八十照例准其收贖如將佃户婦女姦占為婢妾者絞監候如無犯姦情事照畧賣良人為妻妾律杖一百徒三年婦女給親完聚該地方官不預行嚴禁及被害之人告理而不即為查究者照狥庇例議處至有奸頑佃户拖欠租課欺慢田主者杖八十所欠之租照數追給田主一凡主使兩人毆一人數人毆一人致死者以下手傷重之人為從其餘皆為餘人若其人自盡則不可以致死之罪加之止照所傷擬罪如有致死重傷及成殘廢篤疾者依因事用强毆打例發近邊充軍良賤相毆凡奴婢毆良人或毆或傷或折傷者加凡人一等至篤疾者絞監候死者斬監候其良人毆傷他人奴婢或毆或傷或折傷篤疾者減凡人一等若死及故殺者絞監候若奴婢自相毆傷殺者各依凡鬬傷殺法相侵財物者如盜竊強奪詐欺誆騙恐嚇求索之類不用此加減律仍以各條凡毆傷殺法坐之若毆内外緦麻小功親之奴婢非折傷勿論至折傷以上至篤疾者各減殺傷凡人奴婢罪二等大功親之奴婢減三等至死者不問緦麻小功大功杖一百徒三年故殺者絞監候過失殺者各勿論若毆内外緦麻小功親之雇工人非折傷勿論至折傷以上至篤疾者各減凡人罪一等大功親之雇工人減二等至死及故殺者不問緦麻小功大功並絞監候過失殺者各勿論傭工之人與有罪縁坐為奴婢者不同然而有主僕之分故以家長之服屬親疎論不言毆期親雇工人者下條有家長之期親若外祖父母毆雇工人律也若他人雇工者當以凡論條例一凡奴僕毆辱職官者家長笞五十係官交該部議處大清律例卷二十七
