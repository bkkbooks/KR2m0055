front:
  text: 欽定四庫全書大清律例卷三十八
  hash: sha256:b73a635c561cb09c3e0ad253001f5b7b6afc75f2d6add5f2953c944764fc7dcd
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0055_WYG_092-1a, image: WYG0673/WYG0673-0168a.png}
body:
  text: 工律營造擅造作凡軍民官司有所營造應申上而不申上應待報而不待報而擅起差人工者即不科斂財物各計所役人雇工錢每日八分五釐五毫以坐贓致罪論若非法所當為而輒行營造及非時所可為而輒行起差人工營造者雖已申請得報其計役坐贓之罪亦如不申上待報者坐之其軍民官司如遇城垣坍倒倉庫公廨損壞事勢所不容緩一時起差丁夫軍人修理者雖不申上待報不為擅専不在此坐贓論罪之限若營造計料申請合用財物及人工多少之數於上而不實者笞五十若因申請不實以少計多而於合用本數之外或已損財物或已費人工各併計所損物價及所費雇工錢罪有重於笞五十者以坐贓致罪論罪止杖一百徒三年贓不入已故不還官條例一凡在京各處修理工程工價銀五十兩以内物料銀二百兩以内者照依各處印文准其修理其工價銀五十兩以上物料銀二百兩以上者著該處料估啓奏工部差官覆核㑹同該處官員首領監修將用過錢糧著管工官名下銷算如多用錢糧不行啓奏即便承修者將行文與承修堂司官交與該部議處若物料工價甚多而分為幾段陸續行文俱稱五十兩以内不奏者查出亦交與該部議處一凡修理行宫并各省倉厫等項工程一應動用錢糧事件令該督撫奏聞該部議覆再行修理工完之日督撫親自查明倘有開報浮多據實核減造册具題該部詳核題銷如有不行啓奏擅自咨部請鎖而該部據咨完結者即行題㕘交該部議處一凡各省修建一應工程如物料價銀五百兩以上工價銀二百兩以上者該督撫將動支銀兩及工料細數預行確估題報工部查明定議會同戸部指定欵項題覆准其動用興修俟工竣之日督撫親自查核造册題報工部核明准銷仍知照户部查核其物料價銀五百兩以下工價銀二百兩以下者該督撫咨明工部定議知照户部令其動項興修工竣逐一造册題銷倘有需用物料工價甚多而分為幾處陸續咨報並未題明輒行修建者查出題叅其有應動用存公銀兩者該督撫將確估工料細數咨報工部查明知照户部准其動用工完造報工部將准銷銀數造入該年存公册内咨送户部查核一緊急工程不及先行料估核算者酌量工程之大小預發錢糧派員修造俱以領銀之日起限如物料工價二百兩以内者限一箇月五百兩以内者限兩箇月一千兩至二千兩以内者限三箇月三千兩至五千兩以内者限四箇月如式完竣工竣之後限十日内呈遞銷算清册限十五日該司核算呈堂如不遵定限完工及工竣之日不照限呈遞清册或已遞清册該司不據實核算者照例分别議處如管工官或有限期已屆修理未完而因避處分揑報工竣者另行指叅交部議處其工竣核銷如有應繳銀兩不即交庫完結者將該員叅革照例勒限催追限内全完准其開復逾限不完照侵蝕正項錢糧例治罪仍著落家産追銀還庫該司官員扶同徇隱並交部議處一各省委員修理城工督撫布按每人各管一處若城工有數處者則令分管一二處者則令挨管如有修築不堅三年之内傾圮者著承修之員與専管之上司分賠倘上司因干係已身賠修故意隠匿者一經發覺責令專修並交部治罪一凡遇工程核減除浮冐侵欺仍按本律定擬外如實係核減本身現在無力完交請豁銀數在一千兩以上者照知府分賠屬員侵欺不完治罪之例治罪以十分為率如未完之數在五分以内者杖一百至六分者杖六十徒一年每一分加一等十分無完者杖一百徒三年均不准納贖如數不及一千兩者仍照舊例請豁免其治罪如本身已故而子孫無力完繳者仍照例請豁毋庸議罪至核減欵内採買水脚等項應追核減銀兩如果力不能完自應照例請豁免其治罪其餘經費項下若長支濫領誤發以及分賠之非由屬員侵欺并代賠着賠之項若欠項零星不及一千兩者果係力不能完照例豁免如數在一千兩以上者請豁時應令該旗籍於本摺内聲明或將本身照現定工程核減治罪之例酌減一等問擬或免其治罪之處請旨定奪虛費工力採取不堪用凡官司役使人工採取木石材料及燒造磚瓦之類虚費工力而不堪用者其役使之官司及工匠人役並計所費雇工錢坐贓論罪止杖一百徒三年若有所造作及有所毁壞如拆屋壞墻之類備慮不謹而誤殺人者官司人役並以過失殺人論採取不堪造毁不備工匠提調官各以所由經手管掌之人為罪不得濫及也若誤傷不坐造作不如法凡官司造作官房器用之類不如法者笞四十若成造軍器不如法及織造段疋粗糙紕薄者物尚堪用各笞五十若造作織造各不如法甚至全不堪用及稍不堪用應再改造而後堪用者各併計所損財物及所費雇工錢罪重於笞四十五十者坐贓論罪止杖一百徒三年其應供奉御用之物加坐贓罪二等罪止流二千五百里工匠各以所由造作織造之人為罪局官減工匠一等提調官吏又減局官一等以上造作織造不如法不堪用等項並著工匠局官提調官吏均償物價工錢還官條例一凡打造弓箭擅改式樣貨賣者笞五十冒破物料凡造作局院頭目工匠有於合用數外虚冒多破物料而侵欺入已者計入已贓以監守自盜論不分首從併贓論罪至四十兩斬追物還官若未入已只坐以計料不實之罪局官並承委覆實官吏知情扶同揑報不舉者與冒破同罪至死減一等失覺察者減三等罪止杖一百條例一直𨽻各省督撫將軍提鎮所轄各標營等街門收貯軍器經上司官查盤若有侵欺物料那移揜餙虚數開報者俱以監守自盜論贓重者照侵欺倉庫錢糧例治罪該管官不查報并失察之上司官俱交該部照例分别議處一河工估計工程總河及該督撫分司委員確查工段丈尺樁埽料物如果與所估物料數目相符核實具題發帑興修如估計過多物料數目不符查出即行指㕘承查之員扶同徇隠交部議處至完工之日再行確查如工程單薄物料尅減錢糧不歸實用以致修築不堅固將承修之員立即㕘究分别入已不入已定罪侵冒銀兩勒限追賠一直屬搶修等工每年應需物料務於八月内預動銀兩給發購辦按照漕規價值據實秤收毋許重收累民十月照額辦足交工取具並無短少印甘各結存案倘承辦之員限内不能如數辦足將料物秤收短少希冀揜餙并將舊爛物料攙入或經㕔汛印官於互相秤收之時查出揭報或經該督訪聞立即嚴㕘議處如過期發銀購辦遲滯分别查㕘其上年餘剩物料該管河道查盤實數出具並無虧空印結呈報倘盤查缺少扶同徇隠及有霉爛侵虧等弊即將文武汛員與盤查不實之上司一并㕘處照數分賠補項一各省修造標營船隻著道員副將會同領價道員遴委同知通判副將遴委都司守備協同辦料修造如係將軍標下船隻即遴委㕘領以下等官同領同辦倘承修之員修不如式貽誤軍工以及監驗查收之員需索掯勒并船上什物不即交代清楚兵丁私行盜賣以致短少殘缺者該督撫等即將該管將弁指名題㕘其頭舵人等照例治罪分别著追如該管上司不行查察故為徇隠一經發覺照例議處一浙省修築塘工估需銀兩飭令承修之員専案請領不得牽混併領亦不得通融那用領銀之後將辦過物料數目申報上司委員查驗如堆貯物料與所報相符承查之員加具保結申詳貯用倘有虧缺及那移掩飾情弊即行揭㕘查驗官扶同徇隠一併㕘處至各塘保固限内如有坍塌即著落承修之員賠修若遇有異常潮汐委非人力可施查明工程堅固錢糧俱歸實用者准取結保題免其賠修如物料茍簡工程草率錢糧不歸實用致有衝塌照例題㕘著落賠修一豫省應修水利地方有動用帑項者承修各員果能實力辦理俟保固三年之後該督撫核題並交部分别議叙倘有不預行修築以致田畝被淹即將各員交部分别議處若侵蝕錢糧工程不能堅固承修之員照侵欺河工錢糧例㕘革治罪該管各官徇隠不報俱照例議處一凡各省修建工程所需物料該督撫等轉飭承辦各員不必拘泥各省從前造報物料定價悉照時價確估造報工竣之日另行委員查勘并取具並無揑飾印結詳報該督撫等確訪時價詳細核明據實題咨工部再行核銷倘承辦各員浮開揑報即照冐銷錢糧例指㕘所委各員查驗不實照扶同徇隠例㕘處一京城物料價值經工部會同内務府確訪時價酌中更定一應採辦工部遵照定例給發如有贏餘並無别項需用承辦官竟行侵蝕查出照例㕘究倘其中有匠作搬運等費許承辦官將縁由呈明核奪如該員並不呈報照應申上而不申上例議處一凡修造工程如夫頭人等領帑侵蝕及私逃者俱照常人盜倉庫錢糧律計贓治罪帶造段疋凡監臨主守官吏將自己物料輒於官局帶造段疋者杖六十段疋入官工匠笞五十局官知而不舉者與監守官吏同罪亦杖六十失覺察者減三等則笞三十若局官違禁帶造監守官吏亦坐不舉失察之罪織造違禁龍鳳文段疋凡民間織造違禁龍鳳文紵絲紗羅貨賣者杖一百段疋入官若買而僭用者杖一百徒三年未用者笞三十機户及挑花挽花工匠同罪亦杖一百造作過限凡各處毎年額造常課段疋軍器工匠過限不納齊足者以所造之數十分為率一分工匠笞二十每一分加一等罪止笞五十局官減工匠一等提調官吏又減局官一等若官司不依期計撥額造之物料於工匠者局官笞四十提調官吏減一等工匠不坐修理倉庫凡内外各處公廨倉庫局院一應係官房舎非文卷所關則錢糧所及但有損壞當該官吏隨即移文所在有司計料修理違者笞四十若因不請修而損壞官物者依律科以笞四十之罪賠償所損之物還官若當該官吏已移文有司而失誤施行不即修理者罪坐有司亦笞四十損壞官物亦追賠償當該官吏不坐條例一各省營房墩臺該管地方文武員弁會同協辦修造完竣嚴督兵丁加謹守䕶如遇坍損立即報明印汛各員公同查勘修理造入交代於離任時取具接任官印結詳報該管上司查核存案倘平日不隨時修葺以致坍塌經後官詳揭即行題㕘著落印汛員弁分認賠修如去任員弁無力賠修文員即著落不嚴查之道府賠修武弁即著落不嚴查之將備賠修如兵丁作踐拆毁嚴懲責革著落汛弁獨賠如汛弁無力即著落該管將備分賠至交代之時後官如有勒掯濫接等弊該管上司查實亦即題㕘交部議處有司官吏不住公廨凡各府州縣有司官吏不住公廨内官房而住街市民房者杖八十若埋没公用器物有毁失而不還官者以毁失官物論毁者計贓准竊盜加二等免刺失者依減毁官物三等追賠條例一凡各省督撫提鎮及有屬員等官到任其屬員派累兵民修理衙署備辦鋪設及州縣守禦等官到任其屬下人役豫為鋪設修理衙署派及兵民并官員每年指稱添換器物修餙衙署派累兵民者該管上司即行指實題㕘文員照科歛律治罪武弁照尅扣律治罪如該上司徇庇不㕘或勒令屬員修理衙署添換器物發覺之日將該上司一併交部分别議處再官員陞任或去任除自置器皿外署内一應物件俱著清載簿籍移交接任官員倘將在官物件被家人毁盜將家人照毁盜官物律治罪其毁盜物件著落舊任官照數賠補大清律例卷三十八
