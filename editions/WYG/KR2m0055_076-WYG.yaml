  text: 欽定四庫全書大清律例卷三十
  hash: sha256:1b41bfe5051dff93c44a37c26888f15c922e6834fe9445aa4771b6ca562a44ed
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0055_WYG_076-1a, image: WYG0673/WYG0673-0033a.png}
body:
  text: 刑律訴訟越訴凡軍民詞訟皆須自下而上陳告若越本管官司輒赴上司稱訴者即實亦笞五十須本管官司不受理或受理而虧枉者方赴上司陳告若迎車駕及擊登聞鼓申訴而不實者杖一百所誣不實之事重於杖一百者從誣告重罪論得實者免罪若衝突儀仗自有本律條例一凡車駕行幸瀛臺等處有申訴者照迎車駕申訴律擬斷車駕出郊行幸有申訴者照衝突儀仗律擬斷一擅入午門長安等門内呌訴寃枉奉㫖勘問得實者枷號一個月滿日杖一百若涉虚者杖一百發邉逺地方充軍其臨時奉㫖止拿犯人治罪者所訴情詞不分虚實立案不行仍將本犯枷號一箇月發落一凡跪午門長安等門及打長安門内石獅鳴寃者俱照擅入禁門訴寃例治罪若打正陽門外石獅者照損壊御橋例治罪一凡姦徒身蔵金刃欲行叩閽擅入午門長安等門者不問所告虚實立案不行仍杖一百發近邉充軍若違禁入堂子跪告者杖一百一凡假以建言為由挾制官府及將瞹昧不眀姦贓事情汚人名節報復私讐者文武官俱革職軍民人等皆發附近充軍其有曽經法司督撫等衙門問斷眀白意圖翻異輒於登聞鼓下及長安左右門等處自刎自縊撒潑喧呼者拏送法司追究教唆主使之人俱杖一百徒三年其因小事糾集多人越墻進院突入鼓􅈦妄行擊鼓謊告者將首犯亦照此例治罪餘人各減一等發落如有揑開大欵欲思報復并將已經法司督撫衙門斷眀事件意圖翻異聚衆擊鼓者將首犯照擅入午門長安等叫訴寃枉例發邉逺地方充軍餘人亦各減一等發落如究出教令主使之人身雖不行亦照首犯治罪一曽經考察考覈被劾人員若懐私挾忿摭拾察覈官員别項贓私不干己事奏告以圖報復者不分見任去任文武官俱革職為民已革者問罪奏告情詞不問虚實立案不行一直省客商在於各處買賣生理若有負欠錢債等項事情止許於所在官司陳告提問發落若有驀越赴京奏告者問罪遞回奏告情詞不問虚實立案不行一為事官吏軍民等赴京奏訴一應事情審係被人奏告曽經督撫或在京法司見問未結者仍行原問各該衙門併問歸結若曽被人在督撫或在京法司具告事發却又䑃朧赴隔别衙問告理或隠下被人奏告縁由牽扯别事赴京奏行别衙門勘問者查審眀白俱將奏告情詞立案不行仍將犯人轉發原問衙門收問歸結若已經督撫或在京法司問結發落人犯赴京奏訴寃枉者方許改調無礙衙門勘問辦理一軍民人等干巳詞訟若無故不行親齎並隠下壯丁故令老幼殘疾婦女家人抱齎奏訴者俱各立案不行仍提本身或壯丁問罪一凡驀越赴京及赴督撫按察司官處各奏告機密重事不實并全誣十人以上屬軍衛者發近邉充軍屬有司者發邉外為民一在外刁徒身背黄袱頭插黄旗口稱奏訴直入衙門挾制官吏者所在官司就拏送問若係干己事情及有寃枉者照常發落不係干己事情别無寃枉並追究主使之人一體問罪屬軍衞者俱發近邉充軍屬有司者俱發邉外為民一凡生員越關赴京在各衙門謊揑控告或跪牌并奏凟者將所奏告事件不准仍革去生員杖一百一凡在外州縣有事欵干礙本官不便控告或有寃抑審斷不公須於狀内將控過衙門審過情節開載眀白上司官方許受理若未告州縣及已告州縣不俟審斷越訴者治罪上司官違例受理者亦議處一戸婚田土錢債鬭毆賭博等細事即於事犯地方告理不得於原告所住之州縣呈告原籍之官亦不得濫准行關彼處之官亦不得據關拘發違者分别議處其於犯事之地方官處告准關提質審而彼處地方官匿犯不解者照例叅處一旗軍有欲陳告運官不法事情者許候糧運過淮并完糧回南之日赴漕司告理如赴别衙門挾告詐財者聴該管官即拿送問犯該徒罪以上發近邉充軍一詞訟未經該管衙門控告輒赴控院司道府如院司道府濫行准理照例議處其業經在該管衙門控理復行上控先將原告窮詰果情理近實始行准理如審屬虚除照誣告加等律治罪外先將該犯枷號一個月示衆投匿名文書告人罪凡投貼隠匿自己姓名文書告言人罪者絞監候雖實亦坐見者即便燒燬若不燒燬將送入官司者杖八十官司受而為理者杖一百被告言者雖有指實不坐若於方投時能連人與文書捉獲解官者官給銀一十兩充賞指告者勿論若詭寫他人姓名詞帖訐人隂私䧟人或空紙用印虚揑他人文書買囑舖兵遞送詐以他人姓名註入木牌進入内府不銷名字䧟人得罪者皆依此律絞其或係泛常罵詈之語及雖有匿名文書尚無投官確據者不坐此律條例一凡兇惡之徒不知國家事務揑造悖謬言詞投貼匿名掲帖者將投貼之人及知而不首者俱擬絞立決旁人出首者授以官職奴僕出首者開戸一凡布散匿名掲帖及投遞部院衙門者俱不准行仍將投遞之人拏送刑部照例治罪不行拏送者交該部議處接受掲帖具題及審理者革職若不肖官員唆使惡棍粘貼掲帖或令布散投遞者與犯人罪同如該管官不嚴加察拿别有發覺者將司坊官專汛把總步軍校及巡城御史兼轄營官步軍副總尉統領俱交該部分别議處步軍營兵及司坊衙役並枷號三個月杖一百一駐防旗人與民人姦匪交結揑寫匿名掲帖傾䧟平人者查獲之日本犯即行正法父母妻子俱發黒龍江給披甲人為奴告狀不受理凡告謀反叛逆官司不受理差人掩捕者雖不失事杖一百徒三年因不受理掩捕以致聚衆作亂或攻䧟城池及劫掠人民者官坐斬監候若告惡逆如子孫謀殺祖父母父母之類不受理者杖一百告殺人及强盜不受理者杖八十鬬毆婚姻田產等事不受理者各減犯人罪二等並罪止杖八十受被告之財者計贓以枉法罪與不受理罪從重論若詞訟原告被論即被告在兩處州縣者聴原告就被論本管官司告理歸結其各該官司自分彼此或受人財推故不受理者罪亦如之如上所告事情輕重及受財枉法從重論若各部院督撫監察御史按察使及分司巡歴去處應有詞訟未經本管官司陳告及雖陳告而本宗公事未結絶者並聴部院等官置簿立限發當該官司追問取具歸結縁由勾銷若有遲錯而部院等官不即舉行改正者與當該官吏同罪輕者依官文書稽程十日以上吏典笞四十重者依不與果決以致躭誤公事者杖八十其已經本管官司陳告不為受理及本宗公事已絶理斷不當稱訴寃枉者各部院等衙門即便勾問若推故不受理及轉委有司或仍發原問官司收問者依告狀不受理律論罪若本管衙門追問詞訟及大小公事自行受理並上司批發須要就本衙門歸結不得轉行批委致有寃枉擾害違者照所告事理輕重以坐其罪如所告公事合得杖罪坐以杖罪合得笞罪坐以笞罪死罪已決放者同罪未決放減等徒流罪抵徒流條例一每年自四月初一日至七月三十日時正農忙一切民詞除謀反叛逆盜賊人命及貪贓壊法等重情并姦牙舖户騙劫客貨查有確據者俱照常受理外其一應户婚田土等細事一槩不准受理自八月初一日以後方許聴斷若農忙期内受理細事者該督指名題叅一各省州縣及有刑名之􅈦衛等官將每月自理事件作何審斷與准理題提完結之月日逐件登記按月造册申送該府道司撫督查考其有隠漏裝飾按其干犯别其輕重輕則記過重則題叅如該地方官自理詞訟有任意拖延使民朝夕聴候以致廢時失業牽連無辜小事累及婦女甚至賣妻鬻子者該管官司即行題叅若上司徇庇不叅或被人首告或被科道糾叅將該管各上司一併交與該部從重議處一各府州縣審理徒流笞杖人犯除應行關提質訊者務申詳該上司批准照例展限外如無關提應質人犯該州縣俱遵照定限完結倘敢陽奉隂違或經發覺或經該上司指叅將承問官交部照例分别議處一州縣自行審理一切户婚田土等項照在京衙門按月註銷之例設立循環簿將一月内事件填註簿内開眀己未結縁由其有應行展限及覆審者亦即於册内註眀於每月底送該管知府直隸州知州查核循環輪流註銷其有遲延不結朦混遺漏者詳報督撫咨叅各照例分别議處一州縣自行審理及一切户婚田土事件責成該管巡道巡歴所至即提該州縣詞訟號簿逐一稽覈如有未完勒限催審一面開單移司報院仍令該州縣將某人告某人某事於某日審結造册報銷如有遲延即行掲叅其有關係積賊刁棍衙蠧及胥役弊匿等情即令巡道親提究治知府直隸州自理詞訟亦如之如巡道奉行不力或任意操縱顛倒是非者該督撫亦即據實察叅分别議處一卑幼擅殺期功尊長及屬下人殺傷本管官並妻妾謀死親夫奴婢毆故殺家長等案俱情罪重大應令承審官於人犯到案之日上𦂳鞫訊眀確其詳上司審題不得恃有例限致稽時日其孕婦有犯仍照新定例行一州縣詞訟凡遇隆冬嵗暮俱随時審理不得照農忙之例停訟展限該管巡道嚴加察核違者照例掲叅一州縣審理詞訟遇有兩造俱屬農民關係丈量踏勘有妨耕作者如在農忙期内准其詳眀上司照例展限至八月再行審斷若查勘水利界址等事現涉爭訟清理稍遲必致有妨農務者即令各州縣親赴該處審斷速結總不得票拘至城或致守候病農其餘一切呈訴無妨農業之事照常辦理不准停止仍令該管巡道嚴加督察查核申報如州縣將應行結審之事藉稱停訟稽延者照例據實叅處經管道府如不實力查報該督撫一併嚴叅議處一民間詞訟細事如田畝之界址溝洫親屬之逺近親疎許令鄉保查眀呈報該州縣官務即親加剖斷不得批令鄉地處理完結如有不經親審批發結案者該管上司即行查叅照例議處一巡道查核州縣詞訟號簿如有告到未完之案號簿未經造入即係州縣匿不造入任意遷延不結先提書吏責處并將州縣掲報督撫分别嚴叅其有事雖審結所告斷理不公該道核其情節可疑者立提案卷查核改正如審斷巳屬公平刁民誣揑反告者亦即量予究懲聴訟廻避凡官吏於訴訟人内關有服親及婚姻之家若受業師或舊為上司與本籍官長有司及素有讐隙之人並聴移文廻避違者雖罪無増減笞四十若罪有増減者以故出入人罪論誣告凡誣告人笞罪者加所誣罪二等流徒杖罪不論已決配未決配加所誣罪三等各罪止杖一百流三千里不加入於絞若所誣徒罪人已役流罪人已配雖經改正放回須驗其被逮發冋之日於犯人名下追徴用過路費給還被誣之人若曽經典賣田宅者著落犯人備價取贖因而致死随行有服親屬一人者絞監候除償費贖產外仍將犯人財產一半斷付被誣之人至死罪所誣之人已決者依本絞斬反坐誣告人以死雖坐死罪仍令備償取贖斷付養贍未決者杖一百流三千里就於配所加徒役三年其犯人如果貧乏無可備償路費取贖田宅亦無財產斷付者止科其罪其被誣之人詐冒不實反誣犯人者亦抵所誣之罪犯人正反坐本罪謂被誣之人本不曽致死親屬詐作致死或將他人死屍冒作親屬誣頼犯人者亦抵絞罪犯人止反坐誣告本罪不在加等備償路費取贖田宅斷付財產一半之限若告二事以上重事告實輕事招虚及數事不一凡所犯罪同等但一事告實者皆免罪名例律罪各等者從一科斷非逐事坐罪也故告者一事實即免罪若告二事以上輕事告實重事招虚或告一事誣輕為重者除被誣之人應得罪名外皆為剰罪皆反坐以所剰不實之罪若已論決不問笞杖徒流全抵剰罪未論決所誣笞杖收贖徒流止杖一百餘罪亦聴收贖謂誣輕為重至徒流罪者每徒一等折杖二十若從徒入流者三流並准徒四年皆以一年為所剩罪折杖四十若從近流入至逺流者每流一等准徒半年為所剰罪亦各折杖二十收贖者謂如告一人二事一事該笞五十是虚一事該笞三十是實即於笞五十上准告實笞三十外該剩下告虚笞二十贖銀一分五釐或告一人一事該杖一百是虚一事該杖六十是實即於杖一百上准告實杖六十外該剩下告虚杖四十贖銀三分及告一人一事該杖一百徒三年是虚一事該杖八十是實即於杖一百徒三年上准告實杖八十外該剩下告虚杖二十徒三年之罪徒五等該折杖一百通計杖一百二十反坐原告人杖一百餘剰杖二十贖銀一分五釐又如告一人一事該杖一百流三千里於内問得止招該杖一百三流並准徒四年通計折杖二百四十准告實杖一百外反坐原告人杖一百餘剩杖四十贖銀三分之類若已論決並以剰罪全科不在收贖之限至死罪而所誣之人已決者反坐以死未決者止杖一百流三千里不加役若律該罪止者誣告雖多不反坐謂如告人不枉法贓二百兩一百三十兩是實七十兩是虚依律不枉法贓一百二十兩之上罪應監候絞即免其罪其告二人以上但有一人不實者罪雖輕猶以誣告論謂如有人告三人二人徒罪是實一人笞罪是虚仍以一人笞罪上加二等反坐原告之類若各衙門官進呈實封誣告人及風憲官挾私彈事有不實者罪亦如告人笞杖徒流死全誣者坐之若誣重反坐及全誣加罪輕不及杖一百徒三年者從上書詐不實論以杖一百徒三年科之若獄囚已招伏罪本無寃枉而囚之親屬妄訴者減囚罪三等罪止杖一百若囚已招伏笞杖已決徒流已配而自妄訴寃枉摭拾原問官吏過失而告之者加所誣罪三等罪止杖一百流三千里若在役限内妄訴當從已徒而又犯徒律條例一誣告人因而致死被誣之人委係平人及因拷禁身死者擬絞監候或將案外之人拖累拷禁致死一二人者亦擬絞監候若誣輕為重及雖全誣平人却係患病在外身死者止擬應得罪名發落一姦徒串結衙門人役假以上司察訪為由纂集事件挾制官府䧟害良善或詐騙財物或報復私讐名為窩訪者審實依律問罪用重枷枷號兩個月發落該徒流者發近邉充軍一無籍棍徒私自串結將不干己事揑寫本詞聲言奏告詐贓滿數者准竊盜論贓至一百二十兩以上者為滿數不分首從俱發近邉充軍若妄指宫禁親藩誣害平人者俱枷號三個月照前發遣一凡詞訟止許一告一訴告實犯實証不許波及無辜及陸續投詞牽連原狀無名之人如有牽連婦女另具投詞倘波及無辜者一概不准仍從重治罪承審官於聴斷時如供証已確縱有一二人不到非係𦂳要犯證即據現在人犯成招不得借端稽延違者議處一凡告言人罪不即赴審輙行脱逃者除將被誣及證佐俱行釋放外脱逃犯人獲日所告之事不與審理仍以誣告擬罪一凡實係切巳之事方許陳告若將弁尅餉務須營伍管隊等頭目率領兵丁公同陳告州縣徴𣲖務須里長率領衆民公同陳告方准受理如違禁將非係公同陳告之事懐挾私讐改揑姓名砌欵粘單牽連羅織希圖准行妄控者除所告不准外照律治以誣告之罪一偷參為從人犯誣扳良民為財主及率領頭目者不論旂民枷號兩個月折責照例發遣一八旂有將伊祖父時或係養子或係分户年久之人子孫復行混告者該部題叅係官革職係平人枷號兩個月鞭一百如有訛詐逼勒等情被害人告發審實者照嚇詐律治罪一挾讐誣告人謀死人命致屍遭蒸檢為首者絞監候為從杖一百流三千里其有審無挾讐止以誤執傷痕誣告蒸檢者為首發近邉充軍為從滿徒其官司刑逼招認妄供者革職審出實情者交部議叙一期親以上尊長按律不應抵命者若誣告人謀死人命致蒸檢卑幼身屍仍照誣告人死罪未決律治罪其餘親屬尊長律有應抵之條者如誣告謀死人命致蒸檢卑幼之屍及卑幼誣告致蒸檢尊長之屍俱照例擬絞監候一控告人命如有誣告情弊即照誣告人死罪未決律治罪不得聴其自行攔息其間或有誤聴人言情急妄告於未經驗屍之先盡吐實情自願認罪遞詞求息者訊眀該犯果無賄和等情照不應重律治罪完結如有敎唆情弊將敎唆之人仍照律治罪該地方官如有徇私賄縱者指名題叅照例分别議處一詞内干證令與兩造同具甘結審係虚誣將不言實情之證佐按律治罪若非實係證佐之人挺身硬證者與誣告人一體治罪受贓者計贓以枉法從重論地方官故行開脱者該督撫題叅交部嚴加議處一直省各上司有恃勢抑勒者許屬員詳報督撫即行題叅若該督撫徇庇不叅或自行抑勒者仍准其直掲部科該部科查眀具奏請㫖定奪如審實將該上司交部議處若屬員已知上司訪掲題叅即摭砌欵蹟揑詞誣掲部科者該部科查眀叅奏將該員解任并將原掲行令該督撫據實確審如審係誣掲題叅到日將該員革職一事審虚即行反坐其被叅之本罪輕於所誣之罪者照誣告律治罪倘本罪有重於誣告者仍於本罪從重歸結武職悉照文照例行一有舉首詩文書札悖逆譏刺者除顯有逆跡仍照律擬罪外若祇是字句失檢涉於疑似並無確實形跡者將舉首之人即以所誣之罪依律反坐承審官不行詳察輒波累株連者該督撫科道察出題叅將承審官照故入人罪律交部議處一凡揑造姦贓欵蹟寫掲字帖及編造歌謡挾讐汚衊以致被誣之人忿激自盡者照誣告致死例擬絞監候其鄉曲愚民因事爭角随口斥辱並無字蹟者仍各依應得罪名科斷一凡子孫將祖父母父母死屍挾讐誣告他人謀害致屍遭蒸檢者比照毁棄祖父母父母屍律擬斬監候其有並非挾讐止以誤執傷痕告官蒸檢者照誣告人死罪未決杖一百流三千里加徒役三年律治罪干名犯義凡子孫告祖父母父母妻妾告夫及告夫之祖父母父母者雖得實亦杖一百徒三年祖父母等同自首者免罪但誣告者不必全誣但一事誣即絞若告期親尊長外祖父母及妾告妻者雖得實杖一百告大功得實亦杖九十告小功得實亦杖八十告緦麻得實亦杖七十其被告期親大功尊長及外祖父母若妻之父母及夫之正妻並同自首免罪小功緦麻尊長得減本罪三等若誣告罪重於干犯本罪各加所誣罪三等謂止依凡人誣告罪加三等便不失於輕矣加罪不入於絞若徒流己未決償費贖產斷付加役並依誣告本律若被告無服尊長減一等依名例律其告尊長謀反大逆謀叛窩贓姦細及嫡母繼母慈母所生母殺其父所養父母殺其所生父母及被期親以下尊長侵奪財產或毆傷其身據實應自理訴者並聴卑幼陳告不在干名犯義之限其被告之事各依本律科斷不在干名犯義之限並同自首免罪之律被告卑㓜同此又犯姦及越關損傷於人於物不可賠償者亦同若告卑幼得實期親大功及女壻亦同自首免罪小功緦麻亦得減本罪三等誣告者期親減所誣罪三等大功減二等小功緦麻減一等若夫誣告妻及妻誣告妾亦減所誣罪三等被告子孫妻妾外孫及無服之親依名例律若誣卑幼死未決仍依律減等不作誣輕為重若奴婢告家長及家長緦麻以上親者與子孫卑幼罪同若雇工人告家長及家長之親者各減奴婢罪一等誣告者不減又奴婢雇工人被告得實不得免罪以名例不得為容隠故也其祖父母父母外祖父母誣告子孫外孫子孫之婦妾及己之妾若奴婢及雇工人者各勿論不言妻之父母誣女壻者在緦麻親中矣若女壻與妻父母果有義絶之狀許相告言各依常人論義絶之狀謂如身在逺方妻父母將妻改嫁或趕逐出外重别招壻及容止外人通姦又如女壻毆妻至折傷抑妻通姦有妻詐稱無妻敗妄更娶妻以妻為妾受財將妻妾典雇妄作姊妹嫁人之類條例一八旗有將家人為養子分戸開戸之人年久值伊原主之子孫庸懦或至絶嗣伊等自稱原為養子或謊稱近族兄反行欺壓希圖占産爭告者審眀係官革職枷號一個月鞭八十平人枷號三個月鞭一百將養子分户開户之檔銷毁仍給與原主子孫為奴一凡奴僕首告家主者雖所告皆實亦必將首告之奴僕仍照律從重治罪一凡旂下家奴告主犯該徒罪者即於所犯附近地方充配不准枷責完結俟徒限滿日照例官賣將身價給還原主子孫違犯敎令凡子孫違犯祖父母父母敎令及奉養有缺者杖一百謂敎令可從而故違家道堪奉而故缺者須祖父母父母親告乃坐條例一子貧不能營生養贍父母因致父母自縊死者杖一百流三千里見禁囚不得告舉他事凡被囚禁不得告舉他人之事其為獄官獄卒非理陵虐者聴告若應囚禁被問更首巳之别事有千連之人亦合准首依法推問科斷其年八十以上十嵗以下及篤疾者若婦人除謀反叛逆子孫不孝或巳身及同居之内為人盜詐侵奪財產及殺傷之類聴告餘並不得告以其罪得收贖恐故意誣告害人官司受而為理者笞五十原詞立案不行條例一年老及篤疾之人除告謀反叛逆及子孫不孝聴自赴官陳告外其餘公事許令同居親屬通知所告事理的實之人代告誣告者罪坐代告之人教唆詞訟凡教唆詞訟及為人作詞狀増減情罪誣告人者與犯人同罪至死者減一等若受雇誣告人者與自誣告同至死者不減等受財者計贓以枉法從重論其見人愚而不能伸寃教令得實及為人書冩詞狀而罪無増減者勿論姦夫教令姦婦誣告其子不孝依謀殺人造意律條例一代人揑冩本狀教唆或扛幫赴京及赴督撫并按察司官處各奏告强盜人命重罪不實并全誣十人以上者俱問發近邉充軍一凡將本狀用財雇寄與人赴京奏訴者并受雇受寄之人屬軍衞者發近邉充軍屬有司者發邉外為民贓重者從重論其在京匠役人等并各處因事至京人員將原籍詞訟因便奏告者各問罪原詞立案不行一凡民人投充旂下及賣身後或代伊親屬具控或將民籍舊事具控者概不准理一内外刑名衙門務擇里民中之誠實識字者考取代書凡有呈狀皆令其照本人情詞據實謄寫呈後登記代書姓名該衙門驗眀方許收受如無代書姓名即嚴行查究其有教唆増減者照律治罪一訟師教唆詞訟為害擾民該地方官不能查拏禁緝者如止係失於覺察照例嚴處若眀知不報經土司訪拏將該地方官照奸棍不行查拏例交部議處一凡雇人誣告者除受雇之人仍照律治罪外其雇人誣告之人照設計教誘人犯法律與犯法人同罪一坊肆所刋訟師秘本如驚天雷相角法家新書刑臺秦鏡等一切搆訟之書盡行查禁銷毁不許售賣有仍行撰造刻印者照淫詞小説例杖一百流三千里將舊書復行印刻及販賣者杖一百徒三年買者杖一百藏匿舊書不行銷毁減印刻一等治罪藏匿其書照違制律治罪其該管失察各官分别次數交部議處一審理詞訟究出主唆之人除情重贓多實犯死罪及偶為代作詞狀情節不實者俱各照本律查辦外若係積慣訟棍串通胥吏播弄鄉愚恐嚇詐財一經審實即依棍徒生事擾害例問發雲貴兩廣極邉烟瘴充軍軍民約㑹詞訟凡軍人有犯人命管軍衙門約㑹有司檢驗歸問若姦盜詐偽戸婚田土鬭毆與民相干事務必須一體約問與民不相干者從本管軍職衙門自行追問其有占恡不發者領官吏以違令論各笞五十若管軍官越分輒受民訟者罪亦如之條例一在外軍民詞訟除叛逆機密重事許提鎮副叅遊守等官接受㑹同有司追問外其餘不許濫受凡户婚田土鬭毆人命一應詞訟悉赴該管衙門告理軍衛有司不係掌印官不許接受詞訟一緝捕官役惟於京城内外察訪不軌妖言人命强盜重事其餘軍民詞訟及在外事情俱不許干預一凡旗人謀故鬭殺等案仍照例令地方官會同理事同知審擬外其自盡人命等案即令地方官審理如果情罪已眀供證巳確免其解犯仍由同知衙門核轉倘恃旗狡頼不吐實供將案内無辜牽連人等先行摘釋止將要犯解赴同知衙門審眀如該同知事外苛駁借應質名色濫差提擾該上司立即題叅一凡各省理事㕔員除旂人犯命盜重案仍照例㑹同州縣審理外其一切田土戸婚債負細事赴本州縣呈控審理曲在民人照常發落曲在旗人録供加看將案内要犯審解該㕔發落至控告在官人犯不論原被經州縣兩次拘𫝊别無他故抗不到案者將情虚逃避之犯嚴拏治罪一各處理事同知遇有逃人案件并旂人與民人争角等事俱行審理不必與旂員㑹審一川省瀘州土流接壌地方倘有詞訟照軍民約㑹之例合該州同與該土司公同核報一八旂案件俱交刑部辦理該旂有應叅奏者仍行叅奏官吏詞訟家人訴凡官吏有争論婚姻錢債田土等事聴令家人告官對理不許公文行移違者笞四十誣告充軍及遷徒凡誣告充軍者照所誣地里逺近抵充軍役若官吏故失出入人軍罪者以故失出入人流罪論若誣告人罪應遷徙者於比流減半准徒三年上加所誣罪三等并入所得杖罪通論凡徒二年者應杖八十今加誣告罪三等流二千里應得杖一百之罪併論決之大清律例卷三十
