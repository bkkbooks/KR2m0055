  text: 欽定四庫全書大清律例卷十九
  hash: sha256:a6149e7214ca3d185844322032683dbe9eeb4f484d655c66857aa2b194a5940d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0055_WYG_054-1a, image: WYG0672/WYG0672-0652a.png}
body:
  text: 兵律軍政擅調官軍凡將帥部領軍馬守禦城池及屯駐邊鎮若所管地方遇有報到草賊生發即時差人體探緩急聲息果實須先申報本管上司轉逹朝廷奏聞給降聖㫖調遣官軍征討若無警急不先申上司雖已申上司不待回報輙於所屬擅調軍馬及所屬擅發與者將領屬各杖一百罷職發邊遠充軍其暴兵卒至欲來攻襲及城鎮屯聚軍馬之處或有内賊作反作叛或賊有内應事有警急及路程遙遠難候申文待報者並聽從便火速調撥所屬軍馬乘機勦捕若賊寇滋蔓應合會兵勦捕者鄰近官軍雖非所屬亦得行文調撥䇿應其將領官並䇿應官並即申報本管上司轉逹朝廷知㑹若不即調遣㑹合或不即申報上司及鄰近官軍已奉調遣不即發兵策應者將領與鄰近官並與擅調發罪同亦各杖一百發邊遠充軍其上司及典兵大臣將文書調遣將士提撥軍馬者文書内非奉聖旨不得擅離信地若守禦屯駐軍官有奉文改除别職或犯罪奉文取發如文内無奏奉聖旨亦不許擅動違者兼上數事罪亦如之申報軍務凡將領叅隨統兵官征進如統兵官分調攻取城寨克平之後將領隨將㨗音差人飛報知㑹本管統兵官轉行兵部統兵官又須將克㨗事情另具奏本實封御前無少停留若賊人數多出没不常如所領軍人不敷須要速申統兵官添撥軍馬設策勦捕不速飛申者聽從統兵官量事輕重治罪至失誤軍機自依常律若有賊黨來降之人將領官即便送赴統兵官轉逹朝廷區處其貪取來降人財物因而殺傷其人及中途逼勒逃竄者斬監候若無殺傷逼勒止依嚇騙律科飛報軍情凡飛報軍情在外府州如聞屬縣及巡司等報即差人申督撫布政司按察司本道仍行移將軍提鎮其守禦官差人各申督撫仍行本管將軍提鎮督撫將軍提鎮得報差人一行移兵部一具實封直奏御前若互相知㑹隱匿不速奏聞者杖一百罷職不叙因而失誤軍機者斬監候漏泄軍情大事凡聞知朝廷及統兵將軍調兵討襲外番及收捕反逆賊徒機密大事而輒漏泄於敵人者斬監候若邉將報到軍情重事報於朝廷而漏泄以致傳聞敵人者杖一百徒三年二項犯人若有心泄於敵人作姦細論仍以先傳説者為首傳至者為從減一等若私開官司文書印封看視者杖六十事干軍情重事者以漏泄論為首杖一百徒三年從減等若近侍官員漏泄機密重事不專指軍情凡國家之機密重要皆是於人者斬監候常事杖一百罷職不叙條例一在京在外軍民人等與朝貢外國人私通往來投託撥置害人因而透漏事情者俱發近邊充軍通事並伴送人係官革職一内外衙門辦理𦂳要事件俱密封投遞本官親拆收貯不得令吏胥經手倘有密封章奏未經上逹先已傳播及緝拏之犯聞風遠颺等事查究根由分别議處如將應密之事並不密封及收受承辦衙門不行謹慎以致漏泄者將封發收受承辦官查叅交部分别議處如封貯之處及投遞之前提塘及衙役人等將密封事件私開竊視以致漏泄者杖六十事重者為首杖一百徒三年為從減一等治罪仍令科道不時稽查如不行查叅别經發覺者將該管科道一併交部議處一凡平常事件雖非密封但未經御覽批發之本章刋刻傳播槩行嚴禁如提塘與各衙門書辦彼此勾通本章一到即抄寫刋刻圖利者將買抄之報房賣抄之書辦亦俱照漏泄密封事件例治罪其揑造訛言刋刻者杖一百流二千里若有招搖詐騙情弊犯該徒罪以上不分首從俱發近邊充軍該管官失於覺察該科道不行查叅者均交部亦照例議處邊境申索軍需凡守邊將領但有缺乏取索軍器錢糧等物須要差人一行布政司一申督撫將軍提鎮再差人轉行合于部分及具缺少應用奏本實封御前其公文若到該部須要隨即將所申事情奏聞區處發遣差來人回還若稽緩不即奏聞及邊將於各處衙門不行依式申報者並杖一百罷職不叙因不申奏以致臨敵缺乏而失誤軍機者斬監候失誤軍事凡臨軍征討有司應合供給軍器行糧草料若有徵解違期不完者當該官吏各杖一百罪坐所由或上司移文稽遲或下司徵解不完各坐所由若臨敵有司違期不至而缺乏及領兵官已承上司調遣而逗遛觀望不依期進兵䇿應若軍中承差告報㑹軍日期而違限因而失誤軍機者並斬監候從征違期凡官軍已承調遣臨當征討行師已有起程日期而稽留不進者一日杖七十每三日加一等若故自傷殘及詐為疾患之類以避征役者各加一等計日坐之並罪止杖一百仍發出征若傷殘至不堪出征仍選本户壯丁充補令其出征若軍臨敵境託故違期一日不至杖一百不必失誤軍機三日不至者斬監候統兵官竟行軍法若能立功贖罪者從統兵官區處條例一凡官兵從征無故起程違期者官革職兵杖一百仍發出征在外違期者官革職拏問兵杖一百將所俘獲人口入官出征處所兵丁藐視該管官干犯號令違法亂行者將為首之人正法為從者俱枷號三個月杖一百該管官仍交該部議處軍人替役凡軍人已遣不親出征雇倩人冐名代替者替身杖八十正身杖一百依舊著伍仍發出征若守禦城池軍人雇人冐名代替者各減二等其出征守禦軍人子孫弟姪及同居少壯親屬非由雇倩自願代替者聽若果有老弱殘疾不堪征守者赴本管官司陳告驗實與免軍身若醫工承差闗領官藥隨軍征進轉雇庸醫冐名代替者本身及替身各杖八十庸醫所得雇工錢入官條例一凡兵丁不親出征以奴僕代替及行間放撥瞭哨等處以奴僕代替者兵杖七十奴僕入官如打圍放馬及看守京城週圍處所以奴僕代替者兵杖一百奴僕免入官主將不固守凡守邊將帥被賊攻圍城寨不行固守而輒棄去及平時守備不設為賊所掩襲因此棄守無備而失陷城寨者斬監候若官兵與賊臨境其望高巡哨之人失於飛報以致䧟城損軍者亦斬監候若主將懈於守備及哨望失于飛報不曽䧟城失軍止被賊侵入境内擄掠人民者杖一百發邊遠充軍其官軍臨陣先退及圍困敵城而逃者斬監候條例一失誤軍機除律有正條者擬議監候奏請外若是賊擁大衆入寇官軍卒遇交鋒損傷被擄數十人以上不曾虧損大衆或賊衆入境擄殺軍民數十人以上不曽擄去大衆或被賊白晝夤夜突入境内擄掠頭畜衣糧數多不曾殺擄軍民者俱問守備不設被賊侵入境内擄掠人民本律發邊遠充軍若是交鋒入境損傷擄殺四五人搶去頭畜衣糧不多者亦問前罪以上各項内情輕律重有礙發落者備由奏請處置其有被賊入境將偵探軍役及飛報聲息等項公差官軍人等一時殺傷捉去事出不測者俱問不應杖罪留任或境外被賊殺擄偵探軍役非智力所能防範者免其問罪一凡沿邊沿海及腹裏府州縣與武職官同住一城者若遇邊警及盜賊生發攻圍不行固守而輒棄去及守備不設被賊攻䧟城池劫殺焚燒者除武職官比照守邊將帥失䧟城寨者律擬斬監候外其府州縣掌印并捕盜官俱比照守邊將帥被賊侵入境内擄掠人民者律發邊遠充軍其守巡道官交部分别議處提問若有兩縣同住一城專管官分有守城汛地各以賊從所管城分進入坐罪若無城池與雖有城池被賊潛隱設計越入劫盜隨即逃散不係失䧟者止以失盜論俱不得引用此例一凡統兵將帥玩視軍務苟圖安逸故意遷延不將實在情形具奏貽悞國事者又凡將帥因私忿媢嫉推諉牽制以致糜餉老師貽悞軍機者又凡身為主帥不能克敵轉布流言搖惑衆心借以傾陷他人致悞軍機者均屬有心貽悞應擬斬立决縱軍擄掠凡守邊將領私自使令軍人於未附外境擄掠人口財物者將領杖一百罷職發附近充軍所部聽使武官及管隊遞減一等並罪坐所由使令之人軍人不坐若軍人不曾經由本管頭目使令私出外境擄掠者為首杖一百為從杖九十因擄掠而傷外境人為首者斬監候為從杖一百其擄掠傷人為從并不傷人首從俱發邊遠充軍若本管頭目鈐束不嚴杖六十留任其邊境城邑有賊出没乘機領兵攻取者不在此限若於已附地面擄掠者不分首從皆斬監候本管頭目鈐束不嚴杖八十留任其將領知軍人私出外境及已附地面擄掠之情故縱者各與犯人同罪至死減一等條例一凡領兵王貝勒將軍借通賊為名燒燬良民廬舎搶掠子女財物者領兵將軍叅賛大臣及營總等俱交部議處係王貝勒交宗人府從重治罪叅領以下官免議若分兵征進有犯前項罪名者統兵將領及分管兩翼官並管領旂分官俱交部議處至於官員兵丁一二人私自焚掠者係官交部議處係䕶軍領催兵丁鞭一百係厮役正法若厮役之主知情者鞭一百係官交部分别議處所管叅領以下官員及營總均交部議處其搶掠携帶男婦人口仍追出給還完聚若該督撫隱匿不行題叅别經發覺者該督撫一併議處一調臺兵丁及臺灣催餉社丁如借端需索擾害番社依嚇詐例計贓從重論無贓者照不應重律杖八十革退該管官徇隱失察交部分别議處不操練軍士凡各處邊方腹裏守禦官不守紀律不操練軍士及城池不完衣甲器仗不整者初犯杖八十再犯杖一百若守禦官隄備不嚴撫馭無方致有所部軍人反叛者該管官各杖一百追奪誥敇發邊遠充軍若因軍人反叛棄城而逃者斬監候條例一架砲夜不收守墩軍人夤夜回家輪班不去者在守哨處枷號一個月發落激變良民凡有司牧民之官平日失於撫字又非法行事使之不堪激變良民因而聚衆反叛失陷城池者斬監候止反叛而城池未䧟者依守禦官撫緩無方致軍人反叛按充軍律奏請條例一直省刁惡頑梗之輩假地方公事強行出頭逼勒平民約㑹抗糧聚衆聯謀斂錢搆訟抗官塞署或有寃抑不於上司控告擅自聚衆至四五十人者地方官與同城武職無論是非曲直拿解審究為首者照光棍例擬斬立决為從擬絞監候其逼勒同行之人各杖一百承審官若不將實在為首之人擬罪混行指人為首者革職從重治罪其同城專汛武職不行擒拿及該地方文職不能彈壓撫恤者俱革職其該管之文武上司官徇庇不即申報該督撫提鎮如不行題叅者俱交該部照例議處一福建地方如有借事聚衆罷市罷考打官等事均照山陜題定光棍之例分别治罪其不行查拿之文武官弁亦俱照例議處一凡刁惡之徒聚衆抗官地方文武員弁即帶領兵壯迅往撲捉如稍有遲延者即照定例嚴議其撲捉之時該犯即俯首伏罪不敢抗拒應分别末減如該犯等持仗抗拒許文武官帶同兵壯持械擒拿若聚衆之犯並未執有器械文武官縱令兵壯殺傷者嚴加議處一凡直省刁民因事閧堂塞署逞兇毆官聚衆至四五十人者為首依例斬决仍照強盜殺人例梟示其同謀聚衆轉相糾約下手毆官者雖屬為從其同惡相濟審與首犯無異亦應照光棍例擬斬立决其餘從犯照例擬絞監候被脅同行者照例各杖一百如遇此等案件該督撫先將實在情形奏聞嚴飭所屬立拿正犯速訊明確分别究擬如實係首惡通案渠魁該督撫一面具題一面將首犯於該地方即行斬梟并將犯事緣由及正法人犯姓名刻示遍貼城鄉俾愚民咸知儆惕如承審官不將首犯究出混指他人為首因而坐罪及差役誣拿平人株連無干濫行問擬者嚴叅治罪該督撫一并交部嚴加議處私賣戰馬凡軍人出征獲到敵人馬匹須要盡數報官若私下貨賣與常人者杖一百軍官私賣者罪同罷職買者笞四十馬匹價錢並入官若出征軍官軍人買者勿論賣者追價入官仍科罪條例一凡披甲隨圍將肥官馬偷賣到家交瘦馬者照竊盜例治罪私賣軍器凡軍人將自己闗給衣甲刀鎗旗幟一應軍器私下貨賣與常人者杖一百發邊逺充軍軍官私賣者罪同罷職附近充軍買者笞四十其間有應禁軍器民間不宜私有而買者以私有論一件杖八十每一件加一等罪止杖一百流三千里所買軍器不論應禁與否及所得價錢並入官官軍買者勿論賣者仍坐罪追價入官條例一軍人軍官私當闗給衣甲旗幟應禁軍器照私賣律減一等杖一百徒三年至收當之人照私有軍器律減一等杖七十每一件加一等罪止杖一百徒三年軍器當本照例入官其非應禁者不在此限失察之地方將領各官交部議處毁棄軍器凡將領闗撥一應軍器出征守禦事訖停留不收回納還官者以事訖之日為始十日杖六十每十日加一等罪止杖一百若將領征守事訖將軍器輒棄毁者一件杖八十每一件加一等二十件以上斬監候遺失及誤毁者各減三等軍人棄毁遺誤各又減一等並驗毁失之數追賠還官其曾經戰陣而有損失者不坐不賠條例一凡看守城池倉庫街道等處兵丁遺失本身器械者杖七十一箭上不書姓名及書他人姓名者杖八十私藏應禁軍器凡民間私有人馬甲傍牌火筒火礮旗纛號帶之類應禁軍器者一件杖八十每一件加一等私造者加私有罪一等各罪止杖一百流三千里非全成不堪用者並勿論許令納官其弓箭鎗刀弩及魚乂禾乂不在禁限條例一私鑄紅衣等大小礮位者不論官員軍民人等及鑄礮匠役一併處斬妻子家産入官鑄礮處所隣佑房主里長等俱擬絞監候專管文武官革職兼轄文武官及該督撫提鎮俱交該部議處一各處鄉村及商民防禦盜賊猛獸應用鳥鎗俱照營兵鳥鎗尺寸製造上刻姓名具呈該地方官編號登冊以備稽查如有不報官私造者杖一百該管官不行查出交部議處如兵丁有借查鳥鎗名色擾民者該管官一併議罪倘有因爭鬭擅將鳥鎗私放傷人者旗人發往寜古塔民人酌發雲貴兩廣烟瘴少輕地方交該地方官嚴加管束殺人者以故殺論如有私造竹銃及用竹銃殺傷人者俱照鳥鎗例治罪私藏者亦照私藏軍器律治罪地方官失於覺察亦照鳥鎗例議處一臺灣民人停止製造鳥鎗違者照例治罪一内地私販硫黄五十斤熖硝一百斤以上者杖一百徒三年窩藏囤販及知情賣與私販者俱照私販例治罪囤積未曾興販者減私販罪一等硝黄俱入官隣保知情不首杖一百不知情者杖八十挑夫船户知情不首減本犯罪二等知情分贓者與犯人同罪贓重以枉法從重論首報者除免罪外仍向本犯名下照所獲硝黄入官價値另追給賞如合成火藥賣與鹽徒者發近邊充軍其出産硝黄本省銀匠藥舗需用硝黄每次不許過十斤令其呈明地方官批限買完繳銷違者以私囤論罪一苗猓蠻户俱不許帶刀出入及私藏違禁等物違者照民間私有應禁軍器律治罪該管頭目人等知而不報者杖一百地方文武官弁失察照例議處一官員出差赴任囘籍及商民出外貿易等事如有擕帶軍器途中防䕶者在京取具兵部印票在外取具該差遣衙門及該地方官印票註明所帶件數以備出城沿途照驗仍知㑹所到地方限一月繳銷如隱匿原票不繳者照違令律治罪縱放軍人歇役凡管軍千總把總及管隊軍吏縱放軍人出百里之外買賣或私種田土或隱占在已使喚空歇軍役不行操備者計所縱放及隱占之軍數一名杖八十每三名加一等罪止杖一百罷職若受財賣放者以枉法從重論所隱縱放隱占賣放各項軍人並杖八十若私使出境因而致死或被賊拘執者杖一百罷職發邊遠充軍至三名者絞監候本營專管官吏知情容隱不行舉問及虚作逃亡扶同報官者與犯人同罪罪止杖一百發邊遠充軍若管隊把總千總縱放軍人其本營專管官吏知情故縱或容隱不行舉問及本營專管官故縱軍人其千總把總管隊知而不首告者罪亦如之私使出境而不首告者同罪若鈐束不嚴原無縱放私使之情致有違犯或出百里或出外境私自歇役及原無知情容隱止失覺舉者管隊名下一名把總名下五名千總名下十名本營專管官名下五十名各笞四十管隊名下二名把總名下十名千總名下二十名本營專管官名下一百名各笞五十並留任不及數者不坐若武職官私家役使軍人不曾隱占歇役妨廢操備者一名笞四十每五名加一等罪止杖八十並每名計一日追雇工銀八分五釐五毫入官若有吉凶借使者勿論條例一凡軍士下班之日其本管官員擅撥與人做工等項役使照私役軍人本律發落公侯私役官軍凡公侯非奉特㫖不得私自呼唤官軍前去役使違者初犯再犯免罪三犯奏請區處其官軍聽從及不出征時輒於公侯之家門首伺立者官各杖一百罷職發邊遠充軍軍人同罪伯爵有犯亦准此律奏請從征守禦官軍逃凡官軍已承調遣從軍征討私逃還家及逃往他所者初犯杖一百仍發出征再犯者絞監候知在逃之情窩藏者不問初犯再犯杖一百充軍原籍及他所之里長知而不首者杖一百若征討事畢軍還官軍不同振旅而先歸者減在逃五等因而在逃者杖八十若在京軍人逃者初犯杖九十各處守禦城池軍人逃者初犯杖八十俱發充伍再犯不問京外並杖一百俱發邊逺充軍三犯者絞監候知在逃之情窩藏者與犯人同罪罪止杖一百充附近軍不在邊遠處絞之限里長知而不首者各減窩藏二等從杖罪減科罪止杖八十其從征軍與守禦軍本管頭目知情故縱者各隨所犯次數與同罪罪止杖一百罷職附近充軍其征守在逃官軍自逃日為始一百日内能自出官首告者不問初犯再犯免罪若在限外自首者減罪二等但於隨處官司首告者皆得准理准免罪及減罪二等若各營軍人不著本伍轉投别營當軍者同逃軍論或初犯再犯皆依上文律科斷條例一隨征兵丁自軍前逃囘者擬斬立決其跟隨之奴僕雇工有偷盜馬匹軍器及衣服銀兩潛逃者亦擬斬立決並令歩軍統領及沿途各督撫嚴行緝拿獲日即於本地方正法其不曽偷盜馬匹器械之奴僕逃囘者拿送墩門俟大兵凱旋之日訊問伊主情願領囘者鞭一百刺字取具保結給領不願領囘者發黑龍江等處給披甲之人為奴不曾偷盜馬匹器械之雇工逃囘者如所雇係旗下家奴枷號三個月鞭一百刺字交還本主如所雇係民人刺字解囘原籍杖一百徒三年仍向各犯家屬及中保人等追出原雇價値給還原主一廣東省盜賊投撫分發入伍壯丁初犯脱逃如原犯之罪在軍流以上俱面刺逃丁字様僉妻酌發雲貴川廣極邊地方足四千里交地方官嚴行管束若在徒杖以下者照流犯在配脱逃例枷號兩個月責四十板加徒三年其隣族保甲知情容隱者照犯人原犯罪減一等治罪一各處守禦兵丁有拐帶餉米馬匹脱逃者計贓照常人盜官物律加一等治罪如拐帶同營餉銀計贓照竊盜加一等治罪所拐帶餉米等項仍向該犯家屬名下照數追賠知情容留之人同罪一旗丁不拘重運囘空如有無故潛逃棄船中途不顧者照守禦官軍在逃律治罪仍於面上刺逃丁二字一凡駐防兵丁逃走除照例報部外該駐防處開明逃人年貌知照該犯本旗及沿途有滿洲兵丁處所并附近省分一體嚴拿其窩家人等及失察各官均照例究治一京外在伍兵丁脱逃俱杖一百枷號一個月示衆永逺不准入伍一派往伊犁等處換防種地之滿漢各項兵丁初次犯逃自行投囘者枷號三個月滿日鞭責交該管官嚴行管束如被拿獲用重枷枷號五個月痛加責懲折磨差使若逃走二次及在原派處所曽經犯逃移駐伊犂之後復行逃走者自行投囘應俱用重枷枷號五個月痛加責懲折磨差使如被拿獲者即行正法優恤軍屬凡陣亡病故官軍回鄉家屬應給行糧脚力經過有司不即應付者以家屬到日為始遲一日笞二十毎三日加一等罪止笞五十條例一凡八旗陣亡人等妻室内查有無子嗣或子嗣穉幼又無家人食糧者伊夫原係職官給原官一半俸禄米石如係兵丁給食一半錢糧米石若陣亡之人並無妻室其父母别無子嗣又無錢糧可依頼為生者亦照此例行夜禁凡京城夜禁一更三㸃鐘聲已静之後五更三㸃鐘聲未動之前犯者笞三十二更三更四更犯者笞五十外郡城鎮各減一等其京城外郡因公務急速軍民之家有疾病生産死䘮不在禁限其暮鐘未靜曉鐘已動巡夜人等故將行人拘留誣執犯夜者抵罪若犯夜拒捕及打奪者杖一百因而毆巡夜人至折傷以上者絞監候死者斬監候拒捕者指犯夜人打奪者旁人也若巡夜人誣執犯夜因而拒捕互毆至死者以凡鬬毆論條例一凡八旂兵丁無故在城外夜宿者杖八十大清律例卷十九
