body:
  text: 名例律下老小廢疾收贖犯罪時未老疾給没贓物犯罪自首二罪俱發以重論犯罪共逃同僚犯公罪公事失錯共犯罪分首從犯罪事發在逃親屬相為容隠處决叛軍化外人有犯本條别有罪名加減罪例稱乘輿車駕稱期親祖父母稱與同罪稱監臨主守稱日者以百刻稱道士女冠斷罪依新頒律斷罪無正條徒流遷徙地方充軍地方
