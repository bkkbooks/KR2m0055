body:
  text: 刑律斷獄下官司出入人罪辯明寃枉有司決囚等第檢驗屍傷不以實決罸不如法長官使人有犯斷罪引律令獄囚取服辯赦前斷罪不當聞有恩赦而故犯徒囚不應役婦人犯罪死囚覆奏待報斷罪不當吏典代冩招草
  hash: sha256:a4b99c01223f6d795ecb7dbe0478215e6403d761bca0fa44a577169d9444a5bb
