  text: 欽定四庫全書大清律例卷二十四
  hash: sha256:58fbd5507d2028c37838b87eefaa044cf2f64be40ca96b8a1866777602e02b5c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0055_WYG_064-1a, image: WYG0672/WYG0672-0727c.png}
body:
  text: 刑律賊盜中劫囚凡劫囚者皆不分首從斬監候但劫即坐不須得囚若私竊放囚人逃走者與囚同罪至死者減一等雖有服親屬與常人同竊而未得囚者減囚二等因而傷人者絞監候殺人者斬監候雖殺傷被竊之囚亦坐前罪不問得囚與未得囚為從各減一等承竊囚與竊而未得二項若官司差人追徴錢糧勾攝公事及捕獲罪人聚衆中途打奪者首杖一百流三千里因而傷差人者絞監候殺人及聚至十人九人而下止依前聚衆科㫁為首者斬監候下手致命者絞監候為從各減一等其率領家人隨從打奪者止坐尊長若家人亦曾傷人者仍以凡人首從論家長坐斬為從坐流不言殺人者舉輕以該重也其不於中途而在家打奪者若打奪之人原非所勾捕之人依威力於私家拷打律主使人毆者依主使律若原係所勾捕之人自行毆打在有罪者依罪人拒捕律無罪者依拒毆追攝人律條例一凡官司差人追徴錢糧勾攝公事并捕獲罪人但聚衆至十人以上中途打奪為從者如係親屬並同居家人照常發落若係異姓同惡相濟及槌師打手俱發近邊充軍一凡行劫罪囚不論曾否得囚有無傷人將為首之人擬斬立决有傷人者將傷人之夥犯亦擬斬决有殺人者將為首之人及夥犯俱擬梟示其餘為從未經殺人傷人者仍依律擬斬監候其在中途打奪罪囚因而殺人者為首擬斬决下手致命者擬絞决餘仍照律分别坐罪一官司差人捕獲罪人有聚衆中途打奪毆差致死者為首斬决為從下手致命者絞决其傷差未至死者首犯仍照律擬絞監候但經聚衆奪犯雖未傷人首犯亦照因而傷人律從重擬絞餘仍照律分别坐罪若數年後此風稍息請㫖仍復舊例遵行其非聚衆及不於中途打奪者各照本律註分别辦理白晝搶奪人少而無兇器搶奪也人多而有兇器强刦也凡白晝搶奪人財物者不計贓杖一百徒三年計贓併贓論重者加竊盜罪二等罪止杖一百流三千里傷人者首斬監候為從各減為首一等並於右小臂膊上刺搶奪二字若因失火及行船遭風著淺而乘時搶奪人財物及折毁船隻者罪亦如之亦如搶奪科罪其本與人鬬毆或勾捕罪人因而竊取財物者計贓准竊盜論因而奪去者加二等罪止杖一百流三千里並免刺若竊奪有殺傷者各從故鬭論其人不敢與争而殺之曰故與争而殺之曰鬭條例一凡總甲快手應捕人等指以廵捕勾攝為由毆打平人搶奪財物者除實犯死罪外犯該徒罪以上不分人多人少若初犯一次屬軍衞者發近邊充軍屬有司者發邊外為民雖係初犯若節次搶奪笞杖以上者俱發原搶奪地方枷號一個月照前發遣若里老隣佑知而不舉所在官司縱容不問者各治以罪里老隣佑依同行知有謀害而不救阻律杖一百官司照故出人罪律科㫁一凡問白晝搶奪要先明事犯根由然後揆情剖决在白晝為搶奪在夜間為竊盗在途截搶者雖昏夜仍問搶奪止去白晝二字若搶奪不得財及所奪之物即還事主俱問不應如强割田禾依搶奪科之探知竊盗人財而於中途搶去准竊盗論係强盗贓止問不應若見分而奪問盗後分贓其親屬無搶奪之文比依恐嚇科㫁一凡聚衆夥謀搶奪路行婦女或賣或自為奴婢者審實不分得財與未得財為首者斬立决為從者皆絞監候如知情故買者減正犯罪一等不知者不坐其搶奪人犯之主知情不首者照知情故買治罪該管官員不行嚴禁察拿者交該部議處領催總甲杖八十一凡白晝搶奪三犯者擬絞立决如搶奪竊盗各不及三次免其併擬各照所犯之罪發落一凡黔楚兩省相接紅苗彼此讐忿聚衆搶奪者照搶奪律治罪人數不及五十名傷人為首者枷號兩個月為從者一個月殺人者斬監候下手者枷號三個月為從者四十日聚至五十人者雖不殺人為首者亦斬監候為從者枷號五十日殺人者斬决下手之人絞監候為從者各枷號兩個月聚至百人者雖不殺人為首者斬决為從者各枷號兩個月殺人者斬决梟示下手之人俱斬監候為從者各枷號三個月所搶人畜財物追還給主一凡苗人犯搶奪該管土官約束不嚴俱交部議若至百人以上土司府州革職百戸寨長罷職役滿杖知情故縱者革職枷號一個月俱不准折贖若教令指使或通同圖利者照為首例治罪一凡糧船水手夥衆十人以上執持器械搶奪為首照强盗律治罪為從減一等如十人以下又無器械者照搶奪律治罪出結之旗丁頭舵拿送者免罪如容隠不首及徇庇不拿者照强盗窩主律分别治罪一凡搶奪竊盗殺傷之案以下手傷人者為首在塲助力者為從其不曾助力者仍照搶奪竊盗本律首從論傷有多處者以致命傷重者為首致命傷多者以後下手者為首其致命重傷不知孰為先後者以初動手者為首一凡白晝搶奪殺人者擬斬立决下手為從之犯應發吉林烏喇等處者依名例改遣之例問發其搶奪金刃傷人及折傷為首之犯仍照本律擬斬監候下手為從及傷非金刃又傷輕平復之首犯均改發邊逺充軍面上各刺兇犯二字為從及自首者杖一百徒三年一凡白晝搶奪人財物至一百二十兩以上者照竊盗滿貫律擬絞監候一凡出哨兵弁如遇商船在洋遭風尚未覆溺及著淺不致覆溺不為救䕶反搶取財物拆毁船隻者照江洋大盗例不分首從梟示如遭風覆溺人尚未死不速救䕶止顧撈搶財物以致商民淹斃者將為首之兵丁照搶奪殺人例擬斬立决為從照傷人律擬斬監候所搶財物照追給主如不足數將犯人家産變賠在船將備如同謀搶奪雖兵丁為首該弁亦照為首兵丁例治罪雖不同謀而分贓者以為從論若實係不能約束並無通同分肥情弊照例議處如見船覆溺雖搶取貨物傷人未致斃命者不計贓為首杖一百流三千里為從減一等若商船失風被溺商民俱已救援得生因而撈搶財物者兵丁照搶奪本律杖一百徒三年計贓重者從重定擬該管弁員照鈐束不嚴例議處如淹死人命在先弁兵見有漂失無主船貨撈搶入己不報者照得遺失官物坐贓論罪如見船覆溺阻撓不救以致淹斃人命者為首阻救之人照故殺律擬斬監候為從照知人謀害他人不即救䕶律杖一百官弁題叅革職兵丁革除名糧如有兇惡之徒明知事犯重罪在外洋無人處所故將商人全殺滅口圖絶告發者無論官兵但係在船同謀均照强盗殺人律不分首從擬斬梟示以上弁兵除應斬决不准自首外其餘事未發覺而自首杖一百徒三年流罪以下概准寛免仍追贓給主如有誤坐同船並未分贓之人能據實首報除免罪外仍酌量賞給其哨船未出口之前取同船兵丁不致搶物為匪連名甘結令在船將弁加結申送該管上司存案巡哨回日仍取同船兵丁甘結轉送該管上司其上司如不係同船失於覺察或通同庇匿及地方州縣若據難民呈報不即查明轉詳反行抑諱及道府不行察報督撫提鎮不行查叅者均照例議處再營汛弁兵如能竭力救䕶失風人船不私取絲毫貨物者該管官據實申報督撫提鎮按次記功照例議敘倘弁兵因救援商人或致受傷被溺詳報督撫查明優䘏其邊海居民以及採捕各船户如有乘危搶奪者均照搶奪本律治罪有能救援商船不取財物者該督撫亦酌量給賞一江南通州崇明昭文沙民夥衆爭地除不持器械爭奪及聚衆不及四五十人者照侵占他人田宅律科㫁如係執持器械及聚衆四五十人有抗官重情者照光棍例為首者擬斬立决為從者擬絞監候逼勒同行之人各杖一百一直省不法之徒如乘地方歉收夥衆搶奪擾害善良挾制官長或因賑貸稍遲搶奪村市喧閙公堂及懐挾私憤糾衆罷市辱官者俱照光棍例治罪若該地方官營私怠玩激成事端及弁兵不實力緝拿一併嚴叅議處一苗人聚衆至百人以上燒村刦殺搶擄婦女拿獲訊明將造意首惡之人即在犯事地方斬决梟示其為從内如係下手殺人放火搶擄婦女者俱擬斬立决若止附和隨行在塲助勢照紅苗聚衆例枷號三個月臨時脅從者枷號一個月至尋常盜刦搶奪仍照内地搶奪例完結其有擄掠婦女勒贖尚未姦汚者仍照苗人伏草捉人勒贖例定擬一苗人聚衆燒刦搶擄之案其例應正法人犯之家口父母兄弟子姪並案内軍流等罪照例折枷責之犯及該犯之家口父母兄弟子姪俱查明發往六百里外營縣安揷脅從之人免其遷徙一凡臺灣盜刦之案罪應斬决者照江洋大盜例斬决梟示他如聚衆散劄竪旌妄布邪言書寫張帖煽惑人心搶奪殺人放火光棍搶奪路行婦女强姦致死刦囚越獄與番人彼此讐忿聚衆搶奪殺人等案内造意為首罪應立决者均照黔楚兩省例斬决梟示正法後即傳首原犯地方示衆其附和為從之犯不得援引此例仍於各審案後附疏聲明一川省嘓匪糾夥五人以上在於塲市人烟凑集之所横行搶刦者不論曾否得財為首照光棍例擬斬立决為從同搶者俱擬絞監候若拒捕奪犯殺傷兵役並事主塲衆者審明首犯即行正法梟示在塲加功及助勢者俱擬絞立决同謀搶奪而拒捕奪犯之時並未在塲者仍照光棍為從本例擬絞監候其在野攔搶止二三人者分别首從犯該徒罪以上俱發雲貴兩廣極邊烟瘴地方嚴行管束一被災地方饑民爬搶若並無器械人數無多實係是搶非强者仍照搶奪例問擬如有糾夥持械按捺事主搜刦多贓者照强盜例科㫁其實因災荒饑餓見有糧食夥衆爬搶希冀茍延旦夕並無攫取别贓者該督撫酌量情形請㫖定奪一大江洋海遇有商船遭風著淺乘機搶奪者除有殺傷仍照定例問擬外其但經得財並未傷人罪應杖徒者將首從人犯各照本律加一等治罪一凡搶奪財物除搶掠田野穀麥蔬果與饑民爬搶及十人以下又無兇器者仍依搶奪本律科㫁外如有聚至十人以上及雖不滿十人但經執持器械倚强肆掠果有兇暴衆著情事者均照糧船水手之例分别首從定擬一新疆地方兵丁跟役如有白晝搶奪殺人及為强盜等事該辦事大臣審實一面奏聞一面即行正法竊盜凡竊盜已行而不得財笞五十免刺但得財不論分贓不分贓以一主為重併贓論罪為從者各指上得財不得財言減一等以一主為重謂如盜得一家財物從一家贓多者科罪併贓論謂如十人共盜得一家財物十計贓四十兩雖各分得四兩通算作一處其人各得四十兩之罪造意者為首該杖一百餘人為從各減一等止杖九十之類餘條准此初犯並於右小臂膊上刺竊盜二字再犯刺左小臂膊三犯者絞監候以曾經刺字為坐掏摸者罪同一兩以下杖六十一兩以上至一十兩杖七十二十兩杖八十三十兩杖九十四十兩杖一百五十兩杖六十徒一年六十兩杖七十徒一年半七十兩杖八十徒二年八十兩杖九十徒二年半九十兩杖一百徒三年一百兩杖一百流二千里一百一十兩杖一百流二千五百里一百二十兩杖一百流三千里一百二十兩以上絞監候三犯不論贓數絞監候條例一凡竊盜臨時拒捕為首殺人者照强盜律擬斬立決為從者應發遣吉林烏喇白都諾寧古塔等處給披甲人為奴照名例改遣之例問發其傷人未死者首犯擬斬監候為從發近邊充軍若臨時拒捕傷非金刃又傷輕平復之首犯改發邊逺充軍拒捕不傷人之首犯發近邊充軍為從及自首者杖一百徒三年一竊盜三犯除贓至五十兩以上照律擬絞外其五十兩以下至三十兩應發遣黒龍江當差者照名例改遣之例問發三十兩以下至十兩以上者改發邊逺充軍如銀不及十兩錢不及十千者俱杖一百流三千里一凡旗人另戸正身竊盜三犯除計贓在五十兩以上仍照律擬絞外如在五十兩以下者分别贓數銷去旗檔照民人一體問擬按月彚奏一凡另户兵丁當差人及奴僕為竊盜或搶奪並奴僕盜家長者俱刺字另户人刺臂膊奴僕刺面其餘平民應明刺面上如初犯罪止杖責者照律於右小臂膊刺字再犯者左面刺字一凡直𨽻各省竊盜初犯者俱照例刺字不得以贓少罪輕免刺其應遣者俱照例問發其問擬徒流外其餘刺責發落者交與保甲收管該地方官仍不時查㸃毋許出境一凡竊盜搶奪掏摸等犯遇赦俱免刺字一凡捕役行竊除計贓分首從照常人擬罪外各加枷號兩個月一凡捕役勾通竊賊坐地分贓豢竊一二名至五名者改發雲貴兩廣極邊烟瘴地方充軍交與地方官嚴行管束倘地方官平時不行稽察或知風查挐不加嚴究止以借端責革照不實力奉行稽查盜賊例交部議處一凡兵丁為竊移囬本營令該管官捆打插箭逰營仍送有司收管照捕役行竊例按罪發落該管武弁及承審文官有意開脱者各照例議處一凡店家船戸有行竊商民及糾合匪類竊贓朋分者除分别首從計贓照常人科㫁外仍照捕役行竊例各加枷號兩個月一五城兩縣及三營内務府捕役挐獲竊賊者俱限即日稟報本管官如晚間挐獲限次早稟報該管官訊明被竊情由將事主年貎姓名住址及所失贓物詳記檔案即令事主寧家不必一同解送該管上司衙門如贓物現獲即出示令事主認領倘不法捕役違限不行呈報任意勒索事主許事主赴都察院呈告將捕役照恐嚇取財例治罪其該管官有失於覺察及任意縱容者交部分别議處一凡竊盜同居父兄伯叔與弟知情而又分贓者照本犯之罪減二等雖經得財而實係不知情者減三等父兄不能禁約子弟為竊盜者笞四十一積匪猾賊為害地方審實不論曾否刺字改發雲貴兩廣極邊烟瘴地方充軍其餘竊盜仍照律以曾經刺字為坐分别次數治罪一竊盜三犯應按其第三犯竊贓多寡照定例分别軍流遣絞毋得將從前初犯再犯業已治罪之贓通算以致罪有重科一竊盜棄財逃走事主追逐如有逞兇執持金刃戳傷事主者照罪人毆所捕人至折傷以上律擬絞監候一隨駕官員之跟役無論奴僕雇工如有偷盜馬匹器械逃囬者擬絞監候其不曾偷盜馬匹器械逃回之奴僕雇工照隨征跟隨之奴僕雇工不曾偷盜馬匹器械逃回例分别問擬在逃跟役令各該闗津嚴行查挐如失察過闗將該汛官兵照失察逃人例加等治罪一凡行在挐獲竊盜罪應杖笞者不分旗民俱枷號一個月滿日民人杖一百旗人鞭一百徒罪以上者係民仍照律例定擬若旗人應折枷號者徒一年折枷三十日每等各依應徒年限遞加五日流罪二千里者折枷六十日亦毎等遞加五日滿貫仍擬絞候旗下家奴犯徒罪者照旗人定擬流罪以上照例科㫁一凡旗人及旗下家奴肆行偷竊犯罪至發遣以上者將失察旗人為竊之該管官及失察家奴為竊之家主俱照旗人為盜例交部分别議處若能於事未發覺之前自行查出送部治罪者免議一直省州縣拏獲竊盜到案取具確供計贓在五十兩以上者即同捕官帶同捕役搜驗原贓給主收領如贓在四十兩以下捕官帶同捕役前往搜驗如州縣捕官聽捕役私自搜贓以致中飽者除捕役與竊盜同科外將該州縣捕官照失察捕役為盜例議處一凡外國進貢使臣到京之時即令該地方官兵在各館門首嚴加巡查如遇有偷竊外使人犯一經挐獲除贓重者仍照律辦理外其罪應杖刺者加枷號一個月枷滿之日照例發落如外使報竊而賊犯無獲將巡查之兵役杖一百該地方官交部議處一奸匪夥衆丢包誆取財物照白晝搶奪人財物律治罪刺字贓至一百二十兩以上擬絞監候如有拒捕殺傷人者亦照賊犯搶竊之例將地方官扣限查叅一賊犯交保管束之後不加禁約致該犯復出為匪或在本地行竊者除原保係父兄子弟人等仍照强竊案内分别是否知情分贓究擬外其餘俱按賊人所犯輕重如罪止杖笞者將原保人照不應輕律笞四十徒罪以上者照不應重律杖八十知情故縱者比照窩主不行又不分贓為從論律科罪免刺受財者以枉法從重論一竊盜再犯計贓罪應杖刺者如該犯杖六十加枷號二十日杖七十者加枷號二十五日杖八十者加枷號三十日杖九十者加枷號三十五日杖一百者加枷號四十日其旗人再犯罪應擬徒折枷者統於應加枷號四十日之外再加一等一各省營鎮責成將備督率兵弁偵緝賊匪其緝獲之賊送縣審究如賊犯到縣狡供翻異許㑹同原獲營員質審如係良民被誣並無贓証兵丁營員照例分别議處治罪若地方官果能將捕役豢縱之處審查究擬免其失察處分仍將獲賊之弁兵計贓案多寡分别奬勵一旗下正身審係積匪猾賊銷去旗檔均照民人例於面上刺字發烏魯木齊等處給與兵丁為奴在京由刑部開具所犯事由按月彚奏在外令該省定擬報部刑部核實亦按月彚奏一回民行竊除贓數滿貫罪無可加及無夥衆持械情狀者均照律辦理外其結夥三人以上及執持繩鞭器械者均不分首從不計贓數次數改發雲貴兩廣極邊烟瘴充軍一竊贓數多罪應滿流者改發附近充軍一賊匪偷竊衙署服物除罪應擬絞依律定擬外其餘不論初犯再犯及贓數多寡俱改發雲貴兩廣極邊烟瘴地方充軍盜馬牛畜産凡盜民間馬牛驢驘猪羊雞犬鵞鴨者並計所值之贓以竊盜論若盜官畜産者以常人盜官物論若盜馬牛兼官私言而殺者不計贓即杖一百徒三年驢驘杖七十徒一年半若計贓並從已殺計贓重於徒三年徒一年半本罪者各加盜竊盜常人盜罪一等條例一凡盜御馬者問罪枷號三個月發近邊充軍若將自己及他人騎操官馬盜賣者枷號一個月發落盜至三匹以上及再犯者不拘匹數俱免枷號發附近地方各充軍五匹以上者發邊逺充軍若養馬人户盜賣官馬至三匹以上者亦問發附近充軍一凡冒領太僕寺官馬至三匹者問罪於本寺門首枷號一個月發近邊充軍若家長令家人冒領三匹不分首從俱問常人盜官物罪家長引例家人不引一凡偷盜官馬二匹以下仍以竊盜論三匹以上杖一百流三千里十匹以上不分首從皆絞監候窩主及牧馬人役自行盜賣者罪亦如之一凡盜牛一隻枷號一個月杖八十二隻枷號三十五日杖九十三隻枷號四十日杖一百四隻枷號四十日杖六十徒一年五隻枷號四十日杖八十徒二年五隻以上者枷號四十日杖一百徒三年十隻以上杖一百流三千里盜殺者枷號一個月發附近充軍俱照竊盜例刺字其窩家知情分贓者與盜同罪知情不分贓者杖一百一駐劄外邊官兵及跟役等有偷盜蒙古馬匹者審實即在本處正法其䝉古偷盜官兵馬匹或官兵等自相偷盜馬匹仍照舊例行一偷竊馬匹案件除外藩䝉古仍照理藩院蒙古律擬罪外其查哈兒䝉古有犯偷竊馬匹之案審明如係盜民間馬牛者依律計贓以竊盜論如係盜御馬及盜太僕寺等處官馬者亦仍照律例治罪一凡民人在䝉古地方偷竊四項牲畜者俱照蒙古例為首者擬絞監候抄沒家産遇秋審減等一體折枷為從鞭一百罰三九牲畜俱免其刺字一凡呼倫貝爾旗分另戸在札薩克䝉古逰牧居住者偷竊四項牲畜俱照䝉古例分别首從定擬一凡打牲索倫在蒙古地方偷竊四項牲畜者照䝉古例分别首從定擬一䝉古人等除搶奪四項生畜殺人及傷人者仍照舊例辦理外如偷竊四項牲畜滿十匹以上者首犯擬絞監候六匹至九匹者發雲貴兩廣烟瘴地方三匹至五匹者發湖廣福建江西浙江江南等處一二匹者發山東河南等處俱交驛地當苦差其民人在䝉古地方偷竊九匹以下者俱照此例一體分别充軍為從人犯仍照定例遵行至行圍巡幸地方如有偷竊馬匹者不分蒙古民人五匹以上擬絞立决三匹至四匹者即發雲貴兩廣烟瘴地方一二匹者發湖廣福建江西浙江江南等處充軍俱交驛地當苦差為從及知情故買者係民人減本犯一等係䝉古仍照䝉古例辦理一右衛地方八旗官兵所養官馬駝隻被竊拏獲除賊犯照偷盜蒙古四項牲畜新例辦理外其竊盜之家主無論閑散兵丁如有知情縱容及分贓情事依律治罪係官員咨部查議一奉天遇有偷竊馬匹案件民人俱照盜牛及宰殺例分别治罪旗人盜竊牛馬不及十匹者按例科罪仍折枷完結至十匹以上及盜殺者照定例枷號其應得軍流等罪俱擬實遣不准折枷咨送兵部酌發駐防省城分别當差為奴一䝉古偷竊四項牲畜為從之犯俱就近交與地方官監禁所罰三九牲畜勒限一年照追給主如依限完交者免其鞭責完交一半以上者鞭一百完結若全數無完者停其罰取照例發往山東河南等處交與驛站當苦差原竊牲畜無存不能賠償者著落該管台吉及該管官員照數賠還盜田野榖麥凡盜田野榖麥菜果及無人看守器物謂原不設守及不待守之物者並計贓准竊盜論免刺若山野柴草木石之類他人已用工力砍伐積聚而擅取者罪亦如之如柴草木石雖離本處未䭾載間依不得財笞五十合上條有拒捕依罪人拒捕條例一凡盜掘金銀銅錫水銀等礦砂每金砂一斤折銀二錢五分銀砂一斤折銀五分銅錫水銀等砂一斤折銀一分二釐五毫俱計贓准竊盜論若在山洞捉獲持仗拒捕者不論人數砂數多寡及初犯再犯俱發邊逺充軍若殺傷人為首者照竊盜拒捕殺傷人律斬不曾拒捕若聚至三十人以上者不論砂數多寡及初犯再犯為首發近邊充軍為從枷號三個月照竊盜罪發落若不曾拒捕又人數不及三十名者為首初犯枷號三個月照竊盜罪發落再犯亦發近邊充軍為從者止照竊盜罪發落非山洞捉獲止是私家收藏道路背負者惟據見獲論罪不許巡捕人員逼令展轉扳指違者叅究治罪一産礦山塲山主違禁勾引礦徒潛行偷穵者照礦徒之例以為首論若係約練勾引接濟夥同分利者照引領私鹽律杖九十徒二年半得財者計贓准竊盜從重論如因官兵往拏漏信使逃及陰令拒捕者俱照官司追捕罪人而漏洩其事者減罪人所犯罪一等律治罪保甲地隣知情容隠不報者均照强盜窩主之隣佑知而不首例杖一百發落一山海等闗巡查人員如有搜獲人參珠子巡查人等戸部按數給賞該管官兵部議敘如有搜查不力以及私帶過闗者將該管官照失察例議處巡查人等照不應重律治罪明知故縱者該管官革職巡查人等枷號一個月杖一百受賄賣放者計贓以枉法從重發落其失察偷出邊闗刨參至一百名者領催披甲人等鞭五十至二百名者鞭一百至五百名以上者枷號一個月鞭一百該守禦官亦按失察名數分别議處如有自行拏獲者免議一刨參官商私刻小票影射私參照私販人參例分别治罪一凡領票刨參人夫例給鳥鎗應查明人數多寡批給鳥鎗填明票上出口驗放囬山查核違例私帶者照商民應用鳥鎗不報官私造例杖一百其將鳥鎗轉給售賣刨參之人者比照軍人將軍器私賣與人發邊遠充軍律減一等杖一百徒三年該管官不行查出交部議處一凡三姓渾春等處商人官兵領票赴寧古塔船厰地方購買物件令其報官給票開明數目有違禁携帶米石什物賣與刨參之人易換人參者該將軍查明米不及五十石什物值銀不及五十兩者俱照無引私鹽律杖一百徒三年若逾前數者俱照越境興販鹽斤至三千斤以上例發附近充軍旗人及官兵有犯加民人一等治罪其巡綽官兵知情故縱與本犯同得贓者計贓以枉法從重論失察者官交部議處兵丁照山海闗搜查參珠不力例治罪其明知偷刨姦匪而容隠在家不即舉報者照知人犯罪藏匿在家不告捕者減罪人一等律治罪一凡索倫逹呼里越界至松阿里烏拉地方打牲滋事者令該將軍查拏分别治罪其有私帶米糧等物賣給刨參之人者照無引私鹽律計米數多寡分别定擬船厰地方有越界私帶米糧情事飭令船厰將軍一體查拏照例定擬一旗民人等偷刨人參人至百名以上參至五百兩以上者為首之財主及率領之頭目併容留之窩家俱擬絞監候為從係民人發雲貴兩廣烟瘴地方係旗人銷去旗檔同民人一體發遣係旗下家奴發駐防兵丁為奴均於靣上刺字所獲牲畜等物給付拏獲之人充賞參入官擬絞人犯遇赦減等者亦照為從例發遣其未得參者各減一等販參人犯拏獲時查明參數照財主頭目偷刨人參例減一等治罪免其刺字至刨參人犯内有家奴訊係伊主知情故縱者將伊主杖八十係官交部議處不知者不坐其潛匿禁山刨參人犯被獲治罪遞囬旗籍後復逃徃禁山者各於應得本罪上加一等問擬若係旗下家奴即發黑龍江等處給與披甲人為奴將疎縱之該管官交部議處一凡拏獲刨參賊犯嚴審明確如有身充財主雇人刨採及積年在外逗遛已過三冬者不論參數多寡俱發雲貴兩廣烟瘴地方管束若並無財主實係一時烏合各出資本及受雇偷採或隻身潛往得參者均杖一百流三千里未得參者杖一百徒三年代為運送米石者亦如之旗人有犯同民人一體辦理犯應軍流者銷去旗檔係旗下家奴發駐防兵丁為奴一打珠人等私藏珠子不行交官者拏獲不論珠數多寡分兩輕重俱杖一百流三千里旗人銷去旗檔同民人一體發遣總領打珠之驍騎校並總管翼長均交部分别議處一領票工人内如有偷竊領票商人之參者照刨參已得例不論參數多寡俱杖一百流三千里仍於面上刺竊盜字追贓給主一凡潛入南苑竊取草束等物者不分首從俱杖一百徒三年一挐獲圍塲内賊犯如係偷採菜疏及割草之人初犯枷號一個月再犯枷號兩個月三犯枷號三個月發落若盜砍木植偷打牲畜審係初次二次發往烏魯木齊等處種地犯至三次者即發往烏魯木齊等處給兵丁為奴打牲砍木未得人犯均照已得遣罪減一等杖一百徒三年再犯即未得畜木亦與已得者同擬外遣若止偷竊野鷄並無鳥鎗器械者即在挐獲地方責懲完結一盛京各處山塲商人領票砍伐木植如有夾帶偷砍果松者按照株數多寡定罪砍至數十根者笞五十百根者杖六十毎百根加一等罪止杖一百徒三年所砍木植變價入官大清律例卷二十四
