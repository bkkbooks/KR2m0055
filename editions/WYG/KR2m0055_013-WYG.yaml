body:
  text: 臣劉統勲等謹奏為奏聞事竊查臣部於乾隆三十一年正月内奏准開館纂修律例因全書自乾隆五年至今二十餘載條例增改不一雖經五次修輯止就現定新例依類編入其從前舊例與新例不合之處俱未增刪改併請定限十四個月吿竣陸續繕寫黄冊進呈等因奉㫖知道了欽此欽遵臣等隨督率提調纂修等官上緊趕辦所有歴年欽奉上諭及議准内外臣工條奏并吏户禮兵工等部議准有與刑名交涉應纂為例者各詳細覆核分類編輯並將全部條例逐一比較其中或新舊不符或詞意重複或文義未甚明晰俱詳加酌核增刪改併以歸畫一今已依限辦就督令供事繕寫黄冊縁此次卷帙繁多臣等分為三次陸續進呈今將名例上下兩卷及吏律户律禮律兵律四卷纂修條例先行進呈内除照例纂輯修改以及節刪重複字句閒文即於各條下謹按語内分晰陳明毋庸另為聲叙外如於罪名適輕適重臣等叅酌律例遇有增改之處即於本條例上黏貼黄籖恭呈御覽伏候欽定統俟命下之日臣館另繕清漢樣冊進呈並將前次續纂條例一併歸入全書照例送交武英殿刊刻頒發内外問刑衙門一體遵行此後或奉有諭㫖及臣工條奏准行應入例冊者於未經刊刻以前仍行添纂合併聲明為此謹奏請㫖乾隆三十二年五月初六日奏本日奉㫖知道了冊留覽欽此
