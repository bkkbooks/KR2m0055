body:
  text: 刑部尚書臣圖納等謹題為請㫖事據廣西道試監察御史盛符升條奏一疏經九卿㑹議應如所奏將見行則例載入大清律條例内均為畫一等因具覆奉㫖依議欽遵在案今將律文則例刪定改正彚為一書體皇上好生之徳垂萬世不易之規相應遣官監修所有堂官職名開列具奏伏候聖裁謹題請㫖康熙二十八年九月三十日題十月初八日奉㫖圖納蘇赫張玉書杜臻西安郭世隆顧汧著為總裁官
