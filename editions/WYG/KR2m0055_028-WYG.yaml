body:
  text: 吏律職制官員襲廕凡文武官員應合襲廕者並令嫡長子孫襲廕如嫡長子孫有故或有亡殁疾病姦盜之類嫡次子孫襲廕若無嫡次子孫方許庶長子孫襲廕如無庶出子孫許令弟姪應合承繼者襲廕若庶出子孫及弟姪不依次序攙越襲廕者杖一百徒三年仍依次襲廕其子孫應承襲者本宗及本管各官保勘明白移文該部奏請承襲支俸如所襲子孫年幼候年一十八嵗方預朝叅公役如委絶嗣無可承襲者准令本人妻小依例關請俸給養贍終身若將異姓外人乞養為子瞞昧官府詐冒承襲者乞養子杖一百發邉逺充軍本家所關俸給事發截日住罷他人敎令攙越詐冒者並與犯人同罪若當該官司知其攙越詐冒而聴行與同罪不知者不坐若受財扶同保勘以枉法從重論條例一武臣出征受傷分别等第給賞陣亡者按品予䘏並給世職一武職守城失機貽患邉方及臨陣退怯者俱不准襲有犯不孝致典刑者取祖父次子孫襲職本犯子孫不許一世職有犯人命失機强盜實犯死罪及免死充軍不分已決已遣監故并脱逃自盡本犯子孫俱不准承襲一世職官亡故戸無承襲其父母繼母生母在者給半俸終身一凡世職官物故無應襲之人官册註銷者如無父母其妻亦給半俸終身無妻者查原立職之官有親生母亦給半俸一凡世襲官員如有因罪革退例不准本犯子孫承襲者其世職與親兄弟承襲若無親兄弟即襲與兄弟之子孫若無親兄弟及兄弟之子孫竟至除革者無論官之大小俱將原立勲績之處與被罪縁由及原立官之子孫一併查眀請㫖定奪一凡世職年老戸無承襲者支全俸優給襲職之員未及年嵗者支給半俸一凡世職將乞養異姓與抱養族屬踈逺之人用財買囑冐襲及受財將官職賣與同姓或異姓人冒襲已經到部襲過者冒襲之人并保勘之官罷職其世職永不得襲保勘官以受財首先出與保結者為坐連名保結者俱依律減等科斷有贓者並以枉法論若朦朧保送違碍子孫弟姪者俱照常發落其異姓買襲之人比照乞養子冒襲律發邉逺充軍一應襲之人若父見在詐稱死亡冒襲官職者發近邊充軍候父故之日許令以次兒男承襲如無以次兒男令次房子孫承襲一各處土官襲替其通事及諸凡色目人䓁有撥置土官親族不該承襲之人爭襲刼奪讐殺者俱發極邉烟瘴地面充軍一凡土官襲職由司府州鄰具印甘各結並土司親供宗圖及原領號紙詳送督撫具題襲替若應襲之人未滿十五嵗者許令本族土舍䕶理印務俟嵗滿日具題承襲如有事故遲誤年久方告襲者宗圖號紙有據亦准襲替一凡土官故絶無子許弟承襲如無子弟而其妻或壻為其下信服者許令一人襲替一凡土舍嫡妻䕶印止令地方官查眀出具合例印結咨部准其䕶印一凡土官病故該督撫於題報之時即查眀應襲之人取具宗圖册結鄰封甘結并原領號紙限六箇月内具題承襲其未經具題之先亦即令應襲之人照署事官例用印管事地方官如有勒掯沉擱留難者將該管上司均交部議處其支庶子弟中有馴謹能辦事者俱許本土官詳報督撫具題請㫖酌量給與職銜令其分管地方事務其所授職銜視本土官降二等文職如本土官係知府則所分者給與通判銜係通判則所分者給與縣丞武職如本土官係指揮使則所分者給與指揮簽事銜係指揮簽事則所分者給與正千户銜照土官承襲之例一體頒給勅印號紙其所管地方視本土官多不過三分之一少則五分之一此後再有子孫可分者亦再許其詳報督撫具題請㫖照例分管地方再降一䓁給與職銜印信號紙一鑾儀衛校尉缺出於見役校尉親生兒男弟姪内選擇堪用者替補如校尉子弟不足移文五城將身家殷實民人保送選補其養象校尉缺出即以所生兒男替補有朦朧冒替者俱以違制論大臣專擅選官凡除授官員兼文武應選者須從朝廷選用若大臣專擅選用者斬監候若大臣親戚非科貢應選等項係不應選者非奉特㫖不許除授官職違者罪亦如之受選除者俱免坐其見任在朝官員面諭差遣及改除外職不問逺近託故不行者並杖一百罷職不敘條例一文武職官人等不由銓選推舉徑自朦朧奏請希求進用夤縁奔競阻壞選法者俱問罪黜革為民文官不許封公侯凡文官非有大功勲於國家而所司朦朧奏請輒封公侯爵者當該官吏及受封之人皆斬監候其生前出將入相能除大患盡忠報國者同開國功勲一體封侯諡公不用此律生受爵禄曰封死賜褒贈曰諡濫設官吏凡内外各衙門官有額定員數而多添設者當該官吏指典選者一人杖一百每三人加一等罪止杖一百徒三年若受贓計贜以枉法從重論若吏典知印及承差祗候禁子弓兵人等額外濫充者杖一百遷徙比流減半准徒二年容留一人正官笞二十首領笞三十吏笞四十每三人各加一等並罪止杖一百罪坐所由容留之人不坐其罷閑官吏在外干預官事結攬寫發文案把持官府蠧政害民者並杖八十於犯人名下追銀二十兩付告人充賞有所規避者從重論若官府稅糧由帖戸口籍册雇募攢寫者勿論條例一内外大小衙門考取吏典照缺補用若舊吏索頂頭錢者事發計贓准不枉法論革役為民一吏典撒潑抗拒誣告本管官員及犯誆騙詐欺恐嚇取財未得入已并偷盜自首者俱照律問擬發原籍為民一坐糧㕔所屬八行運役及倉役名缺責令通州知州僉選誠實良民應役如保送旂人及民人以一身而充兩三役者倉塲侍郎廵倉御史察出題叅知州交部議處該役及保結之人杖八十徒二年一各直省大小衙門經制書吏即在現充書識内擇勤慎辦事之人核實取結承充倘有懸掛空名並不親身着役將本人照吏典人等額外濫充律治罪該本管官照例議處信牌凡府州縣置立信牌拘提人犯催督公事量地逺近定立限程隨事銷繳違者指差人邊牌限一日笞一十每一日加一等罪止笞四十若府州縣官遇有催辦事務不行依律發遣信牌輒親下所屬坐守催併者杖一百所屬指州縣鄉村言其㸃視橋梁圩岸驛傳遞舖踏勘災傷檢屍捕賊抄劄之類不在此限條例一道府以上官員凡關係叛逆軍需驛遞公文等𦂳要重大事情照例差人外其餘細事止許行牌催提如違例差遣人役者督撫指名題叅徇情不叅者事發一併議處其督撫於平常細事差役害民者亦交部議處一州縣大小案件凡有差票務須隨時繳銷如遇封印而案未完結於封印時將票暫行繳銷俟開印差拘另行差票違者將州縣官分别議處貢舉非其人凡貢舉非其人及才堪時用應貢舉而不貢舉者計其妄舉與不舉人數一人杖八十毎二人加一等罪止杖一百所舉之人知情與同罪不知者不坐若主司考試藝業技能而故不以實者可取者置之下等不可取者反置之上等減二等若貢舉考試失者各減三等受贓俱以枉法從重論條例一鄉㑹試考試官同考官及應試舉子有交通囑託賄買關節等弊問實斬決一嵗貢生員册報到部遇有事故不許補貢其未經報部遇有事故者勘眀准令次考補貢若丁憂及患病勘眀仍補該年之貢如託故延至三年之外者亦不准收有司朦朧送補者各治罪一應試舉監生儒及官吏人等但有懷挾文字銀兩並越舍與人换寫文字者枷號一箇月滿日杖一百發為民其夫匠軍役人等受財代替夾帶傳遞及不舉察捉拏者發邉外為民官縱容者交部議處受財以枉法論其武塲有犯懷挾等弊俱照此例擬斷一凡學臣考試如提調官通同作弊及引誘為非者同學臣一併革職提問其學臣暗通關節私鬻名器提調官雖無通同引誘情弊而防範不嚴者交部議處學臣應用員役倘有招揺撞騙及受賄傳遞等弊提調官不行訪拏究治者亦交部議處若學臣操守清亷杜絶情弊而提調官不得遂其引誘反行挾制把持者該學臣即行指叅審實將提調官照貪官例治罪一凡考試官毫無情弊下第諸生不安義命逞忿混行攪閙者發附近充軍一官生錄科該學政瞻徇情面濫行錄送如官卷内有文理荒謬倖邀科第者發覺之日將送考官一併嚴加議處一考職貢監生如有包攬代作等弊察出題究若監試御史隠匿瞻徇照例議處其假冒頂替者本犯照詐假官律治罪互結監生照知情詐假官律治罪出結之官照例議處若身故未經繳照者限四箇月准家屬自首如逾限不首查出嚴行治罪該地方官於已革已故未經繳照之人徇隠故縱不嚴行追繳事發之日照例議處其先經考職未經㨂選復行頂名重考希圖引見者許出結互結首告將本犯照律治罪如知情不舉將出結互結人員一併嚴加治罪舉用有過官吏凡官吏曽經斷罪罷職役不敘者諸衙門不許朦朧保舉違者舉官及匿過之人各杖一百罷職役不敘受贓俱以枉法從重論若將帥異才不係貪污規避而罷閒者有司保勘眀白亦得舉用條例一文職官員舉貢監生并吏員承差人等曽經考察論劾罷黜及為事問革例不入選者若買求官吏改洗文卷隠匿公私過名或詐作丁憂起復以圖選用事發問罪吏部門首枷號一箇月已除授者發近邊未除授者發附近各充軍其起送官吏不分軍衛有司但知情受賄者亦發附近充軍贓重者從重論若原不知情止是失於覺察者照常處分發落一凡衙役犯侵盜錢糧婪贓等罪遇赦豁免後復入原衙門及别衙門應役者杖一百徒三年該管官知情故縱及督撫不即紏叅者俱交該部議處一凡部院衙門書辦或因有疾或因不諳文移退役之後倘有更名重役者杖一百革退一凡在外各衙門書役投充務查該役的名取具並無重役冒充親供互結行查本籍地方該地方官加具印結申送方准著役倘有役滿不退者杖一百革役本管官不行查出交部議處一凡在京各衙門書吏缺出應募投充者取具同鄉書吏保結該衙門于十日内照保結所開籍貫住址三代姓氏咨行吏部轉行各省取具印甘各結順天限四十日直隸山東河南山西奉天限三箇月江蘇安徽陜甘湖南湖北浙江江西限四箇月雲貴川廣福建限六箇月咨送到部准其著役該地方官吏有勒索遲延等弊分别處分治罪本非大宛兩縣籍貫揑稱土著之民地方官朦朧出結該吏及承行吏典嚴加治罪地方官交部議處一凡各部院衙門滿役書吏籍隸大宛二縣者令該縣將年貌住址墳墓造册申送都察院令該城御史按册確查其非實在大宛籍貫者一概逐回倘潛留京城照年滿書役冒籍冒名例杖一百勒令回籍如有包攬招摇等弊按律治罪其混行造册之該縣知縣不行查出之該城御史交部議處若因犯有事故押逐回籍行文本籍地方官嚴行管束如有仍來京者將本籍地方官交部議處其無業遊民曽經犯罪亦令京城文武地方各官實力稽查押逐回籍交與該地方官嚴行管束一各部院衙門經承書吏所雇貼寫該管司官開眀伊等姓名年貌籍貫取具該經承保結移付司務㕔註册倘遇驅逐辭去即移付司務㕔除名如有揑報詭名經承扶同保結察出照重役例治罪其有負罪潛逃者著落保結之經承立限捕獲亦照律治罪一部院各衙門書吏從前未經犯案例應回籍者潛匿京師拏獲之日即遞回原籍其從前犯事遞回原籍今又私自來京雖未經犯案即應查拏枷號一箇月責四十板其有再來犯案罪止杖笞者仍從重照例枷責所犯重於枷責者照本犯應得之罪加一等治罪仍遞回原籍交地方官嚴行管束其疎縱之地方官交部議處一斥革監生有易名復捐者除將復捐監生革退追繳執照外仍照違制律治罪伊等犯事到官一面追照繳銷一面即行審擬擅離職役凡官内外文武吏典吏無患病公差之故擅離職役者笞四十各留職役若避難如避難解之錢糧難捕之盜賊有干係者因而在逃者杖一百罷職役不敘所避事重者各從重論如文官随軍供給糧餉避難在逃以致臨敵缺乏武官已承調遣避難在逃以致失誤軍機若無所避而棄印在逃則止罷職其在官如廵風官吏火夫之類應直不直應宿不宿各笞二十若主守常川看守倉庫務場獄囚雜物之類應直不直應宿不宿者各笞四十俱就無失事者言耳若倉吏不直宿而失火庫子不直宿而失盜禁子不直宿而失囚之類自有本律科罪條例一監生在監肄業及各衙門辦事官吏承差皆不許倩人代替違者俱問罪黜革為民代替者别有職役一體問革一外任旂員子弟歸旂後有因事告假與例相符者該旂酌量給假仍分别省分逺近定限給以執照令其依限回旂並咨部行文該省按限催令歸旂如有借端逗遛照違制律治罪官員赴任過限凡已除官員在京者以除授日為始在外者以領該部所給文憑限票日為始各依已定程限赴任若無故過限者一日笞一十每十日加一等罪止杖八十並留任若代官已到舊官各照已定限期交割户口錢糧刑名等項及應有卷宗籍册完備無故十日之外不離任所者依赴任過限論減二等亦留任其中途阻風被盜患病喪事不能前進者聴於所在官司告明給印信結狀以備後日違限將結狀送官照勘若有規避詐冒不實者從重論當該官司扶同保勘者罪同條例一陞除出外文職已經領勅領憑若無故遷延至半年之上不辭朝出城者叅提依違制律問罪若已辭出城復入城潛住者交部議處一外任漢軍官員有陞轉來京及年老有病降級革職歸旂者務於定限之内起程令該督撫提鎮照依各省逺近大路有驛站者日行一站僻路無驛站者日行五十里酌定到京期限咨報該部該旂其中途阻風被盜喪事不能前進仍照律聴其於所在官司給狀以備照勘外如有無故不速起程或已起程中途逗遛或在别處居住或本身進京而令家口在别處居住者督撫提鎮題叅交部均照違制律治罪地方官不行詳報督撫提鎮不行題叅交部議處或已經起程地方官不行申報督撫提鎮不行咨眀該部該旂以致沿途逗遛生事者亦交部議處其革職免罪人員别無未清事件亦遵照此例給咨催令回旂免其沿途押解一漢官革職離任交代完日即令起程不得過五箇月之限該督撫將起程日期報部並知㑹原籍地方官倘違限不即起程一月以上照舊官十日之内不離任所律治罪該管及地方官不行查出交部議處革職免罪人員亦令按限起程免其請咨押解其有寃抑欲赴都察院具呈申理者地方官給咨來京事竣之日發回原籍如借端留滯照例治罪五城司坊官徇情容留交部議處一京官革職曽經問有罪名者限一月内起程五城司坊官將起程日期報部並知㑹原籍地方官倘違限不即起程一月以上照例治罪五城司坊官及地方官不行查出亦交部議處無故不朝叅公座凡大小官員無故在内不朝叅在内不言公座署事重朝叅也併論在外不公座署事及官吏給假限滿無故不還職役者一日笞一十每三日加一等各罪止杖八十並留職役擅勾屬官凡上司催㑹公事立文案定期限或遣牌或差人行移所屬衙門督併完報如有遲錯依律論其稽遲違錯之罪若擅勾屬官拘唤吏典聴事及差占司獄各州縣首領官因而妨廢公務者上司官吏笞四十若屬官承順逢迎及差撥吏典赴上司聴事者罪亦如之其有必合追對刑名查勘錢糧監督造作重事方許勾問事畢随即發落無故稽留三日者笞二十每三日加一等罪止笞五十勾問謂勾問其事情非勾拘問罪也若問罪則名例明開上司不許徑自勾問矣姦黨凡姦邪將不該死之人進讒言左使殺人不由正理借引别事以激怒人主殺其人以快已意者斬監候若犯罪律該處死其大臣小官巧言諌免暗邀市恩以結人心者亦斬監候若在朝官員交結朋黨紊亂朝政者凡朋黨官員皆斬監候妻子為奴財產入官若刑部及大小各衙門官吏不執法律聴從上司指姦臣主使出入已決放人罪者罪亦如之若有不避權勢明具實跡親赴御前執法陳訴者罪坐姦臣言告之人雖業已聴從致罪有出入亦得與免本罪仍將犯人財產均給若止一人陳奏全給充賞有官者陞二等無官者量與一官或不願官者賞銀二千兩交結近侍官員凡諸衙門官吏若與内官及近侍人員互相交結漏泄機宻事情夤縁作弊内外交通泄漏事情而扶同奏啟以圖乘機迎合者皆斬監候妻子流二千里安置此亦姦黨一節但漏泄較紊亂少輕故止流而安置其妻子不籍没其家產若止以親故徃來無夤縁等弊不用此律條例一罷閒官吏在京潛住有擅出入禁門交結者各門盤詰拏送法司問實發烟瘴地面充軍上言大臣徳政凡諸衙門官吏及士庶人等若有上言宰執執政大臣美政才徳者非圖引用便係報私即是姦黨務要鞫問窮究所以阿附大臣來歴眀白犯人連名上言止坐為首者處斬監候妻子為奴財產入官若宰執大臣知情與同罪不知者不坐大臣知情與同罪亦依名例至死減一等法杖一百流三千里不追及妻子財產條例一督撫等官或陞任更調降謫丁憂離任而地方百姓赴京保留控告者不准行將來告之人交與該部治罪若下屬交結上官派歛資斧驅民獻媚或本官留戀地方授之意指藉公行私事發得實亦交該部從重治罪大清律例卷六
