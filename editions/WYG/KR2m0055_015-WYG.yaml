body:
  text: 經筵日講起居注官太子太保東閣大學士禮部尚書管理刑部事務臣劉統勲等謹奏為奏明律例清漢全書吿竣事竊查臣部於乾隆三十一年奏准開館纂修律例經臣等將歴年欽奉上諭及議准内外臣工條奏應纂為例者詳細覆核敬謹編輯恭繕漢字黄冊進呈並聲明欽定後臣部按照漢文次第繙譯彚繕清漢黄冊恭呈御覽并此後或奉有諭㫖及臣工條奏准行應入例冊者於未經刊刻以前仍行添纂等因奏准在案今臣等督率提調纂修繙譯等官謹遵欽定黄冊先行刊刷草本頒發各省遵照辦理仍逐條重加謄寫分門别類繙譯清文恭繕清漢黄冊進呈並將續奉諭㫖暨臣工奏准事件應行添纂修改刪除之處詳加酌核按類編輯一體繕寫清漢黄冊裝釘成帙並於各條例後加具謹按黏貼黄簽恭呈御覽俟欽定後將補纂各條仍先刊刷草本頒行各省督撫將軍一體遵行再查律例全書自乾隆二十年以後雖經兩次修輯均祗就現纂新例另為一編並未歸入全書不第艱於翻閲而援引亦恐疎漏此次增刪改併既經釐正應請將前次續纂並此次編輯各條以及總類均按照律目逐一歸入清漢全書以便查閱引用俟命下之日臣部即將新舊條例俱按門歸入繕寫清漢樣本送交武英殿刊刻頒發遵行臣等更有請者此次歸入全書新例清文俱已遵照欽定新語繙譯惟舊例各條因係已刻舊板其清語尚屬舊文前後似未畫一應請將全部清書内舊語俱用清書房繙譯新語逐一釐正抽換刊刻庶免參差合併聲明為此謹奏請㫖等因乾隆三十三年六月二十九日奏七月初一日奉㫖知道了欽此
