body:
  text: 刑律賊盜下親屬相盜凡各居本宗外姻親屬相盜兼後尊長卑幼二􅅃財物者期親減凡人五等大功減四等小功減三等緦麻減二等無服之親減一等並免刺若盜有首從而服屬不同各依本服降減科斷為從各又減一等若行强盜者尊長犯卑幼亦依强盜已行而得財不得財各依上減罪卑幼犯尊長以凡人論不在減等之限若有殺傷者總承上竊强二項各以殺傷尊長卑幼本律從其重者論若同居卑幼將引若將引各居親屬同盜其人亦依本服降減又減為從一等科之如卑幼自盜止依擅用不必加他人盜已家財物者卑幼依私擅用財物論加二等罪止杖一百他人兼首從言減凡盜罪一等免刺若有殺傷者自依殺傷尊長卑幼本律科罪他人縱不知情亦依强盜得財不得財論若他人殺傷人者卑幼縱不知情亦依殺傷尊長卑幼本律仍以私擅用加罪及殺傷罪權之從其重者論其同居奴婢雇工人盜家長財物及自相盜者首減凡盜罪一等免刺為從又減一等被盜之家親屬告發並論如律不在名例得相容隠之例條例一同居卑幼將引他人强劫已家財物依各居親屬行强盜卑幼犯尊長以凡人論斬奏請定奪一凡奴僕偷盜家長財物者照竊盜律計贓治罪若起意勾引外人同盜家長財物者將起意之奴僕計贓遞加竊盜一等治罪至一百二十兩以上者仍照律擬絞監候被勾引之外人仍照竊盜律分别定擬雇工人盜家長財物亦照竊盜計贓治罪一凡親屬相盜除本宗五服以外俱照無服之親定擬外其外姻尊長親屬相盜惟律圖内載明者方准照律減等此外不得濫引一凡奴僕雇工人强劫家長財物及勾引外人同劫家長財物者悉照凡人强盜律定擬其有殺傷家長者仍依律從重論恐嚇取財凡恐嚇取人財者計贓准竊盜論加一等以一主為重併􅂍分首從其未得財者亦准竊盜不得財罪上加等免刺若期親以下自相恐嚇者卑幼犯尊長以凡人論計贓准竊盜加一等尊長犯卑幼亦依親屬相盜律遞減科罪期親亦減凡人恐嚇五等須於竊盜加一等上減之條例一監臨恐嚇所部取財准枉法論若知人犯罪而恐嚇取財者以枉法論一凡將良民誣指為盜及寄買賊贓捉拿拷打嚇詐財物或以起贓為由沿房摉檢搶奪財物淫辱婦女除實犯死罪外其餘不分首從俱發邊逺充軍誣指送官依誣告論淫辱婦女以强姦論一凡凶惡光棍好鬭之徒生事行凶無故擾害良人者發往寧古塔烏喇地方分别當差為奴其官員有犯該部奏聞發遣一凡惡棍設法索詐官民或張貼掲帖或揑告各衙門或勒寫借約嚇詐取財或因鬭毆糾衆繫頸謊言欠債逼寫文券或因詐財不遂竟行毆斃此等情罪重大實在光棍事發者不分曾否得財為首者斬立決為從者俱絞監候其犯人家主父兄各笞五十係官交該部議處如家主父兄首者免罪犯人仍照例治罪一凡旂民結夥指稱隠慝逃人索詐財物者不分曾否得財為首者斬決為從者俱絞候一凡在内太監逃出索詐者俱照光棍例治罪一凡苖人有伏草捉人横加枷肘勒銀取贖者初犯為首者斬監候為從者俱枷號三箇月臂膊刺字再犯者不分首從皆斬立決其有土哨姦民勾通取利造意者不分初犯再犯並立斬決附和者各枷號兩箇月僉妻發邊外為民該管土官雖不知情亦按起數交該部議知情故縱者革職杖一百若教令指使或和同取利者革職枷號三箇月俱不准折贖一凡附近番苖地方吏民人等擅入苖境藉差欺凌或强姦婦女或搶劫財物以及訛詐不遂聚衆凶毆殺死人命等案將所犯查照定例如原係斬決絞決之犯審實具題俟命下之日將該犯押赴犯事處所正法其例應斬候絞候者審係藉差欺凌等項實在情重應將監候改為立決亦於題覆之日押赴原犯地方正法至尋常案件雖係民苖交涉審無前項情節仍照定例擬罪至秋審時有情實勾決之犯亦於原犯苖地正法仍將該犯從重治罪正法情由張掛告示通行曉諭該管官員有縱差騷擾激動畨蠻者仍援照引惹邊釁例治罪若止於失察交部議處一内外大小衙門蠧役恐嚇索詐貧民者計贓一兩以下杖一百一兩至五兩杖一百加枷號一箇月六兩至十兩杖一百徒三年為從分贓並一等其十兩以上及索詐貧民致令賣男鬻女贓在十兩以下者仍照定例遵行詐欺官私取財凡用訃詐偽欺瞞官私以取財物者並計詐欺之贓准竊盜論免刺若期親以下不論尊長卑幼同居各居自相詐欺者亦依親屬相盜律遞減科罪若監臨主守詐欺同監守之人取所監守之物者係官物以監守自盜論未得者減二等若冒認及誆賺局騙拐帶人財物者亦計贓准竊盜論係親屬亦論服遞減免刺條例一凡誆騙聼選官吏及舉人監生生員人等財物指稱買官買缺及買求中式等項如誆騙已成不分首從於該衙門門首枷號三箇月發烟瘴地面充軍其央凂營幹致被誆騙者免其枷號亦照前發遣若誆騙未成財未接受罪應滿徒者加枷號兩箇月但經口許罪止杖責者加枷號一箇月分别發落被騙者仍照律例治罪免其枷號一凡指稱内外大小官員名頭並各衙門打㸃使用名色誆騙財物計贓犯該徒罪以上者俱不分首從發近邊充軍情重者仍枷號兩個月發遣如親屬指官誆騙止依期親以下詐欺律不可引例一學臣考試有積慣隨棚代考之鎗手察出審實枷號三個月發烟瘴地面充軍其雇倩鎗手之人及包攬之人並與鎗手同罪知情保結之廩生杖一百窩留之家不知情者照不應重律治罪倘有别情從重科斷有贓計贓以枉法從重論一漕糧起運頭幫軍伍將已裁陋規復行派歛私自婪收或於定數之外多行勒索者令各幫軍丁於經管衙門呈控將勒索之頭伍計贓分别首從定擬犯該徒罪以上者俱照指稱衙門打㸃使用名色誆騙財物例不分首從發近邊充軍情重者加枷號兩個月其官弁兵役受賄責令該管上司㕘革究審計贓以枉法論軍丁挾嫌揑控照誣告律治罪一生童考試如有積慣棍徒揑稱給與字眼記認誆騙財物者不論有無立約封銀及口許虛贓俱照撞騙已成例枷號三個月發烟瘴地面充軍被騙生童杖一百徒三年若僅用虛詞誆騙事屬未成罪止杖責者仍照定例加枷號一個月分别發落被騙者仍照例治罪免其枷號一代倩鎗手以已成未成為斷如塲外經提調訪拿或被生童稟首者為未成如已頂名入塲無論當時被獲事後發覺俱為己成未成者除審係積慣隨棚仍照定例問擬外若僅立有文約而贓未入手鎗手與本童均照誆騙未成財未接受罪應滿徒者加枷號兩個月但經口許罪止杖責者加枷號一個月分别發落之例治罪其已成者不分有無立約及口許虛贓俱照誆騙已成例枷號三個月發烟瘴地面充軍雇倩之生童與同罪若生童實係被人撞騙贓止口許情罪稍輕者照誆騙未成財未接受例杖一百徒三年畧人略賣人凡設方略而誘取良人為奴婢及略賣良人與人為奴婢者皆不分首從未賣杖一百流三千里為妻妾子孫者造意杖一百徒三年因誘賣不從而傷被略之人者絞監候殺人者斬監候為從各減一等被略之人不坐給親完聚若假以乞養過房為名買良家子女轉賣者罪亦如之不得引例若買來長成而賣者難同此律若和同相誘取在己及兩相情願賣良人為奴婢者杖一百徒三年為妻妾子孫者杖九十徒二年半被誘之人減一等仍改正給親未賣者各減己賣一等十嵗以下雖和亦同略誘法被誘略者不坐若略賣和誘他人奴婢者各減略賣和誘良人罪一等若略賣子孫為奴婢者杖八十弟妹及姪姪孫外孫若已之妾子孫之婦者杖八十徒二年略賣子孫之妾減二等同堂弟妹堂姪及姪孫者杖九十徒二年半和賣者減略賣一等未賣者又減己賣一等被賣卑幼雖和同以聼從家長不坐給親完聚其和略賣妻為婢及賣大功以下尊卑親為奴婢者各從凡人和略法若受寄所賣人口之窩主及買者知情並與犯人同罪至死減一等牙保各減犯人一等並追價入官不知者俱不坐追價還主條例一將腹裏人口用强略賣與境外土官土人峒寨去處圖利除殺傷人律該處死外若未曽殺傷人比依將人口出境律絞一凡誘拐婦人子女或典賣或為妻妾子孫者不分良人奴婢已賣未賣但誘取者被誘之人若不知情為首者擬絞監候被誘之人不坐若以藥餅及一切邪術迷拐幼小子女為首者立絞為從應發寧古塔給窮披甲之人為奴者照名例改遣之例問發其和誘知情之人為首者亦照例發遣為從及被誘之人俱減等滿徒若雖知拐帶情由並無和同誘拐分受贓物暫容留數日者不分旗民俱枷號兩個月發落有服親屬犯者仍各照本律科斷婦人有犯罪坐夫男夫男不知情及無夫男者仍坐本婦決杖一百餘罪收贖一凡夥衆開窰誘取婦人子女藏匿勒賣事發者不分良人奴婢已賣未賣審係開窰情實為首照光棍例擬斬立決為從發黑龍江等處給披甲人為奴一凡誘拐人口為首擬絞人犯若奉㫖免死減等發落應發寧古塔給窮披甲之人為奴者照名例改遣之例問發一盛京烏喇等處居住之人買人仍照例用印行買外若不詳詢來歴混買人者係另户連妻子發往江寧杭州披甲係家人止將本人發往江寧杭州給窮披甲之人為奴一凡外省民人有買貴州窮民子女者令報明地方官用印准買但一人不許買至四五人帶往外省仍令各州縣約立官媒凡買賣男婦人口憑官媒詢明來歴定價立契開載姓名住址男女年庚送官鈐印該地方官豫給循環印簿將經手買賣之人登簿按月繳換稽查倘契中無官媒花押及數過三人者即究其略賣之罪倘官媒通同棍徒興販及不送官印契者俱照例治罪至來歴分明而官媒掯索許即告官懲治如地方官不行查明將苖民男婦用印賣與川販者照例議處至印買苖口以後給與路照填註姓名年貌闗汛員弁驗明放行如有兵役留難勒索及受賄縱放者俱照律治罪該管員弁分别議處一凡窩隠川販果有指引捆拐藏匿遞賣確據者審實照開窰為首例同川販首犯皆斬立決在犯事地方正法其無指引捆拐遞賣情事但窩隠䕶送分贓者不論贓數不分首從俱發近邊充軍其止知情窩留未經分贓者無論人數多寡為首者杖一百流三千里為從杖一百徒三年其鄰佑知而不首者杖一百一凡收留迷失子女不報及誘拐人犯各衙門畨捕不行查拿經他處緝獲將畨捕照緝盜逾限律責處知而不拿者照應捕人知罪人所在而不捕律減罪人罪一等發落該管官按窩留誘拐人數分别議處其直𨽻各省之地方保甲人等如見外來之人帶有幼童幼女行走住宿形跡可疑者盤詰得實即行捕治倘有疎縱經别處拿獲供出容留地方將容留之家照知情容留拐帶例懲治地方保甲照窩藏逃人例治罪該地方官亦照例議處如有借稽查名色訛詐生事者均照訛詐例治罪一略賣海外畨仔之内地民人不分首從杖一百流三千里俟有便船仍令帶回安插文武官稽查不力照外國之人私自進口不行查報交部分别議處得贓者以枉法治罪一貴州雲南四川地方民人誘拐本地子女在本省售賣審無勾通外省流棍情事仍照誘拐婦人子女本例分别定擬如綑綁本地子女在本地售賣為首擬斬監候為從發近邊充軍一凡貴州地方有外來流棍勾通本地棍徒將荒村居住民苖人户殺害人命擄其婦人子女許圖販賣者不論已賣未賣曽否出境俱照强盜得財律不分首從皆斬梟示其有迫脅同行並在塲未經下手情尚可原者於疏内聲明減為擬斬監候請㫖定奪至殺一家三人以上者仍從重定擬其用威力强行綁去及設方略誘往四川販賣不論已賣未賣曽否出境為首者擬斬立决為從者擬絞監候其有將被拐之人傷害致死者除為首斬决外為從者擬斬監候若審無威力捆縳及設計强賣實係和同誘拐往川者不論已賣未賣但起行在途為首者擬絞監候為從者杖一百流三千里被誘之人仍照例擬徒其窩隠川販在家果有指引殺人捆擄及勾通略誘和誘子女藏匿遞賣者審實各與首犯罪同其無指引勾串等情但窩隠䕶送分贓與僅知情窩留而未分贓者仍照舊例分别定擬雲南四川所屬地方如有拐販捆擄等犯亦照貴州之例行其一年限内拿獲興販棍徒并不能拿獲之文武員弁均按人數分别議叙議處一凡流棍販賣貴州苖人除本犯照例治罪外其知情故買者照違制律杖一百仍將苖人給親收領一興販婦人子女轉賣與他人為奴婢者照略賣良人為奴婢律杖一百流三千里若轉賣與他人為妻妾子孫亦照略賣良人為妻妾子孫律杖一百徒三年地方官匿不申報别經發覺交部議處一奴及雇工略賣家長之妻女及子者照卑幼强搶期親尊屬嫁賣例擬斬監候其因略賣而又犯殺傷姦淫等罪仍各照本律分别斬決凌遲從重科罪至略賣家長之期功以下親屬仍照例擬絞和者發遣發塜凡發掘他人墳塚見棺槨者杖一百流三千里已開棺槨見屍者絞監候發而未至棺槨者杖一百徒三年招魂而葬亦是為從減一等若年逺塚先穿陷及未殯埋而盜屍柩屍在柩未殯或在殯未埋者杖九十徒二年半開棺槨見屍者亦絞雜犯其盜取器物磚石者計贓准凡盜論免刺若卑幼發五服以内尊長墳塚者同凡人論開棺槨見屍者斬監候若棄屍賣墳地者罪亦如之買地人牙保知情者各杖八十追價入官地歸同宗親屬不知者不坐若尊長發五服以内卑幼墳塚開棺槨見屍者緦麻杖一百徒三年小功以上各遞減一等祖父母父母發子孫墳塚開棺槨見屍者杖八十其有故而依禮遷葬者尊長卑幼俱不坐若殘毁他人死屍及棄屍水中者各杖一百流三千里謂死屍在家或在野未殯葬將屍焚燒殘毁之類若已殯葬者自依發塚開棺槨見屍律從重論若毁棄緦麻以上尊長未葬死屍者斬監候棄他人及尊長而不失其屍及毁而但髠髪若傷者各減一等凡人減流一等卑幼減斬一等毁棄緦麻以上卑幼死屍各依凡人毁棄依服制遞減一等毁棄子孫死屍者杖八十其子孫毁棄祖父母父母及奴婢雇工人毁棄家長死屍者不論殘失與否斬監候律不載妻妾毁棄夫屍有犯依緦麻以上尊長律奏請若穿地得無主死屍不即掩埋者杖八十若於他人墳墓為熏狐狸因而燒棺槨者杖八十徒二年燒屍者杖一百徒三年若緦麻以上尊長各遞加一等燒棺槨者各加為杖九十徒二年半燒屍者遞加為杖一百流二千里不可依服屬各遞加致反重於祖父母父母也卑幼各因其服依凡人遞減一等若子孫於祖父母父母及奴婢雇工人於家長墳墓熏狐狸者杖一百燒棺槨者杖一百徒三年燒屍者絞監候平治他人墳墓為田園者雖未見棺槨杖一百仍令改正於有主墳地内盜葬者杖八十勒限移葬若將尊長墳塚平治作地得財賣人止問誆騙人財不可作棄屍賣墳地斷計贓輕者仍杖一百買主知情則坐不應重律追價入官不知情追價還主若地界内有死人里長地鄰不申報官司檢驗而輒移他處及埋藏者杖八十以致失屍者首杖一百殘毁及棄屍水中者首杖六十徒一年殘棄之人仍坐流罪棄而不失及髠髮若傷者各減一等杖一百若隣里自行殘毁仍坐流罪因而盜取衣服者計贓准竊盜論免刺條例一凡發掘常人墳塚開棺見屍為從與發見棺槨為首改發近邊充軍如有糾衆發塚起棺索財取贖者比依强盜得財律不分首從皆斬一凡發掘貝勒貝子公夫人等墳塚開棺槨見屍者為首斬立决為從皆絞立決見棺者為首絞立決為從皆絞監候未至棺者為首絞監候為從發邊逺充軍如有發掘歴代帝王陵寢先王名臣及前代藩王墳墓者俱照此例治罪所掘金銀交與該撫飭令地方官修葺墳塚其玉帶珠寳等物仍置塚内一凡奴婢雇工人發掘家長墳塚已行未見棺者為首擬絞監候為從發近邊充軍見棺槨者為首絞立決為從絞監候開棺槨見屍者為首斬立決為從斬監候毁棄撇撒死屍者不分首從皆斬立決子孫犯者俱照此例科斷一凡貪人吉壤將逺年之墳盜發者子孫告發審有確據將盜發之人以開棺見屍律擬絞監候如非其子孫又非實有確據之前人古塚但因有土墩見人埋葬輒稱伊逺祖墳墓勾引匪類夥告夥証陷害無辜審明將為首者照誣告人死罪未決律杖一百流三千里為從各照誣告為從律科斷若實係本人逺祖之墳被人發掘盜葬因將所盜葬之棺發掘抛棄者照祖父母父母被殺子孫不告官司而擅殺行凶人律杖六十若盜葬者並無發掘等情止在切近墳旁盜葬而本家輒行發掘者應照地界内有死人不告官司而輒移他處律科斷如有毁棄屍骸照地界内有死人而移屍毁棄律科斷盜葬之人仍照本律杖八十責令遷移若非係墳地止在田地塲園内盜葬而地主發掘之者除開棺見屍仍照律擬絞外其不開棺見屍者各照本律減一等科斷其盜葬之人應照本律減二等杖六十亦責令遷移如兩造本係親屬其所侵損之墳塚棺槨屍骸與本人皆有服制者各照律内服制科斷一凡偷刨墳墓為從之犯開棺三次及至三次以外者審有贓誣次數確據事主告發實情照三犯竊盜律擬絞監候二次者發烟瘴充軍一次者改發近邊充軍一民人除無故穵焚已葬屍棺者仍照例治罪外其因争墳阻葬開棺易罐埋藏占𦵏者亦照開棺見屍殘毁死屍各本律治罪若以他骨暗埋豫立封堆偽說䕃基審係恃强占𦵏者照强占官民山塲律治罪審係私自偷埋者照於有主墳地内偷葬律治罪其侵犯他人墳塚者照發掘他人墳塚律治罪如果審係地師教誘將教誘之地師均照詐教誘人犯法律分别治罪若地方官隠諱寛縱不實力查究照例㕘處一盜未殯未埋屍柩及發年久穿陷之塚未開棺槨者杖一百徒三年如開棺見屍一次者為首發邊逺充軍二次者發極邊烟瘴充軍三次者絞為從一次者仍照雜犯流罪總徒四年二次者發邊逺充軍三次者發極邊烟瘴充軍三次以上者亦絞一凡愚民惑於風水擅稱洗筋檢筋名色將已葬父母及五服以内尊長骸骨發掘檢視占驗吉凶者均照服制以毁棄坐罪幫同洗檢之人俱以為從論地保扶同隠匿照知人謀害他人不即阻首律杖一百若有故而以禮遷葬仍照律勿論一發掘墳塚除塚先穿陷及止盜墳塚上磚石器物者仍照律免刺外若開棺見屍及發塚見棺為首者均於面上刺發塚字其發塚見棺為從與未見棺罪在軍流以下者初犯刺臂再犯刺面其盜未殯未埋屍柩者刺盜棺字一竊劫之犯如有在湖河舟次格鬭致斃屍墮水中漂流不獲及山谷險隘猝然禦暴屍沉澗溪本無毁棄之情者仍依格殺本律科斷毋庸牽引棄屍之律若係在家夤夜格捕致死姦盜之犯或在曠野道途格殺拒捕盜賊罪本不應擬抵將屍毁棄掩埋移投坑井者照地界内有死人不報官司私自掩埋律杖八十因而遺失者照地界内有死人移置他所以致失屍律杖一百如有格殺之後懐挾讐恨逞凶殘毁投棄水大割剥損傷者仍照毁棄死屍本律科罪其隨同協捕共毆之餘人有犯棄毁移埋等項俱照此例分别辦理夜無故入人家凡夜無故入人家内者杖八十主家登時殺死者勿論其已就拘執而擅殺傷者減鬭殺傷罪二等至死者杖一百徒三年條例一凡黑夜偷竊或白日入人家内偷竊財物被事主毆打至死者比照夜無故入人家已就拘執而擅殺至死律杖一百徒三年若非黑夜又未入人家内止在曠野白日摘取蔬果等類俱不得濫引此律盜賊窩主凡强盜窩主造意身雖不同行但分贓者斬若行則不問分贓不分贓只依行而得財者不分首從皆斬若不知盗情只是暫時停歇者止問不應若不同行又不分贓者杖一百流三千里共謀其窩主不曽造謀但與賊人共知謀情者行而不分贓及分贓而不行皆斬若不行又不分贓者杖一百竊盜窩主造意身雖不行但分贓者為首論若不行又不分贓者為從論減一等以臨時主意上盜者為首其窩主若不造意而但為從者行而不分贓及分贓而不行減造意一等仍為從論若不行又不分贓笞四十若本不同謀偶然相遇共為强竊盜其强盜固不分首從若竊盜則以臨時主意上盜者為首餘為從論其知人略賣和誘人及强竊盜後而分所賣所盜贓者計所分贓准竊盜為從論免刺若知强竊盜贓而故買者計所買物坐贓論知而寄藏者減故買一等各罪止杖一百其不知情誤買及受寄者俱不坐條例一推鞫窩主窩藏分贓人犯必須審有造意共謀實情方許以窩主律論斬若止是勾引容留往來住宿並無造意共謀情狀者但當以窩藏例發遣毋得附㑹文致概坐窩主之罪一各處大户家人佃僕結搆為盜殺官劫庫劫獄放火許大户即送官追問若大户知情故縱除實犯死罪外杖徒流罪俱發附近充軍一凡皇親功臣管莊家僕佃戸人等及諸色軍民大户勾引來歴不明之人窩藏強盜二名以上竊盜五名以上坐家分贓者俱問發近邊充軍若有造意共謀之情者各依律從重科斷干礙皇親功臣者㕘究治罪一凡各處無籍之徒引賊劫掠以復私讐探報消息致賊逃竄者照奸細律處斬梟首示衆一知强竊盜贓而接買受寄若馬驘等畜至二頭匹以上銀貨坐贓至滿數者俱問罪不分初犯再犯枷號一個月發落若三犯以上不拘贓數多寡與知强盜後而分贓至滿數者俱免枷號發近邊充軍接買盜贓至八十兩為滿數受寄盜贓至一百兩為滿數盜後分贓至一百二十兩以上為滿數一凡强盜窩主之鄰佑知而不首者杖一百一强竊盜窩家之同居父兄伯叔與弟自首者照例免罪本犯減等發落外其知情而又分贓各照强竊盜為從例減一等治罪父兄不能禁約子弟窩盜者各照强竊盜父兄論一强盜窩主雖不行又不分贓但知情存留一人者杖一百徒三年存留二人者杖一百流三千里存留三人以上應發三姓地方者照名例改遣之例問發一凡窩線同行上盜得財者仍照强盜律定擬外如不上盜又未得財但為賊探聼事主消息通線引路者應照强盜窩主不行又不分贓律杖一百流三千里一容留外省流棍者照勾引來歴不明之人例發近邊充軍一編排保甲保正甲長牌頭須選勤慎練達之人㸃充如豪横之徒藉名武斷該管官嚴查究革從重治罪果實力查訪盜賊據實舉報照捕役獲盜過半以上例按名給賞倘知有為盜窩盜之人瞻徇隠匿者杖八十如係竊盜分别賊情輕重懲警若牌頭於保正甲長處舉報而不行轉報者甲長照牌頭減一等保正減二等發落牌頭免坐其一切戸婚田土不得問及保甲惟人命重情取問地鄰保甲賭博為盜賊淵藪仍令同盜賊一併查舉再地方有堡子村莊聚族滿百人以上保甲不能編查選族中有品望者立為族正若有匪類令其主報倘徇情容隠照保甲一體治罪一牌頭所管内有為盜之人雖不知情而失察坐以不應輕律笞四十甲長保正遞減科罪一凡來歴不明遊蕩姦偽之徒潛居京城令五城司坊宛大兩縣不時稽查客店庵院取具並無容留甘結以憑各衙門查閱賃房居住者令房主詢明保人來歴並著兩鄰稽查倘有此等遊棍協同斥逐若徇情受賄容留者除本犯照律治罪遞回原藉外其容留之客店寺廟住持房主一并懲治該管官不行查出照例議處至編户居民住有常業及候補候選讀書貿易諸色人等確有憑據者毋許驅逐倘有借端勒索混擾良民者照嚇詐例治罪一老𤓰賊本處鄰佑地保有知情容留者發近邊充軍若非知情容留止係失於稽查各照不應重律杖八十其鄰佑地保及兵役平民能偵知𤓰賊行跡赴地方官宻稟該地方官即行嚴拏不許指出首人姓名俟拏獲𤓰賊審實將首人給賞如𤓰賊將首人扳害立案不行首獲之賊係首犯賞銀五十兩係夥犯賞銀二十五兩首獲多者按名賞給在充公銀兩内動支有挾嫌誣首情弊仍照誣告例治罪一窩留積匪之家果有造意及同行分贓代買即照本犯一例發遣其未經造意又不同行但經窩留分得些微財物或止代為賣贓者均減本犯一等治罪至窩藏回民行竊犯至遣戌者亦照窩藏積匪例分别治罪一强盜窩主造意不行又不分贓者改發附近充軍共謀為盜此條専為共謀而臨時不行者言凡共謀為強盜數内一人臨時不行而行者却為竊盜此共謀而不行者曽分贓但係造意者即為竊盜首果係餘人並為竊盜從若不分贓但係造意者即為竊盜從果係餘人並笞五十必查以臨時主意上盜者為竊盜首其共謀為竊盜數内一人臨時不行而行者為强盜其不行之人係造意者曾分贓知情不知情並為竊盜首係造意者但不分贓及係餘人而曽分贓俱為竊盜從以臨時主意及共為强盜者不分首從論公取竊取皆為盜凡盜公取竊取皆為盜公取為行盜之人公然而取其財如强盜搶奪竊取謂潛行隠而私竊取其財如竊盜掏摸皆名為盜器物錢帛以下兼官私言之類須移徙已離盜所方謂之盜珠玉寳貨之類據入手隠藏縱在盜所未將行亦是為盜其木石重器非人力所勝雖移本處未䭾載間猶未成盜不得以盜論馬牛駝驘之類須出闌圈鷹犬之類須専制在已乃成為盜若盜馬一匹别有馬隨不合併計為罪若盜其母而子隨者皆併計為罪此條乃以上盜賊諸條之通例未成盜而有顯跡證見者依已行而未得財科斷已成盜者依律以得財科斷起除刺字凡盜賊曽經刺字者俱發原籍收充警跡該徒者役滿充警該流者於流所充警若有起除原刺字樣者杖六十補刺收充警跡謂充巡警之役以踪跡盜賊之徒警跡之人俱有冊籍故曰收充若非應起除而私自用藥或火炙去原刺面􅈩上字樣者雖不為盜亦杖六十補刺原刺字樣條例一凡竊盜等犯有自行用藥銷毁面􅈩上所刺之字者枷號三個月杖一百補刺代毁之人枷號兩個月杖一百一凡强盜人命重犯拒捕殺人竊盜並律應斬决以及命案内斬絞監候等犯情重難宥者該督撫俱於具題之日交按察使衙門先行刺字然後遞回犯事地方監禁如係强盜面上刺强盜二字命案斬絞等犯面上刺凶犯二字仍將已經刺字之處於本内聲明其戲殺誤殺鬭毆殺俱免刺直省等處如遇面刺强盜凶犯等字樣者即擒拿送官一偷刨人㕘之犯向例左右面刺字者今改照竊盜例初犯刺右面再犯刺左面一凡竊盜刺字發落之後責令充當巡警如實能改過緝盜數多者准其起除刺字復為良民該地方官編入保甲聼其各謀生理一應發烏魯木齊等處人犯除例應刺明事由者仍照例刺發外其凶徒執持軍器毆人至篤疾以及軍流人犯内有情罪較重改發烏魯木齊等處者即令起解省分於該犯右面刺外遣二字解赴甘省酌量分發補刺地名一發遣人犯如從前面上原刺之字與現犯事由相同者毋庸重複叠刺倘現犯事由各别仍於左面上另行刺字一新疆改發内地人犯面上刺改遣二字如應刺事由者并刺事由大清律例卷二十五
