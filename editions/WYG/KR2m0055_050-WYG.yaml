  - {type: page-break, offset: 0, content: '', id: KR2m0055_WYG_050-1a, image: WYG0672/WYG0672-0623c.png}
body:
  text: 禮律儀制合和御藥凡合和御藥誤不依對症本方及封題錯誤經手醫人杖一百料理揀擇誤不精者杖六十若造御膳誤犯食禁厨子杖一百若飲食之物不潔淨者杖八十揀擇誤不精者杖六十御藥御膳不品嘗者笞五十監臨提調官各減醫人厨子罪二等若監臨提調官及厨子人等誤將雜藥至造御膳處所者杖一百所將雜藥就令自喫御膳所厨子人等有犯監臨提調官知而不奏者門官及守衛官失於摉檢者與犯人同罪並臨時奏聞區處條例一醫官就内局修製藥餌本院官診視調服御藥叅看校同㑹近臣就内局合藥將藥貼連名封記具本開寫本方藥性治症之法於日月之下醫官近臣書名以進置簿書進藥奏本既具隨即附簿年月下書名近臣收掌以憑稽考煎調御藥本院官與近臣監視二服合為一服俟熟分為二器其一器御醫先嘗次院判次近臣其一器進御乗輿服御物凡乗輿服御物主守之人收藏修整不如法者杖六十進御差失者進所不當進笞四十其車馬之屬不調習駕馭之具不堅完者杖八十若主守之人將乗輿服御物私自借用或轉借與人及借之者各杖一百徒三年若棄毁者罪亦如之平時怠玩不行看守遺失及誤毁者各減三等若御幸舟船誤不堅固者工匠杖一百若不整頓修飾及在篙棹之屬缺少者杖六十並罪坐所由經手造作之人並土守之人監臨提調官各減工匠罪二等並臨時奏聞區處收藏禁書凡私家收藏天象器物如璇璣玉衡渾天儀之類圖讖圖象讖緯之書推治亂應禁之書及繪畫歴代帝王圖像金玉符璽等物不首官者杖一百並於犯人名下追銀一十兩給付告人充賞器物等項並追入官御賜衣物凡御賜百官衣物使臣不行親送轉附他人給與者杖一百罷職不敘失誤朝賀凡朝賀及迎接詔書所司不豫先告示者笞四十其已承告示而失誤者罪亦如之失儀凡陪助祭祀及謁拜園陵若朝㑹行禮差錯及失儀者罰俸一月其糾儀官應糾舉而不糾者罪同條例一朝叅近侍病𠻳者許即退班或一時眩暈及感疾不能侍立者許同列官掖出一凡壇廟祭祀及聖駕出入並陞殿之日派委司員及步軍校嚴加巡察有厮役肆行喊呌衝突擁擠者拏送該部杖一百其主笞五十尋常朝㑹日犯者杖六十其主笞三十係官俱交該部議處若在内執事人並大臣侍衛跟役犯者交與該管大臣衙門治罪奏對失序凡在朝侍從官員特承顧問官髙者先行回奏卑者以次進對若先後失序者各罰俸一月朝見留難凡司儀禮官將應朝見官員人等託故留難阻當不即引見者審實留難之故得情方斬監候大臣知而不問與同罪不知者不坐上書陳言凡國家政令得失軍民利病一切興利除害之事並從六部官面奏區處及科道督撫各陳所見直言無隱若内外大小官員但有本衙門不便事件許令明白條陳合題奏之本管官實封進呈取自上裁若知而不言苟延歳月者在内從科道在外從督撫糾察犯者以事應奏不奏論其陳言事理並要直言簡易每事各開前件不許虚飾繁文若縱横之徒假以上書巧言令色希求進用者杖一百若稱訴寃枉於軍民官司借用印信封皮入遞者及借與者皆斬雜犯條例一内外大小衙門官員但有不公不法等事在内從臺省在外從督撫糾舉須要明著年月指陳實跡明白具奏若係機密重事實封御前開拆並不許虛文泛言若挾私摉求細事及糾言不實者抵罪惟生員不許一言建白違者革黜以違制論見任官輒自立碑凡見任官實無政蹟於所部内輒自立碑建祠者杖一百若遣人妄稱已善申請於上而為之立碑建祠者杖八十受遣之人各減一等碑祠拆毁禁止迎送凡上司官及奉朝命使客經過而所在各衙門官吏出郭迎送者杖九十其客令迎送不舉問者罪亦如之條例一上司入城凡文武屬員止許出城三里迎送如不入城在境内經過處所迎送倘迎送必至交界或因事營求或乗便賄賂將屬員革職拏問如止出界迎送無營求賄賂等情照擅離職役律議處若上司有必欲迎送致屬員畏其威勢至交界迎送者倘有勒索情弊將上司革職提問如止令迎送無勒索情弊照例議處地方官俱免議一凡提鎮赴任所屬將弁於是日迎接除跟役外其司事兵丁不得過十名出城不得過五里其副叅遊擊等官赴任本標員弁於是日迎接除跟役外司事兵丁不得過五名出城不得過三里從境内經過者止許在本營汛地經過處所迎送如屬員多帶兵丁越境遠迎及上司容令逺迎并不行揭報者俱交部照律議處一文武官員出入應合開道而不開道致令應避官員不曾迴避者不問若因而生事者止問上官一軍民人等於街市遇見官員引導經過即須下馬躱避不許衝突違者笞五十一書役迎接新官在交界處所等候呈送須知册籍其餘書役概令隨印交代併將頭接二接三接陋習嚴行禁止如有約結多人執批逺迎者照律治罪一屬員與上司親戚子姪有乗便夤緣因事賄囑者按律分别革職治罪上司之子姪親戚有官職者經過屬員境内拜候往來屬員供應餽送均照不應重律降三級調用無官職者照不應重律杖八十該上司自行查出叅處者免議漫無覺察者照約束不嚴例降一級調用知而不舉照徇庇例降三級調用如有夤緣賄囑等事通同徇縱者一併分别革職治罪公差人員欺陵長官凡公差人員在外不循禮法言語傲慢欺陵守禦官及知府知州知縣者杖六十若校尉有犯杖七十衹候禁子有犯杖八十條例一公堂乃係民人瞻仰之所如奴僕皂隸人等入正門馳當道坐公座者杖七十徒一年半吏員承差人等加一等若六部都察院在京各衙門人役接奉批差敢有似前越禮犯分者許所在官長實封叅奏照例治罪服舍違式凡官民房舍車服器物之類各有等第若違式僣用有官者杖一百罷職不敘無官者笞五十罪坐家長工匠並笞五十違式之物責令改正工匠自首免罪不給賞若僣用違禁龍鳳紋者官民各杖一百徒三年官罷職不敘工匠杖一百違禁之物並入官首告者官給賞銀五十兩若工匠能自首者免罪一體給賞條例一公侯文武各官應用帽頂束帶及生儒衣帽照品級次第不許僣越官員越品僣用及民間違禁擅用者照律治罪凡應用東珠重不得過三分如用三分以上即同違式公侯伯起花金帽頂上銜紅寶石一大顆公中嵌東珠四顆侯中嵌東珠三顆伯中嵌東珠二顆帶俱用圓玉版四塊四圍金鑲公中嵌猫睛一顆侯中嵌緣松子石一顆伯中嵌紅寶石一顆俱四爪蟒補服一品起花金帽頂上銜紅寶石一大顆中嵌東珠一顆帶用方玉版四塊四圍金鑲中嵌紅寶石一顆文職仙鶴補服武職麒麟補服二品起花金帽頂上銜起花珊瑚一大顆中嵌小紅寶石一顆帶用起花圓版四塊中嵌紅寶石一顆文職錦雞補服武職獅子補服三品起花金帽頂上銜藍寶石一大顆中嵌小紅寶石一顆帶用起花金圓版四塊文職孔雀補服武職豹補服四品起花金帽頂上銜青金石一大顆中嵌小藍寶石一顆帶用起花金圓版四塊銀鑲邊文職雲雁補服武職虎補服五品起花金帽頂上銜水晶一大顆中嵌小藍寶石一顆帶用素金圓版四塊銀鑲邊文職白鷴補服武職熊補服六品起花金帽頂上銜硨磲一大顆中嵌小藍寶石一顆帶用玳瑁圓版四塊銀鑲邊文職鷺鷥補服武職彪補服七品上銜素金頂中嵌小水晶一顆帶用素銀圓版四塊文職鸂􅈑補服武職補服與六品同八品起花金帽頂帶用明羊角圓版四塊銀鑲邊文職鵪鶉補服武職犀牛補服九品及雜職起花銀帽頂帶用烏角圓版四塊銀鑲邊文職練雀補服武職海馬補服在京都察院在外按察使等官俱獬豸補服其朝服披肩接袖俱用粧緞蟒緞都察院都事經歴筆帖式按察司經歴照磨等官補服各照本身品級不得濫用獬豸舉人官生貢監生金雀頂髙二寸帶同八品青袍藍邊披領同生員銀雀頂髙二寸帶同九品藍袍青邊披領同外郎錫葫蘆頂衣及披領皆純青耆老用錫頂不用披領餘與外郎同一房舍車馬衣服等物貴賤各有等第上可以兼下下不可以僣上其父祖有官身殁曾經斷罪者除房舍仍許子孫居住其餘車馬衣服等物父祖既與無罪者有别則子孫概不得用一房舍並不得施用重拱重簷樓房不在重簷之限職官一品二品㕔房七間九架屋脊許用花樣獸吻梁棟斗拱簷桷彩色繪飾正門三間五架門用緣油獸面銅鐶三品至五品㕔房五間七架許用獸吻梁棟斗拱簷桷青碧繪飾正門三間三架門用黑油獸面擺錫鐶六品至九品㕔房三間七架梁棟止用土黃刷飾正門一間三架門用黑油鐵鐶庶民所居堂舍不過三間五架不用斗拱彩色雕飾一庶民男女衣服並不得僣用金繡許用紵絲綾羅紬絹素紗婦人金首飾一件金耳鐶一對餘止用銀翠不得製造花樣金線粧飾一帳幔並不許用赭黄龍鳳紋職官一品至三品許用金花刺繡紗羅四品五品刺繡紗羅六品以下許用素紗羅庶民用紗絹一傘葢職官一品二品銀葫蘆杏黄羅表紅裏三品四品紅葫蘆杏黄羅表紅裏以上皆三簷僉事道亦同五品紅葫蘆藍羅表紅裏六品以下八品以上惟用藍絹皆重簷雨傘通油絹庶民不得用羅絹涼傘許用油紙雨傘一鞍轡並不許雕飾龍鳳紋一器皿不許造龍鳳紋一墳瑩石獸職官一品塋地九十步墳髙一丈八尺二品塋地八十步墳髙一丈四尺三品塋地七十步墳髙一丈二尺以上石獸並六四品塋地六十步五品塋地五十步墳髙八尺以上石獸並四六品塋地四十步七品以下二十步墳髙六尺以上發步皆從塋心各數至邊五品以上許用碑龜趺螭首六品以下許用碣方趺圓首庶人塋地九步穿心一十八步止用礦誌一品官服色鞍轡等物除官府應用之家許令織造外其私下與不應用之家製造者工匠依律治罪一軍民僧道人等服飾器用俱有定制若常服言常服則大服不禁僭用錦綺紵絲綾羅彩繡器物用戧金描金酒器純用言純用若止用一件不禁金銀及將大紅銷金製為帳幔被褥之類婦女僭用金繡色衣服金寶首飾鐲釧言金寶則止用金飾無珠寶不禁及用珍珠緣綴衣履并結成補子葢額纓絡等件事發俱照律治罪服飾器用等物並追入官婦女罪坐家長奴僕准用紡絲絹紬綿紬繭紬毛褐屯絹葛苧梭布狢皮羊皮其緞紗及各樣細皮俱不許用長隨亦照奴僕服飾違者照律治罪一官吏軍民人等但有服飾僭用黄紫二色及蟒龍飛魚斗牛器皿僭用硃紅黄顔色及親王法物者俱比照僭用龍鳳紋律擬斷服飾器皿追收入官一凡官民人等用線纓者笞五十一黃色秋香色五爪龍緞團補服及四爪暗蟒之四團補八團補緞紗官民不許穿用其大臣官員有特賜五爪龍衣服及緞疋無論色樣俱許穿用若頒賜五爪龍緞立龍緞挑去一爪穿用若官員軍民人等違例濫用者係官革職平人枷號一箇月杖一百失察官交部議處衣服入官一凡平時所戴煖㡌涼㡌親王世子郡王長子貝勒貝子入八分公俱用紅寶石頂未入八分公固倫額駙和碩公主額駙民公侯伯鎮國將軍和碩額駙及一品大臣俱用珊瑚頂輔國將軍及二品官俱用起花珊瑚頂奉國將軍及三品官俱用藍寶石頂及藍色明玻瓈奉恩將軍及四品官俱用青金石頂及藍色湼玻瓈五品官用水晶頂及白色明玻瓈六品官用硨磲頂及白色湼玻瓈七品官素金頂八品官用起花金頂九品官用起花銀頂未入流與九品同候補候選與現任同凡九品之讀祝贊禮鳴贊序班俱用八品起花金頂進士舉人貢生俱用金頂生員監生俱用銀頂一文武官員應用雨㡌雨衣除二品以上仍照舊例戴用大紅三品亦准用大紅雨㡌四品五品六品用紅頂黑鑲邊雨㡌七品八品九品及有頂帶人員俱用黑頂紅鑲邊雨㡌其内廷行走之員仍照舊例不論品級雨㡌俱戴大紅無論油㡌氊㡌一色服用僣用者照違制論一在籍候選吏員有僣穿補服干謁地方官者照違制律治罪僧道拜父母凡僧尼道士女冠并令拜父母祭祀祖先本宗親屬在内喪服等第謂斬裒期功緦麻之類皆與常人同違者杖一百還俗若僧道衣服止許用紬絹布疋不得用紵絲綾羅違者笞五十還俗衣服入官其袈裟道服不在禁限失占天象凡天文如日月五緯二十八宿之屬垂象如日重輪及日月珥蝕景星彗孛之類欽天監官失於占候奏聞者杖六十條例一占候天象欽天監設觀星臺令天文生分班晝夜觀望或有變異開具揭帖呈堂上官當奏聞者隨即具奏術士妄言禍福凡隂陽術士不許於大小文武官員之家妄言國家禍福違者杖一百其依經推算星命卜課不在禁限匿父母夫喪凡聞父母若嫡孫承重與父母同及夫之喪匿不舉哀者杖六十徒一年若喪制未終釋服從吉忘哀作樂及叅預筵晏者杖八十若聞期親尊長喪匿不舉哀者亦杖八十若喪制未終釋服從吉者杖六十若官吏父母死應丁憂詐稱祖父母伯叔姑兄姊之喪不丁憂者杖一百罷職役不敘若父母見在無喪詐稱有喪或父母已殞舊喪詐稱新喪者與不丁憂罪同有規避者從其重者論若喪制未終冒哀從仕者杖八十亦罷職其當該官司知而聴行各與同罪不知者不坐其仕宦遠方丁憂者以聞喪月日為始奪情起復者不拘此律條例一内外官員例合守制者在内經由該部具題闗給執照在外經由該撫照例題咨回籍守制京官取具同鄉官印結外官取具原籍地方官印甘各結將承重祖父母及嫡親父母與為所後父母例應守制開明呈報如有詐冒照律例治罪俱以聞喪月日為始不計閏二十七箇月服滿起復若服滿果無事故在家遷延者交該部照例議處一官吏丁憂除公罪不問外其犯贓罪及係官錢糧依例勾問一凡文武生員及舉貢監生過本生父母之喪期年内不許應歳科雨考及鄉㑹二試其童生亦不許應府州縣及院試有隱匿不報朦混干進者事發照匿喪例治罪一凡官員出繼為人後者於起文赴部選補之時即將本生三代姓氏存殁一并開列選補之後即行知照該省如有出仕之後始行出繼歸宗者即著該員取具本旂原籍印結詳報咨部改正三代倘有臨時先謀出繼歸宗預為匿喪戀職地步者一經發覺將本官照匿喪例革職不准原赦扶同出結之旂籍各官俱交該部照例議處其扶同具結之隣族照不應重律杖八十棄親之任凡祖父母父母年八十以上及篤疾别無以次侍丁而棄親之任及妄稱祖父母父母老疾求歸入侍者並杖八十棄親者令歸養候親終服闋降用求歸者照舊供職若祖父母父母及夫犯罪見被囚禁而筵晏作樂者罪亦如之筵晏不必本家併他家在内條例一凡應補應選人員有親老情願終養者於本省起文時即具呈該地方官轉詳咨部在籍終養若現任官員祖父母父母年七十以上家無次丁者或有兄弟而篤疾不能侍養及母老雖有兄弟而同父異母者其父母年至八十以上雖家有次丁願請終養者或出仕後兄弟忽遭事故無人奉事者均不拘歴俸三年之限該督撫查明該員倉穀錢糧並無虧空任内並無罣誤取具印結具題俱准其回籍終養俟親終服滿之日該督撫給咨赴部銓補如有揑報借名詭避者發覺之日將呈請終養之員按律究擬並將出結各官一併叅處喪葬職官庶民三月而葬凡有尊卑喪之家必須依禮定限安葬若惑於風水及托故停柩在家經年暴露不葬者杖八十若棄毁死屍又有本律其從尊長遺言將屍燒化及棄置水中者杖一百從卑幼並減二等若亡殁逺方子孫不能歸葬而燒化者聴從其便其居喪之家修齋設醮若男女混雜所重在此飲酒食肉者家長杖八十僧道同罪還俗條例一旂民喪葬概不許火化除逺鄉貧人不能扶柩歸里不得已擕骨歸葬者姑聴不禁外其餘有犯照違制律治罪族長及佐領等隱匿不報照不應輕律分别鞭責議處一民間遇有喪葬之事不許聚集演戲以及扮演雜劇等類違者按律究處一民間喪祭之事凡有用絲竹管絃演唱佛戲之處該地方官嚴行禁止違者照違制律治罪鄉飲酒禮凡鄉黨敘齒及鄉飲酒禮已有定式違者笞五十鄉黨敘齒自平時行坐而言鄉飲酒禮自㑹飲禮儀而言條例一鄉黨敘齒士農工商人等平居相見及歳時晏㑹揖拜之禮幼者先施坐次之列長者居上如佃戸見田主不論敘齒並行以少事長之禮若親屬不拘主佃止行親屬禮一鄉飲坐敘髙年有徳者居於上髙年淳篤者並之以次序齒而列其有曾違條犯法之人列於外坐不許紊越正席違者照違制論主席者若不分别致使良莠溷淆或察知或坐中人發覺依律科罪大清律例卷十七
