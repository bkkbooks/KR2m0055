body:
  text: 刑律賊盜上謀反大逆凡謀反不利於國謂謀危社稷及大逆不利於君謂謀毁宗廟山陵及宫闕但共謀者不分首從己未行皆凌遲處死正犯之祖父父子孫兄弟及同居之人如本族無服親屬及外祖父妻父女壻之類不分異姓及正犯之期親伯叔父兄弟之子不限己未析居籍之同異男年十六以上不論篤疾廢疾皆斬其男十五以下及正犯之母女妻妾姊妹若子之妻妾給付功臣之家為奴正犯財產入官若女兼姊妹許嫁已定歸其夫正犯子孫過房與人及正犯之聘妻未成者俱不追坐上止坐正犯兄弟之子不及其孫餘律文不載并不得株連知情故縱隠藏者斬有能捕獲正犯者民授以民官軍授以軍職量功授職仍將犯人財產全給充賞知而首告官為捕獲者止給財産雖無故縱但不首告者杖一百流三千里未行而親屬告捕到官正犯與縁坐人俱同自首免已行惟正犯不免餘免非親屬首捕雖未行仍依律坐條例一凡反逆案内干連流犯並妻子俱流徙烏喇地方如本犯身故有子者其妻仍同流無子者免流謀叛凡謀叛謂謀背本國潛從他國但共謀者不分首從皆斬妻妾子女給付功臣之家為奴財產並入官姊妹不坐女許嫁已定子孫過房與人聘妻未成者俱不坐父母祖孫兄弟不限籍之同異皆流二千里安置餘俱不坐知情故縱隠藏者絞有能告捕者將犯人財產全給充賞知己行而不首者杖一百流三千里若謀而未行為首者絞為從者不分多少皆杖一百流三千里知未行而不首者杖一百徒三年未行則事尚隠秘故不言故縱隠藏若逃避山澤不服追喚者或避差或犯罪負固不服非暫逃比以謀叛未行論依前分首從其拒敵官兵者以謀叛己行論依前不分首從律以上二條未行時事屬隠秘須審實乃坐條例一叛案内干連流犯流徙烏喇地方如本犯身故妻子免流一凡叛犯之孫如有年㓜不便與父母拆離流徙者一併交與該管衙門令其親屬收養一凡審擬叛案如果謀叛情實在本省者取本犯確實口供原籍住址將該犯父母祖孫兄弟妻妾子女家屬財產俱察明嚴行看守詳開數目具題如係隔省確取本犯口供行文該地方官嚴拏看守有隠漏者該督撫即將該管官指名題叅以憑議處一叛逆旗下人口照例交與該管衙門其民人叛犯之奴僕交與戸部入官一就撫盜賊有為盜時擄掠婦女若原夫及其父母期親認識而堅執不與者聽赴官司告理將婦女㫁歸完聚女已配合不願還者聽一如有潛匿山林有名大盜投歸者准其免罪一凡異姓人歃血訂盟焚表結拜弟兄不分人數多寡照謀叛未行律為首者擬絞監候其無歃血盟誓焚表事情止結拜弟兄為首者杖一百為從者各減一等一凡不逞之徒歃血訂盟轉相結連土豪市棍衙役兵丁彼唱此應為害良民據鄰佑鄉保首告地方官如不准理又不緝拏惟圖掩飾或至蠭起為盜抄掠横行將地方文武各官革職從重治罪其平日失察首告之後不自隠諱即能擒獲之地方官免其議處至鄉保隣佑知情不行首告者亦從重治罪如旁人確知首告者該地方官酌量給賞倘借端妄告者仍照誣告律治罪一閩省民人除歃血訂盟焚表結拜弟兄仍照定例擬以絞候其有抗官拒捕持械格鬭等情無論人數多寡審實各按本罪分别首從擬以斬絞外若有結㑹樹黨陰作記認魚肉鄉民陵弱暴寡者亦不論人數多寡審實將為首者照兇惡棍徒例發雲貴兩廣極邊烟瘴充軍為從減一等被誘入夥者杖一百枷號兩個月各衙門兵丁胥役入夥者照為首例問擬鄉保地方明知不首或借端誣告者照例分别治罪該管文武各官失於覺察及捕獲之後有心開脱均照例叅處若止係鄉民酬社賽神偶然洽比事竣即散者不在此例造妖書妖言凡造䜟緯妖書妖言及傳用惑衆者皆斬監候被惑人不坐不及衆者流三千里合依量情分坐若他人造傳私有妖書隠藏不送官者杖一百徒三年條例一凡妄布邪言書寫張貼煽惑人心為首者斬立决為從者皆斬監候一凡有狂妄之徒因事造言揑成歌曲沿街唱和及以鄙俚䙝嫚之詞刋刻傳播者内外各地方官即時察拏坐以不應重罪若係妖言惑衆仍照律科㫁一凡坊肆市賣一應淫詞小説在内交與八旗都統都察院順天府在外交督撫等轉行所屬官弁嚴禁務搜板書盡行銷毁有仍行造作刻印者係官革職軍民杖一百流三千里市賣者杖一百徒三年買看者杖一百該管官弁不行查出者交與該部按次數分别議處仍不准借端出首訛詐一各省抄房在京探聽事件揑造言語錄報各處者係官革職軍民杖一百流三千里該管官不行查出者交與該部按次數分别議處其在京貴近大臣家人子弟倘有濫交匪類前項事發者將家人子弟并不行約束之家主並照例議處治罪盜大祀神御物凡盜大祀天曰神地曰祗御用祭器帷帳等物及盜饗薦玉帛牲牢饌具之屬者皆斬不分首從監守常人謂在殿内及已至祭所而盜者其祭器品物未進神御及營造未成若已奉祭訖之物及其餘官物雖大祀所用非應薦之物皆杖一百徒三年若計贓重於本罪杖一百徒三年者各加盜罪一等謂監守常人盜者各加監守常人盜罪一等至雜犯絞斬不加並刺字盜制書凡盜制書者若非御寳原書止抄行者以官文書論皆斬不分首從盜各衙門官文書者皆杖一百刺字若有所規避者或侵欺錢糧或受財買求之類從重論事干係軍機之錢糧者皆絞監候不分首從盜印信凡盜各衙門印信者不分首從皆斬監候又偽造印信時憲書條例云欽給闗防與印信同盜闗防印記者皆杖一百刺字盜内府財物凡盜内府財物者皆斬雜犯但盜即坐不論多寡不分首從若財物未進庫止依盜官物論内府字要詳條例一凡盜内府財物係御寳乗輿服御物者仍作實犯死罪其餘監守盜銀三十兩錢帛等物值銀三十兩以上常人盜銀六十兩錢帛等物值銀六十兩以上俱問發邊遠充軍内員同一凡盜内府財物係雜犯及監守常人盜竊盜掏摸但三次者俱併論比照竊盜三犯律處絞仍分别恩赦前後論盜城門鑰凡盜京城門鑰皆不分首從杖一百流三千里雜犯盜府州縣鎮城闗門鑰皆杖一百徒三年盜倉庫門内外各衙門等鑰皆杖一百並刺字盜皇城門鑰律無文當以盜内府物論盜監獄門鑰比倉庫盜軍器凡盜人闗領在家軍器者如衣甲鎗刀弓箭之類計贓以凡盜論若盜民間應禁軍器者如人馬甲傍牌火筒火礮旗纛號帶之類與事主己得私有之罪同若行軍之所及宿衞軍人相盜入己者准凡盜論若不入己還充官用者各減二等條例一拏獲偷盜軍器之犯除犯該流絞者仍依律辦理外其犯該徒杖者照竊盜贓加一等治罪仍於犯事處加枷號一個月其當買軍器之人減本犯罪一等發落盜園陵樹木凡盜園陵内樹木者皆不分首從杖一百徒三年若盜他人墳塋内樹木者首杖八十從減一等若計入己贓重於徒杖本罪者各加盜罪一等各加監守常人竊盜罪一等若未䭾載仍以毁論條例一車馬過陵者及守陵官民入陵者百歩外下馬違者以大不敬論杖一百一凡山前山後各有禁限若有盜砍樹株者驗實椿楂比照盜大祀神御物律斬奏請定奪為從者發近邊充軍取土取石開窰燒造放火燒山者俱照律分别首從擬㫁一凡子孫將祖父墳塋樹木私自砍賣者一株至十株杖一百枷號三個月計贓重者准竊盜從重論十株以上者係旗人發寧古塔當差係民發邊逺充軍看墳人等及奴僕盜賣者罪同盜他人墳樹者杖一百枷號一個月計贓重者照本律加竊盜罪一等其知情盜買墳樹之人均照盜他人墳樹例治罪不知者不坐盜賣墳塋之房屋碑石磚瓦木植者子孫奴僕計贓並准竊盜罪加一等他人計贓准竊盜論知情盜買者減盜賣罪一等樹木等物分别入官給主一姦徒私買他人墳塋樹木者無論株數及已伐未伐初犯杖一百枷號一個月再犯杖一百枷號三個月犯至三次者發近邊充軍監守自盜倉庫錢糧凡監臨主守自盜倉庫錢糧等物不分首從併贓論罪併贓謂如十人節次共盜官銀四十兩雖各分四兩入己通算作一處其十人各得四十兩罪皆斬若十人共盜五兩皆杖一百之類三犯者絞問實犯並於右小臂􅈩上刺盜官三字每字各方一寸五分每寸各闊一分五釐上不過肘下不過腕餘條准此一兩以下杖八十一兩之上至二兩五錢杖九十五兩杖一百七兩五錢杖六十徒一年一十兩杖七十徒一年半一十二兩五錢杖八十徒二年一十五兩杖九十徒二年半一十七兩五錢杖一百徒三年二十兩杖一百流二千里二十五兩杖一百流二千五百里三十兩杖一百流三十里雜犯三流總徒四年四十兩斬雜犯徒五年條例一凡漕運糧米監守盜六十石入己者發邊逺充軍入已數滿六百石者擬斬監候一漕白二糧過淮以後責令該管道府州縣往來巡察有盜賣盜買之人拏獲即各枷號一個月糧米仍交本船米價入官充餉運弁俟囘南日聽總漕捆打四十如地方官失察者交該部議處一小船人户受雇偷載漕糧盜賣者將船户照漕白二糧過淮後盜賣盜買枷號一個月例減二等發落其漕船頭舵明知旗丁盜賣不據實舉首者俱照不應重律杖八十受財計贓從重論一凡侵盜倉庫錢糧入巳數在一千兩以上者擬斬監候遇赦准予援免如數逾一萬兩以上者不准援免文武官員犯侵盜者俱免刺字一凡侵盜應追之贓著落犯人妻及未分家之子名下追賠如果家產全無不能賠補在旗叅佐領驍騎校在外地方官取具印甘各結申報都統督撫保題豁免結案倘結案後别有田産人口發覺者盡行入官將承追出結各官革職所欠贓銀米穀著落賠補督催等官照例議處内外承追督催武職俱照文職例議處再一應贓私察果家産全無力不能完者概予豁免不得株連親族倘濫行著落親族追賠將承追官革職其該管上司如有逼廹出結之事屬官出首從重治罪一完贓減免之犯如有犯贓俱在本罪上加一等治罪一凡侵貪之案如該員身故審明實係侵盜庫帑圖飽私槖者即將伊子監追一漕白二糧過淮責令該管道府州縣往來巡察如有將行月糧米私自盜賣盜買者拏獲各枷號一個月若有一人盜買及一幫盜賣數至百石以上者將為首之人枷號兩個月折責四十板糧米仍交本船米價入官其失察盜賣之運弁如米數不及五十石者將該弁即於倉塲衙門捆打四十數至五十石以上者降一級調用百石以上降二級調用二百石以上革職一凡虧空錢糧除因公那移及倉榖霉浥等案仍照舊例辦理外其實係虧空入巳者雖於限内完贓俱不准減等一監守盜倉庫錢糧除審非入己者各照本條律例定擬外其入己數在一百兩以下至四十兩者仍照本律問擬准徒五年其自一百兩以上至三百三十兩杖一百流二千里至六百六十兩杖一百流二千五百里至一千兩杖一百流三千里常人盜倉庫錢糧凡常人不係監守外皆是盜倉庫自倉庫盜出者坐錢糧等物發覺而不得財杖六十從減一等但得財者不分首從併一兩以下杖七十一兩以上至五兩杖八十一十兩杖九十一十五兩杖一百二十兩杖六十徒一年二十五兩杖七十徒一年半三十兩杖八十徒二年三十五兩杖九十徒二年半四十兩杖一百徒三年四十五兩杖一百流二千里五十兩杖一百流二千五百里五十五兩杖一百流三千里雜犯三流總徒四年八十兩絞雜犯徒五年其監守直宿之人以不覺察科罪條例一凡漕運糧米常人盜一百二十石入己者發邊逺充軍入己數滿六百石者擬絞監候一凡常人盜倉庫錢糧不分腹裏沿邊沿海但入己數滿三百兩者擬絞監候不滿三百兩者照正律併贓擬罪一竊盜鞘餉自一兩至八十兩仍照常人盜倉庫錢糧計贓科㫁若盜至一百兩以上者擬絞監候一凡竊匪之徒穿穴壁封盜去倉庫錢糧除贓止八十兩者仍照本律併贓擬罪外其有盜至八十兩以上至八十五兩者擬杖一百流二千里九十兩者杖一百流二千五百里九十五兩者杖一百流三千里數至一百兩以上者照偷竊鞘餉例擬絞監候俱以實犯論罪一竊盜倉庫錢糧未經得財者為首杖一百徒三年為從減一等杖九十徒二年半但經得財之首犯除贓至一百兩以上仍照例擬絞外其一百兩以下不分贓數多寡俱發雲貴兩廣極邊烟瘴充軍為從者一兩至八十兩准徒五年八十五兩至一百兩分别擬流强盜凡强盜巳行而不得財者皆杖一百流三千里但得事主財者不分首從皆斬雖不分贓亦坐其造意不行又不分贓者杖一百流三千里夥盜不行又不分贓者杖一百若以藥迷人圖財者罪同但得財皆斬若竊盜臨時有拒捕及殺傷人者皆斬監候得財不得財皆斬須看臨時二字因盜而姦者罪亦如之不論成姦與否不分首從共盜之人不曾助力不知拒捕殺傷人及姦情者審確止依竊盜論分首從得財不得財其竊盜事主知覺棄財逃走事主追逐因而拒捕者自依罪人拒捕律科罪於竊盜不得財本罪上加二等杖七十毆人至折傷以上絞殺人者斬為從各減一等凡强盜自首不實不盡只宜以名例自首律内至死減等科之不可以不應從重科㫁竊盜傷人自首者但免其盜罪仍依鬭毆傷人律論條例一强盜殺人放火燒人房屋姦汚人妻女打劫牢獄倉庫及干係城池衙門并積至百人以上不分曾否得財俱照得財律斬隨即奏請審决梟示若止傷人而未得財比照搶奪傷人律科㫁凡六項有一於此即引梟示隨犯摘引所犯之事一凡響馬强盜執有弓矢軍器白日邀劫道路贓証明白者俱不分人數多寡曾否傷人依律處决於行劫處梟首示衆如傷人不得財依白畫搶奪傷人斬其江洋行劫大盜俱照此例立斬梟示一强盜内有老𤓰賊或在客店内用悶香藥麫等物迷人取財或五更早起在路將同行客人殺害此種兇徒拏獲之日務必究緝同夥并研審有無别處行劫犯案將該犯不得解往他處於被獲處監禁俟闗㑹行劫各案確實口供到日審明具題即於監禁處照强盜得財律不分首從皆斬仍知照原行劫之處張掛告示諭衆知之一凡捕役人等奉差緝賊審非本案正盜若其人素行不端或曾經犯竊有案者將捕役照誣良為盜例減一等杖一百徒三年至其人本係良民揑稱踪跡可疑素行不軌妄行拏獲及雖犯竊有案已改惡為善人所共知仍復妄挐并所獲之人不論平人竊盜私行拷打嚇詐財物逼勒認盜及所緝盜案已獲有正賊因夥盜未獲將犯有竊案之人教供誣扳濫拏充數等弊俱照誣良為盜例治罪一凡捕役誣竊為盜拏到案日該地方官驗明並無拷逼情事或該犯自行誣服并有别故例應收禁因而監斃者將誣拏之捕役杖一百流三千里其嚇詐逼認因而致死及致死二命者俱照誣告致死律擬絞監候拷打致死者照故殺律擬斬監候一捕役為盜雖非造意為首均照造意為首律擬斬立决其失察之該管官交部議處如該管官逼勒改供或揑稱革役該管上司不能查出一併交部照例議處如捕役與巨盜交結往來奉差緝拏走漏消息及非伊承緝之案漏信脱逃者不分曾否得財均照本犯之罪治罪一承緝盜案汛兵有審係分贓通賊者均與盜賊同科若知情故縱者照窩主知情存留例分别治罪如並不知情止係查緝不力者照不應重律科㫁一事主報盜止許到官聽審一次認贓一次所認贓物即給主寧家不許往返拖累違者將承審官嚴加議處一事主呈報盜案失單須逐細開明如贓物繁多一時失記准於五日内續報該地方官將原報續報緣由於招内聲明至獲盜起贓必須差委捕員眼同起認如捕役私起贓物或借名尋贓逐店摉察或囑賊誣扳指稱收頓或將賊犯已物作贓或買物栽贓或混認瞞贓等弊事發除捕役照律例從重問擬外其承問官不嚴禁詳審該督撫不嚴飭題叅者一并交部議處一强竊盜賊見獲之贓各令事主認領外如不足原失之數將無主贓物賠補餘剩者入官如仍不足將盜犯家產變價賠償若諸色人典當收買盜賊贓物不知情者勿論止追原贓其價於犯人名下追徴給主一事主呈報盜情不許虛誣揑飾倘有並無被劫而謊稱被劫及以竊為强以姦為盜者俱杖一百以人命鬭毆等事報盜者其本身無罪亦杖一百若本有應得之罪重者照本罪從重問擬本罪輕者加一等治罪若姦棍豪紳憑空揑報盜劫藉以䧟害平人訛詐印捕官役者照誣告人死罪未决律問遣甲長鄰佑扶同者各照事主減一等治罪一地方文武官員因畏疎防承緝處分恐嚇事主抑勒諱盜或改强為竊者均照諱盜例革職承行書辦杖一百若抑勒苦累事主致死者除革職外照故勘平人致死律治罪該管司道府㕔州不行查報督撫不行查叅者俱交部照例議處一凡竊盜等事責令該地保營汛兵丁分報各衙門文武員弁恊力追拏如地保汛兵通同隠匿不報及地保已報文職而汛兵不報武弁或汛兵已報武弁而地保不報文職者均照强盜窩主之隣佑知而不首例杖一百若首報遲延應照牌頭曾首告而甲長不行轉報例杖八十一凡投首之賊借追贓名色將平人揑稱多夥或挾讐扳害或索詐財物不分首從得財與未得財皆斬立决一强竊盜再犯不准首家人共盜以凡人首從論一造意為首之盜脱逃如有夥盜供出逃匿所在確實地方限一年之内緝獲限内不獲將各盜照律題結如限内拏獲者將供出之夥盜照例免死發遣黑龍江等處為奴若係例應免死減等之夥盜供出首盜逃匿確實地方即行拏獲者改擬杖一百流三千里一凡未傷人之盜首能於未發時自首者發近邊充軍至聞拏投首與悔過自首者不同照情有可原例發遣窩家盜線如有自首及聞拏投首者亦照未傷人之盜首分别充軍發遣一凡拏獲盜犯到案即行嚴訊如有供出行劫别案訊明次數贓物取具確供其在本省他邑者即行通詳該督撫無論他邑有無拏獲盜犯總於贓物查起事主認領之後提觧來省併案審擬具題將該犯即行正法若係供出隣省之案其夥盜已獲者應令該督撫闗查明確首從絶無疑義者詳悉聲明題請即行正法如隣省夥犯未獲現獲之犯或任意抵賴係彼案盜首而供為同夥將來後獲之犯或係盜首因同夥已經正法轉推已决者為首犯不無避重就輕之弊應令各督撫詳加研鞫務得實情其無前項情弊者不必虛擬罪名另案具題即於本案聲明題請正法倘行查被盜之州縣有指已正法之盜作為首盜或盜數未足作為夥盜希圖銷案及州縣彼此行查盜犯口供不即詳細訊明闗覆以致案件不能完結者該督撫查明題叅交部分别議處一凡問刑衙門鞫審强盜必須贓証明確者照例即决如贓跡未明招扳續緝渉於疑似者不妨再審或有續獲强盜無自認口供贓跡未明夥盜已决無証者俱引監候處决一凡强盜重案交與印官審鞫不許捕官私行審訊番捕等役私拷取供違者捕官叅處畨役等於本衙門首枷號一個月杖一百革役如得財及誣䧟無辜者從重科罪其承問官於初審之時即先驗有無傷痕若果無傷必於招内開明並無私拷傷痕字様若疎忽不開扶同隠諱及縱容捕官私審者即將印官題叅交部議處一凡强盜初到案時審明夥盜贓數及起有贓物經事主確認即按律定罪其夥盜數目以初獲强盜所供為確初招既定不許續報如係竊賊審明行竊次數并事主初供但搜有正贓即分别定擬若原贓花費照例追變賠償如事主冒開贓物杖八十其盜賊供出賣贓之處如有伊親黨并胥捕人等藉端嚇詐者計贓加竊盜一等治罪一强盜行刦隣佑知而不協拏者杖八十如隣佑或常人或事主家人拏獲强盜一名者官給賞銀二十兩多者照數給賞受傷者移送兵部驗明等第照另戸及家僕軍傷例將無主馬匹等物變價給賞其在外者以各州縣審結無主贓物變給如營汛防守官兵捕賊受傷者照緑旗陣傷例分别給賞若被傷身亡者亦照緑旗陣亡例分别給與身價銀兩一强盜同居父兄伯叔與弟其有知情而又分贓者如强盜問擬斬决減一等杖一百流三千里如問擬發遣亦減一等杖一百徒三年其雖經得財而實係不知情者照本犯之罪減二等發落父兄不能禁約子弟為盜者杖一百一凡情有可原之夥盜内如果年止十五嵗以下審明實係被人誘脅隨行上盜者無論分贓與不分贓俱問擬滿流不准收贖一强盜案内有知而不首或强逼為盜臨時逃避行刦後衆盜分與贓物以塞其口者照知强竊盜之後分贓律科㫁不得概擬窩主分贓不行之罪一强盜重案除定例所載殺人放火姦人妻女打刦牢獄倉庫干係城池衙門並積至百人以上及響馬强盜江洋大盜老𤓰賊仍照定例遵行外其餘盜刦之案各該督撫嚴行究審將法所難宥及情有可原者一一分晰於疏内聲明大學士㑹同三法司詳議將法所難宥者正法情有可原者發遣一老𤓰賊内審有傳授技藝在家分贓者照强盜窩主造意身雖不行但分贓者斬律擬斬立决其跟隨學習之人雖未同行俱照情有可原强盜例免死發遣如無學習確証不過僅與賊徃來熟識應照知情不首律杖一百仍令㸃卯充警一强盜案内免死減等發遣為奴之犯如果在配安分歛跡或伊主圖占其妻女或平人有意欺陵將本犯致斃者將伊主及平人照例治罪如該犯怙惡不悛或不服伊主管束或無故欺陵平人經伊主及平人毆打斃命將伊主免其治罪平人照本罪減一等定擬一尋常盜刦未經傷人之夥犯如曾經轉糾黨羽持火執械塗臉入室助勢搜贓架押事主送路到案誣扳良民并犯案已至二次及濵海沿江行刦客船者一經得財俱擬斬立决不得以情有可原聲請其止在外瞭望接遞財物並未入室搜贓並被人誘脅隨行及年嵗尚未成丁或行刦止此一次並無兇惡情狀者仍以情有可原免死發遣倘地方有司有心姑息曲為開脱該督撫據實題叅交部嚴加議處一强盜為首傷人傷輕平復自行投首者擬斬監候不得遽請減等其餘自首條欵仍照定例遵行一各省拏獲盜犯供出他省曾犯行刦者不論罪輕罪重研訊明確毋庸解往質審其隣省地方官自行盤獲别省盜犯及協同失事地方差役緝捕拏獲者均令在拏獲地方嚴行監禁詳訊供詞備移被盜省分查明案情贓証確實即由拏獲省分定擬題請正法仍知照本省將拏獲正法縁由在失事地方張掛告示明白曉諭如果贓跡未明或失事地方有夥盜待質必須移解者拏獲省分遴派文武官各一員帶領解役兵丁親身管押解送仍預先知㑹前途經由地方一體遴𣲖員弁挑撥兵役接遞管解遇夜寄監收禁其道逺州縣不及收監者即令該地方官預期選撥幹役前赴住宿處所傳齊地保知㑹營汛隨同押解官弁鎖錮防範倘不小心管解致犯脱逃即將各役嚴審有無賄縱情弊照例從重治罪官員交部嚴加議處大清律例卷二十三
