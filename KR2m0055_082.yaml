front:
  text: 欽定四庫全書大清律例卷三十三
  hash: sha256:32cd987136075aa81b42ac3ac68da55226b91f1701d2adca41ff83d2c886a2ad
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0055_WYG_082-1a, image: WYG0673/WYG0673-0077c.png}
body:
  text: 刑律犯姦犯姦凡和姦杖八十有夫者杖九十刁姦者無夫有夫杖一百强姦者絞監候未成者杖一百流三千里凡問强姦須有强暴之狀婦人不能掙脫之情亦須有人知聞及損傷膚體毁裂衣服之屬方坐絞罪若以强合以和成猶非强也如一人强捉一人姦之行姦人問絞强捉問未成流罪又如見婦人與人通姦見者因而用强姦之已係犯姦之婦難以强論依刁姦律姦幼女十二嵗以下者雖和同强論其和姦刁姦者男女同罪姦生男女責付姦夫收養姦婦從夫嫁賣其夫願留者聽若嫁賣與姦夫者姦夫本夫各杖八十婦人離異歸宗財物入官强姦者婦女不坐若媒合容止人在家通姦者各減犯人和刁罪一等如人犯姦已露而代私和姦事者各減和刁强二等其非姦所捕獲及指姦者勿論若姦婦有孕姦婦雖有據而姦夫則無憑罪坐本婦條例一凡職官及軍民姦職官妻者姦夫姦婦並絞監候若職官姦軍民妻者革職杖一百的決姦婦枷號一個月杖一百其軍民相姦者姦夫姦婦各枷號一箇月杖一百其奴婢相姦不分一主各主及軍民與官員軍民之妾婢相姦者姦夫姦婦各杖一百一凡有輪姦之案審實俱照光棍例分别首從定擬一惡徒夥衆將良人子弟搶去强行雞姦者無論曾否殺人仍照光棍例為首者擬斬立決為從若同姦者俱擬絞監候餘犯問擬發遣其雖未夥衆因姦將良人子弟殺死及將未至十嵗之幼童誘去强行雞姦者亦照光棍為首例斬決如强姦十二嵗以下十嵗以上幼童者擬斬監候和姦者照姦幼女雖和同强論律擬絞監候若止一人强行雞姦並未傷人擬絞監候如傷人未死擬斬監候其强姦未成者杖一百流三千里如和同雞姦者照軍民相姦例枷號一箇月杖一百倘有指稱雞姦誣害等弊審實依所誣之罪反坐至死減一等罪至斬決者照惡徒生事行凶例發遣一强姦十二嵗以下幼女因而致死及將未至十嵗之幼女誘去强行姦汚者照光棍例斬決其强姦十二嵗以下十嵗以上幼女者擬斬監候和姦者仍照雖和同强論律擬絞監候一强姦婦女除以手足行强並未執持凶器傷人者已成未成仍照本律定擬外其因强姦執持金刃凶器戳傷本婦及拒捕致傷旁人已成姦者擬斬監候未成姦者擬絞監候一凡調姦圖姦未成者經本婦告知親族鄉保即時稟明該地方官審訊如果有據即酌其情罪之重輕分别枷號杖責報明上司存案如本家已經投明鄉保不即稟官及禀官不即審理致本婦懷忿自盡者將鄉保照甲長不行轉報竊盜例杖八十地方官照例議處一凡姦夫拒捕刃傷應捉姦之人照竊盜拒捕毆所捕人至折傷以上者擬絞監候縱容抑勒不用此例一凡强姦幼女除十二嵗以下十嵗以上仍照例分别斬候絞候定擬其姦未至十嵗之幼女應照定例斬決不得牽引雖和同强律擬絞監候一凡强姦十二嵗以下幼女幼童未成審有確據者將該犯發遣黑龍江一川省嘓匪有犯輪姦之案審實照强盜律不分首從皆斬其同行未成姦者仍依輪姦本例擬絞監候如因輪姦而殺死人命者無論成姦與否俱照强盜殺人例奏請斬決梟示縱容妻妾犯姦凡縱容妻妾與人通姦本夫姦夫姦婦各杖九十抑勒妻妾及乞養女與人通姦者本夫義父各杖一百姦夫杖八十婦女不坐並離異歸宗若縱容抑勒親女及子孫之婦妾與人通姦者罪亦如之若用財買休賣休因而和同娶人妻者本夫本婦及買休人各杖一百婦人離異歸宗財禮入官若買休人與婦人用計逼勒本夫休棄其夫别無賣休之情者不坐買休人及本婦各杖六十徒一年婦人餘罪收贖給付本夫從其嫁賣妾減一等媒合人各減犯人買休及逼勒賣休罪一等其因姦不陳告而嫁賣與姦夫者本夫杖一百姦夫姦婦各盡本法親屬相姦凡姦同宗無服之親及無服親之妻者各杖一百强者姦夫斬監候姦內外緦麻以上親及緦麻以上親之妻若妻前夫之女同母異父姊妹者各杖一百徒三年强者姦夫斬監候若姦從祖祖母祖姑從祖伯叔母從祖伯叔姑從父姊妹母之姊妹及兄弟妻兄弟子妻者姦夫姦婦各決絞惟出嫁祖姑從祖伯叔姑監候絞强者姦夫決斬惟强姦小功再從姊妹堂姪女姪孫女出嫁降服者監候斬若姦妻之親生母者以緦麻親論之太輕還比依母之姊妹論若姦父祖妾伯叔母姑姊妹子孫之婦兄弟之女者姦夫姦婦各決斬强者姦夫決斬凡姦前項親屬妾各減妻一等强者絞監候其婦女同坐不同坐及末成姦媒合縱容等件各詳載犯姦律惟同宗姦生男女不得混入宗譜聽隨便安插條例一凡親屬犯姦至死罪者若强姦未成依律問罪發近邊充軍一凡姦內外緦麻以上親及緦麻以上親之妻若妻前夫之女同母異父姊妹者依律擬罪姦夫發附近地方充軍一凡姦同宗無服之親及無服親之妻者各枷號四十日杖一百誣執翁姦凡男婦誣執親翁及弟婦誣執夫兄欺姦者斬監候强姦子婦未成而婦自盡照親屬强姦未成例科斷義子誣執義父欺姦依雇工人誣家長嫂誣執夫弟及緦麻以上親誣執者俱依誣告奴及雇工人姦家長妻凡奴及雇工人姦家長妻女者各斬決若姦家長之期親若期親之妻者絞監候婦女減一等若姦家長之緦麻以上親及緦麻以上親之妻者各杖一百流二千里强者斬監候妾各減一等强者亦斬監候軍伴弓兵門皂在官役使之人俱作雇工人條例一凡奴姦家長之妾者各絞監候若家長姦家下人有夫之婦者笞四十係官交部議處一家長之有服親屬强姦奴僕雇工人妻女未成致令羞忿自盡者杖一百發近邊充軍姦部民妻女凡軍民本管官吏姦所部妻女者加凡姦罪二等各罷職役不叙婦女以凡姦論若姦囚婦者杖一百徒三年囚婦止坐原犯罪名若保管在外仍以姦所部坐之强者俱絞居喪及僧道犯姦凡居父母及夫喪若僧尼道士女冠犯姦者各加凡姦罪二等相姦之人以凡姦論强者姦夫絞監候婦女不坐條例一僧道官僧人道士有犯挾妓飲酒者俱杖一百發原籍為民一僧道尼僧女冠有犯和姦者於本寺觀菴院門首枷號兩個月杖一百其僧道姦有夫之婦及刁姦者照律加二等分别杖徒治罪仍於本寺觀菴院門首各加枷號兩個月良賤相姦凡奴姦良人婦女者加凡姦罪一等和刁有夫無夫俱同如强者斬良人姦他人婢者男婦各減凡姦一等如强者仍照凡論擬絞監候其强姦未成者俱杖一百流三千里奴婢相姦者以凡姦論官吏宿娼凡文武官吏宿娼者杖六十挾妓飲酒亦坐此律媒合人減一等若官員子孫應襲廕宿娼者罪亦如之條例一監生生員撒潑嗜酒挾制師長不守監規學規及挾妓賭博出入官府起滅詞訟說事過錢包攬物料等項者問發為民各治以應得之罪得贓者計贓從重論買良為娼凡娼優樂人買良人子女為娼優及娶為妻妾或乞養為子女者杖一百知情嫁賣者同罪媒合人減一等財禮入官子女歸宗條例一凡買良家之女作妾併義女等項名目縱容抑勒與人通姦者本夫義父問罪於本家門首枷號一個月發落若有私買良家之女為娼者枷號三個月杖一百徒三年知情賣者與同罪媒合人減一等婦女並發歸宗一凡藉充人牙將領賣婦人逼勒賣姦圖利者枷號三個月杖一百發雲貴兩廣烟瘴少輕地方如雖無局姦圖騙情事但非係當官交領私具領狀將婦女久養在家逾限不賣希圖重利者杖一百地方官不實力查拿照例議處一凡無籍之徒及生監衙役兵丁窩頓流娼土妓引誘局騙及得受窩頓娼妓之家財物挺身架護者照窩賭例治罪如係偶然存留為日無幾枷號三個月杖一百其窩頓月日經久者杖一百徒三年再犯杖一百流三千里得受娼妓家財物者仍准枉法計贓從重論鄰保知情容隱者杖八十受財者亦准枉法論計贓從重科斷其失察之該地方官交部照例議處大清律例卷三十三
