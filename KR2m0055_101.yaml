body:
  text: 徒一年户律被人賣為妻妾子孫之在逃奴婢將在逃奴婢賣為妻妾子孫買者及牙保知情者收留迷失子女律娶同宗緦麻之妻及舅甥妻者娶親屬妾妾律豪勢之人以私債準折人妻妾子女姦占者違禁取利律禮律聞父母及夫喪匿不舉哀者匿父母夫喪律兵律擅入及冒入宫殿門者門官及宿衛官軍故縱者宫殿門擅入律宫禁及紫禁城皇城門不係宿衛守衛官冒名代替及替之者親管頭目知而故縱者宿衛守衛人私自代替律擅入內營牙帳門者行宫營門律京城門非時擅開閉者門禁鎖鑰律故殺他人馬牛為從者宰殺馬牛律刑律監守自盜倉庫錢糧等物至七兩五錢者監守自盜倉庫錢糧律常人盜倉庫錢糧等物至二十兩者常人盜倉庫錢糧律竊盜及掏摸得財五十兩為首者六十兩為從者竊盜律和賣他人奴婢為妻妾子孫而未賣之被誘人略賣子孫之妾者和賣弟妹及姪姪孫外孫若已之妾子孫之婦而未賣者窩主及買主知情者略人略賣人律尊長於小功卑幼墳墓熏狐狸因而燒棺槨及燒期親卑幼尸者地界內有死人里長地鄰輒移他處及埋藏以致殘毁及棄尸水中為首者發塜律卑幼將已死小功尊長身尸圖賴人者殺子孫及奴婢圖賴人律小功尊長被殺而卑幼私和者大功卑幼被殺而尊長私和者尊長為人殺私和律毆折人二齒一指以上及髠髮者鬬毆律毆折人肋眇二目墮胎及刃傷辜內醫治平復者保辜限期律殿內忿爭聲徹於御在所及相毆者宫內忿爭律宗室覺羅親而毆之者宗室覺羅以上親被毆律吏卒毆六品以下佐二官者軍民吏卒毆六品以下首領官傷者流外官及軍民吏卒毆非本管五品以上官及公使人毆五品以上有司官者毆制使及本管長官律本衙門首領官及所統屬官毆傷六品以下長官者佐二官毆五品以上長官者佐職統屬毆長官律流內九品以上官毆非本管三品以上官者九品以上官毆長官律威力拷打人折一齒一指眇一目抉毁耳鼻破骨及用湯火銅鐵汁傷為從者威力制縛人律奴婢毆良人折一齒一指眇一目抉毁耳鼻破骨及用湯火銅鐵汁傷者毆大功親奴婢折跌肢體及瞎一目者毆大功親雇工人折肋眇兩目墮胎及刃傷者良賤相毆律奴婢毆家長緦麻親者雇工人毆家長緦麻小功親折一齒一指眇一目抉毁耳鼻破骨及用湯火銅鐵汁傷者奴婢無罪而長家及家長之期親外祖父母毆殺或故殺者奴婢毆家長律妾毆夫及正妻者夫毆妻及妻毆妾折肋眇兩目墮胎及刃傷者夫毆妾折跌肢體及瞎一目者毆妻之父母者妻妾毆夫律服盡卑幼毆尊長折一齒一指眇一目抉毁耳鼻破骨及用湯火銅鐵汁傷者同姓親屬相毆律卑幼毆小功兄姊及緦麻尊屬者毆本宗外姻緦麻兄姊折一齒一指眇一目抉毁耳鼻破骨及用湯火銅鐵汁傷者本宗及外姻尊長毆小功卑幼折肋眇兩目墮胎及刀傷者毆大功以下尊長律祖父母父母故殺子孫者子孫違犯教令而嫡繼慈養母非理毆殺者毆祖父母父母律妻妾毆夫小功兄姊及緦麻尊屬者妻毆夫小功卑幼及期親以下尊長毆卑幼之妾折肋眇兩目墮胎及刃傷者妻之子毆父妾折一齒一指眇一目破骨及用湯火銅鐵汁傷者妾之子毆父妾血從耳目中出及內損吐血者妻妾與夫親屬相毆律毆不同居繼父者毆妻前夫之子律罵伯叔父母姑外祖父母者罵尊長律妻妾罵夫伯叔父母姑外祖父母者妻妾罵夫期親尊長律誣告人罪杖八十加所誣罪三等者誣告律官吏受財有祿人枉法贓二十兩者不枉法贓五十兩者無祿人枉法贓二十五兩者不枉法贓六十兩者官吏受財律官吏人等非因受財至一百兩者坐贓致罪律詐為瑞應者詐為瑞應律買休人與婦人用計逼勒本夫休棄者買休人及本婦縱容妻妾犯姦律軍民官吏和姦所部有夫妻女者姦部民妻女律奴姦良人婦女刁姦者姦夫姦婦良賤相姦律杖罪以下人犯情犯已完限外不斷決因而致死者淹禁律獄卒以金刃及他物與囚致囚在逃及自傷或傷人者司獄官典及提牢官知而不舉者與囚金刃解脫律獄囚應請給衣糧醫藥而不請給應脫鎖杻而不請脫應保出外而不請保應聽家人入視而不請聽因而致死囚該杖罪以下者提牢官知而不舉者己申稟上司不即施行因而致死囚該杖罪以下者獄囚衣糧律婦人産限未滿失於詳審拷決致死者婦人犯罪律戶例一孀婦自願守志而女家之祖父母父母及夫家之祖父母父母搶奪強嫁之者居喪嫁娶例一運辨旗丁挂欠糧米至一分不完者欠至五分追完者收糧違限例一坐糧廳及各倉書役人等向運官運丁勒索銀一兩以下者收支留難例一隱匿侵盜案內家産一百兩者隱瞞入官家産例一鹽商欠課至六分者人戶虧兌課程例兵例一附近苖疆五百里內民人煎穵窩囤興販硝黃十斤以上者私出外境及違禁下海例一宰殺堪用馬三四匹者宰殺馬牛例一驛站馬夫沉匿軍情機密文書者遞送公文例刑例一盜牛四隻及窩主知情分贓者俱枷號四十日盜馬牛畜産例一盜葬者無發掘等情止在切近墳旁盜葬而本家毁棄尸骸者發塜例一描摸印信行使誆騙財物一兩以下者偽造印信時憲書等例一假冒頂帶自稱職官止圖鄉里光榮無所求為亦無憑劄者一未經考職書吏冒戴頂帽者詐假官例一在川流民犯罪遞回原籍復逃至川者如有為匪所犯在杖一百以下者黔省遊匪犯該杖徒遞回原籍之後復敢潛入黔境訊有為匪犯在杖一百以下者徒流人逃例一承審官吏遇有一切命盜案件如有將徒流人犯拷訊致斃二命者故禁故勘平人例一解役遞解人犯中途患病若未取結在途身死一名者陵虐罪囚例工例一工程核減本身無力完交請豁如未完之數至六分者擅造作例徒一年半戶律得在逃奴婢而賣為妻妾子孫者被人賣為妻妾子孫之在逃子女被人賣為奴婢之在逃奴婢自收留在逃奴婢為妻妾子孫者將迷失奴婢在逃子女賣為妻妾子孫在逃奴婢賣為奴婢買者及牙保知情者收留迷失子女律監臨官強娶為事人妻妾及女為妻妾者強為子孫弟姪家人娶者娶部民婦女為妻妾律豪勢之人以私債強奪人妻妾子女者違禁取刺律禮律大祀神御之物遺失及誤毁者中祀有犯者罪同毁大祀邱壇律主守之人將乘輿服御物遺失及誤毁者乘輿服御物律兵律宫殿門無籍至夜入者輒出入官殿門律刑律監守自盜倉庫錢糧等物至一十兩者監守自盜倉庫錢糧律常人盜倉庫錢糧等物至二十五兩者常人盜倉庫錢糧律竊盜及掏摸得財六十兩為首者七十兩為從者竊盜律盜官私驢騾而殺者盜馬牛畜産律和誘及相賣良人為妻妾子孫而未賣之被誘人和誘他人奴婢為妻妾子孫之被誘人及和誘而未賣者和賣他人奴婢為奴婢而未賣之被誘人和賣弟妹及姪姪孫外孫若已之妾子孫之婦者和賣同堂弟妹及姪姪孫而未賣者窩主及買主知情者略人略賣人律尊長發期親卑幼墳塜開棺槨見尸者毁棄期親卑幼死尸者若於他人墳墓熏狐狸因而燒棺槨為從者尊長於緦麻卑幼墳墓熏狐狸因而燒棺槨及燒大功卑幼尸者發塜律祖父母父母故殺子孫及家長故殺奴婢圖賴人者將已死大功尊長身尸圖賴人者殺子孫及奴婢圖賴人律大功尊長被殺而卑幼私和者期親卑幼被殺而尊長私和者尊長為人殺私和律宫內毆人折一齒及一指眇一目抉毁耳鼻破骨及用湯火銅鐵汁傷者宫內忿爭律宗室緦麻親而毆之者宗室覺羅以上親被毆律吏卒毆六品以下長官者軍民吏卒毆六品以下佐二官傷者毆首領官折傷者流外官及軍民吏卒毆非本管九品以上官及公使人毆九品以上有司官折一齒一指眇一目抉毁耳鼻破骨及用湯火銅鐵汁傷者毆制使及本管長官律流內九品以上官毆非本管五品以上若五品以上毆非本管三品以上官折一齒一指眇一目抉毁耳鼻破骨及用湯火銅鐵汁傷者九品以上官毆長官律毆受業師折一齒一指眇一目抉毁耳鼻破骨及用湯火銅鐵汁傷者毆受業師律威力拷打人折二齒二指以上及髠髮為從者折一齒一指眇一目抉毁耳鼻破骨及用湯火銅鐵汁傷為首者威力制縳人律奴婢毆良人折二齒二指以上及髠髮者良人毆他人奴婢折肋眇兩目墮胎及刃傷者毆緦麻小功親奴婢折跌肢體及瞎一目者毆大功親奴婢至篤疾者毆緦麻小功親雇工人折肋眇兩目墮胎及刃傷者良賤相毆律奴婢毆家長小功親者奴婢毆家長緦麻親并雇工人毆家長大功親折一齒一指眇一目抉毁耳鼻破骨及用湯火銅鐵汁傷者雇工人毆家長緦麻小功親折二齒二指及髠髮者家長及家長之期親外祖父母毆雇工人折跌肢體及瞎一目者奴婢毆家長律夫毆妾至篤疾者毆妻之父母折一齒一指眇一目抉毁耳鼻破骨及用湯火銅鐵汁傷者妻妾毆夫律服盡尊長毆卑幼折肋眇兩目墮胎及刃傷者卑幼毆尊長折二齒二指以上及髠髮者同姓親屬相毆律卑幼毆大功兄姊及小功尊屬者毆緦麻兄姊折二齒二指以上及髠髮者毆小功兄姊及緦麻尊屬折一齒一指眇一目抉毁耳鼻破骨及用湯火銅鐵汁傷者本宗及外姻尊長毆緦麻卑幼折肋眇兩目墮胎及刃傷者毆大功卑幼折跌肢體及瞎一目者毆大功以下尊長律嫡繼慈養母故殺子孫者毆祖父母父母律妻妾毆夫大功兄姊及小功尊屬者妻毆夫緦麻卑幼折肋眇兩目墮胎及刃傷者毆大功卑幼折跌肢體及瞎一目者期親以下尊長毆卑幼之婦折肋眇兩目墮胎及刃傷者妻之子毆父妾折二齒二指以上及髠髮者妻妾與夫親屬相毆律毆不同居繼父折二齒二指以上及髠髮者毆同居繼父者毆妻前夫之子律祖父母父母為人所毆子孫即時救護而還毆之至折跌人肢體及瞎一目者父祖被毆律誣告人罪杖九十加所誣罪三等者誣告律官吏受財有祿人枉法贓至二十五兩者不枉法贓至六十兩者無祿人枉法贓至三十兩者不枉法贓至七十兩者官吏受財律官吏人等非因事受財至二百兩者坐贓致罪律軍民官吏刁姦所部妻女者姦部民妻女律居父母及夫喪犯刁姦及僧尼道士女冠犯刁姦者居喪及僧道犯姦律常人以金刁及他物與囚及子孫與在獄之祖父母父母奴婢雇工人與在獄之家長因而自殺者司獄官典及提牢官知而不舉者與囚金刁解脫律婦人懷孕犯罪失於詳審拷決致死者婦人犯罪律戶例一孀婦自願守志而母家夫家之期親搶奪強嫁之者居喪嫁娶例一強奪良家妻女被逼誘隨行幫同扛擡者強占良家妻女例一隱匿侵盜案內家産二百兩者隱瞞入官家産例一鹽商欠課至七分者人戶虧兑課程例禮例一奴𨽻人等入正門馳當道坐公座者六部都察院在京各衙門奴𨽻人等接奉批差有越禮犯分者公差人員欺陵長官例兵例一內地囤積硝黃未曽興販之挑夫船戶知情不首者私藏應禁軍器律一故殺他人牛者宰殺馬牛例刑例一描摸印信行使誆騙財物一十兩者偽造印信時憲書等例一僧道不分有無度牒及尼僧女冠犯刁姦者枷號一箇月居喪及僧道犯姦例一徒犯中途脫逃原犯徒一年者徒流人逃例工例一工程核減本身無力完交請豁如未完之數至七分者擅造作例徒二年戶律得迷失奴婢及收留在逃子女而賣為妻妾子孫者得在逃奴婢而賣為奴婢者被人賣為奴婢之在逃子女自收留迷失奴婢及在逃子女而為妻妾子孫者自收留在逃奴婢而為奴婢者將迷失子女賣為妻妾子孫迷失奴婢并在逃子孫賣為奴婢買者及牙保知情者收留迷失子女律私鹽受雇挑擔馱載者鹽法律兵律軍