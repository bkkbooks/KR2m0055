家産五百兩至一千兩者隱瞞入官家産例一聚衆十人以下興販私鹽不論有無軍器拒捕傷一二人其不曽下手者其不帶軍器不曽拒捕不分十人上下杖一百十人以下雖有軍器不曽拒捕為從者一回空糧船挾帶私鹽闖閘闖關隨同之旗丁頭舵各枷號一箇月賣私之人及竈丁窩藏寄頓者鹽法例一茶商赴楚買茶不依所定斤數多帶私茶者私茶例一鹽商欠課至十分者人戶虧兑課程例一甘肅西寧等處遇有番夷到來勢豪之家主使逼令減價以賤易貴及取覓用錢方許買賣者聽使之人把持行市例禮例一官吏軍民服飾僭用黃紫蟒龍飛魚斗牛器皿僭用硃紅黃顔色及親王法物者服舍違式例兵例一提塘及衙役人等將密封重事漏泄為首者一非密封事件提塘與各衙門書辦勾通本章一到即抄刻圖利事重為首者漏泄軍情人事例一軍八軍官私當關給衣甲旗幟應禁軍器者私賣軍器例一內地私販硫黃五十斤熖硝一百斤以上者窩藏囤販及知情賣與私販者挑夫船戶知情分贓者私藏應禁軍器例一隨征兵丁之所雇民人不曽偷盜馬匹器械逃回者一廣東省盜賊投撫分發入伍壯丁原犯在徒罪以下初犯脫逃者一廣東盜賊投撫分發入伍壯丁原犯軍流以上初犯脫逃鄰族保甲知情容隱者從征守禦官軍逃例一民人於臺灣近番處所偷越深山抽藤弔鹿伐木採棕等項一商漁船內夾帶違禁等物接濟外洋造船時原保結之澳甲戶族里長鄰佑一姦民圖利將廢鐵鐵貨潛出邊境及海洋貨賣一百斤以下者一姦徒止將米榖偷運出口圖利並無接濟姦匪情弊米過一百石之為從及知情不首之船戶一興販鴉片煙及私開鴉片煙館之船戶地保鄰佑人等一閩省不法棍徒充作客頭在沿海地方引誘偷渡之人包攬過臺索取銀兩為從者澳甲地保船戶舵工人等知而不舉者中途有謀害事情雖未同謀下手但同船知情不首告者一洋船回時有照外多載或頂充偷渡及潛匿不回等弊出結之族鄰行保一商人在沿海遞運鐵斤交賣商魚船出洋者一奉天錦復雄蓋四城拿獲無票船隻私渡民人者船戶民人一商民出洋將紅黃銅器銅斤私販各洋貨賣圖利一百斤以下之為首者一百斤以上之從犯及船戶一絲斤出洋過百斤為從及船戶知情不首者不及百斤為首者一租賃船隻出洋為匪之案犯該流罪以上者船主雖不知情私出外境及違禁下海例一各衙門鄉親往來并書吏人等濫捉民船用旗鎗燈籠假借本管官官銜者多乘驛馬例刑例一閩省民人結會樹黨隂作記認魚肉鄉民凌弱暴寡為從者謀叛例一淫詞小説市賣者造妖書妖言例一竊盜倉庫錢糧未經得財為首者常人盜倉庫錢糧例一奉差緝賊審非本案正盜若其人素行不端或經犯竊有案者將捕役人等照誣良為盜例減一等一姦豪憑空揑報盜劫陷害平人訛詐印捕官役甲長鄰佑扶同者一強盜例擬發遣其同居父兄伯叔與弟有知情而又分贓者強盜問擬斬決其同居父兄伯叔與弟雖經得財而不知情者強盜例一凡黔楚兩省相接紅苖彼此讐忿聚衆搶奪者一糧船水手夥衆十人以下又無器械搶奪者一搶奪傷人若傷非金刃又輕傷平復為從及自首者一出哨兵辨遇商船失風被溺商民俱已救援因而撈搶財物者除應斬決不準自首外其餘事未發覺而自首者邊海居民以及採捕各船乘危搶奪者一出哨兵辨如見船覆溺雖搶取貨物傷人未致斃命不計贓為從者白晝搶奪例一竊盜拒捕傷人傷非金刃又傷輕平復為從及自首者一竊盜擬絞之同居父兄伯叔與弟知情而又分贓者竊盜例一盜牛五隻以上及窩家知情分贓者俱枷號四十日一民人為從偷竊行圍巡幸地方馬匹一二匹至三四匹者及知情故買之民人盜馬牛畜産例一領票刨參人夫將批給鳥鎗轉給售賣刨參之人者一違禁攜帶米石什物賣與刨參之人易换人參米不及五十石什物值銀不及五十兩者巡綽官兵知情故縱者一刨參賊犯逗遛已過三冬若並無財主各出資本及受雇偷採或隻身潛往未得參者一潛入南苑竊取草束等物者一拿獲圍場內賊犯打牲砍木未得者盜田野榖麥例一內外大小衙門蠧役恐嚇索詐貧民計贓六兩至十兩為首者恐嚇取財例一考試生童如有積慣棍徒揑稱給與字眼記認不論有無立約封銀及口許虛贓被騙之生童一代倩鎗手若僅立有文約贓未入手鎗手與本童枷號兩個月一代倩鎗手若生童實係被人撞騙贓止口許情罪稍輕者詐欺官私取財例一窩留川販止知情未經分贓之為從者一興販婦人子女轉賣與他人為妻妾子孫者略人略賣人例一盜未殯未埋尸柩及發年久穿陷之塜未開棺槨者一非其子孫又非實有確據之前人古冢因土墩見人埋葬輒稱伊逺祖墳墓夥告夥證陷害無辜為從者發塜例一黑夜偷竊或白日入人家內偷竊財物事主毆打致死者夜無故入人家例一強盜窩主雖不行又不分贓但知情存留一人者一窩留積匪及窩藏回民行竊但經分得些微財物或止代為賣贓者盜賊窩主例一兩家互毆致死一命其律應擬抵之正凶當時被死者有服親屬毆死其毆死凶手之人鬬毆及故殺人例一非姦所獲姦或聞姦數日殺死姦婦姦夫到官供認不諱者一姦夫已就拘執而毆殺或雖在姦所捉獲非登時而殺者一本夫之兄弟及有服親屬捉姦登時殺傷者殺死姦夫例一奉差員役額外需索逼死印官者一婦女與人通姦本夫與父母並未縱容一經見聞殺姦不遂因而羞忿自盡者姦夫一和姦之案姦婦因姦情敗露羞忿自盡者姦夫威逼人致死例一鉛江濵海持鎗執棍橫行鬬毆傷人者鬬毆例一原毆傷輕因風身死正限外十日之內死者保辜限期例一地方紳襟占佃戶婦女無犯姦情事者威力制縛人例一妾過失殺正妻者妻妾毆夫例一兄姊挾嫌故殘弟妹至篤疾者毆期親尊長例一經法司督撫等衙門問斷眀白意圖翻異輒於登聞鼓下及長安左右門等處自刎自縊撒潑喧呼並教唆主使之人因小事糾聚多人越墻進院突入鼓廳妄行擊鼓謊告為首者揑開大欵欲思報復將已經法司督撫衙門斷眀事件意圖翻異聚衆擊鼓之餘人越訴例一審無挾讐止以誤執傷痕誣告蒸檢為從者誣告例一奴僕首告家主雖所告皆實者干名犯義例一坊肆將訟師祕本如驚天雷相角法家新書刑臺秦鏡一切搆訟舊書復行印刻及販賣者教唆詞訟例一衙門蠧役恐嚇索詐十兩以上為從者索詐貧民十兩以下致令賣男鬻女為從者一直省書役暗行頂缺之人以財行求至五百兩者官吏受財例一幕賔鑽營上司引薦别無情弊但盤踞屬員衙門者在官求索借貸人財物例一詐為六部各司軍衛各所文書為首者一詐為通政司大理寺鹽運司部屬各管軍所衙門印信文書為首者詐為制書例一偽造諸衙門印信及欽給關防誆騙財物數多造而未成者誆騙財物無多為從及知情行用者偽造關防印記誆騙財物數多為從及知情行用者為數無多為首者描摸印信行使誆騙財物四十兩者偽造印信時憲書等例一私鑄之本犯問擬斬絞其同居父兄伯叔與弟雖經分利而實係並不知情者本犯問擬發遣其同居父兄伯叔與弟知情分利者一將銀穵空傾入銅鉛等物及用銅鉛等物傾成錠錁外用銀皮包好并銅鉛等物每兩內攙實銀二三四五錢偽造銀使用為首者一私造鉛錢不及十千為從及知情行使者一私鑄銅錢受雇挑水打炭燒火及偶為買使以及房主鄰佑總甲十家長知而不拿獲舉首者船戶夾帶私錢者私鑄錢例銅一私買良家之女為娼者枷號三個月知情賣者一窩頓土娼月日經久者買良為娼例一民人將自已銀錢開場誘賭經旬纍月聚集無賴放頭抽頭者之初犯存留賭博人之再犯一民人販賣紙牌骰子為從者一私造賭具左右緊鄰通同徇隱不首若得財準枉法從重論罪止杖一百徒三年一藏匿造賭器具不行銷毁者一描畫紙牌者造賣牌骰未成者一拿獲賭犯出有賭具之人不將造賣之人據實供出者一無賴匪徒串黨駕船設局攬載客商勾誘賭博折沒貨物掯留行李者初犯到案審係僅止一二次者賭博例一挾讐放火延燒誘脅同行者放火故燒人房屋例一賊犯携贓逃遁鄰佑人等追捕倉卒毆斃者或賊勢強橫不能力擒送官以致毆打戕命者罪人拒捕例一在監斬絞人犯如有強橫不法及賭博等事知情故縱之禁卒獄囚脫監及反獄在逃例一軍流人犯逃回原籍房主保留容留不行舉首一徒犯中途脫原犯徒二年半者徒流人逃例一踈脫斬絞重犯之長解一年限內拿獲審無賄縱别情者主守不覺失囚例一捕役串通盜犯教供妄認别案盜犯以圖銷案者盜賊捕限例一押解兵役驛夫人等姦汚犯人妻女者陵虐罪囚例一承審官吏遇一切命盜案件將干連人犯不應拷訊任意疊夾致斃者一被誣之人不肯招承因而疊夾致斃之官吏故禁故勘平人例一刁悍之徒藉命打搶為首者檢驗尸傷不以實例工例一工程核減本身無力完交請豁如未完之數至十分者擅造作例遷徙比流減半準徒二年吏律吏典及承差禁子弓兵人等額外濫充者濫設官吏律戶律各處人民若有妄稱主保小里長保長主首等項名色生事擾民者禁革主保里長律刑律官吏受財説事過錢者官吏受財律名例例一土蠻猺獞讐殺劫虜及聚衆捉人靴禁本犯正法者之父母兄弟子姪本犯係軍流等罪其父母兄弟子姪初犯治罪後仍不改惡其親屬家口徒流遷徙地方例兵例一土人潛住外省生事為匪除實犯死罪外徒罪以上者同家口父母兄弟子姪一併遷徙安插私越冒度關津例刑例一步軍統領衙門畨役私用白役者畨役及白役應捕人追捕罪人例大清律例卷四十二
