body:
  text: 名例律上名者五刑之罪名例者五刑之體例也五刑笞刑五笞者擊也又訓為恥用小竹板一十折四板二十除零折五板三十除零折一十板四十除零折一十五板五十折二十板杖刑五杖重於笞用大竹板六十除零折二十板七十除零折二十五板八十除零折三十板九十除零折三十五板一百折四十板徒刑五徒者奴也蓋奴辱之一年杖六十一年半杖七十二年杖八十二年半杖九十三年杖一百流刑三不忍刑殺流之逺方二千里杖一百二千五百里杖一百三千里杖一百死刑二絞斬內外死罪人犯除應決不待時外餘俱監固候秋審朝審分别情實緩決矜疑奏請定奪條例一凡笞杖罪名折責槩用竹板長五尺五寸小竹板大頭濶一寸五分小頭濶一寸重不過一斤半大竹板大頭濶二寸小頭濶一寸五分重不過二斤其強盜人命事件酌用夾棍一夾棍中梃木長三尺四寸兩旁木各長三尺上圖下方圓頭各濶一寸八分方頭各濶二寸從下量至六寸處鑿成圓窩四箇面方各一寸六分深各七分拶指以五根圓木為之各長七寸徑圓各四分五釐其應夾人犯不得實供方夾一次再不實供許再夾一次用刑官有任意多用者該管上司不時察參倘有徇隱事發並交部議處一凡監禁人犯止用細錬不用長枷其應枷號人犯除律例開載應用重枷枷號者仍照遵行外其餘枷號俱重二十五斤一凡民人犯軍流徒罪者俱俟到配所之日決杖一每年於小滿後十日起至立秋前一日止如立秋在六月內以七月初一日為止將枷責等輕罪人犯照例減等發落笞罪寬免監禁重犯令管獄官量加寬恤刑部現審案件審眀減等按季彚題其人犯俱交該旗該地方官暫行保釋俟立秋後送部發落一直𨽻各省熱審之先審擬具題到部遇熱審仍行減等發落督撫熱審時審擬減等具題雖過熱審之期到部亦仍行減等發落其原具題時遇熱審有情罪不符駁回後具題逾熱審亦減等完結一每年正月六月俱停刑內外立決重犯俱監固俟二月初及七月立秋之後正法其五月內交六月節及立秋在六月內者亦停正法一每逢熱審之期一應杖責之犯無論題逹重案以及其餘事件統於減等之中遞行八折發落一各省問刑衙門夾棍州縣呈眀知府驗烙知府呈眀按察司驗烙按察司呈眀督撫驗烙其尺寸長短寬窄俱刻於中梃之上如有擅用未曽驗烙夾棍者以酷刑題參贖刑五刑中俱有應贖之欵附列於此以便引用納贖無力依律決配有力照律納贖收贖老幼廢疾天文生及婦人折杖照律收贖贖罪官員正妻及例難的決並婦人有力者照律贖罪一凡軍民諸色人役審有力者與舉人監生生員冠帶官不分笞杖徒流雜犯死罪應準納贖者俱照有力稍有力圖內數目折銀納贖若舉監生員人等例該除名革役罪不應贖者與軍民人等罪應贖而審無力者笞杖徒流雜犯死罪俱照律的決發落一凡文武官革職有餘罪及革職後另犯笞杖徒流雜犯死罪俱照有力圖內數目納贖若無力的決發落其貪贓官役概不準納贖一凡官員有先參婪贓革職提問者如審無婪贓入已止擬因公那用因公科斂坐贓致罪則除革職外餘罪納贖俱免如别案革職者仍照例納贖一各壇祠祭署奉祀祀丞神樂觀提點協律郎贊禮郎司樂等官並樂舞生及養牲官軍有犯姦盜詐偽失誤供祀並一應贓私罪名官及樂舞生罷黜軍革役仍照律發落若訐告詞訟及因人連纍並一應公錯過誤犯罪者照律納贖一太常寺厨役但係訐告詞訟過誤犯罪及因人連纍問該笞杖罪名者納贖仍送本寺著役徒罪以上及姦盜詐偽並有誤供祀等項不分輕重俱的決改撥光祿寺應役一僧道官有犯徑自提問及僧道有犯姦盜詐偽並一應贓私罪名責令還俗仍依律例科斷其公事失錯因人連纍及過誤致罪者悉準納贖各還職為僧為道一婦女犯姦杖罪的決枷罪收贖一凡律例開眀準納贖不準納贖者仍照舊遵行外其律例內未經開載者問刑官臨時詳審情罪應準納贖者聽其納贖不應準納贖者照律的決發落如承問官濫準納贖者交該部議處多取肥己者計贓科罪十惡一曰謀反謂謀危社稷二曰謀大逆謂謀毁宗廟山陵及宫闕三曰謀叛謂謀背本國潛從他國四曰惡逆謂毆及謀殺祖父母父母夫之祖父母父母殺伯叔父母姑兄姊外祖父母及夫者五曰不道謂殺一家非死罪三人及支解人若採生折割造畜蠱毒魘魅六曰大不敬謂盜大祀神御之物乘輿服御物盜及偽造御寶合和御藥誤不依本方及封題錯誤若造御膳誤犯食禁御幸舟船誤不堅固七曰不孝謂告言咒罵祖父母父母夫之祖父母父母及祖父母父母在别籍異財若奉養有缺居父母喪身自嫁娶若作樂釋服從吉聞祖父母父母喪匿不舉哀詐稱祖父母父母死八月不睦謂謀殺及賣緦麻以上親毆告夫及大功以上尊長小功尊屬九曰不義謂部民殺本屬知府知州知縣軍士殺本管官吏卒殺本部五品以上長官若殺見受業師及聞夫喪匿不舉哀若作樂釋服從吉及改嫁十曰內亂謂姦小功以上親父祖妾及與和者八議一曰議親謂皇家袒免以上親及太皇太后皇太后緦麻以上親皇后小功以上親皇太子妃大功以上親二曰議故謂皇家故舊之人素得侍見特蒙恩待日久者三曰議功謂能斬將奪旗摧鋒萬里或率衆來歸寧濟一時或開拓疆宇有大勳勞銘功太常者四曰議賢謂有大德行之賢人君子其言行可以為法則者五曰議能謂有大才業能整軍旅治政事為帝王之良輔佐者六曰議勤謂有大將吏謹守官職早夜奉公或出使逺方經涉艱難有大勤勞者七曰議貴謂爵一品及文武職事官三品以上散官二品以上者八曰議賓謂承先代之後為國賓者條例一已革宗室之紅帶已革覺羅之紫帶犯事治罪與旗人無異交刑部照旗人例枷號鎖禁完結應議者犯罪凡八議者犯罪開具所犯事情實封奏聞取旨不許擅自勾問若奉旨推問者開具所犯罪名及應議之狀先奏請議議定將議過緣由奏聞取自上裁其犯十惡者實封奏聞依律議擬不用此律十惡或專主謀反叛逆言非也蓋十惡之人悖倫逆天茂禮賊義乃王法所必誅故特表之以嚴其禁條例一凡應八議之人問鞫不加考訊皆據各證定罪一三品以上大員革職拏問不得遽用刑夾有不得不刑訊之事請旨遵行應議者之父祖有犯凡應八議者之祖父母父母妻及子孫犯罪實封奏聞取旨不許擅自勾問若奉旨推問者開具所犯及應議之狀先奏請議議定奏聞取自上裁若皇親國戚及功臣八議之中親與功為最重之外祖父母伯叔父母姑兄弟姊妹女壻兄弟之子若四品五品文武官之父母妻未受封者及應合襲廕子孫犯罪從有司依律追問議擬奏聞取自上裁其始雖不必參題其終亦不焉許擅決猶有體恤之意其犯十惡反逆緣坐及姦盜殺人受財枉法者許徑斷決不用此取旨及奏裁之律其餘親屬奴僕管莊佃甲倚勢虐害良民陵犯官府者事發聽所在官司徑自提問加常人罪一等非倚勢而犯不得概行加等止坐犯人不必追究其本主不在上請之律若各衙門追問之際占吝不發者並聽當該官司實封奏聞區處謂有人於本管衙門告發差人勾問其皇親國戚及功臣占吝不發出官者並聽當該官司實封奏聞區處條例一凡滿洲蒙古漢軍緑營官員軍民人等有犯死罪除十惡侵盜錢糧枉法不枉法贓強盜放火發塜詐偽故出入人罪謀故殺各項重罪外其尋常鬭毆及非常赦所不原各項死罪察其父祖及子孫陳亡者準將陳亡確實事迹隨本聲敘一凡犯該死罪如有祖父及子孫陳亡者於聲眀優免一人一次後俱不準再行聲請一各犯祖父人等陳亡在內由刑部在外由各該督撫於取供定罪後即移咨八旗兵部查取確實簡眀事迹聲敘入本恭候欽定職官有犯凡在京在外大小官員有犯公私罪名所司開具事由實封奏聞請旨不許擅自勾問指所犯事重者言若事輕傳問不在此限若許準推問依律議擬奏聞區處仍候覆準方許判決若所屬官被本管上司非禮陵虐亦聽開具陵虐實迹實封徑自奏陳其被參後將原參上司列欵首告者不準行仍治罪條例一各處大小土官有犯徒流以上依律科斷其杖罪以下交部議處一廕生有犯應題參處分者聽各衙門題參其文武生員犯該徒流以上等罪地方官一面詳請斥革一面即以到官之日扣限審訊不必俟學政批回始行究擬其情節本輕罪止戒飭者審眀移會該學教官照例發落詳報學政查核貢監生有犯同一文職道府以上武職副將以上有犯公私罪名應審訊者仍照例題參奉到諭旨再行提訊其餘文武各員於題參之日即將應質人犯拘齊審究如督撫同駐省分一面具題一面行知應承審衙門即行提訊一凡參革發審之案查眀被參之人如係同知遊擊以下等官遴委知府審理係道府副將等官遴委道員審理統令就近提齊欵證秉公確訊其案內牽連被害之人無關輕重者該道府審眀録供之後即分别保釋止將重罪要犯帶至省內由司覆勘解院審擬完結文武官犯公罪凡一應不係私己而因公事得罪者曰公罪凡內外大小文武官犯公罪該笞者一十罰俸一箇月二十三十各遞加一月二十罰兩月三十罰三月四十五十各遞加三月四十罰六月五十罰九月該杖者六十罰俸一年七十降一級八十降二級九十降三級俱留任一百降四級調用如吏兵二部處分則例應降級革職戴罪留任者仍照例留任吏典犯者笞杖決訖仍留役條例一休職病故旗員未完罰俸銀兩無俸可扣者照外省官員之例槩豫免追如本身係世襲官職及休職有俸者仍照數扣抵文武官犯私罪凡不因公事己所自犯皆為私罪凡內外大小文武官犯私罪該笞者一十罰俸兩箇月二十罰俸三箇月三十四十五十各遞加三月三十罰六月四十罰九月五十罰一年該杖者六十降一級七十降二級八十降三級九十降四級俱調用一百革職離任犯贓者不在此限吏典犯者杖六十以上罷役條例一文武官員舉人監生生員冠帶官及吏典兵役但有職役之人犯姦盜詐偽并一應贓私罪名俱發為民遇赦取問眀白罪雖宥免仍革去職役一凡外任各官遇有錢糧刑名事件應行革職者該督撫題參時即行摘印委員署理俟奉旨之日再行開缺若有奉旨寬宥者仍準復還原任犯罪免發遣凡旗人犯罪笞杖各照數鞭責軍流徒免發遣分别枷號徒一年者枷號二十日每等遞加五日總徒準徒亦遞加五日流二千里者枷號五十日每等亦遞加五日充軍附近者枷號七十日近邉者七十五日邉逺沿海邉外者八十日極邉煙瘴者九十日條例一凡移來盛京新滿洲等若有犯法者該將軍照新滿洲例辦理如過五年仍照舊人治罪一凡八旗滿洲蒙古漢軍奴僕犯軍流等罪除已經入籍為民者照民人辦理外其現在旗下家奴犯軍流等罪俱依例酌發駐防為奴不準折枷犯該徒罪者除漢軍奴僕照例問擬實徒外其餘照旗下正身例折枷鞭責發落至設法贖身並未報眀旗部之人無論伊主曽否收得身價仍作為原主户下家奴有犯軍流等罪仍照例問發一凡旗人毆死有服卑幼罪應杖流折枷者除依律定擬外仍酌量情罪請旨定奪不得概入彚題其有情節慘忍者發往黑龍江三姓等處不準枷責完結旗員中如有誣告訛詐行同無賴不顧行止者亦如之一漢軍家奴犯該徒罪者照民人一體實徒徒滿之後仍押解回旗交與伊主服役管束一問擬旗人罪名務詳核案情如實係寡亷鮮恥有玷旗籍者無論滿洲蒙古漢軍均削去本身戶籍依律發遣仍逐案聲眀請旨其餘尋常犯罪及因公事獲譴者仍照例折枷鞭責完結軍籍有犯凡軍籍人犯罪該徒流者各依所犯杖數決訖徒五等依律發配徒限滿日仍發回原衛所並所隸州縣流三等照依地里逺近發直省衛所並所隸州縣附籍犯該充軍者依律發遣犯罪得纍減凡一人犯罪應減者若為從減謂共犯罪以造意者為首隨從者減一等自首減謂犯法知人欲告而自首者聽減二等故失減謂吏典故出人罪放而還獲止減一等首領官不知情以失論失出減五等比吏典又減等還獲又減一等通減七等公罪遞減之類謂同僚犯公罪失於入者吏典減三等若未決放又減一等通減四等首領官減五等佐二官減六等長官減七等之類並得纍減而復減如此之類俱得纍減科罪以理去官以理謂以正道理而去非有别項事故者凡任滿得代改除致任等官與見任同謂不因犯罪而解任者若沙汰冗員裁革衙門之類雖為事解任降等不追誥命者並與見任同封贈官與其子孫正官同其婦人犯夫及義絶不改嫁者親子有官一體封贈得與其子之官品同謂婦人雖與夫家義絶及夫在被出其子有官者得與子之官品同為母子無絶道故也此等之人犯罪者並依職官犯罪律擬斷應請旨者請旨應徑問者徑問一如職官之法條例一子孫緣事革職其父祖誥敕不追奪者仍與正官同若致仕及封贈官犯贓與無祿人同科無官犯罪凡無官犯罪有官事發所犯公罪笞杖以上俱依律納贖卑官犯罪遷官事發在任犯罪去任考滿丁憂致仕之類事發公罪笞杖以下依律降罰杖一百以上依律科斷本案黜革笞杖以上折贖俱免若事干埋沒錢糧遺失官物雖係公罪事須追究眀白應賠償者賠償應還官者還官但犯一應私罪並論如律其吏典有犯公私罪名各依本律科斷條例一無官犯贓有官事發照有官參提以無祿人科斷有官時犯贓黜革後事發不必參提以有祿人科斷除名當差凡職兼文武官犯私罪罷職不敘應追奪誥敕除名削去仕籍者官階勳爵皆除不該追奪誥敕者不在此限僧道犯罪曽經決罰者追收度牒並令還俗職官僧道之原籍軍民竈户各從本色發還原籍當差條例一凡失陷城池行間獲罪及貪贓革職各官封贈俱行追奪其别項革職者免追一凡知縣以上及佐二雜職等官因貪贓枉法革職者任內有降罰案件照例仍追編俸外如佐雜等官實係因公罣誤毋論任內降罰案件多寡所有食過編俸一槩免其追賠流囚家屬凡犯流者妻妾從之父祖子孫欲隨者聽遷徙安置人隨行家口妻妾父祖子孫亦準此若流徙人正犯身死家口雖經附入配所之籍願還鄉者放還軍犯亦準此其謀反叛逆及造畜蠱毒若採生折割人殺一家三人會赦猶流者家口不在聽還之律條例一叛逆案內奉特旨免死僉妻發遣給與盛京寧古塔等處新滿洲為奴者永不許贖身律應籍沒家産者仍行籍沒一凡軍流徒犯俱開眀籍貫年嵗行文配所其軍流犯之妻及有子願隨者亦開眀年嵗若解部發遣人犯造册送部如係旗人並開眀旗色佐領一內地軍流人犯身故除妻子不願回籍並會赦不準放還外其餘令該地方官給咨回籍若婦人無子及子幼者咨眀本省督撫令本犯親戚領回原籍不準官為資送一凡發遣當差人犯之妻子原係隨往遣所者如本犯身故妻子情願攜骸回籍該管官查眀確實令其回籍其力不能來者俱入於本處檔內令其披甲若係奉旨發遣或部議僉遣及發遣打牲烏喇人犯身故其妻子有願攜骸回籍者令該將軍督撫按情罪之輕重分别具奏請旨遵行一凡律應定擬僉遣之犯承審官於審訊時即訊取本犯確供將伊妻姓氏年貌即於招詳內聲眀如無妻室即取具鄰族甘結加具印結隨招申送若係隔屬隔省一面於招內申報一面移查原籍取結俟結到之日即行加結申送不得俟結案後再行查僉如有因妻患病留養將本犯先行發遣者俟伊妻病痊補解時令伊親屬隨同差役解赴遣所交與本犯收領若伊妻年過六十以上並原係有疾不能隨行及患病留養後成篤廢不能補解者該地方官取具鄰族甘結加具印結申詳各上司行文本犯遣所俾令知之其有應行報部者報部查核倘有揑結情弊將具結之鄰族照軍流人犯揑報留養例杖一百犯妻立即補解其不行詳察之地方官並轉詳之該上司交部分别議處一犯軍流等罪之土司例發近省安插者本犯身故或無子及雖有子而幼小者其妻子並許回籍一旗民發遣人犯係奉特旨著僉妻子及例應僉妻者聽遣所該管官同本犯一例管束本犯身故後有情願攜骸回歸者該將軍等照例查奏準其回旗回籍若非特旨僉遣及例應僉遣之家屬則本非罪犯各該衙門於起解文內務將隨往字樣注眀遣所該管官記檔安插毋得概同本犯一例羈管有願回旗籍及本犯身故後有情願攜骸回歸者即準回歸報部不在奏請之例倘該管各官故為留難刁蹬不行奏報及失於查察者交部分别議處一軍流發遣人犯到配後生長子孫本犯在日其子孫如欲往他處耕種貿易呈眀該管衙門聽其自便至配所生長之女本犯或許嫁他處或寄養與人亦聽其自便一賞旗為奴人犯之在籍子孫有前往遣所省視及隨往之子孫原不在僉遣之內欲行回歸即赴該管衙門報名給與印票準其回歸仍將隨往子孫回歸之處照例報部本犯之主不得挾勢羈留倘有刁留計陷不得回歸者將本主照存養良家男女為奴婢律治罪該管官一併交部議處一八旗發遣人犯內如搶奪殺人下手為從者竊盜臨時拒捕殺人為從者竊盜三犯計贓五十兩以下至三十兩者旗人三犯竊盜折枷後又犯竊計贓五十兩以下者攔路截袋穵越倉墻偷米不至死罪者偷採人參人至百名以上參至五百兩以上為從者凶徒生事行凶者誘拐婦人子女被誘之人不知情及迷拐幼小子女為從者夥衆開窰誘取婦人子女藏匿勒賣為從者圖財害命不行而分贓及傷人未死不加功而已得財者夥衆搶去良人子弟強行雞姦之餘犯問擬發遣者凶徒圖財放火因而焚壓致斃人命情有可原者強姦十二嵗以下幼女未成者指稱雞姦誣告人致死罪未決者此等情重各犯在遣所病故所有妻子概不準攜骸回旗其餘本犯身故妻子情願攜骸回旗者該管將軍詳敘原案情罪咨部核議辦理凡罪應緣坐及造畜蠱毒採生折割人殺一家非死罪三人等項犯屬仍照例僉發外其餘一應軍流遣犯家屬均毋庸僉配如有情願隨帶者聽其自便不得官為資送一例應發往烏魯木齊等處人犯內除伊妻實係殘廢篤疾或年逾六十及該犯父母老病應留侍養者取具地方官切實印結準其免僉外其餘一概僉妻發配如有情願隨帶子女者一體官為資送其軍流內改發烏魯木齊等處人犯有情願攜帶妻子者亦一併官為資送一發往烏魯木齊等處人犯如果悔過悛改視其原犯情罪輕重定限或三年或五年編入該處民户册內給與地畝令其耕種納糧其未經到配本犯中途病故跟隨妻子或因到配已近不願回籍或子已年長堪勝力作情願到配為民者令地方官訊眀仍行發往即入於各該處民籍安插耕種不必令其為奴如有寡妻弱子不任力作或自願回籍者該地方官照例遞回原籍至已經到配年限未滿以前本犯身故者其子即照年限已滿例準入民籍一體安插不必復令為奴一蒙古人犯例應僉遣之妻子其隨從本夫者照例交與河南山東驛地當差如本犯已經正法其妻子單行發遣者將該犯等酌發南省駐防兵丁為奴至僉解遞送之處悉照應緣坐犯屬之例辦理一旗人發遣家奴如有同妻子一併送部發遣者其妻子一體賞給兵丁為奴一滿洲蒙古漢軍發往新疆人犯除罪犯寡亷鮮耻削去旗籍者應照民人一體辦理外其餘發往種地當差之犯係滿洲蒙古旗人如原犯軍流者定限三年免死減等者定限五年果能改過安分即交伊犂駐防處所歸入各旗挑補駐防兵丁當差係漢軍人犯照民人分定年限入於彼處緑營食糧此等人犯如情願迎取妻妾家口者該管大臣移咨該旗咨送兵部官為資送常赦所不原凡犯十惡殺人盜係官財物及強盜竊盜放火發冢受枉法不枉法贓詐偽犯姦略人略賣和誘人口若姦黨及讒言左使殺人故出入人罪若知情故縱聽行藏匿引送説事過錢之類一應實犯皆有心故犯雖會赦並不原宥其過誤犯罪謂過失殺傷人失火及誤毁遺失官物之類及因人連纍致罪謂因别人犯罪連纍以得罪者如人犯罪失覺察關防鈴束及干連聽使之類若官吏有犯公罪謂官吏人等因公事得罪及失出入人罪若文書遲錯之罪皆無心誤犯並從赦宥謂會赦皆得免罪其赦書臨時欽定實犯等罪名特賜宥免謂赦書不言常赦所不原臨時定立罪名寬宥者特從赦原及雖不全免減降從輕者謂降死從流流從徒徒從杖之類不在此限謂皆不在常赦所不原之限條例一凡殺死本宗緦麻以上尊長及外姻小功尊屬者俱不準援赦一番役誣陷無辜妄用腦篐及竹簽烙鐵等刑致斃人命者以故殺論不準援赦一誣告叛逆被誣之人已決者誣告之人擬斬立決被誣之人未決者擬斬監候不準援赦俱不及妻子家産一誣告平民因而拖纍致死三人以上者以故殺論不準援赦一凡關係軍機兵餉事務俱不準援赦寬免關係行間兵餉者乃坐一以赦前事告言人罪者以其罪罪之若干係錢糧婚姻田土等項罪雖遇赦寬免事須究問眀白應進取者仍行進取應改正者仍行改正一捕役誣拏良民及曽經犯竊之人威逼承認除被誣罪名遇赦尚準援免者其反坐之番役亦得援赦免罪外若將平民及犯竊之輕罪人犯逼認為謀殺故殺強盜者將捕役照例充軍遇赦不準援免一凡遇恩詔內開有軍流俱免之條其和同誘拐案內係民人改發煙瘴少輕地方者既準寬免係旗下家人於誘拐案內發遣為奴人犯亦許一體援免一直省地方偶值雨澤愆期應請清理刑獄者除徒流等罪外其各案內牽連待質及笞杖內情有可原者該督撫一面酌量分别減免省釋一面奏聞流犯在道會赦凡流犯在道會赦赦以奉旨之日為期必於程限內未至配所會赦者方準赦回若雖未至配所計行程過限者不得以赦放恐姦徒有意遷延謂如流三千里日行五十里合該六十日程未滿六十日會赦不問已行逺近並從赦放若從起程日至奉旨日總計有違限者不在赦限若在道有故者不用此律有故謂如沿途患病或阻風被盜有所在官司保勘文憑者皆聽除去事故日數不入程限故云不用此律若於途中曽在逃雖在程限內遇赦亦不放免其逃者身死所隨家口願還者聽遷徙安置人準此軍罪亦同其流犯及遷徙安置人已至配所及犯謀反叛逆緣坐應流若造畜蠱毒採生折割人殺一家三人會赦猶流者並不在赦放之限其徒犯在道會赦及已至配所遇赦者俱行放免流犯加徒者亦免加徒犯罪存留養親凡犯死罪非常赦不原者而祖父母髙曽同父母老七十以上疾篤廢應侍或老或疾家無以次成丁十六以上者即與獨子無異有司推問眀白開具所犯罪名並應侍緣由奏聞取自上裁若犯徒流而祖父母父母老疾無人侍養者止杖一百餘罪收贖存留養親軍犯準此條例一凡犯罪有兄弟俱擬正法者存留一人養親仍照例奏聞請旨定奪一凡部內題結軍流徒犯及免死流犯未經發配以前告稱祖父母父母老疾家無以次成丁者如屬宛大二縣民人該縣出結府尹確察報部如屬五城民人掌印兵馬司指揮出結巡城御史確察報部如屬外省民人州縣官出結督撫確察報部軍流徒犯照數決杖徒犯枷號一箇月軍流枷號四十日免死流犯枷號兩箇月俱準存留養親其各省題結人犯不必解部該督撫照此例發落若知情揑出印結以故出論如有受賄情弊以枉法論失察者交該部議處其鄰保族長等內有假揑出結者杖一百受財出結者以枉法從重論若地方官出結後上司復令察出或原官察出及鄉約人等首送者除本犯仍行發配外官員及鄰保人等俱免議其在外人犯咨解到部之後告留養者不準一凡鬭毆殺人之犯如有祖父母父母老疾應侍奉旨準其存留養親者將該犯照免死流犯例枷號兩個月責四十板仍令該地方官酌量該犯情由輕重以傷至數處及金刃致死者為重傷以傷非金刃又止一二處並戲殺誤殺為輕傷如係有力之家情重者追銀五十兩情輕者追銀三十兩如果貧難無力之人情重者追銀二十兩情輕者追銀十兩給與死者家屬養贍該督撫先將該犯情重情輕有力無力之處於應侍疏內一併聲眀仍照軍流留養例取具鄰保族長等甘結並地方官印結報部倘有知情揑結等弊照揑報軍流留養例分别議處治罪一殺人之犯有奏請存留養親者查眀被殺之人有無父母是否獨子於本內聲眀如被殺之人亦係獨子親老無人奉侍則殺人之犯不準留養一夫毆妻至死並無故殺别情者果係父母已故家無承祀之人承審官據實查眀取具鄰保族長甘結並地方官印結將應行承祀緣由於疏內聲眀請旨如準其承祀將該犯枷號兩個月責四十板存留承祀倘有揑稱家無承祀之人希圖脫罪者將本犯照律治罪承審出結各官及鄰保人等照例分别議處治罪一凡旗人犯斬絞外遣等罪例合留養者照民人一體留養一孀婦獨子有犯戲殺誤殺等案如伊母守節已逾二十年者該督撫查眀被殺之人並非孤子取結申眀具題法司核覆奏請留養其鬭毆殺人者審無謀故别情該犯之母守節已逾二十年而又年逾五十者定案時亦準將應侍緣由於本內聲敘至犯該軍流徒罪除犯姦強盜誘拐行凶及有關倫理擾害地方者照例科斷外其無知誤犯者該督撫查眀將果係獨子及伊母守節已逾二十年之處聲眀報部詳核照例分别枷責仍令按季彚題一凡鬭毆命案於相驗時即將凶犯有無祖父母父母老疾及該犯是否獨子訊證眀確一併詳報定案時如應留養再行取結若到案時非例應留養之人及成招時其祖父母父母已成老疾或兄弟子姪死亡仍一體援例留養一凡弟殺胞兄及毆殺大功以下尊長者皆按律定擬概不準聲請留養承祀若按其所犯情節實可矜憫者該督撫於疏內敘眀恭候欽定至夫毆妻至死應留養承祀之案仍照定例遵行一凡犯搶奪竊盜及三犯竊盜罪應軍流徒者果有父母老疾應侍與例相符準其留養一次照例折枷刺字詳記檔案若留養之後復犯搶竊及先犯搶留養後又犯竊或先犯竊留養後又犯搶並審係積匪猾賊一概不準留養一凡因誣告擬流加徒之犯除被誣罪名應準留養者仍照定例遵行外如誣告人謀故殺及為強盜等罪以致被誣良民久淹獄底身受刑訊蕩産破家逮審眀反坐者依律問發不準留養一凡造賣販賣賭具之犯查眀父母老疾應侍照搶竊等犯留養例亦準其留養一次一凡留養之犯在他省獲罪審係遊蕩他鄉逺離父母者即屬忘親不孝之人雖與例相符不準留養若係官役奉差客商貿易確實有據及兩省地界毗連相距在數千里以內者該督撫於定案時察核眀確按其情罪輕重照例將應侍緣由於題本內聲敘一凡曽經忤逆犯案及素習匪類為父母所擯逐者雖遇親老丁單概不準留養一凡軍流徒犯審係犯姦強盜誘拐行凶及有關倫理擾害地方者雖遇親老丁單概不準其留養一凡問擬死罪人犯因親老丁單照例留養發落之後復有干犯無論輕重罪名即照現犯之罪按律定擬不準復請留養一親老丁單及孀婦獨子留養之犯除實係戲殺誤殺者仍照例於題本內聲請留養法司隨案核覆外其鬭殺之案無論理直傷輕或實係理曲或金刃重傷或雖非金刃而連毆多傷致死者該督撫於定案時止將應侍緣由於題本內聲敘不必分别應準不應準字樣統俟秋審時查眀該犯父母尚在次丁尚未成立者取結報部刑部會同九卿核擬入於另册進呈恭候欽定朝審案件一體遵行一凡獨子留養之案如該犯本有兄弟併姪出繼可以歸宗者及本犯身為人後所後之家可以另繼者概不得以留養聲請天文生有犯凡欽天監天文生習業已成眀於測驗推步之法能専其事者犯軍流及徒各決杖一百餘罪收贖仍令在監習業犯謀反叛逆緣坐應流及造畜蠱毒採生折割人殺一家三人家口會赦猶流及犯鬬毆傷人監守常人盜竊盜掬摸搶奪編配刺字與常人一體科斷不在留監習業之限條例一凡欽天監官為事請旨提問與職官一例問斷該為民者送監仍充天文生身役該徒流充軍者備由奏請定奪其有不由天文生出身者悉照例革職發遣一養象軍奴犯該雜犯死罪及徒流罪決杖一百俱住支月糧各照年限常川養象滿日仍舊食糧養象笞杖的決工樂戶及婦人犯罪凡工匠樂戶犯徒罪者五徒並依杖數決訖留住衙門照徒年限拘役住支月糧其鬬毆傷人及監守常人盜竊盜掏摸搶奪發配刺字與常人一體科斷不在留住拘役之限其婦人犯罪應決杖者姦罪去衣留裩受刑餘罪單衣決罰皆免刺字若犯徒流者決杖一百餘罪收贖條例一和聲署官俳精選樂工演習聽用若樂工投託勢要挾制官徘及抗拒不服拘唤者聽申禮部送問就於本司門首枷號一箇月發落若官俳徇私聽囑放富差貧縱容四外逃躲者參究治罪革去職役一婦人有犯姦盜不孝并審無力者各依律決罰其餘有犯笞杖並徒流充軍雜犯死罪該決杖一百者審有力與命婦官員正妻俱準納贖徒流人又犯罪凡犯罪已發未論決又犯罪者從重科斷已徒已流而又犯罪者依律再科後犯之罪不在從重科斷之限其重犯流者三流並決杖一百於配所拘役四年若徒而又犯徒者依後所犯杖數該徒年限議擬眀白照數決訖仍令應役通前亦總不得過四年謂先犯徒三年已役一年又犯徒三年者止加杖一百徒一年之類則總徒不得過四年三流雖並杖一百俱役四年若先犯徒年未滿者亦止總役四年其徒流人又犯杖罪以下者亦各依後犯笞杖數決之充軍又犯罪亦準此其應加杖者亦如之謂天文生及婦人犯者亦依律科之條例一先犯雜犯死罪納贖未完及準徒年限未滿又犯雜犯死罪者決杖一百除杖過數目準銀七分五釐再收贖銀四錢五分又犯徒流笞杖罪者決其應得杖數五徒三流各依律收贖銀數仍照先擬發落若三次俱犯雜犯死罪者奏請定奪一凡在京在外已徒而又犯徒總徒四年及原犯總徒四年準徒五年者若遇赦減等俱減一年其誣告平人死罪未決應杖一百流三千里加徒役三年者若遇赦減等減為總徒四年若再遇赦仍準再減一年一免死減等發遣寧古塔黑龍江等處盜犯在配所殺人者該將軍咨報刑部查明原案仍照原犯之罪定擬斬決具題行文該將軍於衆人前即行正法若平常發遣人犯在配所殺人者仍分别謀故鬬毆律定擬一凡發遣人犯酌定名數分起解送如案內人犯衆多至五名以上者每五名作一起先後解送至起解時務必如法鎖􅀈將年貌鎖􅀈填注批內接遞官必按批驗眀鎖􅀈完全於批內注明完全字樣鈐蓋印信轉遞前途倘解役人等有受賄開放者計贓照枉法律治罪若轉解之該地方官因前途未曽鎖􅀈不復行查不補加鎖􅀈聽其散行將該地方官與前途未曽鎖􅀈官均按罪犯輕重交部分别議處如該犯於經過處所辱官詐財生事不法者無論滿漢軍民如係原擬斬罪免死減等人犯該地方即行羈禁嚴審通詳該上司核明具題將不法解犯即於經過處所照原犯斬罪正法示衆倘州縣官隱匿不報或該管上司不行轉揭題參者俱交部照例分别議處如係平常發遣人犯俱照徒流人又犯罪律分别治罪一發遣黑龍江等處為奴人犯有被伊主圖占其妻女因而致斃者將伊主照故殺奴婢例治罪倘為奴人犯有誣揑挾制伊主者照誣告家長律治罪一免死減等發遣盜犯除在配所殺人及為強盜並逃走後復犯行凶為匪者仍照定例遵行外其在配犯該斬絞監候者擬斬立決犯該徒罪以上者擬斬監候犯該笞杖者枷號三個月鞭一百一軍犯在配復犯徒罪者分别枷號徒一年者於配所枷號一個月每等遞加五日復犯軍流罪者均照逃軍枷號調發之例一體辦理一竊盜問擬軍流徒罪到配後除犯一切尋常案件及所犯罪重者仍各照律例辦理外其有在配在逃行竊不論次數贓數徒罪復犯者擬以滿流流罪復犯者改發雲貴兩廣極邉煙瘴充軍軍罪復犯者亦改發雲貴兩廣極邉煙瘴充軍如有脫逃被獲照新疆人犯脫逃例請旨即行正法不得與徒流改發人犯一體辦理大清律例卷四
