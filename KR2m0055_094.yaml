  text: 欽定四庫全書大清律例卷三十九
  hash: sha256:ef35bc397ec8d7a69a31a62ac97f6140ad7e8c86ff32722941aa859549fad350
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0055_WYG_094-1a, image: WYG0673/WYG0673-0178c.png}
body:
  text: 工律河防盜決河防凡盜決官河防者杖一百盜決民間之墟岸陂塘者杖八十若因盜決而致水勢漲漫毁害人家及漂失財物淹沒田禾計物價重於杖者坐贓論罪止杖一百徒三年因而殺傷人者各減鬬殺傷罪一等各字承河防墟岸陂塘說若或取利或挾讐故決河防者杖一百徒三年故決墟岸陂塘減二等漂失計所失物價為贓重於徒者准竊盜論罪止杖一百流三千里免刺因而殺傷人者以故殺傷論條例一故決盜山東南旺湖沛縣昭陽湖蜀山湖山安山積水湖揚州高寶湖淮安髙家堰桞浦灣及徐邳上下濱河一帶各隄岸並阻絶山東泰山等處泉源有干漕河禁例軍民俱發近邊充軍其閘官人等用草捲閣閘板盜泄水利串同取財犯該徒罪以上亦照前問遣一河南等處地方盜決及故決隄防毁害人家漂失財物淹沒田禾犯該徒罪以上軍民俱發近邊充軍一凡黃河一年之內運河三年之內隄工陡遇衝決而所修工程實係堅固於工完之日已經總河督撫保題者止令承修官賠修四分其餘六分准其開銷如該員修築錢糧俱歸實用工程已完未及題報而陡遇衝決者該總河督撫將衝決情形并該員工程果無浮冒之處據實報題亦令賠修四分其餘俱准開銷如黃河一年之外運河三年之外隄工陡遇衝決而該管各官實係防守謹慎並無疏虞懈弛者該總河督撫查明具題止令防守該管各官其賠四分內河道分司知府共賠二分同知通判守備州縣共賠一分半縣丞主簿千總把總共賠半分其餘六分准其開銷其承修防守各員俱令革職留任戴罪效力工完之日方准開復倘總河督撫有保題不實者後經查出照徇庇例嚴加議處所修工程仍照定例勒令各官分賠還項若河員有將完固堤工故行毁壞希圖興修借端侵蝕錢糧者該總河察訪奏聞於工程處正法一凡盜決河南山東等處臨河大堤為首者發近邊充軍盜決格月等隄發附近充軍因而殺傷人者仍照律定擬失時不修隄防凡不先事修築河防及雖修而失時者提調官吏各笞五十若毁害人家漂失財物者杖六十因而致傷人命者杖八十若不先事修築墟岸及雖修而失時者笞三十因而淹沒田禾者笞五十其暴水連雨損壞隄防非人力所致者勿論條例一凡運河一帶用强包攬閘夫澑夫二名之上撈淺鋪夫三名之上俱問發附近充軍攬當一名不曾用强生事者問罪枷號一箇月發落一遇河工緊要工程如有浮議動衆以致衆力懈弛者將倡造之人擬斬監候附和傳播者杖一百即於工所枷號一箇月其指稱夫頭包攬代雇勒掯良民者二名以上發附近充軍一名者杖一百枷號一箇月發落一楚省歲修隄塍如有勒掯業户將夫土包折銀錢者照河工包攬閘夫溜夫撈淺鋪夫例分别名數定擬一河工承修各員採辦料物如有姦民串保領銀侵分入已以致虧帑誤工該總河將承辦官參究仍將虧帑姦民發該州縣嚴查追比徜有徇縱等情亦即查參交部議處其虧帑串保姦民審實照常人盜倉庫錢糧律計贓治罪應追銀兩逾限不完著落原領官名下追賠一凡隄工宜加意慎重以固河防除現在已成房屋無礙隄工者免其遷移外如再有違禁增蓋者即行驅逐治罪並將徇縱容隱之官辨交部分别議處侵占街道凡侵占街巷道路而起蓋房屋及為園圃者杖六十各令拆毁修築復舊其所居自己房屋穿墻而出穢汙之物於街巷者笞四十穿墻出水者勿論條例一在京內外街道若有作踐掘成坑坎淤塞溝渠蓋房侵占或傍城使車撒放牲口損壞城腳及大清門前御道棊盤并護門柵欄正陽門外御橋南北本門月城將軍樓觀音堂關王廟等處作踐損壞者俱問罪枷號一箇月發落修理橋梁道路凡橋梁道路府州縣佐二官職専提調於農隙之時常加㸃視修理橋梁務要堅完道路務要平坦若損壞失於修理阻礙經行者提調官吏笞三十此原有橋梁而未修理者若津渡之處應造橋梁而不造應置渡船而不置者笞四十此原未有橋梁而應造置者大清律例卷三十九
