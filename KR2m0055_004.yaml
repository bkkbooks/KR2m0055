body:
  text: 御製大清律例序象刑有典肇見虞書其用之之道則曰欽曰恤曰明曰允一篇之中三致意焉武王誥康叔以用其義刑義殺而呂刑則曰士制百姓於刑之中以教祗德古先哲王所為設法飭刑布之象魏縣之門閭自朝廷達於邦國共知遵守者惟是適於義協於中弼成教化以洽其好生之德非徒示之禁令使知所畏懼而已我列祖受天明命撫綏萬邦頒行大清律例仁育義正各得其宜聖祖仁皇帝至仁如天化成久道德洋恩溥涵浹羣生皇考世宗憲皇帝際重熙纍洽之運振起而作新之親定大清律集解刊示中外甄陶訓迪刑期無刑法外之仁垂為明訓有曰寬嚴之用必因乎其時洋洋聖謨洵用法之權衡制刑之準則也朕寅紹丕基恭承德意深念因時之義期以建中於民簡命大臣取律文及遞年奏定成例詳悉參定重加編輯揆諸天理準諸人情一本於至公而歸於至當折衷損益為四百三十六門千有餘條凡四十七卷條分縷析倫敘秩然頒布宇內用昭畫一之守於戲五刑五用以彰天討而嚴天威豫一人恭天成命監成憲以布於下民敢有弗欽雖然有定者律令無窮者情僞也易曰君子以明慎用刑而不留獄書曰式敬爾由獄以長我王國忠信之長慈惠之師尚其慎厥用敬厥由體欽恤明允之意率乂於民棐彞克協于中以弼豫祈天永命允升于大猷從事於斯者胥懋敬哉是為序
