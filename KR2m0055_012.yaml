body:
  text: 經筵日講起居注官太子太保東閣大學士禮部尚書管理刑部事務臣劉統勲等謹奏為請㫖事臣等伏查乾隆十一年七月内經内閣衙門於遵㫖議覆御史戴章甫條奏案内議定刑部律例雖奏明三年一次纂修而三年内或酌改無多不必拘定三年之限應以五年為期纂修一次等因奏准遵行臣部於十六二十一二十六等年俱屆期請㫖纂修在案今計自乾隆二十六年至三十一年已屆五年之期理合奏請將五年以來所奉上諭以及議准内外臣工條奏應纂為定例者並加叅考分類編輯繕寫進呈恭候欽定再查律例全書自乾隆五年纂修告成以來迄今二十餘載條例日繁增改不一雖每屆五年修輯一次亦止就現定新例依類編入其從前舊例有與新例未合以及輾轉比附文義倒置應行增添刪改之處積久漸多引用窒礙臣等節年欽遵聖訓改正條例曾將緣由奏明在案今將全書所載條例逐一較對悉心叅酌改正務歸畫一隨時繕寫黄冊陸續進呈俟欽定奉㫖之日臣部將續纂新例並二十六年所纂條例各按門類歸入律例全書附刊於原本各條之後其改正舊例亦即於全書内逐一改刊則翻閲既易引用不致互岐至纂修日期向年編輯新例俱係定限十個月今全書所載舊例多有應須改正之處應請展限四個月以便悉心叅核俟命下之日臣部遵照辦理為此謹奏請㫖乾隆三十一年正月二十七日奏本日奉㫖知道了欽此
