body:
  text: 該總理事務王大臣會同九卿會議得刑部尚書傅鼐奏稱竊惟刑罰世輕世重乃帝王宜民宜人之權我朝律例刊布於順治三年酌議於康熙十八年重刊於雍正三年固已法度修明紀綱整飭矣臣伏讀我世宗憲皇帝遺詔有曰國家刑罰禁令之設所以詰姦除暴懲貪黜邪以端風俗以肅官方者也然寬嚴之用又必因乎其時從前朕見人情淺薄官吏營私相習成風罔知省改勢不得不懲治整理以誡將來今人心共知警惕矣凡各衙門條例有從前本嚴而朕改易從寬者此乃從前部臣定議未協朕與廷臣悉心斟酌而後更定以垂永久者應照更定之例行若從前之例本寬而朕改易從嚴者此乃整飭人心風俗之計原欲暫行於一時俟諸弊革除之後仍可酌復舊章此朕本意也向後遇此等事件則再加斟酌若有應照舊例者仍照舊例行欽此欽遵臣思聖心惓惓於此蓋必有所軫念而未及更正者也我皇上御極以來凡事皆以世宗憲皇帝之心為心每遇奏讞之時斟酌詳慎好生之德固已洽於民心矣伏查大清律集解附例一書係雍正三年刊刻之板現今不行之例猶載其中如竊盜三犯已經改議分别贓物十兩上下遞為重輕而例內所載乃係贓數不多奏請改遣如遣犯脫逃行凶為匪已經改議分别所犯情罪遞為重輕而例內所載乃係即行正法如此之類頗多恐問刑之員援引舛錯吏胥因緣為姦且與其臨時斟酌上厪聖懷不若先事精詳事事立之準則應請皇上特降諭旨簡命通達治體熟諳律例之大臣為總裁將雍正三年刊行律例詳加核議除律文律注仍舊外其所載條例有先行而今已斟酌定議者改之或有因時制宜應行斟酌而未逮者亦即欽遵世宗憲皇帝遺詔酌照舊章務期平允逐款繕摺恭請皇上欽定勒限纂輯繕寫成書進呈御覽請旨刊刻頒行各省俾知遵守以昭畫一之會則世宗憲皇帝義盡仁至之心我皇上善繼善述之政接欽恤之傳而養萬年之福等語查律為一定不易之成法例為因時制宜之良規故凡律所不備必藉有例以權其大小輕重之衡使之纖悉比附歸於至當我世宗憲皇帝臨御十有三年宵旰勵精勤求至治而於刑獄尤加詳慎凡有所降諭旨及諸臣條奏經由廷議者必悉心斟酌然後頒行猶慮愚民一時未能遍知每行一例必定以年限使之家喻户曉再有所犯方始照例問擬仰惟聖心哀矜惻怛慎重周詳洵足昭億萬年之法守矣第刑罰世輕世重自昔為然而寬嚴之道遂如溫肅之異用而同功時而崇尚惇大禁令漸弛道在整飭不得不濟之以嚴時而振興明作百度具張道在休養不得不濟之以寬寬嚴合乎大中而用中本乎因時蓋所謂中無定體隨時而在是以世宗憲皇帝遺詔惓惓於條例之寬嚴有宜再加斟酌之訓諭深有望於我皇上繼志述事敷時繹思紹執中建極之謨永臻於蕩平正直之治也伏讀大清律集解附例一書所刊原例增例欽定例三項非盡現行之條而自刋刻後至今前例又多酌改若不加以參訂歸於畫一恐內外問刑之員易於援引舛錯而吏胥因得髙下其手足滋任意輕重之弊應如刑部尚書傅鼐所奏恭請皇上特簡大臣為總裁官將以前刊刻律例并自刊刻後至今通行各例統加檢查核議有宜因時變通如先經定例而後經改易者或前例未協而後亦未經改易者應作何斟酌損益寬嚴得中逐一縷析條分務期平允其應刪除者即行刪除應增入者即行增入應更正者即行更正應仍照舊例行者亦即酌復舊章除律文律注仍舊外其刊入之例必將某條附載某律之處確切不移使宏綱細目大小咸該仁育義正折衷盡善敬謹擬議恭請皇上欽定纂輯繕寫成書進呈御覽請旨刊刻頒行則因時用中先後同揆以彰紹庭罔斁之孝思益垂世守不愆之令典矣至作何揀選分修及定限一切事宜恭候命下之日另行奏聞請旨遵行等因乾隆元年六月十九日題二十一日奉旨依議欽此隨經刑部將應開列總裁官列名奏請奉硃筆點出三泰徐本慶復楊超曾為總裁官
