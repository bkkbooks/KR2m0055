  - {type: page-break, offset: 0, content: '', id: KR2m0055_WYG_086-1a, image: WYG0673/WYG0673-0097a.png}
body:
  text: 刑律捕亡應捕人追捕罪人凡在官應捕人承官差追捕罪人而推故不行若知罪人所在而不即捕者減罪人所犯罪一等以最重之罪人為主減科之仍戴罪限三十日内能自捕得一半以上雖不及一半但所獲者最重功足贖罪皆免其罪雖一人捕得餘人亦同若於限内雖未及捕獲而罪人已死及自首各盡者亦免罪其罪人或死或首猶有不盡者止以不盡之人犯罪減等為坐其非專充應捕人臨時差遣者或推故不行或知而不捕各減應捕人罪一等仍責限獲免其應捕人及非應捕人有受財故縱者不給捕限各與囚之最重者同罪亦湏犯有定案可與同科所受之贓重於囚罪者訃贓全科以無祿人枉法從重論條例一隔屬隔省密拏强盗及人命案内應擬斬絞重犯有縱令劫奪及徇庇不解其該管官題叅解任如在隔省移咨㑹叅解任俟獲犯審明具題開復該管之鄉地甲鄰嚴拏究治若本無搶犯徇庇等弊而捕役賄縱揑稱被劫者將捕役照誣告律治罪原叅之員即行開復誤聽捕役之員交部議處一歩軍統領衙門番役祗許於京城内外五城所屬地方緝拏人犯既經拏獲屬提督管轄者限即日送該管營弁轉送提督衙門屬五城管轄者限即日送該管官轉送御史衙門如稽留數日始行送官將番役究明私拷勒索情弊分别定擬如有得財縱放照衙役犯贓例治罪其地屬州縣者行文州縣僉差擒捕或有密拏要犯州縣不能擒捕必湏番役擒捕者奏聞請旨後行一脱逃要犯務將該犯年貎籍貫有無鬚痣詳細開明行文通緝各州縣於文到之日差捕認緝一面填寫印票分給各鄉總甲遍行訪察如果徧緝無踪年底出具印甘各結轉詳咨部仍令接緝務獲知照銷案一緝捕强盗人命或闗係𦂳要案内人犯如有逃逸一面行文八旂並提督五城協力緝捕一面牌行直隸附近京城之涿州良鄉通州昌平河間等處州縣部文到日即行捕緝再行補報督撫一凡王公等之辛者庫家人等有犯命盜重案脱逃者該衙門查拏之時即行文知㑹伊主協同捕緝一年限滿不獲將辦理包衣事務官交部議處其該管王貝勒貝子公等各罰俸一箇月未獲逃犯仍照案協同緝拏一五城司坊等官若於途次遇有兇徒不法等事不論何城並准當時拘執錄取口供詳解該城御史審訊一靣報明本城御史存案其有曖昧隠避等事亦許密詳該城御史查拏仍密詳本城存案造册送院註銷倘該役借端訛詐駕詞妄禀及司坊官擅作威福拘拿自審或縱役滋擾該御史題叅分别議處治罪若押坊捕役因非本管地方明知故縱及有受賄情弊嚴加治罪大宛二縣亦不論五城及該縣所屬遇有兇犯不法等事亦一體緝拿一歩軍統領衙門正身番役俱照各部院經承貼寫送查之例將番役年貎籍貫按季造册並出具並無白役圓扁子印結移送河南道御史考核倘番役私用白役别經發覺將番役及所用白役照吏典人等額外濫充律治罪該統領及不行詳杳之該御史一併交部議處至番役緝拿竊盜鬭毆之類每名預給印票一張開明欵項發交収埶並將預給印票欵項移明河南道查核如係提拿審案人犯務必給與印票將應拿人犯姓名逐一開明有應密者給與密票亦於票内開明人犯姓名如無票私拿即將該番役解送刑部究訊治罪失察該管官交部嚴加議處一凡官司勾攝罪人已在該犯家拿獲如有為首紏謀聚至三人以上持械打奪傷差者即照中途奪犯例分别殺傷治罪若並未紏約聚衆實係一時爭鬭拒毆致有殺傷仍照各本律定擬其非本案罪犯及非所勾捕之人毋論在途在家俱以凡鬭論差人藉端滋擾照例從重治罪地方官交部議處一州縣廣緝重犯不得濫給緝票先將該犯年貎案由并差役年貎籍貫及所差名數一面詳明督撫知照各該省一面改用通闗給與差役擕帶在身宻行偵緝如有踪跡即將通闗呈報該地方官添差拿解如緝無踪跡仍投換囘文以為憑騐倘有濫給印票及差人雇倩白役代緝以及藉端勒索照例治罪其僉差不慎之承緝官照例嚴加議處罪人拒捕凡犯罪事發而逃走及犯罪雖不逃走官司差人追捕有抗拒不􅡘追捕者各於本罪上加二等罪止杖一百流三千里本應死者無所加毆所捕人至折傷以上者絞監候殺所捕人者斬監候為從者各減一等若罪人持仗拒捕其捕者格殺之及在禁或押解已問結之囚逃走捕者逐而殺之若囚因追逐窘迫而自殺者不分囚罪應死不應死皆勿論若囚雖逃走已就拘埶及罪人雖逃走不拒捕而追捕之人惡其逃走擅殺之或折傷者此皆囚之不應死者各以鬭殺傷論若罪人本犯應死之罪而擅殺者杖一百以捕亡一時忿激言若有私謀另議條例一凡罪犯業經拏獲捕役借稱設法制縛誤傷其命者仍照已就拘埶而殺之律以鬭殺論倘捕役受人賄囑將罪人致死者照謀殺人首從律治罪一強盜拒捕殺傷官兵之案除同夥傷人之時該犯不在一處者仍照例擬罪外其同在一處或三五成羣雖非下手之人既在旁目覩即係同惡共濟法所難寛即行斬決一賊犯持仗拒捕為捕者格殺不問事主隣佑俱照律勿論如有擕贓逃遁隣佑人等直前追捕倉卒毆斃或賊勢强横不能力擒送官以致毆打戕命者照事主毆打至死減鬭殺罪二等例杖一百徒三年若業已拿獲輙復叠毆或捕人多於賊犯倚衆共毆及恃强逞兇致斃者仍照罪人不拒捕而擅殺律擬絞監候共毆之餘人仍照律杖一百一竊盜拒捕刃傷事主姦夫拒捕刃傷應捉姦之人依例照折傷以上擬絞外若傷非事主并非例得捉姦之人以及别項罪人拒捕如毆所捕人至折傷及殘廢篤疾在折傷以上者方依律擬以絞候其但係刃傷仍照律加本罪二等問擬一罪人事發在逃被獲時如犯該軍流者均照軍流越獄加等例遞加改發有拒捕者若本罪已至滿流而拒毆在折傷以下者照滿流人犯越獄例改發近邉充軍犯該充軍者各以次遞加調發若犯該極邉烟瘴充軍者改發黑龍江等處給披甲人為奴其原犯未至滿流者仍依拒捕律加罪二等毆所捕人至折傷以上者擬絞監候殺人者擬斬監候獄囚脱監及反獄在逃凡犯罪被囚禁而脱監及解脱自帶鎖杻越獄在逃者如犯笞杖徒流各於本罪上加二等如因自行脱越而竊放同禁他囚罪重者與他囚罪重者同罪並罪止杖一百流三千里本犯應死者依常律若罪囚反獄在逃者無論犯人原罪之重輕但謀助力者皆斬監候同牢囚人不知反情者不坐條例一各處監獄俱分建内外兩處強盜并斬絞重犯俱禁内監軍流以下俱禁外監再另置一室以禁女犯一獲犯到案并解審發囘之時州縣官當堂細加摉檢無有夾帶金刃等物方許進監並嚴禁禁卒不許將磚石樹木銅鐵器皿之類混行取入如有買酒入監者將禁卒嚴行責治一凡殺人盜犯及未殺人之首盜與傷人之夥盜原擬斬梟及斬決若越獄脱逃被獲者並於本地方斬決梟示其未殺傷人之夥盜原係擬斬免死發遣之犯如越獄脱逃被獲者於本地方擬斬立決若因越獄殺傷兵役者亦擬斬梟示其外省越獄及在途脱逃盜犯被别省拏獲即令拏獲之地方官審報該撫具題刑部查明原卷奏聞行令拏獲之地方立決其從部刺字發遣在途用酒灌醉用藥迷倒解差乘間逺颺者該地方官報部亦行令拏獲之地方擬斬立決若因脱逃殺傷兵役者斬決梟示其疎縱之該管官照例議處刑書禁卒有無賄縱與不嚴加肘鎖少差兵役及差非正身以致中途脱逃者地方官及兵役照例議處治罪一拏獲越獄人犯務究通線與剃頭並代為銷燬刺字情弊通線之人與囚同罪至死者擬絞監候其代為剃頭並銷燬刺字之人俱枷號兩箇月責四十板一一人越獄半年内自行投首者仍照原擬罪名完結如同夥越獄多人有一人於限内投首供出同夥於半年内盡行拿獲者將自行投首之犯照原罪減一等發落倘供出之同夥内尚有一二人未獲者亦仍照原擬罪名完結如係有服親屬拿首者亦照本犯自首之例分别完結一在監斬絞人犯如有强横不法及睹博等事杖一百仍嚴加鎖􅀈俟秋審分别定擬知情故縱之禁卒照開局窩睹例杖一百徒三年提牢官失於覺察獄官故為徇隠交部分别議處軍流等犯有犯亦照此問擬一斬絞重犯如有越獄脱逃將管獄官及有獄官即時題叅按例分别議處不得同軍流等犯越獄按照疎防定限扣叅一斬絞人犯如有在監年乆自號牢頭串通禁卒捕役挾制同囚嚇詐財物教供誣陷少不遂欲恣意陵虐兇惡顯著者審實即照死罪人犯在監行兇致死人命例依原犯罪名擬以立決其尋常過犯酌量嚴懲示儆一流罪人犯越獄脱逃按律加二等二千里者改為三千里二千五百里者改發附近充軍三千里者改發近邉充軍原犯充軍者各以次遞加調發其原犯極邉烟瘴充軍者改發黒龍江等處給披甲人為奴徒流人逃凡徒流遷徙充軍囚人巳到配所於所役限内而逃者一日笞五十毎三日加一等罪止杖一百仍發配所其徒囚照依原犯該徒年分從新拘役役過月日並不准理若官司起發已經斷決徒流遷徙充軍囚徒未到配所中途在逃者其計日論罪亦如配所限内而逃者論之配所主守及途中押解人不覺失囚者一名杖六十每一名加一等罪止杖一百皆聽一百日内追捕配所提調官及途中長押官減主守及押解人罪三等限内能自捕得或他人捕得若囚已死及自首皆免罪故縱者不分官役各與囚之徒流遷徙充軍同罪受財者計所受贓以枉法從重論贓罪重以枉法科之縱罪重仍以故縱科之條例一充軍人犯逃囘如原犯實犯死罪免死充軍逃囘復有行兇為匪者依免死減等發遣人犯逃囘行兇為匪例照原犯死罪即行正法一軍流人犯在逃遇赦不分初犯再犯三犯俱免枷號仍發原配一凡發遣黑龍江寜古塔等處人犯逃走若拿獲時有拒捕者查明該犯係免死减等發遣或係平常發遣人犯各照逃走後復行兇為匪例分别定擬一凡行兇發與披甲人為奴之犯伊主或給親戚或親擕來京或差做買賣來京永行禁止若伊主搬移來京亦留下另給披甲之人為奴一凡在京問擬徒罪人犯除順天府所屬民人仍令府尹發配外其餘各省民人俱遞囘各該督撫照伊原籍應發地方發配充徒俟年限滿日交原籍地方官管束若係强竊盜及光棍案内之犯不許出境倘有私自出境依不應重律杖八十其管束不嚴之地方官交部議處仍令五城大宛二縣并巡捕營嚴行查拿倘有前項人犯容留京城潛住發覺者將地方官交部議處總甲人役并知情容留之房主各依不應重律杖八十如有旗人容留居住將知情容留之房主若係另户并族長若係家人并伊主及領催各鞭八十該佐領驍騎校交部議處一軍流罪犯在配所脱逃一面移咨原籍地方勒限緝拿一面令該管官懸立賞格勒限一百日嚴緝將該犯拿獲到案各照定例分别治罪外其看守之保甲革役免罪如逾限不獲一名者杖八十毎一名加一等罪止杖一百受財故縱者計贓以枉法論失察之該管官并兼轄官交部議處一在川流民犯罪遞囘原籍復逃至川者如無為匪照逃人例杖一百遞囘原籍如有為匪所犯在杖一百以下者並杖六十徒一年如所犯在徒一年以上者各照所犯之罪加一等問擬其遞囘原籍之時行文原籍地方官嚴行管束如有復逃入川及川省該地方官將逃囘人犯失察容隠俱按逃囘名數交部議處其原籍地保人等若於該犯出境之時隨即呈報在一百日限内或經該管官拿獲或經别處拿獲俱准免罪逾限不獲將地保照因人連累致罪例減罪人罪二等發落倘有知情隠匿者與犯人同罪罪止杖一百受財故縱者以枉法計贓治罪其川省之地保人等如有知情受賄等弊亦照原籍地保分别治罪一在京問擬笞杖枷責遞囘原籍人犯有復逃來京者除初次二次本犯仍遞囘安揷免其治罪該地方官免其查叅其復逃來京至三次以上雖審無犯案亦按其原犯如係枷責遞囘照不應重律杖八十係笞杖遞囘照不應輕律笞四十仍交該地方官嚴加管束有犯案者從重歸結疎縱之地方官照例分别議處一外遣人犯脱逃各將軍除一面行文報部一面即知㑹各該犯原籍地方一體查拿一凡兵役人等押解軍流徒罪等犯除依法管解偶致疎脱者仍照律治罪外其違例雇替託故潛囘或無故先後散行止任一人押解致有疎脱者將押解兵役照押解在獄罪囚中途不覺失囚律減囚罪二等問擬一免死減軍人犯在配脱逃拿獲之日審無行兇為匪者初次枷號兩個月無論近邉邉逺俱調極邉地方充軍二次枷號三個月調極邉烟瘴充軍犯至三次者改發寧古塔等處給披甲人為奴一充軍常犯至配後責令照例當差不得任其閒散如有脱逃係附近充軍者初次枷號一個月調發近邉二次枷號兩個月調發邉逺三次枷號三個月調發極邉烟瘴其本犯近邉邉逺者各以次遞加調發至極邉烟瘴脱逃者改發黑龍江等處給與披甲人為奴即令拿獲之州縣一面収禁一面闗查配所原案究明有無行兇為匪及脱逃次數將應行改調之處申詳督撫咨部核擬完結毋庸遞囘原配審斷其尚未到配中途脱逃者亦照此例辦理一遞解軍流徒遣及發囘原籍収管審訊等犯務於批文内載叙事由開明該犯年貎疤痣箕斗令沿途地方查明轉遞如有中途雇倩頂替情事除本犯解役人等照例究擬治罪外將僉差不慎之員分别議處如原文内未經開載將原解之員照例議處一雲貴兩廣烟瘴少輕人犯在配脱逃者枷號一個月改發極邉烟瘴極邉烟瘴脱逃即發黑龍江等處為奴一發遣雲貴兩廣極邉烟瘴刨參人犯脱逃被獲發往黑龍江等處給與披甲人為奴一原犯流罪人犯如有中途在配脱逃被獲者俱不計次數流二千里者改為二千五百里二千五百里者改為三千里三千里者改發附近充軍就其現配地方計程發配若現配地方應配之所即係原籍相近之處而又地處邉境再無别處可以改發者仍從其原籍改發倘原籍改發之所又較原配相近則視其拿獲地方改發均各加枷號兩個月責四十板一免死減等流犯中途在配脱逃被獲者不計次數改發近邉充軍亦就其原配地方計程發配若現配地方應配之所即係原籍相近之處而又地處邉境再無别處可以改發者仍從其原籍改發倘原籍改發之所又較原配相近則視其拿獲地方改發各加枷號兩個月責四十板一徒犯脱逃如係在配脱逃被獲仍照律治罪外其有中途脱逃被獲者各於本罪上遞加一等杖六十徒一年者加為杖七十徒一年半以次遞加至徒三年者加為總徒四年總徒四年者加為准徒五年各杖一百准徒五年者改為杖一百流二千里一䝉古發遣人犯在配脱逃如係原發山東河南者初次調發福建湖廣等省加枷號一個月責四十板二次調發雲貴兩廣極邉烟瘴加枷號兩個月責四十板三次者仍發囘原調處所加枷號三個月責四十板其原發福建湖廣等省者以次調發極邉烟瘴而止䝉古免死減軍在配脱逃者亦一體加調仍各分次數枷責刺字並令拿獲之州縣究明逃後有無行兇為匪照民人例分别定擬一逃囘原籍之軍流人犯本籍地方官於咨緝文到即𫝊該犯親屬隣保人等逐一訊問根由下落如果未逃囘即取確實供結加具印結咨送刑部及配所省分存案仍令保隣不時偵緝一經囘籍立即首報倘容留不行舉首别經發覺即將房主隣保照知情藏匿罪人減罪人一等律杖一百徒三年其雖不容留但明知不首者各杖一百容留之親屬除祖父子孫夫妻奴僕外俱照不應重律杖八十不得援親屬得相容隠之條若逃往别處其知情容留及知而不首之人罪亦如之率混加結之地方官及逃往别處不行查出之地方官一併交部分别議處一黔省查拿遊匪除斬絞軍流照例辦理外其犯該杖徒者遞囘原籍充徒發落並開明該犯姓名年貎籍貫通飭各屬備案仍令各照定例辦理若本犯囘籍之後復敢潛入黔境一經拿獲訊無為匪照逃人例杖一百遞囘原籍如有為匪犯在杖一百以下者並杖六十徒一年犯在徒一年以上者各照所犯之罪加一等其窩留之人照知人犯罪藏匿律減罪人一等問擬失於查察之原籍及黔省地保人等照川省之例分别知情受賄等弊一例治罪原籍失察脱逃并黔省失察容留地方文武各官均照例分别議處一免死發遣盜犯在配脱逃者無論有無行兇為匪悉照新疆遣犯脱逃例於拿獲之日請旨即行正法稽留囚徒凡應徒流遷徙充軍囚徒斷決後當該原問官司限一十日内如原定法式鎖杻差人管押牢固闗防發遣所擬地方交割若限外無故稽留不送者三日笞二十毎三日加一等以吏為首科斷罪止杖六十因稽留而在逃者就將當該提調官住俸勒限嚴捕吏抵在逃犯人本罪發遣候捕獲犯人到官替役以囚至配所之日疎放若鄰境官司遇有囚遞到稽留不即遞送者罪亦如之稽留者騐日坐罪逃者抵罪發遣若發遣之時提調官吏不行如法鎖杻以致囚徒中途解脱自帶鎖杻在逃者與押解失囚之人同罪分别官吏罪止杖一百責限擒捕並罪坐所由疎失之人受財者計贓以枉法從重論統承上言條例一凡外遣人犯務令依限解赴如有患病應留養者山海闗以内州縣責成直𨽻總督查察山海闗以外州縣責成盛京將軍及奉天府府尹查察必騐明患病確實具結申請方准照例留養如有本係無病及病已痊愈率行揑結及漫無覺察任其遷延者即將各該州縣及該旗員等嚴查叅處并飭各屬將每年有無患病留養人犯及己未起解之處按季報明該督該府尹造册報部查核直省遞解人犯一體照此辦理一凡隔省遞籍人犯該州縣一面發遞一面闗㑹原籍并知照經過地方官無論長解短解務遵定例加差轉遞各該州縣仍於季底將有無遞解過某省人犯若干名造册由府彚詳督撫分咨各省轉行查核照案咨覆其本省遞解人犯亦責成各州縣彼此闗覆查結主守不覺失囚凡獄卒不覺失囚者減囚原犯之罪二等以囚罪之最重者為坐若囚自内反獄在逃又減不覺罪二等聽給限一百日戴罪追捕限内能自捕得及他人捕得若囚已死及自首獄卒皆免罪司獄官典減獄卒罪三等其提牢官曾經躬親逐一㸃視罪囚鎖杻俱已如法取責獄官獄卒牢固収禁文狀者不坐若提牢官於該日不曾㸃視以致失囚反逃者與獄官同罪若提牢官獄卒官典故縱者不給捕限官役各與囚同罪至死減等罪雖坐定若未斷之間能自捕得及他人捕得若囚已死及自首各減囚罪一等受財故縱者計贓以枉法從重論若賊自外入獄劫囚力不能敵者官役各免罪若押解在獄罪囚中途不覺失囚者罪亦如之如獄卒減二等仍責限捕獲免罪如有故縱及受財者並與囚同罪係劫者免科條例一凡押解人犯中途脱逃者短解及䕶送營兵俱照長解治罪一凡發遣黑龍江寧古塔等處人犯沿途官員親身不行押解交與兵丁解送或不謹慎看守以致罪人逃脱者官交部嚴加議處將兵丁照律治罪再加枷號一個月一枷號人犯脱逃看守人役亦照律擬斷一凡斬絞重犯在監脱逃審係禁卒賄縱者即視其所縱囚犯之罪全律科斷如本犯應入秋審情實者亦入情實應絞決者亦擬絞決應斬決以上者亦即擬以斬決其非得賄故縱者仍照本律科斷一凡解審斬絞重犯在途開放鎖鐐以致脱逃本犯未獲者即將解役究審嚴行監禁俟拿獲正犯之日究明賄縱屬實即將解役照所縱囚罪全科如無賄縱情弊審有違例雇替託故潛囘無故先後散行止任一人押解以致脱逃者亦照故縱律與囚同罪不准照舊例減囚罪二等問擬果係依法管解偶致疎脱審有確據者除依律治罪外仍勒限緝拿他人捕得亦不准依律寛免僉差不慎之地方官視解役所得之罪分别從重議處一禁卒除賄縱獄囚依律全科果係依法看守偶致疎脱者仍依律減囚罪二等治罪外其有將在監斬絞重犯鬆放獄具以致脱逃審出鬆放之人將該禁卒嚴行監禁俟拿獲正犯之日究明賄縱屬實即照所縱囚罪全科如係徇情鬆放獄具或托故擅離或倩人代守防範疎懈乘間潛逃者亦照故縱律治罪不准照舊例減囚罪二等問擬一疎脱斬絞重犯之解役如果審係依法管解偶致疎脱除短解兵役仍照律減二等問擬外將長解二名均暫行監禁本官另選幹役押同原解之親屬上𦂳躧緝酌限一年如能限内拿獲審無賄縱别情仍將該役依例減二等擬徒或限内無獲即照逃犯本罪減一等問擬滿流一押解新疆人犯如有中途脱逃除有心賄縱仍照與囚同罪例定擬外如係疎縱將解送官兵人役監禁以俟緝獲逃犯治其應得之罪若一年限滿無獲將為首情重者改發伊犁等處給與兵丁為奴其餘為從情輕之犯仍以杖流問擬其由新疆改發烟瘴及黑龍江等處人犯如有疎縱亦照此例辦理一疎縱解審軍流徒犯之役卒如審係受賄故縱者即以囚罪全科贓多者以枉法從重論若止一時疎脱及因别故致逃並無受賄故縱者給限百日追捕限内捕得者將長解役卒減二等問擬短解免罪若限滿無獲將長解短解内之違例雇替等項人役減囚罪一等問擬餘皆照律減二等治罪知情藏匿罪人以非親屬及罪人未到官者言凡知他人犯罪事發官司差人追喚而將犯罪之人藏匿在家不行捕告及指引所逃道路資給所逃衣糧送令隠匿他所者各減罪人所犯罪一等各字指藏匿指引資給説如犯數罪藏匿人止知一罪以所知罪減等罪之若親屬紏合外人藏匿親屬雖免罪減等外人仍科藏匿之罪其事未發非官司捕喚而藏匿止問不應其已逃他所有輾轉相送而隠藏罪人知情轉送隠藏者皆坐減罪人一等不知者勿論若知官司追捕罪人而漏泄其事致令罪人得以逃避者減罪人所犯罪一等亦不給捕限未斷之間能自捕得者免漏泄之罪若他人捕得及罪人已死若自首又各減一等各字指他人捕得及囚死自首説條例一宛平縣屬西山門頭溝地方開採煤窰該縣設立印簿給發窰户令將傭工人等姓名籍貫來去緣由十日一報該巡檢考查並令西路同知就近稽查如該窰户不將各項工人開報照脱漏户口律治罪若各項工人有犯竊犯賭或聚衆逞兇致成人命該窰户知情不行報究發覺之日除本犯按律治罪外該窰户照總甲容留棍徒例杖八十盜賊捕限凡捕强竊盜賊以事發於官之日爲始限一月内捕獲當該捕役汛兵一月不獲强盜者笞二十兩月笞三十三月笞四十捕盜官罰俸兩個月捕役汛兵一月不獲竊盜者笞一十兩月笞二十三月笞三十捕盜官罰俸一個月限内獲賊及半者免罪若被盜之人經隔二十日以上告官者去事發日巳逺不拘捕限緝獲捕殺人賊與捕强盜限同凡官罰俸必三月不獲然後行罰條例一直𨽻各省審理命案定限六個月盜案定限十個月搶奪發掘墳墓及一切雜案俱定限四個月如案内正犯及要証未獲情事未得確實者題明展限按察司自理事件限一個月完結府州縣自理事件俱限二十日審結上司批審事件限一個月審報若隔屬提人及行查者以人文到日起限如有遲延情弊該督撫察叅若該督撫將遲延各官徇情不行題叅察出一併交部議處一凡承審命盜及欽部事件至限滿不結該督撫照例咨部即於限滿之日接算再限四個月如逾限不結該督撫將易結不結情由詳查註明題叅照例議處至承審官内有陞任革職降調及因公他往委員接審者准其展限一個月完結不許又另起限如有不肖文武官員承審案件借端巧爲掩飾不行速結者令該督撫題㕘交與該部嚴加議處上司徇庇不行題叅及下屬巳經解審混行駁查以致承審官違限並知屬官例限將滿借端故爲派委希圖展限者一併交部從重議處督撫叅遲延時将何月日解審駁查次數聲明聽部查核一凡承審土苗案件俱以獲犯到官日爲始盜案限一年命案竊案限六個月雜件限四個月限滿不結照例咨叅接扣限期完結如仍不審結該督撫照例題叅若該犯居土官所轄地方該土官准州縣移㑹徇庇不行拏解經督撫核實題叅將土官革職擇伊子弟之賢者承襲若該犯居隔屬隔省者以文到日爲始限四個月拏解如庇匿不解交部議處如果兇犯實係在逃俱限六個月承緝限滿無獲交部分别議處一盜案如有隔省關查口供必需時日者許申詳督撫咨部展限兩個月其通省行查之事令督撫查明將最後送到逾限之府州縣職名附叅照欽部事件例交部議處一盜案果有虚實情形未分盜贓未確限内不能完結者許承審有司據實詳報該管上司核實即行報部准其展限四箇月倘承審官有将易結之盜案濫請展限該督撫漫爲咨部者有司官照易結不結例革職轉詳之司道府州及咨部之督撫一併交部分别議處一刑部行文五城兵馬司大宛二縣查拏之案如關係偷盜倉庫錢糧并隠匿要緊重犯即於文内添註要犯勒限緝拏字樣限滿無獲照京城定例議處其餘尋常命盜如限滿無獲照外省定例議處倘該管官不行呈報題叅察出一并交部議處其五城兵馬司承追贓罰變産等項如限滿不完照大宛二縣承追雜項錢糧例議處如該御史不行開送察出將該御史一併交與吏部議處仍令該司坊官将厯年承追之項造具清冊三本一送刑部一送都察院一送該城御史查核一凡交界地方失事探實贓盗之處無論隔縣隔府隔省一面差役執持印票即行宻拏一面移文闗㑹拏獲之後仍報明地方官添差移解其一應竊匪窩賭窩娼等類有竄入鄰境者亦照此例一面差役往拏一面闗㑹協緝倘有疎縱牽制不行緝拏交部分别議處捕役借端騷擾越境誣拏平民照誣良為盜例治罪一凡京城内有强盜劫財傷人者該汛值宿領催兵丁俱枷號四十日斥革發落步軍統領總尉副尉步軍校俱交部分别降罰賊犯限一年緝拏獲半者開復如不獲又失事者降調若正陽崇文宣武三門闗廂内失事者該汛兼轄三營武職及文職兵馬司官俱交各該部降罰専汛千把總及馬步兵丁各杖一百賊犯限一年緝拏全獲者開復緝拏一半者免其議處不及一半者仍照定例議處不獲者兼轄各官俱降調千把總俱革職兵丁枷號四十日斥革發落賊犯交接管官緝拏一凡隔省闗提人犯承問官一面詳請督撫移咨一面差人闗㑹隔省該地方官添差協緝如擅給批牌竟行拘提及隔省地方官徇庇不行協緝均交部議處至本省内隔省闗提人犯亦行令該地方官添差拘提如違例擅自拘拏者捕役照誣良為盜例治罪原差地方官交部議處闗提人犯謂闗提尋常對質人犯若盗賊匪人不用此例一凡承緝各官有假借别州縣所獲之盜指為本案盜首别州縣亦扶同搪塞或先報盜首脫逃或揑報盜首病故後經發覺者將從前假借扶同隠匿揑報之該地方文武各官交部議處其鄰境他省之文武官有能拿獲别案内首盜夥盜質審明確者該地方文武各官交部分别議叙兵役分别酌量給實若不在夥内之人首出盜首即行拿獲者地方官從優給賞捕役拿獲盜首者亦從優給賞若盜首不獲將承緝捕役家口監禁勒比如獲盜過半之外又獲盜者地方官亦酌量給賞若州縣賄盜狡供展轉行查希圖銷案者照易結不結例治罪一苖蠻地方一有失事該防汛官即帶兵追捕地方官即差役嚴拿一面申報上司並移㑹鄰近營汛協力窮追如未能弋獲查明凶犯本名確係何處賊蠻㑹同該衙門添差緝獲如徇庇不發并承審官不嚴行追究及文武官弁明知案犯下落不實力擒拿以致逃匿者並交部議處若捕役摉捕案犯牽累良民照誣指良民為盜例從重治罪一凡捕役串通盜犯教供妄認别案盜犯以圖銷案州縣官失於覺察審出交部議處捕役照誣良為盜發邊逺充軍例減一等杖一百徒三年如有賄買情弊以枉法從重論一鄰縣闗提人犯限文到二十日拿解逾限不發交部議處聼信地保差役揑稱並無其人并久經外出空文回覆掯不發人者地方官議處外其地保差役照不應律治罪受財者以枉法從重論藏匿要犯按律究擬本犯從重問斷一五城地方有失竊案件該司坊官即申報該巡城御史及都察院山東道於失事之日起勒限四個月緝拿山東道按限提比如限内賊犯未獲及獲不及半者該城御史即行查㕘交部議處如承緝限滿該城不行報㕘及山東道御史不實力稽察者令都察院查㕘一併議處其三營所轄地方失竊該營専汛武職交步軍統領亦照司坊官一體㕘處一凡司道提比捕役除積案久逃之犯仍照舊例遵行其新報之案司道不得即行提比専令該管之府㕔比緝仍將比過各案並捕役姓名報明該道查核按季彚報臬司轉申督撫查核倘經年累月總未獲報該府㕔有徇隠之處一並題㕘文部議處一凡五城地方事主報有失竊案件該司坊官隠諱不報者照步軍校諱竊例議處一凡命盜一切重案正犯脫逃即行差役宻拿並開明年貌事由詳請通飭本省州縣一體協緝倘未弋獲於初㕘限滿即請分咨鄰省通緝不得稽延致犯逺颺逾限未獲仍將本案承緝官按限查㕘照例分别議處一凡隔省闗提人犯承問官務將人犯𦂳要縁由及闗提月日通報各上司稽考如准闗之州縣遲延不即解送及聴信地保人等揑稱並無其人掯不發解者該督撫立即嚴㕘至審結題咨時亦將闗到日期扣明程限聲明有無遲延聴候部議如承審之州縣將並非𦂳要案犯藉稱闗提不到者該督撫亦即查明嚴㕘議處一凡各省州縣遇有強劫拒捕等重案立即選差幹捕擒拿一面將失盜情形申報所轄之府州及闗移接壤别屬之州縣其専轄之知府知州立即通飭闔屬各選派幹捕懸立賞格分路偵緝無獲則一體比追其非本府州所屬而境地相接之州縣如遇移闗一到亦即照此協力差捕搜拿一黔省苖疆地方承審命盜案件各照原定分限命案三個月盜案五個月審理完結其加展兩月三月之例概行停止一命盜重案内外問刑衙門各宜迅速查辨應緝拿者上𦂳緝拿應定擬者即行定擬若承審官不能審出實情以監候待質遷延時日者該堂官督撫察出即嚴行㕘處一卑幼擅殺期功尊長屬下人毆傷本管官并妻妾謀死本夫奴婢毆故殺家長等案承審官限一月内審解府司督撫各限十日審轉具題如州縣官於正限屆滿尚未審結即於限滿之日接扣二㕘限期州縣限二十日府司督撫仍各限十日完結如有遲延分别初㕘二㕘照例議處至殺死三命四命之案該督撫即提至省城督同速審其審解限期悉照卑幼擅殺期功尊長之例辦理一盜案除虛實情形未分盜賊未確之案仍照舊例辦理外如盜犯到案之初業巳供認確鑿贓跡顯明者無論首從緝獲㡬名即以到案之日起限審擬完結若承審期内遇有續獲之犯如到案在州縣承審五個月分限以内者即行一併審擬毋庸另展限期如到案巳在州縣分限以外不能併案審擬照續獲盜犯之例另行展限完結如間有獲犯到案時在州縣分限將滿不能依限審擬者總不得逾違統限搶竊等案一體遵照辦理一盜案獲犯到官無論首盜夥盜緝獲幾名如供証確鑿贓跡顯明者一經獲犯概照命案例限六個月完結如果虛實情形未分盜贓未確承審官立即據實詳報逐細聲明該管上司核明預行咨部准其以十個月完結至巳經審定之案如有續獲盜犯到官在州縣分限以外不能併案審解者俱扣限四個月審結倘有遲延均照例查㕘一州縣無論初㕘承審限期及監斃竊犯等案俱以人犯到案之日起限如遇犯係盤獲現無事主及拿獲賊犯究出多案必須事主到案認贓方可擬罪者照例預行咨明展限如有混行展限者交部議處一五城遇有承緝凶犯選差幹捕勒限嚴緝如一月不獲照例責比三月至五月不獲者即將該捕役從重責革枷號兩個月示懲另選幹捕躧緝如捕役果能實力拿獲者照拿獲盜案之例於贓罰銀兩内令巡城科道酌量賞給至巡捕三營所屬地方原與五城聫絡遇有不知姓名之人被傷身死據指揮相驗的實該汛武職即行呈報步軍統領衙門照例勒限嚴緝正凶仍於限内報明兵部俟文職審明是讐是盜將武職各官照例查議其三營捕役應照五城限緝之例令該汛武弁選差幹捕報明註冊勒限嚴緝按期責比如逾限不獲即行枷號責革仍令另差幹捕實力緝拿如該汛捕役有能於限内緝獲正凶者量加奬賞於步軍統領衙門房租項下動支發給彚入年終奏銷一京城遇有讐盜未明之案巡捕三營武職等官照文職緝凶之例一體扣限查㕘俟獲犯之日如審係盜案仍照例將専轄兼轄各官補㕘疎防大清律例卷三十五
