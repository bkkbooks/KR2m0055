body:
  text: 吏律公式講讀律令凡國家律令參酌事情輕重定立罪名頒行天下永為遵守百司官吏務要熟讀講明律意剖決事務每遇年終在內在外各從上司官考校若有不能講解不曉律意者官罰俸一月吏笞四十其百工技藝諸色人等有能熟讀講解通曉律意者若犯過失及因人連纍致罪不問輕重並免一次其事干謀反叛逆不用此律若官吏人等挾詐欺公妄生異議擅為更改變亂成法即律令者斬監候制書有違天子之言曰制書則載其言者如詔赦諭敕之類若奏准施行者不在此內凡奉制書有所施行而故違不行者杖一百違皇太子令㫖者同罪失錯㫖意者各減三等其稽緩制書及皇太子令㫖者一日笞五十每一日加一等罪止杖一百棄毁制書印信凡故意棄毁制書及各衙門印信者斬監候若棄毁官文書者杖一百有所規避者從重論事干軍機錢糧者絞監候事干軍機恐致失誤故雖無錢糧亦絞若侵欺錢糧棄毁欲圖規避以致臨敵告乏故罪亦同科當該官吏知而不舉與犯人同罪至死減一等不知者不坐誤毁者各減三等其因水火盜賊毁失有顯跡者不坐若遺失制書聖㫖印信者杖九十徒二年半若官文書杖七十事干軍機錢糧者杖九十徒二年半俱停俸責尋三十日得見者免罪限外不獲依上科罪若主守官物遺失簿書以致錢糧數目錯亂者杖八十亦住俸責尋限內得見者亦免罪其各衙門吏典役滿替代者明立案驗將原管文卷交付接管之人違而不立案交付者杖舊吏八十首領官吏不候吏典交割扶同給照起送離役者罪亦如之條例一凡直省州縣交代時將任內自行審理戶婚田土錢債等項案件粘連卷宗鈐蓋印信造入交盤冊內仍彚録印簿摘取事由照依年月編號登記注明經承姓名隨同卷宗交代並將歷任遞交之案一并檢齊加具並無藏匿抽改甘結交代接任之員報明上司查核倘有不肖胥吏不行查明交代照不將文卷交代接管之人律杖八十其有乘機隱匿添改作弊等情照盜取卷案改易例治罪受財者以枉法從重論將失察之該管官照例議處一緣事降調及病故之員凡有從前未繳硃批奏摺令本身及家屬呈明本省督撫本旗都統代繳倘有隱匿收存者一經發覺交部議處一大小衙門將奉行條例彚齊造冊於新舊交盤之時一體交盤如有遺漏將典吏照遺失官文書律治罪該管官交部議處一凡將誥命舊軸售賣及轉賣者照違制律治罪一各省臬司交代無論正署離任時將一應卷宗及自理詞訟無論已結未結俱造冊鈐印封固一體移交其接任臬司將交代清楚情由自行陳奏一面具結詳明督撫報部並將在班書吏加緊防間不許藉端出署如有遲延朦混即行嚴究如因離任事故不及親辦者責成首領官關防造冊封卷呈辦其道府㕔員一切卷宗各照州縣鈐印造冊交代例報明上司存案上書奏事犯諱凡上書若奏事誤犯御名及廟諱者杖八十餘文書誤犯者笞四十若為名字觸犯者誤非一時且為人喚杖一百其所犯御名及廟諱聲音相似字樣各别及有二字止犯一字者皆不坐罪若上書及奏事錯誤當言原免而言不免相反之甚當言千石而言十石相懸之甚之類有害於事者杖六十申六部錯誤有害於事者笞四十其餘衙門文書錯誤者笞二十若所申雖有錯誤而文案可行不害於事者勿論事應奏不奏凡應議之人有犯應請旨而不請㫖及應論功上議而不上議即便拏問發落者當該官吏照雜犯律處絞若文武職官有犯應奏請而不奏請者杖一百有所規避如懷挾故勘出入人罪之類從重論若軍務錢糧選法制度刑名死罪災異及事應奏而不奏者杖八十應申上而不申上者笞四十若應議之人及文武官犯罪並軍務等事已奏已申不待回報而輒施行者並同不奏不申之罪至死減一等其各衙門合奏公事須要依律定擬罪名具寫奏本其奏事及當該官吏僉書姓名現今奏本吏不僉名明白奏聞若官吏有規避將所奏內增減緊關情節朦朧奏准未行者以奏事不實論施行以後因事發露雖經年逺鞠問明白斬監候非軍務錢糧酌情減等若於親臨上司官處禀議公事必先隨事詳陳可否定擬禀說若准擬者方行上司置立印署文簿附寫所議之事略節緣由令首領官吏書名畫字以慿稽考若將不合行事務不曽禀上司妄作禀准及窺伺上司公務冗併乘時朦朧禀說致官不及詳察誤准施行者依詐傳各衙門官員言語律科罪有所規避者從重論詐傳官員言語本罪詳見詐僞律條例一凡州縣官將小民疾若之情不行詳報上司使民無可控訴者革職永不叙用若已經詳報而上司不接准題達者革職一各省學臣發審事件一面發提調官訊問一而咨明督撫稽查提調等官仍具文通報除例應枷責完結者聽提調官隨時發落報明學臣督撫藩臬銷案外其枷責以上罪名俱照例擬議報明學臣詳解藩臬核轉由督撫分别批結咨題如提調等官奉到學臣批檄不行通報即罪無出入亦交部議處出使不復命凡奉制敕出使使事已完不復命干預他事者與使事絶無關涉杖一百各衙門出使題奉精徴批文及劄付者使事已完不復命干預他事者所干預係常事杖七十軍情重事杖一百若使事未完越理理不當為犯分分不得為侵人職掌行事者笞五十若回還後三日不繳納聖㫖制敕者杖六十每二日加一等罪止杖一百不繳納符驗者笞四十每三日加一等罪止杖八十若或使事有乖或聖㫖符驗有損失之類有所規避不復命不繳納者各從重論官文書稽程凡官文書稽程者一日吏典笞一十三日加一等罪止笞四十首領官各減一等首領官吏典之頭目凡言首領正官佐二不坐若各衙門上司遇有所屬申禀公事隨即詳議可否明白定奪批示回報若當該上司官吏不與果決含糊行移上下互相推調以致耽誤公事者上司官吏杖八十其所屬下司將可行事件不行區處無疑而作疑申禀者下司官吏罪亦如之條例一內外衙門公事小事五日程中事十日程大事二十日程並要限內完結若事干外郡官司關追會審或踏勘田土者不拘常限一部院衙門一切應行事件俱於到司五日之內行文其有訛誤舛錯之處將專管值日之滿漢司官交部議處如遺漏未行或遲延日久將滿漢司官交部分别議處一刑部應會三法司畫題事件將稿面鈐蓋司印注明緣由付督催所彚齊轉交大值日司分用印文移送法司衙門畫題限十日內亦用印文送回如稿內有酌議改易之處限五日內即將應酌議改易之處用印文聲明緣由送回刑部查核定議刑部仍用印文將應否改易之處聲明再行會送法司衙門一凡州縣官承審案件或正犯或緊要證佐染患沉疴即將患病日期詳報俟該犯病愈之日起解其患病日期准於原限內扣除府州司道審轉之時或遇犯證患病亦准報明扣除若帶病起解以致中途病斃照解犯中途患病不行留養例交部議處若無故遲延揑報患病希圖扣限及上司徇隱並交部議處一凡刑部衙門尋常移咨外省案件如行查家産關提人犯俱以文到之日為始依限查覆於覆文內將何日接到部咨有無逾限之處隨案聲明倘一時未得清晰必須輾轉咨查不能依限查覆者亦即聲請展限如逾限不完又不聲明緣由經部行催之後即行查參將承辦之州縣及各該上司俱交部議處一凡州縣承審命案詳請檢驗上司並未批駁者仍按限審解外其有屢次駁查後經批准遲延有因之案該督撫據實聲明報部准其另行扣限如有揑飾照例嚴參一凡各部事件在本部題結者吏禮兵工等部及各衙門俱定限二十日戶刑二部定限三十日行查會稿係吏禮兵工及各衙門主稿者定限四十日戶刑二部定限五十日內所會各衙門各定限五日戶刑二部各定限十日逾限即行參處一凡各州縣承審案件案犯偶患輕病委員驗實責令上緊醫痊隨愈隨解不准扣限其病勢果重驗報確實即將病起日期連結詳報務於一月內醫痊審解如仍不能報痊方准驗實展限統計前後總不得過三月限期倘承審官有揑報籍延者該督撫即行嚴參同委驗官及扶同徇隱之上司一併照例分别議處照刷文卷凡照刷有司有印信衙門文卷可完不完遲一宗二宗吏典笞一十三宗至五宗笞二十每五宗加一等罪止笞四十府州縣首領官及倉庫務場局所河泊等官非吏典之比各減一等失錯漏使卬信不僉姓名之類及漏報卷宗本多而不送照刷一宗吏典笞二十二宗三宗笞三十每三宗加一等罪止笞五十府州縣首領官及倉庫務場局所河泊等官各減一等其府州縣正官巡檢非首領官之比一宗至五宗罰俸一月每五宗加一等罰止三月若文卷刷出錢糧埋沒刑名違枉等事有所規避者各從重論條例一各部院衙門每月將已結未結科抄事件造冊分送六科科抄並見理事件造冊分送各道勘對限期其各部注銷會稿事件即於注銷冊內將㑹稿衙門定議日期逐一詳開移會科道查核倘有遲延違誤者察參一在京各衙門凡關錢糧刑名案件每年八月內彚造印册送京畿道刷卷有遲錯者察參磨勘卷宗凡照磨所官磨勘出各衙門未完文卷曾經布政司按察司照刷駁問遲錯經隔一季之後錢糧不行追徴足備者提調掌印官吏以未足之數十分為率一分笞五十每一分加一等罪止杖一百刑名造作等事可完而不完應改正而不改正者過一季笞四十一季後每一月加一等罪止杖八十受財者計贓以枉法從重論若有隱漏已照刷過卷宗不報磨勘者一宗笞四十每一宗加一等罪止杖八十事干錢糧者一宗杖八十每一宗加一等罪止杖一百有所規避者從重論若官吏文書內或有稽遲未行或有差錯未改聞知事發將弔查旋補文案未完揑作已完未改正揑作已改正以避遲錯者錢糧計所增數以虛出通關論刑名等事以增減官文書論同僚若本管上司知而不舉及扶同旋補作弊者同罪不知情及不同署文案者不坐同僚代判署文案凡應行上下官文書而同僚官代判判日署書名畫押者杖八十若因遺失同僚經手文案而代為判署以補卷宗者加一等若於內事情有增減出入罪重者從重論條例一各部司員有偷安偏執故意推諉不行畫押者該堂官即指名題參其實有患病事故告假者免其議處若堂官徇情枉法逼勒畫押該司員密揭都察院將該堂官指名題參如有挾嫌誣告情弊將該司員照例治罪一刑部遇有三法司會勘案件即知會都察院大理寺堂官帶同屬員至刑部衙門秉公會審定案畫題倘飾詞推故竟無堂官到部者即將該院寺堂官交部議處增減官文書凡增減官文書內情節字樣者杖六十若有所規避而增減者杖罪以上至徒流各加規避本罪二等罪止杖一百流三千里未施行者於加罪上各減一等規避死罪者依常律其當該官吏自有所避之罪增減原定文案者罪與規避同若增減以避遲錯者笞四十若行移文書誤將軍馬錢糧刑名重事緊關字樣傳寫失錯而洗補改正者吏典笞三十首領官失於對同減一等若洗改而有干礙調撥軍馬及供給邊方軍需錢糧數目者首領官吏典皆杖八十若有規避故改補者以增減官文書論各加本罪二等未施行者各於規避加罪土減一等若因改補而官司涉疑有礙應付或至調撥軍馬不敷供給錢糧不足因而失誤軍機者無問故失並斬監候以該吏為首若首領及承發吏杖一百流三千里若非軍馬錢糧刑名等事文書而無規避及常行字樣偶然誤寫者皆勿論封掌印信凡內外各衙門印信長官收掌同僚佐二官用紙於印面上封記俱各畫字若同僚佐二官公差事故許首領官封印違者杖一百漏使印信凡各衙門行移出外文書漏使印信者當該吏典對同首領官並承發各杖六十全不用印者各杖八十若漏印及全不用印之公文干礙調撥軍馬供給邊方軍需錢糧者各杖一百因具漏使不用所司疑慮不即調撥供給而失誤軍機者斬監候亦以當該吏為首經管首領官并承發止坐杖一百流三千里若倒用印信者照漏用律杖六十條例一各部院稿案有應行添改之處俱用印鈐蓋如有踈忽照例參處一奏銷冊內錢糧總數遺漏印信及有洗補添注字樣造冊之員交部議處繕書冊吏按律治罪擅用調兵印信凡統兵將軍及各處提督總兵官印信除調度軍馬辦集軍務行移公文用使外若擅出批帖假公營私及為憑照防送物貨圖免稅者首領官吏各杖一百罷職役不敘罪其不能稟阻正官奏聞區處條例一凡各省文武大小官員有以官印用於私書者照違制律治罪有所求為從重論大清律例卷七
