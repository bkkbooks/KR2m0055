front:
  text: 欽定四庫全書大清律例卷三十四
  hash: sha256:a48a3eaa767e06bdd58bc9da1e609d509244c1b191ac97cf20c495cbcfe832be
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0055_WYG_084-1a, image: WYG0673/WYG0673-0086a.png}
body:
  text: 刑律雜犯拆毁申明亭凡折毁申明亭房屋及毁亭中板榜者杖一百流三千里仍各令修立條例一凡欽奉教民敕諭該督撫督率屬員繕寫刋刻敬謹懸掛於申明亭並將舊有一切條約悉行刋刻木榜曉諭夫匠軍士病給醫藥凡軍士在鎮守之處丁夫雜匠在工役之所而有疾病當該鎮守監督官司不為行移所司請給醫藥救療者笞四十因而致死者杖八十若已行移所司而不差撥良醫及不給對症藥餌醫治者罪同賭博凡賭博財物者皆杖八十所攤在場之財物入官其開張賭坊之人雖不與賭列亦同罪坊亦入官止據見發為坐職官加一等若賭飲食者勿論條例一凡軍民人等擅入宗室府內教誘為非及賭博誆哄財物者俱問發近邊充軍一凡賭博不分兵民俱枷號兩個月杖一百偶然㑹聚開場窩賭及存留之人抽頭無多者各枷號三個月杖一百官員有犯革職枷責不准折贖奴僕犯者家主係官交與該部係平人責十板該管各官不行嚴查緝拏别經發覺者交部議處總甲笞五十若旁人出首或賭博中人出首者自首人免罪仍將在場財物一半給首人充賞一半入官凡以馬弔混江賭財物者俱照此例治罪賭飲食者坐不應重律以上俱拏獲牌骰見發有據者方坐不許妄扳拖纍一凡旗人將自己銀錢開場誘引賭博經旬纍月聚集無賴放頭抽頭者初犯發極邊烟瘴充軍再犯擬絞監候容留房主初犯發邊逺充軍再犯發極邉烟瘴充軍俱照名例折枷月日發落賭博之人枷號兩個月鞭一百如係官員革職枷號兩個月鞭一百不准折贖永不叙用其失察該管各官俱交部議處領催鞭五十族長鞭二十五係官亦交部議處餘俱照前例科斷一凡民人將自己銀錢開場誘引賭博經旬纍月聚集無賴放頭抽頭者初犯杖一百徒三年再犯杖一百流三千里存留賭博之人初犯杖八十徒二年再犯杖一百徒三年輸錢者據實出首免罪仍追所輸之錢給還若官員無論賭錢賭飲食等物有打馬弔鬭混江者俱革職滿杖枷號兩個月上司與屬員鬭牌擲骰者亦均革職滿杖枷號三個月俱永不敘用如該管上司并督撫容隱屬員賭博及地方官辨疏縱賭博者俱交部嚴加議處稽查一兵役亦照例治罪一凡旗人造賣紙牌骰子為首者發極邉烟瘴充軍為從及販賣為首者發邊逺充軍為從販賣者發近邊充軍俱照名例折枷月日發落失察該管各官亦照失察賭博例治罪但必有製造牌骰器具及開鋪販賣確據方許拏送不得借借端訛詐一凡民人造賣紙牌骰子為首者發邉遠充軍為從及販賣為首者杖一百流二千里為從販賣者杖一百徒三年如藏匿造賭器具不行銷燬者照販賣為從例治罪地方保甲知造賣之人不首報者杖一百一八旗直省拏獲賭博務必窮究牌骰之所由來如不能究出或被他處查出將承審官交部議處倘將無辜之人混行入罪照不能查出造賣牌骰例加一等治罪其究出造賣之地方官交部議敘或所屬地方有造賣之家未經發覺能緝拿懲治亦交部議叙一奸民私造賭具其左右緊鄰有能據實出首照例給賞如有通同徇隱不即舉首者杖一百若得財准枉法從重論罪止杖一百徒三年所得之贓照追入官若於未獲之先本犯自首准其免罪仍詳記檔案倘免罪之後又復造賣發邊逺充軍如同居之父兄伯叔等據實出首本犯亦准免罪一拿獲賭博人犯到案務向各犯嚴追賭具來歷如不將造賣之人據實供出即將出有賭具之人照販賣為從例杖一百徒三年若已將造賣之人供出該地方官規避失察朦朧結案或該犯狡詞支飾承審官不根究實情後經查出交部分别議處一凡描畫紙牌照印板造賣之犯減一等治罪造賣牌骰未成照造賣已成者減一等治罪一凡開鷯鶉圈鬭雞坑蟋蟀盆並賭鬭者照開場賭博枷責例治罪其該管官亦照開場賭博之該管官員例議處一在京轎夫有借名依附潛匿别處開場誘賭經旬纍月者將為首開場及放賭抽頭之犯均發邊遠充軍同賭之人俱枷號三個月杖一百遞回原籍拘束其現用轎夫之王大臣有轎夫在家賭博不加約束及任其居住遙遠開場放賭將坐轎之本主照例議處一經旬纍月開場窩賭之左右兩鄰如有通同徇隱不即舉首者照不應重律杖八十得財者計贓准竊盜從重論一凡壓寶誘賭者將掌盒及同賭之人悉照開場賭博例治罪一旗人造賣賭具為從及販賣為首為從者仍照例辦理外其造賣賭具為首之旗人係初犯亦照定例發落若係再犯除照例發落外再加枷號一個月俱交該管官嚴加管束三犯者即擬以實遣不准折枷係在京八旗各省駐防旗人俱照例發遣黑龍江等處當差係盛京等處旗人俱照例發遣西安等處駐防當差該管各官如有隱匿不報者交部嚴加議處一無賴匪徒串黨駕船設局攬載客商勾誘賭博折沒貨物掯留行李者初犯到案審係僅止一二次者照開場誘賭例杖一百徒三年三次以上及再犯者發雲貴兩廣極邊烟瘴充軍並將首犯先於拿獲之沿河馬頭地方加枷號一個月其船户知情分贓者初犯仍照為從論再犯亦與犯人同罪船價入官閹割火者凡官民之家不得乞養他人之子閹割火者惟王家用之違者杖一百流三千里其子給親罪其僭分私割也條例一淨身人曾經發回若不候朝廷收取官司明文起送私自來京圖謀進用者問發近邊充軍一敢有私自淨身者本身并下手之人處斬全家發邊遠充軍兩鄰及歇家不舉首者問罪有司里老人等仍要時常訪察但有此等之徒即行捉拏送官如或容隱一體治罪一民有四五子以上願以一子報官閹割者聽有司造册送部候收補之日選用一凡誆騙閹割强勒閹割者仍照私割例治罪外其父母及本身情願報官閹割者免其治罪一內務府並諸王貝勒等門上放出為民之太監除效力年久本管本主保留外不許仍留京師居住違者將容留之人從重治罪將內務府總管步軍統領巡城御史一併交部議處如保留為民之太監有生事犯法者將保留之人交部議處囑託公事凡官吏諸色人等或為人或為已曲法囑託公事者笞五十但囑即坐不分從不從當該官吏聽從而曲法者與同罪不從者不坐若曲法事已施行者杖一百其出入所枉之罪重於杖一百者官吏以故出入人罪論若為他人及親屬囑託以致所枉之罪重於笞五十者減官吏罪三等自囑託已事者加所應坐本罪一等監臨勢要曲法為人囑託者杖一百所枉重於杖一百者與官吏同故出入人罪至死者減一等若曲法受贓者並計贓通算全科以枉法論通上官吏人等囑託者及當該官吏並監臨勢要言之若不曲法而受贓者祇以不枉法贓論不曲法又不受贓則俱不坐若官吏不避監臨勢要將囑託公事實跡赴上司首告者升一等吏候受官之日亦升一等條例一民人附合結黨妄預官府之事者杖一百如有降調黜革之員賄囑百姓保留者審實將與受官民俱照枉法贓治罪私和公事發覺在官凡私和公事各隨所犯事情輕重減犯人罪一等罪止笞五十若私和人命姦情各依本律不在此止笞五十例失火凡失火燒自己房屋者笞四十延燒官民房屋者笞五十因而致傷人命者不分親屬凡人杖一百但傷人者不坐致傷罪其罪止坐所由失火之人若延燒宗廟及宮闕者絞監候社減一等皆以在外延燒言若於山陵兆域內失火者雖不延燒杖八十徒二年仍延燒山陵兆域內林木者杖一百流二千里若於官府公廨及倉庫內失火者亦杖八十徒二年主守倉庫之人因而侵欺財物者計贓以監守自盜論不分首從其在外失火而延燒者各減三等若主守人因而侵欺財物不在減等之限若常人因火而盜取以常人盜論如倉庫內失火者杖八十徒二年比倉庫被竊盜庫子儘其財産均追賠償之例若於庫藏及倉厫內燃火者雖不失火杖八十其守衛宮殿及倉庫若掌囚者但見內外火起皆不得離所守違者杖一百若㸃放火花爆仗問違制條例一凡出征行獵處失火者杖一百放火故燒人房屋凡放火故燒自巳房屋者杖一百若延燒官民房屋及積聚之物者杖一百徒三年因而盜取財物者斬監候殺傷人者以故殺傷論若放火故燒官民房屋及公廨倉庫係官積聚之物者不分首從皆斬監侯須於放火處捕獲有顯跡證驗明白者乃坐其故燒人空閒房屋及田場積聚之物者各減一等並計所燒之物減價儘犯人財産折銼賠償還官給主除燒殘見在外其已燒物令犯人家産折為銀數係一主者全償係衆主者計所故燒幾處將家産銼為幾分而賠償之即官民亦品搭均償若家産罄盡者免追赤貧者止科其罪若奴婢雇工人犯者以凡人論條例一凡各邊倉場若有故燒係官錢糧草束者拏問明白將正犯梟首示衆燒燬之物先儘犯人家産折銼賠償不敷之數著落經收看守之人照數均賠一凶惡棍徒糾衆商謀計圖得財放火故燒官民房屋及公廨倉庫係官積聚之物並街市鎮店人居稠密之地已經延燒搶奪財物者均照强盜律不分首從擬斬立決殺傷人者梟示有因焚壓致死者將為首之人梟示仍照强盜例將法所難宥情有可原者於疏內聲明其本非同夥借名救火乘機搶掠財物者照搶奪律分别治罪若故燒孤村曠野並不毗連民居之空閒房屋及田場積聚之物均照律科斷為首者仍枷號兩個月其惡徒謀財放火有已經延燒尚未搶掠財物又未傷人者將為首之人擬斬監候為從商謀下手燃火者枷號兩個月發近邊充軍誘脅同行者杖一百徒三年如謀財放火隨即救熄尚未延燒將為首之犯擬絞監候為從商謀下手燃火者杖一百流三千里誘脅同行者枷號兩個月責四十板若非圖劫財止因挾仇放火延燒因而殺人及有焚壓致死者即將為首之犯擬斬立決為從商謀下手燃火者擬絞監候其未傷人及傷而不死者將為首之犯擬斬監候為從者發近邊充軍誘脅同行者並杖一百徒三年如挾仇放火當被救熄尚未延燒為首之犯枷號兩個月發近邊充軍為從者枷號三個月杖一百若地方文武官辨遇有此等惡徒放火不即赴援撲滅協力擒拏照例議處地方保甲人等一併治罪搬做雜劇凡樂人搬做雜劇戲文不許粧扮歷代帝王后妃及先聖先賢忠臣烈士神像違者杖一百官民之家容令粧扮者與同罪其神仙道扮及義夫莭婦孝子順孫勸人為善者不在禁限條例一城市鄉村如有當街搭臺懸燈唱演夜戲者將為首之人照違制律杖一百枷號一個月不行查拏之地方保甲照不應重律杖八十不實力奉行之文武各官交部議處若鄉保人等有借端勒索者照索詐例治罪違令凡違令者笞五十謂令有禁制而律無罪名者如故違詔旨坐違制故違奏准事例坐違令不應為凡不應得為而為之者笞四十事理重者杖八十律無罪名所犯事有輕重各量情而坐之大清律例卷三十四
