body:
  text: 康熙十八年九月十四日奉上諭國家設立法制原以禁暴止姦安全良善故律例繁簡因時制宜總期合於古帝王欽恤民命之意向因人心滋僞輕視法網及强暴之徒陵虐小民故於定律之外復設條例俾其畏而知警免罹刑辟乃近來犯法者多而姦僞未見衰止人命關係重大朕心深用惻然其定律之外所有條例如罪不至死而新例議死或情罪原輕而新例過嚴者應去應存著九卿詹事科道㑹同詳加酌定確議具奏特諭
  hash: sha256:003b32a6e9b48f16aef52f820d8fc73809b7282273954f966759b0b15565b4e7
