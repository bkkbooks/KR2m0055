body:
  text: 刑部等衙門尚書臣宗室佛格等謹題為請修定例以昭法守以光聖治事該臣等會議得據巡視東城陜西道監察御史湯之旭奏稱律例最關緊要今六部見行則例或有從重改輕從輕擬重有先行而今停事同而法異者未經畫一昭著伏乞特簡諳練律例大臣專掌律例館總裁將康熙六十一年以前之例並大清會典逐條互參考訂畫一例款等語查先據原任廣西道試監察御史盛符升條奏將律例之分别者合之新舊之不符者通之輕重之可議者酌之務期盡善等語經九卿議覆將見行則例載入大清律條例內其律例內有滿漢文義互相參差或律文內已有各罪本條而定例重復均為畫一刪除等因具題奉旨依議欽此於康熙二十八年十月內欽點總裁開館纂輯彚成一書經九卿將原舊律例并續增見行例逐款校閲參酌考訂繕寫清漢各四十二本於四十六年六月初二日進呈未蒙頒發自康熙四十七年起至六十一年止見在纂輯之新增定例一百一十五條內或有應刪應改者相應請旨令律例館總裁速行審定並前纂成四十二本一併交與九卿互相參酌考訂畫一繕寫清漢進呈御覽統候皇上欽定交與刑部刊刻頒發遵行今律例館見有總裁提調纂修等官修輯其該御史所奏特簡大臣專掌律例館總裁之處毋庸議再凡奉上諭臣等欽奉遵行嗣後雍正元年起每年仍令律例館陸續咨取逐一纂修增入應將該御史所奏令科臣年底造册進呈發與律例館纂修之處亦毋庸議雍正元年八月二十三日題九月十七日奉旨朱軾盧詢阿錫鼐伊都立著充為總裁官其應增應減之處再行詳加分晰作速修完至纂修謄録官著派出總裁於各部官員內酌取指名具奏餘依議
